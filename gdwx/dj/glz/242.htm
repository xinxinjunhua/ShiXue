<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　一、十有四年，春，西狩获麟。<br>
<br>
　　引取之也。狩地，不地不狩也。非狩而曰狩，大获麟，故大其适也。其不言来，不外麟于中国也。其不言有，不使麟不恒于中国也。<br>
<br>

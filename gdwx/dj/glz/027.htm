				桓公十六年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有六年，春，正月，公会宋公、蔡侯、卫侯于曹。<br>
<br>
　　二、夏，四月，公会宋公、卫侯、陈侯、蔡侯伐郑。<br>
<br>
　　三、秋，七月，公至自伐郑。<br>
<br>
　　桓无会，其致何也？危之也。<br>
<br>
　　四、冬，城向。<br>
<br>
　　五、十有一月，卫侯朔出奔齐。<br>
<br>
　　朔之名，恶也。天子召而不往也。<br>
<br>

				昭公五年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、五年，春，王正月，舍中军。<br>
<br>
　　贵复正也。<br>
<br>
　　二、楚杀其大夫屈申。<br>
<br>
　　三、公如晋。<br>
<br>
　　四、夏，莒牟夷以牟娄及防、兹来奔。<br>
<br>
　　以者，不以者也。来奔者，不言出。及防、兹，以大及小也。莒无大夫，其曰牟夷何也？以其地来也。以其地来，则何以书也？重地也。<br>
<br>
　　五、秋，七月，公至自晋。<br>
<br>
　　六、戊辰，叔弓帅师败莒于贲泉。<br>
<br>
　　狄人谓贲泉失台，号从中国，名从主人。<br>
<br>
　　七、秦伯卒。<br>
<br>
　　八、冬，楚子、蔡侯、陈侯、许男、顿子、沈子、徐人、越人伐吴。<br>
<br>

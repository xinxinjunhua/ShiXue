				僖公十四年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有四年，春，诸侯城缘陵。<br>
<br>
　　其曰诸侯，散辞也。聚而曰散何也？诸侯城，有散辞也，桓德衰矣。<br>
<br>
　　二、夏，六月，季姬及缯子遇于防，使缯子来朝。<br>
<br>
　　遇者，同谋也。来朝者，来请己也。朝不言使，言使，非正也，以病缯子也。<br>
<br>
　　三、秋，八月，辛卯，沙鹿崩。<br>
<br>
　　林属于山为鹿。沙，山名也。无崩道而崩，故志之也。其日，重其变也。<br>
<br>
　　四、狄侵郑。<br>
<br>
　　五、冬，蔡侯肸卒。<br>
<br>
　　诸侯时卒，恶之也。<br>
<br>

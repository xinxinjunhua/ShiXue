				庄公十九年</td>
			</tr>
			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有九年，春，王正月。<br>
<br>
　　二、夏，四月。<br>
<br>
　　三、秋，公子结媵陈人之妇于鄄，遂及齐侯、宋公盟。<br>
<br>
　　媵，浅事也，不志。此其志何也？辟要盟也。何以见其辟要盟也？媵，礼之轻者也。盟，国之重也，以轻事遂乎国重无说。其曰陈人之妇，略之也。其不日，数渝，恶之也。<br>
<br>
　　四、夫人姜氏如莒。<br>
<br>
　　妇人既嫁，不踰竟，踰竟非正也。<br>
<br>
　　五、冬，齐人、宋人、陈人伐我西鄙。<br>
<br>
　　其曰鄙，远之也。其远之何也？不以难迩我国也。<br>
<br>				</td>

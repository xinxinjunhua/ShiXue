				僖公十二年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有二年，春，王正月，庚午，日有食之。<br>
<br>
　　二、夏，楚人灭黄。<br>
<br>
　　贯之盟，管仲曰：“江、黄远齐而近楚。楚，为利之国也。若伐而不能救，则无以宗诸侯矣。”桓公不听，遂与之盟。管仲死，楚伐江灭黄，桓公不能救，故君子闵之也。<br>
<br>
　　三、秋，七月。<br>
<br>
　　四、冬，十有二月，丁丑，陈侯杵臼卒。<br>
<br>

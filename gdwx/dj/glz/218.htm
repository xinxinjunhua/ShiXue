				定公五年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、五年，春，王正月，辛亥，朔，日有食之。<br>
<br>
　　二、夏，归粟于蔡。<br>
<br>
　　诸侯无粟，诸侯相归粟，正也。孰归之？诸侯也。不言归之者，专辞也，义迩也。<br>
<br>
　　三、于越入吴。<br>
<br>
　　四、六月，丙申，季孙意如卒。<br>
<br>
　　五、秋，七月，壬子，叔孙不敢卒。<br>
<br>
　　六、冬，晋士鞅帅师围鲜虞。<br>
<br>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有六年，春，王正月，晋人灭赤狄甲氏及留吁。<br>
<br>
　　二、夏，成周宣榭灾。<br>
<br>
　　周灾，不志也，其曰宣榭何也？以乐器之所藏，目之也。<br>
<br>
　　三、秋，郯伯姬来归。<br>
<br>
　　四、冬，大有年。<br>
<br>
　　五谷大熟为大有年。<br>
<br>

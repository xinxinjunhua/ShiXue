				昭公七年</td>
			</tr>
			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、七年，春，王正月，暨齐平。<br>
<br>
　　平者，成也。暨犹暨暨也，暨者，不得已也。以外及内曰暨。<br>
<br>
　　二、三月，公如楚。<br>
<br>
　　三、叔孙婼如齐莅盟。<br>
<br>
　　莅，位也。内之前定之辞谓之莅，外之前定之辞谓之来。<br>
<br>
　　四、夏，四月，甲辰，朔，日有食之。<br>
<br>
　　五、秋，八月，戊辰，卫侯恶卒。<br>
<br>
　　乡曰卫齐恶，今曰卫侯恶，此何为君臣同名也？君子不夺人名，不夺人亲之所名，重其所以来也。王父名子也。<br>
<br>
　　六、九月，公至自楚。<br>
<br>
　　七、冬，十有一月，癸未，季孙宿卒。<br>
<br>
　　八、十有二月，葬卫襄公。<br>
<br>

				昭公二十一年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　一、二十有一年，春，王三月，葬蔡平公。<br>
<br>
　　二、夏，晋侯使士鞅来聘。<br>
<br>
　　三、宋华亥、向宁、华定自陈入于宋南里以叛。<br>
<br>
　　自陈，陈有奉焉尔。入者，内弗受也。其曰宋南里，宋之南鄙也。以者，不以者也。叛，直叛也。<br>
<br>
　　四、秋，七月，壬午，朔，日有食之。<br>
<br>
　　五、八月，乙亥，叔辄卒。<br>
<br>
　　六、冬，蔡侯东出奔楚。<br>
<br>
　　东者，东国也。何为谓之东也？王父诱而杀焉，父执而用焉，奔而又奔之。曰东，恶之而贬之也。<br>
<br>
　　七、公如晋，至河乃复。<br>
<br>

				庄公三十一年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、三十有一年，春，筑台于郎。<br>
<br>
　　二、夏，四月，薛伯卒。<br>
<br>
　　三、筑台于薛。<br>
<br>
　　四、六月，齐侯来献戎捷。<br>
<br>
　　齐侯来献捷者，内齐侯也，不言使。内与同，不言使也。献戎捷。军得曰捷，戎菽也。<br>
<br>
　　五、秋，筑台于秦。<br>
<br>
　　不正。罢民三时，虞山林薮泽之利。且财尽则怨，力尽则怼，君子危之，故谨而志之也。或曰，倚诸桓也，桓外无诸侯之变，内无国事，越千里之险，北伐山戎，为燕辟地。鲁外无诸侯之变，内无国事，一年罢民三时，虞山林薮泽之利。恶内也。<br>
<br>
　　六、冬，不雨。<br>
<br>				</td>

				襄公九年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、九年，春，宋灾。<br>
<br>
　　外灾不志，此其志何也？故宋也。<br>
<br>
　　二、夏，季孙宿如晋。<br>
<br>
　　三、五月，辛酉，夫人姜氏薨。<br>
<br>
　　四、秋，八月，癸未，葬我小君穆姜。<br>
<br>
　　五、冬，公会晋侯、宋公、卫侯、曹伯、莒子、邾子、滕子、薛伯、小邾子、齐世子光伐郑。十有二月，己亥，同盟于戏。<br>
<br>
　　不异言郑，善得郑也。不致，耻不能据郑也。<br>
<br>
　　六、楚子伐郑。<br>
<br>				</td>

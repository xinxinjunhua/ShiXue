				昭公十四年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有四年，春，意如至自晋。<br>
<br>
　　大夫执则致，致则名。意如恶，然而致，见君臣之礼也。<br>
<br>
　　二、三月，曹伯滕卒。<br>
<br>
　　三、夏，四月。<br>
<br>
　　四、秋，葬曹武公。<br>
<br>
　　五、八月，莒子去疾卒。<br>
<br>
　　六、冬，莒杀其公子意恢。<br>
<br>
　　言公子而不言大夫，莒无大夫也。莒无大夫而曰公子意恢，意恢贤也。曹、莒皆无大夫，其所以无大夫者，其义异也。<br>
<br>

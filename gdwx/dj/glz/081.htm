				僖公十八年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有八年，春，王正月，宋公、曹伯、卫人、邾人伐齐。<br>
<br>
　　非伐丧也。<br>
<br>
　　二、夏，师救齐。<br>
<br>
　　善救齐也。<br>
<br>
　　三、五月，戊寅，宋师及齐师战于甗，齐师败绩。<br>
<br>
　　战不言伐，客不言及，言及，恶宋也。<br>
<br>
　　四、狄救齐。<br>
<br>
　　善救齐也。<br>
<br>
　　五、秋，八月，丁亥，葬齐桓公。<br>
<br>
　　六、冬，邢人、狄人伐卫。<br>
<br>
　　狄其称人何也？善累而后进之。伐卫所以救齐也。功近而德远矣。<br>
<br>

				隐公十年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十年，春，王二月，公会齐侯、郑伯于中丘。<br>
<br>
　　二、夏，翚帅师会齐人、郑人伐宋。<br>
<br>
　　三、六月，壬戌，公败宋师于菅。辛未，取郜，辛巳，取防。<br>
<br>
　　内不言战，举其大者也。取邑不日，此其日何也？不正其乘败人而深为利，取二邑，故谨而日之也。<br>
<br>
　　四、秋，宋人、卫人入郑。宋人、蔡人、卫人伐载，郑伯伐取之。<br>
<br>
　　不正其因人之力而易取之，故主其事也。<br>
<br>
　　五、冬，十月，壬午，齐人、郑人入郕。<br>
<br>
　　入者，内弗受也。日入，恶入者也。郕，国也。<br>
<br>

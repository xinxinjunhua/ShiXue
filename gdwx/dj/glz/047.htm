				庄公十八年</td>
			</tr>
			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有八年，春，王三月，日有食之。<br>
<br>
　　不言日，不言朔，夜食也。何以知其夜食也？曰，王者朝日，故虽为天子，必有尊也。贵为诸侯，必有长也。故天子朝日，诸侯朝朔。<br>
<br>
　　二、夏，公追戎于济西。<br>
<br>
　　其不言戎之伐我何也？以公之追之，不使戎迩于我也。于济西者，大之也。何大焉？为公之追之也。<br>
<br>
　　三、秋，有蜮。<br>
<br>
　　一有一亡曰有。蜮，射人者也。<br>
<br>
　　四、冬，十月。<br>
<br>				</td>

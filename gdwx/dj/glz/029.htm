				桓公十八年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有八年，春，王正月，公会齐侯于泺，公与夫人姜氏遂如齐。<br>
<br>
　　泺之会，不言及夫人何也？以夫人之伉，弗称数也。<br>
<br>
　　二、夏，四月，丙子，公薨于齐。<br>
<br>
　　其地，于外也。薨称公，举上也。<br>
<br>
　　三、丁酉，公之丧至自齐。<br>
<br>
　　四、秋，七月。<br>
<br>
　　五、冬，十有二月，己丑，葬我君桓公。<br>
<br>
　　葬我君，接上下也。君弒，贼不讨，不书葬。此其言葬何也？不责踰国而讨于是也。桓公葬而后举谥，谥，所以成德也，于卒事乎加之矣。知者虑，义者行，仁者守，有此三者备，然后可以会矣。<br>
<br>

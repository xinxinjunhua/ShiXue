				襄公六年</td>
			</tr>
			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、六年，春，王三月，壬午，杞伯姑容卒。<br>
<br>
　　二、夏，宋华弱来奔。<br>
<br>
　　三、秋，葬杞桓公。<br>
<br>
　　四、滕子来朝。<br>
<br>
　　五、莒人灭缯。<br>
<br>
　　非灭也。中国日，卑国月，夷狄时。缯，中国也；而时，非灭也。家有既亡，国有既灭，灭而不自知，由别之而不别也。莒人灭缯，非灭也，非立异姓以莅祭祀，灭亡之道也。<br>
<br>
　　六、冬，叔孙豹如邾。<br>
<br>
　　七、季孙宿如晋。<br>
<br>
　　八、十有二月，齐侯灭莱。<br>
<br>				</td>

				文公四年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、四年，春，公至自晋。<br>
<br>
　　二、夏，逆妇姜于齐。<br>
<br>
　　其曰妇姜，为其礼成乎齐也。其逆者谁也？亲逆而称妇，或者公与？何其速妇之也？曰，公也。其不言公何也？非成礼于齐也。曰妇，有姑之辞也。其不言氏何也？贬之也。何为贬之也？夫人与有贬也。<br>
<br>
　　三、秋，楚人灭江。<br>
<br>
　　四、晋人伐秦。<br>
<br>
　　五、卫侯使宁俞来聘。<br>
<br>
　　六、冬，十有一月，壬寅，夫人风氏薨。<br>
<br>				</td>

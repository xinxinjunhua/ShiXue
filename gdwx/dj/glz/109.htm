				文公十三年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有三年，春，王正月。<br>
<br>
　　二、夏，五月，壬午，陈侯朔卒。<br>
<br>
　　三、邾子蘧篨卒。<br>
<br>
　　四、自正月不雨，至于秋七月。<br>
<br>
　　五、大室屋坏。<br>
<br>
　　大室屋坏者，有坏道也，讥不修也。大室犹世室也。周公曰大庙，伯禽曰大室，群公曰宫。礼，宗庙之事，君亲割，夫人亲舂，敬之至也。为社稷之主，而先君之庙坏，极称之，志不敬也。<br>
<br>
　　六、冬，公如晋。卫侯会公于沓。<br>
<br>
　　七、狄侵卫。<br>
<br>
　　八、十有二月，乙丑，公及晋侯盟。<br>
<br>
　　九、公还自晋，郑伯会公于棐。<br>
<br>
　　还者，事未毕也，自晋事毕也。<br>
<br>				</td>

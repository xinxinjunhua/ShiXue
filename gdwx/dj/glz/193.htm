				昭公十二年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有二年，春，齐高偃帅师纳北燕伯于阳。<br>
<br>
　　纳者，内不受也。燕伯之不名何也？不以高偃挈燕伯也。<br>
<br>
　　二、三月，壬申，郑伯嘉卒。<br>
<br>
　　三、夏，宋公使华定来聘。<br>
<br>
　　四、公如晋，至河乃还。<br>
<br>
　　季孙氏不使遂乎晋也。<br>
<br>
　　五、五月，葬郑简公。<br>
<br>
　　六、楚杀其大夫成虎。<br>
<br>
　　七、秋，七月。<br>
<br>
　　八、冬，十月，公子慭出奔齐。<br>
<br>
　　九、楚子伐徐。<br>
<br>
　　十、晋伐鲜虞。<br>
<br>
　　其曰晋，狄之也。其狄之何也？不正其与夷狄交伐中国，故狄称之也。<br>
<br>

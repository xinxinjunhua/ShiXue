				文公十一年</td>

<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　一、十有一年，春，楚子伐麇。<br>
<br>
　　二、夏，叔彭生会晋郄缺于承匡。<br>
<br>
　　三、秋，曹伯来朝。<br>
<br>
　　四、公子遂如宋。<br>
<br>
　　五、狄侵齐。<br>
<br>
　　六、冬，十月，甲午，叔孙得臣败狄于咸。<br>
<br>
　　不言帅师而言败，何也？直败，一人之辞也。一人而曰败何也？以众焉言之也。传曰，长狄也，弟兄三人，佚害中国，瓦石不能害。叔孙得臣，最善射者也。射其目，身横九亩。断其首，眉见于轼。然则何为不言获也？曰，古者，不重创，不擒二毛，故不言获，为内讳也。其之齐者，王子成父杀之。则未知其之晋者也。<br>
<br>

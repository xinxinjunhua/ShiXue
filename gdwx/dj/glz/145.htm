				成公十三年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有三年，春，晋侯使郄锜来乞师。<br>
<br>
　　乞，重辞也。古之人重师，故以乞言之也。<br>
<br>
　　二、三月，公如京师。<br>
<br>
　　公如京师，不月，月非如也。非如而曰如，不叛京师也。<br>
<br>
　　三、夏，五月，公自京师，遂会晋侯、宋公、卫侯、郑伯、曹伯、邾人、滕人伐秦。<br>
<br>
　　言受命，不敢叛周也。<br>
<br>
　　四、曹伯庐卒于师。<br>
<br>
　　闵之也。公、大夫在师曰师，在会曰会。<br>
<br>
　　五、秋，七月，公至自伐秦。<br>
<br>
　　六、冬，葬曹宣公。<br>
<br>
　　葬时，正也。<br>
<br>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、二十有七年，春，公如齐。<br>
<br>
　　二、公至自齐，居于郓。<br>
<br>
　　公在外也。<br>
<br>
　　三、夏，四月，吴弒其君僚。<br>
<br>
　　四、楚杀其大夫郄宛。<br>
<br>
　　五、秋，晋士鞅、宋乐祁犁、卫北宫喜、曹人、邾人、滕人会于扈。<br>
<br>
　　六、冬，十月，曹伯午卒。<br>
<br>
　　七、邾快来奔。<br>
<br>
　　八、公如齐。<br>
<br>
　　九、公至自齐，居于郓。<br>
<br>
</td></tr>

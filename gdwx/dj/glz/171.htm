				襄公二十一年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、二十有一年，春，王正月，公如晋。<br>
<br>
　　二、邾庶其以漆、闾丘来奔。<br>
<br>
　　以者，不以者也。来奔者不言出，举其接我者也。漆、闾丘不言及，小大敌也。<br>
<br>
　　三、夏，公至自晋。<br>
<br>
　　四、秋，晋栾盈出奔楚。<br>
<br>
　　五、九月，庚戌，朔，日有食之。<br>
<br>
　　六、冬，十月，庚辰，朔，日有食之。<br>
<br>
　　七、曹伯来朝。<br>
<br>
　　八、公会晋侯、齐侯、宋公、卫侯、郑伯、曹伯、莒子、邾子于商任。<br>
<br>
　　九、庚子，孔子生。<br>
<br>				</td>

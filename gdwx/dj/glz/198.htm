				昭公十七年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有七年，春，小邾子来朝。<br>
<br>
　　二、夏，六月，甲戌，朔，日有食之。<br>
<br>
　　三、秋，郯子来朝。<br>
<br>
　　四、八月，晋荀吴帅师灭陆浑戎。<br>
<br>
　　五、冬，有星孛于大辰。<br>
<br>
　　一有一亡曰有。于大辰者，滥于大辰也。<br>
<br>
　　六、楚人及吴战于长岸。<br>
<br>
　　两夷狄曰败，中国与夷狄亦曰败。楚人及吴战于长岸，进楚子，故曰战。<br>
<br>

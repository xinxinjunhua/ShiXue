			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有七年，春，齐人、徐人伐英氏。<br>
<br>
　　二、夏，灭项。<br>
<br>
　　孰灭之？桓公也。何以不言桓公也？为贤者讳也。项，国也。不可灭而灭之乎？桓公知项之可灭也，而不知己之不可以灭也。既灭人之国矣，何贤乎？君子恶恶疾其始，善善乐其终，桓公尝有存亡继绝之功，故君子为之讳也。<br>
<br>
　　三、秋，夫人姜氏会齐侯于卞。<br>
<br>
　　四、九月，公至自会。<br>
<br>
　　五、冬，十有二月，乙亥，齐侯小白卒。<br>
<br>
　　此不正，其日之何也？其不正前见矣。其不正之前见何也？以不正入虚国，故称嫌焉尔。<br>
<br>

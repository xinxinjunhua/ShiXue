				成公十年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十年，春，卫侯之弟黑背帅师侵郑。<br>
<br>
　　二、夏，四月，五卜郊，不从，乃不郊。<br>
<br>
　　夏四月，不时也。五卜，强也。乃者，亡乎人之辞也。<br>
<br>
　　三、五月，公会晋侯、齐侯、宋公、卫侯、曹伯伐郑。<br>
<br>
　　四、齐人来媵。<br>
<br>
　　五、丙午，晋侯獳卒。<br>
<br>
　　六、秋，七月，公如晋。<br>
<br>
　　七、冬，十月。<br>
<br>				</td>

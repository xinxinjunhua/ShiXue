<hr color="#FFFFFF">

<tr>
<td>
<br>
　　一、四年，春，正月，公狩于郎。<br>
<br>
　　四时之田，皆为宗庙之事也。春曰田，夏曰苗，秋曰搜，冬曰狩。四时之田用三焉，唯其所先得。一为干豆，二为宾客，三为充君之庖。<br>
<br>
　　二、夏，天王使宰渠伯纠来聘。<br>

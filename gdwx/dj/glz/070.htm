				僖公七年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、七年，春，齐人伐郑。<br>
<br>
　　二、夏，小邾子来朝。<br>
<br>
　　三、郑杀其大夫申侯。<br>
<br>
　　称国以杀大夫，杀无罪也。<br>
<br>
　　四、秋，七月，公会齐侯、宋公、陈世子款、郑世子华，盟于宁母。<br>
<br>
　　衣裳之会也。<br>
<br>
　　五、曹伯班卒。<br>
<br>
　　六、公子友如齐。<br>
<br>
　　七、冬，葬曹昭公。<br>
<br>

<hr color="#FFFFFF">

<tr>
<td>
<br>
　　一、十有四年，春，卫杀其大夫孔达。<br>
<br>
　　二、夏，五月，壬申，曹伯寿卒。<br>
<br>
　　三、晋侯伐郑。<br>
<br>
　　四、秋，九月，楚子围宋。<br>
<br>
　　五、葬曹文公。<br>
<br>
　　六、冬，公孙归父会齐侯于谷。<br>
<br>

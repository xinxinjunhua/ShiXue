				襄公八年</td>
			</tr>
			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、八年，春，王正月，公如晋。<br>
<br>
　　二、夏，葬郑僖公。<br>
<br>
　　三、郑人侵蔡，获蔡公子湿。<br>
<br>
　　人，微者也。侵，浅事也。而获公子，公子病矣。<br>
<br>
　　四、季孙宿会晋侯、郑伯、齐人、宋人、卫人、邾人于邢丘。<br>
<br>
　　见鲁之失正也，公在而大夫会也。<br>
<br>
　　五、公至自晋。<br>
<br>
　　六、莒人伐我东鄙。<br>
<br>
　　七、秋，九月，大雩。<br>
<br>
　　八、冬，楚公子贞帅师伐郑。<br>
<br>
　　九、晋侯使士匄来聘。<br>
<br>

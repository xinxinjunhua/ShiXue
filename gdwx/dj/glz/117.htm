			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、三年，春，王正月，郊牛之口伤。<br>
<br>
　　之口，缓辞也，伤自牛作也。改卜牛，牛死，乃不郊，事之变也。乃者，亡乎人之辞也。犹三望。<br>
<br>
　　二、葬匡王。<br>
<br>
　　三、楚子伐陆浑戎。<br>
<br>
　　四、夏，楚人侵郑。<br>
<br>
　　五、秋，赤狄侵齐。<br>
<br>
　　六、宋师围曹。<br>
<br>
　　七、冬，十月，丙戌，郑伯兰卒。<br>
<br>
　　八、葬郑穆公。<br>
<br>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　一、十年，春，王二月，邾子益来奔。<br>
<br>
　　二、公会吴伐齐。<br>
<br>
　　三、三月，戊戌，齐侯阳生卒。<br>
<br>
　　四、夏，宋人伐郑。<br>
<br>
　　五、晋赵鞅帅师侵齐。<br>
<br>
　　六、五月，公至自伐齐。<br>
<br>
　　七、葬齐悼公。<br>
<br>
　　八、卫公孟彄自齐归于卫。<br>
<br>
　　九、薛伯夷卒。<br>
<br>
　　十、秋，葬薛惠公。<br>
<br>
　　十一、冬，楚公子结帅师伐陈。<br>
<br>
　　十二、吴救陈。<br>
<br>

				文公十六年</td>
			</tr>
			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有六年，春，季孙行父会齐侯于阳谷，齐侯弗及盟。<br>
<br>
　　弗及者，内辞也。行父失命矣。齐得，内辞也。<br>
<br>
　　二、夏，五月，公四不视朔。<br>
<br>
　　天子告朔于诸侯，诸侯受乎祢庙，礼也。四不视朔，公不臣也，以公为厌政以甚矣。<br>
<br>
　　三、六月，戊辰，公子遂及齐侯盟于师丘。<br>
<br>
　　复行父之盟也。<br>
<br>
　　四、秋，八月，辛未，夫人姜氏薨。<br>
<br>
　　五、毁泉台。<br>
<br>
　　丧不贰事，贰事，缓丧也。以文为多失道矣。自古为之，今毁之，不如勿处而已矣。<br>
<br>
　　六、楚人、秦人、巴人灭庸。<br>
<br>
　　七、冬，十有一月，宋人弒其君杵臼。<br>
<br>				</td>

				哀公六年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、六年，春，城邾瑕。<br>
<br>
　　二、晋赵鞅帅师伐鲜虞。<br>
<br>
　　三、吴伐陈。<br>
<br>
　　四、夏，齐国夏及高张来奔。<br>
<br>
　　五、叔还会吴于柤。<br>
<br>
　　六、秋，七月，庚寅，楚子轸卒。<br>
<br>
　　七、齐阳生入于齐。<br>
<br>
　　八、齐陈乞弒其君荼。<br>
<br>
　　阳生入而弒其君，以陈乞主之何也？不以阳生君荼也，其不以阳生君荼何也？阳生正，荼不正。不正则其曰君何也？荼虽不正，已受命矣。入者，内弗受也。荼不正，何用弗受？以其受命，可以言弗受也。阳生其以国氏何也？取国于荼也。<br>
<br>
　　九、冬，仲孙何忌帅师伐邾。<br>
<br>
　　十、宋向巢帅师伐曹。<br>
<br>

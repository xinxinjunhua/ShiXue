				闵公元年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、元年，春，王正月。<br>
<br>
　　继弒君不言即位，正也。亲之非父也，尊之非君也，继之如君父也者，受国焉尔。<br>
<br>
　　二、齐人救邢。<br>
<br>
　　善救邢也。<br>
<br>
　　三、夏，六月，辛酉，葬我君庄公。<br>
<br>
　　庄公葬而后举谥，谥所以成德也。于卒事乎加之矣。<br>
<br>
　　四、秋，八月，公及齐侯盟于洛姑。季子来归。<br>
<br>
　　盟纳季子也。其曰季子，贵之也。其曰来归，喜之也。<br>
<br>
　　五、冬，齐仲孙来。<br>
<br>
　　其曰齐仲孙，外之也。其不目而曰仲孙，疏之也。其言齐，以累桓也。<br>
<br>

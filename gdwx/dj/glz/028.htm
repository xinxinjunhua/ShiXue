				桓公十七年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有七年，春，正月，丙辰，公会齐侯、纪侯盟于黄。<br>
<br>
　　二、二月，丙午，公及邾仪父盟于趡。<br>
<br>
　　三、夏，五月，丙午，及齐师战于郎。<br>
<br>
　　内讳败，举其可道者也。不言其人，以吾败也。不言及之者，为内讳也。<br>
<br>
　　四、六月，丁丑，蔡侯封人卒。<br>
<br>
　　五、秋，八月，蔡季自陈归于蔡。<br>
<br>
　　蔡季，蔡之贵者也。自陈，陈有奉焉尔。<br>
<br>
　　六、癸巳，葬蔡桓侯。<br>
<br>
　　七、及宋人、卫人伐邾。<br>
<br>
　　八、冬，十月，朔，日有食之。<br>
<br>
　　言朔不言日，食既朔也。<br>
<br>				</td>

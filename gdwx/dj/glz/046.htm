				庄公十七年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有七年，春，齐人执郑詹。<br>
<br>
　　人者，众辞也。以人执，与之辞也。郑詹，郑之卑者也。卑者不志，此其志何也？以其逃来志之也。逃来则何志焉？将有其末，不得不录其本也。郑詹，郑之佞人也。<br>
<br>
　　二、夏，齐人歼于遂。<br>
<br>
　　歼者，尽也。然则何为不言遂人尽齐人也？无遂之辞也。无遂则何为言遂？其犹存遂也。存遂奈何？曰齐人灭遂，使人戍之。遂之因氏饮戍者酒而杀之，齐人歼焉。此谓狎敌也。<br>
<br>
　　三、秋，郑詹自齐逃来。<br>
<br>
　　逃义曰逃。<br>
<br>
　　四、冬，多麋。<br>
<br>

				僖公三年</td>
			</tr>
			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、三年，春，王正月，不雨。<br>
<br>
　　不雨者，勤雨也。<br>
<br>
　　二、夏，四月，不雨。<br>
<br>
　　一时言不雨者，闵雨也。闵雨者，有志乎民者也。<br>
<br>
　　三、徐人取舒。<br>
<br>
　　四、六月，雨。<br>
<br>
　　雨云者，喜雨也。喜雨者，有志乎民者也。<br>
<br>
　　五、秋，齐侯、宋公、江人、黄人会于阳谷。<br>
<br>
　　阳谷之会，桓公委端搢笏而朝诸侯。诸侯皆谕乎桓公之志。<br>
<br>
　　六、冬，公子季友如齐莅盟。<br>
<br>
　　莅者位也。其不日，前定也。不言及者，以国与之也。不言其人，亦以国与之也。<br>
<br>
　　七、楚人伐郑。<br>
<br>				</td>

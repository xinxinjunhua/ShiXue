				昭公二十六年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、二十有六年，春，王正月，葬宋元公。<br>
<br>
　　二、三月，公至自齐，居于郓。<br>
<br>
　　公次于阳州，其曰至自齐何也？以齐侯之见公，可以言至自齐也。居于郓者，公在外也。至自齐，道义不外公也。<br>
<br>
　　三、夏，公围成。<br>
<br>
　　非国不言围。所以言围者，以大公也。<br>
<br>
　　四、秋，公会齐侯、莒子、邾子、杞伯、盟于鄟陵。<br>
<br>
　　五、公至自会，居于郓。<br>
<br>
　　六、九月，庚申，楚子居卒。<br>
<br>
　　七、冬，十月，天王入于成周。尹氏、召伯、毛伯以王子朝奔楚。<br>
<br>
　　周有入无出也。远矣，非也。奔，直奔也。<br>
<br>				</td>

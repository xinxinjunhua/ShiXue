				庄公六年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、六年，春，王三月，王人子突救卫。<br>
<br>
　　王人，卑者也。称名，贵之也，善救卫也。救者善，则伐者不正矣。<br>
<br>
　　二、夏，六月，卫侯朔入于卫。<br>
<br>
　　其不言伐卫纳朔何也？不逆天王之命也。入者，内弗受也。何用弗受也？为以王命绝之也。朔之名，恶也。朔入逆，则出顺矣。朔出入名，以王命绝之也。<br>
<br>
　　三、秋，公至自伐卫。<br>
<br>
　　恶事不致，此其致何也？不致，则无用见公之恶，事之成也。<br>
<br>
　　四、螟。<br>
<br>
　　五、冬，齐人来归卫宝。<br>
<br>
　　以齐首之，分恶于齐也。使之如下齐而来我然，恶战则杀矣。<br>
<br>				</td>

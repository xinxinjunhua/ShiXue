			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、二十有七年，春，杞子来朝。<br>
<br>
　　二、夏，六月，庚寅，齐侯昭卒。<br>
<br>
　　三、秋，八月，乙未，葬齐孝公。<br>
<br>
　　四、乙巳，公子遂帅师入杞。<br>
<br>
　　五、冬，楚人、陈侯、蔡侯、郑伯、许男围宋。<br>
<br>
　　楚人者，楚子也。其曰人何也？人楚子，所以人诸侯也。其人诸侯何也？不正其信夷狄而伐中国也。<br>
<br>
　　六、十有二月，甲戌，公会诸侯，盟于宋。<br>
<br>

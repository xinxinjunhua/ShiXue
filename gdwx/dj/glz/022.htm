				桓公十一年</td>
			</tr>
			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有一年，春，正月，齐人、卫人、郑人盟于恶曹。<br>
<br>
　　二、夏，五月，癸未，郑伯寤生卒。<br>
<br>
　　三、秋，七月，葬郑庄公。<br>
<br>
　　四、九月，宋人执祭仲。突归于郑。郑忽出奔卫。<br>
<br>
　　宋人者，宋公也。其曰人何也？贬之也。曰突，贱之也。曰归，易辞也。祭仲易其事，权在祭仲也。死君难，臣道也。今立恶而黜正，恶祭仲也。郑忽者，世子忽也。其名，失国也。<br>
<br>
　　五、柔会宋公、陈侯、蔡叔，盟于折。<br>
<br>
　　柔者何？吾大夫之未命者也。<br>
<br>
　　六、公会宋公于夫锺。<br>
<br>
　　七、冬，十有二月，公会宋公于阚。<br>
<br>				</td>

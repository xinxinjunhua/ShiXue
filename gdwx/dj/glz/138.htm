				成公六年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、六年，春，王正月，公至自会。<br>
<br>
　　二、二月，辛巳，立武宫。<br>
<br>
　　立者，不宜立也。<br>
<br>
　　三、取鄟。<br>
<br>
　　鄟，国也。<br>
<br>
　　四、卫孙良夫帅师侵宋。<br>
<br>
　　五、夏，六月，邾子来朝。<br>
<br>
　　六、公孙婴齐如晋。<br>
<br>
　　七、壬申，郑伯费卒。<br>
<br>
　　八、秋，仲孙蔑、叔孙侨如帅师侵宋。<br>
<br>
　　九、楚公子婴齐帅师伐郑。<br>
<br>
　　十、冬，季孙行父如晋。<br>
<br>
　　十一、晋栾书帅师救郑。<br>
<br>

				桓公十年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十年，春，王正月，庚申，曹伯终生卒。<br>
<br>
　　桓无王，其曰王何也？正终生之卒也。<br>
<br>
　　二、夏，五月，葬曹桓公。<br>
<br>
　　三、秋，公会卫侯于桃丘，弗遇。<br>
<br>
　　弗遇者，志不相得也。弗，内辞也。<br>
<br>
　　四、冬，十有二月，丙午，齐侯、卫侯、郑伯来战于郎。<br>
<br>
　　来战者，前定之战也。内不言战，言战则败也。不言其人，以吾败也。不言及者，为内讳也。<br>
<br>

				襄公十二年</td>
			</tr>
			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有二年，春，王三月，莒人伐我东鄙，围邰。<br>
<br>
　　伐国不言围邑，举重也。取邑不书，围，安足书也？<br>
<br>
　　二、季孙宿帅师救邰，遂入郓。<br>
<br>
　　遂，继事也。受命而救邰，不受命而入郓，恶季孙宿也。<br>
<br>
　　三、夏，晋侯使士鲂来聘。<br>
<br>
　　四、秋，九月，吴子乘卒。<br>
<br>
　　五、冬，楚公子贞帅师侵宋。<br>
<br>
　　六、公如晋。<br>
<br>				</td>

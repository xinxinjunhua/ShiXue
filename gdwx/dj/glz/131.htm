				宣公十七年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有七年，春，王正月，庚子，许男锡我卒。<br>
<br>
　　二、丁未，蔡侯申卒。<br>
<br>
　　三、夏，葬许昭公。<br>
<br>
　　四、葬蔡文公。<br>
<br>
　　五、六月，癸卯，日有食之。<br>
<br>
　　六、己未，公会晋侯、卫侯、曹伯、邾子，同盟于断道。<br>
<br>
　　同者，有同也，同外楚也。<br>
<br>
　　七、秋，公至自会。<br>
<br>
　　八、冬，十有一月，壬午，公弟叔肸卒。<br>
<br>
　　其曰公弟叔肸，贤之也。其贤之何也？宣弒而非之也。非之则胡为不去也？曰“兄弟也，何去而之？”与之财，则曰：“我足矣。”织屦而食，终身不食宣公之食。君子以是为通恩也，以取贵乎春秋。<br>
<br>

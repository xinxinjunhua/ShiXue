				僖公三十一年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、三十有一年，春，取济西田。<br>
<br>
　　二、公子遂如晋。<br>
<br>
　　三、夏，四月，四卜郊，不从，乃免牲，犹三望。<br>
<br>
　　夏四月，不时也。四卜，非礼也。免牲者，为之缁衣熏裳，有司玄端奉送，至于南郊。免牛亦然。乃者，亡乎人之辞也。犹者，可以已之辞也。<br>
<br>
　　四、秋，七月。<br>
<br>
　　五、冬，杞伯姬来求妇。<br>
<br>
　　妇人既嫁不踰竟，杞伯姬来求妇，非正也。<br>
<br>
　　六、狄围卫。十有二月，卫迁于帝丘。<br>
<br>				</td>

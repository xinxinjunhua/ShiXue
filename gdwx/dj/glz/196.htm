				昭公十五年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有五年，春，王正月，吴子夷末卒。<br>
<br>
　　二、二月，癸酉，有事于武宫，钥入，叔弓卒，去乐，卒事。<br>
<br>
　　君在祭乐之中，闻大夫之丧，则去乐卒事，礼也。君在祭乐之中，大夫有变，以闻，可乎？大夫，国体也。古之人重死，君命无所不通。<br>
<br>
　　三、夏，蔡朝吴出奔郑。<br>
<br>
　　四、六月，丁巳，朔，日有食之。<br>
<br>
　　五、秋，晋荀吴帅师伐鲜虞。<br>
<br>
　　六、冬，公如晋。<br>
<br>

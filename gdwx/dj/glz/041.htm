				庄公十二年</td>
			</tr>
			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有二年，春，王三月，纪叔姬归于酅。<br>
<br>
　　国而曰归，此邑也，其曰归何也？吾女也。失国喜得其所，故言归焉尔。<br>
<br>
　　二、夏，四月。<br>
<br>
　　三、秋，八月，甲午，宋万弒其君捷，及其大夫仇牧。<br>
<br>
　　宋万，宋之卑者也，卑者以国氏。以尊及卑也。仇牧，闲也。<br>
<br>
　　四、冬，十月，宋万出奔陈。<br>
<br>				</td>

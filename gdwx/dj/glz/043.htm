				庄公十四年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有四年，春，齐人、陈人、曹人伐宋。<br>
<br>
　　二、夏，单伯会伐宋。<br>
<br>
　　会，事之成也。<br>
<br>
　　三、秋，七月，荆入蔡。<br>
<br>
　　荆者，楚也。其曰荆何也？州举之也。州不如国，国不如名，名不如字。<br>
<br>
　　四、冬，单伯会齐侯、宋公、卫侯、郑伯于鄄。<br>
<br>
　　复同会也。<br>
<br>

				庄公十五年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有五年，春，齐侯、宋公、陈侯、卫侯、郑伯会于鄄。<br>
<br>
　　复同会也。<br>
<br>
　　二、夏，夫人姜氏如齐。<br>
<br>
　　妇人既嫁不踰竟，踰竟非礼也。<br>
<br>
　　三、秋，宋人、齐人、邾人伐郳。<br>
<br>
　　四、郑人侵宋。<br>
<br>
　　五、冬，十月。<br>
<br>				</td>

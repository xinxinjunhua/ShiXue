				宣公十一年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有一年，春，王正月。<br>
<br>
　　二、夏，楚子、陈侯、郑伯盟于夷陵。<br>
<br>
　　三、公孙归父会齐人伐莒。<br>
<br>
　　四、秋，晋侯会狄于攒函。<br>
<br>
　　不言及，外狄。<br>
<br>
　　五、冬，十月，楚人杀陈夏征舒。<br>
<br>
　　此入而杀也，其不言入何也？外征舒于陈也。其外征舒于陈何也？明楚之讨有罪也。<br>
<br>
　　六、丁亥，楚子入陈。<br>
<br>
　　入者，内弗受也。日入，恶入者也。何用弗受也？不使夷狄为中国也。<br>
<br>
　　七、纳公孙宁、仪行父于陈。<br>
<br>
　　纳者，内弗受也。辅人之不能民而讨，犹可；入人之国，制人之上下，使不得其君臣之道，不可。<br>
<br>

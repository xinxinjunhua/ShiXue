			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有七年，春，晋人、卫人、陈人、郑人伐宋。<br>
<br>
　　二、夏，四月，癸亥，葬我小君声姜。<br>
<br>
　　三、齐侯伐我西鄙。六月，癸未，公及齐侯盟于谷。<br>
<br>
　　四、诸侯会于扈。<br>
<br>
　　五、秋，公至自谷。<br>
<br>
　　六、冬，公子遂如齐。<br>
<br>				</td>

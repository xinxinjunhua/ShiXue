				宣公十二年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有二年，春，葬陈灵公。<br>
<br>
　　二、楚子围郑。<br>
<br>
　　三、夏，六月，乙卯，晋荀林父帅师及楚子战于邲，晋师败绩。<br>
<br>
　　绩，功也。功，事也。日其事，败也。<br>
<br>
　　四、秋，七月。<br>
<br>
　　五、冬，十有二月，戊寅，楚子灭萧。<br>
<br>
　　六、晋人、宋人、卫人、曹人同盟于清丘。<br>
<br>
　　七、宋师伐陈，卫人救陈。<br>
<br>				</td>

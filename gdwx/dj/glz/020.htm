				桓公九年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、九年，春，纪季姜归于京师。<br>
<br>
　　为之中者，归之也。<br>
<br>
　　二、夏，四月。<br>
<br>
　　三、秋，七月。<br>
<br>
　　四、冬，曹伯使其世子射姑来朝。<br>
<br>
　　朝不言使，言使非正也。使世子伉诸侯之礼而来朝，曹伯失正矣。诸侯相见曰朝。以待人父之道待人之子，以内为失正矣。内失正，曹伯失正，世子可以已矣。则是故命也。尸子曰：“夫已，多乎道。”<br>
<br>

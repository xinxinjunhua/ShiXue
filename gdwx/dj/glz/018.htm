			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、七年，春，二月，己亥，焚咸丘。<br>
<br>
　　其不言邾咸丘何也？疾其以火攻也。<br>
<br>
　　二、夏，谷伯绥来朝。邓侯吾离来朝。<br>
<br>
　　其名何也？失国也。失国则其以朝言之何也？尝以诸侯与之接矣，虽失国，弗损吾异日也。<br>
<br>

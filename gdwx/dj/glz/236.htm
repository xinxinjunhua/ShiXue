				哀公八年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、八年，春，王正月，宋公入曹，以曹伯阳归。<br>
<br>
　　二、吴伐我。<br>
<br>
　　三、夏，齐人取讙及阐。<br>
<br>
　　恶内也。<br>
<br>
　　四、归邾子益于邾。<br>
<br>
　　益之名，失国也。<br>
<br>
　　五、秋，七月。<br>
<br>
　　六、冬，十有二月，癸亥，杞伯过卒。<br>
<br>
　　七、齐人归讙及阐。<br>
<br>

				定公十三年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有三年，春，齐侯次于垂葭。<br>
<br>
　　二、夏，筑蛇渊囿。<br>
<br>
　　三、大搜于比蒲。<br>
<br>
　　四、卫公孟彄帅师伐曹。<br>
<br>
　　五、秋，晋赵鞅入于晋阳以叛。<br>
<br>
　　以者，不以者也。叛，直叛也。<br>
<br>
　　六、冬，晋荀寅、士吉射入于朝歌以叛。<br>
<br>
　　七、晋赵鞅归于晋。<br>
<br>
　　此叛也，其以归言之何也？贵其以地反也。贵其以地反，则是大利也。非大利也，许悔过也。许悔过，则何以言叛也？以地正国也。以地正国，则何以言叛？其入无君命也。<br>
<br>
　　八、薛弒其君比。<br>
<br>				</td>

				襄公十八年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有八年，春，白狄来。<br>
<br>
　　二、夏，晋人执卫行人石买。<br>
<br>
　　称行人，怨接于上也。<br>
<br>
　　三、秋，齐侯伐我北鄙。<br>
<br>
　　四、冬，十月，公会晋侯、宋公、卫侯、郑伯、曹伯、莒子、邾子、滕子、薛伯、杞伯、小邾子同围齐。<br>
<br>
　　非围而曰围，齐有大焉，亦有病焉。非大而足同焉？诸侯同罪之也，亦病矣。<br>
<br>
　　五、曹伯负刍卒于师。<br>
<br>
　　于师，闵之也。<br>
<br>
　　六、楚公子午帅师伐郑。<br>
<br>

				僖公二十三年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、二十有三年，春，齐侯伐宋，围闵。<br>
<br>
　　伐国不言围邑，此其言围何也？不正其以恶报恶也。<br>
<br>
　　二、夏，五月，庚寅，宋公兹父卒。<br>
<br>
　　兹父之不葬何也？失民也。其失民何也？以其不教民战，则是弃其师也。为人君而弃其师，其民孰以为君哉？<br>
<br>
　　三、秋，楚人伐陈。<br>
<br>
　　四、冬，十有一月，杞子卒。<br>
<br>

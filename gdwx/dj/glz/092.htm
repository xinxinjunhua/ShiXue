			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、二十有九年，春，介葛卢来。<br>
<br>
　　介，国也。葛卢，微国之君，未爵者也。其曰来，卑也。<br>
<br>
　　二、公至自围许。<br>
<br>
　　三、夏，六月，公会王人、晋人、宋人、齐人、陈人、蔡人、秦人，盟于翟泉。<br>
<br>
　　四、秋，大雨雹。<br>
<br>
　　五、冬，介葛卢来。<br>
<br>
</td></tr>

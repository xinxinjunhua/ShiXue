			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　一、十有二年，春，周公出奔晋。<br>
<br>
　　周有入无出。曰出，上下一见之也。言其上下之道，无以存也。上虽失之，下孰敢有之？今上下皆失之矣。<br>
<br>
　　二、夏，公会晋侯、卫侯于琐泽。<br>
<br>
　　三、秋，晋人败狄于交刚。<br>
<br>
　　中国与夷狄不言战。皆曰败之，夷狄不日。<br>
<br>
　　四、冬，十月。<br>
<br>

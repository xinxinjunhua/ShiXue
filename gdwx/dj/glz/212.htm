				昭公三十一年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、三十有一年，春，王正月，公在干侯。<br>
<br>
　　二、季孙意如会晋荀栎于适历。<br>
<br>
　　三、夏，四月，丁巳，薛伯谷卒。<br>
<br>
　　四、晋侯使荀栎唁公于干侯。<br>
<br>
　　唁公不得入于鲁也，曰：“既为君言之矣，不可者意如也。”<br>
<br>
　　五、秋，葬薛献公。<br>
<br>
　　六、冬，黑肱以滥来奔。<br>
<br>
　　其不言邾黑肱何也？别乎邾也。其不言滥子何也？非天子所封也。来奔，内不言叛也。<br>
<br>
　　七、十有二月，辛亥，朔，日有食之。<br>
<br>

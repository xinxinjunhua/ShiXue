				隐公十一年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有一年，春，滕侯、薛侯来朝。<br>
<br>
　　天子无事，诸侯相朝，正也。考礼修德，所以尊天子也。诸侯来朝，时正也。犆言，同时也。累数，皆至也。<br>
<br>
　　二、夏，五月，公会郑伯于时来。<br>
<br>
　　三、秋，七月，壬午，公及齐侯、郑伯入许。<br>
<br>
　　四、冬，十有一月，壬辰，公薨。<br>
<br>
　　公薨不地，故也。隐之，不忍地也。其不言葬何也？君弒贼不讨，不书葬，以罪下也。隐十年无正，隐不自正也。元年有正，所以正隐也。<br>
<br>

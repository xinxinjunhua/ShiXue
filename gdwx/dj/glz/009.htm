				隐公九年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、九年，春，天王使南季来聘。<br>
<br>
　　南，氏姓也。季，字也。聘，问也。聘诸侯，非正也。<br>
<br>
　　二、三月，癸酉，大雨，震电。庚辰，大雨雪。<br>
<br>
　　震，雷也。电，霆也。志疏数也，八日之间，再有大变，阴阳错行，故谨而日之也。雨月，志正也。<br>
<br>
　　三、侠卒。<br>
<br>
　　侠者所侠也。弗大夫者，隐不爵大夫也。隐之不爵大夫何也？曰，不成为君也。<br>
<br>
　　四、夏，城郎。<br>
<br>
　　五、秋，七月。<br>
<br>
　　无事焉，何以书？不遗时也。<br>
<br>
　　六、冬，公会齐侯于防。<br>
<br>
　　会者，外为主焉尔。<br>
<br>				</td>

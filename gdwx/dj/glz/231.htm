				哀公三年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、三年，春，齐国夏、卫石曼姑帅师围戚。<br>
<br>
　　此卫事也，其先国夏何也？子不围父也。不系戚于卫者，子不有父也。<br>
<br>
　　二、夏，四月，甲午，地震。<br>
<br>
　　三、五月，辛卯，桓宫、僖宫灾。<br>
<br>
　　言及，则祖有尊卑，由我言之，则一也。<br>
<br>
　　四、季孙斯、叔孙州仇帅师城启阳。<br>
<br>
　　五、宋乐髠帅师伐曹。<br>
<br>
　　六、秋，七月，丙子，季孙斯卒。<br>
<br>
　　七、蔡人放其大夫公孙猎于吴。<br>
<br>
　　八、冬，十月，癸卯，秦伯卒。<br>
<br>
　　九、叔孙州仇、仲孙何忌帅师围邾。<br>
<br>

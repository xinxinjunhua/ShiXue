				僖公二十年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、二十年，春，新作南门。<br>
<br>
　　作，为也，有加其度也。言新，有故也，非作也。南门者，法门也。<br>
<br>
　　二、夏，郜子来朝。<br>
<br>
　　三、五月，己巳，西宫灾。<br>
<br>
　　谓之新宫，则近为祢宫。以谥言之，则如疏之然，以是为闵宫也。<br>
<br>
　　四、郑人入滑。<br>
<br>
　　五、秋，齐人、狄人盟于邢。<br>
<br>
　　邢为主焉尔。邢小，其为主何也？其为主乎救齐。<br>
<br>
　　六、冬，楚人伐随。<br>
<br>

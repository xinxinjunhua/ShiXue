				文公十二年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有二年，春，王正月，郕伯来奔。<br>
<br>
　　二、杞伯来朝。<br>
<br>
　　三、二月，庚子，子叔姬卒。<br>
<br>
　　其曰子叔姬，贵也，公之母姊妹也。其一传曰，许嫁，以卒之也。男子二十而冠，冠而列。丈夫三十而娶。女子十五而许嫁，二十而嫁。<br>
<br>
　　四、夏，楚人围巢。<br>
<br>
　　五、秋，滕子来朝。<br>
<br>
　　六、秦伯使术来聘。<br>
<br>
　　七、冬，十有二月，戊午，晋人、秦人战于河曲。<br>
<br>
　　不言及，秦、晋之战已亟，故略之也。<br>
<br>
　　八、季孙行父帅师城诸及郓。<br>
<br>
　　称帅师，言有难也。<br>
<br>

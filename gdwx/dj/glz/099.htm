				文公三年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、三年，春，王正月，叔孙得臣会晋人、宋人、陈人、卫人、郑人伐沈，沈溃。<br>
<br>
　　二、夏，五月，王子虎卒。<br>
<br>
　　叔服也。此不卒者，何以卒之？以其来会葬，我卒之也。或曰，以其尝执重以守也。<br>
<br>
　　三、秦人伐晋。<br>
<br>
　　四、秋，楚人围江。<br>
<br>
　　五、雨螽于宋。<br>
<br>
　　外灾不志，此何以志也？曰，灾甚也。其甚奈何？茅茨尽矣。着于上见于下谓之雨。<br>
<br>
　　六、公如晋，十有二月，己巳，公及晋侯盟。<br>
<br>
　　七、晋阳处父帅师伐楚救江。<br>
<br>
　　此伐楚，其言救江何也？江远楚近，伐楚所以救江也。<br>
<br>				</td>

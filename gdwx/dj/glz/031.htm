				庄公二年</td>
			</tr>
			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、二年，春，王二月，葬陈庄公。<br>
<br>
　　二、夏，公子庆父帅师伐于余丘。<br>
<br>
　　国而曰伐。于余丘，邾之邑也。其曰伐何也？公子贵矣，师重矣，而敌人之邑，公子病矣。病公子，所以讥乎公也。其一曰，君在而重之也。<br>
<br>
　　三、秋，七月，齐王姬卒。<br>
<br>
　　为之主者，卒之也。<br>
<br>
　　四、冬，十有二月，夫人姜氏会齐侯于禚。<br>
<br>
　　妇人既嫁，不踰竟。踰竟，非正也。妇人不言会，言会，非正也。<br>
<br>
　　五、乙酉，宋公冯卒。<br>
<br>				</td>

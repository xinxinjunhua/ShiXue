				宣公五年</td>
			</tr>
			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、五年，春，公如齐。<br>
<br>
　　二、夏，公至自齐。<br>
<br>
　　三、秋，九月，齐高固来迎子叔姬。<br>
<br>
　　诸侯之嫁子于大夫，主大夫以与之。来者，接内也。不正其接内，故不与夫妇之称也。<br>
<br>
　　四、叔孙得臣卒。<br>
<br>
　　五、冬，齐高固及子叔姬来。<br>
<br>
　　及者，及吾子叔姬也。为使来者，不使得归之意也。<br>
<br>
　　六、楚人伐郑。<br>
<br>

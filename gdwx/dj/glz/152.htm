				襄公二年</td>
			</tr>
			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、二年，春，王正月，葬简王。<br>
<br>
　　二、郑师伐宋。<br>
<br>
　　三、夏，五月，庚寅，夫人姜氏薨。<br>
<br>
　　四、六月，庚辰，郑伯睔卒。<br>
<br>
　　五、晋师、宋师、卫宁殖侵郑。<br>
<br>
　　其曰卫宁殖，如是而称于前事也。<br>
<br>
　　六、秋，七月，仲孙蔑会晋荀罃、宋华元、卫孙林父、曹人、邾人于戚。<br>
<br>
　　七、己丑，葬我小君齐姜。<br>
<br>
　　八、叔孙豹如宋。<br>
<br>
　　九、冬，仲孙蔑会晋荀罃、齐崔杼、宋华元、卫孙林父、曹人、邾人、滕人、薛人、小邾人于戚，城于虎牢。<br>
<br>
　　若言中国焉，内郑也。<br>
<br>
　　十、楚杀其大夫公子申。<br>
<br>

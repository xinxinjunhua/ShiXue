				庄公十三年</td>
			</tr>
			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有三年，春，齐人、宋人、陈人、蔡人、邾人会于北杏。<br>
<br>
　　是齐侯、宋公也，其曰人何也？始疑之。何疑焉？桓非受命之伯也。将以事授之者也，曰可矣乎？未乎？举人众之辞也。<br>
<br>
　　二、夏，六月，齐人灭遂。<br>
<br>
　　遂，国也。其不日，微国也。<br>
<br>
　　三、秋，七月。<br>
<br>
　　四、冬，公会齐侯，盟于柯。<br>
<br>
　　曹刿之盟也，信齐侯也。桓盟虽内与，不日，信也。<br>
<br>				</td>

				隐公七年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、七年，春王三月，叔姬归于纪。滕侯卒。<br>
<br>
　　何以不名？微国也。微国则其称侯何？不嫌也。春秋贵贱不嫌同号，美恶不嫌同辞。<br>
<br>
　　二、夏，城中丘。<br>
<br>
　　中丘者何？内之邑也。城中丘，何以书？以重书也。<br>
<br>
　　三、齐侯使其弟年来聘。<br>
<br>
　　其称弟何？母弟称弟，母兄称兄。<br>
<br>
　　四、秋，公伐邾娄。<br>
<br>
　　五、冬，天王使凡伯来聘，戎伐凡伯于楚丘以归。<br>
<br>
　　凡伯者何？天子之大夫也。此聘也，其言伐之何？执之也。执之则其言伐之何？大之也。曷为大之？不与夷狄之执中国也。其地何？大之也。<br>
<br>

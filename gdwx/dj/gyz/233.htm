				哀公五年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、五年。春，城比。<br>
<br>
　　二、夏，齐侯伐宋。<br>
<br>
　　三、晋赵鞅帅师伐卫。<br>
<br>
　　四、秋九月癸酉，齐侯处臼卒。<br>
<br>
　　五、冬，叔还如齐。<br>
<br>
　　六、闰月，葬齐景公。<br>
<br>
　　闰不书，此何以书？丧以闰数也。丧曷为以闰数？丧数略也。<br>
<br>

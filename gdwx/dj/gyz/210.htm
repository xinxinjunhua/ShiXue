				昭公二十九年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、二十有九年。春，公至自干侯，居于运。<br>
<br>
　　二、齐侯使高张来唁公。<br>
<br>
　　三、公如晋，次于干侯。<br>
<br>
　　四、夏四月庚子，叔倪卒。<br>
<br>
　　五、秋七月。<br>
<br>
　　六、冬十月，运溃。<br>
<br>
　　邑不言溃，此其言溃何？郛之也。曷为郛之？君存焉尔。<br>
<br>

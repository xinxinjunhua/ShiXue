				文公三年</td>

<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　一、三年，春王正月，叔孙得臣会晋人、宋人、陈人、卫人、郑人伐沈，沈溃。<br>
<br>
　　二、夏五月，王子虎卒。<br>
<br>
　　王子虎者何？天子之大夫也。外大夫不卒，此何以卒？新使乎我也。<br>
<br>
　　三、秦人伐晋。<br>
<br>
　　四、秋，楚人围江。<br>
<br>
　　五、雨螽于宋。<br>
<br>
　　雨螽者何？死而坠也。何以书？记异也。外异不书，此何以书？为王者之后记异也。<br>
<br>
　　六、冬，公如晋。十有二月己巳，公及晋侯盟。<br>
<br>
　　七、晋阳处父帅师伐楚以救江。<br>
<br>
　　此伐楚也，其言救江何？为谖也。其为谖奈何？伐楚为救江也。<br>
<br>

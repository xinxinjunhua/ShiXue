			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　一、十年，春王正月，庚申，曹伯终生卒。<br>
<br>
　　二、夏，五月，葬曹桓公。<br>
<br>
　　三、秋，公会卫侯于桃丘，弗遇。<br>
<br>
　　会者何？期辞也。其言弗遇何？公不见要也。<br>
<br>
　　四、冬，十有二月丙午，齐侯、卫侯、郑伯来战于郎。<br>
<br>
　　郎者何？吾近邑也。吾近邑则其言来战于郎何？近也。恶乎近？近乎围也。此偏战也，何以不言师败绩？内不言战，言战乃败矣。<br>
<br>

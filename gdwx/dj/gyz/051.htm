				庄公二十二年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、二十有二年，春王正月，肆大省。<br>
<br>
　　肆者何？跌也。大省者何？灾省也。肆大省何以书？讥。何讥尔？讥始忌省也。<br>
<br>
　　二、癸丑，葬我小君文姜。<br>
<br>
　　文姜者何？庄公之母也。<br>
<br>
　　三、陈人杀其公子御寇<br>
<br>
　　四、秋七月丙申，及齐高傒盟于防。<br>
<br>
　　齐高傒者何？贵大夫也。曷为就吾微者而盟？公也。公则曷为不言公？讳与大夫盟也。<br>
<br>
　　五、冬，公如齐纳币。<br>
<br>
　　纳币不书，此何以书？讥。何讥尔？亲纳币，非礼也。<br>
<br>

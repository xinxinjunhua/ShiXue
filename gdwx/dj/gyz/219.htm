				定公六年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、六年。春王正月癸亥，郑游遬帅师灭许，以许男斯归。<br>
<br>
　　二、二月，公侵郑。公至自侵郑。<br>
<br>
　　三、夏，季孙斯、仲孙何忌如晋。<br>
<br>
　　四、秋，晋人执宋行人乐祁犁。<br>
<br>
　　五、冬，城中城。<br>
<br>
　　六、季孙斯、仲孙忌帅师围运。<br>
<br>
　　此仲孙何忌也，曷为谓之仲孙忌？讥二名。二名，非礼也。<br>
<br>

				隐公六年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、六年，春，郑人来输平。<br>
<br>
　　输平者何？输平犹堕成也。何言乎堕成？败其成也。曰“吾成败矣”。吾与郑人末有成也。吾与郑人则曷为末有成？狐壤之战，隐公获焉。然则何以不言战？讳获也。<br>
<br>
　　二、夏，五月辛酉，公会齐侯盟于艾。<br>
<br>
　　三、秋，七月。<br>
<br>
　　此无事，何以书？春秋虽无事，首时过则书。首时过则何以书？春秋编年，四时具，然后为年。<br>
<br>
　　四、冬，宋人取长葛。<br>
<br>
　　外取邑不书，此何以书？久也。<br>
<br>				</td>

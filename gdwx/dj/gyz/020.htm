			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　一、九年，春，纪季姜归于京师。<br>
<br>
　　其辞成矣，则其称纪季姜何？自我言，纪父母之于子，虽为天王后，犹曰吾季姜。京师者何？天子之居也。京者何？大也。师者何？众也。天子之居，必以众大之辞言之。<br>
<br>
　　二、夏，四月。<br>
<br>
　　三、秋，七月。<br>
<br>
　　四、冬，曹伯使其世子射姑来朝。<br>
<br>
　　诸侯来曰朝，此世子也，其言朝何？春秋有讥父老子代从政者，则未知其在齐与？曹与？<br>
<br>

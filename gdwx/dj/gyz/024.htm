			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　一、十有三年，春二月，公会纪侯、郑伯。己巳，及齐侯、宋公、卫侯、燕人战，齐师、宋师、卫师、燕师败绩。<br>
<br>
　　曷为后日？恃外也。其恃外奈何？得纪侯、郑伯，然后能为日也。内不言战，此其言战何？从外也。曷为从外？恃外故从外也。何以不地？近也。恶乎近？近乎围。郎亦近矣，郎何以地？郎犹可以地也。<br>
<br>
　　二、三月，葬卫宣公。<br>
<br>
　　三、夏，大水。<br>
<br>
　　四、秋七月。<br>
<br>
　　五、冬十月。<br>
<br>

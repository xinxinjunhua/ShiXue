<hr color="#FFFFFF">

<tr>
<td>
<br>
　　一、四年，春，宋公使华元来聘。<br>
<br>
　　二、三月壬申，郑伯坚卒。<br>
<br>
　　三、杞伯来朝。<br>
<br>
　　四、夏四月甲寅，臧孙许卒。<br>
<br>
　　五、公如晋。<br>
<br>
　　六、葬郑襄公。<br>
<br>
　　七、秋，公至自晋。<br>
<br>
　　八、冬，城运。<br>
<br>
　　九、郑伯伐许。<br>
<br>				</td>

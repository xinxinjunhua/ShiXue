			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　一、十有六年。春王正月，葬晋悼公。<br>
<br>
　　二、三月，公会晋侯、宋公、卫侯、郑伯、曹伯、莒子、邾娄子、薛伯、杞伯、小邾娄子于湨梁。戊寅，大夫盟。晋人执莒子、邾娄子以归。<br>
<br>
　　诸侯皆在是，其言大夫盟何？信在大夫也。何言乎信在大夫？徧剌天下之大夫也。曷为遍剌天下之大夫？君若赘旒然。<br>
<br>
　　三、齐侯伐我北鄙。<br>
<br>
　　四、夏，公至自会。<br>
<br>
　　五、五月甲子，地震。<br>
<br>
　　六、叔老会郑伯、晋荀偃、卫寗殖、宋人，伐许。<br>
<br>
　　七、秋，齐侯伐我北鄙，围成。<br>
<br>
　　八、大雩。<br>
<br>
　　九、冬，叔孙豹如晋。<br>
<br>				</td>

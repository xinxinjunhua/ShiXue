				僖公三十年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、三十年，春王正月。<br>
<br>
　　二、夏，狄侵齐。<br>
<br>
　　三、秋，卫杀其大夫元咺及公子瑕。<br>
<br>
　　卫侯未至，其称国以杀何？道杀也。<br>
<br>
　　四、卫侯郑归于卫。<br>
<br>
　　此杀其大夫，其言归何？归恶乎元咺也。曷为归恶乎元咺？元咺之事君也，君出则己入，君入则己出，以为不臣也。<br>
<br>
　　五、晋人、秦人围郑。<br>
<br>
　　六、介人侵萧。<br>
<br>
　　七、冬，天王使宰周公来聘。<br>
<br>
　　八、公子遂如京师，遂如晋。<br>
<br>
　　大夫无遂事，此其言遂何？公不得为政尔。<br>
<br>

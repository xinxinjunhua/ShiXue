				成公元年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、元年，春王正月，公即位。<br>
<br>
　　二、二月辛酉，葬我君宣公。<br>
<br>
　　三、无冰。<br>
<br>
　　四、三月，作丘甲。<br>
<br>
　　何以书？讥。何讥尔？讥始丘使也。<br>
<br>
　　五、夏，臧孙许及晋侯盟于赤棘。<br>
<br>
　　六、秋，王师败绩于贸戎。<br>
<br>
　　孰败之？盖晋败之，或曰贸戎败之。然则曷为不言晋败之？王者无敌，莫敢当也。<br>
<br>
　　七、冬十月。<br>
<br>				</td>

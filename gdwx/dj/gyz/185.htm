				昭公四年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、四年。春王正月，大雨雪。<br>
<br>
　　二、夏，楚子、蔡侯、陈侯、郑伯、许男、徐子、滕子、顿子、胡子、沈子、小邾娄子、宋世子佐、淮夷会于申。楚人执徐子。<br>
<br>
　　三、秋七月，楚子、蔡侯、陈侯、许男、顿子、胡子、沈子、淮夷伐吴，执齐庆封杀之。遂灭厉。<br>
<br>
　　此伐吴也，其言执齐庆封何？为齐诛也。其为齐诛奈何？庆封走之吴，吴封之于防。然则曷为不言伐防？不与诸侯专封也。庆封之罪何？胁齐君而乱齐国也。<br>
<br>
　　四、九月，取鄫。<br>
<br>
　　其言取之何？灭之也。灭之则其言取之何？内大恶，讳也。<br>
<br>
　　五、冬十有二月乙卯，叔孙豹卒。<br>
<br>

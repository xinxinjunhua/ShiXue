				定公十二年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　一、十有二年。春，薛伯定卒。<br>
<br>
　　二、夏，葬薛襄公。<br>
<br>
　　三、叔孙州仇帅师堕郈。<br>
<br>
　　四、卫公孟彄帅师伐曹。<br>
<br>
　　五、季孙斯、仲孙何忌帅师堕费。<br>
<br>
　　曷为帅师堕郈？帅师堕费？孔子行乎季孙，三月不违，曰：“家不藏甲，邑无百雉之城。”于是帅师堕郈，帅师堕费。雉者何？五板而堵，五堵而雉，百雉而城。<br>
<br>
　　六、秋，大雩。<br>
<br>
　　七、冬十月癸亥，公会齐侯盟于黄。<br>
<br>
　　八、十有一月丙寅朔，日有食之。<br>
<br>
　　九、公至自黄。<br>
<br>
　　十、十有二月，公围成。公至自围成。<br>
<br>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、六年，春王正月。<br>
<br>
　　二、夏，公会齐侯、宋公、陈侯、卫侯、曹伯伐郑，围新城。<br>
<br>
　　邑不言围，此其言围何？强也。<br>
<br>
　　三、秋，楚人围许，诸侯遂救许。<br>
<br>
　　四、冬，公至自伐郑。<br>
<br>

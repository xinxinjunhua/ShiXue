<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　一、十年，春王三月辛卯，臧孙辰卒。<br>
<br>
　　二、夏，秦伐晋。<br>
<br>
　　三、楚杀其大夫宣申。<br>
<br>
　　四、自正月不雨，至于秋七月。<br>
<br>
　　五、及苏子盟于女栗。<br>
<br>
　　六、冬，狄侵宋。<br>
<br>
　　七、楚子、蔡侯次于屈貉。<br>
<br>				</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　一、十有九年。春，宋公伐邾娄。<br>
<br>
　　二、夏五月戊辰，许世子止弒其君买。<br>
<br>
　　三、己卯，地震。<br>
<br>
　　四、秋，齐高发帅师伐莒。<br>
<br>
　　五、冬，葬许悼公。<br>
<br>
　　贼未讨，何以书葬？不成于弒也。曷为不成于弒？止进药而药杀也。止进药而药杀，则曷为加弒焉尔？讥子道之不尽也。其讥子道之不尽奈何？曰：乐正子春之视疾也，复加一饭则脱然愈，复损一饭则脱然愈，复加一衣则脱然愈，复损一衣则脱然愈。止进药而药杀，是以君子加弒焉尔。曰“许世子止弒其君买”，是君子之听止也。“葬许悼公”，是君子之赦止也。赦止者，免止之罪辞也。<br>
<br>

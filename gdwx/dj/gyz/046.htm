				庄公十七年</td>
			</tr>
			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有七年，春，齐人执郑瞻。<br>
<br>
　　郑瞻者何？郑之微者也。此郑之微者，何言乎齐人执之？书甚佞也。<br>
<br>
　　二、夏，齐人瀸于遂。<br>
<br>
　　瀸者何？瀸积也，众杀戍者也。<br>
<br>
　　三、秋，郑瞻自齐逃来。<br>
<br>
　　何以书？书甚佞也。曰：“佞人来矣，佞人来矣。”<br>
<br>
　　四、冬，多糜。<br>
<br>
　　何以书？记异也。<br>
<br>				</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、二十年，春王二月，夫人姜氏如莒。<br>
<br>
　　二、夏，齐大灾。<br>
<br>
　　大灾者何？大瘠也。大瘠者何？？&lt;疒列&gt;也。何以书？记灾也。外灾不书，此何以书？及我也。<br>
<br>
　　三、秋七月。<br>
<br>
　　四、冬，齐人伐戎。<br>
<br>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有二年，春正月。<br>
<br>
　　二、夏六月壬寅，公会纪侯、莒子，盟于殴蛇。<br>
<br>
　　三、秋七月丁亥，公会宋公、燕人，盟于谷丘。<br>
<br>
　　四、八月壬辰，陈侯跃卒。<br>
<br>
　　五、公会宋公于郯。<br>
<br>
　　六、冬十有一月，公会宋公于龟。<br>
<br>
　　七、丙戌，公会郑伯，盟于武父。<br>
<br>
　　八、丙戌，卫侯晋卒。<br>
<br>
　　七、十有二月，及郑师伐宋。丁未，战于宋。<br>
<br>
　　战不言伐，此其言伐何？辟嫌也。恶乎嫌？嫌与郑人战也。此偏战也，何以不言师败绩？内不言战，言战乃败矣。<br>
<br>

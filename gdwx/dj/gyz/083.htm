			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、二十年，春，新作南门。<br>
<br>
　　何以书？讥。何讥尔？门有古常也。<br>
<br>
　　二、夏，郜子来朝。<br>
<br>
　　郜子者何？失地之君也。何以不名？兄弟辞也。<br>
<br>
　　三、五月乙巳，西宫灾。<br>
<br>
　　西宫者何？小寝也。小寝则曷为谓之西宫？有西宫则有东宫矣。鲁子曰：“以有西宫，亦知诸侯之有三宫也。”西宫灾何以书？记异也。<br>
<br>
　　四、郑人入滑。<br>
<br>
　　五、秋，齐人、狄人盟于邢。<br>
<br>
　　六、冬，楚人伐随。<br>
<br>

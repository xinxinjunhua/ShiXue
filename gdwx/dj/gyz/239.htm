			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　一、十有一年。春，齐国书帅师伐我。<br>
<br>
　　二、夏，陈袁颇出奔郑。<br>
<br>
　　三、五月，公会吴伐齐。甲戌，齐国书帅师及吴战于艾陵，齐师败绩，获齐国书。<br>
<br>
　　四、秋七月辛酉，滕子虞母卒。<br>
<br>
　　五、冬十有一月，葬滕隐公。<br>
<br>
　　六、卫世叔齐出奔宋。<br>
<br>				</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、九年，春，天王使南季来聘。<br>
<br>
　　二、三月癸酉，大雨震电。<br>
<br>
　　何以书？记异也。何异尔？不时也。<br>
<br>
　　三、庚辰，大雨雪。<br>
<br>
　　何以书？记异也。何异尔？俶甚也。<br>
<br>
　　四、侠卒。<br>
<br>
　　侠者何？吾大夫之未命者也。<br>
<br>
　　五、夏，城郎。<br>
<br>
　　六、秋，七月。<br>
<br>
　　七、冬，公会齐侯于邴。<br>
<br>				</td>

				成公五年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　一、五年，春王正月，杞叔姬来归。<br>
<br>
　　二、仲孙蔑如宋。<br>
<br>
　　三、夏，叔孙侨如会晋荀秀于谷。<br>
<br>
　　四、梁山崩。<br>
<br>
　　梁山者何？河上之山也。梁山崩，何以书？记异也。何异尔？大也。何大尔？梁山崩，壅河三日不沐。外异不书，此何以书？为天下记异也。<br>
<br>
　　五、秋大水。<br>
<br>
　　六、冬十有一月己酉，天王崩。<br>
<br>
　　七、十有二月己丑，公会晋侯、齐侯、宋公、卫侯、郑伯、曹伯、邾娄子、杞伯同盟于虫牢。<br>
<br>

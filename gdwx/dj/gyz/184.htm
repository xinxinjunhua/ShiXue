<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　一、三年。春王正月丁未，滕子泉卒。<br>
<br>
　　二、夏，叔弓如滕。<br>
<br>
　　三、五月，葬滕成公。<br>
<br>
　　四、秋，小邾娄子来朝。<br>
<br>
　　五、八月，大雩。<br>
<br>
　　六、冬，大雨雹。<br>
<br>
　　七、北燕伯款出奔齐。<br>
<br>				</td>

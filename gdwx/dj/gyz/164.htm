				<td align="center">
<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　一、十有四年。春王正月，季孙宿、叔老会晋士匄、齐人、宋人、卫人、郑公孙囆、曹人、莒人、邾娄人、滕人、薛人、杞人、小邾娄人会吴于向。<br>
<br>
　　二、二月乙未朔，日有食之。<br>
<br>
　　三、夏四月，叔孙豹会晋荀偃、齐人、宋人、卫北宫结、郑公孙囆、曹人、莒人、邾娄人、滕人、薛人、杞人、小邾娄人伐秦。<br>
<br>
　　四、己未，卫侯衎出奔齐。<br>
<br>
　　五、莒人侵我东鄙。<br>
<br>
　　六、秋，楚公子贞帅师伐吴。<br>
<br>
　　七、冬，季孙宿会晋士匄、宋华阅、卫孙林父、郑公孙囆、莒人、邾娄人于戚。<br>
<br>

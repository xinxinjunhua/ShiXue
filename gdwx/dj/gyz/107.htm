				文公十一年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　一、十有一年，春，楚子伐圈。<br>
<br>
　　二、夏，叔彭生会晋郄缺于承匡。<br>
<br>
　　三、秋，曹伯来朝。<br>
<br>
　　四、公子遂如宋。<br>
<br>
　　五、狄侵齐。<br>
<br>
　　六、冬十月甲午，叔孙得臣败狄于咸。<br>
<br>
　　狄者何？长狄也。兄弟三人，一者之齐，一者之鲁，一者之晋。其之齐者，王子成父杀之；其之鲁者，叔孙得臣杀之；则未知其之晋者也。其言败何？大之也。其日何？大之也。其地何？大之也。何以书？记异也。<br>
<br>

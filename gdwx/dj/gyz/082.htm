			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有九年，春王三月，宋人执滕子婴齐。<br>
<br>
　　二、夏六月，宋人、曹人、邾娄人盟于曹南。鄫子会盟于邾娄。己酉，邾娄人执鄫子用之。<br>
<br>
　　其言会盟何？后会也。己酉，邾娄人执鄫子用之。恶乎用之？用之社也。其用之社奈何？盖叩其鼻以血社也。<br>
<br>
　　三、秋，宋人围曹。<br>
<br>
　　四、卫人伐邢。<br>
<br>
　　五、冬，公会陈人、蔡人、楚人、郑人盟于齐。<br>
<br>
　　六、梁亡。<br>
<br>
　　此未有伐者，其言梁亡何？自亡也。其自亡奈何？鱼烂而亡也。<br>
<br>

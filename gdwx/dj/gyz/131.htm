				宣公十七年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有七年，春王正月，庚子，许男锡我卒。<br>
<br>
　　二、丁未，蔡侯申卒。<br>
<br>
　　三、夏，葬许昭公。<br>
<br>
　　四、葬蔡文公。<br>
<br>
　　五、六月癸卯，日有食之。<br>
<br>
　　六、己未，公会晋侯、卫侯、曹伯、邾娄子同盟于断道。<br>
<br>
　　七、秋，公至自会。<br>
<br>
　　八、冬十有一月壬午，公弟叔肸卒。<br>
<br>				</td>

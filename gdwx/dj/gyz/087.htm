			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　一、二十有四年，春王正月。<br>
<br>
　　二、夏，狄伐郑。<br>
<br>
　　三、秋七月。<br>
<br>
　　四、冬，天王出居郑。<br>
<br>
　　王者无外，此其言出何？不能乎母也。鲁子曰：“是王也，不能乎母者，其诸此之谓与。”<br>
<br>
　　五、晋侯夷吾卒。<br>
<br>				</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、二十年。春王正月辛亥，仲孙遬会莒人盟于向。<br>
<br>
　　二、夏，六月庚申，公会晋侯、齐侯、宋公、卫侯、郑伯、曹伯、莒子、邾娄子、滕子、薛伯、杞伯、小邾娄子盟于澶渊。<br>
<br>
　　三、秋，公至自会。<br>
<br>
　　四、仲孙遬帅师伐邾娄。<br>
<br>
　　五、蔡杀其大夫公子爕。<br>
<br>
　　六、蔡公子履出奔楚。<br>
<br>
　　七、陈侯之弟光出奔楚。<br>
<br>
　　八、叔老如齐。<br>
<br>
　　九、冬十月丙辰朔，日有食之。<br>
<br>
　　十、季孙宿如宋。<br>
<br>				</td>

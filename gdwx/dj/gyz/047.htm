				庄公十八年</td>
			</tr>
			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有八年，春王三月，日有食之。<br>
<br>
　　二、夏，公追戎于济西。<br>
<br>
　　此未有言伐者，其言追何？大其为中国追也。此未有伐中国者，则其言为中国追何？大其未至而豫御之也。其言于济西何？大之也。<br>
<br>
　　三、秋有蜮。<br>
<br>
　　何以书？记异也。<br>
<br>
　　四、冬十月。<br>
<br>				</td>

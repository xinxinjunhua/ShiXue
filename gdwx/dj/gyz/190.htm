				昭公九年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、九年。春，叔弓会楚子于陈。<br>
<br>
　　二、许迁于夷。<br>
<br>
　　三、夏四月，陈火。<br>
<br>
　　陈已灭矣，其言陈火何？存陈也，曰存陈悕矣！曷为存陈？灭人之国，执人之罪人，杀人之贼，葬人之君，若是则陈存悕矣！<br>
<br>
　　四、秋，仲孙貜如齐。<br>
<br>
　　五、冬，筑郎囿。<br>
<br>

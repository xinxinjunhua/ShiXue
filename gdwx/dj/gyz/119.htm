				宣公五年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、五年，春，公如齐。<br>
<br>
　　二、夏，公至自齐。<br>
<br>
　　三、秋九月，齐高固来逆子叔姬。<br>
<br>
　　四、叔孙得臣卒。<br>
<br>
　　五、冬，齐高固及子叔姬来。<br>
<br>
　　何言乎高固之来？言叔姬之来，而不言高固之来则不可。子公羊子曰：“其诸为其双双而俱至者与。”<br>
<br>
　　六、楚人伐郑。<br>
<br>				</td>

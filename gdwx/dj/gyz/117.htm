				宣公三年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、三年，春王正月，郊牛之口伤，改卜牛。牛死，乃不郊，犹三望。<br>
<br>
　　其言之何？缓也。曷为不复卜？养牲养二卜。帝牲不吉，则扳稷牲而卜之。帝牲在于涤三月，于稷者唯具是视。郊曷为必祭稷？王者必以其祖配。王者则曷为必以其祖配？自内出者无匹不行，自外至者无主不止。<br>
<br>
　　二、葬匡王。<br>
<br>
　　三、楚子伐贲浑戎。<br>
<br>
　　四、夏，楚人侵郑。<br>
<br>
　　五、秋，赤狄侵齐。<br>
<br>
　　六、宋师围曹。<br>
<br>
　　七、冬十月丙戌，郑伯兰卒。<br>
<br>
　　八、葬郑缪公。<br>
<br>

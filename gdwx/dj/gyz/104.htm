			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　一、八年，春王正月。<br>
<br>
　　二、夏四月。<br>
<br>
　　三、秋八月戊申，天王崩。<br>
<br>
　　四、冬十月壬午，公子遂会晋赵盾，盟于衡雍。<br>
<br>
　　五、乙酉，公子遂会伊雒戎，盟于暴。<br>
<br>
　　六、公孙敖如京师，不至复。丙戌，奔莒。<br>
<br>
　　不至复者何？不至复者，内辞也，不可使往也。不可使往，则其言如京师何？遂公意也。何以不言出？遂在外也。<br>
<br>
　　七、螽。<br>
<br>
　　八、宋人杀其大夫司马。<br>
<br>
　　九、宋司城来奔。<br>
<br>
　　司马者何？司城者何？皆官举也。曷为皆官举？宋三世无大夫，三世内娶也。<br>
<br>

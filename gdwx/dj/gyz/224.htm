<tr>
<td>
<br>
　　一、十有一年。春，宋公之弟辰及仲佗、石彄、公子池，自陈入于萧，以叛。<br>
<br>
　　二、夏四月。<br>
<br>
　　三、秋，宋乐世心自曹入于萧。<br>
<br>
　　四、冬，及郑平。<br>
<br>
　　五、叔还如郑莅盟。<br>
<br>				</td>

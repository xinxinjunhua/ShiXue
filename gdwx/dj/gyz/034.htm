				庄公五年</td>
			</tr>
			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、五年，春王正月。<br>
<br>
　　二、夏，夫人姜氏如齐师。<br>
<br>
　　三、秋，倪黎来来朝。<br>
<br>
　　倪者何？小邾娄也。小邾娄则曷为谓之倪？未能以其名通也。黎来者何？名也。其名何？微国也。<br>
<br>
　　四、冬，公会齐人、宋人、陈人、蔡人伐卫。<br>
<br>
　　此伐卫何？纳朔也。曷为不言纳卫侯朔？辟王也。<br>
<br>				</td>

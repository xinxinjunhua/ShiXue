				庄公三年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、三年，春王正月，溺会齐师伐卫。<br>
<br>
　　溺者何？吾大夫之未命者也。<br>
<br>
　　二、夏四月，葬宋庄公。<br>
<br>
　　三、五月，葬桓王。<br>
<br>
　　此未有言崩者，何以书葬？盖改葬也。<br>
<br>
　　四、秋，纪季以酅入于齐。<br>
<br>
　　纪季者何？纪侯之弟也。何以不名？贤也。何贤乎纪季？服罪也。其服罪奈何？鲁子曰：“请后五庙以存姑姊妹。”<br>
<br>
　　五、冬，公次于郎。<br>
<br>
　　其言公次于郎何？刺欲救纪而后不能也。<br>
<br>				</td>

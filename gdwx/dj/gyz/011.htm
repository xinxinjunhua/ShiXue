				隐公十一年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有一年，春，滕侯、薛侯来朝。<br>
<br>
　　其言朝何？诸侯来曰朝，大夫来曰聘。其兼言之何？微国也。<br>
<br>
　　二、夏，五月，公会郑伯于祁黎。<br>
<br>
　　三、秋，七月壬午，公及齐侯、郑伯入许。<br>
<br>
　　四、冬，十有一月壬辰，公薨。<br>
<br>
　　何以不书葬？隐之也。何隐尔？弒也。弒则何以不书葬？春秋君弒，贼不讨，不书葬，以为无臣子也。子沈子曰：“君弒，臣不讨贼，非臣也。子不复雠，非子也。”葬，生者之事也。春秋君弒，贼不讨，不书葬，以为不系乎臣子也。公薨何以不地？不忍言也。隐何以无正月？隐将让乎桓，故不有其正月也。<br>
<br>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、三年。春，楚公子婴齐帅师伐吴。<br>
<br>
　　二、公如晋。<br>
<br>
　　三、夏四月壬戌，公及晋侯盟于长樗。公至自晋。<br>
<br>
　　四、六月，公会单子、晋侯、宋公、卫侯、郑伯、莒子、邾娄子、齐世子光；己未，同盟于鸡泽。陈侯使袁侨如会。戊寅，叔孙豹及诸侯之大夫及陈袁侨盟。<br>
<br>
　　其言如会何？后会也。曷为殊及陈袁侨？为其与袁侨盟也。<br>
<br>
　　五、秋，公至自会。<br>
<br>
　　六、冬，晋荀罃帅师伐许。<br>
<br>

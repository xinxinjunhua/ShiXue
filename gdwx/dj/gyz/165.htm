				襄公十五年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有五年。春，宋公使向戌来聘。二月己亥，及向戌盟于刘。<br>
<br>
　　二、刘夏逆王后于齐。<br>
<br>
　　刘夏者何？天子之大夫也。刘者何？邑也。其称刘何？以邑氏也。外逆女不书，此何以书？过我也。<br>
<br>
　　三、夏，齐侯伐我北鄙，围成。公救成，至遇。<br>
<br>
　　其言至遇何？不敢进也。<br>
<br>
　　四、季孙宿、叔孙豹帅师城成郛。<br>
<br>
　　五、秋八月丁巳，日有食之。<br>
<br>
　　六、邾娄人伐我南鄙。<br>
<br>
　　七、冬十有一月癸亥，晋侯周卒。<br>
<br>				</td>

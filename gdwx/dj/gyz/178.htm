			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　一、二十有八年。春，无冰。<br>
<br>
　　二、夏，卫石恶出奔晋。<br>
<br>
　　三、邾娄子来朝。<br>
<br>
　　四、秋八月，大雩。仲孙羯如晋。<br>
<br>
　　五、冬，齐庆封来奔。<br>
<br>
　　六、十有一月，公如楚。<br>
<br>
　　七、十有二月甲寅，天王崩。<br>
<br>
　　八、乙未，楚子昭卒。<br>
<br>				</td>

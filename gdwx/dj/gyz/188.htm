			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、七年。春王正月，暨齐平。<br>
<br>
　　二、三月，公如楚。<br>
<br>
　　三、叔孙舍如齐莅盟。<br>
<br>
　　四、夏四月甲辰朔，日有食之。<br>
<br>
　　五、秋八月戊辰，卫侯恶卒。<br>
<br>
　　六、九月，公至自楚。<br>
<br>
　　七、冬十有一月癸未，季孙宿卒。<br>
<br>
　　八、十有二月癸亥，葬卫襄公。<br>
<br>				</td>

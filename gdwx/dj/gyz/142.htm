				成公十年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十年，春，卫侯之弟黑背率师侵郑。<br>
<br>
　　二、夏四月，五卜郊不从，乃不郊。<br>
<br>
　　其言乃不郊何？不免牲，故言乃不郊也。<br>
<br>
　　三、五月，公会晋侯、齐侯、宋公、卫侯、曹伯伐郑。<br>
<br>
　　四、齐人来媵。<br>
<br>
　　媵不书，此何以书？录伯姬也。三国来媵非礼也，曷为皆以录伯姬之辞言之？妇人以众多为侈也。<br>
<br>
　　五、丙午，晋侯獳卒。<br>
<br>
　　六、秋七月。<br>
<br>
　　七、公如晋。<br>
<br>

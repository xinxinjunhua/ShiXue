			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　一、二十有一年。春王三月，葬蔡平公。<br>
<br>
　　二、夏，晋侯使士鞅来聘。<br>
<br>
　　三、宋华亥、向宁、华定自陈入于宋南里以畔。<br>
<br>
　　宋南里者何？若曰因诸者然。<br>
<br>
　　四、秋七月壬午朔，日有食之。<br>
<br>
　　五、八月乙亥，叔痤卒。<br>
<br>
　　六、公如晋，至河乃复。<br>
<br>

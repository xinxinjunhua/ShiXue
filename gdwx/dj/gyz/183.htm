			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　一、二年。春，晋侯使韩起来聘。<br>
<br>
　　二、夏，叔弓如晋。<br>
<br>
　　三、秋，郑杀其大夫公孙黑。<br>
<br>
　　四、冬，公如晋，至河乃复。<br>
<br>
　　其言至河乃复何？不敢进也。<br>
<br>
　　五、季孙宿如晋。<br>
<br>

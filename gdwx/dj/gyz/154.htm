				襄公四年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、四年。春王三月己酉，陈侯午卒。<br>
<br>
　　二、夏，叔孙豹如晋。<br>
<br>
　　三、秋七月戊子，夫人弋氏薨。<br>
<br>
　　四、葬陈成公。<br>
<br>
　　五、八月辛亥，葬我小君定弋。<br>
<br>
　　定弋者，襄公之母也。<br>
<br>
　　六、冬，公如晋。<br>
<br>
　　七、陈人围顿。<br>
<br>

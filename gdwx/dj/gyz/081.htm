			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　一、十有八年，春王正月，宋公会曹伯、卫人、邾娄人伐齐。<br>
<br>
　　二、夏，师救齐。<br>
<br>
　　三、五月戊寅，宋师及齐师战于甗，齐师败绩。<br>
<br>
　　战不言伐，此其言伐何？宋公与伐而不与战，故言伐。春秋伐者为客，伐者为主。曷为不使齐主之？与襄公之征齐也。曷为与襄公之征齐？桓公死，竖刁、易牙争权不葬，为是故伐之也。<br>
<br>
　　四、狄救齐。<br>
<br>
　　五、秋八月丁亥，葬齐桓公。<br>
<br>
　　六、冬，邢人、狄人伐卫。<br>
<br>				</td>

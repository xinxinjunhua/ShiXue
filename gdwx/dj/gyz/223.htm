				<td align="center">
<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　一、十年。春王三月，及齐平。<br>
<br>
　　二、夏，公会齐侯于颊谷。公至自颊谷。<br>
<br>
　　三、晋赵鞅帅师围卫。<br>
<br>
　　四、齐人来归运、讙、龟阴田。<br>
<br>
　　齐人曷为来归运、讙、龟阴田？孔子行乎季孙，三月不违，齐人为是来归之。<br>
<br>
　　五、叔孙州仇、仲孙何忌帅师围郈。<br>
<br>
　　六、秋，叔孙州仇、仲孙何忌帅师围费。<br>
<br>
　　七、宋乐世心出奔曹。<br>
<br>
　　八、宋公子池出奔陈。<br>
<br>
　　九、冬，齐侯、卫侯、郑游遬会于鞌。<br>
<br>
　　十、叔孙州仇如齐。<br>
<br>
　　十一、齐公之弟辰暨宋仲佗、石彄出奔陈。<br>
<br>				</td>

				桓公十四年</td>
			</tr>
			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有四年，春正月，公会郑伯于曹。<br>
<br>
　　二、无冰。<br>
<br>
　　何以书？记异也。<br>
<br>
　　三、夏五。郑伯使其弟语来盟。<br>
<br>
　　夏五者何？无闻焉尔。<br>
<br>
　　四、秋八月壬申，御廪灾。<br>
<br>
　　御廪者何？粢盛委之所藏也。御廪灾，何以书？记灾也。<br>
<br>
　　五、乙亥甞。<br>
<br>
　　常事不书，此何以书？讥。何讥尔？讥甞也。曰：“犹甞乎？”御廪灾不如勿甞而已矣！<br>
<br>
　　六、冬十有二月丁巳，齐侯禄父卒。<br>
<br>
　　七、宋人以齐人、卫人、蔡人、陈人伐郑。<br>
<br>
　　以者何？行其意也。<br>
<br>				</td>

				庄公三十一年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、三十有一年，春，筑台于郎。<br>
<br>
　　何以书？讥。何讥尔？临民之所漱浣也。<br>
<br>
　　二、夏四月，薛伯卒。<br>
<br>
　　三、筑台于薛。<br>
<br>
　　何以书？讥。何讥尔？远也。<br>
<br>
　　四、六月，齐侯来献戎捷。<br>
<br>
　　齐，大国也，曷为亲来献戎捷？威我也。其威我奈何？旗获而过我也。<br>
<br>
　　五、秋，筑台于秦。<br>
<br>
　　何以书？讥。何讥尔？临国也。<br>
<br>
　　六、冬，不雨。<br>
<br>
　　何以书？记异也。<br>
<br>				</td>

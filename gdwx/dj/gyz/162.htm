				襄公十二年</td>
			</tr>
			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有二年。春王三月，莒人伐我东鄙，围台。<br>
<br>
　　邑不言围，此其言围何？伐而言围者，取邑之辞也；伐而不言围者，非取邑之辞也。<br>
<br>
　　二、季孙宿帅师救台，遂入运。<br>
<br>
　　大夫无遂事，此其言遂何？公不得为政尔。<br>
<br>
　　三、夏，晋侯使士彭来聘。<br>
<br>
　　四、秋九月，吴子乘卒。<br>
<br>
　　五、冬，楚公子贞帅师侵宋。<br>
<br>
　　六、公如晋。<br>
<br>

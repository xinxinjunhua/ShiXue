			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、七年，春，夫人姜氏会齐侯于防。<br>
<br>
　　二、夏四月辛卯夜，恒星不见，夜中星霣如雨。<br>
<br>
　　恒星者何？列星也。列星不见，则何以知？夜之中星反也。如雨者何？如雨者非雨也。非雨则曷为谓之如雨？不修春秋曰：“雨星不及地尺而复。”君子修之曰：“星霣如雨。”何以书？记异也。<br>
<br>
　　三、秋，大水。<br>
<br>
　　四、无麦、苗。<br>
<br>
　　无苗，则曷为先言无麦，而后言无苗？一灾不书，待无麦然后书无苗。何以书？记灾也。<br>
<br>
　　五、冬，夫人姜氏会齐侯于谷。<br>

				庄公十九年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有九年，春，王正月。<br>
<br>
　　二、夏四月。<br>
<br>
　　三、秋，公子结媵陈人之妇于鄄，遂及齐侯、宋公盟。<br>
<br>
　　媵者何？诸侯娶一国，则贰国往媵之，以侄娣从。侄者何？兄之子也。娣者何？女弟也。诸侯壹聘九女，诸侯不再娶。媵不书，此何以书？为其有遂事书。大夫无遂事，此其言遂何？聘礼，大夫受命不受辞，出竟有可以安社稷利国家者，则专之可也。<br>
<br>
　　四、夫人姜氏如莒。<br>
<br>
　　五、冬，齐人、宋人、陈人伐我西鄙。<br>
<br>

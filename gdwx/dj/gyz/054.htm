				庄公二十五年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、二十有五年，春，陈侯使女叔来聘。<br>
<br>
　　二、夏五月癸丑，卫侯朔卒。<br>
<br>
　　三、六月辛未朔，日有食之，鼓用牲于社。<br>
<br>
　　日食则曷为鼓用牲于社？求乎阴之道也，以朱丝营社，或曰胁之，或曰为闇，恐人犯之，故营之。<br>
<br>
　　四、伯姬归于杞。<br>
<br>
　　五、秋，大水，鼓用牲于社于门。<br>
<br>
　　其言于社于门何？于社，礼也；于门，非礼也。<br>
<br>
　　六、冬，公子友如陈。<br>
<br>				</td>

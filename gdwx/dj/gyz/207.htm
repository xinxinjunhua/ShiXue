				昭公二十六年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、二十有六年。春王正月，葬宋元公。<br>
<br>
　　二、三月，公至自齐，居于运。<br>
<br>
　　三、夏，公围成。<br>
<br>
　　四、秋，公会齐侯、莒子、邾娄子，杞伯盟于剸陵。公至自会，居于运。<br>
<br>
　　五、九月庚申，楚子居卒。<br>
<br>
　　六、冬十月，天王入于成周。尹氏、召伯、毛伯以王子朝奔楚。<br>
<br>
　　成周者何？东周也。其言入何？不嫌也。<br>
<br>

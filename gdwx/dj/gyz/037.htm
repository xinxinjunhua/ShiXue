				庄公八年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、八年，春王正月，师次于郎，以俟陈人、蔡人。甲午，祠兵。<br>
<br>
　　次不言俟，此其言俟何？托不得已也。祠兵者何？出曰祠兵，入曰振旅，其礼一也，皆习战也。何言乎祠兵？为久也。曷为为久？吾将以甲午之日，然后祠兵于是。<br>
<br>
　　二、夏，师及齐师围成，成降于齐师。<br>
<br>
　　成者何？盛也。盛则曷为谓之成？讳灭同姓也。曷为不言降吾师？辟之也。<br>
<br>
　　三、秋，师还。<br>
<br>
　　还者何？善辞也。此灭同姓何善尔？病之也，曰：师病矣。曷为病之？非师之罪也。<br>
<br>
　　四、冬十有一月癸未，齐无知弒其君诸儿。<br>
<br>

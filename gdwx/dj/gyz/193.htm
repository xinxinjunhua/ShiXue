			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　一、十有二年。春，齐高偃帅师纳北燕伯于阳。<br>
<br>
　　伯于阳者何？公子阳生也。子曰：“我乃知之矣。”在侧者曰：“子茍知之，何以不革？”曰：“如尔所不知何？春秋之信史也，其序则齐桓晋文，其会则主会者为之也，其词则丘有罪焉耳！”<br>
<br>
　　二、三月壬申，郑伯嘉卒。<br>
<br>
　　三、夏，宋公使华定来聘。<br>
<br>
　　四、公如晋，至河乃复。<br>
<br>
　　五、五月，葬郑简公。<br>
<br>
　　六、楚杀其大夫成然。<br>
<br>
　　七、秋七月。<br>
<br>
　　八、冬十月，公子整出奔齐。<br>
<br>
　　九、楚子伐徐。<br>
<br>
　　十、晋伐鲜虞。<br>
<br>

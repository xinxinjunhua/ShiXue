				庄公二十六年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、二十有六年，公伐戎。<br>
<br>
　　二、夏，公至自伐戎。<br>
<br>
　　三、曹杀其大夫。<br>
<br>
　　何以不名？众也。曷为众杀之？不死于曹君者也。君死乎位曰灭，曷为不言其灭？为曹羁讳也。此盖战也，何以不言战？为曹羁讳也。<br>
<br>
　　四、秋，公会宋人、齐人伐徐。<br>
<br>
　　五、冬十有二月癸亥朔，日有食之。<br>
<br>

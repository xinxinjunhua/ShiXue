				宣公十八年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有八年，春，晋侯、卫世子臧伐齐。<br>
<br>
　　二、公伐杞。<br>
<br>
　　三、夏四月。<br>
<br>
　　四、秋七月，邾娄人戕鄫子于鄫。<br>
<br>
　　戕鄫子于鄫者何？残贼而杀之也。<br>
<br>
　　五、甲戌，楚子旅卒。<br>
<br>
　　何以不书葬？吴、楚之君不书葬，辟其号也。<br>
<br>
　　六、公孙归父如晋。<br>
<br>
　　七、冬十月壬戌，公薨于路寝。<br>
<br>
　　八、归父还自晋，至柽，遂奔齐。<br>
<br>
　　还者何？善辞也。何善尔？归父使于晋，还自晋，至柽，闻君薨家遣，墠帷哭君成踊，反命乎介，自是走之齐。<br>
<br>

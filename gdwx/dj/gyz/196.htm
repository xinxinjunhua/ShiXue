				昭公十五年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有五年。春王正月，吴子夷昧卒。<br>
<br>
　　二、二月癸酉，有事于武宫。钥入，叔弓卒，去乐卒事。<br>
<br>
　　其言去乐卒事何？礼也。君有事于庙，闻大夫之丧去乐，卒事。大夫闻君之丧，摄主而往。大夫闻大夫之丧，尸事毕而往。<br>
<br>
　　三、夏，蔡昭吴奔郑。<br>
<br>
　　四、六月丁巳朔，日有食之。<br>
<br>
　　五、秋，晋荀吴帅师伐鲜虞。<br>
<br>
　　六、冬，公如晋。<br>
<br>				</td>

				僖公二十五年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、二十有五年，春王正月丙午，卫侯毁灭邢。<br>
<br>
　　卫侯毁，何以名？绝。曷为绝之？灭同姓也。<br>
<br>
　　二、夏四月癸酉，卫侯毁卒。<br>
<br>
　　三、宋荡伯姬来逆妇。<br>
<br>
　　宋荡伯姬者何？荡氏之母也。其言来逆妇何？兄弟辞也。其称妇何？有姑之辞也。<br>
<br>
　　四、宋杀其大夫。<br>
<br>
　　何以不名？宋三世无大夫，三世内娶也。<br>
<br>
　　五、秋，楚人围陈，纳顿子于顿。<br>
<br>
　　何以不言遂？两之也。<br>
<br>
　　六、葬卫文公。<br>
<br>
　　七、冬十有二月癸亥，公会卫子、莒庆，盟于洮。<br>
<br>				</td>

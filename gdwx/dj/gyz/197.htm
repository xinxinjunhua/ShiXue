			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有六年，春，齐侯伐徐。<br>
<br>
　　二、楚子诱戎曼子，杀之。<br>
<br>
　　楚子何以不名？夷狄相诱，君子不疾也。曷为不疾？若不疾，乃疾之也。<br>
<br>
　　三、夏，公至自晋。<br>
<br>
　　四、秋八月己亥，晋侯夷卒。<br>
<br>
　　五、九月，大雩。<br>
<br>
　　六、季孙隐如如晋。<br>
<br>
　　七、冬十月，葬晋昭公。<br>
<br>				</td>

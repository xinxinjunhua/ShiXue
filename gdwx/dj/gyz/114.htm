				文公十八年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有八年，春王二月丁丑，公薨于台下。<br>
<br>
　　二、秦伯罃卒。<br>
<br>
　　三、夏五月戊戌，齐人弒其君商人。<br>
<br>
　　四、六月癸酉，葬我君文公。<br>
<br>
　　五、秋，公子遂、叔孙得臣如齐。<br>
<br>
　　六、冬十月，子卒。<br>
<br>
　　子卒者孰谓？谓子赤也。何以不日？隐之也。何隐尔？弒也。弒则何以不日？不忍言也。<br>
<br>
　　七、夫人姜氏归于齐。<br>
<br>
　　八、季孙行父如齐。<br>
<br>
　　九、莒弒其君庶其。<br>
<br>
　　称国以弒何？称国以弒者，众弒君之辞。<br>
<br>				</td>

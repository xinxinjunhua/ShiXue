			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有三年。春，公至自晋。<br>
<br>
　　二、夏，取诗。<br>
<br>
　　诗者何？邾娄之邑也。曷为不系乎邾娄？讳亟也。<br>
<br>
　　三、秋九月庚辰，楚子审卒。<br>
<br>
　　四、冬，城防。<br>
<br>				</td>

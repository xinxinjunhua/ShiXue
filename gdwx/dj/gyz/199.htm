			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有八年。春王三月，曹伯须卒。<br>
<br>
　　二、夏五月壬午，宋、卫、陈、郑灾。<br>
<br>
　　何以书？记异也。何异尔？异其同日而俱灾也。外异不书，此何以书？为天下记异也。<br>
<br>
　　三、六月，邾娄人入鄅。<br>
<br>
　　四、秋，葬曹平公。<br>
<br>
　　五、冬，许迁于白羽。<br>
<br>				</td>

				哀公二年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、二年。春王二月，季孙斯、叔孙州仇、仲孙何忌帅师伐邾娄，取漷东田及沂西田。癸巳，叔孙州仇、仲孙何忌及邾娄子盟于句绎。<br>
<br>
　　二、夏四月丙子，卫侯元卒。<br>
<br>
　　三、滕子来朝。<br>
<br>
　　四、晋赵鞅帅师纳卫世子蒯聩于戚。<br>
<br>
　　戚者何？卫之邑也。曷为不言入于卫？父有子，子不得有父也。<br>
<br>
　　五、秋八月甲戌，晋赵鞅帅师及郑轩达帅师战于栗，郑师败绩。<br>
<br>
　　六、冬十月，葬卫灵公。<br>
<br>
　　七、十有一月，蔡迁于州来。蔡杀其大夫公子驷。<br>
<br>

				定公十三年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　一、十有三年。春，齐侯、卫侯次于垂瑕。<br>
<br>
　　二、夏，筑蛇渊囿。<br>
<br>
　　三、大搜于比蒲。<br>
<br>
　　四、卫公孟彄帅师伐曹。<br>
<br>
　　五、秋，晋赵鞅入于晋阳以叛。<br>
<br>
　　六、冬，晋荀寅及士吉射入于朝歌以叛。<br>
<br>
　　七、晋赵鞅归于晋。<br>
<br>
　　此叛也，其言归何？以地正国也。其以地正国奈何？晋赵鞅取晋阳之甲以逐荀寅与士吉射。荀寅与士吉射者，曷为者也？君侧之恶人也。此逐君侧之恶人，曷为以叛言之？无君命也。<br>
<br>
　　八、薛弒其君比。<br>
<br>

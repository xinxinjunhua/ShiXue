<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　【经】二十有一年春，王正月。夏五月辛酉，郑伯突卒。秋七月戊戌，夫人姜氏薨。冬十有二月，葬郑厉公。<br>
<br>
　　【传】二十一年春，胥命于弭。夏，同伐王城。郑伯将王，自圉门入，虢叔自北门入，杀王子颓及五大夫。郑伯享王于阙西辟，乐备。王与之武公之略，自虎牢以东。原伯曰：“郑伯效尤，其亦将有咎。”五月，郑厉公卒。<br>
<br>
　　王巡虢守。虢公为王宫于玤，王与之酒泉。郑伯之享王也，王以后之鞶鉴予之。虢公请器，王予之爵。郑伯由是始恶于王。<br>
<br>
　　冬，王归自虢。<br>

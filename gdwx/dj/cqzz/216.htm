<tr>
<td>
<br>
　　【经】二年春王正月。夏五月壬辰，雉门及两观灭。秋，楚人伐吴。冬十月，新作雉门及两观。<br>
<br>
　　【传】二年夏四月辛酉，巩氏之群子弟贼简公。<br>
<br>
　　桐叛楚。吴子使舒鸠氏诱楚人，曰：“以师临我，我伐桐，为我使之无忌。”<br>
<br>
　　秋，楚囊瓦伐吴，师于豫章。吴人见舟于豫章，而潜师于巢。冬十月，吴军楚师于豫章，败之。遂围巢，克之，获楚公子繁。<br>
<br>
　　邾庄公与夷射姑饮酒，私出。阍乞肉焉。夺之杖以敲之。<br>
<br>

<tr>
<td>
<br>
　　【经】元年春王正月，公即位。三月，公会郑伯于垂，郑伯以璧假许田。夏四月丁未，公及郑伯盟于越。秋，大水。冬十月。<br>
<br>
　　【传】元年春，公即位，修好于郑。郑人请复祀周公，卒易祊田。公许之。<br>
<br>
　　三月，郑伯以璧假许田，为周公、祊故也。<br>
<br>
　　夏四月丁未，公及郑伯盟于越，结祊成也。盟曰：“渝盟无享国。”<br>
<br>
　　秋，大水。凡平原出水为大水。<br>
<br>
　　冬，郑伯拜盟。<br>
<br>
　　宋华父督见孔父之妻于路，目逆而送之，曰：“美而艳。”<br>

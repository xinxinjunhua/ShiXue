<tr>
<td>
<br>
　　【传】惠公元妃孟子。孟子卒，继室以声子，生隐公。宋武公生仲子。仲子生而有文在其手，曰为鲁夫人，故仲子归于我。生桓公而惠公薨，是以隐公立而奉之。<br>
<br>

				庄公七年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　【经】七年春，夫人姜氏会齐侯于防。夏四月辛卯，夜，恒星不见。夜中，星陨如雨。秋，大水。无麦苗。冬，夫人姜氏会齐侯于谷。<br>
<br>
　　【传】七年春，文姜会齐侯于防，齐志也。<br>
<br>
　　夏，恒星不见，夜明也。星陨如雨，与雨偕也。<br>
<br>
　　秋，无麦苗，不害嘉谷也。<br>
<br>				</td>

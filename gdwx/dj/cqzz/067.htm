				僖公三年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　【经】三年春王正月，不雨。夏四月不雨。徐人取舒。六月雨。秋，齐侯、宋公、江人、黄人会于阳谷。冬，公子友如齐涖盟。楚人伐郑。<br>
<br>
　　【传】三年春，不雨。夏六月，雨。自十月不雨至于五月，不曰旱，不为灾也。<br>
<br>
　　秋，会于阳谷，谋伐楚也。<br>
<br>
　　齐侯为阳谷之会，来寻盟。冬，公子友如齐涖盟。<br>
<br>
　　楚人伐郑，郑伯欲成。孔叔不可，曰：“齐方勤我，弃德不祥。”<br>
<br>
　　齐侯与蔡姬乘舟于囿，荡公。公惧，变色。禁之，不可。公怒，归之，未绝之也。蔡人嫁之。<br>
<br>

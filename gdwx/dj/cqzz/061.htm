<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　【经】三十有一年春，筑台于郎。夏四月，薛伯卒。筑台于薛。六月，齐侯来献戎捷。秋，筑台于秦。冬，不雨。<br>
<br>
　　【传】三十一年夏六月，齐侯来献戎捷，非礼也。凡诸侯有四夷之功，则献于王，王以警于夷。中国则否。诸侯不相遗俘。<br>
<br>

				庄公三十年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　【经】三十年春王正月。夏，次于成。秋七月，齐人降鄣。八月癸亥，葬纪叔姬。九月庚午朔，日有食之，鼓，用牲于社。冬，公及齐侯遇于鲁济。齐人伐山戎。<br>
<br>
　　【传】三十年春，王命虢公讨樊皮。夏四月丙辰，虢公入樊，执樊仲皮，归于京师。<br>
<br>
　　楚公子元归自伐郑，而处王宫，斗射师谏，则执而梏之。<br>
<br>
　　秋，申公斗班杀子元，斗谷於菟为令尹，自毁其家以纾楚国之难。<br>
<br>
　　冬，遇于鲁济，谋山戎也，以其病燕故也。<br>
<br>

				<td align="center">
<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　【经】十有一年春，宋公之弟辰及仲佗、石彄、公子地自陈入于萧以叛。<br>
<br>
　　夏四月。秋，宋乐大心自曹入于萧。冬，及郑平。叔还如郑莅盟。<br>
<br>
　　【传】十一年春，宋公母弟辰暨仲佗、石彄、公子地入于萧以叛。秋，乐大心从之，大为宋患，宠向魋故也。<br>
<br>
　　冬，及郑平，始叛晋也。<br>
<br>

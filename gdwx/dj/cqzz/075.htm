			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　【经】十有一年春。晋杀其大夫郑父。夏，公及夫人姜氏会齐侯于阳谷。<br>
<br>
　　秋八月，大雩。冬，楚人伐黄。<br>
<br>
　　【传】十一年春，晋侯使以郑之乱来告。<br>
<br>
　　天王使召武公、内史过赐晋侯命。受玉惰。过归，告王曰：“晋侯其无后乎。<br>
<br>
　　王赐之命而惰于受瑞，先自弃也已，其何继之有？礼，国之干也。敬，礼之舆也。<br>
<br>
　　不敬则礼不行，礼不行则上下昏，何以长世？”<br>
<br>
　　夏，扬、拒、泉、皋、伊、洛之戎同伐京师，入王城，焚东门，王子带召之也。秦、晋、伐戎以救周。秋，晋侯平戎于王。<br>
<br>
　　黄人不归楚贡。冬，楚人伐黄。<br>
<br>

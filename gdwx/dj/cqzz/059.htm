				庄公二十九年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　【经】二十有九年春，新延厩。夏，郑人侵许。秋，有蜚。冬十有二月，纪叔姬卒。城诸及防。<br>
<br>
　　【传】二十九年春，新作延厩。书，不时也。凡马日中而出，日中而入。<br>
<br>
　　夏，郑人侵许。凡师有钟鼓曰伐，无曰侵，轻曰袭。<br>
<br>
　　秋，有蜚，为灾也。凡物不为灾不书。<br>
<br>
　　冬十二月，城诸及防，书，时也。凡土功，龙见而毕务，戒事也。火见而致用，水昏正而栽，日至而毕。<br>
<br>
　　樊皮叛王。<br>
<br>				</td>

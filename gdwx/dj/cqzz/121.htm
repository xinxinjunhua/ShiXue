				宣公六年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　【经】六年春，晋赵盾、卫孙免侵陈。夏四月。秋八月，螽。冬十月。<br>
<br>
　　【传】六年春，晋、卫侵陈，陈即楚故也。<br>
<br>
　　夏，定王使子服求后于齐。<br>
<br>
　　秋，赤狄伐晋。围怀，及邢丘。晋侯欲伐之。中行桓子曰：“使疾其民，以盈其贯，将可殪也。《周书》曰：‘殪戎殷。’此类之谓也。”<br>
<br>
　　冬，召桓公逆王后于齐。<br>
<br>
　　楚人伐郑，取成而还。<br>
<br>
　　郑公子曼满与王子伯廖语，欲为卿。伯廖告人曰：“无德而贪，其在《周易》《丰》ⅲⅵ之《离》ⅵⅵ，弗过之矣。”间一岁，郑人杀之。<br>
<br>

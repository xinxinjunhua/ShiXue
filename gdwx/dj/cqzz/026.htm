			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　【经】十有四年春正月，公会郑伯于曹。无冰。夏五，郑伯使其弟语来盟。<br>
<br>
　　秋八月壬申，御廪灾。乙亥，尝。冬十有二月丁巳，齐侯禄父卒。宋人以齐人、蔡人、卫人、陈人伐郑。<br>
<br>
　　【传】十四年春，会于曹。曹人致饩，礼也。<br>
<br>
　　夏，郑子人来寻盟，且修曹之会。<br>
<br>
　　秋八月壬申，御廪灾。乙亥，尝。书，不害也。<br>
<br>
　　冬，宋人以诸侯伐郑，报宋之战也。焚渠门，入，及大逵。伐东郊，取牛首。<br>
<br>
　　以大宫之椽归，为卢门之椽。<br>

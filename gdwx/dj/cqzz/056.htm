			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　【经】二十有六年春，公伐戎。夏，公至自伐戎。曹杀其大夫。秋，公会宋人、齐人，伐徐。冬十有二月癸亥，朔，日有食之。<br>
<br>
　　【传】二十六年春，晋士蒍为大司空。<br>
<br>
　　夏，士蒍城绛，以深其宫。<br>
<br>
　　秋，虢人侵晋。冬，虢人又侵晋。<br>
<br>				</td>

				宣公七年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　【经】七年春，卫侯使孙良夫来盟。夏，公会齐侯伐莱。秋，公至自伐莱。<br>
<br>
　　大旱。冬，公会晋侯、宋公、卫侯、郑伯、曹伯于黑壤。<br>
<br>
　　【传】七年春，卫孙桓子来盟，始通，且谋会晋也。<br>
<br>
　　夏，公会齐侯伐莱，不与谋也。凡师出，与谋曰及，不与某曰会。<br>
<br>
　　赤狄侵晋，取向阴之禾。<br>
<br>
　　郑及晋平，公子宋之谋也，故相郑伯以会。冬，盟于黑壤，王叔桓公临之，以谋不睦。<br>
<br>
　　晋侯之立也，公不朝焉，又不使大夫聘，晋人止公于会，盟于黄父。公不与盟，以赂免。故黑壤之盟不书，讳之也。<br>
<br>

				庄公二十五年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　【经】二十有五年春，陈侯使女叔来聘。夏五月癸丑，卫侯朔卒。六月辛未，朔，日有食之，鼓，用牲于社。伯姬归于杞。秋，大水，鼓，用牲于社、于门。<br>
<br>
　　冬，公子友如陈。<br>
<br>
　　【传】二十五年春，陈女叔来聘，始结陈好也。嘉之，故不名。<br>
<br>
　　夏六月辛未，朔，日有食之。鼓，用牲于社，非常也。唯正月之朔，慝未作，日有食之，于是乎用币于社，伐鼓于朝。<br>
<br>
　　秋，大水。鼓，用牲于社、于门，亦非常也。凡天灾，有币无牲。非日月之眚，不鼓。<br>
<br>
　　晋士蒍使群公子尽杀游氏之族，乃城聚而处之。<br>
<br>
　　冬，晋侯围聚，尽杀群公子。<br>
<br>

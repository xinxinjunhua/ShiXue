				哀公十八年</td>

<tr>
<td>
<br>
　　【传】十八年春，宋杀皇瑗。公闻其情，复皇氏之族，使皇缓为右师。<br>
<br>
　　巴人伐楚，围鄾。初，右司马子国之卜也，观瞻曰：“如志。”故命之。及巴师至，将卜帅。王曰：“宁如志，何卜焉？”使帅师而行。请承，王曰：“寝尹、工尹，勤先君者也。”三月，楚公孙宁、吴由于、薳固败巴师于鄾，故封子国于析。君子曰：“惠王知志。《夏书》曰‘官占，唯能蔽志，昆命于元龟。’其是之谓乎！《志》曰：‘圣人不烦卜筮。’惠王其有焉！”<br>
<br>
　　夏，卫石圃逐其君起，起奔齐。卫侯辄自齐复归，逐石圃，而复石魋与大叔遗。<br>
<br>

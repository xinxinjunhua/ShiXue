<hr color="#FFFFFF">
</td>

<tr>
<td>
<br>
　　【经】元年春王正月。三月，夫人孙于齐。夏，单伯送王姬。秋，筑王姬之馆于外。冬十月乙亥，陈侯林卒。王使荣叔来锡桓公命。王姬归于齐。齐师迁纪、郱、鄑、郚。<br>
<br>
　　【传】元年春，不称即位，文姜出故也。<br>
<br>
　　三月，夫人孙于齐。不称姜氏，绝不为亲，礼也。<br>
<br>
　　秋，筑王姬之馆于外。为外，礼也。<br>
<br>				</td>

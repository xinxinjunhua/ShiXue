<tr>
<td>
<br>
　　【传】二十一年夏五月，越人始来。<br>
<br>
　　秋八月，公及齐侯、邾子盟于顾。齐有责稽首，因歌之曰：“鲁人之皋，数年不觉，使我高蹈。唯其儒书。以为二国忧。”<br>
<br>
　　是行也，公先至于阳谷。齐闾丘息曰：“君辱举玉趾，以在寡君之军。群臣将传遽以告寡君，比其复也，君无乃勤。为仆人之未次，请除馆于舟道。”辞曰：“敢勤仆人？”<br>
<br>

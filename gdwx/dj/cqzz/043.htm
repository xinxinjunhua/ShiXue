			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　【经】十有三年春，齐侯、宋人、陈人、蔡人、邾人会于北杏。夏六月，齐人灭遂。秋七月。冬，公会齐侯盟于柯。<br>
<br>
　　【传】十三年春，会于北杏，以平宋乱。遂人不至。<br>
<br>
　　夏，齐人灭遂而戍之。<br>
<br>
　　冬，盟于柯，始及齐平也。<br>
<br>
　　宋人背北杏之会。<br>
<br>

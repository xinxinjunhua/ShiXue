				隐公二年</td>

			<tr>
				<td align="center">
<hr color="#FFFFFF">
</td>
</tr>
<tr>
<td>
<br>
　　【经】二年春，公会戎于潜。夏五月，莒人入向。无骇帅师入极。秋八月庚辰，公及戎盟于唐。九月，纪裂繻来逆女。冬十月，伯姬归于纪。纪子帛、莒子盟于密。十有二月乙卯，夫人子氏薨。郑人伐卫。<br>
<br>
　　【传】二年春，公会戎于潜，修惠公之好也。戎请盟，公辞。<br>
<br>
　　莒子娶于向，向姜不安莒而归。夏，莒人入向，以姜氏还。<br>
<br>
　　司空无骇入极，费庈父胜之。<br>
<br>
　　戎请盟。秋，盟于唐，复修戎好也。<br>
<br>
　　九月，纪裂繻来逆女，卿为君逆也。<br>
<br>
　　冬，纪子帛、莒子盟于密，鲁故也。<br>
<br>
　　郑人伐卫，讨公孙滑之乱也。<br>
<br>				</td>

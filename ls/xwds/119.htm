<tr><td class="t50">李嗣本传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　嗣本，本姓张氏，雁门人也。世为铜冶镇将。嗣本少事太祖，太祖爱之，赐以姓名，养为子。从击居庸关，以功迁义儿军使。从破王行瑜，迁威远军使。<br /><br />
　　从攻罗弘信，以先锋兵破汤阴。从庄宗破潞州夹城。累以战功迁代州刺史、云州防御使、振武节度使，号威信可汗。<br /><br />
　　天祐十三年，从庄宗击刘鄩于故元城，下洺、磁诸州，六月，还军振武。<br /><br />
　　契丹入代北，攻蔚州，嗣本战殁。<br /><br />

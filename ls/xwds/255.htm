<tr><td class="t50">史圭传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　史圭，常山石邑人也。为人明敏好学。为宁晋、乐寿县令，有善政，县人立碑以颂之。郭崇韬镇成德，辟为从事。明宗时，为尚书郎。安重诲为枢密使，荐圭直学士。<br /><br />
　　故事，直学士职虽清，而承领文书，参掌庶务，与判官无异。重诲素不知书，倚圭以备顾问，始白许圭升殿侍立。枢密直学士升殿自圭始。改尚书右丞，判吏部铨事。重诲败死，圭出为贝州刺史。罢归常山，闭门绝人事，出入闾里乘辎軿车。<br /><br />
　　晋高祖立，召拜刑部侍郎、盐铁副使，迁吏部侍郎，分知铨事，有能名。以疾罢，卒于常山。<br /><br />

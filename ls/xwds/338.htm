<tr><td class="t50">牂牁蛮</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　牂牁蛮，在辰州西千五百里，以耕植为生，而无城郭聚落，有所攻击，则相屯聚。刻木为契。其首领姓谢氏，其名见于唐。<br /><br />
　　至天成二年尝一至，其使者曰清州八郡刺史宋朝化，冠带如中国，贡草豆蔻二万个、朱砂五百两、蜡二百斤。<br /><br />

<tr><td class="t50">臣传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　呜呼！孟子谓“春秋无义战”，予亦以谓五代无全臣。无者，非无一人，盖仅有之耳，余得死节之士三人焉。其仕不及于二代者，各以其国系之，作梁、唐、晋、汉、周《臣传》。其余仕非一代，不可以国系之者，作《杂传》。<br /><br />
　　夫入于杂，诚君子之所羞，而一代之臣，未必皆可贵也，览者详其善恶焉。<br /><br />

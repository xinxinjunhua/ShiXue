<tr><td class="t50">义儿传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　呜呼！世道衰，人伦坏，而亲疏之理反其常，干戈起于骨肉，异类合为父子。开平、显德五十年间，天下五代而实八姓，其三出于丐养。盖其大者取天下，其次立功名、位将相，岂非因时之隙，以利合而相资者邪！<br /><br />
　　唐自号沙陀，起代北，其所与俱皆一时雄杰虣武之士，往往养以为儿，号“义儿军”，至其有天下，多用以成功业，及其亡也亦由焉。太祖养子多矣，其可纪者九人，其一是为明宗，其次曰嗣昭、嗣本、嗣恩、存信、存孝、存进、存璋、存贤。作《义儿传》。<br /><br />
</td></tr>

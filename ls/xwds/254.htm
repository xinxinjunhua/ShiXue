<tr><td class="t50">王权传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王权，字秀山，太原人也。唐左仆射起之曾孙。父荛，官至右司郎中。权举进士，为右补阙。<br /><br />
　　唐亡，事梁为职方员外郎、知制诰、翰林学士，累迁御史中丞。唐庄宗灭梁，贬权随州司马。起为右庶子，累迁户部尚书。晋高祖时为兵部尚书。<br /><br />
　　是时，高祖以父事契丹，权当奉使，叹曰：“我虽不才，安能稽颡于穹庐乎？”因辞不行，坐是停任。逾年以太子少傅致仕。卒，年七十入，赠左仆射。<br /><br />
</td></tr>

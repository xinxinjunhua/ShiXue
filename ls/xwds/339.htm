<tr><td class="t50">昆明</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　昆明，在黔州西南三千里外，地产羊马。其人椎髻、跣足、披氈，其首领披虎皮。<br /><br />
　　天成二年，尝一至，其首领号昆明大鬼主，罗殿王、普露静王九部落，各遣使者来，使者号若土，附牂牁以来。<br /><br />

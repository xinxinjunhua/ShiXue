<tr><td class="t50">尹晖传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　尹晖者，魏州大名人也。从废帝入洛阳，而晋高祖来朝，与晖遇于道。晖时犹为严卫指挥使，恃先降功，不为高祖屈，马上横鞭揖之，高祖怒，白废帝晖不可与名籓。乃以为应州节度使。<br /><br />
　　晋高祖入立，罢为右卫大将军。<br /><br />
　　范延光反，以书招晖，晖惧，出奔淮南，为人所杀。<br /><br />
　　有子勋。<br /><br />
</td></tr>

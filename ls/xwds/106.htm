<tr><td class="t50">翟进宗、张万迪传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　翟进宗、张万迪者，皆不知其何人也。初皆事唐，后事晋，进宗为淄州刺史，万迪为登州刺史。杨光远反，以骑兵数百胁取二刺史至青州，万迪听命，而进宗独不屈，光远遂杀进宗。出帝赠进宗左武卫上将军。<br /><br />
　　及光远平，曲赦青州，虽光远子孙皆见慰释，而独不赦万迪，暴其罪而斩之。<br /><br />
　　诏求进宗尸，加礼归葬，葬事官给，以其子仁钦为东头供奉官。<br /><br />

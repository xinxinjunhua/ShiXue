<tr><td class="t50">陆思铎传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　陆思铎，澶州临黄人也。少事梁为宣武军卒，以善射知名。累迁拱辰左厢都指挥使，领恩州刺史。<br /><br />
　　梁、晋相拒河上，思铎镂其姓名于箭筈以射晋军，而矢中庄宗马鞍，庄宗拔矢，见思铎姓名，奇之。其后灭梁，思铎谒见，庄宗出其矢以示之，思铎伏地请死，庄宗慰而起之，拜龙武右厢都指挥使。<br /><br />
　　晋高祖时，为陈、蔡二州刺史。卒年五十四。<br /><br />
　　思铎在陈州，有善政，临终戒其子曰：“陈人爱我，我死则葬焉。”遂葬于陈州。<br /><br />

<tr><td class="t50">黑水靺鞨</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　黑水靺鞨，本号勿吉。当后魏时见中国。<br /><br />
　　其国，东至海，南界高丽，西接突厥，北邻室韦，盖肃慎氏之地也。<br /><br />
　　其众分为数十部，而黑水靺鞨最处其北，尤劲悍，无文字之记。<br /><br />
　　其兵，角弓、楛矢。<br /><br />
　　同光二年，黑水兀儿遣使者来，其后常来朝贡，自登州泛海出青州。明年，黑水胡独鹿亦遣使来。兀儿、胡独鹿若其两部酋长，各以使来。而其部族、世次、立卒，史皆失其纪。<br /><br />
　　至长兴三年，胡独鹿卒，子桃李花立，尝请命中国，后遂不复见云。<br /><br />

<tr><td class="t50">李存璋传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　存璋，字德璜，初与康群立、恭志勤等从太祖入关，破黄巢，累迁义儿军使。太祖病革，存璋与张承业等受顾命，立庄宗为晋王，晋王以存璋为河东马步军使。晋自先王时，尝优假军士，军士多犯法逾禁，庄宗新立，尤患之，存璋一切绳之以法，境内为之清肃。<br /><br />
　　从攻夹城，战柏乡，以功迁汾州刺史。<br /><br />
　　庄宗与刘鄩战于魏博，梁遣王檀来，乘虚袭太原，存璋以汾州兵入太原距守，以功迁大同军防御使，遂为节度使。<br /><br />
　　天祐十九年以疾卒。追赠太尉。<br /><br />

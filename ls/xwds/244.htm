<tr><td class="t50">崔居俭传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　崔居俭，清河人也。祖蠡、父荛皆为唐名臣。居俭美文辞，风骨清秀，少举进士。<br /><br />
　　梁贞明中，为中书舍人、翰林学士、御史中丞。唐庄宗时，为刑部侍郎、太常卿。崔氏自后魏、隋、唐与卢、郑皆为甲族，吉凶之事，各著家礼。至其后世子孙，专以门望自高，为世所嫉。<br /><br />
　　明宗崩，居俭以故事为礼仪使，居俭以祖讳蠡，辞不受，宰相冯道即徙居俭为秘书监。居俭历兵、吏部侍郎、尚书左丞、户部尚书。<br /><br />
　　晋天福四年卒，年七十，赠右仆射。<br /><br />
　　居俭拙于为生，居显官，衣常乏，死之日贫不能葬，闻者哀之。<br /><br />

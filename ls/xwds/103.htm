<tr><td class="t50">姚洪传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　姚洪，本梁之小校也。自董璋为梁将，洪尝事璋，后事唐为指挥使。长兴中，遣洪将千人戍阆州。<br /><br />
　　董璋反，遣人以书招洪，洪得璋书，辄投厕中。<br /><br />
　　后璋兵攻破阆州，执洪，璋曰：“尔为健儿，我遇汝厚，奈何负我邪？”<br /><br />
　　洪骂曰：“老贼！尔昔为李七郎奴，扫马粪，得一脔残炙，感恩不已。今天子用尔为节度使，何苦反邪？吾能为国家死，不能从人奴以生！”<br /><br />
　　璋怒，然镬于前，令壮士十人刲其肉而食，洪至死大骂。<br /><br />
　　明宗闻之泣下，录其二子，而厚恤其家。<br /><br />

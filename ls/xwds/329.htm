<tr><td class="t50">突厥</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　突厥，国地、君世、部族、名号、物俗，见于唐著矣。至唐之末。为诸夷所侵，部族微散。<br /><br />
　　五代之际，尝来朝贡。同光三年，浑解楼来。天成二年，首领张慕晋来。长兴二年，首领杜阿熟来。天福六年，遣使者薛同海等来。凡四至，其后不复来。然突厥于时最微，又来不数，故其君长史皆失不能纪。<br /><br />
</td></tr>

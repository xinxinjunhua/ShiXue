<tr><td class="t50">王松传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王松，父徽，为唐僖宗宰相。松举进士，后唐时，历刑部郎中，唐末，从事方镇。<br /><br />
　　晋高祖镇太原，辟松节度判官。晋高祖即位，拜右谏议大夫，累拜工部尚书。<br /><br />
　　出帝北迁，萧翰立许王从益于京师，以松为左丞相。<br /><br />
　　汉高祖入洛，先遣人驰诏东京百官尝授伪命者皆焚之，使勿自疑，由是御史台悉敛百官伪敕焚之。松以手指其胸，引郭子仪自诮，以语人曰：“此乃二十四考中书令也。”闻者笑之。<br /><br />
　　后松子仁宝为李守贞河中支使，守贞反，松以子故上书自陈，高祖怜之，但使解职而已。松有田城东，岁时往来京师，以疾卒。<br /><br />

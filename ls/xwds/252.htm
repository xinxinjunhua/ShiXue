<tr><td class="t50">薛融传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　薛融，汾州平遥人也。少以儒学知名，唐明宗时为右补阙，直弘文馆。<br /><br />
　　晋高祖镇太原，融为观察判官。高祖徙郓，欲据太原拒命，延见宾佐，问以可否，而坐中或赞成之，或恐惧不敢言，融独从容对曰：“融本儒生尔，军旅之事，未尝学也，进退存亡之理，岂易言哉！”高祖不之责也。<br /><br />
　　高祖入立，拜吏部郎中，兼侍御史知杂事。累拜左谏议大夫，迁中书舍人。融曰：“文辞非臣所长也。”遂辞不拜。时诏修洛阳大内，融上疏切谏，高祖褒纳其言，即诏罢其役。迁御史中丞，改尚书右丞，分司西京。卒，年六十。<br /><br />

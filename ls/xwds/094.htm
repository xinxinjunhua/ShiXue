<tr><td class="t50">后赞传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　后赞，兖州瑕丘人。其母，倡也。赞幼善讴，事张延朗。延朗死，赞更事汉高祖，高祖爱之，以为牙将。高祖即位，拜飞龙使，隐帝尤爱幸之。杨邠等执政，赞久不得迁，乃共谋杀邠等。<br /><br />
　　邠等死，隐帝悔之，赞与允明等番休侍帝，不欲左右言已短。<br /><br />
　　隐帝兵败北郊，赞奔兖州，慕容彦超执送京师，枭首于市。<br /><br />
</td></tr>

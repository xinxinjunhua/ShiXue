<tr><td class="t50">新罗</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　新罗，弁韩之遗种也。其国地、君世、物俗见于唐。其大族曰金氏、朴氏，自唐高祖时封金真为乐浪郡王，其后世常为君长。<br /><br />
　　同光元年，新罗国王金朴英遣使者来朝贡。<br /><br />
　　长兴四年，权知国事金溥遣使来。朴英、溥世次、卒立，史皆失其纪。自晋已后不复至。<br /><br />

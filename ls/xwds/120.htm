<tr><td class="t50">李嗣恩传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　嗣恩，本姓骆，吐谷浑部人也。少事太祖，能骑射，为铁林军将，稍以战功迁突阵指挥使，赐姓名，以为子。从败康怀英于河西，迁左厢马军都指挥使。从李嗣昭援朱友谦于河中，与梁兵力战，槊中其口，战不已。迁辽州刺史。<br /><br />
　　从庄宗入魏，迁天雄军马步都指挥使。刘鄩攻太原，兵趣乐平，嗣恩从后追之，自佗道先入太原以守。鄩兵去，嗣恩亦以兵会庄宗于魏，从战于莘。迁代州刺史、石岭关已北都知兵马使、振武节度使。<br /><br />
　　天祐十五年，卒于太原。追赠太尉。<br /><br />

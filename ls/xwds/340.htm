<tr><td class="t50">占城</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　占城，在西南海上。<br /><br />
　　其地方千里，东至海，西至云南，南邻真脑，北抵驩州。<br /><br />
　　其人，俗与大食同。<br /><br />
　　其乘，象、马；其食，稻米、水兕、山羊。鸟兽之奇，犀、孔雀。<br /><br />
　　自前世未尝通中国。显德五年，其国王因德漫遣使者莆诃散来，贡猛火油八十四瓶、蔷薇水十五瓶，其表以贝多叶书之，以香木为函。猛火油以洒物，得水则出火。蔷薇水，云得自西域，以洒衣，虽敝而香不灭。<br /><br />
　　五代，四夷见中国者，远不过于阗、占城。史之所纪，其西北颇详，而东南尤略，盖其远而罕至，且不为中国利害云。<br /><br />

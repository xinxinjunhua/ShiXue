<tr><td class="t50">四夷附录序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　呜呼，夷狄居处饮食，随水草寒暑徙迁，有君长部号而无世族、文字记别，至于弦弓毒矢，强弱相并，国地大小，兴灭不常，是皆乌足以考述哉！惟其服叛去来，能为中国利害者，此不可以不知也。<br /><br />
　　自古夷狄之于中国，有道未必服，无道未必不来，盖自因其衰盛。虽尝置之治外，而羁縻制驭恩威之际，不可失也。其得之未必为利，失之有足为患，可不慎哉！作《四夷附录》。<br /><br />

<tr><td class="t50">郭允明传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　郭允明，少为汉高祖厮养，高祖爱之，以为翰林茶酒使。隐帝尤狎爱之，允明益骄横无顾避，大臣不能禁。允明使荆南高保融，车服导从如节度使，保融待之甚厚。<br /><br />
　　允明乃阴使人步测其城池高下，若为攻取之计者以动之。荆人皆恐，保融厚赂以遗之。迁飞龙使。已而李业与允明谋杀杨邠等，是日无云而昏，雾雨如泣，日中，载邠等十余尸暴之市中。允明手杀邠等诸子于朝堂西庑，王章婿张贻肃血流逆注。隐帝败于北郊，还至封丘门，不得入，帝走赵村，允明从后追之，弑帝于民舍，乃自杀。<br /><br />
</td></tr>

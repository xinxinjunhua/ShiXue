<tr><td class="t50">十国世家序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　呜呼！自唐失其政，天下乘时，黥髡盗贩，衮冕峨巍。吴暨南唐，奸豪窃攘。蜀险而富，汉险而贫，贫能自强，富者先亡。闽陋荆蹙，楚开蛮服。剥剽弗堪，吴越其尤。牢牲视人，岭皞遭刘。百年之间，并起争雄，山川亦绝，风气不通。<br /><br />
　　语曰：清风兴，群阴伏；日月出，爝火息。故真人作而天下同。作《十国世家》。<br /><br />

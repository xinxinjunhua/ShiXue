<tr><td class="t50">渤海</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　渤海，本号靺鞨，高丽之别种也。唐高宗灭高丽，徙其人散处中国，置安东都护府于平壤以统治之。<br /><br />
　　武后时，契丹攻北边，高丽别种大乞乞仲象与靺鞨酋长乞四比羽走辽东，分王高丽故地，武后遣将击杀乞四比羽，而乞乞仲象亦病死。仲象子祚荣立，因并有比羽之众，其众四十万人，据挹娄，臣于唐。<br /><br />
　　至中宗时，置忽汗州，以祚荣为都督，封渤海郡王，其后世遂号渤海。<br /><br />
　　其贵族姓大氏，开平元年，国王大諲撰遣使者来，讫显德常来朝贡。其国土物产，与高丽同。諲撰世次、立卒，史失其纪。<br /><br />

<tr><td class="t50">相里金传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　相里金，字奉金，并州人也。为人勇悍，而能折节下士。事晋王，为五院军队长。梁、晋战柏乡、胡柳，皆有功，迁黄甲指挥使。<br /><br />
　　同光中，拜忻州刺史。是时诸州皆用武人，多以部曲主场务，渔蠹公私，以利自入，金独禁部曲不与事，厚其给养，使掌家事而已。迁陇州防御使。废帝起兵凤翔，驰檄四邻，四邻未有应者，独金首遣判官薛文遇见废帝，往来计事。<br /><br />
　　废帝即位，德之，拜保义军节度使。<br /><br />
　　晋高祖起太原，废帝以金为太原四面步军都指挥使。<br /><br />
　　高祖入立，徙镇建雄，罢为上将军。<br /><br />
　　天福五年卒，赠太师。<br /><br />

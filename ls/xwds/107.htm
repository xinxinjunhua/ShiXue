<tr><td class="t50">沈斌传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　沈斌，字安时，徐州下邳人也。少为军卒，事梁为拱辰都指挥使。后事唐，从魏王继岌破蜀，平康延孝，以功为虢州刺史，历随、赵等八州刺史。<br /><br />
　　晋开运元年，为祁州刺史。契丹犯塞至于榆林，过祁州，斌以谓契丹深入晋地而归兵羸乏可击，即以州兵邀之。契丹以精骑划门，斌兵多死，城中无备，虏将赵延寿留兵急攻之，延寿招斌降，斌从城上骂延寿曰：“公父子误计，陷于腥膻，忍以犬羊之众，残贼父母之邦，斌能为国死尔，不能效公所为也！”<br /><br />
　　已而城陷，斌自尽，其家属皆没于虏。<br /><br />

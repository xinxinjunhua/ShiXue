<tr><td class="t50">折从阮传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　折从阮，字可久，初名从远，避汉高祖名，改为阮，云中人也。其父嗣伦，为麟州刺史。从阮为人，温恭长者，居父丧，以孝闻。唐庄宗镇太原，以为牙将，后以为府州刺史。<br /><br />
　　晋出帝与契丹败盟，从阮以兵攻契丹，取其城堡十余，迁本州团练使，兼领朔州刺史、安北都护、振武军节度使、契丹西南面行营马步军都虞候。汉高祖入立，于府州建永安军，以从阮为节度使。<br /><br />
　　明年，以其族朝京师，徙镇武胜，即拜从阮子德扆为府州团练使。周太祖入立，从阮历徙宣义、保义、静难三镇。<br /><br />
　　显德二年，罢还京师，行至洛阳卒，赠中书令。<br /><br />

<tr><td class="t50">程福赟传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　程福赟者，不知其世家。为人沉厚寡言而有勇。少为军卒，以战功累迁洺州团练使。<br /><br />
　　晋出帝时，为奉国右厢都指挥使。<br /><br />
　　开运中，契丹入寇，出帝北征，奉国军士乘间夜纵火焚营，欲因以为乱，福赟身自救火被伤，火灭而乱者不得发。福赟以为契丹且大至，而天子在军，京师虚空，不宜以小故动摇人听，因匿其事不以闻。军将李殷位次福赟下，利其去而代之，因诬福赟与乱者同谋，不然何以不奏。<br /><br />
　　出帝下福赟狱，人皆以为冤，福赟终不自辨以见杀。<br /><br />

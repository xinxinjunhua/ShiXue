<tr><td class="t50">南平世家·高保勖</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　保勖字省躬，从诲第十子也。保融卒，拜节度使。<br /><br />
　　[建隆]三年，保勖疾，谓其将梁延嗣曰：“我疾遂不起，兄弟孰可付之后事者？”延嗣曰：“公不念贞懿王乎？先王寝疾，以军府付公，今先王子继冲长矣。”保勖曰：“子言是也。”即以继冲判内外兵马。十一月，保勖卒，年三十九，赠侍中。<br /><br />
　　保融之子继冲立。<br /><br />

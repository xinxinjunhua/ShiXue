<tr><td class="t50">裴羽传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　裴羽，字用化，其父贽，相唐僖宗，官至司空。羽以一品子为河南寿安尉。事梁为御史台主簿，改监察御史。<br /><br />
　　唐明宗时，为吏部郎中，与右散骑常侍陆崇使于闽，为海风所飘至钱塘。是时，吴越王钱镠与安重诲有隙，唐方绝镠朝贡，羽等被留经岁，而崇以疾卒。后镠遣羽还，羽求载崇尸与俱归。镠初不许，羽以语感动镠，镠恻然许之，因附羽表自归。明宗得镠表大喜，由是吴越复通于中国。羽护崇丧至京师，及其橐装还其家，士人皆多羽之义。<br /><br />
　　羽周太祖时为左散骑常侍，卒，赠户部尚书。<br /><br />

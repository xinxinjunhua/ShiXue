<tr><td class="t50">袁建丰传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　袁建丰，不知其世家也。晋王讨黄巢至华阴，阑得之，时方九岁，爱其俊爽，收养之。长习骑射，为铁林都虞候，从击王行瑜、李匡威，以功迁突阵指挥使。从庄宗破夹城，战柏乡，迁左厢马军指挥使。<br /><br />
　　明宗为衙内指挥使，建丰为副使，从庄宗入魏，取卫、磁、洺三州，拜洺州刺史。击梁将王千，斩首千余级，获其将校七十余人。迁相州刺史。从战胡柳，指挥使孟谦据相州叛，建丰还讨平之。徙隰州刺史，病风废。<br /><br />
　　明宗即位，以旧恩召还京师，亲幸其第，抚慰甚厚，加检校太尉，遥领镇南军节度使，俾食其俸以卒，赠太尉。<br /><br />
</td></tr>

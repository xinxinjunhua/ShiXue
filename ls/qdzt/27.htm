<td class="t50">辽兴宗萧皇后传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　兴宗皇后萧氏，应州人，法天皇后弟枢密楚王萧孝穆之女也。容德兼美，曲尽和敬。生三子，长曰洪基，即道宗；次曰纥根，名洪道，封燕王；又次曰寿千，名洪德，封晋王。帝酷好沙门，纵情无检，后每伺帝有所失，随即匡谏，多所弘益。洪基即位，尊为睿圣洪慈顺天皇太后。清宁五年后崩，与帝合葬。<br /><br />
</td></tr>

<td class="t50">萧孝穆传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　萧孝穆，番名陈六，法天皇后兄也。初，后选入宫为圣宗夫人，授大将军。后封元妃，迁北宰相，封燕王。孝穆机悟有才艺，驰马立射五的，时人莫能及。圣宗在位，喜其忠谨，与参军国大谋。时渤海反于东京，有众数万，命孝穆为行营兵马都统讨之。大酋宿石真栅于金闾山上，险峻不可攻，孝穆为宣扬恩意，开其自新，凡所招降七万余户而还，以功授东辽王。圣宗疾亟，急召赴阙。圣宗崩，以辅立功封晋王。又纳女为兴宗后，授枢密使、楚国王。<br /><br />
</td></tr>

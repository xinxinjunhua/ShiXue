<td class="t50">宫室制度</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　十宫各有民户，出兵马，阿保机曰洪义宫，德光曰永兴宫，兀欲曰积庆宫，述律曰延昌宫，明记曰章敏宫，突欲曰长宁宫，燕燕曰崇德宫，隆绪曰兴圣宫，隆庆曰敦睦宫，隆运曰文忠王府。又有四楼，在上京者曰西楼，木叶山曰南楼，龙化州曰东楼，唐州曰北楼。凡受册，积柴升其上，大会蕃夷其下，已，乃燔柴告天，而汉人不得预。有诨子部百人，夜以五十人番直，四鼓将尽，歌于帐前，号曰“聒帐”。每谒木叶山，即射柳枝，诨子唱番歌前导，弹胡琴和之，已事而罢。<br /><br />

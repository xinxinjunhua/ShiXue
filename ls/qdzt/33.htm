<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　孝文皇太弟<br /><br />
　　孝文皇太弟隆庆，番名菩萨奴，母曰萧氏，景宗第二子。生而岐嶷，俨若成人。幼时与群儿戏，为行伍战阵法，指挥意气，无敢违者。景宗奇之，曰：“此吾家生马驹也。”长善骑射，骁捷如风。定州之战，隆庆封为梁王，加兵马大元帅，从其母萧后以行，力战深入，与擒王继忠有功，拜西京留守，封秦晋国王，又拜尚书令。寻薨，葬祖州，谥曰孝文皇太弟。<br /><br />

<td class="t50">天祚帝萧皇后传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　海滨王后萧氏，平州人，节度使萧槁剌之女也。奉先、保先兄弟皆缘后宠，柄任当朝。后性闲淑有则度，遭女真之乱，天祚荒淫，后不能违，以至祸败焉。山金司之祸，后并被擒，粘罕纳为次室。其后耶律余睹云中起兵，兀室诛余睹并及于后。兀室回至燕山，请罪于粘罕曰：“萧氏，契丹天祚元妃也。与兄实乃仇雠，不得已而从，彼素忍死以侍兄者，将有待于今日也。今既见事无成，恐或不利于兄；且兄横行天下，万夫莫当，而此人帷幄之间，可以寸刃害兄于不测矣。事当预防，以爱兄故，已擅杀之。”粘罕起而谢之，既而泣下。<br /><br />

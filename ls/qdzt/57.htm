<td class="t50">李俨传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李俨，本汉地人，天祚嬖臣也。少而狡桀，倜傥不群，轩然夷倨，才济其奸。与萧奉先雅相厚善。初为内侍省给事，累迁至中书供奉，积官至南面宰相，封漆水郡王。<br /><br />
　　俨资猾性巧，善谀佞人，在天祚朝秉国枢柄凡十五年。女真连年之乱，俨与奉先蒙蔽为欺，以至于亡，天祚不悟也。俨尝与知枢密院事牛温有隙，各进所亲厚，朋党纷然，恃奉先为内主，温不能胜。及俨死，奉先又荐其侄处温为相，竟至亡国。惜也，俨不逮稾街之戮云。<br /><br />
</td></tr>

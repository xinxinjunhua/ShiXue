<td class="t50">渔猎时候</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　每岁正月上旬，出行射猎，凡六十日。然后并挞鲁河凿冰钓鱼，冰泮，即纵鹰鹘以捕鹅鴈。夏居炭山，或上陉避暑。七月上旬，复入山射鹿，夜半，令猎人吹角俲鹿鸣，既集而射之。宋真宗时，晁迥往贺生辰，还，言始至长泊，泊多野鹅、鸭，国主射猎，领帐下骑，击扁鼓遶泊，惊鹅、鸭飞起，乃纵海东青击之，或亲射焉。国主皆佩金玉锥，号杀鹅杀鸭锥。每初获，即拔毛插之，以鼓为坐，遂纵饮，最以此为乐。又好以铜及石为槌，以击兔。每秋则衣褐裘，呼鹿射之。夏月以布易毡帐，籍草围棋、双陆，或深涧张鹰。<br /><br />

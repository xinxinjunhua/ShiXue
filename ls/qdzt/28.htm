<td class="t50">辽道宗皇后萧观音传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　道宗皇后萧氏，平州人，赠同平章事萧显烈女也。后生有神光之异，后入宫为芳仪，进位昭仪。生空古里，是为秦王，后名元吉，余子皆不育。道宗登位，后正位中宫，性恬淡寡欲。鲁王宗元之乱，道宗与同射猎，内外震恐，未知音耗，后勒兵镇帖中外，甚有声称。后崩，葬祖州。<br /><br />
</td></tr>

<td class="t50">萧守兴传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　萧守兴，番名喂呱，侍中解里钵长子也。始为祗候郎君、林牙、左宣徽使。景宗居藩，燕燕为妃；即位，册立为后。守兴以后父为侍中，共当国政。是时，景宗婴疾，北汉见僭叛悉平，南宋忧逼，屡遣蜡丸求援，而守兴柱石非材，兵势少弱，石岭关南之败，丧万余人。后又迁尚书令、封魏王，任遇弥坚。年既昏耄，事多狥私，吏有言韵微讹者，抉摘示明，朝廷以此患之，畏后不敢言。<br /><br />

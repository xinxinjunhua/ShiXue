<td class="t50">耶律洪道传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　燕王洪道，番名叱地好，道宗同母弟也。颇有武略，库莫奚侵扰，诏洪道讨之。洪道伏兵林中，佯败而走，奚掠辎重，洪道与伏兵合击之，尽殪。后渤海高颓乐反，又命洪道讨之。终于燕京留守，封燕王。<br /><br />
</td></tr>

<td class="t50">耶律隆裕传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　齐国王隆裕，番名高七，母曰萧氏，景宗第三子。性沉毅，美姿容。始封郑王，遥授西南面招讨使，拜吴国王。自少时慕道，见道士则喜。后为东京留守，崇建宫观，备极辉丽，东西两廊，中建正殿，接连数百间。又别置道院，延接道流，诵经宣醮，用素馔荐献，中京往往化之。后萧太后一年而薨，追封齐国王。<br /><br />
</td></tr>

<td class="t50">刘珂传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘珂，平章事晞之次子也。尚世宗妹燕国公主。少善射，以材能称。赋性谨重，未尝有过，为太宗所知。太宗忿石晋负恩，连年南牧，战定州，时深入，帝马陷泥泞中，珂下马奉帝出，身被数十疮，流血满体，太宗壮之。迁林牙、行宫都部署、西北路兵马招讨使。从入大梁，授同知京府事，寻授汉人枢密使，封吴王。<br /><br />
</td></tr>

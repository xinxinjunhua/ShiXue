<td class="t50">族姓原始</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　契丹部族，本无姓氏，惟各以所居地名呼之，婚嫁不拘地里。至阿保机变家为国之后，始以王族号为“横帐”，仍以所居之地名曰世里着姓。世里者，上京东二百里地名也。今有世里没里，<span class="zs">〔以汉语译之，谓之耶律氏。〕</span>复赐后族姓萧氏。番法，王族惟与后族通婚，更不限以尊卑；其王族、后族二部落之家，若不奉北主之命，皆不得与诸部族之人通婚；或诸部族彼此相婚嫁，不拘此限。<span class="zs">〔汉人等亦同此。〕</span>故北番惟耶律、萧氏二姓也。<br /><br />
</td></tr>

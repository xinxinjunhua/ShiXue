<td class="t50">耶律郎五传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律郎五，即耶律忠，国主族人也。<br /><br />
　　太宗南攻石晋，郎五扈从，累有战功。太宗入大梁，以郎五为镇宁节度使。<br /><br />
　　郎五性残虐，澶州人苦之。贼帅王琼率其徒千余人，袭据南城，北渡浮航，纵兵大掠，围郎五于牙城。郎五闻汉平邺都杜重威，常惧华人为变。未几，郎五与麻答等焚掠定州，悉驱其人弃城北去。方广千里，剽掠殆尽。<br /><br />
　　【萧麻耶律传论】<br /><br />
　　论曰：阴山异气，杀伐钟焉，运数所乘，山河改色。太宗德光，铁马中原；翰等诸人，分麾长骛。而溪壑难满，剽掠穷凶，而使忠臣郁愤恚之胸，生灵涂肝脑之血，不亦重可悲欤！<br /><br />

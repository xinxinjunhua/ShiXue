<td class="t50">述律鲁速传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　述律鲁速，太祖皇后兄也，蕃部人，世为酋长。少壮武有胆略，部人惮之。从太祖平奚有功，授统军使。卢文进自新州来奔，太祖岁入燕塞，鲁速以兵从。又从围周德威于幽州，机巧善智，城几克，会救至，退师。改授奚王府监军、东路兵马都统军。子屈列，尚奥哥公主。<br /><br />
</td></tr>

<td class="t50">试士科制</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　太祖龙兴朔漠之区，倥偬干戈，未有科目。数世后，承平日久，始有开辟。制限以三岁，有乡、府、省三试之设。乡中曰乡荐，府中曰府解，省中曰及第。时有秀才未愿起者，州县必根刷遣之。程文分两科，曰诗赋，曰经义，魁各分焉。三岁一试进士，贡院以二寸纸书及第者姓名给之，号“喜帖”。明日举按而出，乐作，及门，击鼓十二面，以法雷震。殿试，临期取旨，又将第一人特赠一官，授奉直大夫、翰林应奉文字。第二人、第三人止授从事郎，余并授从事郎。圣宗时，止以词赋、法律取士，词赋为正科，法律为杂科。若夫任子之令，不论文武并奏，荫亦有员数。<br /><br />

<td class="t50">辽穆宗萧皇后传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　穆宗皇后萧氏，幽州厌次人，父知璠，内供奉翰林承旨。后初产之日，有云气馥郁久之。幼有仪观，进趋轨则，帝居藩时纳为妃。暨即位，后正中宫。是时，契丹继代恬安，兵势少弱，中朝藩镇如南唐、北汉及李守贞之类，皆用蜡丸帛书求援以为强，帝不能甚应之。后性柔婉，不能规正，黑山之弒，帝酗忍罹祸焉。后无子，众共推立明记，是为景宗。<br /><br />
</td></tr>

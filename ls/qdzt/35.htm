<td class="t50">鲁王宗元传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　鲁王宗元，兴宗同母弟也。少而雄耿，狠愎过人。始封郑王，又加兵马大元帅，封晋国王。性极残忍，每出一囚犯死罪者，命众集射，斩而脔之，流血满前，饮啖自若。意志不臣，每伺时衅。洪基嗣立，奉长乐之命，以为皇叔。后因游猎伺间弒帝，左右遮救得免，宗元并其子洪孝受诛。<br /><br />
</td></tr>

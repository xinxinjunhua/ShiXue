<td class="t50">辽太宗萧皇后传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　太宗皇后萧氏，涿州人，辽兴节度使萧延思之女也。契丹所贵惟耶律与萧二姓，后一入宫，正位椒房，凡后族皆以萧为氏。后之生也，有异于常，及长聪慧，美姿容，帝甚宠敬之。生二子，长曰述律，后为穆宗，述轧篡弒之时，众所拥立；次曰蒙兀。太宗南入大梁，述律后专秉国事，后无所预，弟萧翰性残忍，后每戒其多杀。太宗崩于栾城，后时在国。后崩，与帝合丧；暨穆宗即位，立陵寝庙，建碑颂德。<br /><br />

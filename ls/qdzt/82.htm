<td class="t50">余尚书北语诗</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　余靖尚书使契丹，为北语诗，契丹爱之。再往，益亲。余诗云：“夜筵设罢<span class="zs">〔侈盛也〕</span>臣拜洗，<span class="zs">〔受赐也〕</span>两朝厥荷<span class="zs">〔通好也〕</span>情干勒。<span class="zs">〔厚重也〕</span>微臣稚鲁<span class="zs">〔拜舞也〕</span>祝若统，<span class="zs">〔福祐也〕</span>圣寿铁摆<span class="zs">〔嵩高也〕</span>俱可忒。<span class="zs">〔无极也。〕</span>”国主举大杯，谓余曰：“能道此，<span class="zs">〔人木〕</span>为卿饮。”复举之，国主大笑，遂为酬觞。<br /><br />

<td class="t50">萧延思传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　萧延思，涿州人，太宗皇后父也。少习武艺，有材力，能左右持射。自太祖时从平诸番，常率骑数十深入敌阵，屡战有功。太宗南援石晋，时少扫古撒已死矣，太宗每叹曰：“斯人尚在，中原不足平也。”终北面都部署、辽兴节度使。<br /><br />

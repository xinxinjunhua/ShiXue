<hr />

<tr><td>
<br />
　　恭顺皇帝<br /><br />
　　自在太子名阮，太祖第三子，母曰述律氏。少豪侠，有智略，善弹工射，太祖奇之，曰：“吾家铁儿也。”征渤海时，山坂高峻，士马惮劳苦，太子径于东谷缘崖而进，屡战有功。后渤海平，封为自在太子。寻薨，葬于祖州，追谥曰恭顺皇帝。一子拽剌，封赵王，为景宗所害。<br /><br />
　　【胡案：自在太子名字当为耶律李胡。】<br /><br />

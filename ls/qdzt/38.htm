<td class="t50">耶律信宁传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　梁王信宁，番名解里，北大王乌斡之子。始以祗候郎君授林牙，云州、奉圣州、蔚州节度使、同平章事。与帝同谋，逐太后出宫，拜南大王、北大王、惕隐、南宰相，封梁王，加尚父，致仕。<br /><br />
　　【诸王传论】<br /><br />
　　论曰：后不可并，并后则倾；嫡不可匹，匹嫡则危。契丹起自朔荒，吞噬上国，嫡庶之分，亦安知之？元帅太子之称，不以属之突欲，而以属之德光，则其立国之初，已可议矣。既而述轧生问鼎之谋，宗元受皓首之戮，亦何怪其然哉！<br /><br />
</td></tr>

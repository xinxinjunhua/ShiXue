<td class="t50">耶律宗懿传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　晋王宗懿，番名查个只，圣宗弟孝文皇太弟隆庆之子也。少有气局，干略过人。圣宗雅爱诸侄，每诫之曰：“汝勿以材能陵物，勿以富贵骄人。惟忠惟孝，保家保身。”始封中山王，历龙化州、饶、建、宜、平州节度使，改封晋王，薨。<br /><br />
</td></tr>

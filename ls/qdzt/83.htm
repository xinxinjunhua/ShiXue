<td class="t50">刁奉使北语诗</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刁约使契丹，为北语诗云：“押燕移离毕，<span class="zs">〔移离毕，官名，如中国执政。〕</span>看房贺跋支贺跋支，如执政防阁。饯行三匹裂，<span class="zs">〔匹裂，似小木罂，以木为之，加黄漆。〕</span>密赐十貔狸。形如鼠而大，穴居，食谷梁，嗜肉。北朝为珍膳，味如豚肉而脆。”<br /><br />
</td></tr>

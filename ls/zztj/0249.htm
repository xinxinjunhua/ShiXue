<tr><td>
<br />
　　汉武帝建元四年（公元前137年）<br /><br />
　　夏，有风赤如血。<br /><br />
　　六月，旱。<br /><br />
　　秋九月，有星孛于东北。<br /><br />
　　是岁，南越王佗死，其孙文王胡立。<br /><br />

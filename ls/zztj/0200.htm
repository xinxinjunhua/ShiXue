<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　汉高后二年（公元前186年）<br /><br />
　　冬十一月，吕肃王台薨。<br /><br />
　　春正月乙卯，地震；羌道、武都道山崩。<br /><br />
　　夏五月丙申，封楚元王子郢客为上邳侯，齐悼惠王子章为朱虚侯，令入宿卫，又以吕禄女妻章。<br /><br />
　　六月丙戌晦，日有食之。<br /><br />
　　秋七月，恒山哀王不疑薨。<br /><br />
　　行八铢钱。<br /><br />
　　癸丑，立襄成侯山为恒山王，更名义。<br /><br />

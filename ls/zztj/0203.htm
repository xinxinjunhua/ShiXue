<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　汉高后五年（公元前183年）<br /><br />
　　春，佗自称南越武帝，发兵攻长沙，败数县而去。<br /><br />
　　秋八月，淮阳怀王强薨，以壶关侯武为淮阳王。<br /><br />
　　九月，发河东、上党骑屯北地。<br /><br />
　　初令戍卒岁更。<br /><br />

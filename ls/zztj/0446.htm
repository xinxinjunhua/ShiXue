<tr><td>
<br />
　　汉明帝永平六年（公元63年）<br /><br />
　　春二月，王雒山出宝鼎，献之。<br /><br />
　　夏四月甲子，诏曰：“祥瑞之降，以应有德；方今政化多僻，何以致兹！《易》曰：‘鼎象三公，’岂公卿奉职得其理邪！其赐三公帛五十匹，九卿、二千石半之。先帝诏书，禁人上事言圣，而间者章奏颇多浮词；自今若有过称虚誉，尚书皆宜抑而不省，示不为谄子蚩也。”<br /><br />
　　冬十月，上行幸鲁；十二月，还幸阳城；壬午，还宫。<br /><br />
　　是岁，南单于適死，单于莫之子苏立，为丘除车林鞮单于；数月，复死，单于適之弟长立，为湖邪尸逐侯鞮单于。<br /><br />

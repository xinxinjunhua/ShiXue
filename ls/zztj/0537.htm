<tr><td class="t50">汉桓帝永兴二年</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　汉桓帝永兴二年（公元154年）<br /><br />
　　春正月甲午，赦天下。<br /><br />
　　二月辛丑，复听刺史、二千石行三年丧。<br /><br />
　　癸卯，京师地震。<br /><br />
　　夏，蝗。<br /><br />
　　东海朐山崩。<br /><br />
　　乙卯，封乳母马惠子初为列候。<br /><br />
　　秋九月丁卯朔，日有食之。<br /><br />
　　太尉胡广免；以司徒黄琼为太尉。闰月，以光禄勋尹颂为司徒。<br /><br />
　　冬十一月甲辰，帝校猎上林苑，遂至函谷关。<br /><br />
　　泰山、琅邪贼公孙举、东郭窦等反，杀长吏。<br /><br />

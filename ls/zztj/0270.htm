　　汉武帝元鼎元年（公元前116年）<br /><br />
　　夏五月，赦天下。<br /><br />
　　济东王彭离骄悍，昏暮，与其奴、亡命少年数十人行剽杀人，取财物以为好，所杀发觉者百馀人，从废，徙上庸。<br /><br />

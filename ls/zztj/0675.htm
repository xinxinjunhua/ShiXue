<br />
　　晋惠帝元康二年（公元292年）<br /><br />
　　春二月己酉，故杨太后卒于金墉城。是时，太后尚有侍御十馀人，贾后悉夺之，绝膳八日而卒。贾后恐太后有灵，或诉冤于先帝，乃覆而殡之，仍施诸厌劾符书、药物等。<br /><br />
　　秋八月壬子，赦天下。<br /><br />

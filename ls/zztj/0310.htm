<tr><td class="t50">汉昭帝元凤五年</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　汉昭帝元凤五年（公元前76年）<br /><br />
　　夏，大旱。<br /><br />
　　秋，罢象郡，分属郁林、牂柯。<br /><br />
　　冬十一月，大雷。<br /><br />
　　十二月庚戌，宜春敬侯王诉薨。<br /><br />
　　汉昭帝元凤六年（公元前75年）<br /><br />
　　春正月，募郡国徒筑辽东、玄菟城。<br /><br />
　　夏，赦天下。<br /><br />
　　乌桓复犯塞，遣度辽将军范明友击之。<br /><br />
　　冬十一月乙丑，以杨敞为丞相，少府河内蔡义为御史大夫。<br /><br />

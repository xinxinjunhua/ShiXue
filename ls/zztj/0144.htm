<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　始皇帝四年（公元前243年）<br /><br />
　　春，蒙骜伐魏，取旸、有诡。三月，军罢。<br /><br />
　　秦质子归自赵；赵太子出归国。<br /><br />
　　七月，蝗，疫。令百姓纳粟千石，拜爵一级。<br /><br />
　　魏安釐王薨，子景湣王立。<br /><br />

<tr><td class="t50">魏少帝曹芳正始元年</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　<span class="zs">【曹芳（232年-274年），字兰卿，魏明帝曹叡养子，曹魏第三位皇帝，239年-254年在位。嘉平六年（254年），被司马师废为齐王。司马炎称帝后，改封为邵陵县公。泰始十年（274年），曹芳病逝，终年43岁，谥厉公。本书原称邵陵厉公。】</span><br /><br />
　　邵陵厉公正始元年（公元240年）<br /><br />
　　春，旱。<br /><br />
　　越巂蛮夷数叛汉，杀太守，是后太守不敢之郡，寄治安定县，去郡八县馀里。汉主以巴西张嶷为越巂太守，嶷招慰新附，诛讨强猾，蛮夷畏服，郡界悉平，复还旧治。<br /><br />
　　冬，吴饥。<br /><br />

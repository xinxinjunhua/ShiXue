<tr><td>
<br />
　　周显王十九年（公元前350年）<br /><br />
　　秦商鞅筑冀阙宫庭于咸阳，徙都之。令民父子、兄弟同室内息者为禁。并诸小乡聚集为一县，县置令、丞，凡三十一县。废井田，开阡陌，平斗、桶、权、衡、丈、尺。<br /><br />
　　秦、魏遇于彤。<br /><br />
　　赵成侯薨，公子緤与太子争立。緤败，奔韩。<br /><br />

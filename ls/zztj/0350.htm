<tr><td class="jz">
<hr />

<tr><td>
<br />
　　汉元帝建昭五年（公元前34年）<br /><br />
　　春三月，赦天下。夏六月庚申，复戾园。<br /><br />
　　壬申晦，日有食之。<br /><br />
　　秋七月庚子，复太上皇寝庙园、原庙、昭灵后、武哀王、昭哀后、卫思后园。时上寝疾，久不平。以为祖宗谴怒，故尽复之；唯郡国庙遂废云。<br /><br />
　　是岁，徙济阳王康为山阳王。<br /><br />
　　匈奴呼韩邪单于闻郅支既诛，且喜且惧；上书，愿入朝见。<br /><br />

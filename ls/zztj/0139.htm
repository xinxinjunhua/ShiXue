<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　秦庄襄王二年（公元前248年）<br /><br />
　　日有食之。<br /><br />
　　蒙骜伐赵，定太原，取榆次、狼孟等三十七城。<br /><br />
　　楚春申君言于楚王曰：“淮北地边于齐，其事急，请以为郡而封于江东。”楚王许之。春申君因城吴故墟以为都邑，宫室极盛。<br /><br />

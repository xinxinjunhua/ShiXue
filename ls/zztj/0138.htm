<tr><td class="t50">秦庄襄王元年</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　<span class="zs">【秦庄襄王，嬴楚 （前281年～前247年），又称秦庄王，嬴姓，赵氏，本名异人，后改名为楚 ，一作子楚，秦孝文王之子。前250年—前247年，病逝。】</span><br /><br />
　　庄襄王元年（公元前249年）<br /><br />
　　吕不韦为相国。<br /><br />
　　东周君为诸侯谋伐秦，王使相国帅师讨灭之，迁东周君于阳人聚。周既不祀。周比亡，凡有七邑：河南、洛阳、穀城、平阴、偃师、巩、缑氏。<br /><br />
　　以河南、洛阳十万户封相国不韦为文信侯。<br /><br />
　　蒙骜伐韩，取成皋、荥阳，初置三川郡。<br /><br />
　　楚灭鲁，迁鲁顷公于卞，为家人。<br /><br />

<tr><td class="jz">
<hr />

<tr><td>
<br />
　　隋文帝开皇十六年（公元596年）<br /><br />
　　春正月丁亥，以皇孙裕为平原王，筠为安成王，嶷为安平王，恪为襄城王，该为高阳王，韶为建安王，煚为颍川王，皆勇之子也。<br /><br />
　　夏六月甲午，初制工商不得仕进。<br /><br />
　　秋八月丙戌，诏：“决死罪者，三奏然后行刑。”<br /><br />
　　冬十月己丑，上幸长春宫；十一月壬子，还长安。<br /><br />
　　党项寇会州，诏发陇西兵讨降之。<br /><br />
　　帝以光化公主妻吐谷浑可汗世伏；世伏上表请称公主为天后，上不许。<br /><br />

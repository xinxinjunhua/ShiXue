<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　始皇帝二十一年（公元前226年）<br /><br />
　　冬十月，王翦拔蓟，燕王及太子率其精兵东保辽东，李信急追之。代王嘉遗燕王书，令杀太子丹以献。丹匿衍水中，燕王使使斩丹，欲以献王，王复进兵攻之。<br /><br />
　　王贲伐楚，取十馀城。王问于将军李信曰：“吾欲取荆，于将军度用几何人而足？”李信曰：“不过用二十万。”王以问王翦，王翦曰：“非六十万人不可。”王曰：“王将军老矣，何怯也！”遂使李信、蒙恬将二十万人伐楚；王翦因谢病归频阳。<br /><br />

<tr><td>
<br />
　　汉武帝太始元年（公元前96年）<br /><br />
　　春正月，公孙敖坐妻为巫蛊要斩。<br /><br />
　　徙郡国豪杰于茂陵。<br /><br />
　　夏六月，赦天下。<br /><br />
　　是岁，匈奴且鞮侯单于死。有两子，长为左贤王，次为左大将。左贤王未至，贵人以为有病，更立左大将为单于。左贤王闻之，不敢进。左大将使人召左贤王而让位焉。左贤王辞以病，左大将不听，谓曰：“即不幸死，传之于我。”左贤王许之，遂立，为狐鹿姑单于。以左大将为左贤王，数年，病死；其子先贤掸不得代，更以为日逐王。单于自以其子为左贤王。<br /><br />

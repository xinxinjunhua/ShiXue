<tr><td>
<br />
　　周显王四十一年（公元前328年）<br /><br />
　　秦公子华、张仪帅师围魏蒲阳，取之。张仪言于秦王，请以蒲阳复与魏，而使公子繇质于魏。<br /><br />
　　仪因说魏王曰：“秦之遇魏甚厚，魏不可以无礼于秦。”<br /><br />
　　魏因尽入上郡十五县以谢焉。<br /><br />
　　张仪归而相秦。<br /><br />

<tr><td>
<br />
　　周安王十七年（公元前385年）<br /><br />
　　秦庶长改逆献公于河西而立之；杀出子及其母，沉之渊旁。<br /><br />
　　齐伐鲁。<br /><br />
　　韩伐郑，取阳城；伐宋，执宋公。<br /><br />
　　齐太公薨，子桓公午立。<br /><br />

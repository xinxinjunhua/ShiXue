<tr><td>
<br />
　　周赧王十年（公元前305年）<br /><br />
　　彗星见。<br /><br />
　　赵王伐中山，取丹丘、爽阳、鸿之塞，又取鄗、石邑、封龙、东垣。中山献四邑以和。<br /><br />
　　秦宣太后异父弟曰穰侯魏冉，同父弟曰华阳君羋戎；王之同母弟曰高陵君、泾阳君。魏冉最贤，自惠王、武王时，任职用事。武王薨，诸弟争立，唯魏冉力能立昭王。昭王即位，以冉为将军，卫咸阳。是岁，庶长壮及大臣、诸公子谋作乱，魏冉诛之；及惠文后皆不得良死，悼武王后出归于魏，王兄弟不善者，魏冉皆灭之。王少，宣太后自治事，任魏冉为政，威震秦国。<br /><br />

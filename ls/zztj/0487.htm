<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　汉和帝永元十六年（公元104年）<br /><br />
　　秋七月，旱。<br /><br />
　　辛酉，司徒鲁恭免。<br /><br />
　　庚午，以光禄勋张酺为司徒；八月己酉，酺薨。<br /><br />
　　冬十月辛卯，以司空徐防为司徒，大鸿胪陈宠为司空。<br /><br />
　　十一月己丑，帝行幸缑氏，登百岯山。<br /><br />
　　北匈奴遣使称臣贡献，愿和亲，修呼韩邪故约。帝以其旧礼不备，未许；而厚加赏赐，不答其使。<br /><br />

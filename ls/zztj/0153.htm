<br />
　　始皇帝十三年（公元前234年）<br /><br />
　　桓齮伐赵，败赵将扈輙于平阳，斩首十万，杀扈輙。赵王以李牧为大将军，复战于宜安、肥下，秦师败绩，桓齮奔还。赵封李牧为武安君。<br /><br />

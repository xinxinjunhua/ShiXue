<tr><td>
<br />
　　周赧王二十七年（公元前288年）<br /><br />
　　冬十月，秦王称西帝，遣使立齐王为东帝，欲约与共伐赵。苏代自燕来，齐王曰：“秦使魏冉致帝，子以为何如？”对曰：“愿王受之而勿称也。秦称之，天下安之，王乃称之，无后也。秦称之，天下恶之，王因勿称，以收天下，此大资也。且伐赵孰与伐桀宋利？今王不如释帝以收天下之望，发兵以伐桀宋，宋举则楚、赵、梁、卫皆惧矣。是我以名尊秦而令天下憎之，所谓以卑为尊也。”齐王从之，称帝二日而复归之。<br /><br />
　　十二月，吕礼自齐入秦，秦王亦去帝复称王。<br /><br />
　　秦攻赵，拔杜阳。<br /><br />

<tr><td>
<br />
　　汉顺帝永建五年（公元130年）<br /><br />
　　夏四月，京师旱。<br /><br />
　　京师及郡国十二蝗。<br /><br />
　　定远侯班超之孙始尚帝姑阴城公主。主骄淫无道；始积忿怒，伏刃杀主。冬十月乙亥，始坐腰斩，同产皆弃市。<br /><br />

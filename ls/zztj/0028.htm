<tr><td>
<br />
　　周烈王五年（公元前371年）<br /><br />
　　魏伐楚，取鲁阳。<br /><br />
　　韩严遂弑哀侯，国人立其子懿侯。初，哀侯以韩廆为相而爱严遂，二人甚相害也。严遂令人刺韩廆于朝，廆走哀侯，哀侯抱之。人刺韩廆，兼及哀侯。<br /><br />
　　魏武侯薨，不立太子，子罃与公中缓争立，国内乱。<br /><br />

<tr><td class="jz">
<hr />

<tr><td>
<br />
　　汉武帝天汉三年（公元前98年）<br /><br />
　　春二月，王卿有罪自杀，以执金吾杜周为御史大夫。<br /><br />
　　初榷酒酤。<br /><br />
　　三月，上行幸泰山，脩封，祀明堂，因受计。还，祠常山，瘗玄玉。方士之候祠神人、入海求蓬莱者终无有验，而公孙卿犹以大人迹为解。天子益怠厌方士之怪迂语矣，然犹羁縻不绝，冀遇其真。自此之后，方士言神祠者弥众，然其效可睹矣。<br /><br />
　　夏四月，大旱。赦天下。<br /><br />
　　秋，匈奴入雁门。太守坐畏愞弃市。<br /><br />

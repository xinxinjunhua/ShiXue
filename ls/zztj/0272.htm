<tr><td class="t50">汉武帝元鼎三年</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　汉武帝元鼎三年（公元前114年）<br /><br />
　　冬，徙函谷关于新安。<br /><br />
　　春正月戊子，阳陵园火。<br /><br />
　　夏四月，雨雹。<br /><br />
　　关东郡、国四十馀饥，人相食。<br /><br />
　　常山宪王舜薨，子勃嗣，坐宪王病不侍疾，及居丧无礼废，徙房陵。后月馀，天子更封宪王子平为真定王，以常山为郡，于是五岳皆在天子之邦矣。徙代王义为清河王。<br /><br />
　　是岁，匈奴伊稚斜单于死，子乌维单于立。<br /><br />

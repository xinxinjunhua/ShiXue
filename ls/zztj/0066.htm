<tr><td>
<br />
　　周显王四十四年（公元前325年）<br /><br />
　　夏四月戊午，秦初称王。<br /><br />
　　卫平侯薨，子嗣君立。卫有胥靡亡之魏，因为魏王之后治病。嗣君闻之，使人请以五十金买之。五反，魏不与，乃以左氏易之。左右谏曰：“夫以一都买一胥靡，可乎？”<br /><br />
　　嗣君曰：“非子所知也。夫治无小，乱无大。法不立，诛不必，虽有十左氏，无益也。法立，诛必，失十左氏，无害也。”<br /><br />
　　魏王闻之曰：“人主之欲，不听之不祥。”因载而往，徒献之。<br /><br />

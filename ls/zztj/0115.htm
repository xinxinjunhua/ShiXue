<br />
　　周赧王三十九年（公元前276年）<br /><br />
　　秦武安君伐魏，拔两城。<br /><br />
　　楚王收东地兵，得十馀万，复西取江南十五邑。<br /><br />
　　魏安釐王封其弟无忌为信陵君。<br /><br />

<tr><td class="t50">秦始皇三十六年</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　始皇帝三十六年（公元前211年）<br /><br />
　　有陨石于东郡。或刻其石曰：“始皇死而地分。”始皇使御史逐问，莫服；尽取石旁居人诛之，燔其石。<br /><br />
　　迁河北榆中三万家；赐爵一级。<br /><br />

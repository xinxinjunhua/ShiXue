<tr><td>
<br />
　　汉文帝前七年（公元前173年）<br /><br />
　　冬十月，令列侯太夫人、夫人、诸侯王子及吏二千石无得擅征捕。<br /><br />
　　夏四月，赦天下。<br /><br />
　　六月癸酉，未央宫东阙罘罳灾。<br /><br />
　　民有歌淮南王者曰：“一尺布，尚可缝；一斗粟，尚可舂；兄弟二人不相容！”帝闻而病之。<br /><br />

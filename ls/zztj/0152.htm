<tr><td class="t50">秦始皇十二年</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　始皇帝十二年（公元前235年）<br /><br />
　　文信侯饮酖死，窃葬。其舍人临者，皆逐迁之。且曰：“自今以来，操国事不道如嫪毐、不韦者，籍其门，视此！”<br /><br />
　　扬子《法言》曰：或问：“吕不韦其智矣乎？以人易货。”曰：“谁谓不韦智者欤？以国易宗。吕不韦之盗，穿窬之雄乎！穿窬也者，吾见担石矣，未见雒阳也。”<br /><br />
　　自六月不雨，至于八月。<br /><br />
　　发四郡兵助魏伐楚。<br /><br />

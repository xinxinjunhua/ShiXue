<tr><td>
<br />
　　汉惠帝七年（公元前188年）<br /><br />
　　冬，发车骑、材官诣荥阳，太尉灌婴将。<br /><br />
　　春正月辛丑朔，日有食之。<br /><br />
　　夏五月丁卯，日有食之，既。<br /><br />
　　秋八月戊寅，帝崩于未央宫。大赦天下。九月辛丑，葬安陵。<br /><br />
　　初，吕太后命张皇后取他人子养之，而杀其母，以为太子。既葬，太子即皇帝位，年幼；太后临朝称制。<br /><br />

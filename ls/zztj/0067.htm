<tr><td>
<br />
　　周显王四十五年（公元前324年）<br /><br />
　　秦张仪帅师伐魏，取陕。<br /><br />
　　苏秦通于燕文公之夫人，易王知之。苏秦恐，乃说易王曰：“臣居燕不能使燕重，而在齐则燕重。”易王许之。<br /><br />
　　乃伪得罪于燕而奔齐，齐宣王以为客卿。苏秦说齐王高宫室，大苑囿，以明得意，欲以敝齐而为燕。<br /><br />

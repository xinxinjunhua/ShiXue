<tr><td class="jz">

<tr><td>
<br />
　　汉章帝建初六年（公元81年）<br /><br />
　　春。二月辛卯，琅邪孝王京薨。<br /><br />
　　夏六月丙辰，太尉鲍昱薨。<br /><br />
　　辛未晦，日有食之。<br /><br />
　　秋七月癸巳，以大司农邓彪为太尉。<br /><br />
　　武都太守廉范迁蜀郡太守。成都民物丰盛，邑宇逼侧，旧制，禁民夜作以防火灾，而更相隐蔽，烧者日属。范乃毁削先令，但严使储水而已。百姓以为便，歌之曰：“廉叔度，来何暮！不禁火，民安作。昔无襦，今五绔。”<br /><br />
　　帝以沛王等将入朝，遣谒者赐貂裘及太官食物、珍果，又使大鸿胪窦固持节郊迎。帝亲自循行邸第，豫设帷床，其钱帛、器物无不充备。<br /><br />

　　晋惠帝元康三年（公元293年）<br /><br />
　　夏六月，弘农雨雹，深三尺。<br /><br />
　　鲜卑宇文莫槐为其下所杀，弟普拨立。<br /><br />
　　拓跋绰卒，弟子弗立。<br /><br />

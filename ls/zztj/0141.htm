<tr><td class="t50">秦始皇元年</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　<span class="zs">【秦始皇，嬴政（前259年～前210年），嬴姓，赵氏，名政，又名赵正（政）、秦政，或称祖龙，秦庄襄王之子。。前247年，13岁时即王位，前210年，秦东巡途中驾崩于邢台沙丘。】</span><br /><br />
　　始皇帝元年（公元前246年）<br /><br />
　　蒙骜击定之。<br /><br />
　　韩欲疲秦人，使无东伐，乃使水工郑国为间于秦，凿泾水自仲山为渠，并北山，东注洛。中作而觉，秦人欲杀之。郑国曰：“臣为韩延数年之命，然渠成，亦秦万世之利也。”乃使卒为之。注填阏之水溉舄卤之地四万馀顷，收皆亩一钟，关中由是益富饶。<br /><br />

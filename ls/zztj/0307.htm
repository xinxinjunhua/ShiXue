<tr><td>
<br />
　　汉昭帝元凤二年（公元前79年）<br /><br />
　　夏四月，上自建章宫徙未央宫。<br /><br />
　　六月，赦天下。<br /><br />
　　是岁，匈奴复遣九千骑屯受降城以备汉，北桥余吾水，令可度，以备奔走；欲求和亲，而恐汉不听，故不肯先言，常使左右风汉使者。然其侵盗益希，遇汉使愈厚，欲以渐致和亲。汉亦羁縻之。<br /><br />

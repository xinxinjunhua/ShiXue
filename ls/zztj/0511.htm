<tr><td class="jz">
<hr />

<tr><td>
<br />
　　汉顺帝永建三年（公元128年）<br /><br />
　　春正月丙子，京师地震。<br /><br />
　　夏六月，旱。<br /><br />
　　秋七月丁酉，茂陵园寝灾。<br /><br />
　　九月，鲜卑寇渔阳。<br /><br />
　　冬十二月己亥，太傅桓焉免。车骑将军来历罢。<br /><br />
　　南单于拔死，弟休利立，为去特若尸逐就单于。<br /><br />
　　帝悉召孙程等还京师。<br /><br />

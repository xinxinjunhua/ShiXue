<tr><td class="jz">
<hr />

<tr><td>
<br />
　　始皇帝三十二年（公元前215年）<br /><br />
　　始皇之碣石，使燕人卢生求羡门，刻碣石门。坏城郭，决通堤坊。始皇巡北边，从上郡入。卢生使入海还，因奏《录图书》曰：“亡秦者胡也。”始皇乃遣将军蒙恬发兵三十万人，北伐匈奴。<br /><br />

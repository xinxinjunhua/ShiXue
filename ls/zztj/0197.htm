<tr><td>
<br />
　　汉惠帝六年（公元前189年）<br /><br />
　　冬十月，以王陵为右丞相，陈平为左丞相。<br /><br />
　　齐悼惠王肥薨。<br /><br />
　　夏，留文成侯张良薨。<br /><br />
　　以周勃为太尉。<br /><br />

<tr><td>
<br />
　　汉高后六年（公元前182年）<br /><br />
　　冬十月，太后以吕王嘉居处骄恣，废之。十一月，立肃王弟产为吕王。<br /><br />
　　春，星昼见。<br /><br />
　　夏四月丁酉，赦天下。<br /><br />
　　封朱虚侯章弟兴居为东牟侯，亦入宿卫。<br /><br />
　　匈奴寇狄道，攻阿阳。<br /><br />
　　行五分钱。<br /><br />
　　宣平侯张敖卒，赐谥曰鲁元王。<br /><br />

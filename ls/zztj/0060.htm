<tr><td>
<br />
　　周显王三十七年（公元前332年）<br /><br />
　　秦惠王使犀首欺齐、魏，与共伐赵，以败从约。赵肃侯让苏秦，苏秦恐，请使燕，必报齐。苏秦去赵而从约皆解。赵人决河水以灌齐、魏之师，齐、魏之师乃去。<br /><br />
　　魏以阴晋为和于秦，实华阴。<br /><br />
　　齐王伐燕，取十城，已而复归之。<br /><br />

<tr><td>
<br />
　　周显王七年（公元前362年）<br /><br />
　　魏败韩师、赵师于浍。秦、魏战于少梁，魏师败绩；获魏公孙痤。<br /><br />
　　卫声公薨，子成侯速立。<br /><br />
　　燕桓公薨，子文公立。<br /><br />
　　秦献公薨，子孝公立。孝公生二十一年矣。是时河、山以东强国六，淮、泗之间小国十馀，楚、魏与秦接界。魏筑长城，自郑滨洛以北有上郡；楚自汉中，南有巴、黔中；皆以夷翟遇秦，摈斥之，不得与中国之会盟。于是孝公发愤，布德修政，欲以强秦。<br /><br />
</td></tr>

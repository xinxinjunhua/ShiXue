<tr><td>
<br />
　　汉宣帝地节元年（公元前69年）<br /><br />
　　春正月，有星孛于西方。<br /><br />
　　楚王延寿以广陵王胥，武帝子，天下有变，必得立，阴附肋之，为其后母弟赵何齐取广陵王女为妻，因使何齐奉书遗广陵王曰：“愿长耳目，毋后人有天下！”何齐父长年上书告之，事下有司考验，辞服。冬十一月，延寿自杀。胥勿治。<br /><br />
　　十二月癸亥晦，日有食之。<br /><br />
　　是岁，于定国为廷尉。定国决疑平法，务在哀鳏寡，罪疑从轻，加审慎之心。朝廷称之曰：“张释之为廷尉，天下无冤民。于定国为廷尉，民自以不冤。”<br /><br />

<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　周赧王十四年（公元前301年）<br /><br />
　　日有食之，既。<br /><br />
　　秦人取韩穰。蜀宁煇叛秦，秦司马错往诛之。<br /><br />
　　秦庶长奂会韩、魏、齐兵伐楚，败其师于重丘，杀其将唐昧；遂取重丘。<br /><br />
　　赵王伐中山，中山君奔齐。<br /><br />

<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　汉惠帝五年（公元前190年）<br /><br />
　　冬，雷；桃李华，枣实。<br /><br />
　　春正月，复发长安六百里内男女十四万五千人城长安，三十日罢。<br /><br />
　　夏，大旱，江河水少，谿谷水绝。<br /><br />
　　秋八月己丑，平阳懿侯曹参薨。<br /><br />

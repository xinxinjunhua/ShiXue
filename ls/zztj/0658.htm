<tr><td>
<br />
　　晋武帝咸宁元年（公元275年）<br /><br />
　　春正月戊午朔，大赦，改元。<br /><br />
　　吴掘地得银尺，上有刻文。吴主大赦，改元天册。<br /><br />
　　吴中书令贺邵，中风不能言，去职数月，吴主疑其诈，收付酒藏，掠考千数，卒无一言，乃烧锯断其头，徙其家属于临海。又诛楼玄子孙。<br /><br />
　　夏六月，鲜卑拓跋力微复遣其子沙漠汗入贡，将还，幽州刺史卫瓘表请留之，又密以金赂其诸部大人离间之。<br /><br />
　　秋七月甲申晦，日有食之。<br /><br />
　　冬十二月丁亥，追尊宣帝庙曰高祖，景帝曰世宗，文帝曰太祖。<br /><br />
　　大疫，洛阳死者以万数。<br /><br />

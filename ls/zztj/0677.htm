<tr><td>
<br />
　　晋惠帝元康四年（公元294年）<br /><br />
　　春正月丁酉，安昌元公石鉴薨。<br /><br />
　　夏五月，匈奴郝散反，攻上党，杀长吏。秋八月，郝散帅众降，冯翊都尉杀之。<br /><br />
　　是岁，大饥。<br /><br />
　　司隶校尉傅咸卒。咸性刚简，风格峻整，初为司隶校尉，上言：“货赂流行，所宜深绝。”时朝政宽弛，权豪放恣，咸奏免河南尹澹等官，京师肃然。<br /><br />
　　慕容廆徙居大棘城。<br /><br />
　　拓跋弗卒，叔父禄官立。<br /><br />

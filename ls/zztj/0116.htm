<br />
　　周赧王四十年（公元前275年）<br /><br />
　　秦相国穰侯伐魏。韩暴鸢救魏，穰侯大破之，斩首四万。暴鸢走开封。魏纳八城以和。穰侯复伐魏，走芒卯，入北宅。遂围大梁，魏人割温以和。<br /><br />

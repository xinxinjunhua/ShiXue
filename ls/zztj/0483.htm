<tr><td>
<br />
　　汉和帝永元十二年（公元100年）<br /><br />
　　夏四月戊辰，秭归山崩。<br /><br />
　　秋七月辛亥朔，日有食之。<br /><br />
　　九月戊午，太尉张酺免。丙寅，以大司农张禹为太尉。<br /><br />
　　烧当羌豪迷唐既入朝。其馀种人不满二千，饥窘不立，入居金城。帝令迷唐将其种人还大、小榆谷；迷唐以汉作河桥，兵来无常，故地不可复居，辞以种人饥饿，不肯远出。护羌校尉吴祉等多赐迷唐金帛，令籴谷市畜。促使出塞，种人更怀猜惊。<br /><br />
　　是岁，迷唐复叛，胁将湟中诸胡寇钞而去，王信、耿谭、吴祉皆坐征。<br /><br />

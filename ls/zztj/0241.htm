<tr><td>
<br />
　　汉景帝中五年（公元前145年）<br /><br />
　　夏，立皇子舜为常山王。<br /><br />
　　六月丁巳，赦天下。<br /><br />
　　大水。<br /><br />
　　秋八月己酉，未央宫东阙灾。九月，诏：“诸狱疑，若虽文致于法，而于人心不厌者，辄谳之。”<br /><br />
　　地震。<br /><br />

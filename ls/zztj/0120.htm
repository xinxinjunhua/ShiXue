<tr><td>
<br />
　　周赧王四十四年（公元前271年）<br /><br />
　　赵蔺相如伐齐，至平邑。<br /><br />
　　赵田部吏赵奢收租税，平原君家不肯出。赵奢以法治之，杀平原君用事者九人。平原君怒，将杀之。<br /><br />
　　赵奢曰：“君于赵为贵公子，今纵君家而不奉公，则法削，法削则国弱，国弱则诸侯加兵，是无赵也，君安得有此富乎？以君之贵，奉公如法则上下平，上下平则国强，国强则赵固，而君为贵戚，岂轻于天下邪！”<br /><br />
　　平原君以为贤，言之于王。王使治国赋，国赋大平，民富而府库实。<br /><br />

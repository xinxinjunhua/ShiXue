<tr><td>
<br />
　　汉昭帝始元四年（公元前83年）<br /><br />
　　春三月甲寅，立皇后上官氏，赦天下。<br /><br />
　　西南夷姑缯、叶榆复反，遣水衡都尉吕辟胡将益州兵击之。辟胡不进，蛮夷遂杀益州太守，乘胜与辟胡战，士战及溺死者四千馀人。冬，遣大鸿胪田广明击之。<br /><br />
　　廷尉李种坐故纵死罪弃市。<br /><br />
　　是岁，上官安为车骑将军。<br /><br />

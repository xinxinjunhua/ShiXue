　　始皇帝十七年（公元前230年）<br /><br />
　　内史胜灭韩，虏韩王安，以其地置颖川郡。<br /><br />
　　华阳太后薨。<br /><br />
　　赵大饥。<br /><br />
　　卫元君薨，子角立。<br /><br />

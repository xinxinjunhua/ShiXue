<tr><td>
<br />
　　汉安帝永初七年（公元113年）<br /><br />
　　春二月丙午，郡国十八地震。<br /><br />
　　夏四月乙未，平原怀王胜薨，无子；太后立乐安夷王宠子得为平原王。<br /><br />
　　丙申晦，日有食之。<br /><br />
　　秋，护羌校尉侯霸、骑都尉马贤击先零别部牢羌于安定，获首虏千人。<br /><br />
　　蝗。<br /><br />

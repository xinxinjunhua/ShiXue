<tr><td>
<br />
　　汉元帝建昭元年（公元前38年）<br /><br />
　　春正月戊辰，陨石于梁。<br /><br />
　　三月，上行幸雍，祠五畤。<br /><br />
　　冬，河间王元坐贼杀不辜废，迁房陵。<br /><br />
　　罢孝文太后寝祠园。<br /><br />
　　上幸虎圈斗兽，后宫皆坐。熊逸出圈，攀槛欲上殿，左右、贵人、傅婕妤等皆惊走。冯婕妤直前，当熊而立。左右格杀熊。上问：“人情惊惧，何故前当熊？”婕妤对曰：“猛兽得人止，妾恐熊至御坐，故以身当之。”帝嗟叹，倍敬重焉。傅婕妤惭，由是与冯婕妤有隙。冯婕妤，左将军奉世之女也。<br /><br />

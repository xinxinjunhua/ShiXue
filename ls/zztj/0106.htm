<tr><td class="t50">周赧王三十年</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　周赧王三十年（公元前285年）<br /><br />
　　秦王会楚王于宛，会赵王于中阳。<br /><br />
　　秦蒙武击齐，拔九城。<br /><br />
　　齐湣王既灭宋而骄，乃南侵楚，西侵三晋，欲并二周，为天子。狐咺正议，斫之檀衢，陈举直言，杀之东闾。燕昭王日夜抚循其人，益为富实，乃与乐毅谋伐齐。<br /><br />
　　乐毅曰：“齐，霸国之馀业也。地大人众，未易独攻也。王必欲伐之。莫如约赵及楚、魏。”<br /><br />
　　于是使乐毅约赵，别使使者连楚、魏，且令赵啖秦以伐齐之利。诸侯害齐王之骄暴，皆争合谋与燕伐齐。<br /><br />

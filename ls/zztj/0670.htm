<tr><td>
<br />
　　晋武帝太康八年（公元287年）<br /><br />
　　春正月戊申朔，日有食之。<br /><br />
　　太庙殿陷，秋九月，改营太庙，作者六万人。<br /><br />
　　是岁，匈奴都督大豆得一育鞠等复帅种落万一千五百口来降。<br /><br />

<tr><td>
<br />
　　始皇帝二十七年（公元前220年）<br /><br />
　　始皇巡陇西、北地，至鸡头山，过回中焉。作信宫渭南，已，更命曰极庙。自极庙道通骊山，作甘泉前殿，筑甬道自咸阳属之，治驰道于天下。<br /><br />

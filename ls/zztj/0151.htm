<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　始皇帝十一年（公元前236年）<br /><br />
　　赵人伐燕，取狸阳。兵未罢，将军王翦、桓齮、杨端和伐赵，攻邺，取九城。王翦攻阏与、轑阳，桓齮取邺、安阳。<br /><br />
　　赵悼襄王薨，子幽缪王迁立。其母，倡也，嬖于悼襄王，悼襄王废嫡子嘉而立之。迁素以无行闻于国。<br /><br />
　　文信侯就国岁馀，诸侯宾客使者相望于道，请之。王恐其为变，乃赐文信侯书曰：“君何功于秦，封君河南，食十万户？何亲于秦，号称仲父？其与家属徙处蜀！”文信侯自知稍侵，恐诛。<br /><br />

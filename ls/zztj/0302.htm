<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　汉昭帝始元三年（公元前84年）<br /><br />
　　春二月，有星孛于西北。<br /><br />
　　冬十一月壬辰朔，日有食之。<br /><br />
　　初，霍光与上官桀相亲善。光每休沐出，桀常代光入决事。光女为桀子安妻，生女，年甫五岁，安欲因光内之宫中；光以为尚幼，不听。盖长公主私近子客河间丁外人，安素与外人善，说外人曰：“安子容貌端正，诚因长主时得入为后，以臣父子在朝而有椒房之重，成之在于足下。汉家故事，常以列侯尚主，足下何忧不封侯乎！”外人喜，言于长主。长主以为然，诏召安女入为婕妤，安为骑都尉。<br /><br />

　　始皇帝十六年（公元前231年）<br /><br />
　　韩献南阳地。九月，发卒受地于韩。<br /><br />
　　魏人献地。<br /><br />
　　代地震，自乐徐以西，北至平阴；台屋墙垣太半坏，地坼东西百三十步。<br /><br />

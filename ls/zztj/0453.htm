<br />
　　汉明帝永平十三年（公元70年）<br /><br />
　　夏四月，汴渠成；河、汴分流，复其旧迹。辛乙，帝行幸荥阳，巡行河渠，遂渡河，登太行，幸上党；壬寅，还宫。<br /><br />
　　冬十月壬辰晦，日有食之。<br /><br />
　　楚王英与方士作金龟、玉鹤，刻文字为符瑞。男子燕广告英与渔阳王平、颜忠等造作图书，有逆谋；事下案验。有司奏“英大逆不道，请诛之。”帝以亲亲不忍。<br /><br />
　　十一月，废英，徙丹杨泾县，赐汤沐邑五百户；男女为侯、主者，食邑如故；许太后勿上玺绶，留住楚宫。先是有私以英谋告司徒虞延者，延以英籓戚至亲，不然其言。及英事觉，诏书切让延。<br /><br />

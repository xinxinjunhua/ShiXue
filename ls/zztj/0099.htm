<tr><td>
<br />
　　周赧王二十三年（公元前292年）<br /><br />
　　楚襄王迎妇于秦。<br /><br />
　　＊＊＊<br /><br />
　　臣光曰：甚哉秦之无道也，杀其父而劫其子；楚之不竞也，忍其父而婚其仇！呜呼！楚之君诚得其道，臣诚得其人，秦虽强，乌得陵之哉！善乎荀卿论之曰：“夫道，善用之则百里之地可以独立，不善用之则楚六千里而为仇人役。”故人主不务得道而广有其势，是其所以危也。<br /><br />
　　＊＊＊<br /><br />
　　秦魏冉谢病免，以客卿烛寿为丞相。<br /><br />

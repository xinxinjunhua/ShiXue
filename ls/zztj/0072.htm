<br />
　　周慎靓王二年（公元前319年）<br /><br />
　　秦伐魏，取鄢。<br /><br />
　　魏惠王薨，子襄王立。孟子入见而出，语人曰：“望之不似人君，就之而不见所畏焉。卒然问曰：‘天下恶乎定？’吾对曰：‘定于一。’‘孰能一之？’对曰：‘不嗜杀人者能一之。’‘孰能与之？’对曰：‘天下莫不与也。王知夫苗乎？七八月之间旱，则苗槁矣。天油然作云，沛然下雨，则苗浡然兴之矣。其如是，孰能御之？’”<br /><br />
</td></tr>

<tr><td class="t50">秦始皇五年</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　始皇帝五年（公元前242年）<br /><br />
　　蒙骜伐魏，取酸枣、燕、虚、长平、雍丘、山阳等二十城；初置东郡。<br /><br />
　　初，剧辛在赵与庞瑗善，已而仕燕。燕王见赵数困于秦，廉颇去而庞瑗为将，欲因其敝而攻之，问于剧辛，对曰：“庞瑗易与耳。”燕王使剧辛将而伐赵。赵庞瑗御之，杀剧辛，取燕师二万。<br /><br />
　　诸侯患秦攻伐无已时。<br /><br />

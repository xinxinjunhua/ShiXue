<tr><td class="t50">秦始皇三十三年</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　始皇帝三十三年（公元前214年）<br /><br />
　　发诸尝逋亡人、赘婿、贾人为兵，略取南越陆梁地，置桂林、南海、象郡；以谪徙民五十万人戍五岭，与越杂处。<br /><br />
　　蒙恬斥逐匈奴，收河南地为四十四县。筑长城，因地形，用制险塞。起临洮至辽东，延袤万馀里。于是渡河，据阳山，逶迤而北。暴师于外十馀年。蒙恬常居上郡统治之，威振匈奴。<br /><br />
</td></tr>

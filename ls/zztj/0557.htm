<tr><td class="t50">汉灵帝熹平三年</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　汉灵帝熹平三年（公元174年）<br /><br />
　　春二月己巳，赦天下。<br /><br />
　　以太常东海陈耽为太尉。<br /><br />
　　三月，中山穆王畅薨，无子，国除。<br /><br />
　　夏六月，封河间王利子康为济南王，奉孝仁皇祀。<br /><br />
　　吴郡司马富春孙坚召募精勇，得千馀人，助州郡讨许生。<br /><br />
　　冬十一月，臧旻、陈寅大破生于会稽，斩之。任城王博薨，无子，国绝。<br /><br />
　　十二月，鲜卑入北地，太守夏育率屠各追击，破之。迁育为护乌桓校尉。鲜卑又寇并州。<br /><br />
　　司空唐珍罢，以永乐少府许训为司空。<br /><br />

<tr><td class="jz">
<hr />

<tr><td>
<br />
　　周赧王十五年（公元前300年）<br /><br />
　　秦泾阳君为质于齐。<br /><br />
　　秦华阳君伐楚，大破楚师，斩首三万，杀其将景缺，取楚襄城。楚王恐，使太子为质于齐以请平。<br /><br />
　　秦樗里疾卒，以赵人楼缓为丞相。<br /><br />
　　赵武灵王爱少子何，欲及其生而立之。<br /><br />

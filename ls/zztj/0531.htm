<tr><td>
<br />
　　汉桓帝建和二年（公元148年）<br /><br />
　　春正月甲子，帝加元服。庚午，赦天下。<br /><br />
　　三月戊辰，帝从皇太后幸大将军冀府。<br /><br />
　　白马羌寇广汉属国，杀长吏。益州刺史率板楯蛮讨破之。<br /><br />
　　夏四月丙子，封帝弟顾为平原王，奉孝崇皇祀；尊孝崇皇夫人马氏为孝崇园贵人。<br /><br />
　　五月癸丑，北宫掖廷中德阳殿及左掖门火，车驾移幸南宫。<br /><br />
　　六月，改清河为甘陵。立安平孝王得子经侯理为甘陵王。奉孝德皇祀。<br /><br />
　　秋七月，京师大水。<br /><br />

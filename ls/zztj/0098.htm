<br />
　　周赧王二十二年（公元前293年）<br /><br />
　　韩公孙喜、魏人伐秦。穰侯荐左更白起于秦王以代向寿将兵，败魏师、韩师于伊阙，斩首二十四万级，虏公孙喜，拔五城。秦王以白起为国尉。<br /><br />
　　秦王遗楚王书曰：“楚倍秦，秦且率诸侯伐楚，愿王之饬士卒，得一乐战！”楚王患之，乃复与秦和亲。<br /><br />

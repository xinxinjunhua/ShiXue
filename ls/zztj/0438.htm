<tr><td>
<br />
　　汉光武帝建武三十一年（公元55年）<br /><br />
　　夏五月，大水。<br /><br />
　　癸酉晦，日有食之。<br /><br />
　　蝗。京兆掾第五伦领长安市，公平廉介，市无奸枉。每读诏书，常叹息曰：“此圣主也，一见决矣。”等辈笑之曰：“尔说将尚不能下，安能动万乘乎！”伦曰：“未遇知己，道不同故耳。”后举孝廉，补淮阳王医工长。<br /><br />

<tr><td class="jz">
<hr />

<tr><td>
<br />
　　汉武帝太始二年（公元前95年）<br /><br />
　　春正月，上行幸回中。<br /><br />
　　杜周卒，光禄大夫暴胜之为御史大夫。<br /><br />
　　秋，旱。<br /><br />
　　赵中大夫白公奏穿渠引泾水，首起谷口，尾入栎阳，注渭中，袤二百里，溉田四千五百馀顷，因名曰白渠；民得其饶。<br /><br />

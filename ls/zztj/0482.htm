<tr><td>
<br />
　　汉和帝永元十一年（公元99年）<br /><br />
　　夏四月丙寅，赦天下。<br /><br />
　　帝因朝会，召见诸儒，使中大夫鲁丕与侍中贾逵、尚书令黄香等相难数事，帝善丕说，罢朝，特赐衣冠。<br /><br />
　　丕因上疏曰：“臣闻说经者，传先师之言，非从己出，不得相让；相让则道不明，若规矩权衡之不可枉也。难者必明其据，说者务立其义，浮华无用之言，不陈于前，故精思不劳而道术愈章。法异者各令自说师法，博观其义，无令刍荛以言得罪，幽远独有遗失也。”<br /><br />

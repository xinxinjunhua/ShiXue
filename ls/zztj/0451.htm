<br />
　　汉明帝永平十一年（公元68年）<br /><br />
　　春正月，东平王苍与诸王俱来朝，月馀，还国。<br /><br />
　　帝临送归宫，凄然怀思，乃遣使手诏赐东平国中傅曰：“辞别之后，独坐不乐，因就车归，伏轼而吟，瞻望永怀，实劳我心。诵及《采菽》，以增叹息。日者问东平王：‘处家何等最乐？’王言：‘为善最乐。’其言甚大，副是要腹矣。今送列侯印十九枚，诸王子年五岁已上能趋拜者，皆令带之。”<br /><br />

<tr><td class="t50">秦始皇二十三年</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　始皇帝二十三年（公元前224年）<br /><br />
　　王翦取陈以南至平舆。楚人闻王翦益军而来，乃悉国中兵以御之；王翦坚壁不与战。楚人数挑战，终不出。王翦日休士洗沐，而善饮食，抚循之；亲与士卒同食。久之，王翦使人问：“军中戏乎？”<br /><br />
　　对曰：“方投石、超距。”<br /><br />
　　王翦曰：“可用矣！”楚既不得战，乃引而东。王翦追之，令壮士击，大破楚师，至蕲南，杀其将军项燕，楚师遂败走。<br /><br />
　　王翦因乘胜略定城邑。<br /><br />

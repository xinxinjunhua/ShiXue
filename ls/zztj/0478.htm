<tr><td>
<br />
　　汉和帝永元七年（公元95年）<br /><br />
　　春正月，邓鸿等军还，冯柱将虎牙营留屯五原。鸿坐逗留失利，下狱死。后帝知朱徽、杜崇失胡和，又禁其上书，以致胡反，皆征下狱死。夏四月辛亥朔，日有食之。<br /><br />
　　秋七月乙巳，易阳地裂。<br /><br />
　　九月癸卯，京师地震。<br /><br />
　　乐成王党坐贼杀人，削东光、鄡二县。<br /><br />

<tr><td>
<br />
　　汉武帝太始四年（公元前93年）<br /><br />
　　春三月，上行幸泰山。壬午，祀高祖于明堂以配上帝，因受计。癸未，祀孝景皇帝于明堂。甲申，修封。丙戌，禅石闾。夏四月，幸不其。五月，还，幸建章宫，赦天下。<br /><br />
　　冬十月甲寅晦，日有食之。<br /><br />
　　十二月，上行幸雍，祠五畤。西至安定、北地。<br /><br />

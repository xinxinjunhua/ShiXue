<tr><td>
<br />
　　周显王四十年（公元前329年）<br /><br />
　　秦伐魏，渡河，取汾阴、皮氏，拔焦。<br /><br />
　　楚威王薨，子怀王槐立。<br /><br />
　　宋公剔成之弟偃袭攻剔成。剔成奔齐，偃自立为君。<br /><br />

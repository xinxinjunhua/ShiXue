<tr><td class="t50">汉灵帝熹平二年</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　汉灵帝熹平二年（公元173年）<br /><br />
　　春正月，大疫。<br /><br />
　　丁丑，司空宗俱薨。<br /><br />
　　二月壬午，赦天下。<br /><br />
　　以光禄勋杨赐为司空。<br /><br />
　　三月，太尉李咸免。<br /><br />
　　夏五月，以司隶校尉段颎为太尉。<br /><br />
　　六月，北海地震。<br /><br />
　　秋七月，司空杨赐免；以太常颍川唐珍为司空。珍，衡之弟也。<br /><br />
　　冬十二月，太尉段颎罢。<br /><br />
　　鲜卑寇幽、并二州。<br /><br />
　　癸酉晦，日有食之。<br /><br />

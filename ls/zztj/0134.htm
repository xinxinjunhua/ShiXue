<tr><td>
<br />
　　周赧王五十九年（公元前256年）<br /><br />
　　秦将军摎伐韩，取阳城、负黍，斩首四万。伐赵，取二十馀县，斩首虏九万。赧王恐，倍秦，与诸侯约从，将天下锐师出伊阙攻秦，令无得通阳城。秦王使将军摎攻西周，赧王入秦，顿首受罪，尽献其邑三十六，口三万。秦受其献，归赧王于周。是岁，赧王崩。<br /><br />
</td></tr>

<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　汉元帝永光三年（公元前41年）<br /><br />
　　春二月，冯奉世还京师，更为左将军，赐爵关内侯。<br /><br />
　　三月，立皇子康为济阳王。<br /><br />
　　夏四月癸未，平昌考侯王按薨。秋七月壬戌，以平恩侯许嘉为大司马、车骑将军。<br /><br />
　　冬十一月己丑，地震，雨水。<br /><br />
　　复盐铁官；置博士弟子员千人。以用度不足，民多复除，无以给中外繇役故也。<br /><br />

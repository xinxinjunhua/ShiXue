<tr><td class="t50">周安王五年</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　周安王五年（公元前397年）<br /><br />
　　日有食之。<br /><br />
　　三月，盗杀韩相侠累。<br /><br />
　　侠累与濮阳严仲子有恶。仲子闻轵人聂政之勇，以黄金百镒为政母寿，欲因以报仇。政不受，曰：“老母在，政身未敢以许人也！”及母卒，仲子乃使政刺侠累。侠累方坐府上，兵卫甚众，聂政直入上阶，刺杀侠累，因自皮面抉眼，自屠出肠。韩人暴其尸于市，购问，莫能识。<br /><br />
　　其姊嫈闻而往哭之，曰：“是轵深井里聂政也。以妾尚在之故，重自刑以绝从。妾奈何畏殁身之诛，终灭贤弟之名！”遂死于政尸之旁。<br /><br />

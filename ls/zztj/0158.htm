<tr><td class="jz">
<hr />

<tr><td>
<br />
　　始皇帝十八年（公元前229年）<br /><br />
　　王翦将上地兵下井陉，端和将河内兵共伐赵。赵李牧、司马尚御之。秦人多与赵王嬖臣郭开金，使毁牧及尚，言其欲反。赵王使赵葱及齐将颜聚代之。李牧不受命，赵人捕而杀之；废司马尚。<br /><br />

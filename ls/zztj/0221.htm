<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　汉文帝前十五年（公元前165年）<br /><br />
　　春，黄龙见成纪。帝召公孙臣，拜为博士，与诸生申明土德，草改历、服色事。张苍由此自绌。<br /><br />
　　夏四月，上始幸雍，郊见五帝，赦天下。<br /><br />
　　九月，诏诸侯王、公卿、郡守举贤良、能直言极谏者，上亲策之。太子家令晁错对策高第，擢为中大夫。错又上言宜削诸侯及法令可更定者书凡三十篇。上虽不尽听，然奇其材。<br /><br />
　　是岁，齐文王则、河间哀王福皆薨，无子，国除。<br /><br />
　　赵人新垣平以望气见上，言长安东北有神气，成五采，于是作渭阳五帝庙。<br /><br />

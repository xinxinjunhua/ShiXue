<tr><td>
<br />
　　周赧王十九年（公元前296年）<br /><br />
　　楚怀王发病，薨于秦，秦人归其丧。楚人皆怜之，如悲亲戚。诸侯由是不直秦。<br /><br />
　　齐、韩、魏、赵、宋同击秦，至盐氏而还。秦与韩武遂、与魏封陵以和。<br /><br />
　　赵主父行新地，遂出代；西遇楼烦王于西河而致其兵。<br /><br />
　　魏襄王薨，子昭王立。<br /><br />
　　韩襄王薨，子釐王咎立。<br /><br />

<tr><td class="jz">

<tr><td>
<br />
　　汉成帝元延三年（公元前10年）<br /><br />
　　春正月丙寅，蜀郡岷山崩，壅江三日，江水竭。刘向大恶之，曰：“昔周岐山崩，三川竭，而幽王亡。岐山者，周所兴也。汉家本起于蜀、汉，今所起之地，山崩川竭，星孛又及摄提、大角，从参至辰，殆必亡矣！”<br /><br />
　　二月丙午，封淳于长为定陵侯。<br /><br />
　　三月，上行幸雍，祠五畤。<br /><br />
　　上将大夸胡人以多禽兽。秋，命右扶风发民入南山，西自褒、斜，东至弘农，南驱汉中，张罗罔罝罘，捕熊罴禽兽，载以槛车，输长杨射熊馆，以罔为周阹，纵禽兽其中，令胡人手搏之，自取其获，上亲临观焉。<br /><br />

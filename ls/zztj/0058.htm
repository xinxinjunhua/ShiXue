<tr><td>
<br />
　　周显王三十五年（公元前334年）<br /><br />
　　齐王、魏王会于徐州以相王。<br /><br />
　　韩昭侯作高门，屈宜臼曰：“君必不出此门。何也？不时。吾所谓时者，非时日也。夫人固有利、不利时。往者君尝利矣，不作高门。前年秦拔宜阳，今年旱，君不以此时恤民之急而顾益奢，此所谓时诎举赢者也。故曰不时。”<br /><br />
　　越王无疆伐齐。齐王使人说之以伐齐不如伐楚之利，越王遂伐楚。楚人大败之，乘胜尽取吴故地，东至于浙江。越以此散，诸公族争立，或为王，或为君，滨于海上，朝服于楚。<br /><br />

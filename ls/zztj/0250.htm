<tr><td>
<br />
　　汉武帝建元五年（公元前136年）<br /><br />
　　春，罢三铢钱，行半两钱。<br /><br />
　　置五经博士。<br /><br />
　　夏五月，大蝗。<br /><br />
　　秋八月，广川惠王越、清河哀王乘皆薨，无后，国除。<br /><br />

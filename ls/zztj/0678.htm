<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　晋惠帝元康五年（公元295年）<br /><br />
　　夏六月，东海雨雹，深五寸。<br /><br />
　　荆、扬、兗、豫、青、徐六州大水。<br /><br />
　　冬十月，武库火，焚累代之宝及二百万人器械。<br /><br />
　　十二月丙戌，新作武库，大调兵器。<br /><br />
　　拓跋禄官分其国为三部：一居上谷之北、濡源之西，自统之；一居代郡参合陂之北，使兄沙漠汗之子猗迤统之；一居定襄之盛乐故城，使猗迤弟猗户统之。猗卢善用兵，西击匈奴、乌桓诸部，皆破之。代人卫操与从子雄及同郡箕澹往依拓跋氏，说猗迤、猗户招纳晋人。猗迤悦之，任以国事，晋人附者稍众。<br /><br />

<tr><td>
<br />
　　周赧王九年（公元前306年）<br /><br />
　　秦昭王使向寿平宜阳，而使樗里子、甘茂伐魏。甘茂言于王，以武遂复归之韩。向寿、公孙奭争之，不能得，由此怨谗甘茂。茂惧，辍伐魏蒲阪，亡去。樗里子与魏讲而罢兵。甘茂奔齐。<br /><br />
　　赵王略中山地，至宁葭；西略胡地，至榆中。林胡王献马。归，使楼缓之秦，仇液之韩，王贲之楚，富丁之魏，赵爵之齐。代相赵固主胡，致其兵。<br /><br />
　　楚王与齐、韩合从。<br /><br />

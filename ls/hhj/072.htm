<td class="t50">汉和帝纪(5)</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　永元五年<span class="zs">〔公元93年〕</span><br /><br />
　　春正月己亥，大赦天下。<br /><br />
　　辛卯，立皇弟万岁为宋王。<br /><br />
　　二月戊戌，诏有司省内外厩马及上林池圃，悉以假贫民。<br /><br />
　　甲寅，太傅邓彪薨。窦氏之专权，彪守己而已。御史中丞周纡，国之司直也，屡忤窦氏，彪尝以事奏免纡，世以此讥之，然修礼教。<br /><br />
　　戊午，陇西地震。<br /><br />
　　三月庚寅，遣使分行贫民，开仓振廪。<br /><br />
　　夏六月丁酉，郡国雨雹，大如鴈子。<br /><br />
　　冬十月辛未，太尉尹睦薨。<br /><br />
　　十一月己丑，太仆张酺为太尉。<br /><br />

<td class="t50">汉明帝纪(14)</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　永平十七年<span class="zs">〔公元74年〕</span><br /><br />
　　秋八月丙寅，诏宥武威、张掖、酒泉、敦煌系囚右趾以下。<br /><br />
　　冬十月，窦固、耿秉将万余骑师击车师，王请降。于是固奏置西域都护、戊己校尉。陈睦为都护，耿恭为戊己校尉，关宠为戊己校尉；恭屯金蒲城，宠屯柳中城，相去千余里。<br /><br />
　　恭乃移檄乌孙、大昆弥，宣喻威德，皆遣使献马，求入侍天子。恭字伯宗，况之孙，性慷慨多大略，好将帅之事。<br /><br />
</td></tr>

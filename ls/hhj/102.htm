<br />
　　永建五年<span class="zs">〔公元130年〕</span><br /><br />
　　春正月，疏勒、大宛、莎车王遣使贡献。<br /><br />
　　夏四月，京都旱。<br /><br />
　　冬十月丙寅，天下系囚皆免死一等，徙边戍。<br /><br />
　　＊＊＊<br /><br />
　　六年<span class="zs">〔公元131年〕</span><br /><br />
　　无事。<br /><br />

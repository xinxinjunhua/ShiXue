<td class="t50">汉献帝纪(18)</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　建安十四年<span class="zs">〔公元209年〕</span><br /><br />
　　刘备以孙权行车骑将军，备自领荆州，屯公安。<br /><br />
　　七月，曹操征孙权。<br /><br />
　　冬十月晦，日有蚀之<br /><br />
　　＊＊＊<br /><br />
　　十五年<span class="zs">〔公元210年〕</span><br /><br />
　　春二月乙巳，日有蚀之。<br /><br />
　　＊＊＊<br /><br />
　　十六年<span class="zs">〔公元211年〕</span><br /><br />
　　春正月辛巳，以曹操世子丕为五官中郎将，副丞相。<br /><br />
　　三月，马超、韩遂反。<br /><br />
　　秋七月，操征超、遂，大破之。<br /><br />
　　是岁，刘备入益州。<br /><br />

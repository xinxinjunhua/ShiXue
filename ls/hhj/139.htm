<td class="t50">汉灵帝纪(7)</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　熹平二年<span class="zs">〔公元173年〕</span><br /><br />
　　春二月，大赦天下。<br /><br />
　　夏四月，司隶校尉段颎为太尉。<br /><br />
　　秋七月，光禄勋杨赐为司空。<br /><br />
　　＊＊＊<br /><br />
　　三年<span class="zs">〔公元174年〕</span><br /><br />
　　春二月己巳，大赦天下。<br /><br />
　　太尉段颎以久疾策免。河南尹李咸为太尉。<br /><br />
　　夏四月，立河间王子虎为济南王，奉孝仁皇帝祀。<br /><br />
　　冬十二月癸酉，日有蚀之。司空杨赐以疾策免。<br /><br />

<td class="t50">汉顺帝纪(11)</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　永和三年<span class="zs">〔公元138年〕</span><br /><br />
　　春二月乙亥，京师地震。<br /><br />
　　夏闰月己酉，京师地震。<br /><br />
　　秋八月乙卯，太白昼见。本志以为大将军梁商父子贵盛之象也。<br /><br />
　　己未，司徒黄尚以灾异罢。<br /><br />
　　九月癸酉，光禄勋刘寿为司徒。<br /><br />
　　十二月戊申，日有蚀之。会稽郡以闻，京师不见。<br /><br />

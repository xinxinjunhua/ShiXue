<td class="t50">汉安帝纪(7)</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　元初三年<span class="zs">〔公元116年〕</span><br /><br />
　　春二月，郡国十地震。<br /><br />
　　夏四月壬寅，封皇后父阎畅为北宜春侯。<br /><br />
　　冬十一月丙戌，初听大臣行三年丧。<br /><br />
　　郡国九地震。<br /><br />
　　＊＊＊<br /><br />
　　四年<span class="zs">〔公元117年〕</span><br /><br />
　　春二月乙巳，日有蚀之。九江太守以闻。<br /><br />
　　乙卯，大赦天下。<br /><br />
　　壬戌，武库火。<br /><br />
　　夏四月戊申，司空袁敞薨。<br /><br />
　　敞字叔平，少有节操，及在朝廷，廉洁无私。坐子与尚书郎张俊交通，漏泄省中语，策罢。敞不阿权势，失邓氏旨，遂自杀，朝廷隐之。敞死，葬以公礼，复位其子。<br /><br />
　　五月丁丑，太常李合为司空。<br /><br />

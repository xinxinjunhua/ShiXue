<td class="t50">王闳传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王闳者，王莽叔父平阿侯谭之子也，哀帝时为中常侍。时幸臣董贤为大司马，宠爱贵盛，闳屡谏，忤旨。哀帝临崩，以玺绶付贤曰：“无妄以与人。”<br /><br />
　　时国无嗣主，内外恇惧，闳白元后，请夺之；即带剑至宣德后闼，举手叱贤曰：“宫车晏驾，国嗣未立，公受恩深重，当俯伏号泣，何事久持玺绶以待祸至邪！”贤知闳必死，不敢拒之，乃跪授玺绶。闳持上太后，朝廷壮之。<br /><br />
　　及王莽篡位，僭忌闳，乃出为东郡太守。闳惧诛，常系药手内。莽败，汉兵起，闳独完全东郡三十余万户，归降更始。<br /><br />

<td class="t50">郭贺传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贺字乔卿，洛人。祖父坚伯，父游君，并修清节，不仕王莽。贺能明法，累官，建武中为尚书令，在职六年，晓习故事，多所匡益。拜荆州刺史，引见赏赐，恩宠隆异，及到宫，有殊政。百姓便之，歌曰：“厥德仁明郭乔卿，忠正朝廷上下平。”<br /><br />
　　显宗巡狩到南阳，特见嗟叹，赐以三公之服，黼黻冕旒。敕行部去襜帷，使百姓见其容服，以章有德。每所经过，吏人指以相示，莫不荣之。<br /><br />
　　永平四年，征拜河南尹，以清静称。在官三年卒，诏书慜惜，赐车一乘，钱四十万。<br /><br />
</td></tr>

<td class="t50">韩韶传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　韩韶字仲黄，颍川舞阳人也。少仕郡，辟司徒府。时，太山贼公孙举伪号历年，守、令不能破散，多为坐法。尚书选三府掾能理剧者，乃以韶为赢长。贼闻其贤，相戒不入赢境。余县多被寇盗，废耕桑，其流入县界求索衣粮者甚众。韶愍其饥困，乃开仓赈之，所禀赡万余户。主者争谓不可。韶曰：“长活沟壑之人，而以此伏罪，含笑入地矣。”太守素知韶名德，竟无所坐。以病卒官。同郡李膺、陈寔、杜密、荀淑等为立碑颂焉。<br /><br />
　　子融，字无长。少能辩理而不为章句学。声名甚盛，五府并辟。献帝初，至太仆。年七十卒。<br /><br />

<td class="t50">王望传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王望字慈卿，客授会稽，自议郎迁青州刺史，甚有威名，是时，州郡灾旱，百姓穷荒，望行部，道见饥者，裸行草食，五百余人，愍然哀之，因以便宜出所在布粟，给其廪粮，为作褐衣。事毕上言，帝以望不先表请，章示百官，详议其罪。<br /><br />
　　时公卿皆以为望之专命，法有常条。钟离意独曰：“昔华元、子反，楚、宋之良臣，不禀君命，擅平二国，《春秋》之义，以为美谈。今望怀义忘罪，当仁不让，若绳之以法，忽其本情，将乖圣朝爱育之旨。”帝嘉意议，赦其不罪。<br /><br />
</td></tr>

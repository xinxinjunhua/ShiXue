<td class="t50">郑众传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　郑众字季产，南阳犨人也。为人谨敏有心几。永平中，初给事太子家。肃宗即位，拜小黄门，迁中常侍。和帝初，加位钩盾令。<br /><br />
　　时窦太后秉政，后兄大将军宪等并窃威权，朝臣上下莫不附之，而众独一心王室，不事豪党，帝亲信焉。及宪兄弟图作不轨，众遂首谋诛之，以功迁大长秋。策勋班赏，每辞多受少。由是常与议事。中官用权，自众始焉。<br /><br />
　　十四年，帝念众功美，封为鄛乡侯，食邑千五百户。永初元年，和熹皇后益封三百户。<br /><br />
　　元初元年卒，养子闳嗣。闳卒，子安嗣。后国绝。桓帝延熹二年，绍封众曾孙石雠为关内侯。<br /><br />

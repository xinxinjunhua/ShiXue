<td class="t50">万脩传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　万脩字君游，扶风茂陵人也。更始时，为信都令，与太守任光、都尉李忠共城守，迎世祖，拜为偏将军，封造义侯。及破邯郸，拜右将军，从平河北。建武二年，更封槐里侯。与扬化将军坚镡俱击南阳，未克而病，卒于军。<br /><br />
　　子普嗣，徙封泫氏侯。普卒，子亲嗣，徙封扶柳侯。亲卒，无子，国除。永初七年，邓太后绍封脩曾孙丰为曲平亭侯。丰卒，子炽嗣。永建元年，炽卒，无子，国除。延熹二年，桓帝绍封脩玄孙恭为门德亭侯。<br /><br />
</td></tr>

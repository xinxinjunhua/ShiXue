<td class="t50">王扶传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王扶字子元，掖人也。少修节行，客居琅邪不其县，所止聚落化其德。国相张宗谒请，不应，欲强致之，遂杖策归乡里。连请，固病不起。太傅邓禹辟，不至。后拜议郎，会见，恂恂似不能言。然性沈正，不可干以非义，当世高之。<br /><br />
　　永平中，临邑侯刘复著《汉德颂》，盛称扶为名臣云。<br /><br />

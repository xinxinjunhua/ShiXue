<tr><td class="t50">习仪</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　凡大祀前四十日，中祀前三十日，每旬三、六、九日，太常卿帅读祝官、赞礼郎暨执事、乐舞集神乐署，习仪凝禧殿。故事，祭祀先期，太常寺演礼坛庙中。雍正九年谕曰：“是虽义取娴熟，实乖洁齐严肃本旨也。”乃停前一日坛庙演礼。其前二日凝禧殿如故。飨太庙，以王公一人监视宗室、觉罗官。祀先师，祭酒、司业监视国子师生，同日习乐殿庭，令乐部典乐监视亦如之。谒陵寝，读祝官等亦遇三、六、九日习仪皇陵。又岁暮将祭享，选内大臣打莽式，例演习于礼曹。时议谓发扬蹈厉，为公庭万舞变态云。<br /><br />

<tr><td class="t50">梁九传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　梁九，顺天人。自明末至清初，大内兴造匠作，皆九董其役。初，明时京师有工师冯巧者，董造宫殿，至崇祯间老矣。九往执业门下，数载，终不得其传，而服事左右，不懈益恭。一日九独侍，巧顾曰：“子可教矣！”于是尽授其奥。巧死，九遂隶籍工部，代执营造之事。康熙三十四年，重建太和殿，九手制木殿一区，以寸准尺，以尺准丈，大不逾数尺许，四阿重室，规模悉其，工作以之为准，无爽。<br /><br />
</td></tr>

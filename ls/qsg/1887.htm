<tr><td class="t50">张永祚传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张永祚，字景韶，浙江钱塘人。幼即喜仰观五纬，长通晓星学，究悉天象。年近三十，督学王兰生稔其学，录为诸生。闽浙总督嵇曾筠求通知星象者，试永祚策，立成数千言。荐于朝，授钦天监博士。屡引见，占候悉验。诏刊二十二史，永祚校勘天文、律历两志。及书成，告归。晚著书，曰天象原委。<br /><br />
　　卒后，有女传其学。壻沈度，亦善推步，守其书。<br /><br />

<tr><td class="t50">藩部传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　清起东夏，始定内盟。康熙、乾隆两戡准部。自松花、黑龙诸江，迤逦而西，绝大漠，亘金山，疆丁零、鲜卑之域，南尽昆仑、析支、渠搜，三危既宅，至于黑水，皆为藩部。抚驭宾贡，敻越汉、唐。屏翰之重，所以宠之；甥舅之联，所以戚之；锐刘之卫，所以怀之；教政之修，所以宣之。世更十二，载越廿纪，虔奉约束，聿共盟会，奥矣昌矣。<br /><br />
　　若夫元之戚垣，自为风气；明之蕃卫，虚有名字，盖未可以同年而语。带砺之盛，具见世表。兹综事实，列之为传。揆文奋武，悦近来远，疏附御侮，可得大凡。末造颠颓，乃彰畔涣。盛衰得失，斯可鉴已。<br /><br />

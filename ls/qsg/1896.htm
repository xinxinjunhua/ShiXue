<tr><td class="t50">杨沂孙传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　杨沂孙，字咏春，江苏常熟人。道光二十三年举人，官安徽凤阳知府。父忧归，遂不出，自号濠叟，少学于李兆洛，治周、秦诸子。耽书法，尤致力于篆、籀，著文字解说问讹，欲补苴段玉裁、王筠所未备。又考上古逮史籀、李斯，折衷于许慎，作在昔篇。篆、隶宗石如，而多自得。尝曰：“吾书篆、籀，颉颃邓氏，得意处或过之；分、隶则不能及也。”<br /><br />
　　光绪七年，卒，年六十九。<br /><br />
　　沂孙同时工篆、籀者，又推吴大澂，自有传。<br /><br />
</td></tr>

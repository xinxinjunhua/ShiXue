<tr><td class="t50">褚士宝传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　褚士宝，字复生，江南上海人。家素封，膂力过人，好技击，游学四方。与毕昆阳、武君卿为友，遂精枪法，名曰四平枪，旋转如风，人莫能近。同邑有张擎者，虎颈板肋，力举百钧，横行为闾里患，众请士宝除之。同饮酒，擎自夸其勇，酒酣，攘臂作势，士宝徐以箸点其胸，曰：“子盍坐而言乎？”擎遂默然，少顷辞去，越日，死于桥亭。明季福王南渡，兵部员外郎何刚荐士宝为伏波营游击。未之官，南都陷，终老于家。<br /><br />
　　所传弟子有王圣蕃、池天荣。天荣又传浙江提督乔照。其枪谱二种及治伤药酒方，世犹有藏之者。<br /><br />

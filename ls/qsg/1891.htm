<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　徐用锡，字坛长，宿迁人，占籍大兴。<br /><br />
　　登乡举，康熙四十八年进士，官翰林院编修。从李光地游，究心乐律、音韵、历数、书法。<br /><br />
　　五十四年，分校会试，严绝请讬，衔之者反嗾言官劾其把持闱事，圣祖原之，终以浮议罢归。乾隆初，起授翰林院侍读，年已八十。寻告归，卒于家。<br /><br />
　　用锡乡举出姜宸英之门，与何焯同为光地客，论书多与二家相出入。精于鉴别古人，言笔法亦多心得，著字学劄记二卷，载圭美堂集中。<br /><br />
</td></tr>

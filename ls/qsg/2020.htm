<tr><td class="t50">安集延玛尔噶朗那木干传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　安集延，亦大宛国地。喀什噶尔西北五百里，西至浩罕三百八十里。其贡道由回部以达京师。乾隆二十四年，将军兆惠檄谕协擒逆回霍集占，其伯克以逆回未至彼境，即专使籥请入觐。二十五年，伯克托克托玛哈墨第等来朝贡，赐宴赏赉如例。<br /><br />
　　玛尔噶朗，在安集延西百八十里。乾隆二十四年，伯克伊拉斯呼里拜率属投诚。<br /><br />
　　那木干，在玛尔噶朗西北八十里。其地东北与布鲁特杂处，东境逾河即为塔什干地。乾隆二十四年，与浩罕同时输诚内附。<br /><br />
</td></tr>

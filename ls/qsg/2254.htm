<tr><td class="t50">受业弟子见师长礼</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　受业弟子见师长礼，初见，师未出，先入，设席正位，俟堂下。师出召见，乃奉贽入，奠贽于席，北面再拜，师立答揖。兴，谨问起居。命坐乃侍坐。有问，起而对。辞出，三揖，不送。<br /><br />
　　常见侍坐，请业则起，请益则起。师有教，立听。命坐乃坐。师问更对，仍起而对。<br /><br />
　　朝入暮出均一揖。与同学弟子，以齿序之。<br /><br />

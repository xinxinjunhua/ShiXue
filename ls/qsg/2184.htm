<tr><td class="t50">祭厉</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　明制，自京师讫郡、县，皆祭厉坛。清初建都盛京，厉坛建地载门外。自世祖入关后，京师祭厉无闻焉。唯直省城隍合祀神祇坛，月朔、望有司诣庙上香，二跪六拜，旸雨愆期则祷。复以城隍主厉坛祀。<br /><br />
　　顺治初，直省府、州、县设坛城北郊，岁以清明日、七月十五日、十月朔日，用羊三、豕三、米饭三石、香烛、酒醴、楮帛祭本境无祀鬼神。府曰郡厉，县曰邑厉。先期备祭物，有司诣城隍庙以祭厉告。届日设燎炉坛南，奉城隍神位安坛正中。诣神位前跪，三上香，行礼用三拜。送燎，奠三爵，退，神位复初。<br /><br />

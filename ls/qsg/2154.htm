<tr><td class="t50">祀期</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　郊庙祭祀，祭前二岁十月，钦天监豫卜吉期。前一岁正月，疏卜吉者及诸祀定有日者以闻。颁示中外。太常寺按祀期先期题请，实礼部主之。世祖缵业，诏祭祀各分等次，以时致祭。自是大祀、中祀、群祀先后规定祀期，著为例。嘉庆七年，复定大、中祀遇忌辰不改祀期。咸丰中，更定关帝、文昌春秋祀期不用忌辰。其祭祀时刻，顺治十三年，诏祭天、地五鼓出宫，社稷、太庙并黎明。康熙十二年，依太宗旧制，坛庙用黎明，夕月用酉时。嘉庆八年，谕祭祀行礼，当在寅卯间，合礼经质明将事古义。凡亲行大祀，所司定时刻，承祭官暨执事陪祭者祗候，率意迟早者，御史纠之。<br /><br />

　　弼德院院长，副院长，各一人。特简兼任。顾问大臣三十有二人。特简兼任。掌参预密勿，朝夕论思，并审议洪疑大政。参议十人，请简。掌纂拟章制。秘书厅秘书长一人，请简。秘书官一、二等各三人，三等六人，俱奏补。分掌庶务。宣统三年设。<br /><br />

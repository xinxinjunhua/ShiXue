<tr><td class="t50">直省神祇</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　顺治初，令各府、川、县建坛，岁春秋仲月，有司致祭。<br /><br />
　　雍正三年，定制，有司斋二日，朝服莅事，仪视社稷坛。<br /><br />
　　乾隆八年，颁各省祀神祇祝文。二十二年，定各府、州、县祭境内山川，以春秋仲月戊日。其风、雷诸神，特锡封庙号以祀。自世宗至德宗末，代有增锡。凡列祀典者，有司随时致虔，用羊一、猪一、果五盘、帛一、尊一、爵三，读祝叩拜如故事。<br /><br />

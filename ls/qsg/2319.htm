<tr><td class="t50">后妃宝印</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　皇后金宝，清、汉文玉箸篆，交龙纽，平台，方四寸四分，厚一寸二分。<br /><br />
　　康熙四年，制太皇太后金宝、玉宝，盘龙纽。余皆与皇后宝同。玉宝台高一寸八分，余同金宝。<br /><br />
　　皇太后金宝、玉宝，俱盘龙纽。余与皇后宝同。<br /><br />
　　皇贵妃金宝，清、汉文玉箸篆，蹲龙纽，平台，方四寸，厚一寸二分。<br /><br />
　　贵妃金宝，与皇贵妃同。<br /><br />
　　妃金印，清、汉文玉箸篆，龟纽，平台，方三寸六分，厚一寸。<br /><br />

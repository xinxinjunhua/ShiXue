<tr><td class="t50">醇贤亲王及福晋丧仪</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　光绪十六年，醇亲王奕譞薨，定称号曰“皇帝本生考”，帝持服期年，缟素十有一日，辍朝如之。期年内御便殿仍素服。元旦谒堂子，诣慈宁宫，太和殿受朝，并礼服。唯升殿不宣表，乐设不作，罢宗亲、廷臣筵宴。祭文、碑文书皇帝名。初祭、大祭暨奉移园寝并御青袍褂，冠摘缨，亲诣行礼。又定庙制及祭葬，庙中殿宇及正门瓦色，中用黄琉璃，殿脊及正门四围用绿琉璃。祀以天子礼。岁时飨，四仲月朔举行，忌辰躬亲致祭。葬以亲王礼，帝亲制碑文，谥曰贤。<br /><br />
　　三十二年，其福晋叶赫那拉氏薨，称“皇帝本生妣”，丧仪如醇贤亲王例。<br /><br />

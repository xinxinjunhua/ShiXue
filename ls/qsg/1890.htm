<tr><td class="t50">蒋衡传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　蒋衡，改名振生，字湘帆，晚号拙老人。与澍同里。键户十二年，写十三经。乾隆中，进上，高宗命刻石国学，授衡国子监学正，终不出。衡早岁好游，足迹半海内，观碑关中，获晋、唐以来名迹，临摹三百余种，曰拙存堂临古帖。晚与澍相期斫胜，每临一书，相从质证。子骥，孙和，并以书世其家。<br /><br />
　　骥尤精分隶，著汉隶讹体集、古帖字体、续书法论各一卷，兼工画。其言曰：“汉、魏字体不同，性情各异。书须悬臂中锋，而用力以和平为主。作画之提顿逆折，参差映带，其理一尔。”皆阐明其先说。<br /><br />

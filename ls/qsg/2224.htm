<tr><td class="t50">郡主于归礼</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　崇德间，定亲王嫁女聘仪，鞍马、甲胄十有五。如嫁外藩，亲王以下纳采用驼、马、羊，准七九数。媵婢八，男、妇五户。顺治时，朝臣聘仪，鞍马、甲胄各七。乾隆时，定郡王媵婢六，男、妇四户。嫁朝臣聘用鞍马七，外藩纳采视崇德时为减。郡主以下，县主、郡君、县君、乡君于归礼，以次递杀。康熙八年，定郡主、县主归宁，禁母家给满洲人口，限用蒙、汉人八名，郡君至乡君，蒙、汉人六名，将军至宗室女，四名。<br /><br />
　　乾隆三十五年，罢朝臣进纳采礼，外藩如故。不设宴。<br /><br />

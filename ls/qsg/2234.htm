<tr><td class="t50">军礼序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　三曰军礼。国之大事，在祀与戎。周官制六军，司九伐，权属司马。而大军旅、大田役，其礼则宗伯掌之。是因治兵、振旅、茇舍、大阅之教，而寓蒐、苗、狝、狩之仪，以为社、礿、祊、烝之祭。如是，则讲武为有名，而杀兽为有礼。<br /><br />
　　有清武功燀赫，凡师征、受成、讲肄、行围诸礼节，厥制綦备。爰古谊，分录事要，著之于篇。古者日食救护，太仆赞鼓，亦属夏官，今亦类附云。<br /><br />

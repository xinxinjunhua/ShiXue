<tr><td class="t50">英年传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　英年，字菊侪，姓何氏，隶内务府，为汉军正白旗人。以贡生考取笔帖式，累迁郎中兼护军参领。<br /><br />
　　光绪中，历奉宸苑卿、左翼总兵、正红旗汉军副都统、工部右侍郎，调户部。拳匪乱作，以英年、载澜副载勋、刚毅统之。载勋等出示，招致义民助攻使馆，英年弗能阻，匪益横，任意戕杀官民。联军既陷京师，两宫幸西安，英年充行在查营大臣，旋授左都御史。行次猗氏，知县玉宝供张不备，疏劾之。<br /><br />
　　款成，各使议惩首祸，英年褫职论斩，羁西安狱，寻赐自尽。<br /><br />

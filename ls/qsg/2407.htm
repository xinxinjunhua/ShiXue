<tr><td class="t50">番部僧官</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　甘肃珍珠族国师、禅师，化族国师，灵藏族禅师，各一人。初隶河州。后珍珠、灵藏属循化，余杂处二十四关。<br /><br />
　　禅定寺禅师，嘉庆十九年无人袭。由土司兼辖，隶洮州。<br /><br />
　　番寺禅师，同治间回变后，不修职贡。各一人。垂巴寺、辖番人十族。著洛寺、辖番人二十三族。麻你寺辖番人二十一族。僧纲，圆成寺、辖番人四族。阎家寺后无人袭。<br /><br />
　　僧正，各一人。<br /><br />
</td></tr>

<tr><td class="t50">色普徵额传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　色普徵额，舒穆鲁氏，满洲正白旗人。咸丰十年，贼窜畿疆，以健锐营前锋校，从大学士瑞麟往讨，裹创力战。旋从僧格林沁剿捻，斩馘甚众。同治初，又从都统穆腾阿军畿南。<br /><br />
　　光绪三年，迁参领。八年，军政课最，授镶红旗汉军副都统，充神机营专操大臣。二十四年，徙驻南苑。<br /><br />
　　二十六年，擢宁夏将军，未行，拳乱起，命守正阳门，昼夜徼循不少休。联军攻城，中炮死。赠太子少保，谥壮恪，予骑都尉兼云骑尉世职。<br /><br />
</td></tr>

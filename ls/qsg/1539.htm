<tr><td class="t50">朴寿传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　朴寿，字仁山，满洲镶黄旗人。光绪二十年举人，授吏部主事，累迁郎中。拳乱起，联军入城，首与各国谋保商民。出为山西归绥道，简库伦办事大臣。<br /><br />
　　三十二年，召授镶蓝旗满洲副都统，迁正黄旗汉军都统。明年，除福州将军，整旗务，严烟禁，专志训练，得精卒四千人。<br /><br />
　　宣统三年，省城民军起，率防军与搏，火器猛利，民军几不支。然民军虽被创，辄随时募集，防军以猛斗故，伤亡多，卒败溃。朴寿被执，受挫辱，不屈，遂支解之，弃尸山下，其死状为最烈云。<br /><br />
　　事闻，赠太子太保，予二等轻车都尉世职，谥忠肃。<br /><br />

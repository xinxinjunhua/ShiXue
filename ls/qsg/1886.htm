<tr><td class="t50">刘禄传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘禄，河南人。善风角。圣祖召直蒙养斋，欲授以官，屡辞。从上北征，会粮饷乏济，命卜之，曰：“不出三日必至。”果如其言。后从幸热河，一日，踉跄至宫门，请上速徙高阜以避水厄。时方晴霁，夜山水涨发，果冲没行宫。<br /><br />
　　又善相人，谓张廷玉、史贻直皆异日太平宰相。<br /><br />
　　六十一年冬，乞假归，至十一月望日，忽命家人制縗服，北向哭，未几，哀诏至，正圣祖崩之后二日也。后卒于家。<br /><br />

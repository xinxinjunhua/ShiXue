<tr><td class="t50">王公婚礼</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王公婚礼，崇德间定制，凡亲王聘朝臣女为婚，纳采日，府属官充使，是日设宴，牲酒盛陈。婚日宴亦如之。给女父母服物鞍马符例。若外藩亲、郡王，贝勒，台吉女，仪物视爵次为差。婚日宴，牲多少异宜。世子，郡王，贝勒，贝子，镇、辅国公聘娶，仪物暨宴日牲酒，其数递降，皆有差等。顺治间，更婚制，限贝勒以下罢用珠缎。赐婚，王公诣中和殿或位育宫谢恩，其子未受封者，婚礼视其父，已受封则从其爵。康熙初，始令王公纳采易布为缎，余如故。<br /><br />
</td></tr>

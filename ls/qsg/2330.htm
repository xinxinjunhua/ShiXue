<tr><td class="t50">选举志序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　古者取士之法，莫备于成周，而得人之盛，亦以成周为最。自唐以后，废选举之制，改用科目，历代相沿。而明则专取四子书及易、书、诗、春秋、礼记五经命题试士，谓之制义。<br /><br />
　　有清一沿明制，二百余年，虽有以他途进者，终不得与科第出身者相比。康、乾两朝，特开制科。博学鸿词，号称得人。然所试者亦仅诗、赋、策论而已。<br /><br />
　　洎乎末造，世变日亟。论者谓科目人才不足应时务，毅然罢科举，兴学校。采东、西各国教育之新制，变唐、宋以来选举之成规。前后学制，判然两事焉。<br /><br />
　　今综其章制沿革新旧异同之故著于篇。<br /><br />

<tr><td class="t50">诸臣封爵世表</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　《史记》、《汉书》皆表列侯。明史世表亦及功臣。清于封爵，皆仿古制。世及为礼，视汉特优。非罔替者，甲令按等皆有袭次，不容稍紊。开国所封，沐雨栉风，攀鳞附翼，与汉元功实无差异。其后荡定边徼，开拓疆宇，儋爵酬庸，赫奕当代。内地征讨，役稍钜者，胙茅传胤，亦等边功。惟福康安非有殊勋，竟赠真王，袭降之制，一视天潢，亦云滥矣。<br /><br />
　　子、男以次得世职者，往往并袭，今并为表，最初封者，恒越十代，除爵既鲜，延世莫废，非汉列侯所敢望也。外戚封者，附书于后。作诸臣封爵世表。<br /><br />
　　（表略）<br /><br />

<tr><td class="t50">宾礼</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　四曰宾礼。清初藩服有二类，分隶理藩院、主客司。隶院者，蒙古喀尔喀，西藏、青海、廓尔喀是也；隶司者，曰朝鲜，曰越南，曰南掌，曰缅甸，曰苏禄，曰荷兰，曰暹罗，曰琉球。亲疏略判，于礼同为属也。西洋诸国，始亦属于藩部，逮咸、同以降，欧风亚雨，咄咄逼人，觐聘往来，缔结齐等，而于礼则又为敌。<br /><br />
　　夫诗歌“有客”，传载“交邻”，无论属国、与国，要之，来者皆宾也。我为主人，凡所以将事，皆宾礼也。兹编分著其仪节，而王公百官相见礼与士庶相见礼，亦附识焉。<br /><br />

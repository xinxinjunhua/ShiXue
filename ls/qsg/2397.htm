<tr><td class="t50">虎枪营</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　虎枪营总统无员限。王、公、大臣兼任。总领六人。上三旗各二人，自一品至五品内特简。虎枪校、委虎枪校，各二十有一人。旗各七人，俱虎枪营内选用。笔帖式六人。总统、总领掌辖本营官兵以备扈从，车驾蒐狩列前驱。<br /><br />
　　康熙二十三年，黑龙江将军送满兵善骑射者四十人，分隶上三旗，始设虎枪营，以总统一人领之，置总领虎枪校，旗各一人。雍正元年，增总领，旗各一人，虎枪校各六人，置委虎枪校各七人。乾隆三年，始铸关防。<br /><br />
</td></tr>

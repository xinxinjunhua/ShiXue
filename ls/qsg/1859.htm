<tr><td class="t50">彭之灿传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　彭之灿，字了凡，蠡县诸生。甲申后携妻寓饶阳作村塾师。未几，妻、子相继死，至苏门，与孙奇逢游。然性不谐俗，爱静坐。有人延于家，以市嚣，辄避去。尝渡河南游，韩鼎业为馆之僧舍，年余，又弃去。独担瓢笠图书，遍游嵩、少、王屋诸名胜。在九山绝粒数日，奇逢挽之夏峰，劝归老先人墓旁。之灿曰：“某出门时，已誓告先垅不再返，不能蹈东海、入西山而死，即沟壑道路，无恨也！”<br /><br />
　　顺治十五年六月，竟死啸台东北石柱下。奇逢为镌石记其事，立墓上，曰“饿夫之墓”。之灿与容城张果中、西华理鬯和，并称“苏门三贤。”<br /><br />

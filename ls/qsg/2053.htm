<tr><td class="t50">灾异志序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　传曰：天有三辰，地有五行，五行之沴，地气为之也。水不润下，火不炎上，木不曲直，金不从革，土爰稼穑，稼穑不熟，是之谓失其性。五行之性本乎地，人附于地，人之五事，又应于地之五行，其洪范最初之义乎？<br /><br />
　　明史五行志著其祥异，而削事应之附会，其言诚韪矣。今准明史之例，并折衷古义，以补前史之阙焉。<br /><br />

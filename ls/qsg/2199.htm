<tr><td class="t50">醇贤亲王庙</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　光绪十六年，醇贤亲王奕譞薨，中旨引高宗濮议辨，应称所生曰“本生父”，没称“本生考”，立庙不祧，祀以天子之礼，合乎“父为士，子为大夫，葬以士，祭以大夫”古义，斯尊亲两全矣。乃定称号曰“皇帝本生考”。<br /><br />
　　复定庙祀典，建庙新赐邸第，额曰醇贤亲王庙。正殿七楹，东、西庑殿，后寝室，各五楹。中门三。门内焚帛亭、祭器亭，其外宰牲亭、神库、神厨。大门三。殿宇正门中覆黄琉璃，殿脊及门四周上覆绿琉璃。其祀仪、乐舞、祭器、祭品视天子礼。凡时飨以四仲月朔，袭王承祭。帝亲行，则袭王陪祀。诞辰、忌日，帝亲诣行礼。<br /><br />

<tr><td class="t50">李模传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李模，字子木，吴县人。天启乙丑进士，授东莞知县。考最，入为御史。因劾论中官，谪南京国子监典籍。福王立，封四镇为侯、伯，模上言：“拥立时，陛下不以得位为利，诸臣何敢以定策为功？甚至侯、伯之封，轻加镇将。夫诸将事先帝未收桑榆之效，事陛下未彰汗马之绩，方应戴罪，何有勋劳？使诸将果忠义者，必先慰先帝殉国之灵，而后可膺陛下延世之赏。”<br /><br />
　　报闻。寻改为河南道御史。<br /><br />
　　马、阮乱政，叹曰：“事无可为矣！”即请告，不复出。杜门里居，三十年如一日。幼与徐汧为总角交，汧死国事，为恤其家而存其孤，不渝旧好。年八十，卒于家。<br /><br />

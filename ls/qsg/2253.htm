<tr><td class="t50">士庶相见礼</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　宾及门，从者通名，主人出迎大门外，揖入。及门、及阶揖如初。登堂，各北面再拜。兴，主宾互正坐。即席，宾东主西。饮茶，语毕，宾退，揖。及阶、及门，揖，辞，主人皆答揖。送大门外，揖如初。卑幼见尊长礼，及门通名，俟外次，尊长召入见，升阶，北面再拜，尊长西面答揖。命坐，视尊长坐次侍坐。荼至，揖，语毕，禀辞，三揖。凡揖皆答，出不送。若尊长来见，卑幼迎送大门外。余如前仪。<br /><br />
　　见父执友，与见尊长仪同。<br /><br />

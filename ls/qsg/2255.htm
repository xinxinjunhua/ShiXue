<tr><td class="t50">凶礼</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　五曰凶礼。三年之丧，自天子以至于庶人，无贵贱一也。<br /><br />
　　有清孝治光昭，上自帝后丧仪，下逮士庶丧制，称情立文，详载会典与通礼。兹依次类编，累朝损益，皎然若鉴焉。<br /><br />

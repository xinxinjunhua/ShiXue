<tr><td class="t50">部院大臣年表</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　汉书年表，遍及卿尹。明史所表，止于七卿。清增理藩院，蒙、藏、回诸部，都凡要务，于焉汇归，辑民绥边，所任殊重，与七卿等。侍郎之属，虽曰副贰，然与尚书皆为敌体，题奏之草，有一不画，例不得上，奖勚罚过，皆所与同；且内而枢辅，外而督抚，每由兹选，材隽所萃，未可阙也。光绪之季，增新汰旧，并于名称亦多更易，依时为表，期无舛漏。管部管院，权任亦重，以非官制，故概不书。作部院大臣年表。<br /><br />
　　（表略）<br /><br />

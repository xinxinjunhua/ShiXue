<tr><td class="t50">冯行贞传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　冯行贞，字服之，江南常熟人。父班，以文学者。兄行贤，传其学。行贞少亦喜读书，工小词，性倜傥不羁。善射，能以后矢落前矢，投石子于百步外无不中。实鸡卵壳以矿灰，遇剧盗，辄先发鸡卵中其目。山东响马老瓜贼为行旅患，闻冯氏名，莫敢撄。从休宁程打虎及张老受枪法，驰突无敌。山行遇虎，以短枪毙之。尝为客报仇。<br /><br />
　　康熙中，从康亲王杰书军南征，有功，当得官，寻弃归。侨居吴中娄门外村落，以经书教授，诗画自娱。年七十余，卒。以枪法授同县陶元淳，元淳后无传者。<br /><br />

<tr><td class="t50">提学使</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　提学使司提学使一人，正三品。掌教育行政，稽覈学校规程，徵考艺文师范。署设六科：曰总务，曰专门，曰普通，曰实业，曰图书，曰会计。科长、科员分治之。遴谙学务者充之。别设学务公所，有议长、议绅以讨论其事。奏充。光绪三十一年改置。增吉林、黑龙江、江宁、江苏、旧置江南学政。新疆各一人，余仍学政额。<br /><br />
</td></tr>

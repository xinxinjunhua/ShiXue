<tr><td class="t50">宝丰传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　宗室宝丰，字龢年，隶正蓝旗。好读书，有清尚。光绪十五年进士，选庶吉士，授编修，历迁至侍讲。二十五年，立溥俊为“大阿哥”，命直弘德殿，并赏高赓恩四品京堂，同授大阿哥读。明年，两宫西幸，宝丰以随扈不果，愤甚，誓死职。<br /><br />
　　自题绝命词曰：“忠孝节廉，本乎天性。见利思义，见危授命。呜呼宝丰，不失其正。”<br /><br />
　　饮金死。赠太常寺卿。<br /><br />

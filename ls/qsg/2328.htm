<tr><td class="t50">额驸仪卫</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　固伦公主额驸，红仗二，红伞一，大小青扇二，旗枪十，豹尾枪二。常日前引二人，后从八人。<br /><br />
　　和硕公主额驸，红棍四，杏黄伞二，大、小青扇二，旗枪十。常日前引二人，后从八人。<br /><br />
　　郡主额驸，红棍四，杏黄伞一，大、小青扇二，旗枪十。常日前引二人，后从八人。<br /><br />
　　县主额驸，杏黄伞一，青扇一，旗枪六。常日前引二人，后从六人。<br /><br />
　　郡君额驸，青扇一，旗枪六。常日前引二人，后从六人。<br /><br />
　　县君额驸，青扇一，旗枪四。常日无前引，惟后从二人。<br /><br />
　　乡君额驸，青扇一，旗枪二。常日惟后从一人。<br /><br />

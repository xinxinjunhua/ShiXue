<td class="t50">蒯鳌传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　蒯鳌，宣城人，善属文。<br /><br />
　　南唐承唐末文体织丽之弊，士率不能自振。<br /><br />
　　鳌独不事华藻，以理趣为本，有承平余风。<br /><br />
　　然居乡饮博无行，不为人士所容，乃去。入庐山国学，亡赖尤甚。<br /><br />
　　晚乃励风操、尚信义，一言之出，必复而后已。<br /><br />
　　尝蓄龙尾砚，友人欲之而不言，鳌亦心许之，未及予也。一日友人不告而归，鳌悔恨，徒步数百里追之，授砚而还。<br /><br />
　　犹以素行为有司所摈，终国亡不仕。<br /><br />
　　久之，游京师，擢进士第，仕至殿中丞。<br /><br />
　　樊若水欲荐于朝，鳌耻之。亟致仕，归隐庐山，数年卒。<br /><br />

<td class="t50">孟坚传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　孟坚始事建州王延政为将。<br /><br />
　　保大初，查文徽讨王氏之乱，坚来降。<br /><br />
　　文徽即以兵付之，出奇鏖击有功。<br /><br />
　　及冯延鲁之攻福州也，坚亦在兵间。<br /><br />
　　吴越援兵自海道至，阻淖不得登岸。延鲁不知兵，急于破敌，欲敛兵诱而蹙之。坚谏曰：“吴越兵进退俱不能，方致死于我。得至平地，未见可胜也。”延鲁大言曰：“吾自击之，无预君事！”吴越兵得平地，果不可制。李弘义自城中出，尽锐夹击，延鲁大败，弃军遁，坚力战以死。<br /><br />
　　延鲁虽贬，而其党方盛，故坚之死事不见录，国人哀之。<br /><br />

<td class="t50">跋</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　是书凡马令、胡恢、陆游三本，先辈云：马、胡诠次，识力相似，而陆独遒迈，得史迁家法，今马本盛行，胡本不传，放翁书一十八卷，仅见于监官胡孝辕秘册函中，又半烬于武林之火。庚午夏仲，购其焚余板一百有奇，断蚀不能读。因简家藏抄本订正，附梓于全集逸稿之末，至若与马玄康异同繁简，已详见胡、沈两公跋语云。<br /><br />
　　湖南 毛晋识<br /><br />

<td class="t50">张雄传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张雄，失其乡里家世。周人来侵淮南，民自相结为部伍以拒周师，谓之义军。而雄所将最有功，元宗命为义军首领。及割地，徙之江南，历袁、汀州刺史。后主见讨，保大中书将无在者，乃擢雄统军使。雄谓诸子曰：“吾必死国难，尔辈不从吾死，非忠孝也！”诸子泣受命。与田钦祚战于溧水，败绩，他将皆遁，士卒死者万余人。雄与其子力战，俱死。不同行者，亦死于他陈。父子八人，无生存者。时金陵已危蹙，不复议赠恤，国人哀之。<br /><br />
</td></tr>

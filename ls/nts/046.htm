<td class="t50">毛炳传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　毛炳，洪州丰城人。<br /><br />
　　隐居庐山，时为诸生讲，得钱即沽酒。尝醉卧道旁，有里正掖起之，炳瞋目呵之曰：“醉者自醉，醒者自醒。亟去，毋扰予睡！”后徙居南台山，书年，忽书齐壁曰：“先生不住此，千载惟空山。”因大醉，一夕卒。与炳同时，又有酒秃者焉。<br /><br />
　　酒秃姓高氏，骈族子，弃家祝发，博极群书，善讲说，而脱略跌宕，无日不醉。<br /><br />
　　后主召讲华严，梵行一品。<br /><br />
　　赉金帛甚厚，玄寂。即日尽送酒家，日夜剧饮。<br /><br />
　　醉则从小儿数十，浩歌道中，歌曰：“酒秃酒秃，何荣何辱。但见衣冠成古丘，不见江河变陵谷。”一日，醉死石子冈。<br /><br />

<td class="t50">刘洞传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘洞，庐陵人。<br /><br />
　　隐居庐山二十年，能诗，长于五字唐律，自言得贾岛法。<br /><br />
　　后主嗣位，尤属意诗人，或以洞言者，洞遂献诗百篇。卷首石城篇，其词：“石城古渡头，一望思悠悠，几许六朝事，不禁江水流。”后主读之，感怆不怡者久之。<br /><br />
　　因弃不复观，洞亦不复见省。<br /><br />
　　金陵受围，洞犹在城中。国亡，洞过故宫阙，徘徊赋诗，多感慨悲伤，不以不遇故有怨怼语。<br /><br />
　　未几卒。<br /><br />
　　与洞同时有夏宝松者，亦隐庐山，相与为诗友。洞有夜坐诗，宝松有宿江诗，皆见称一时，号刘夜坐、夏江城云。<br /><br />

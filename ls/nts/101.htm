<td class="t50">郭昭庆传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　郭昭庆，庐陵人。<br /><br />
　　博学能自力，尝著唐春秋三十卷。<br /><br />
　　保大中，献所著治书，补扬子尉，辞不受。<br /><br />
　　后主时，复献经国治民论，擅著作郎。时方奉中朝，凡岁庆贺贡方物笺表，及廷劳宴饯之辞，率命昭庆为之。<br /><br />
　　一日方晨起造朝，暴卒。<br /><br />

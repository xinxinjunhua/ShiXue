<td class="t50">段处常传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　段处常，失其乡里家世。保大中，为兵部郎中。周侵淮南，元宗命处常浮海使契丹，乞陈利害，甚辩。契丹本通南唐，徒持虚辞，利南方茶药珠贝而已。至是，无出师意，而留处常不遣。处常怨其无信，誓死国事，数面诮虏主。虏主亦愧其言，优容之，以病卒于虏。<br /><br />
</td></tr>

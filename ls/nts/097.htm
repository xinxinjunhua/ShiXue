<td class="t50">刘崇俊传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘崇俊，字德修，楚州山阳人。<br /><br />
　　祖全，以功臣为濠州刺史，有威名。<br /><br />
　　全卒，子仁规继其任，为政苛虐。<br /><br />
　　及卒，崇俊继之，尽反仁规之政，人怀其惠。数年，渐专恣不法，多畜不暹。<br /><br />
　　使过淮剽掠，获美女良马以自奉。<br /><br />
　　元宗升濠州为定远军，因拜崇俊节度使，以其子节尚太宁公主，然元宗亦恶其为人。会寿州姚景卒，崇俊厚赂权贵，求兼领寿州。<br /><br />
　　元宗乃阳若不解其意，命移镇寿州，而遣楚州刺史刘彦贞驰入濠州代之。<br /><br />
　　崇俊自悼失计，颇革心循法度。未几得疾，卒年四十，赠太尉，谥曰威。<br /><br />

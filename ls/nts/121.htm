<td class="t50">李冠传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李冠，善吹洞箫，悲壮入云。元宗将召之，会军旅事兴，不暇。司徒李建勋亦知音，绝叹赏之，冠辄不遇。周显德中，北游梁宋，每醉，辄登市楼长啸。后不知所终。<br /><br />

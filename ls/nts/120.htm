<td class="t50">潘扆传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　潘扆，往来江淮间，自称野客。尝依海州刺史郑匡国，不甚见礼，馆之马厩旁。一日，从匡国猎近郊。匡国妻行至厩，因视扆所居，四壁萧然，草席竹笥而已。发笥，睹二锡丸，亦颇怪之。扆归大惊曰：“何物妇人，触吾剑。赖吾摄其光芒，不然身首殊矣！”或以告匡国，匡国竦然曰：“殆剑客也！”求学其术。扆曰：“姑一试之。”乃俱至静院，探怀出二锡丸置掌中。俄而气出指端，如二白虹，旋饶匡国颈，有声铮然。匡国汗下如雨，曰：“先生之术神矣！”观止矣，扆笑引手收之，复为锡丸。匡国表荐于烈祖，召居紫极宫，数年卒。<br /><br />

<td class="t50">吴媛传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　吴媛，浚仪人，唐史官兢之后。父志野，义不仕梁，南游吴，遂家庐陵。媛适段甲，生子未晬。段卒，父母以媛少，议嫁之。媛剺面自誓，事舅姑极备谨，教所生子为善士。韩熙载使江南，表其节云。<br /><br />
</td></tr>

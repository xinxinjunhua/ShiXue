<td class="t50">吴廷绍传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　吴廷绍为太医令，烈祖因食饴，喉中噎，国医皆莫能愈。廷绍尚未知名，独谓当进楮实汤，一服，疾失去。冯延巳苦脑中痛，累日不减。廷绍密诘厨人曰：“相公平日嗜何等？”对曰：“多食山鸡、鹧鸪。”廷绍曰：“吾得之矣！”投以甘豆汤，亦愈。群医默识之，他日取用，皆不验。或扣之，答曰：“噎因甘起，故以楮实汤治之。山鸡、鹧鸪，皆食乌头、半夏，故以甘豆汤解其毒耳。”闻者大服。<br /><br />

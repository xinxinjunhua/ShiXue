<td class="t50">朱弼传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　朱弼，字君佐，建州人。<br /><br />
　　举明经第一，授国子助教，知庐山国学。<br /><br />
　　卢绛、蒯鳌、诸葛涛，饮博不逞，患苦诸生。<br /><br />
　　学官依违，无收问者。及弼至，一切绳以礼法，每升堂讲说，座下肃然。<br /><br />
　　绛等亦愧服引去，徒自四方来者，数倍平时。<br /><br />
　　国亡，补衡山县主簿。<br /><br />
　　秩满，求为南狱庙令，卒。<br /><br />

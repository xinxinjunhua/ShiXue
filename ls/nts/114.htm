<td class="t50">小周后传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　后主国后周氏，昭惠后妹也。昭惠卒，未几，后主居圣尊后丧，故中宫久虚。开宝元年，始议立后为继室。命太常博士陈致雍，考古今沿革，草具婚礼。又命学士徐铉、史官潘佑参定。文安郡公徐游评其异同，游多是佑议，遂施用之。逾月，游病疽，铉怼其不主已议，戏语人曰：“周孔亦能为厉乎？”后少以戚里，间入宫掖，圣尊后甚爱之，故立焉，被宠过于昭惠。时后主于群花间作亭，雕镂华丽，而极迫小，仅容二人，每与后酣饮其中。国亡，从后主北迁，封郑国夫人。太平兴国二年，后主殂，后悲哀不自胜，亦卒。<br /><br />

<td class="t50">李从镒传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　从镒，元宗第八子。初封舒国公，改封蒋。太祖亲征扬州李重进，遣从镒朝行在。进封邓王，出镇宜州。后主宴饯绮霞阁，与近臣俱赋诗，而后主自为序。及贬制度，降江国公。太祖以不朝来讨，后主遣从镒贡帛二十万匹、白金二十万斤。大兵悉已南渡，从镒留京师，馆怀信驿。捷奏至，百僚称贺。阁门趣随班入，邸吏亦谓当有贡献，其介潘慎修以为国被封，濒亡，而使者旅贺，非礼，伹奉方物以待罪。太祖嘉其礼，为易供帐，加赐牲饩上樽。命知制诰李穆送从镒归国谕指，令后主亟自归。仍命曹彬等驱攻以俟之，而后主卒不行，以至城陷。从镒从后主北归，改名从浦，卒。<br /><br />
</td></tr>

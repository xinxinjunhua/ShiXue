<td class="t50">王崇文传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王崇文，父琯，吴大将。崇文以门地选尚烈祖妹广德公主，历百胜、永安二镇。庐陵民尚气喜讼，以先止为怯，素号难治。崇文一以法治之，不少贷，讼为废息。建州初平，崇文安集之，民忘其乱，又涉武昌。自南唐兴，崇文内典禁兵。出更藩任，位兼将相，终始富贵。而平居被服儒雅，风度夷旷。在武昌方阅骑士鞠场，傍古屋数十间崩坏，声震数里。闻者莫知所为，崇文指挥使令，讫事不失常度，竟亦不问。后主初立，上疏历陈朝政，赐书褒之，加中书令，卒。<br /><br />
</td></tr>

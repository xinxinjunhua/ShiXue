<td class="t50">陈曙传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　陈曙，蜀人。<br /><br />
　　尝举进士。<br /><br />
　　唐末，避地淮南，多遁于蕲州山中。<br /><br />
　　乡人有会集或祭神，曙不待召而至，醉饱，乃辞去。<br /><br />
　　由是人多设虚坐，陈酒肴以俟之。同日或至曙家，舍中惟一榻，速书数卷。<br /><br />
　　与蛇虎亲居，不设牖户，雨雪满至，亦自若。<br /><br />
　　人有乘其出往窥之者，曙必自外来。<br /><br />
　　凡数十年，颜发不少异。元宗命中书舍人高越召之，不肯起。<br /><br />
　　后徙居鄂渚，及洪之西山，不知所终。<br /><br />
</td></tr>

<td class="t50">李仲宣传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　仲宣，小字瑞保。与仲寓同日受封，仲宣封宣城公。三岁，诵《孝经》不遗一字。宫中燕侍合礼，如在朝廷，昭惠后尤爱之。宋乾德二年，仲宣才四岁。一日戏佛像前，有大琉璃灯为猫触堕地，划然作声，仲宣因惊癎得疾，竟卒。追封岐王，谥怀献。时昭惠已疾甚，闻仲宣夭，悲哀更遽，数日而绝。<br /><br />
</td></tr>

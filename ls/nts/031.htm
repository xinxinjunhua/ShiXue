<td class="t50">王会传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王会，庐州庐江人，本名安。<br /><br />
　　少事吴武王，王尝临战，升高冢望敌，安捧唾壶侍侧。<br /><br />
　　左右皆注目前视，忽有卒持矟径趋王，莫能御者。会置壶于地，引弓射之，一发而殪，徐纳弓？ 中。<br /><br />
　　复捧壶立，色不变，王喜，抚其背曰：“汝器度如此，他日必富贵。”积功至袁州刺史。<br /><br />
　　烈祖代吴，用为百胜军节度使。虔州与岭南地接，南汉使者往来，节度使当燕劳问遗。<br /><br />
　　而会故名，犯汉王祖讳，乃赐今名。<br /><br />
　　升元五年卒，年七十三。<br /><br />

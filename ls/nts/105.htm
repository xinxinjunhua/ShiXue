<td class="t50">李元清传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李元清，濠州人。<br /><br />
　　徙金陵，趋健善走，能及奔马，常步入梁宋刺事。<br /><br />
　　开宝中，后主以吉州永新与湖南临，命元清为永新制置使。每数月，一托疾，不坐衙，辄微服入湖南境，人无知者。<br /><br />
　　以故敌人动息，皆知之。<br /><br />
　　累年，边障晏然。<br /><br />
　　国亡，归京师。<br /><br />
　　元清心不欲仕二国，伪称失明。召验之，挥刃将及颈，而目不瞬，乃放归濠州，卒。<br /><br />
</td></tr>

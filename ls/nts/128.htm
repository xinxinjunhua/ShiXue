<td class="t50">赵仁泽传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　赵仁泽，失其乡里家世。保大中，为常州团练使。周人来侵，吴越乘间出兵攻常州。仁泽战败，被执，归之钱唐。仁泽见吴越王不拜，责之曰：“我烈祖皇帝中兴，首与先王结好，质诸天地。王今见利忘义，将何面目入先王庙乎！”吴越王怒，以刀抉其口至耳。丞相元德昭嘉仁泽之忠，以良药敷疮，获愈。后不知所终。<br /><br />
</td></tr>

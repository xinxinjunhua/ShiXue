<td class="t50">江为传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　江为，宋人，避乱徙闽。<br /><br />
　　元宗初设贡举，为屡为有司所黜。<br /><br />
　　有题白鹿寺诗，元宗南迁，过而爱之。<br /><br />
　　为由是愈自负，傲睨一时。卒无荐引者，居怀忧愤，束书欲东走吴越，为同谋者所发。<br /><br />
　　按得其状，伏诛。<br /><br />
</td></tr>

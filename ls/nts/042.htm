<td class="t50">陈况传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　陈况，闽人。<br /><br />
　　性夷澹，隐于庐山四十年。<br /><br />
　　衣食乏绝，不以动心。<br /><br />
　　苦思于诗，得句未成章，已播远近。<br /><br />
　　元宗闻其名，召见。时方祁塞，元宗见其衣单薄，降手札曰：“欲以绫绮衣赐卿，卿必不受，今赐朕自服紬缣衣三十事。”俄授江州士曹掾，固辞归。<br /><br />
　　卒于山中，年七十余。<br /><br />

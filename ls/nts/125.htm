<td class="t50">史守冲潘扆传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　史守冲、潘扆，皆不知何许人。烈祖尝梦得神丹，既觉，语左右，欲物色访求。而守冲适诣宫门献丹方，扆亦以方继进。烈祖皆神之，以为仙人，使炼金石为丹。服之，多暴怒。群臣奏事，往往厉声色诘让。尝以其药赐李建勋，建勋乘间言曰：“臣服甫数日，已觉炎躁，岂可常进哉？”烈祖笑曰：“孤服之已久，宁有是事？”谏者皆不从。俄而疽发，遂至大渐。临终，谓元宗曰：“吾服金石求长年，今反若此，汝宜以为戒也！”<br /><br />

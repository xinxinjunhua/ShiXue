<td class="t50">余洪妻郑氏传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　余洪妻郑氏。洪为闽将，唐师下建州，裨将王建封得郑氏。以其有色，而自持坚贞不挠，不敢犯。献之大将查文徽，文徽欲纳之，郑大骂曰：“王师吊伐，当褒录节义，以表励风节。建封出行伍，尚知见惮。君，元帅也，乃欲为祸首耶！”文徽大惭，亟访其夫归之。<br /><br />

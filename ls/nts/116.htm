<td class="t50">李从谦传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　从谦，元宗第九子。数岁，为弈棋诗，有思致，后主赏叹之。历封鄂国公、宜春王，进封吉王。及贬制度，降鄂国公。归朝，为右神武大将军。淳化五年九月，以本官出为安远行军司马。后不知其所终。<br /><br />
　　从庆，失其官封。<br /><br />
　　从信，逸其行实。<br /><br />
</td></tr>

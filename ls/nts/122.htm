<td class="t50">某御厨传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　某御厨者，失其姓名，唐长安旧人也。从中师至江表，未还，闻崔胤诛北司，遂亡命，而某留事吴。及烈祖受禅，御膳宴设赖之，略有中朝承平遗风。其食味有鹭鸶饼、天喜饼、驼蹄餤、春分餤、密云饼、铛糟炙、珑璁餤、红头签、五色馄饨、子毋馒头，旧法具存。<br /><br />
</td></tr>

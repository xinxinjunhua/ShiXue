<td class="t50">廖居素传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　廖居素，将乐人。<br /><br />
　　仕烈祖、元宗之间。<br /><br />
　　为人坚正，不为当国者所喜。困校书郎二十年，始得大理司直。<br /><br />
　　后主嗣位，稍迁至翰林光庆使、检校太保判三司。<br /><br />
　　后主孱昏，而群臣方充位保富贵，国益削。<br /><br />
　　居素独慷慨骤谏，冀后主一悟，终不见听。乃闭门却食，服朝衣冠立死井中。<br /><br />
　　已而得手书大字于筐笥中：吾之死，不忍见国破也。<br /><br />
　　徐锴为文吊之，以比屈原、伍员。<br /><br />
　　后几百年，将乐父老犹叩头称之，盱江李觏为之传云。<br /><br />

<td class="t50">陈褒传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　陈褒，江州德安人，唐元和中给事中京之后。十世同居，长幼七百人，不置奴婢。日会食堂上，男女异席。未冠笄者，别又为一席。畜犬百余，共以一船贮食饲之，一犬不至，则群犬皆不食。筑书楼，延四方学者，乡邻化其德，狱讼为之哀息。升元初，州以闻，诏复徭役，表门闾，同时见旌者尚数家，皆五世同居云。<br /><br />
</td></tr>

<td class="t50">徐知证传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　义祖生六子：知训、知询、知诲、知谏、知证、知谔。及烈祖开国，惟知证、知谔在，余者皆前卒。<br /><br />
　　徐知证，义祖第五子也。事吴，历州刺史，至节度使。烈祖初尊义祖为太祖，复姓，改义祖封，拜徐氏于李氏同。知证王江，改王魏。元宗嗣位，尤见尊礼。内宴用家人礼，起舞拜跪为寿，知证亦以叔父自处，无所让。卒年四十二。<br /><br />

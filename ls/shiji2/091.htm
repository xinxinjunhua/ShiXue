<td class="t50">汉兴以来将相名臣年表</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　（表略）<br /><br />
　　<span class="zs">〔索隐述赞〕高祖初起，啸命群雄。天下未定，王我汉中。三杰既得，六奇献功。章邯已破，萧何筑宫。周勃厚重，朱虚至忠。陈平作相，条侯总戎。丙魏立志，汤尧饰躬。天汉之后，表述非功。</span><br /><br />

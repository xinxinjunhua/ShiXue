<tr><td class="t50">朱梴传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　朱梴，字孟龄，先贤文公朱子九世孙也，世居福建建安县之紫霞洲。景泰六年授翰林院《五经》博士，子孙世袭，以奉朱子祀事。梴为人淳谨，言动有则。<br /><br />
　　卒，子燉，字孔晖袭。燉以事入都，中途遇盗。未几，有遗金道上者，燉守之，以还其人，人称其廉介。<br /><br />
　　卒，子茔，字元厚袭。<br /><br />
　　卒，子鎏袭。<br /><br />
　　卒，子法，字兆祖袭。法为人孝友。<br /><br />
　　卒，子楗，字士启袭。<br /><br />
　　卒，子莹，字惟玉袭。<br /><br />
　　卒，子之俊，字乔之袭。<br /><br />

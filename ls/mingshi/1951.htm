<tr><td class="t50">孟琏</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　孟琏长官司，永乐四年四月设。时孟琏头目刀派送遣子坏罕来言，孟琏旧属麓川平缅宣慰司，后隶孟定府。而孟定知府刀名扛亦故平缅头目，素与等夷，乞改隶。遂设长官司，隶云南都司，命刀派送为长官，赐冠带、印章。正统四年，思任发反，以兵破孟琏，遂降于麓川，为木邦宣慰罕盖法击败。<br /><br />
　　七年，总督王骥征麓川，招降孟琏、亦保等寨。敕赐孟琏故长官司刀派罕子派乐等彩币，以麓川平故也。嘉靖中，孟琏与孟养、孟密诸部仇杀数十年，司废。至万历十三年，陇川平，复设，称猛脸云。<br /><br />

<tr><td class="t50">毛虫之孽</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　弘治九年八月，有黑熊自都城莲池缘城上西直门，官军逐之下，不能获。啮死一人，伤一人。十一年六月，有熊自西直门入城，郎中何孟春曰：“当备盗，亦宜慎火。宋绍兴间熊抵永嘉城，州守高世则以熊字能火，戒郡中慎火，果延烧庐舍，此其兆也。”是年，城内多火灾。<br /><br />
　　嘉靖五年七月，南城县有虎，具人手足。<br /><br />
　　四十五年六月，太医院吏目李乾献兔，体备五色，以为瑞兔。<br /><br />

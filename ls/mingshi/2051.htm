<tr><td class="t50">剌撒传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　剌撒，自古里顺风二十昼夜可至。<br /><br />
　　永乐十四年遣使来贡，命郑和报之。后凡三贡，皆与阿丹、不剌哇诸国偕。<br /><br />
　　宣德五年，和复赍敕往使，竟不复贡。国傍海而居，气候常热，田瘠少收。俗淳，丧葬有礼。有事则祷鬼神。草木不生，久旱不雨。居室，悉与竹步诸国同。所产有乳香、龙涎香、千里驼之类。<br /><br />
</td></tr>

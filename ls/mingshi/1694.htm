<tr><td class="t50">陈瑸传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　陈瑸，漳浦人。天启五年进士。授慈谿知县。<br /><br />
　　崇祯十年为袁州推官，拒楚贼有功。屡迁右参议，分守湖南，讨平八排贼。<br /><br />
　　十六年，张献忠陷长沙，围参政周凤岐于澧州。瑸督兵往救，军败，被执。欲降之，不屈，断手割肝而死。凤岐，永康人。<br /><br />
　　万历末年进士。历工部郎中，掌节慎库，忤奄人，落职归。崇祯初，起故宫，进四川副使。苗人争界，为立碑画疆以定之。改右参政，分守澧州。贼来犯，援军败没，城遂陷。贼帅亲解其缚，说以降，怒骂而死。<br /><br />
</td></tr>

<tr><td class="t50">唐俨传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　唐俨，全州诸生也。父荫，郴州知州，归老得危疾。<br /><br />
　　俨年十二，潜割臂肉进之，疾良已。及父殁，哀毁如成人。其后游学于外，嫡母寝疾。俨妻邓氏年十八，奋曰：“吾妇人，安知汤药。昔夫子以臂肉疗吾舅，吾独不能疗吾姑哉？”于是割胁肉以进，姑疾亦愈。俨闻母疾，驰归，则无恙久矣，拜其妻曰：“此吾分也，当急召我，何自苦如此！”妻曰：“子事父，妇事姑，一也。方危急时，召子何及。且事必待子，安用妇为。”俨益叹异。嫡母殁二十年，而生母殁，俨庐墓三年。<br /><br />
　　嘉靖四年贡至京，有司奏旌其门。<br /><br />

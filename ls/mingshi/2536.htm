<tr><td class="t50">南京守备</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　南京守备一人，协同守备一人。南京以守备及参赞机务为要职。守备，以公、侯、伯充之，兼领中军都督府事。协同守备，以侯、伯、都督充之，领五府事。参赞机务，以南京兵部尚书领之。其治所在中府，掌南都一切留守、防护之事。永乐十九年迁都北京，命中府掌府事官守备南京，节制南京诸卫所。洪熙元年，始以内臣同守备。<br /><br />
　　景泰三年，增设协同守备一人。<br /><br />

<tr><td class="t50">南京五军都督府</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　南京五军都督府，左、右都督，都督同知，都督佥事，不全设。其掌印、佥书，皆以勋爵及三等都督为之。分掌南京卫所，以达于南京兵部。<br /><br />
　　凡管领大教场及江上操备等事，各府奉敕分掌之。城门之管钥，中府专掌之。初设城门郎，洪武十八年革，以门禁锁钥铜牌，命中军都督府掌之。）其属，经历、都事各一人。<br /><br />
</td></tr>

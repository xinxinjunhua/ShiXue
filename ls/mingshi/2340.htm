<tr><td class="t50">嘉礼</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　二曰嘉礼。<br /><br />
　　行于朝廷者，曰朝会，曰宴飨，曰上尊号、徽号，曰册命，曰经筵，曰表笺。<br /><br />
　　行于辟雍者，曰视学。<br /><br />
　　自天子达于庶人者，曰冠，曰婚。<br /><br />
　　行于天下者，曰巡狩，曰诏赦，曰乡饮酒。<br /><br />
　　——举其大者书之。仪之同者，则各附于其类云。<br /><br />
</td></tr>

<tr><td class="t50">牛谅传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　牛谅，字士良，东平人。<br /><br />
　　洪武元年，举秀才，为典簿。与张以宁使安南还，称旨，三迁至礼部尚书。更定释奠及大祀分献礼，与詹同等议省牲、冠服。御史答禄与权请祀三皇。太祖下其议礼官，并命考历代帝王有功德者庙祀之。<br /><br />
　　七年正月，谅奏：三皇立庙京师，春秋致祭。汉、唐以下，就陵立庙。帝为更定行之，亦详《礼志》。是年怠职，降主事。未几，复官。后仍以不任职罢。谅著述甚多，为世传诵。<br /><br />
</td></tr>

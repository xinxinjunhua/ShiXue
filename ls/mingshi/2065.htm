<tr><td class="t50">白葛达传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　白葛达，宣德元年遣其臣和者里一思入贡。其使臣言：“遭风破舟，贡物尽失，国主惓惓忠敬之忱，无由上达。此使臣之罪，惟圣天子恩贷，赐之冠带，俾得归见国主，知陪臣实诣阙廷，庶几免责。”帝许之，使附邻国贡舟还国，谕之曰：“仓卒失风，岂人力能制。归语尔主，朕嘉王之诚，不在物也。”宴赐悉如礼。及辞归，帝谓礼官曰：“天时渐寒，海道辽远，可赐路费及衣服。”其国，土地瘠薄，崇释教，市易用铁钱。<br /><br />
　　又有黑葛达，亦以宣德时来贡。国小民贫，尚佛畏刑。多牛羊，亦以铁铸钱。<br /><br />

<tr><td class="t50">钱祚徵传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　钱祚徵，字锡吉，掖县人。<br /><br />
　　崇祯中，由乡举历官汝州知州。汝为流贼往来孔道，土寇又窃据山中。祚徵欲先除土寇，募壮士千人训练，而遣人为好言招抚，夜半取间道直捣其巢，寇大败。乃令民千家立一大寨，有急鸣钲相救，寇势衰息，其魁遂降。<br /><br />
　　十四年正月，李自成骤来犯，祚徵乘城守，身中流矢，守益力。月余，大风霾，炮炸楼焚，城遂陷，骂贼而死。汝人立庙祀之。<br /><br />

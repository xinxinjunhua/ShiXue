<tr><td class="t50">吴安传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　吴安，丹徒人。父彦名，有女入侍宣宗于东宫，生景帝。<br /><br />
　　宣德三年册为贤妃，彦名已卒，授安锦衣卫百户。景帝嗣位，尊妃为皇太后，安进本卫指挥使。屡迁前府左都督，弟信亦屡擢都督佥事。景泰七年封安安平伯。信早亡，官其弟敬为南京前军左都督。英宗复辟，太后复称贤妃，降安为府军前卫指挥佥事。敬及其群从南京锦衣卫指挥佥事智、府军前卫指挥同知喜山、指挥佥事广林、锦衣卫千户诚，俱革职原籍闲住。寻命安为锦衣卫指挥使，子孙世袭。<br /><br />
</td></tr>

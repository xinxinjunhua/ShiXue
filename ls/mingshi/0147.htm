<tr><td class="t50">栾凤传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　栾凤，高邮人。知诸全，有能声。方士信来攻，与谢再兴力守，数出奇兵挫敌。再兴使部校鬻货于杭，太祖虑其输我军虚实，召再兴还，而以参军李梦庚总制诸全军马。既而念再兴功，为兄子文正娶其长女，命徐达娶其幼女。复遣守诸全。再兴忿梦庚出己上，凤复以细故绳之，遂叛，杀凤。凤妻王氏以身蔽凤，并杀之。执梦庚，降于士诚，梦庚亦死之。<br /><br />
　　太祖以再兴数有功，叛非其志，故凤与梦庚皆不得恤云。<br /><br />
</td></tr>

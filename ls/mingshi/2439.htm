<tr><td class="t50">鞍辔</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　鞍辔之制：<br /><br />
　　洪武六年，令庶民不得描金，惟铜铁装饰。<br /><br />
　　二十六年，定公、侯、一品、二品用银，铁事件，&#19038;用描银。三品至五品，用银，铁事件，&#19038;用油画。六品至九品，用摆锡，铁事件，&#19038;用油画。<br /><br />
　　三十五年，官民人等马颔下缨并鞦辔俱用黑色，不许红缨及描金、嵌金、天青、朱红装饰。军民用铁事件，黑绿油&#19038;。<br /><br />

<tr><td class="t50">张伦传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张伦，不知何许人。河北诸卫指挥使也，勇悍负气，喜观古忠义事。马宣自蓟州起兵攻北平，不克，死。伦发愤，合两卫官帅所部南奔，结盟报国。从李景隆、盛庸战，皆有功。燕王即帝位，招伦降。伦笑曰：“张伦将自卖为丁公乎！”死之。京师陷，武臣皆降附。从容就义者，伦一人而已。<br /><br />
　　又陈质者，以参将守大同。进中军都督同知。助宋忠保怀来。忠败，退守大同。代王欲举兵应燕，质持之不得发。及燕兵攻大同不下，蔚州、广昌附于燕，质复取之。成祖即位，以质劫制代王，剽掠已附，诛死。<br /><br />

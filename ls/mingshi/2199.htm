<tr><td class="t50">白眚白祥</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　洪熙元年六月庚戌，中天有白气，东西竟天。宣德元年六月癸未夜，有苍白气，东西竟天。八月庚辰，东南有白气，状如群羊惊走。既灭，有黑气如死蛇，顷之分为二。<br /><br />
　　弘治五年十二月辛亥夜，东方有白气，南北亘天，去地五丈。正德元年三月戊申夜，太原空中见红光，如弯弓，长六七尺。旋变黄，又变白，渐长至二十余丈，光芒亘天。<br /><br />
　　嘉靖七年十二月望，白气亘天津。<br /><br />

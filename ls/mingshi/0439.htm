<tr><td class="t50">陈壮传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　陈壮，字直夫，其先浙江山阴人。祖坐事谪戍交阯，后调京卫，遂家焉。壮举天顺八年进士，授南京御史。编修章懋等建言得罪，抗疏救之。帝遣中官采花木，复疏谏。尚书陈翌请以马豆代百官俸，壮言饲马之物，不可养士大夫。事乃寝。<br /><br />
　　壮家素寠，常禄外一无所取。父母殁，庐墓侧，居丧一循古礼。历江西佥事，致仕归。家居十余年。<br /><br />
　　弘治中，以尚书张悦荐，起官福建。居二年，又乞致仕。时倪岳为吏部，素贤之，擢河南副使。岁荒振饥，民怀其惠。佥都御史林俊谢病，举以自代。未及迁，而壮又乞致仕。巡抚孙需奏留之。又二年，竟致仕去。<br /><br />
</td></tr>

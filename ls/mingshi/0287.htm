<tr><td class="t50">陈旭传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　陈旭，全椒人。父彬，从太祖为指挥佥事。旭嗣官，为会州卫指挥同知，举城降燕。从徇滦河，功多。力战真定。守德州，盛庸兵至，弃城走。置不问。从入京师，封云阳伯，禄千石。<br /><br />
　　永乐元年，命巡视中都及直隶卫所军马城池。<br /><br />
　　四年从英国公张辅征交阯，为右参将。偕丰城侯李彬破西都。师还，与彬各加禄五百石。已而陈季扩叛，复从辅往剿。辅还，又命副沐晟。<br /><br />
　　八年以疾卒于军。<br /><br />
　　无子，封绝。<br /><br />
</td></tr>

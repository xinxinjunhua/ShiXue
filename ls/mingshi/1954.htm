<tr><td class="t50">东倘</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　东倘长官司，宣德八年置，隶缅甸宣慰。时缅甸宣慰昔得谋杀当荡头目新把的，而夺其地。新把的遣子莽只贡象、马、方物，乞置司，庶免侵杀，从之。置东倘长官司，命新把的为长官。<br /><br />

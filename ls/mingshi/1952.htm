<tr><td class="t50">里麻</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　里麻长官司，永乐六年设，隶云南都司，以刀思放为长官。时思放为里麻招刚。招刚者，故西南蛮官名。思放籍其地来朝，请授职事，遂有是命，仍赐印章、冠带。<br /><br />
　　八年遣头目贡马。<br /><br />

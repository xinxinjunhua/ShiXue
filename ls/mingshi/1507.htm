<tr><td class="t50">朱墅传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　朱墅，先贤文公朱子十一世孙也。<br /><br />
　　正德间，给事中戴铣、汪元锡，御史王完等相继言：“朱子，继孔子者也。孔子之后有曲阜、西安，朱子之后亦有建安、婺源。今建安恩典已隆，在婺源者，请依阙里之例，录其子孙一人，量授以官，俾掌祠事。”诏许之。<br /><br />
　　嘉靖二年授墅翰林院《五经》博士。三十八年以本学训导席端言，令其世袭。<br /><br />
　　墅卒，子镐袭。<br /><br />
　　卒，子德洪袭。<br /><br />
　　卒，子邦相袭。<br /><br />
　　卒，子煜袭。<br /><br />
　　卒，子坤袭。<br /><br />

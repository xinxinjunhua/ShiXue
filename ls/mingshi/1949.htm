<tr><td class="t50">者乐甸</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　者乐甸，本马龙他郎甸猛摩地，名者岛。<br /><br />
　　洪武末内附，隶云南布政司。<br /><br />
　　永乐元年设者乐甸长官司，改隶云南都司，以沐晟言其地广人稠也。<br /><br />
　　十八年，长官刀谈来朝，贡马。自是，皆以刀氏世领司事。其地山险多瘴，介于镇沅、元江、景东间。日事攻战，铠械犀利，兵寡而敕，诸部畏惮之。<br /><br />
</td></tr>

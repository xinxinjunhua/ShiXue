<tr><td class="t50">沙鹿海牙传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　沙鹿海牙，西去撒马儿罕五百余里。城居小冈上，西北临河。河名火站，水势冲急，架浮梁以渡，亦有小舟。南近山，人多依崖谷而居。园林广茂。西有大沙洲，可二百里。无水，间有之，咸不可饮。牛马误饮之，辄死。地生臭草，高尺余，叶如盖，煮其液成膏，即阿魏。又有小草，高一二尺，丛生，秋深露凝，食之如蜜，煮为糖，番名达郎古宾。<br /><br />
　　永乐间，李达、陈诚使其地，其酋即遣使奉贡。宣德七年命中官李贵赍敕谕其酋，赐金织文绮、彩币。<br /><br />
</td></tr>

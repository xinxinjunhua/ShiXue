<tr><td class="t50">驸马都尉、仪宾</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　驸马都尉，位在伯上。<br /><br />
　　凡尚大长公主、长公主、公主，并曰驸马都尉。<br /><br />
　　其尚郡主、县主、郡君、县君、乡君者，并曰仪宾。<br /><br />
　　岁禄各有差，皆不得与政事。<br /><br />
　　明初，驸马都尉有典兵出镇及掌府部事者。建文时，梅殷为镇守淮安总兵官，李坚为左副将军。成祖时，李让掌北京行部事。仁宗时沐昕，宣宗时宋琥，并守备南京。英宗时，赵辉掌南京左府事。其馀惟奉祀孝陵，摄行庙祭，署宗人府事。往往受命，一充其任。若恩亲侯李贞，永春侯王宁，京山侯崔元，以恩泽封侯，非制也。<br /><br />

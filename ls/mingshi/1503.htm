<tr><td class="t50">程克仁传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　程克仁，先贤正公程子十七代孙也，世居嵩县之六浑。景泰六年授翰林院《五经》博士，子孙世袭，以奉程子祀事。<br /><br />
　　卒，子继祖袭。<br /><br />
　　卒，仲子世宥袭。<br /><br />
　　卒，子心传袭。心传庄重寡言，为乡党所称。<br /><br />
　　卒，弟宗益袭。<br /><br />
　　卒，从子佳引袭。<br /><br />
　　卒，从弟佳祚袭。<br /><br />
　　崇祯十四年为土贼于大忠所杀。<br /><br />

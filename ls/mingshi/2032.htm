<tr><td class="t50">那孤儿黎伐传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　那孤儿，以苏门答剌之西，壤相接。地狭，止千余家。男子皆以墨剌面为花兽之状，故又名花面国。猱头裸体，男女止单布围腰。然俗淳，田足稻禾，强不侵弱，富不骄贫，悉自耕而食，无寇盗。永乐中，郑和使其国。其酋长常入贡方物。<br /><br />
　　黎伐，在那孤儿之西。南大山，北大海，西接南渤利。居民三千家，推一人为主。隶苏门答剌，声音风俗多与之同。永乐中，尝随其使臣入贡。<br /><br />
</td></tr>

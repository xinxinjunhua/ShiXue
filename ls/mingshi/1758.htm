<tr><td class="t50">孔金传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　孔金，山阳人。父早亡，母谢氏，遗腹三月而生金。母为大贾杜言逼娶，投河死。金长，屡讼于官，不胜。言行贿欲毙金，金乃乞食走阙下，击登闻鼓诉冤，不得达。还墓所，昼夜号泣。里人刘清等陈其事于府，知府张守约异之，召闾族媒氏质实，坐言大辟。未几守约卒，言夤缘免。金复号诉不已，被箠无完肤。已而抚按理旧牍，仍坐言大辟，迄死狱中。<br /><br />
　　金子良亦有孝行，父病，刲股为羹以进，旋愈。比卒，庐墓哀毁。<br /><br />
　　万历四十三年，父子并得旌。<br /><br />

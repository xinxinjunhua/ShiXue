<tr><td class="t50">古麻刺朗传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　古麻剌朗，东南海中小国也。<br /><br />
　　永乐十五年九月遣中官张谦赍敕抚谕其王干剌义亦奔敦，赐之绒锦、纻丝、纱罗。<br /><br />
　　十八年八月，王率妻子、陪臣随谦来朝，贡方物，礼之如苏禄国王。王言：“臣愚无知，虽为国人所推，然未受朝命，幸赐封诰，仍其国号。”从之，乃赐以印诰、冠带、仪仗、鞍马及文绮、金织袭衣，妃以下并有赐。明年正月辞还，复赐金银钱、文绮、纱罗、彩帛、金织袭衣、麒麟衣，妃以下赐有差。王还至福建，遘疾卒。遣礼部主事杨善谕祭，谥曰康靖，有司治坟，葬以王礼。命其子剌苾嗣为王，率众归，赐钞币。<br /><br />

<tr><td class="t50">鸡祸</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　弘治十四年，华容民刘福家鸡雏三足。十七年六月，崇明民顾孟文家鸡生雏，猴头而人形，身长四寸，有尾，活动无声。<br /><br />
　　嘉靖四年，长垣民王宪家鸡抱卵，内成人形，耳目口鼻四肢皆具。<br /><br />
　　万历二十二年六月，靖边营军家雌鸡化为雄。崇祯九年，淮安民家牝鸡啼跃，化为雄。十年，宣武门外民家白鸡，喙距纯赤，重四十斤。或曰此皦也，所见之处国亡。十四年，太仓卫指挥姜周辅家鸡伏子，两头四翼八足。<br /><br />

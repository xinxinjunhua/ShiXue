<tr><td class="t50">钱錞传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　钱錞，字鸣叔，钟祥人。嘉靖二十九年进士。授江阴知县。初至官，倭已炽。三十三年入犯，乡民奔入城者万计，兵备道王从古不纳。錞曰：“民死不救，守空城奚为！”遂开门纵之入，而身自搏战于斜桥，三战却之。明年六月，倭据蔡泾闸，分众犯塘头。錞提狼兵战九里山，薄暮，雷雨大作，伏四起，狼兵悉奔，錞战死。<br /><br />
　　时唐一岑知崇明县，建新城成，议徙居，为千户高才、翟钦所沮。倭突入，一岑战且詈，遂为乱军所杀。诏赠錞、一岑光禄少卿，錞世荫锦衣百户，岑荫国子生，并建祠祀。<br /><br />

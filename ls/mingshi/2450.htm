<tr><td class="t50">外蕃冠服</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　外国君臣冠服：洪武二年，高丽入朝，请祭服制度，命制给之。二十七年，定蕃国朝贡仪，国王来朝，如赏赐朝服者，服之以朝。三十一年，赐琉球国王并其臣下冠服。永乐中，赐琉球中山王皮弁、玉圭，麟袍、犀带，视二品秩。宣德三年，朝鲜国王李濩言：“洪武中，蒙赐国王冕服九章，陪臣冠服比朝廷递降二等，故陪臣一等比朝臣第三等，得五梁冠服。永乐初，先臣芳远遣世子禔入朝，蒙赐五梁冠服。臣窃惟世子冠服，何止同陪臣一等，乞为定制。”乃命制六梁冠赐之。嘉靖六年，令外国朝贡入，不许擅用违制衣服。如违，卖者、买者同罪。<br /><br />

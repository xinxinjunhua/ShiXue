<tr><td class="t50">阿速传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　阿速，近天方、撒马儿罕，幅员甚广。城倚山面川。川南流入海，有鱼盐之利。土宜耕牧。敬佛畏神，好施恶斗。物产富，寒暄适节，人无饥寒，夜鲜寇盗，雅称乐土。<br /><br />
　　永乐十七年，其酋牙忽沙遣使贡马及方物，宴赉如制。以地远不能常贡。天顺七年命都指挥白全等使其国，竟不复再贡。<br /><br />
</td></tr>

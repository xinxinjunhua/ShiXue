<tr><td class="t50">潘庭坚传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　潘庭坚，字叔闻，当涂人。元末为富阳教谕，谢去。太祖驻太平，以陶安荐，征庭坚为帅府教授。慎密谦约，为太祖所称。下集庆，擢中书省博士。婺州下，改为金华府，以庭坚同知府事。时上游诸郡次第平定，择儒臣抚绥之。先后用陶安、汪广洋于江西，而庭坚与王恺守浙东。<br /><br />
　　太祖为吴王，设翰林院，与安同召为学士。而庭坚已老，遂告归。<br /><br />
　　洪武四年复召至，主会试。<br /><br />
　　子黼，字章甫。有文名，官至江西按察使。会修律令，留为议律官。书成，卒。黼谨饬类父，而文采清雅过之。父子皆以乡校显，时以为荣。<br /><br />
</td></tr>

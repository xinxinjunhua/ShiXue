<tr><td class="t50">万观传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　万观，字经训，南昌人。<br /><br />
　　弱冠成永乐十九年进士。帝少之，令归肄学。寻召为御史，改严州知府。府东境七里泷，有渔舟数百艇，时剽行旅。观编十舟为一甲，令画地巡警。不匝月，盗屏迹。乃励学校，劝农桑，奏减织造，以银代丝税，民皆便之。<br /><br />
　　九年考绩，治行为海内第一。既以忧去，将除服，严州民豫上章愿复得观为守，金、衢民亦上章乞之。朝廷异焉，补平阳府，政绩益茂。有芝生尧祠栋上，士民皆言使君德化所致。观曰：“太守知奉职而已，芝，非吾事也。”考满，擢山东布政使，卒于官。<br /><br />

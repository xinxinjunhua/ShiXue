<tr><td class="t50">巴喇西传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　巴剌西，去中国绝远。<br /><br />
　　正德六年遣使臣沙地白入贡，言其国在南海，始奉王命来朝，舟行四年半，遭风飘至西澜海，舟坏，止存一小艇，又飘流八日，至得吉零国，居一年。至秘得，居八月。乃遵陆行，阅二十六日抵暹罗，以情告王，获赐日给，且赐妇女四人，居四年。迄今年五月始附番舶入广东，得达阙下。进金叶表，贡祖母绿一，珊瑚树、琉璃瓶、玻璃盏各四，及玛瑙珠、胡黑丹诸物。帝嘉其远来，赐赉有加。<br /><br />
</td></tr>

<tr><td class="t50">皇妃以下册印</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　皇贵妃而下，有册无宝而有印。妃册，用镀金银册二片，广长与后册同。册盝饰以浑金沥粉蟠凤。其印用金，龟纽，尺寸与诸王宝同，文曰“皇妃之印”。箧饰以蟠凤。宣德元年，帝以贵妃孙氏有容德，特请于皇太后，制金宝赐之，未几即诞皇嗣。自是贵妃授宝，遂为故事。嘉靖十年，立九嫔，册用银，杀皇妃五分之一，以金饰之。<br /><br />
</td></tr>

<tr><td class="t50">阿鲁传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　阿鲁，一名哑鲁，近满剌加。顺风三日夜可达。风俗、气候大类苏门答剌。田瘠少收，盛艺芭蕉、椰子为食。男女皆裸体，以布围腰。<br /><br />
　　永乐九年，王速鲁唐忽先遣使附古里诸国入贡。赐其使冠带、彩币、宝钞，其王亦有赐。十年，郑和使其国。十七年，王子段阿剌沙遣使入贡。十九年、二十一年，再入贡。宣德五年，郑和使诸蕃，亦有赐。其后贡使不至。<br /><br />
</td></tr>

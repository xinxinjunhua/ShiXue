<tr><td class="t50">沙哈鲁传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　沙哈鲁，在阿速西海岛中。<br /><br />
　　永乐中遣七十七人来贡，日给酒馔、果饵，异于他国。其地，山川环抱，饶畜产，人性朴直，耻斗好佛。王及臣僚处城中，庶人悉处城处。海产奇物，西域贾人以轻直市之，其国人不能识。<br /><br />
</td></tr>

<tr><td class="t50">杭昱传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　杭昱，女为景帝妃，生子见济。<br /><br />
　　景泰三年，帝欲废英宗子而立己子，乃废皇后汪氏，册妃为后。昱累官锦衣卫指挥使。兄聚授锦衣千户。聚寻卒，赐赙及祭葬。七年，后崩，官其弟敏锦衣百户。<br /><br />
　　英宗复辟，尽夺景帝所授外亲官，尤恶杭氏，昱已前卒，敏削职还里。<br /><br />

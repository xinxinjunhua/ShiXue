<tr><td class="t50">王俊传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王俊，城武人。父为顺天府知事。母卒于官舍，俊扶榇还葬，刈草莱为茇舍，寝处茔侧。野火延巘将及，俊叩首恸哭，火及茔树而止。正统三年被旌。<br /><br />
　　刘准者，唐山诸生。父丧，庐墓。冬月野火将及冢树，准悲号告天，火遂息。正统六年旌表。<br /><br />
　　杨敬者，归德人。父殁于阵，为木主招魂以葬。每读书至战阵之事，辄陨涕不止。母殁，柩在堂。邻家失火，烈焰甚迫，敬抚柩哀号，风止火灭。正统十三年旌表。<br /><br />
</td></tr>

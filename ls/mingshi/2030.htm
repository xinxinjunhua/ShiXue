<tr><td class="t50">百花传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　百花，居西南海中。<br /><br />
　　洪武十一年，其王剌丁剌者望沙遣使奉金叶表，贡白鹿、红猴、龟筒、玳瑁、孔雀、鹦鹉、哇哇倒挂鸟及胡椒、香、蜡诸物。诏赐王及使者绮、币、袭衣有差。国中气候恒燠，无霜雪，多奇花异卉，故名百花。民富饶，尚释教。<br /><br />
</td></tr>

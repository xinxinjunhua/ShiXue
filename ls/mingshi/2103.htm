<tr><td class="t50">赛蓝传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　赛蓝，在达失干之东，西去撒马儿罕千余里。有城郭，周二三里。四面平旷，居人繁庶。五谷茂殖，亦饶果木。夏秋间，草中生黑小蜘蛛。人被螫，遍体痛不可耐，必以薄荷枝扫痛处，又用羊肝擦之，诵经一昼夜，痛方止，体肤尽蜕。六畜被伤者多死。凡止宿，必择近水地避之。<br /><br />
　　元太祖时，都元帅薛塔剌海从征赛蓝诸国，以炮立功，即此地也。陈诚、李贵之使，与诸国同。<br /><br />

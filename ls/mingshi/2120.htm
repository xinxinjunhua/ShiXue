<tr><td class="t50">答儿密传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　答儿密，服属撒马儿罕。居海中，地不百里，人不满千家。无城郭，上下皆居板屋。知耕植，有毛褐、布缕、马驼、牛羊。刑止箠朴。交易兼用银钱。永乐中遣使朝贡，赐《大统历》及文绮、药、茶诸物。<br /><br />

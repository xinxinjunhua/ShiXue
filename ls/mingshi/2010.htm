<tr><td class="t50">沙瑶呐哔啴传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　沙瑶，与呐哔啴连坏。呐哔啴在海畔，沙瑶稍纡入山隈，皆与吕宋近。男女蓄发椎结，男子用履，妇女跣足。以板为城，竖木覆茅为室。崇释教，多建礼拜寺。男女之禁甚严，夫行在前，其妇与人嘲笑，夫即刃其妇，所嘲笑之人不敢逃，任其刺割。盗不问大小，辄论死。孕妇将产，以水灌之，且以水涤其子，置水中，生而与水习矣。物产甚薄，华人商其地，所携仅磁器、锅釜之类，重者至布而止。后佛郎机据吕宋，多侵夺邻境，惟二国号令不能及。<br /><br />
</td></tr>

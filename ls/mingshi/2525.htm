<tr><td class="t50">递运所</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　递运所。大使一人，副使一人，掌运递粮物。洪武九年始置。先是，在外多以卫所戍守军士传送军囚，太祖以其有妨练习守御，乃命兵部增置各处递运所，以便递送。设大使、副使各一人，验夫多寡，设百夫长以领之。（后汰副使，革百夫长。）<br /><br />

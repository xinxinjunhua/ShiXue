<tr><td class="t50">令节拜天</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　嘉靖初，沿先朝旧仪，每日宫中行拜天礼。后以为渎，罢之。遇正旦、冬至、圣诞节，于奉天殿丹陛上行礼。既定郊祀，遂罢冬至之礼。惟正旦、圣诞节行礼于玄极宝殿。<br /><br />
　　隆庆元年正旦，命宫中拜天，不用在外执事，祭品亦不取供于太常。<br /><br />

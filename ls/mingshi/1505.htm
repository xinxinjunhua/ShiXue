<tr><td class="t50">邵继祖传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　邵继祖，洛阳人，先贤康节公邵子二十七代孙也。<br /><br />
　　崇祯三年，河南巡按吴甡请以继祖为翰林院《五经》博士，子孙世袭，以奉邵子祀事。诏从之。<br /><br />
　　卒，子养醇袭。<br /><br />

<tr><td class="t50">瓦甸</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　瓦甸长官司，初隶金齿，永乐九年改隶云南都司。土官刀怕赖言金齿远，都司近，故改隶焉。宣德八年置曲石、高松坡、马缅三巡检司。初，长官司言其地山高林茂，寇盗出没，人民不安，乞置巡检司，以授通事杨资、杨中、范兴三人，从之。命资于曲石，中于高松坡，兴于马缅。<br /><br />
　　正统五年，长官早贵为思任发所获，杀其守者十七人，挈家来归。帝嘉其忠顺，命所司褒赏，以早贵为安抚，赐彩币、诰命。<br /><br />
</td></tr>

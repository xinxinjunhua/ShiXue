<tr><td class="t50">加异勒传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　加异勒，西洋小国也。<br /><br />
　　永乐六年遣郑和赍诏招谕，赐以锦绮、纱罗。九年，其酋长葛卜者麻遣使奉表，贡方物。命赐宴及冠带、彩币、宝钞。十年，和再使其国，后凡三入贡。<br /><br />
　　宣德五年，和复使其国。八年又偕阿丹等十一国来贡。<br /><br />
</td></tr>

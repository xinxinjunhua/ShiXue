<tr><td class="t50">促瓦散金</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　促瓦、散金二长官司，皆永乐五年设，隶云南都司。其地旧属麓川，平缅。土蛮注甸八等来朝，请别设长官司，从之。命注甸八等为长官，各给印章。<br /><br />

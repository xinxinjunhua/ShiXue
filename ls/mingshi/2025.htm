<tr><td class="t50">须文达那传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　须文达那，洪武十六年，国王殊旦麻勒兀达朌遣使俺八儿来朝，贡马二匹，幼苾布十五匹，隔著布、入的力布各二匹，花满直地二，番绵紬直地二，兜罗绵二斤，撒剌八二个，幼赖革著一个，撒哈剌一个，及蔷薇水、沉香、降香、速香诸物。命赐王《大统历》、绮罗、宝钞，使臣袭衣。或言须文达那即苏门答剌，洪武时所更，然其贡物与王之名皆不同，无可考。<br /><br />
</td></tr>

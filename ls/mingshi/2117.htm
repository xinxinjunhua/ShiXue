<tr><td class="t50">火剌札传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　火剌札，国微弱。四围皆山，鲜草木。水流曲折，亦无鱼虾。城仅里许，悉土屋，酋所居亦卑陋。俗敬僧。永乐十四年遣使朝贡，命所经地皆礼待。弘治五年，其地回回怕鲁湾等由海道贡玻璃、玛瑙诸物。孝宗不纳，赐道里费遣还。<br /><br />
</td></tr>

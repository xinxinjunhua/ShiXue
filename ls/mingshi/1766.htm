<tr><td class="t50">杨引传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　杨引，吉水人。好学能诗文，为宋濂、陶安所称。驸马都尉陆贤从受学，入朝，举止端雅。太祖喜，问谁教者，贤以引对，立召见，赐食。他日，贤以亵服见，引太息曰：“是其心易我，不可久居此矣。”复以纂修征，亦不就。其教学者，先操履而后文艺。尝揭《论语乡党》篇示人曰：“吾教自有养生术，安事偃仰吐纳为。”乃节饮食，时动息，迄老视听不衰。<br /><br />
　　既殁，安福刘球称其学探道原，文范后世，去就出处，卓然有陶潜、徐穉之风。<br /><br />

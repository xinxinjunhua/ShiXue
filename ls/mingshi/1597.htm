<tr><td class="t50">孙镗传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　孙镗，莒州人。商贩吴、越。倭扰松江，谒郡守自请输赀佐军。守荐之参政翁大立，试以只刀，若飞，录为士兵。击走倭，出参政任环围中。遣人还莒，括家赀，悉召里儿为爪牙，吴中倚镗若长城。<br /><br />
　　倭舟渡泖浒，镗突出，酣战竟日，援兵不至，还至石湖桥，半渡，伏大起，镗堕死，中刃死。赠光禄丞，录一子，亦建祠祀。<br /><br />
</td></tr>

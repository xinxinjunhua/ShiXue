<tr><td class="t50">览邦淡巴传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　览邦，在西南海中。<br /><br />
　　洪武九年，王昔里马哈剌札的剌札遣使奉表来贡。诏赐其王织金文绮、纱罗，使者宴赐如制。永乐、宣德中，尝附邻国朝贡。其地多沙砾，麻麦之外无他种。商贾鲜至。山坦迤无峰峦，水亦浅浊。俗好佛，勤赛祀。厥贡，孔雀、马、檀香、降香、胡椒、苏木。交易用钱。<br /><br />
　　淡巴，亦西南海中国。<br /><br />
　　洪武十年，其王佛喝思罗遣使上表，贡方物，赐赉有差。其国，石城瓦屋。王乘舆，官跨马，有中国威仪。土衍水清，草木畅茂，畜产甚伙。男女勤于耕织，市有贸易，野无寇盗，称乐土焉。厥贡，苾布、兜罗绵被、沉香、速香、檀香、胡椒。<br /><br />

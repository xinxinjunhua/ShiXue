<tr><td class="t50">周缙传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　周缙，字伯绅，武昌人。以贡入太学，授永清典史，摄令事。<br /><br />
　　成祖举兵，守令相率迎降。永清地尤近，缙独为守御计。已，度不可为，怀印南奔。道闻母卒，归终丧。燕兵已迫，纠义旅勤王，闻京师不守，乃走匿。吏部言：“前北平所属州县官朱宁等二百九十人，当皇上‘靖难’，俱弃职逃亡。宜置诸法。”诏令入粟赎罪，遣戍兴州。有司遂捕缙，械送戍所。<br /><br />
　　居数岁，子代还，年八十而没。朱宁等皆无考。<br /><br />

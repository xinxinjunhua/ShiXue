<tr><td class="t50">陈闻诗传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　陈闻诗，字廷训，柘城人。嘉靖中举于乡，以亲老，绝意仕进。亲殁，居丧哀毁。三十二年秋，贼师尚诏陷归德，闻闻诗名，欲劫为帅。已，陷柘城，拥之至，诱说百端，不屈。引其家数人斩之，曰：“不从，灭而族。”闻诗绐曰：“必欲吾行，毋杀人，毋纵火。”贼许诺，拥以行。闻诗遂不食，至鹿邑自经死。<br /><br />
　　董伦，归德检校也。尚诏入归德，知府及守卫官皆遁。伦率民兵巷战，被执，垂死犹手刃数贼。妻贾及童仆皆从死。诏赠闻诗凤阳同知，伦归德同知，并立祠死所。<br /><br />
</td></tr>

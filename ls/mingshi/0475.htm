<tr><td class="t50">叶祯传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　叶祯，字梦吉，高要人。举于乡，授浔州府同知。补凤翔，调庆远。<br /><br />
　　两广瑶贼蜂起，列郡咸被害，将吏率缩朒观望。祯誓不与贼俱生，募健儿日训练。峒酋韦父强数败官军，祯生絷之，其党忿，悉众攻城。旗山守将拥兵不救。祯率健儿出战，贼却去。旋蹑祯，战相当，祯子公荣歼焉。<br /><br />
　　顷之，贼围鸡刺诸村，祯率三百人趋赴。道遇贼人头山下，鏖战，祯被数枪，手刃贼一人，与从子官庆及三百人皆死。时天顺三年正月晦也。岭南素无雪，是夜大雷电，雪深尺许。贼释围去，诸村获全。事闻，赠朝列大夫、广西参议，守臣为立庙祀之。<br /><br />

<tr><td class="t50">胡荣传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　胡荣，济宁人。洪武中，长女入宫为女官，授锦衣卫百户。永乐十五年将册其第三女为皇太孙妃，擢光禄寺卿，子安为府军前卫指挥佥事，专侍太孙，不莅事。后太孙践阼，妃为皇后，安亦屡进官。<br /><br />
　　宣德三年，后废，胡氏遂不振。<br /><br />

<tr><td class="t50">竹步传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　竹步，亦与木骨都束接壤。<br /><br />
　　永乐中尝入贡。其地户口不繁，风俗颇淳。郑和至其地。地亦无草木，垒石以居，岁多旱，皆与木骨都束同。所产有狮子、金钱豹、驼蹄鸡、龙涎香、乳香、金珀、胡椒之属。<br /><br />

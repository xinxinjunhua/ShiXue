<tr><td class="t50">王升传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王升，熹宗生母孝和太后弟也。父钺。天启元年封升新城伯。寻以皇子生，进俟。卒，子国兴嗣。崇祯十七年，京师陷，被杀。<br /><br />

<tr><td class="t50">甘巴里传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　甘巴里，亦西洋小国。永乐六年，郑和使其地，赐其王锦绮、纱罗。十三年遣使朝贡方物。十九年再贡，遣郑和报之。<br /><br />
　　宣德五年，和复招谕其国。王兜哇剌札遣使来贡，八年抵京师。正统元年附爪哇舟还国，赐敕劳王。<br /><br />
　　其邻境有阿拨把丹、小阿兰二国，亦以六年命郑和赍敕招谕，赐亦同。<br /><br />

<tr><td class="t50">太祖诸子传(1)</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　太祖，二十六子。<br /><br />
　　高皇后生太子标、秦王樉、晋王棡、成祖、周王橚。<br /><br />
　　胡充妃生楚王桢。<br /><br />
　　达定妃生齐王榑、潭王梓。<br /><br />
　　郭宁妃生鲁王檀。<br /><br />
　　郭惠妃生蜀王椿、代王桂、谷王橞。<br /><br />
　　胡顺妃生湘王柏。<br /><br />
　　韩妃生辽王植。<br /><br />
　　余妃生庆王栴。<br /><br />
　　杨妃生宁王权。<br /><br />
　　周妃生岷王楩、韩王松。<br /><br />
　　赵贵妃生沈王模。<br /><br />
　　李贤妃生唐王柽。<br /><br />
　　刘惠妃生郢王楝。<br /><br />
　　葛丽妃生伊王&#15384;。<br /><br />
　　而肃王楧母郜无名号。赵王杞、安王楹、皇子楠皆未详所生母。<br /><br />

<tr><td class="t50">苏梦旸传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　苏梦旸，万历间，为云南禄丰知县。三十五年十二月，武定贼凤腾霄反，围云南府城，转寇禄丰。梦旸率民兵出城力战，贼退去。明年元旦，方朝服祝厘，贼出不意袭陷其城，执之去，不屈死。赠光禄少卿，有司建祠，录一子。<br /><br />
　　当禄丰之未陷也，贼先犯嵩明州，吏目韦宗孝出御而败，合门死之。赠本州同知，荫子入国学。<br /><br />
　　有龙旌者，赵州人，由岁贡生为嵩明州学正。贼薄城，被执，骂贼死。赠国子博士。<br /><br />
</td></tr>

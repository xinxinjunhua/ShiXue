<tr><td class="t50">冯嘉施兰传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　冯嘉施兰，亦东洋中小国。<br /><br />
　　永乐四年八月，其酋嘉马银等来朝，贡方物，赐钞币有差。<br /><br />
　　六年四月，其酋玳瑁、里欲二人，各率其属朝贡，赐二人钞各百锭、文绮六表里，其从者亦有赐。八年复来贡。<br /><br />

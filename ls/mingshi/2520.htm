<tr><td class="t50">税课司</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　税课司。（府曰司，县曰局。）大使一人，（从九品）典税事。凡商贾、僧屠、杂市，皆有常征，以时榷而输其直于府若县。凡民间贸田宅，必操契券请印，乃得收户，则征其直百之三。<br /><br />
　　明初，改在京官店为宣课司，府州县官店为通课司，后改通课司为税课司、局。<br /><br />

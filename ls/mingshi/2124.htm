<tr><td class="t50">米昔儿传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　米昔儿，一名密思儿。永乐中遣使朝贡。既宴赉，命五日一给酒馔、果饵，所经地皆置宴。<br /><br />
　　正统六年，王锁鲁檀阿失剌福复来贡。礼官言：“其地极远，未有赐例。昔撒马儿罕初贡时，赐予过优，今宜稍损。赐王彩币十表里，纱、罗各三匹，白氁丝布、白将乐布各五匹，洗白布二十匹，王妻及使臣递减。”从之。自后不复至。<br /><br />

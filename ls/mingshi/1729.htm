<tr><td class="t50">赵绅传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　赵绅，字以行，诸暨人。父秩，永乐中为高邮州学正，考满赴京，至武城县堕水。绅奋身下救，河流湍悍，俱不能出。明日尸浮水上，绅两手抱父臂不释。宣德五年旌其门。<br /><br />
　　有向化者，静海卫人。父上为卫指挥，堕海死。化号泣求尸不得，亦投于海。忽父尸浮出，衣服尽脱。天方晴霁，雷雨骤作。既息，化首顶父衣，浮至一处。众异而收葬之。<br /><br />
　　陆尚质者，山阴人。父渡江遇风，飘舟将入海。尚质自崖见之，即跃入涛中，欲挽舟近岸。父舟获济，而尚质竟溺死。里人呼其处为陆郎渡。<br /><br />

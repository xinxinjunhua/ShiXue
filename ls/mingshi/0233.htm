<tr><td class="t50">茅大芳周璿传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　茅大芳，名誧，以字行，泰兴人。博学能诗文。<br /><br />
　　洪武中，为淮南学官，召对称旨。擢秦府长史，制词以董仲舒为言。大芳益奋激，尽心辅导。额其堂曰“希董”，方孝孺为之记。建文元年迁副都御史。燕师起，遗诗淮南守将梅殷，辞意激烈。闻者壮之。<br /><br />
　　＊＊＊<br /><br />
　　周璿，洪武末，以天策卫知事建言，擢左佥都御史。燕王称帝，与大芳并见收，不屈死。而大芳子顺童、道寿俱论诛，二孙死狱中。<br /><br />
</td></tr>

<tr><td class="t50">袁宗儒传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　袁宗儒，字醇夫，雄县人。<br /><br />
　　正德三年进士。授御史。<br /><br />
　　十二年冬，帝在大同，以郊祀将回銮，既而复止。宗儒率同官力谏。明年夏，孝贞纯皇后将葬，帝还京。宗儒等复引灾异，力请罢皇店，遣边兵，既又谏帝巡边。语极危切。皆不报。擢大理寺丞。<br /><br />
　　嘉靖三年争“大礼”，廷杖。历官右佥都御史，巡抚贵州。吏部尚书桂萼议宗儒改调，遂解职归。未几，起郧阳，改山东。坐属吏振饥无术，不能觉察，罢免。以荐起左副都御史。扈跸承天，还京卒。<br /><br />
</td></tr>

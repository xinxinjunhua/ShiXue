<tr><td class="t50">僧纲司道纪司</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　府僧纲司，都纲一人，从九品，副都纲一人。州僧正司，僧正一人。县僧会司，僧会一人。<br /><br />
　　府道纪司，都纪一人，从九品，副都纪一人。州道正司，道正一人。县道会司，道会一人。<br /><br />
　　——俱洪武十五年置，设官不给禄。<br /><br />

<tr><td class="t50">迭里迷传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　迭里迷，在撒马儿罕西南，去哈烈二千余里。有新旧二城，相去十余里，其酋长居新城。城内外居民仅数百家，畜牧蕃息。城在阿术河东，多鱼。河东地隶撒马儿罕，西多芦林，产狮子。陈诚、李达尝使其地。<br /><br />
</td></tr>

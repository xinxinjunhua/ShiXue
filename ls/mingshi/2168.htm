<tr><td class="t50">马异</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　永乐十八年九月，诸城进龙马。民有牝马牧于海滨，一日云雾晦冥，有物蜿蜒与马接。产驹，具龙文，其色青苍，谓之龙马云。宣德七年五月，忻州民武焕家马生一驹，鹿耳牛尾，玉面琼蹄，肉文被体如鳞。七月，沧州畜官马，一产二驹，州以为祥，献于朝。宣宗曰：“物理之常，何足异也。”<br /><br />
　　成化十七年六月，兴济马生二驹。弘治元年二月，景宁屏风山有异物成群，大如羊，状如白马，数以万计。首尾相衔，迤逦腾空而去。嘉靖四十二年四月，海盐有海马万数，岸行二十余里。其一最巨，高如楼。<br /><br />

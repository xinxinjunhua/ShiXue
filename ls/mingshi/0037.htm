<tr><td class="t50">后妃传(2)</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　惠帝皇后马氏，光禄少卿全女也。洪武二十八年册为皇太孙妃。建文元年二月册为皇后。四年六月，城陷，崩于火。<br /><br />

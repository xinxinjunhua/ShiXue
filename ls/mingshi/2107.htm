<tr><td class="t50">卜花儿传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　卜花儿，在撒马儿罕西北七百余里。城居平川，周十余里，户万计。市里繁华，号为富庶。地卑下，节序尝温，宜五谷桑麻，多丝绵布帛，六畜亦饶。<br /><br />
　　永乐十三年，陈诚自西域还，所经哈烈、撒马儿罕、别失八里、俺都淮、八答黑商、迭里迷、沙鹿海牙、赛蓝、渴石、养夷、火州、柳城、土鲁番、盐泽、哈密、达失干、卜花儿凡十七国，悉详其山川、人物、风俗，为《使西域记》以献，以故中国得考焉。宣德七年命李达抚谕西域，卜花儿亦与焉。<br /><br />
</td></tr>

<tr><td class="t50">王省传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王省，字子职，吉水人。<br /><br />
　　洪武五年领乡举。至京，诏免会试，命吏部授官。省言亲老，乞归养。寻以文学征。太祖亲试，称旨，当殊擢。自陈“才薄亲老”，乞便养。授浮梁教谕。凡三为教官，最后得济阳。燕兵至，为游兵所执。从容引譬，词义慷慨。众舍之。归坐明伦堂，伐鼓聚诸生，谓曰：“若等知此堂何名，今日君臣之义何如？”因大哭，诸生亦哭。省以头触柱死。女静，适即墨主簿周岐凤。闻燕兵至济阳，知父必死，三遣人往访，得遗骸归葬。<br /><br />

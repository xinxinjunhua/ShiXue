<tr><td class="t50">军隶冠服</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　军士服：洪武元年令制衣，表里异色，谓之鸳鸯战袄，以新军号。二十一年，定旗手卫军士、力士俱红袢袄，其馀卫所袢袄如之。凡袢袄，长齐膝，窄袖，内实以棉花。二十六年，令骑士服对襟衣，便于乘马也。不应服而服者，罪之。<br /><br />
　　皂隶公人冠服：洪武三年定，皂隶，圆顶巾，皂衣。四年定，皂隶公使人，皂盘领衫，平顶巾，白褡愬，带锡牌。十四年，令各卫门祗禁，原服皂衣改用淡青。二十五年，皂隶伴当不许着靴，止用皮札&#19066;。<br /><br />
</td></tr>

<tr><td class="t50">南渤利传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　南渤利，在苏门答剌之西。顺风三日夜可至。王及居民皆回回人，仅千余家。俗朴实，地少谷，人多食鱼虾。西北海中有山甚高大，曰帽山，其西复大海，名那没黎洋，西来洋船俱望此山为准。近山浅水内，生珊瑚树，高者三尺许。<br /><br />
　　永乐十年，其王马哈麻沙遣使附苏门答剌使入贡。赐其使袭衣，赐王印诰、锦绮、罗纱、彩币。遣郑和抚谕其国。终成祖时，比年入贡，其王子沙者罕亦遣使入贡。宣德五年，郑和遍赐诸国，南渤利亦与焉。<br /><br />
</td></tr>

<tr><td class="t50">葛乾孙传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　葛乾孙，字可久，长洲人。父应雷，以医名。时北方刘守真、张洁古之学未行于南。有李姓者，中州名医，官吴下，与应雷谈论，大骇叹，因授以张、刘书。自是江南有二家学。乾孙体貌魁硕，好击刺战阵法。后折节读书，兼通阴阳、律历、星命之术。屡试不偶，乃传父业。然不肯为人治疾，或施之，辄著奇效，名与金华朱丹溪埒。<br /><br />
　　富家女病四支痿痹，目瞪不能食，众医治罔效。乾孙命悉去房中香奁、流苏之属，掘地坎，置女其中。久之，女手足动，能出声。投药一丸，明日女自坎中出矣。盖此女嗜香，脾为香气所蚀，故得是症。其疗病奇中如此。<br /><br />
</td></tr>

<tr><td class="t50">鼠妖</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　万历四十四年七月，常、镇、淮、扬诸郡，土鼠千万成群，夜衔尾渡江，络绎不绝，几一月方止。四十五年五月，南京有鼠万余，衔尾渡江，食禾稼。<br /><br />
　　崇祯七年，宁夏鼠十余万，衔尾食苗。十二年，黄州鼠食禾，渡江五六日不绝。时内殿奏章房多鼠盗食，与人相触而不畏，亦鼠妖也。至甲申元旦后，鼠始屏迹。又秦州关山中鼠化鹌鹑者以数千计。十五年二月，群鼠渡江，昼夜不绝。十月，榆林、定边诸堡鼠生虾蟆腹中，一生数十，食苗如割。<br /><br />

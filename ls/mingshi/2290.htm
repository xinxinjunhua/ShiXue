<tr><td class="t50">祭祀日期</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　钦天监选择，太常寺预于十二月朔至奉天殿具奏。盖古卜法不存，而择干支之吉以代卜也。洪武七年，命太常卿议祭祀日期，书之于版，依时以祭，著为式。其祭日，遣官监祭，不敬失仪者罪之。<br /><br />

<tr><td class="t50">迎接诏赦仪</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　洪武中定。<br /><br />
　　凡遣使开读诏赦，本处官具龙亭仪仗鼓乐，出郭迎。使者下马，奉诏书置龙亭中，南向，本处官朝服行五拜礼。众官及鼓乐前导，使者上马随龙亭后，至公廨门。众官先入，文武东西序立，候龙亭至，排班四拜。使者捧诏授展读官，展读官跪受，诣开读案。宣读讫，捧诏授朝使，仍置龙亭中。众官四拜，舞蹈山呼，复四拜毕。班首诣龙亭前，跪问皇躬万福，使者鞠躬答曰：“圣躬万福。”众官退，易服见使者，并行两拜礼。复具鼓乐送诏于官亭。<br /><br />
　　如有出使官在，则先守臣行礼。<br /><br />

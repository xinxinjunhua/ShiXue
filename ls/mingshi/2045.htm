<tr><td class="t50">沼纳朴儿传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　沼纳朴儿，其国在榜葛剌之西。或言即中印度，古所称佛国也。<br /><br />
　　永乐十年遣使者赍敕抚谕其国，赐王亦不剌金绒锦、金织文绮、彩帛等物。<br /><br />
　　十八年，榜葛剌使者酝其国王数举兵侵扰，诏中官侯显赍敕谕以睦邻保境之义，因赐之彩币；所过金刚宝座之地，亦有赐。然其王以去中国绝远，朝贡竟不至。<br /><br />
</td></tr>

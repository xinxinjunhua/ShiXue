<tr><td class="t50">遣官祭祀</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　洪武二十六年，定传制特遣仪。是日，皇帝升座如常仪，百官一拜。礼毕，献官诣拜位四拜，传制官由御前出宣制。如祭孔子，则曰：“某年月日，祭先师孔子大成至圣文宣王，命卿行礼。”祭历代帝王，则曰：“某年月日，祭先圣历代帝王，命卿行礼。”俯伏，兴，四拜，礼毕出。<br /><br />
　　其降香遣官仪，前祀一日清晨，皇帝皮弁服，升奉天殿。捧香者以香授献官。献官捧由中陛降中道出，至午门外，置龙亭内。仪仗鼓吹，导引至祭所。后定祭之日，降香如常仪，中严以待。献官祭毕后命，解严还宫。<br /><br />
　　嘉靖九年大祀遣官，不行饮福礼。<br /><br />

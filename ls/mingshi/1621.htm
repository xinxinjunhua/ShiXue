<tr><td class="t50">阎生斗传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　阎生斗，字文澜，汾西人。由岁贡生，历保安知州。<br /><br />
　　大清兵入保安，生斗集吏民固守。城破，被执死之。判官李师圣、吏目王本立、训导张文魁亦同死，时崇祯七年七月也。<br /><br />
　　八月入灵丘，知县蒋秉采募兵坚守，力屈众溃，投缳死，合门殉之。守备于世奇，把总陈彦武、马如豸，典史张标，教谕路登甫并斗死。事闻，赠生斗太仆少卿，余赠恤如制。秉采，字衷白，全州举人。<br /><br />
</td></tr>

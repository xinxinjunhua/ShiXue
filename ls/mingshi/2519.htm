<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　驿丞典邮传迎送之事。<br /><br />
　　凡舟车、夫马、廪糗、庖馔、裯帐，视使客之品秩，仆夫之多寡，而谨供应之。支直于府若州县，而籍其出入。（巡检、驿丞，各府州县有无多寡不同。）<br /><br />

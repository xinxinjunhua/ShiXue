<tr><td class="t50">茅成传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　茅成，定远人。自和州从军，隶常遇春麾下。克太平，始授万户。从定常州、宁国，进总管。克衢州，授副元帅。守金华，改太平兴国翼元帅。从克安庆，援安丰，战鄱阳，克武昌，授武德卫千户。寻进指挥副使。取赣州、安陆、襄阳、泰州，皆有功。从徐达攻平江，焚张士诚战船，筑长围困之。达攻娄门，士诚出兵战，成击败之。突至外郛，中叉死。赠东海郡公，祀功臣庙。<br /><br />
　　同时死者，有杨国兴，亦定远人。以右翼元帅守宜兴。初，常州人陈保二聚众，号“黄包军”。即降复叛，诱执詹、李二将。国兴执斩之。授神武卫指挥使。至是攻阊门战死，以其子益袭指挥使。<br /><br />

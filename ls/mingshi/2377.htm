<tr><td class="t50">宾礼</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　三曰宾礼，以待蕃国之君长与其使者。<br /><br />
　　宋政和间，详定五礼，取《周官·司仪》掌九仪宾客摈相，诏王南乡以朝诸侯之义，故以朝会仪列为宾礼。按古之诸侯，各君其国，子其民，待以客礼可也，不可与后世之臣下等。兹改从其旧，而百官庶人相见之礼附焉。<br /><br />
</td></tr>

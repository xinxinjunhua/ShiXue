<tr><td class="t50">广西土司传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　广西瑶、僮居多，盘万岭之中，当三江之险，六十三山倚为巢穴，三十六源踞其腹心，其散布于桂林、柳州、庆远、平乐诸郡县者，所在蔓衍。而田州、泗城之属，尤称强悍。种类滋繁，莫可枚举。蛮势之众，与滇为埒。今就其尤著者列于篇。观其叛服不常，沿革殊致，可以觇中国之德威，知夷情之顺逆，为筹边者之一助云。<br /><br />
</td></tr>

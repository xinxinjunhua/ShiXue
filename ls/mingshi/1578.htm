<tr><td class="t50">易绍宗传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　易绍宗，攸人。洪武时，从军有功，授象山县钱仓所千户。<br /><br />
　　建文三年，倭登岸剽掠。绍宗大书于壁曰：“设将御敌，设军卫民。纵敌不忠。弃民不仁。不忠不仁，何以为臣！为臣不职，何以为人！”书毕，命妻李具牲酒生奠之，诀而出，密令游兵间道焚贼舟。贼惊救，绍宗格战，追至海岸，陷淖中，手刃数十贼，遂被害。其妻携孤奏于朝，赐葬祭，勒碑旌之。<br /><br />
</td></tr>

<tr><td class="t50">张兴传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张兴，寿州人。起卒伍，为燕山左护卫指挥佥事。从起兵，功多，累迁都指挥同知。从子勇，有力敢战，从兴行阵为肘腋。兴尝单骑追敌，被数十创，伤重不任战。以勇嗣指挥使，代将其兵。再论功，兴封安乡伯。<br /><br />
　　永乐五年正月卒。无子。<br /><br />
　　勇嗣。永乐八年从北征，失律，谪交阯。赦还复爵，卒。子安嗣。正统十三年镇广东。黄萧养寇广州，安帅舟师遇贼于戙船澳。安方醉卧，官军不能支，退至沙角尾。贼薄之，军溃。安溺死。传爵至光灿，死流寇。<br /><br />
</td></tr>

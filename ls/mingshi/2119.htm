<tr><td class="t50">白松虎儿传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　白松虎儿，旧名速麻里儿。尝有白虎出松林中，不伤人，亦不食他兽，旬日后不复见。国人异之，称为神虎，曰此西方白虎所降精也，因改国名。其地无大山，亦不生树木，无毒虫、猛兽之害，然物产甚薄。永乐中尝入贡。<br /><br />
</td></tr>

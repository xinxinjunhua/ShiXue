<tr><td class="t50">王良传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王良，字天性，祥符人。<br /><br />
　　洪武末，累官佥都御史，坐缓其僚友狱，贬刑部郎中。<br /><br />
　　建文中，历迁刑部左侍郎。议减燕府人罪，不称旨，出为浙江按察使。<br /><br />
　　燕王即位，颇德之，遣使召良。良执使者将斩之，众劫之去。良集诸司印于私第，将自杀，未即决。妻问故。曰：“吾分应死，未知所以处汝耳。”妻曰：“君男子，乃为妇人谋乎？”馈良食。食已，抱其子入后园，置子池旁，投水死。良殓妻毕，以子付友人家，遂积薪自焚，印俱毁。成祖曰：“死固良分，朝廷印不可毁。毁印，良不得无罪。”徙其家于边。<br /><br />

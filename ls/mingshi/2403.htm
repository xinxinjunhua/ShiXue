<tr><td class="t50">乘舆受蕃国王讣奏仪</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　凡蕃国王薨，使者讣奏至，于西华门内壬地设御幄，皇帝素服乘舆诣幄。太常卿奏：“某国世子遣陪臣某官某，奏某国王臣某薨。”承制官至使者前宣制曰：“皇帝致问尔某国王某，得何疾而逝。”使者答故。其仪大略如临王公大臣丧仪，但不举哀。<br /><br />
　　凡塞外都督等官讣至，永乐间遣官赍香钞谕祭。后定例，因其奏请，给与表里祭文，令携归自祭。来京病故者，遣官谕祭或赐棺赐葬。后定年终类奏，遣官祭之。若在边殁于战阵者，不拘此例。凡外国使臣病故者，令所在官司赐棺及祭，或欲归葬者听。<br /><br />

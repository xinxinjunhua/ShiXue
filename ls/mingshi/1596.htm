<tr><td class="t50">朱裒传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　朱裒，字崇晋，郧西人。嘉靖中举于乡，署巩县教谕事。迁武功知县，抑豪强，祛积弊，关中呼为铁汉。迁扬州同知，吏无敢索民一钱。三十四年，倭入犯，击败之沙河，歼其酋，还所掠牲畜甚众。未几，复大至，薄城东门。督兵奋击，兵溃，死焉。赠左参政，录一子。<br /><br />
　　明年，倭犯无为州，同知齐恩率舟师败倭于圌山北等港，斩首百余级。子嵩，年十八，最骁勇，击倭至安港，伏发被围，恩家二十余人俱力战死，惟嵩等三人获全。赠恩光禄丞，录一子，厚恤其家，建祠祀之。<br /><br />
</td></tr>

<tr><td class="t50">朱升传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　朱升，字允升，休宁人。元末举乡荐，为池州学正，讲授有法。蕲、黄盗起，弃官隐石门。数避兵逋窜，卒未尝一日废学。太祖下徽州，以邓愈荐，召问时务。对曰：“高筑墙，广积粮，缓称王。”太祖善之。<br /><br />
　　吴元年，授侍讲学士，知制诰，同修国史。以年老，特免朝谒。洪武元年进翰林学士，定宗庙时享斋戒之礼。寻命与诸儒修《女诫》，采古贤后妃事可法者编上之。大封功臣，制词多升撰，时称典核。逾年，请老归，卒年七十二。<br /><br />
　　升自幼力学，至老不倦。尤邃经学。所作诸经旁注，辞约义精。学者称枫林先生。子同官礼部侍郎，坐事死。<br /><br />

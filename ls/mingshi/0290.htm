<tr><td class="t50">陈志传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　陈志，巴人。洪武中，为燕山中护卫指挥佥事。从起兵，累迁都指挥同知，封遂安伯。志素以恭谨受知，戮力戎行，始终不懈。永乐八年五月卒。<br /><br />
　　孙瑛嗣。屡从出塞，镇永平、山海、蓟州，城云州、独石。爽闿有将材。然贪残，人多怨者。卒，子埙嗣。殁于土木，谥荣怀。弟韶嗣。卒。孙鏸嗣。总蓟州兵。朵颜入寇，御却之。嘉靖初，叙奉迎功，加太子太保，进少保，委寄亚武定侯郭勋。嗣伯六十余年卒。又五传而明亡。<br /><br />
</td></tr>

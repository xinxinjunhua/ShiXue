<tr><td class="t50">乞力麻儿传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　乞力麻儿，永乐中遣使来贡，惟兽皮、鸟羽、罽褐。其俗喜射猎，不事耕农。西南傍海，东北林莽深密，多猛兽、毒虫。有逵巷，无市肆，交易用铁钱。<br /><br />

<tr><td class="t50">光宗诸子传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　光宗七子。王太后生熹宗、简王由&#15378;。王选侍生齐王由楫。李选侍生怀王由模。刘太后生庄烈皇帝。定懿妃生湘王由栩。敬妃生惠王由橏。<br /><br />
　　简怀王由&#15378;，光宗第二子。生四岁殇。齐思王由楫，光宗第三子。生八岁殇。怀惠王由模，光宗第四子。生五岁殇。湘怀王由栩，光宗第六子。惠昭王由橏，光宗第七子。俱早殇。五王皆追加封谥。<br /><br />

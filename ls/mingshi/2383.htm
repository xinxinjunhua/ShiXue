<tr><td class="t50">军礼</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　四曰军礼。亲征为首，遣将次之。方出师，有祃祭之礼。及还，有受降、奏凯献俘、论功行赏之礼。平居有阅武、大射之礼。而救日伐鼓之制，亦以类附焉。<br /><br />

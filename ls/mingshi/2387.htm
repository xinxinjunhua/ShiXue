<tr><td class="t50">受降</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　洪武四年七月，蜀夏明升降表至京师，太祖命中书集议受降礼。省部请如宋太祖受蜀主孟昶降故事，拟明升朝见日，皇帝御奉天门，升等于午门外跪进待罪表。侍仪使捧表入，宣表官宣读讫，承制官出传制。升等皆俯伏于地，侍仪舍人掖升起，其属官皆起，跪听宣制释罪。升等五拜，三呼万岁。<br /><br />
　　承制官传制，赐衣服冠带。侍仪舍人引升入丹墀中四拜。侍仪使传旨，升跪听宣谕，俯伏四拜，三呼万岁，又四拜出。百官行贺礼。帝以昶专治国政，所为奢纵，升年幼，事由臣下，免其叩头伏地上表请罪礼，惟命升及其官属朝见，百官朝贺。<br /><br />
</td></tr>

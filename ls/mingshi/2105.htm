<tr><td class="t50">渴石传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　渴石，在撒马儿罕西南三百六十里。城居大村，周十余里。宫室壮丽，堂以玉石为柱，墙壁窗牖尽饰金碧，缀琉璃。其先，撒马儿罕酋长驸马帖木儿居之。城外皆水田。东南近山，多园林。西行十余里，饶奇木。又西三百里，大山屹立，中有石峡，两崖如斧劈。行二三里出峡口，有石门，色似铁，路通东西，番人号为铁门关，设兵守之。<br /><br />
　　或言元太祖至东印度铁门关，遇一角兽，能人言，即此地也。<br /><br />

<tr><td class="t50">王伟传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王伟，神宗显皇后父也。万历五年授都督。寻封永年伯。<br /><br />
　　帝欲加恩伟子栋及其弟俊，阁臣请俱授锦衣正千户。帝曰：“正德时，皇亲夏助等俱授锦衣指挥使，世袭，今何薄也？”大学士张居正等言：“正德时例，世宗悉已厘革，请授栋锦衣卫指挥佥事，俊千户，如前议。”帝意未慊，居正固奏，乃止。伟卒，传子栋及曾孙明辅，袭伯如制。<br /><br />
</td></tr>

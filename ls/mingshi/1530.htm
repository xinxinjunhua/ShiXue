<tr><td class="t50">张弼传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张弼，字汝弼，松江华亭人。<br /><br />
　　成化二年进士。授兵部主事，进员外郎。迁南安知府，地当两广冲，奸人聚山谷为恶，悉捕灭之。毁淫祠百数十区，建为社学。谢病归，士民为立祠。弼自幼颖拔，善诗文，工草书，怪伟跌宕，震撼一世。自号东海。张东海之名，流播外裔。为诗，信手纵笔，多不属稿，即有所属，以书故，辄为人持去。与李东阳、谢铎善。尝自言：“吾平生，书不如诗，诗不如文。”东阳戏之曰：“英雄欺人每如此，不足信也。”铎称其好学不倦，诗文成一家言。子弘至，自有传。<br /><br />
</td></tr>

<tr><td class="t50">木冰</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　洪武四年正月戊申，木冰。六年十二月乙丑，雨木冰。十一年正月丁亥，雨木冰。二十二年正月甲戌，雨木冰。<br /><br />
　　正统三年十月丁丑晓，木介。天顺七年十月甲辰，雨木冰。八年正月乙丑，雨木冰。<br /><br />
　　成化十六年正月辛卯晓，雨木冰。二十三年十二月戊辰晓，木介。隆庆三年十一月癸巳，木冰。万历十四年冬，苏、松木冰。<br /><br />
　　崇祯元年十一月，陕西木冰，树枝尽折。其后大河以北，岁有此异。<br /><br />

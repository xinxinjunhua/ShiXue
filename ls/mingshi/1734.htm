<tr><td class="t50">周敖传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　周敖，河州卫军家子也。<br /><br />
　　正统末，闻英宗北狩，大哭，不食七日而死。其子诸生路方读书别墅，闻父死，恸哭奔归，以头触庭槐亦死。乡人异之，闻于州。知州躬临其丧，赙麦四十斛、白金一斤。路妻方氏，厉志守节，抚子堂成立，后为知县。<br /><br />
</td></tr>

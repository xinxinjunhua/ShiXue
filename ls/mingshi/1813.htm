<tr><td class="t50">陈景行传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　陈景行，穆宗继后陈皇后父也。先世建昌人，高祖政以军功世袭百户，调通州右卫，遂家焉。景行故将门，独嗜学，弱冠试诸生高等。穆宗居裕邸，选其女为妃，授景行锦衣千户。<br /><br />
　　隆庆元年封固安伯。景行素恭敬，每遇遣祀、册封诸典礼，必斋戒将事。家居，诫诸子以退让。万历中卒，太后、帝及中宫、潞王、公主赙赠优厚，人皆荣之。子昌言、嘉言、善言、名言，皆官锦衣。昌言先景行卒，其子承恩引李文全例，请袭祖封。帝曰：“承恩，孙，文全，子也，不可比。”以都督同知授之。<br /><br />
</td></tr>

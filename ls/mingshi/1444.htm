<tr><td class="t50">田铎传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　田铎，字振之，阳城人。<br /><br />
　　成化十四年进士。授户部主事，迁员外郎、郎中。<br /><br />
　　弘治二年奉诏振四川，坐误遗敕中语，谪蓬州知州。州东南有江洲八十二顷，为豪右所据，铎悉以还民。建大小二十四桥，又凿三溪山以便行者。御史行部至蓬，寂无讼者，讶之。已，乃知州无冤民也，太息而去。荐于朝，擢广东佥事。迁四川参议，不赴，以老疾告归。正德时，刘瑾矫诏，言铎理广东盐法，簿牒未明，逮赴广。未就道而瑾诛，或劝铎毋行，铎不听，行次九江卒，年八十二矣。<br /><br />
</td></tr>

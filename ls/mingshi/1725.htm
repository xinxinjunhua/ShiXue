<tr><td class="t50">李德成传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李德成，浃水人。幼丧父。<br /><br />
　　元末，年十二，随母避寇至河滨。寇骑迫，母投河死。德成长，娶妇王氏。抟土为父母像，与妻朝夕事之。方严冬，大雪，水坚至河底。德成梦母曰：“我处水下，寒不得出。”觉而大恸，旦与妻徒跣行三百里，抵河滨。卧水七日，水果融数十丈，恍惚若见其母，而他处坚冻如故。久之，乃归。洪武十九年举孝廉，屡擢尚宝丞。<br /><br />
　　二十七年旌为孝子。建文中，燕兵逼济南。德成往谕令还兵，燕兵不退。德成归，以辱命下吏，已而释之。永乐初复官，屡迁陕西布政使。<br /><br />

<tr><td class="t50">水</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　《洪范》曰“水曰润下”。水不润下，则失其性矣。前史多以恒寒、恒阴、雪霜、冰雹、雷震、鱼孽、蝗蝻、豕祸、龙蛇之孽、马异、人疴、疾疫、鼓妖、陨石、水潦、水变、黑眚黑祥皆属之水，今从之。<br /><br />

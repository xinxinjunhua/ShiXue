<tr><td class="jz">

<tr><td>
<br />
　　天启元年正月，从礼部奏，凡从点水加各字者，俱改为“雒”，从木加交字者，俱改为“较”。惟督学称较字未宜，应改为学政。各王府及文武职官，有犯庙讳御名者，悉改之。<br /><br />

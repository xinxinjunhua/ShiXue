<tr><td class="t50">庶人婚礼</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　《礼》云：“婚礼下达。”则六礼之行，无贵贱一也。朱子《家礼》无问名、纳吉，止纳采、纳币、请期。<br /><br />
　　洪武元年定制用之，下令禁指腹、割衫襟为亲者。<br /><br />
　　凡庶人娶妇，男年十六，女年十四以上，并听婚娶。婿常服，或假九品服，妇服花钗大袖。其纳采、纳币、请期，略仿品官之仪。有媒无宾，词亦稍异。亲迎前一日，女氏使人陈设于婿之寝室，俗谓之铺房。至若告词、醮戒、奠雁、合卺，并如品官仪。见祖祢舅姑，舅姑醴妇，亦略相准。<br /><br />
</td></tr>

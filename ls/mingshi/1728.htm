<tr><td class="t50">权谨传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　权谨，字仲常，徐州人。十岁丧父，即哀毁，奉母至孝。永乐四年荐授乐安知县，迁光禄署丞，以省侍归。母年九十终，庐墓三年，致泉涌免驯之异。有司以闻，仁宗命驰驿赴阙，出其事状，令侍臣朗诵大廷，以示百僚，即拜文华殿大学士。谨辞，帝曰：“朕擢卿以风天下为子者，他非卿责也。”寻扈从皇太子监国南京。宣宗嗣位，以疾乞归，改通政司右参议，赐白金文绮致仕。子伦，举永乐中乡试。<br /><br />
　　养亲二十年，亲终不仕。伦子宇，父母卒，皆庐墓。<br /><br />
　　成化十二年亦获旌。<br /><br />

<tr><td>
<br />
　　钮兀长官司，宣德八年置。钮兀、五隆诸寨在和泥之地，其酋任者、陀比等朝贡至京，奏地远蛮多，请授职以总其众。兵部请设长官司，从之。遂以任者为长官，陀比为副。<br /><br />

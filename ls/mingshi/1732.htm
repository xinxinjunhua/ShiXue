<tr><td class="t50">石鼐传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　石鼐，浑源诸生。父殁，庐墓。墓初成，天大雨，山水骤涨。鼐仰天号哭，水将及墓，忽分两道去，墓获全。弘治五年旌表。<br /><br />
　　任镗，夏邑人。嫡母卒，庐于墓。黄河冲溢，将啮茔域。镗伏地号哭，河即南徙。嘉靖二十五年旌表。<br /><br />
</td></tr>

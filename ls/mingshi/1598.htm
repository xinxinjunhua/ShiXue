<tr><td class="t50">杜槐传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　杜槐，字茂卿，兹溪人。倜傥任侠。<br /><br />
　　倭寇至，县佥其父文明为部长，令团结乡勇。槐伤父老，以身任之，数败倭。副使刘起安委槐守余姚、慈溪、定海。遇倭定海之白沙，一日战十三合，斩三十余人，馘一酋，身被数枪，堕马死。<br /><br />
　　文明击倭鸣鹤场，斩一人，倭惊遁，称为杜将军。无何，追至奉化枫树岭，战殁。文明赠府经历，槐赠光禄丞，建祠并祀，荫槐子国子生。<br /><br />
</td></tr>

<tr><td class="t50">周奎传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　周奎，苏州人，庄烈帝周皇后父也。<br /><br />
　　崇祯三年封嘉定伯，赐第于苏州之葑门。帝尝谕奎及田贵妃父弘遇、袁贵妃父祐，宜恪遵法度，为诸戚臣先。祐颇谨慎，惟弘遇骄纵，奎居外戚中，碌碌而已。<br /><br />
　　李自成逼京师，帝遣内侍徐高密谕奎倡勋戚输饷，奎坚谢无有。高愤泣曰：“后父如此，国事去矣。”奎不得已奏捐万金，且乞皇后为助。及自成陷京师，掠其家得金数万计，人以是笑奎之愚云。<br /><br />
</td></tr>

<tr><td class="t50">不剌哇传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　不剌哇，与木骨都束接壤。自锡兰山别罗里南行，二十一昼夜可至。<br /><br />
　　永乐十四年至二十一年，凡四入贡，并与木骨都束偕。郑和亦两使其国。宣德五年，和复往使。<br /><br />
　　其国，傍海而居，地广斥卤，少草木，亦垒石为屋。其盐池。但投树枝于中，已而取起，盐即凝其上。俗淳。田不可耕，蒜葱之外无他种，专捕鱼为食。所产有马哈兽，状如獐；花福禄，状如驴；及犀、象、骆驼、没药、乳香、龙涎香之类，常以充贡。<br /><br />

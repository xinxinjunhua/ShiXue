<tr><td class="t50">何廷魁传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　何廷魁，字汝谦，山西威远卫人。<br /><br />
　　万历二十九年进士。授泾县知县，调宁晋，迁刑部主事，历归德、卫辉、河南知府，西宁副使。坐考功法，复为黎平知府。会辽事棘，迁副使，分巡辽阳。袁应泰纳降，廷魁争，不听。及沈阳破，同事者遣孥归，廷魁曰：“吾不敢为民望。”大清兵渡濠，廷魁请乘半济急击之。俄薄城，围未合，又请尽锐出御。应泰并不从。<br /><br />
　　辽阳破，廷魁怀印率其妾高氏、金氏投井死，婢仆从死者六人。都司徐国全闻之，亦自经公署。事闻，赠光禄卿，再赠大理卿，赐祭葬，谥忠愍，世荫锦衣百户。国全赠恤如制。<br /><br />
</td></tr>

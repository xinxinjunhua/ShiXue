<tr><td class="t50">讨来思传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　讨来思，地小，周径不百里。城近山。山下有水，赤色，望之如火。俗佞佛。妇人主家柄。产牛羊马驼，有布缕毛褐。土宜穄麦，无稻。交易用钱。宣德六年入贡。明年命中官李贵赍玺书奖劳，赐文绮、彩帛。以地小不能常贡。<br /><br />
</td></tr>

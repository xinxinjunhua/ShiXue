<tr><td class="t50">张泰传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张泰，字亨父，太仓人。陆釴，字鼎仪，昆山人。陆容，字文量，亦太仓人。三人少齐名，号“娄东三凤”。<br /><br />
　　泰举天顺八年进士，选庶吉士，授检讨，迁修撰。为人恬淡自守，诗名亚李东阳。弘治间，艺苑皆称李怀麓、张沧洲，东阳有《怀麓堂集》，泰有《沧洲集》也。<br /><br />
　　釴与泰同年进士，殿试第二。授编修，历修撰、谕德。孝宗立，以东宫讲读劳，进太常少卿兼侍读，得疾归。泰、釴皆早卒。<br /><br />
　　容，成化中进士。授南京主事，进兵部职方郎中。西番进狮子，奏请大臣往迎，容谏止之。迁浙江参政，罢归。<br /><br />
</td></tr>

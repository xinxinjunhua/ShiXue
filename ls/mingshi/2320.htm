<tr><td class="t50">五祀</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　洪武二年定制，岁终腊享，通祭于庙门外。八年，礼部奏：“五祀之礼，周、汉、唐、宋不一。今拟孟春祀户，设坛皇宫门左，司门主之。孟夏祀灶，设坛御厨，光禄寺官主之。季夏祀中霤，设坛乾清宫丹墀，内官主之。孟秋祀门，设坛午门左，司门主之。孟冬祀井，设坛宫内大庖井前，光禄寺官主之。四孟于有事太庙之日，季夏于土旺之日，牲用少牢。”制可。从定中霤于奉天殿外文楼前。又岁暮合祭五祀于太庙西庑下，太常寺官行礼。<br /><br />

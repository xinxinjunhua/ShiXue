<tr><td class="t50">合猫里传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　合猫里，海中小国也。土瘠多山，山外大海，饶鱼虫，人知耕稼。<br /><br />
　　永乐三年九月遣使附爪哇使臣朝贡。其国又名猫里务，近吕宋，商舶往来，渐成富壤。华人入其国，不敢欺陵，市法最平，故华人为之语曰：“若要富，须往猫里务。”有网巾礁老者，最凶悍，海上行劫，舟若飘风，遇之无免者。然特恶商舶不至其地，偶有至者，待之甚善。猫里务后遭寇掠，人多死伤，地亦贫困。商人虑为礁老所劫，鲜有赴者。<br /><br />
</td></tr>

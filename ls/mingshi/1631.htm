<tr><td class="t50">张焜芳传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张焜芳，会稽人。<br /><br />
　　崇祯元年进士。历南京户科给事中。<br /><br />
　　十一年春，疏荐黄道周、惠世扬、陈子壮、金光辰，而为旧抚文震孟请恤。帝以沽名市恩，切责之。又纠太仆少卿史涘，为涘所讦，遂罢职，事具《薛国观传》。<br /><br />
　　十六年正月，焜芳北上，抵临清，遇大清兵，与诸生马之騆，之駉俱被执死之。其妻妾闻之，赴井死。<br /><br />
　　时又有天津参将贺秉钺者，泰宁左卫人。崇祯四年第武科一甲第三，亦以扶父柩至临清，巷战终日，矢尽，被执死。<br /><br />
</td></tr>

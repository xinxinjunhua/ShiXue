<tr><td class="t50">厉坛</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　泰厉坛祭无祀鬼神。《春秋传》曰“鬼有所归，乃不为厉。”此其义也。《祭法》：王祭泰厉，诸侯祭公厉，大夫祭族厉。《士丧礼》：“疾病祷于厉’，《郑注》谓“汉时民间皆秋祠厉”，则此祀达于上下矣，然后世皆不举行。<br /><br />
　　洪武三年定制，京都祭泰厉，设坛玄武湖中，岁以清明及十月朔日遣官致祭。前期七日，檄京都城隍。<br /><br />
　　祭日，设京省城隍神位于坛上，无祀鬼神等位于坛下之东西，羊三，豕三，饭米三石。王国祭国厉，府州祭郡厉，县祭邑厉，皆设坛城北，一年二祭如京师。里社则祭乡厉。后定郡邑厉、乡厉，皆以清明日、七月十五日、十月朔日。<br /><br />

<tr><td class="t50">俺的干传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　俺的干，西域小部落。<br /><br />
　　元太祖尽平西域，封子弟为王镇之，其小者则设官置戍，同于内地。元亡，各自割据，不相统属。<br /><br />
　　洪武、永乐间，数遣人招谕，稍稍来贡。地大者称国，小者止称地面。迄宣德朝，效臣职、奉表笺、稽首阙下者，多至七八十部。而俺的干，则永乐十一年与哈烈并贡者也。迨十四年，鲁安等使哈烈、失剌思诸思，复便道赐其酋长文绮。然地小不能常贡，后竟不至。<br /><br />
</td></tr>

<tr><td class="t50">杨黼传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　杨黼，云南太和人也。好学，读《五经》皆百遍。工篆籀，好释典。或劝其应举，笑曰：“不理性命，理外物耶？”庭前有大桂树，缚板树上，题曰桂楼。偃仰其中，歌诗自得。躬耕数亩供甘膬，但求亲悦，不顾余也。注《孝经》数万言，证群书，根性命，字皆小篆。所用砚乾，将下楼取水，砚池忽满，自是为常，时人咸异之。<br /><br />
　　父母殁，为佣营葬毕，入鸡足，栖罗汉壁石窟山十余年，寿至八十。子逊迎归，一日沐浴，令子孙拜，曰：“明日吾行矣。”果卒。<br /><br />

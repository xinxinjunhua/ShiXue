<tr><td class="t50">夏子孝传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　夏子孝，字以忠，桐城人。六岁失母，哀哭如成人。九岁父得危疾，祷天地，刲股六寸许，调羹以进，父食之顿愈。翌日，子孝痛创，父诘其故，始知之。里老以闻于官，知府胡麟先梦王祥来谒，诘旦而县牒至，诧曰：“孺子其祥后身耶？”召见，易其旧名“恩”曰“子孝”。督学御史胡植即令入学为诸生，月廪之。麟复属贡士赵简授之经。<br /><br />
　　嘉靖末，父卒，庐墓，独居荒山，身无完衣，形容槁瘁。后历事王畿、罗汝芳、史桂芳、耿定向，获闻圣贤之学。定向为督学御史，将疏闻于朝，固辞曰：“不肖不忍以亡亲贾名。”乃止。将死，命其子曰：“葬我父墓侧。”<br /><br />

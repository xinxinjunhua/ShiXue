<tr><td class="t50">麻林传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　麻林，去中国绝远。<br /><br />
　　永乐十三年遣使贡麒麟。将至，礼部尚书吕震请表贺，帝曰：“往儒臣进《五经四书大全》，请上表，朕许之，以此书有益于治也。麟之有无，何所损益，其已之。”已而麻林与诸蕃使者以麟及天马、神鹿诸物进，帝御奉天门受之。百僚稽首称贺，帝曰：“此皇考厚德所致，亦赖卿等翊赞，故远人毕来。继自今，益宜秉德迪朕不逮。”<br /><br />
　　十四年又贡方物。<br /><br />

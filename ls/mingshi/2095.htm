<tr><td class="t50">西天阿难功德国传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　西天阿难功德国，西方番国也。<br /><br />
　　洪武七年，王卜哈鲁遣其讲主必尼西来朝，贡方物及解毒药石。诏赐文绮、禅衣及布帛诸物。后不复至。<br /><br />
　　又有和林国师朵儿只怯烈失思巴藏卜，亦遣其讲主汝奴汪叔来朝，献铜佛、舍利、白哈丹布及元所授玉印一、玉图书一、银印四、铜印五、金字牌三，命宴赉遣还。明年，国师入朝，又献佛像、舍利、马二匹，赐文绮、禅衣。和林，即元太祖故都，在极北，非西番，其国师则番僧。与功德国同时来贡，后亦不复至。<br /><br />

<tr><td class="t50">刘谨传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘谨，浙江山阴人。<br /><br />
　　洪武中，父坐法戍云南。谨方六岁，问家人“云南何在？”家人以西南指之，辄朝夕向之拜。<br /><br />
　　年十四，矍然曰：“云南虽万里，天下岂有无父之子哉！”奋身而往，阅六月抵其地，遇父于逆旅，相持号恸。俄父患疯痹，谨告官乞以身代。法令戍边者必年十六以上，嫡长男始许代。时谨未成丁，伯兄先死，乃归家携兄子往。兄子亦弱未能自立，复归悉鬻其产畀兄子，始获奉其父还，孝养终身。<br /><br />

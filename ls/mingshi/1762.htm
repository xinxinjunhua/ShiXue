<tr><td class="t50">张介福传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张介福，字子祺，自怀庆徙吴中。少受学于许衡。二亲早终，遂无仕进意。家贫，冬不能具夹襦，或遗以纻絮，不受，纤介必以礼。<br /><br />
　　张士诚入吴，有卒犯其家，危坐不为起。刀斫面，仆地，醒复取冠戴之，坐自若。卒怪，以为异物，走去。介福恐发其先墓，往庐焉。士诚闻而欲致之，不可。使其弟往问，答曰：“无乐乱，无贪天祸，无忘国家。”馈之，力辞。<br /><br />
　　已，病革，谓其友曰：“吾志希古人，未能也。惟无污于时，庶几哉。”遂卒。<br /><br />

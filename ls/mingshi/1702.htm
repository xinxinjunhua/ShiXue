<tr><td class="t50">王乔栋传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王乔栋，雄县人。举进士，授朝邑知县。县人王之寀为魏忠贤党所恶，坐以赃，下乔栋严征。乔栋不忍，封印于库而去。巡抚怒，将劾之。士民拥署号呼，乃止。<br /><br />
　　崇祯初，起顺天教授，累迁湖广参政。楚中大乱，诸道监司多不至，乔栋兼绾数篆。乙酉夏，李自成据武昌，乔栋时驻兴国州。城为贼陷，自经城楼上。<br /><br />
</td></tr>

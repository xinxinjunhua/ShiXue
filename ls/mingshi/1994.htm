<tr><td class="t50">江州</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　江州界，东抵忠州，西抵龙州，南抵思明，北抵太平府。其州宋置，隶古万寨。元属思明路。明初，土官黄威庆归附。授世袭知州，设流官吏目以佐之，直隶布政司。<br /><br />
　　嘉靖四十二年，以平瑶、僮功，准江州土官子黄恩暂署本职。领县一，曰罗白。洪武初，土官梁敬宾归附，授世袭知县。敬宾死，子复昌袭。永乐间，从征交阯被陷，子福里袭。<br /><br />
</td></tr>

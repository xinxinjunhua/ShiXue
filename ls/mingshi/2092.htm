<tr><td class="t50">护教王传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　护教王者，名宗巴斡即南哥巴藏卜，馆觉僧也。<br /><br />
　　成祖初，僧智光使其地。永乐四年遣使入贡，诏授灌顶国师，赐之诰。明年遣使入谢，封为护教王，赐金印、诰命，国师如故。遂频岁入贡。十二年卒，命其从子干些儿吉剌思巴藏卜嗣。洪熙、宣德中并入贡。已而卒，无嗣，其爵遂绝。<br /><br />
</td></tr>

<tr><td class="t50">星辰坛</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　洪武三年，帝谓中书省臣：“日月皆专坛祭，而星辰乃祔祭于月坛，非礼也。”礼部拟于城南诸神享祭坛正南向，增九间，朝日夕月祭周天星辰，俱于是行礼。朝日夕月仍以春秋分祭，星辰则于天寿节前三日。从之。<br /><br />
　　四年九月，帝躬祀周天星辰。正殿共十坛，中设周天星辰位，仪如朝日。<br /><br />
　　二十一年，以星辰既从祀南郊，罢禜星之祭。<br /><br />

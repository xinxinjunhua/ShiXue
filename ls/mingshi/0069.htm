<tr><td class="t50">惠帝诸子传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　惠帝二子。俱马后生。<br /><br />
　　太子文奎。建文元年立为皇太子。燕师入，七岁矣，莫知所终。<br /><br />
　　少子文圭。年二岁，成祖入，幽之中都广安宫，号为建庶人。英宗复辟，怜庶人无罪久系，欲释之，左右或以为不可。帝曰：“有天命者，任自为之。”大学士李贤<br /><br />
　　＊＊＊<br /><br />
　　赞曰：“此尧、舜之心也。”遂请于太后，命内臣牛玉往出之。听居凤阳，婚娶出入使自便。与阍者二十人，婢妾十余人，给使令。文圭孩提被幽，至是年五十七矣。未几卒。<br /><br />
</td></tr>

<tr><td class="t50">吴炳传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　吴炳，宜兴人。万历末进士。授蒲圻知县。<br /><br />
　　崇祯中，历官江西提学副使。江西地尽失，流寓广东。永明王擢为兵部右侍郎，从至桂林，令以本官兼东阁大学士，仍掌部事。又从至武冈。大兵至，王仓猝奔靖州，令炳扈王太子走城步，吏部主事侯伟时从之。既至，城已为大兵所据，遂被执，送衡州。炳不食，自尽于湘山寺，伟时亦死之。<br /><br />
　　伟时，公安人。崇祯中进士，历官吏部考功主事，罢官。至是补官数月，即遘难。<br /><br />

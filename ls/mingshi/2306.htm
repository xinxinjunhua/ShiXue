<tr><td class="t50">高禖</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　嘉靖九年，青州儒生李时飏请祠高禖，以祈圣嗣。礼官覆以闻。帝曰：“高禖虽古礼，今实难行。”遂寝其议。已而定祀高禖礼。设木台于皇城东，永安门北，震方。台上，皇天上帝南向，骍犊，苍壁。献皇帝配，西向，牛羊豕各一。<br /><br />
　　高禖在坛下西向，牲数如之，礼三献。皇帝位坛下北向，后妃位南数十丈外，北向，用帷。坛下陈弓矢、弓韣如后妃嫔之数。祭毕，女官导后妃嫔至高禖前，跪取弓矢授后妃嫔，后妃嫔受而纳于弓韣。<br /><br />
</td></tr>

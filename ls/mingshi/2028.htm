<tr><td class="t50">琐里传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　琐里，近西洋琐里而差小。<br /><br />
　　洪武三年，命使臣塔海帖木儿赍诏抚谕其国。<br /><br />
　　五年，王卜纳的遣使奉表朝贡，并献其国土地山川图。帝顾中书省臣曰：“西洋诸国素称远蕃，涉海而来，难计岁月。其朝贡无论疏数，厚往薄来可也。”乃赐《大统历》及金织文绮、纱罗各四匹，使者亦赐币帛有差。<br /><br />

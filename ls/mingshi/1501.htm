<tr><td class="t50">周冕传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　周冕，先贤元公周子十二代孙也。其先，道州人，熙宁中，周子葬母江州，子孙因家庐山莲花峰下。景泰七年，授冕翰林院《五经》博士，子孙世袭，还乡以奉周子祀事。<br /><br />
　　卒，子绣麟袭。<br /><br />
　　卒，子道袭。<br /><br />
　　卒，子联芳袭。<br /><br />
　　卒，子济袭。<br /><br />
　　卒，从弟汝忠袭。<br /><br />
　　卒，子莲应袭。<br /><br />

<tr><td class="t50">器用</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　器用之禁：洪武二十六年定，公侯、一品、二品，酒注、酒盏金，馀用银。三品至五品，酒注银，酒盏金，六品至九品，酒注、酒盏银，馀皆磁、漆。木器不许用朱红及抹金、描金、雕琢龙凤文。庶民，酒注锡，酒盏银，馀用磁、漆。百官，床面、屏风、槅子，杂色漆饰，不许雕刻龙文，并金饰朱漆。军官、军士，弓矢黑漆，弓袋、箭囊，不许用朱漆描金装饰。建文四年申饬官民，不许僣用金酒爵，其椅棹木器亦不许朱红金饰。<br /><br />
　　正德十六年定，一品、二品，器皿不用玉，止许用金。商贾、技艺家器皿不许用银。馀与庶民同。<br /><br />

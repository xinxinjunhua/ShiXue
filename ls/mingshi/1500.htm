<tr><td class="t50">仲于陛传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　仲于陛，先贤仲子六十二代孙也。<br /><br />
　　万历十五年诏以仲子五十九代孙吕为奉祀。吕子铨。铨子则显。则显子于陛。<br /><br />
　　崇祯十六年以衍圣公孔荫植言，诏授于陛翰林院《五经》博士，子孙世袭，赐泗水县、济宁州田六十余顷，庙户三十一，以奉其祭祀焉。<br /><br />

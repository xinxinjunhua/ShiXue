<tr><td class="t50">羽虫之孽</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　万历二十五年二月壬午，岳州民家有鸭，含絮裹火，飞上屋，入竹椽茅茨中。火四起，延烧数百家。四十三年四月壬午，双鹤衔火，飞集掖县海神庙殿。明日，庙火。崇祯六年，汝宁有鸟，鸠身猴足。凤阳恶鸟数万，兔头、鸡身、鼠足，供馔甚肥，犯其骨立死。<br /><br />
</td></tr>

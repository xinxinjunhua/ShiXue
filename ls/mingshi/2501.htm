<tr><td class="t50">武学</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　武学。京卫武学，教授一人，（从九品）训导一人。卫武学，教授一人，训导二人或一人。掌教京卫各卫幼官及应袭舍人与武生，以待科举、武举、会举，而听于兵部。其无武学者，凡诸武生则隶儒学。<br /><br />
　　建文四年始置京卫武学，设教授一人。启忠等十斋，各训导二人。永乐中罢，正统六年复设。后渐置各卫武军，设官如儒学之制。<br /><br />

<tr><td class="t50">思陵</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　思陵州，宋置，属永平寨。元属思明路。<br /><br />
　　洪武初，省入思明府。二十一年复置思陵州。二十七年，土官韦延寿贡马及方物。宣德四年，护印土官韦昌来朝，贡马，赐钞币。正统间，贡赐如制。其界东至忠州，西北至思明，南至交阯。<br /><br />

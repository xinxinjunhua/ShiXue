<tr><td class="t50">云南土司传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　明洪武十四年，大军至滇，梁王走死，遂置云南府。<br /><br />
　　自是，诸郡以次来归，垂及累世，规制咸定。统而稽之，大理、临安以下，元江、永昌以上，皆府治也。孟艮、孟定等处则为司，新化、北胜等处则为州，或设流官，或仍土职。今以诸府州概列之土司者，从其始也。盖滇省所属，多蛮夷杂处，即正印为流官，亦必以土司佐之。<br /><br />
　　而土司名目淆杂，难以缕析，故系之府州，以括其所辖。而于土司事迹，止摭其大纲有关乎治乱兴亡者载之，俾控驭者识所鉴焉。<br /><br />

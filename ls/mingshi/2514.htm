<tr><td class="t50">市舶提举司</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　市舶提举司。提举一人，（从五品）副提举二人。（从六品）其属，吏目一人。（从九品）掌海外诸蕃朝贡市易之事，辨其使人表文勘合之真伪，禁通番，征私货，平交易，闲其出入而慎馆谷之。<br /><br />
　　吴元年，置市舶提举司。洪武三年，罢太仓、黄渡市舶司。七年，罢福建之泉州、浙江之明州、广东之广州三市舶司。永乐元年复置，设官如洪武初制，寻命内臣提督之。嘉靖元年，给事中夏言奏倭祸起于市舶，遂革福建、浙江二市舶司，惟存广东市舶司。<br /><br />
</td></tr>

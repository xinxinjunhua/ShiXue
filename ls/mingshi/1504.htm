<tr><td class="t50">张文运传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张文运，郿人，先贤明公张子十四代孙也。天启二年授翰林院《五经》博士，子孙世袭，以奉张子祀事。<br /><br />
　　崇祯三年卒，子承引，以父忧未袭。<br /><br />
　　六年卒，子元祥，本朝康熙元年袭。<br /><br />

<tr><td class="t50">汪泉传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　汪泉，世为金吾左卫指挥使，家京师。<br /><br />
　　正统十年，其子瑛有女将册为郕王妃，授瑛为中城兵马司指挥，食禄不视事。妃正位中宫，进泉都指挥同知府军卫，带俸，瑛锦衣卫指挥使。寻并擢左都督，瑛弟亦授锦衣千户有差。英宗复位，泉仍居金吾旧职，瑛锦衣旧职，其四弟皆夺官还故里。<br /><br />
　　寻命瑛锦衣指挥佥事，子孙世袭。<br /><br />

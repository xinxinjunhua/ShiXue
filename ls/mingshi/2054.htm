<tr><td class="t50">溜山传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　溜山，自锡兰山别罗里南去，顺风七昼夜可至；自苏门答剌过小帽山西南行，十昼夜可至。永乐十年，郑和往使其国。十四年，其王亦速福遣使来贡。自后三贡，并与忽鲁谟斯诸国偕。宣德五年，郑和复使其国，后竟不至。<br /><br />
　　其山居海中，有三石门，并可通舟。无城郭，倚山聚居。气候常热，土薄谷少，无麦，土人皆捕鱼，暴乾以充食。王及群下尽回回人，婚丧诸礼，多类忽鲁谟斯。山下有八溜，或言外更有三千溜，舟或失风入其处，即沉溺。<br /><br />
　　又有国曰比剌，曰孙剌。郑和亦尝赍敕往赐。以去中华绝远，二国贡使竟不至。<br /><br />

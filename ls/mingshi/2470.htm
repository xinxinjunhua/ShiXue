<tr><td class="t50">宗人府</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　宗人府。宗人令一人，左、右宗正各一人，左、右宗人各一人，（并正一品）掌皇九族之属籍，以时修其玉牒，书宗室子女適庶、名封、嗣袭、生卒、婚嫁、谥葬之事。凡宗室陈请，为闻于上，达材能，录罪过。初，洪武三年置大宗正院。<br /><br />
　　二十二年改为宗人府，并以亲王领之。（秦王樉为令，晋王棡、燕王棣为左、右宗正，周王隶、楚王桢为左、右宗人。）<br /><br />
　　其后以勋戚大臣摄府事，不备官，而所领亦尽移之礼部。其属，经历司，经历一人，（正五品）典出纳文移。<br /><br />

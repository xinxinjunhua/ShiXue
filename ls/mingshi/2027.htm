<tr><td class="t50">西洋琐里传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　西洋琐里，洪武二年命使臣刘叔勉以即位诏谕其国。三年平定沙漠，复遣使臣颁诏。其王别里提遣使奉金叶表，从叔勉献方物。赐文绮、纱罗诸物甚厚，并赐《大统历》。<br /><br />
　　成祖颁即位诏于海外诸国，西洋亦与焉。永乐元年命副使闻良辅、行人甯善使其国，赐绒锦、文绮、纱罗。已，复命中官马彬往使，赐如前。其王即遣使来贡，附载胡椒与民市。有司请徵税，命勿徵。<br /><br />
　　二十一年偕古里、阿丹等十五国来贡。<br /><br />

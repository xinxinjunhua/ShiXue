<tr><td class="t50">庶人相见礼</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　洪武五年令，凡乡党序齿，民间士农工商人等平居相见及岁时宴会谒拜之礼，幼者先施。坐次之列，长者居上。<br /><br />
　　十二年令，内外官致仕居乡，惟于宗族及外祖、妻家序尊卑，如家人礼。若筵宴，则设别席，不许坐于无官者之下。与同致仕官会，则序爵；爵同，序齿。其与异姓无官者相见，不须答礼。庶民则以官礼谒见。凌侮者论如律。<br /><br />
　　二十六年定，凡民间子孙弟侄甥婿见尊长，生徒见其师，奴婢见家长，久别行四拜礼，近别行揖礼。其余亲戚长幼悉依等第，久别行两拜礼，近别行揖礼。平交同。<br /><br />

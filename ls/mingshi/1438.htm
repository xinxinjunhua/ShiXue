<tr><td class="t50">范衷传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　范衷，字恭肃，丰城人。<br /><br />
　　永乐十九年进士。除寿昌知县。辟荒田二千六百亩，兴水利三百四十有六区。<br /><br />
　　正统五年三考报最，当迁。邑人颂德乞留，御史以闻，朝廷许之。寻以外艰去，服阕，起知汝州。吏部尚书王直察举天下廉吏数人，衷为第一。性至孝，庐父墓，瓜生连枝，有白兔三，驯扰暮侧。乡人莫不高其行。<br /><br />
</td></tr>

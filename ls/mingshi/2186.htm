<tr><td class="t50">狂人</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　景泰三年五月癸巳朔，以明日立太子，具香亭于奉天门。有一人自外竟入，执红棍击香亭曰：“先打东方甲乙木。”<br /><br />
　　嘉靖十八年，驾将南幸，有军人孙堂从御路中桥至奉天门下，登金台，坐久，守门官役无知者。升堂大呼，觉而捕之，乃病狂者。<br /><br />

<tr><td class="t50">巡检司</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　巡检司。巡检、副巡检，（俱从九品）主缉捕盗贼，盘诘奸伪。凡在外各府州县关津要害处俱设，俾率徭役弓兵警备不虞。<br /><br />
　　初，洪武二年，以广西地接瑶、僮，始于关隘冲要之处设巡检司，以警奸盗，后遂增置各处。<br /><br />
　　十三年二月，特赐敕谕之，寻改为杂职。<br /><br />

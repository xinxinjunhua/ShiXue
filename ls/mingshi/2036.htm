<tr><td class="t50">丁机宜传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　丁机宜，爪哇属国也，幅员甚狭，仅千余家。柔佛黠而雄，丁机宜与接壤，时被其患。后以厚币求婚，稍获宁处。其国以木为城。酋所居，旁列钟鼓楼，出入乘象。以十月为岁首。性好洁，酋所食啖，皆躬自割烹。<br /><br />
　　民俗类爪哇，物产悉如柔佛。酒禁甚严，有常税。然大家皆不饮，维细民无籍者饮之，其曹偶咸非笑。婚者，男往女家持其门户，故生女胜男。丧用火葬。华人往商，交易甚平。自为柔佛所破，往者亦鲜。<br /><br />
</td></tr>

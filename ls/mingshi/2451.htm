<tr><td class="t50">僧道服色</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　僧道服：洪武十四年定，禅僧，茶褐常服，青绦玉色袈裟。讲僧，玉色常服，绿绦浅红袈裟。教僧，皂常服，黑绦浅红袈裟。僧官如之。惟僧录司官袈裟，绿文及环皆饰以金。道士，常服青法服，朝衣皆赤，道官亦如之。惟道录司官法服、朝服，绿文饰金。凡在京道官，红道衣，金襕，木简。在外道官，红道衣，木简，不用金襕。道士，青道服，木简。<br /><br />

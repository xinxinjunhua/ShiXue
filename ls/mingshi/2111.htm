<tr><td class="t50">八答黑商传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　八答黑商，在俺都淮东北。城周十余里。地广无险阻，山川明秀，人物朴茂。浮屠数区，壮丽如王居。西洋、西域诸贾多贩鬻其地，故民俗富饶。初为哈烈酋沙哈鲁之子所据。<br /><br />
　　永乐六年命内官把太、李达赐其酋敕书彩币，并及哈实哈儿、葛忒郎诸部，谕以往来通商之意，皆即奉命。自是，东西万里行旅无滞。十二年，陈诚使其国。十八年遣使来贡，命诚及内官郭敬赍书币往报。<br /><br />
　　天顺五年，其王马哈麻遣使来贡。明年复贡。命使臣阿卜都剌袭父职，为指挥同知。<br /><br />

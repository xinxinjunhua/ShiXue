<tr><td class="t50">林硕传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　林硕，字懋弘，闽县人。永乐十年进士。授御史，出按山东。<br /><br />
　　宣德初，按浙江。为治严肃，就擢按察使。千户汤某结中官裴可烈为奸利，硕将绳以法。中官诬硕毁诏书，被逮。硕叩头言：“臣前为御史，官七品。今擢按察使，官三品。日夜淬励，思报上恩。小人不便，欲去臣，唯陛下裁察。”帝动容曰：“朕固未之信，召汝面讯耳。”立释硕，复其官，敕责可烈。硕在浙久，人怀其惠。<br /><br />
　　正统三年误引赦例出人死，佥事耿定劾之。逮讯，输赎还职。其冬迁广东布政使，未及任而卒。其后宁波知府郑珞劾可烈不法，可烈竟罢去。<br /><br />

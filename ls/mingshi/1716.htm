<tr><td class="t50">徐允让传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　徐允让，浙江山阴人。元末，贼起，奉父安走避山谷间。遇贼，欲斫安颈。允让大呼曰：“宁杀我，勿杀我父！”贼遂舍安杀允让。将辱其妻潘，潘绐曰：“吾夫已死，从汝必矣。若能焚吾夫，则无憾也。”贼许之，潘聚薪焚夫，投烈焰中死。贼惊叹去，安获全。洪武十六年，夫妇并旌。<br /><br />
　　同时石永寿者，新昌人。负老父避贼，贼执其父将杀之，号泣请代，贼杀永寿而去。<br /><br />

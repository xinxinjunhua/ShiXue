<tr><td class="t50">黄玺传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　黄玺，字廷玺，余姚人。兄伯震，商十年不归。玺出求之，经行万里，不得踪迹。最后至衡州，祷南岳庙，梦神人授以“缠绵盗贼际，狼狈江汉行”二句。一书生告之曰：“此杜甫《舂陵行》诗也，舂陵今道州，曷往寻之。”玺从其言，既至，无所过。<br /><br />
　　一日入厕，置伞道旁。伯震适过之曰：“此吾乡之伞也。”循其柄而观，见有“余姚黄廷玺记”六字。方疑骇，玺出问讯，则其兄也，遂奉以归。<br /><br />
</td></tr>

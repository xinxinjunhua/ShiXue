<tr><td class="t50">石阡</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　石阡，本思州地。永乐十一年置府，隶贵州，领长官司四：曰石阡，曰苗民，曰葛彰葛商，曰龙泉坪。<br /><br />
　　宣德六年，葛彰葛商长官安民奏：“前以官钞籴粮储备，令蛮民守视。溪洞险僻，无所支用，恐岁外腐烂，赔纳实难，请以充有司祭祀过使廪给之用。”纵之。万历中，改龙泉坪为县。<br /><br />

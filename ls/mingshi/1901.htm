<tr><td class="t50">四川土司传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　四川土司诸境，多有去蜀远，去滇、黔近者。如乌蒙、东川近于滇，乌撒、镇雄、播州近于黔。<br /><br />
　　明太祖略定边方，首平蜀夏，置四川布政司，使招谕诸蛮，次第归附。故乌蒙、乌撒、东川、芒部旧属云南者，皆隶于四川，不过岁输贡赋，示以羁縻。然夷性犷悍，嗜利好杀，争相竞尚，焚烧劫掠，习以为恒。去省窎远，莫能控制，附近边民，咸被其毒。皆由规模草创，未尝设立文武为之钤辖，听其自相雄长。虽受天朝爵号，实自王其地。以故终明之世，常烦挞伐。唯建昌、松、茂等处设立卫所，播州改遵义、平越二府以后，稍安戢云。<br /><br />

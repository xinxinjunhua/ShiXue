<tr><td class="t50">选举志序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　选举之法，大略有四：曰学校，曰科目，曰荐举，曰铨选。学校以教育之，科目以登进之，荐举以旁招之，铨选以布列之，天下人才尽于是矣。明制，科目为盛，卿相皆由此出，学校则储才以应科目者也。其径由学校通籍者，亦科目之亚也，外此则杂流矣。然进士、举贡、杂流三途并用，虽有畸重，无偏废也。<br /><br />
　　荐举盛于国初，后因专用科目而罢。铨选则入官之始，舍此蔑由焉。是四者厘然具载其本末，而二百七十年间取士得失之故可睹已。<br /><br />

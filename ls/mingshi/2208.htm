<tr><td class="t50">雨毛、地生毛</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　洪武十九年九月丙子，天雨絮。<br /><br />
　　宣德元年七月甲午，地生毛，长尺余。<br /><br />
　　正统八年，浙江地生白毛。<br /><br />
　　成化十三年四月，甘肃地裂，生白毛。十五年五月，常州地生白毛。十七年四月，南京地生白毛。<br /><br />
　　弘治元年五月丙寅，泸州长宁县雨毛。<br /><br />
　　正德十二年四月，金华地生黑白毛，长尺余。<br /><br />

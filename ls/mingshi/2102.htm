<tr><td class="t50">达失干传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　达失干，西去撒马儿罕七百余里。城居平原，周二里。外多园林，饶果木。土宜五谷。民居稠密。李达、陈诚、李贵之使，与沙鹿海牙同。<br /><br />

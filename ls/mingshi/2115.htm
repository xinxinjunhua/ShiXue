<tr><td class="t50">哈实哈儿传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　哈实哈儿，亦西域小部落。永乐六年，把太、李达等赍敕往赐，即奉命。十一年遣使随白阿儿忻台入朝，贡方物。宣德时亦来朝贡。天顺七年命指挥刘福、普贤使其地。其贡使亦不能常至。<br /><br />

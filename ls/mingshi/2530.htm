<tr><td class="t50">公侯伯</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　公、侯、伯，凡三等，以封功臣及外戚，皆有流有世。功臣则给铁券，封号四等：佐太祖定天下者，曰开国辅运推诚；从成祖起兵，曰奉天靖难推诚；余曰奉天翊运推诚，曰奉天翊卫推诚。武臣曰宣力武臣，文臣曰守正文臣。岁禄以功为差。已封而又有功，仍爵或进爵，增禄。其才而贤者，充京营总督，五军都督府掌佥书，南京守备，或出充镇守总兵官，否则食禄奉朝请而已。年幼而嗣爵者，咸入国子监读书。嘉靖八年，定外戚封爵毋许世袭，其有世袭一二代者，出特恩。<br /><br />
</td></tr>

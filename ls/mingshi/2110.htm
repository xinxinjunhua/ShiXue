<tr><td class="t50">俺都淮传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　俺都淮，在哈烈西北千三百里，东南去撒马儿罕亦如之。城居大村，周十余里。地平衍无险，田土膏腴，民物繁庶，称乐土。自永乐八年至十四年偕哈烈通贡，后不复至。<br /><br />

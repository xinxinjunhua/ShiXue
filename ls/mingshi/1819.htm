<tr><td class="t50">张国纪传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张国纪，祥符人，熹宗张皇后父也。<br /><br />
　　天启初，封太康伯。魏忠贤与客氏忌皇后，因谋陷国纪，使其党刘志选、梁梦环先后劾国纪谋占宫婢韦氏，矫中宫旨鬻狱。忠贤将从中究其事，以撼后。<br /><br />
　　大学士李国&#145076;曰：“君后，犹父母也，安有劝父构母者？”国纪始放归故郡，忠贤犹欲掎之，庄烈帝立，乃得免。崇祯末，以输饷进爵为侯，旋死于贼。<br /><br />
</td></tr>

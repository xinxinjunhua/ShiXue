<tr><td class="t50">叶琛传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　叶琛，字景渊，丽水人。博学有才藻。元末从石抹宜孙守处州，为画策，捕诛山寇，授行省元帅。王师下处州，琛避走建宁。以荐征至应天，授营田司佥事。寻迁洪都知府，佐邓愈镇守。祝宗、康泰叛，愈脱走，琛被执，不屈，大骂，死之。<br /><br />
　　追封南阳郡侯，塑像耿再成祠，后祀功臣庙。<br /><br />

<tr><td class="t50">李濂传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李濂，字川父，祥符人。<br /><br />
　　举正德八年乡试第一，明年成进士。授沔阳知州，稍迁宁波同知，擢山西佥事。嘉靖五年以大计免归，年才三十有八。濂少负俊才，时从侠少年联骑出城，搏兽射雉，酒酣悲歌，慨然慕信陵君、侯生之为人。一日作《理情赋》，友人左国玑持以示李梦阳，梦阳大嗟赏，访之吹台，濂自此声驰河、雒间。既罢归，益肆力于学，遂以古文名于时。初受知梦阳，后不屑附和。<br /><br />
　　里居四十余年，著述甚富。<br /><br />
</td></tr>

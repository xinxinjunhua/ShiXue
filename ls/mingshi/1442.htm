<tr><td class="t50">陈钢传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　陈钢，字坚远，应天人。举成化元年乡试，授黔阳知县。楚俗，居丧好击彭歌舞。钢教以歌古哀词，民俗渐变。县城当沅、湘合流，数决，坏庐舍。钢募人采石甃堤千余丈，水不为害。南山崖官道数里，径窄甚，行者多堕崖死。钢积薪烧山，沃以醯，拓径丈许，行者便之。钢病，民争吁神，愿减已算益钢寿。迁长沙通判，监修吉王府第。工成，王赐之金帛，不受。请王故殿材修岳麓书院，王许之。<br /><br />
　　弘治元年丁母忧归。卒，黔阳、长沙并祠祀之。子沂，官侍讲，见《文苑传》。<br /><br />

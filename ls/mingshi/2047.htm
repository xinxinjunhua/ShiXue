<tr><td class="t50">木骨都束传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　木骨都束，自小葛兰舟行二十昼夜可至。<br /><br />
　　永乐十四年遣使与不剌哇、麻林诸国奉表朝贡，命郑和赍敕及币偕其使者往报之。后再入贡，复命和偕行，赐王及妃彩币。<br /><br />
　　二十一年，贡使又至。比还，其王及妃更有赐。宣德五年，和复颁诏其国。<br /><br />
　　国滨海，山连地旷，硗瘠少收。岁常旱，或数年不雨。俗顽嚚，时操兵习射。地不产木。亦如忽鲁谟斯，垒石为屋，及用鱼腊以饲牛羊马驼云。<br /><br />

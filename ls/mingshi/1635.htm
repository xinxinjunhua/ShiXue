<tr><td class="t50">方国儒传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　方国儒，字道醇，歙县人。四岁失父，奉母以孝闻。天启元年举于乡。<br /><br />
　　崇祯间，授保康知县。流贼大入湖广，将吏率望风先奔。保康小邑素无兵，七年正月贼至，国儒急率乡兵出御，力不支，城遂陷。亡何，贼退，国儒还入城。逾月复至，督吏民固拒。贼至益众，复陷。国儒官服坐堂上，被执大骂，身中七刃死。<br /><br />
　　贼陷竹谿，训导王绍正死之。谷城举人常存畏会试赴京，道遇贼，欲劫为首领，骂不绝口死。他贼犯兴山，知县刘定国坚守。城将陷，遣吏怀印送上官，骂贼死。<br /><br />

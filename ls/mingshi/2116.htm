<tr><td class="t50">亦思弗罕传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　亦思弗罕，地近俺的干。<br /><br />
　　永乐十四年使俺都淮、撒马儿罕者道经其地，赐其酋文绮诸物。十七年偕邻国失剌思共贡狮、豹、西马，赉白金、钞币。使臣辞还，命鲁安等送之。有马哈木者，愿留京师。从其请。成化十九年与撒马儿罕共贡狮子、名马、番刀、兜罗、锁幅诸物，赐赉有加。<br /><br />
　　先是，宣德六年，有亦思把罕遣使臣迷儿阿力朝贡，或云即亦思弗罕。<br /><br />

<tr><td class="t50">小葛兰传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　小葛兰，其国与柯枝接境。自锡兰山西北行六昼夜可达。东大山，西大海，南北地窄，西洋小国也。永乐五年遣使附古里、苏门答剌入贡，赐其王锦绮、纱罗、鞍马诸物，其使者亦有赐。<br /><br />
　　王及群下皆琐里人，奉释教。重牛及他婚丧诸礼，多与锡兰同。俗淳。土薄，收获少，仰给榜葛剌。郑和尝使其国。厥贡惟珍珠伞、白棉布、胡椒。<br /><br />
　　又有大葛兰者，波涛湍悍，舟不可泊，故商人罕至。土黑坟，本宜谷麦，民懒事耕作，岁赖乌爹之米以足食。风俗、物产，多类小葛兰。<br /><br />

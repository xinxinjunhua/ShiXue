<tr><td class="t50">朱梦炎传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　朱梦炎，字仲雅，进贤人。元进士，为金谿丞。太祖召居宾馆，命与熊鼎集古事，为质直语，教公卿子弟，名曰《公子书》。<br /><br />
　　洪武十一年，自礼部侍郎进尚书。帝方稽古右文，梦炎援古证今，剖析源流，如指诸掌，文章详雅有根据。帝甚重之。卒于官。<br /><br />

<tr><td class="t50">汪睿传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　汪睿，字仲鲁，婺源人。元末与弟同集众保乡邑，助复饶州。授浮梁州同知，不就。胡大海克休宁，睿兄弟来附，设星源翼分院于婺源，以同为院判。睿归田里。<br /><br />
　　庚子秋，同将兵争鄱阳，不克，弃妻孥，亡之浙西。幕府疑之，檄睿入应天为质。已，闻同为张士诚所杀，乃授睿安庆税令。未几，征参赞川蜀军事。以疾辞去。<br /><br />
　　洪武十七年，复召见，命讲《西伯戡黎篇》，授左春坊左司直。常命续《薰风》自南来诗及他应制，皆称旨。请春夏停决死罪，体天地生物之仁，从之。逾年，疾作，请假归。睿敦实闲静，不妄言笑，及进讲，遇事辄言。帝尝以“善人”呼之。<br /><br />

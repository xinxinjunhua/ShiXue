<tr><td class="t50">火</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　《洪范》曰：“火曰炎上。”火不炎上，则失其性矣。<br /><br />
　　前史多以恒燠、草异、火、木、羽虫之孽、羊祸、火灾、火异、赤眚赤祥皆属之火，今从之。<br /><br />

<tr><td class="t50">孟希文传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　孟希文，字士焕，亚圣五十六代孙也。洪武元年诏以孟子五十四代孙思谅奉祀，世复其家。思谅，字友道，子克仁，字信夫。克仁子希文。景泰三年授希文翰林院《五经》博士，子孙世袭。<br /><br />
　　卒，子元，字长伯，弘治二年袭。<br /><br />
　　卒，子公棨幼，嘉靖二年以元弟亨之子公肇袭。公肇，字先文，少好学，事继母孔氏，以孝闻。<br /><br />
　　卒，十二年，仍以公棨袭。公棨，字橐文。<br /><br />
　　卒，子彦璞，字朝玺，隆庆元年袭。<br /><br />
　　卒，子承光，万历二十九年袭。<br /><br />
　　卒，子弘誉，天启三年袭。<br /><br />
　　卒，子闻玉，崇祯二年袭。<br /><br />

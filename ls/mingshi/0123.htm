<tr><td class="t50">张铨传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张铨，定远人。从取太平，定集庆、镇江、常州、婺州。捣江州，战鄱阳湖，取鄂渚。收淮东，平吴。累功为指挥佥事。从取中原、燕、晋、秦、蜀，进都督佥事。使建齐王府，事竣，副江夏侯周德兴征五溪蛮。已而水尽源、通塔平、散毛诸洞酋作乱，复副德兴讨平之。<br /><br />
　　从征云南，由永宁克乌撒。久之，复从傅友德平乌撒及曲靖、普定、龙海、孟定诸蛮。<br /><br />
　　洪武二十三年封永定侯，食禄千五百石，世指挥使。<br /><br />
</td></tr>

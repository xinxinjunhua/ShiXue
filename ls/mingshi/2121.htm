<tr><td class="t50">纳失者罕传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　纳失者罕，东去失剌思数日程，皆舟行。城东平原，饶水草，宜畜牧。马有数种，最小者高不过三尺。俗重僧，所至必供饮食。然好气健斗，斗不胜者，众嗤之。永乐中遣使朝贡。使臣还，历河北，转关中，抵甘肃，有司皆置宴。<br /><br />
</td></tr>

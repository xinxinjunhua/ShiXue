<tr><td class="t50">杨忠传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　杨忠，宁夏人。世官中卫指挥，以功进都指挥佥事，廉介有谋勇。<br /><br />
　　正德五年，安化王寘鐇反，其党丁广将杀巡抚安惟学，忠在侧，骂曰：“贼狗敢犯上邪！”广怒，杀之，迄死骂益厉。忠同官李睿闻变，驰至寘鐇所。门闭不得入，大骂，为贼所杀。百户张钦不从逆，走至雷福堡，亦被杀。皆赠官予荫，表忠、睿曰忠烈之门，钦曰忠节之门。<br /><br />
</td></tr>

<tr><td class="t50">草异</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　永乐十六年正月乙丑，同州、澄城、觔阳、朝邑雨谷及荞麦。正统八年十一月，殿上生荆棘，高二尺。十四年，广州狱竹床逾年忽青生叶。<br /><br />
　　成化六年二月戊寅，湖广应山雨粟。弘治八年二月，枯竹开花，实如麦米。苦荬开莲花。六月甲子，黟县雨豆，味不可食。九年，黄州民家瓜大如斗，瓤皆赤血。万历四十三年四月戊寅，石首雨豆，大小不一，色杂红黑。崇祯四年、五年，河南草生人马形，如被甲持矛驰驱战斗者然。十三年，徐州田中白豆，多作人面，眉目宛然。<br /><br />

<tr><td class="t50">王信传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王信，陕西宁州人。父殁，庐墓三年。母殁，信年已六十，足不逾阈者三年。<br /><br />
　　崇祯初，由岁贡生除灵璧训导，迁真阳知县。<br /><br />
　　八年二月出抚土寇，会流贼猝至，被执，使谕降罗山、真阳。信大骂不从，断头剖腹而死。阅四日，其子来觅，犹舒指握子手。赠光禄丞，建祠奉祀。<br /><br />
</td></tr>

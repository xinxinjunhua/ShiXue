<tr><td class="t50">边贡传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　边贡，字廷实，历城人。祖宁，应天治中。父节，代州知州。贡年二十举于乡，第弘治九年进士。除太常博士，擢兵科给事中。孝宗崩，疏劾中官张瑜，太医刘文泰、高廷和用药之谬，又劾中官苗逵、保国公朱晖、都御史史琳用兵之失。改太常丞，迁卫辉知府，改荆州，并能其官。历陕西、河南提学副使，以母忧家居。<br /><br />
　　嘉靖改元，用荐，起南京太常少卿，三迁太常卿，督四夷馆，擢刑部右侍郎，拜户部尚书，并在南京。贡早负才名，美风姿，所交悉海内名士。久官留都，优闲无事，游览江山，挥毫浮白，夜以继日。都御史劾其纵酒废职，遂罢归。<br /><br />
</td></tr>

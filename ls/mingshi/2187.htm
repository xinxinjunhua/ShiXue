<tr><td class="t50">服妖</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　正德元年，妇女多用珠结盖头，谓之璎珞。十三年正月，车驾还京，令朝臣用曳撒大帽鸾带。给事中朱鸣阳言，曳撒大帽，行役所用，非见君服。皆近服妖也。十五年十二月，帝平宸濠还京，俘从逆者及悬诸逆首于竿，皆标以白帜，数里皆白。时帝已不豫，见者识其不祥。<br /><br />
　　崇祯时，朝臣好以纱縠、竹箨为带，取其便易。论者谓金银重而贵，纱箨贱而轻，殆贱将乘贵也。时北方小民制帻，低侧其檐，自掩眉目，名曰“不认亲”。其后寇乱民散，途遇亲戚，有饮泣不敢言，或掉臂去之者。<br /><br />

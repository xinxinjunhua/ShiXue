<tr><td class="t50">程接道传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　程接道，先贤正公程子后也。宋淳熙间，纯公程子五世孙有居江宁者，尝主金陵书院祀事。卒，以名幼学者承之。明初失传。<br /><br />
　　崇祯三年，河南巡按李日宣请以正公之后为之嗣，诏许之，遂以接道为翰林院《五经》博士，子孙世袭。十四年，土贼于大忠作乱，接道力拒，死之。<br /><br />
</td></tr>

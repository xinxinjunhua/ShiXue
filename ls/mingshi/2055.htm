<tr><td class="t50">南巫里传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　南巫里，在西南海中。<br /><br />
　　永乐三年遣使赍玺书、彩币抚谕其国。<br /><br />
　　六年，郑和复往使。九年，其王遣使贡方物，与急兰丹、加异勒诸国偕来。赐其王金织文绮、金绣龙衣、销金帏幔及伞盖诸物，命礼官宴赐遣之。<br /><br />
　　十四年再贡。命郑和与其使偕行，后不复至。<br /><br />

<tr><td class="t50">皇太孙监国</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　永乐八年，帝自北京北征。时皇太子已监国于南，乃命皇长孙居北京监国。时宣宗未冠，及冠始加称皇太孙云。<br /><br />
　　其制，每日皇长孙于奉天门左视事，侍卫如常仪。诸司有事，具启施行。若军机及王府要务，一启皇太子处分，一奏闻行在所。圣节，设香案于奉天殿，行礼如常仪。天下诸司表文俱诣北京。四夷朝贡俱送南京，武选及官民有犯，大者启皇太子，小者皇长孙行之。皇亲有犯，启皇太子所。犯情重及谋逆者，即时拘执，命皇亲会问。不服，乃命公、侯、伯、五府、六部、都察院、大理寺会皇亲再问，启皇太子，候车驾回京，奏请处分。<br /><br />

<tr><td class="t50">灵星诸神</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　洪武元年，太常司奏：“《周礼》‘以槱燎祀司中、司命、风师、雨师’。《天府》‘若祭天则祀司民、司禄，而献民数、谷数，受而藏之。’汉高帝命郡国立灵星祠。唐制，立秋后辰日祀灵星，立冬后亥日遣官祀司中、司命、司民、司禄，以少牢。宋祀如唐，而于秋分日祀寿星。今拟如唐制，分日而祀，为坛于城南。”从之。<br /><br />
　　二年，从礼部尚书崔亮奏，每岁圣寿日祭寿星，同日祭司中、司命、司民、司禄，示与民同受其福也。八月望日祀灵星。皆遣官行礼。<br /><br />
　　三年，罢寿星等祀。<br /><br />

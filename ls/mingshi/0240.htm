<tr><td class="t50">暴昭侯泰传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　暴昭，潞州人。<br /><br />
　　洪武中，由国子生授大理寺司务。三十年，擢刑部右侍郎。明年进尚书。耿介有峻节，布衣麻履，以清俭知名。<br /><br />
　　建文初，充北平采访使，得燕不法状，密以闻，请预为备。燕兵起，设平燕布政司于真定，昭以尚书掌司事，与铁铉辈悉心经画。平安诸军败，召归。金川门陷，出亡，被执。不屈，磔死。<br /><br />
　　＊＊＊<br /><br />
　　继昭为刑部尚书者侯泰，字顺怀，南和人。以荐举起家。建文初，仕至尚书。燕王举兵，力主抗御之策。尝督饷于济宁、淮安。京师不守，行至高邮，被执下狱，与弟敬祖，子玘，俱被杀。<br /><br />

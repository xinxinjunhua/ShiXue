<tr><td class="t50">陈思贤传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　陈思贤，茂名人。<br /><br />
　　洪武末，为漳州教授，以忠孝大义勖诸生。每部使者涖漳，参谒时必请曰：“圣躬安否？”燕王登极诏至，恸哭曰：“明伦之义，正在今日。”坚卧不迎诏。率其徒吴性原、陈应宗、林珏、邹君默、曾廷瑞、吕贤六人，即明伦堂为旧君位，哭临如礼。有司执之送京师，思贤及六生皆死。六生皆龙溪人。<br /><br />
　　嘉靖中，提学副使邵锐立祠祀思贤，以六生侑食。<br /><br />
　　又台州有樵夫，日负薪入市，口不贰价。闻燕王即帝位，恸哭投东湖死。而温州乐清亦有樵夫，闻京师陷，其乡人卓侍郎敬死，号恸投于水。二樵皆逸其名。<br /><br />

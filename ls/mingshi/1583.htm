<tr><td class="t50">万琛传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　万琛，字廷献，宣城人。慷慨负气节，举于乡。弘治中，知瑞金县。十八年正月，剧盗大至，县人汹汹逃窜。有劝琛急去者，琛斥之，率民兵数十人迎敌，杀贼二十余人。相持至明日，力屈被执，骂不绝口，贼攒刺之，乃死。赠光禄少卿，赐祭葬，予荫。<br /><br />
　　时有王祐者，为广昌知县，贼至，民尽逃，援兵又不至。祐拔刀自刲其腹曰：“有城不能守，何生为！”左右奔夺其刀。后援兵集，贼稍退。越七日复突至，祐仓皇赴敌，死之。<br /><br />
</td></tr>

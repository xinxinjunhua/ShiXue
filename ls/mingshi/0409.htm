<tr><td class="t50">李纲传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李纲，字廷张，长清人。幼从父入都，坠车下，车轹体过，竟不伤，人咸异之。登天顺元年进士，授御史。历按南畿、浙江。劾去浙江赃吏至四百余人，时目为“铁御史”。奉敕编集陕西延绥土兵。还，迁太仆寺少卿，巡畿辅马政，尽却有司馈。按冀州，遇盗。问隶人曰：“太仆李公耶？是何从得金。”不启箧而去。<br /><br />
　　成化十三年迁右佥都御史。转左，出督漕运，与平江伯陈锐共事。逾年卒。锐见笥中惟敝衣，挥涕曰：“君子也。”为具棺敛，闻其清节于朝。帝特命赐祭葬，不为令。纲清刚似李侃，为时所重。<br /><br />

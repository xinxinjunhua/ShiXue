<tr><td class="t50">王承恩传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王承恩，太监曹化淳名下也，累官司礼秉笔太监。<br /><br />
　　崇祯十七年三月，李自成犯阙，帝命承恩提督京营。是时，事势已去，城陴守卒寥寥，贼架飞梯攻西直、平则、德胜三门。承恩见贼坎墙，急发炮击之，连毙数人，而诸珰泄泄自如。帝召承恩，令亟整内官，备亲征。夜分，内城陷。天将曙，帝崩于寿皇亭，承恩即自缢其下。福王时，谥忠愍。本朝赐地六十亩，建祠立碑旌其忠，附葬故主陵侧。<br /><br />
</td></tr>

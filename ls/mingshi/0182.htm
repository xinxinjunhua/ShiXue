<tr><td class="t50">答禄与权传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　答禄与权，字道夫，蒙古人。仕元为河南北道廉访司佥事。入明，寓河南永宁。<br /><br />
　　洪武六年，用荐授秦府纪善，改御史。请重刊律令。盱眙民进瑞麦，与权请荐宗庙。帝曰：“以瑞麦为朕德所致，朕不敢当。其必归之祖宗。御史言是也。”明年出为广西按察佥事。未行，复为御史。上书请祀三皇。下礼官议，遂并建帝王庙。且遣使者巡视历代诸陵寝。设守陵户二人，三年一祭，其制皆由此始。又请行禘礼，议格不行。改翰林修撰，坐事降典籍，寻进应奉。<br /><br />
　　十一年以年老致仕。禘礼至嘉靖中始定。<br /><br />

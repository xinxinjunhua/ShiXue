<tr><td class="t50">陈万策传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　陈万策，江陵人。天启中，与同邑李开先先后举于乡，并有时名。崇祯十六年正月，李自成据襄阳，设伪官。其吏政府侍郎石首喻上猷，先为御史，降贼，荐两人贤可用。自成遣使具书币征之。万策隐龙湾市，贼使至，叹曰：“我为名误，既不能奋身灭贼，尚可惜顶踵耶？”夜自经。贼使至开先家，开元瞋目大骂，头触墙死。福王时，俱命优恤。<br /><br />
</td></tr>

<tr><td class="jz">

<tr><td>
<br />
　　子类十二：一曰儒家类，二曰杂家类，（前代艺文志列名法诸家，然寥寥无几，备数而已。今总附杂家。）三曰农家类，四曰小说家类，五曰兵书类，六曰天文类，七曰历数类，八曰五行类，九曰艺术类，（医书附。）十曰类书类，十一曰道家类，十二曰释家类。<br /><br />

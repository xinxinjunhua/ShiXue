<tr><td class="t50">史五常传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　史五常，内黄人。父萱，官广东佥事。卒，葬南海和光寺侧。<br /><br />
　　五常方七岁，母携以归。比长，奉母至孝，常恨父不得归葬。母语之曰：“尔父杉木榇内，置大钱十，尔谨志之。”母殁，庐墓致毁，既终丧，往迎父榇。时相去已五十年，寺没于水久矣。五常泣祷，有老人以杖指示寺址。发地，果得父榇，内置钱如母言，乃扶归，与母合葬，复庐墓侧。<br /><br />
　　正统六年旌表。<br /><br />

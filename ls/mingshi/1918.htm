<tr><td class="t50">澄江</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　澄江，唐为南宁、昆二州地。天宝末，没于蛮，号罗伽甸。宋时，大理段氏号罗伽部。元置罗伽万户府。至元中，改澄江路。<br /><br />
　　洪武十五年，云南平，澄江归附，改澄江府。地居滇省之中，山川明秀，蚕衣耕食，民安于业。近郡之罗罗，性虽顽狠，然恭敬上官。官至，争迎到家，刲羊击豕，罄所有以供之，妇女皆出罗拜，故于诸府独号安静云。<br /><br />
</td></tr>

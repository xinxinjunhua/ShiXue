<tr><td>
<br />
　　内外官亲属冠服：<br /><br />
　　洪武元年，礼部尚书崔亮奉诏议定。内外官父、兄、伯、叔、子、孙、弟、侄用乌纱帽，软脚垂带，圆领衣，乌角带。品官祖母及母、与子孙同居亲弟侄妇女礼服，合以本官所居官职品级，通用漆纱珠翠庆云冠，本品衫，霞帔、褙子，缘襈袄裙，惟山松特髻子止许受封诰敕者用之。品官次妻，许用本品珠翠庆云冠、褙子为礼服。销金阔领、长袄长裙为常服。<br /><br />
　　二十五年，令文武官父兄、伯叔、弟侄、子婿，皆许穿靴。<br /><br />

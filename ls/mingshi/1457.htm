<tr><td class="t50">陈谟传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　陈谟，字一德，泰和人。幼能诗文，邃于经学，旁及子史百家，涉流探源，辨析纯驳，犁然要于至当。隐居不求仕，而究心经世之务。尝谓：“学必敦本，莫加于性，莫重于伦，莫先于变化气质。若礼乐、刑政、钱谷、甲兵、度数之详，亦不可不讲习。”一时经生学子多从之游。事亲孝，友于其弟。乡人有为不善者，不敢使闻。<br /><br />
　　洪武初，征诣京师，赐坐议学。学士宋濂、待制王祎请留为国学师，谟引疾辞归。屡应聘为江、浙考试官，著书教授以终。<br /><br />
</td></tr>

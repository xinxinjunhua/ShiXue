<tr><td class="t50">养夷传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　养夷，在赛蓝东三百六十里。城居乱山间。东北有大溪，西流入巨川。行百里，多荒城。盖其地介别失八里、蒙古部落之间，数被侵扰。以故人民散亡，止戍卒数百人居孤城，破庐頺垣，萧然榛莽。<br /><br />
　　永乐时，陈诚至其地。<br /><br />

<tr><td class="t50">皇甫斌传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　皇甫斌，寿州人。先为兴州右屯卫指挥同知，以才调辽海卫。忠勇有智略，遇警，辄身先士卒。<br /><br />
　　宣德五年十月勒兵御寇，至密城东峪，自旦及晡力战，矢尽援绝，子弼以身卫父，俱战死。千户吴贵，百户吴襄、毛观并骁勇，出必冲锋，至是皆死。斌等虽死，杀伤过当，寇亦引退。事闻，诏有司褒恤。<br /><br />
</td></tr>

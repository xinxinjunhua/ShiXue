<tr><td class="t50">杨立传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　杨立者，潞州之小校。初事李嗣昭及李继韬，皆畜养甚厚。继韬被诛，愤愤失志。<br /><br />
　　同光二年四月，有诏以潞兵三万人戍涿州，将发，其众谋曰：“我辈事故使二十年，衣食丰足，未尝边塞征行，苟于边上差跌，白骨何归？不如据城自固，事成则富贵耳。”因聚徒百余辈，攻子城东门，城中大扰。副使李继珂及监军张机祚出奔。立自称留后，率军民上表请旄节。庄宗怒，命明宗与李绍真攻讨，一月拔之，生擒立及其同恶十余人，送于阙下，皆磔于市。潞州城峻而隍深，攻立辄敢据之，庄宗因兹诏诸道撤防城之备焉。<br /><br />

<tr><td class="t50">张继祚传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张继祚，故齐王全义之子也。始为河南府衙内指挥使，全义卒，除金吾将军，旋授蔡州刺史，累官至检校太保。明宗郊天，充供顿使，复除西卫上将军。<br /><br />
　　唐清泰末，丁母忧。<br /><br />
　　天福初，丧制未阕，会张从宾作乱，发兵迫胁，取赴河阳，令知留守事。从宾败，与二子诏戮于市。始继祚与范延光有旧，尝遣人以马遗之。属朝廷起兵，将讨邺城，为巡兵所获，奏之，高祖深忌之。及败，宰臣桑维翰以父珙早事齐王，奏欲雪之，高祖不允，【《通鉴》：史馆修撰李涛上言：张全义有再造洛邑之功，乞免其族。遂止诛继祚妻子。】遂止罪继祚一房，不累其族。<br /><br />

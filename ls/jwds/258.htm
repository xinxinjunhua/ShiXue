<tr><td class="t50">马绍宏传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　马绍宏，阉官也。初与孟知祥同为中门使，及周德威薨，庄宗兼领幽州，令绍宏权知州事。即位之初，郭崇韬勋望高，旧在绍宏之下，时征潞州监军张居翰与崇韬并为枢密使，绍宏失望，乃以为宣徽使。<br /><br />
　　绍宏以己合当枢密任，常郁郁侧目于崇韬。崇韬知其慊也，乃置内勾之目，令天下钱谷薄书，悉委裁遣。既而州郡供报，辄滋烦费，议者以为十羊九牧，深所不可，内勾之目，人以为是妖言。<br /><br />
　　【案：下有阙文。据《通鉴》，李嗣源为谣言所属，危殆者数四，赖宣徽使李绍宏左右营护，以是得全。天成元年二月己丑朔，以宣徽南院使李绍宏为枢密使。】<br /><br />

<tr><td class="t50">翟璋传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　翟璋，未详何许人也。好勇多力，时目为大虫，即“虎痴”之称也。<br /><br />
　　后唐天成初，自邺都马步军都指挥使领平州刺史，寻改复州防御使。三年三月，迁新州威塞军两使留后。四年五月，正授旄节。<br /><br />
　　长兴元年二月，加检校太保，入为右领军卫上将军，转左羽林统军。<br /><br />
　　清泰中，复领新州。<br /><br />
　　高祖建义，割新州属契丹。时契丹大军归国，遣璋于管内配率犒宴之资，须及十万缗，山后地贫，民不堪命。始契丹以软语抚璋，璋谓必得南归，及委璋平叛奚、围云州皆有功，故留之不遣。璋郁郁不得志，遇疾不治，卒。<br /><br />

<tr><td class="t50">李邺传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李邺，魏州人也。幼事杨师厚，及庄宗入魏，渐转裨将，历数郡刺史，后迁亳州。为政贪秽，有奴为人持金以赂邺，奴隐其金，邺杀之。其家上诉，因讦其阴事，诏贬郴州司户参军，又贬崖州长流百姓，所在赐自尽。<br /><br />
　　＊＊＊<br /><br />
　　史臣曰：《易》云：“积不善之家，必有余殃。”又曰：“恶不积不足以灭身。”如毛璋之俦，可谓积恶而灭其身矣，况温韬之发陵寝，段凝之败国家，罪不容诛，死犹差晚。余皆琐琐，何足议焉。<br /><br />
</td></tr>

<tr><td class="t50">孔邈传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　孔邈，文宣王四十一代孙。身长七尺余，神气温厚。登进士第，历校书郎、万年尉，充集贤校理，为谏议大夫，以年老致仕。<br /><br />
　　【案：《孔邈传》，原本残阙。考《册府元龟》云：乾宁五年，登进士第，除校书郎。崔远在中书，奏为万年尉，充集贤校理，以亲舅独孤损方在廊庙，避嫌不赴职。】<br /><br />

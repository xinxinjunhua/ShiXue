<tr><td class="t50">张俊传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张俊，字彦臣。祖、父咸有闻于时。俊少孤，自修饰，善为五言诗，其警句颇为人所称。唐广明中，黄巢犯京师，天子幸蜀，士皆窜伏窟穴，以保其生。俊亦晦迹浮泛，不失其道。及僖宗还京师，由校书郎、西畿尉登朝为御史、补阙、起居郎、司勋员外、万年县令，以事黜官峡中，将十年。<br /><br />
　　太祖即位，用宰臣薛贻矩为盐铁使，俊与贻矩同年登第，甚知其才，即奏为盐铁判官，迁职为礼部郎中，兼职如故。<br /><br />
　　乾化二年二月，扈从后至，与孙骘、张衍同日遇祸于白马顿。<br /><br />

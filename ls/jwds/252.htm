<tr><td class="t50">淳于晏传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　淳于晏，登州人也，以明经登第，自霍彦威为小校，晏寄食于门下。<br /><br />
　　彦威尝因兵败，独脱其身，左右莫有从者，惟晏杖剑从之，徒步草莽，自是彦威高其义，相得甚欢。及历数镇，皆为从事，军府之事，至于私门，事无巨细，皆取决于晏；虽为幕宾，有若家宰。<br /><br />
　　尔后公侯门客，往往效之，时谓之“效淳”。故彦威所至称治，由晏之力也。<br /><br />

<tr><td class="t50">沈遘传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　沈遘，字期远，睢阳人也。父振，贝州永济令，累赠左谏议大夫。遘幼孤，以苦学为志，弱冠登进士第，释褐除校书郎，由御史台主簿拜监察御史，凡五迁至金部郎中，充三司判官。<br /><br />
　　广顺中，以本官知制诰。世宗嗣位，擢为翰林院学士，岁满，拜中书舍人充职。<br /><br />
　　显德三年夏，扈从南征，遇疾归，及京而卒。遘为人谦和，勤于接下，每文士投贽，必择其贤者而誉之，故当时后进之士多归焉。<br /><br />
</td></tr>

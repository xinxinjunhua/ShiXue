<tr><td class="t50">胡真传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　胡真，江陵人也。体貌洪壮，长七尺，善骑射，少为县吏。及在巢寇中，寇推为名将，随巢涉淮、浙，陷许、洛，入长安。及太祖以众归唐，真时为元从都将，【《通鉴》云：温见巢兵势日蹙，知其将亡，亲将胡真、谢瞳劝温归国。】从至梁苑，表授检校刑部尚书，频从破巢、蔡于陈、郑间。寻以奇兵袭取滑州，乃署为滑州节度留后，复表为郑滑节度使、检校右仆射。<br /><br />
　　数年，征为右金吾卫大将军，俄拜宁远军节度使、容州刺史、检校太保。卒赠太傅。<br /><br />
</td></tr>

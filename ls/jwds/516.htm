<tr><td class="t50">孙汉英传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　孙汉英，太原人也。父重进，事唐武皇、庄宗为大将，赐姓，名存进，《唐书》有传。汉英少事戎伍，稍至都将，尝为东面马步军都指挥使。<br /><br />
　　清泰初，兴元节度使张虔钊失军于岐下，遂以其地西臣于蜀，汉英兄汉韶，时为洋州节度使，因兹阻隔，亦送款于蜀，由是汉英与弟汉筠久之不调。<br /><br />
　　汉乾祐中，太祖西征蒲、雍，以汉英戚里之分，奏于军中指使。蒲、雍平，班师，隐帝以汉英为绛州刺史、检校司徒。<br /><br />
　　广顺元年冬，卒于都。<br /><br />

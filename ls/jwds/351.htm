<tr><td class="t50">李遐传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李遐，兖州人也。少为儒，有节操。历数镇从事，及升朝，累迁尚书库部员外郎。<br /><br />
　　高祖即位，以皇子重乂保釐洛邑，知遐强干有守，除为西京留守判官，使之佐理，复重其廉勤，兼委监西京左藏库。会张从宾作乱，使人辇取缯帛以赏群逆，遐曰：“不奉诏书，安敢承命！”遂为其下所害。<br /><br />
　　高祖闻而叹惜，赙赠加等，仍赠右谏议大夫。<br /><br />
　　其母田氏，封京兆郡太君，仍给遐所食月俸，终母余年。<br /><br />
　　其子俟服阕与官。后又遣兖州节度使李从温就其旧业，赐牲币绵帛等物，以旌其忠也。<br /><br />

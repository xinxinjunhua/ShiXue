<tr><td class="t50">李彦頵传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李彦頵，字德循，太原人也。本以商贾为业，太祖镇邺，置之左右，及即位，历绫锦副使、搉易使。<br /><br />
　　世宗嗣位，以彦頵有旧，超授内客省使。未几，知相州军府事，寻改延州兵马留后。到镇，颇以殖货为意，窥图剩利，侵渔蕃汉部人，群情大扰。会世宗南征，蕃部结聚，围迫州城，彦頵闭壁自守，求援于邻道，赖救兵至，乃解。世宗不悦，征赴京师，然犹委曲庇护，竟不之责。寻为西京水南巡检使，居无何，命权知泗州军州事，改沧州两使留后。彦頵到任，处置乖方，大为物情所鄙。<br /><br />
　　显德六年秋，受代归阙，遇疾而卒，时年五十有二。<br /><br />

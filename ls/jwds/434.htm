<tr><td class="t50">后赞传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　后赞，为飞龙使。赞母本倡家也，与父同郡，往来其家，生赞。从职四方，父未尝离郡，赞既长，疑其所生。及为内职，不欲父之来，寓书以致其意。父自郡至京师，直抵其第，赞不得已而奉之。<br /><br />
　　乾祐末，宰相杨祐、侍卫亲军使史宏肇执权，赞以久次未迁，颇怀怨望，乃与枢密承旨聂文进等构变。及难作，赞与同党更侍帝侧，剖判戎事，且防间言。<br /><br />
　　北郊兵败，赞窜归兖州，慕容彦超执之以献，有司鞫赞伏罪，周太祖命诛之。<br /><br />
</td></tr>

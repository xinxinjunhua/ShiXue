<tr><td class="t50">张瓘传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张瓘，同州车渡村人，故太原监军使承业之犹子也。承业，《唐书》有传。唐天祐中，承业佐唐武皇、庄宗有功，甚见委遇，瓘闻之，与昆仲五人，自故里奔于太原，庄宗皆任用之。<br /><br />
　　瓘天祐十三年补麟州刺史。承业治家严毅，小过无所容恕，一侄为磁州副使，以其杀河西卖羊客，承业立捕斩之。常诫瓘等曰：“汝车渡村百姓刘开道下贼，惯作非为，今须改行，若故态不除，死无日矣。”故瓘所至不敢诛求。<br /><br />
　　晋天福中，为密州刺史，秩满入居环卫。<br /><br />
　　乾祐三年夏，卒于官，辍视朝一日。<br /><br />

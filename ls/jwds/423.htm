<tr><td class="t50">李彦从传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李彦从，字士元，汾州孝义人。父德，麟州司马。彦从少习武艺，出行伍间，高祖典禁军，以乡里之旧，任为亲信。国初，用为左飞龙使、检校司空。镇州逐敌之际，请兵于朝廷，高祖令彦从率军赴之。<br /><br />
　　乾祐初，领恩州刺史。赵晖讨王景崇于岐下，彦从为兵马都监，破川军有功，贼平，授濮州刺史，治有政能，百姓悦之。<br /><br />
　　乾祐三年冬，卒于郡。<br /><br />

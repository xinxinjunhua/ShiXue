<tr><td class="t50">裴羽传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　裴羽，字用化，唐僖宗时宰相贽之子也。羽少以父任为河南寿安尉。入梁，迁御史台主簿，改监察御史。唐明宗时，为吏部郎中，使于闽，遇飓风，飘至钱塘。时安重诲用事，削夺吴越王封爵，羽被留于钱塘，经岁不得归，后重诲死，吴越复通中国，羽始得还。<br /><br />
　　晋初，累迁礼部侍郎、太常卿。<br /><br />
　　广顺初，为左散骑常侍，卒。赠工部尚书。羽之使闽也，正使陆崇卒于吴越，羽载其丧还，归其橐装，时人义之。<br /><br />
</td></tr>

<tr><td class="t50">李承勋传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李承勋者，与广同为牙将，善于奉使，名闻军中。承勋累迁至太原少尹。刘守光之僣号也，庄宗遣承勋往使，问其衅端。承勋至幽州，见守光，如藩方聘问之礼。谒者曰：“燕王为帝矣，可行朝礼。”承勋曰：“吾大国使人，太原亚尹，是唐帝除授，燕主自可臣其部人，安可臣我哉！”守光闻之不悦，拘留于狱，数日而出，诘之曰：“臣我乎？”承勋曰：“燕君能臣我王，则我臣之；吾有死而已，安敢辱命！”会王师讨守光，承勋竟殁于燕。<br /><br />

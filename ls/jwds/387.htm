<tr><td class="t50">孟承诲传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　孟承诲，大名人也。始为本府牙校，遇高祖临其地，升为客将。后奏为宗城令，秩满，以百姓举留，为常山藁城令，皆有善政。<br /><br />
　　高祖有天下，擢为阁门副使，累迁宣徽使，官至检校司空、太府卿、右武卫大将军。及少帝嗣位，以植性纤巧，善于希旨，复与权臣宦官密相表里，凡朝廷恩泽美使，必承诲为之，一岁之中，数四不已。由是居第华敞，财帛积累。<br /><br />
　　及契丹入汴，张彦泽引兵逼宫城，少帝召承诲计之，承诲匿身不赴。<br /><br />
　　少帝既出宫，寓于开封府舍，具以承诲背恩之事告彦泽，令捕而杀之，其妻女并配部族。<br /><br />
　　汉高祖即位，诏赠太保。<br /><br />

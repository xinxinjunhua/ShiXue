<tr><td class="t50">李谠传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李谠，河中临晋人。少时游秦、雍间，为人勇悍多力，甚有气谊。<br /><br />
　　唐广明初，黄巢陷长安，谠遂得仕于其间。巢以谠为内枢密使，盖谠曾委质于宦者，出入于宫禁间，巢以此用焉。其后巢军既败，谠乃束身归于太祖，署为左德胜骑军都将。<br /><br />
　　从太祖讨蔡贼，颇立军功。及东伐兖、郓，以所部士伍俘获甚众，改元从骑将，表授检校右仆射。郴王友裕领兵攻泽州，时太祖驻大军于盟津，乃令谠将兵越太行，授以筹谋。谠颇违节度，久而无功。太祖遣追还，廷责其罪，戮之于河桥。<br /><br />

<tr><td class="t50">刘晞传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘晞者，涿州人也。父济雍，累为本郡诸邑令长。晞少以儒学称于乡里，尝为唐将周德威从事，后陷于契丹，契丹以汉职縻之。<br /><br />
　　天福中，契丹命晞为燕京留守，尝于契丹三知贡举，历官至同平章事、兼侍中。随契丹入汴，授洛京留守。会河阳军乱，晞走许州，又奔东京，萧翰遣兵援晞至洛下。契丹主死，晞自洛复至东京，随萧翰北归，遂留镇州。<br /><br />
　　汉初，与满达勒同奔定州，后卒于北蕃。<br /><br />
　　【《契丹国志》：刘珂，晞之子也，尚世宗妹燕国公主。】<br /><br />

<tr><td class="t50">张文宝传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张文宝，昭宗朝谏议大夫顗之子也。<br /><br />
　　文宝初，依河中朱友谦为从事。庄宗即位于魏州，以文宝知制诰，历中书舍人、刑部侍郎、左散骑常侍、知贡举，迁吏部侍郎。文宝性雅淡稽古。<br /><br />
　　长兴初，奉使浙中，泛海船坏，水工以小舟救，文宝与副使吏部郎中张绚信风至淮南界，伪吴杨溥礼待甚至，兼厚遗钱币、食物。文宝受其食物，反其钱币，吴人善之，送文宝等复至杭州宣国命，还青州，卒。<br /><br />
　　子吉，嗣位邑宰。<br /><br />

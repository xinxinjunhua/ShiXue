<tr><td class="t50">赵熙传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　赵熙，字绩巨，唐宰相齐国公光逢之犹子也。起家授秘书省校书郎，唐天成中，累迁至起居郎。数上章言事，以称旨寻除南省正郎。<br /><br />
　　天福中，承诏与张昭远等修《唐史》，竟集其功。<br /><br />
　　开运中，自兵部郎中授右谏议大夫，赏笔削之功也。及契丹入汴，遣使于晋州率配豪民钱币，以实行橐。始受命之日，条制甚严，熙出于衣冠之族，性素轻急，既畏契丹峻法，乃穷力搜索，人甚苦之。及晋之三军杀副使骆从朗，【《通鉴》：契丹以节度副使骆从朗知晋州事，大将药可俦杀从朗。】百姓相率持仗害熙于馆舍，识者伤之。<br /><br />

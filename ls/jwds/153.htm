<tr><td class="t50">史敬镕传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　史敬镕，太原人。事武皇为帐中纲纪，甚亲任之。庄宗初嗣晋王位，李克宁阴构异图，将害庄宗，事发有日矣，克宁密引敬镕，以邪谋谕之。既而敬镕白，贞简太后惶骇，召张承业、李存璋等图之。克宁等伏诛，以功累历郡。<br /><br />
　　同光初，为华州节度使，移镇安州。<br /><br />
　　天成中，入为金吾上将军。期年，复授邓州，至镇数月卒。赠太尉。<br /><br />

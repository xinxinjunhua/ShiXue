<tr><td class="t50">孙璋传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　孙璋，齐州历城人。出身行间，隶梁将杨师厚麾下，稍补奉化军使。庄宗入邺，累迁澶州都指挥使。明宗镇常山，擢为裨校。邺兵之变，从明宗赴难京师。<br /><br />
　　天成初，历赵、登二州刺史，齐州防御使。王都之据中山，璋为定州行营都虞候，贼平，加检校太保。长兴初，授鄜州节度使，罢镇，卒于洛阳，年六十一。赠太尉。<br /><br />
　　＊＊＊<br /><br />
　　史臣曰：夫天地斯晦，则帝王于是龙飞；云雷构屯，则王侯以之蝉蜕。良以适遭乱世，得奋雄图，故金全而下，咸以军旅之功，坐登藩阃之位，垂名简册，亦可贵焉。惟重霸以奸险而仗旄钺，盖非数子之俦也。<br /><br />

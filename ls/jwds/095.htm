<tr><td class="t50">张衍传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张衍，字元用，河南尹魏王宗奭之犹子也。其父死于兵间。衍乐读书为儒，始以经学就举，不中选。时谏议大夫郑徽退居洛阳，以女妻之，遂令应辞科，不数上登第。<br /><br />
　　唐昭宗东迁，以宗奭勋力隆峻，衍由校书郎拜左拾遗，旋召为翰林学士。<br /><br />
　　太祖即位，罢之，特拜考功郎中，俄迁右谏议大夫。衍巧生业，乐积聚。太祖将北伐，颇以扈从间糜耗力用系意，屡干托宰执求免是行；太祖微闻之，又属应召稽晚，与孙骘等同日遇祸。<br /><br />
</td></tr>

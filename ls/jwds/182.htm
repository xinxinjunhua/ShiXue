<tr><td class="t50">刘彦琮传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘彦琮，字比德，云中人也。事武皇，累从征役。先是，绛州刺史王瓘叛，武皇言于彦琮，意欲致之。无几，从略于汾、晋之郊，彦琮奔绛，瓘以为附己，待之甚厚，因命为骑将。会瓘出猎，于驰驱之际，彦琮刃瓘之首来献，武皇甚奇之。从庄宗解上党之围。<br /><br />
　　同光初，稍迁至铁林指挥使、磁州刺史。后明宗赴难京师，授华州留后，寻正授节旄。<br /><br />
　　天成三年，改左武卫上将军。未几，改陕州节度使，寻移镇邠州，卒于镇，时年六十四。赠太傅。<br /><br />
</td></tr>

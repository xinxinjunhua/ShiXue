<tr><td class="t50">张延播传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张延播者，汶阳人也。始为郡之牙将，唐同光初，明宗下其城，因收隶左右。<br /><br />
　　天成中，累授检校司空、两河发运营田使、柳州刺史。<br /><br />
　　长兴元年，出牧蔡州，加检校司徒，入为左领军卫大将军，充客省使。伐蜀之役，命为马军都监。三年，迁凤州防御使、西面水陆转运使。<br /><br />
　　高祖即位，除东都副留守。车驾幸汴，遣兼洛京巡检使。张从宾作乱，令延播知河南府事。从宾败，伏诛。<br /><br />
</td></tr>

<tr><td class="t50">王仁裕传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王仁裕，字德辇，天水人。少孤，不从师训，年二十五，方有意就学。一夕梦剖其肠胃，引西江水以浣之，又睹水中砂石，皆有篆文，因取而吞之。及寤，心意豁然，自是资性绝高。<br /><br />
　　【案：此下有阙文。《舆地纪胜》云：王仁裕知贡举时，所取进士三十三人，皆一时名公卿，李昉、王溥为冠。】<br /><br />
　　有诗万余首，勒成百卷，目之曰《西江集》，盖以尝梦吞西江文石，遂以为名焉。<br /><br />
　　【《舆地纪胜》：仁裕所著有《紫泥集》、《西江集》、《入洛记》，共百卷。】<br /><br />
　　后为兵部尚书、太子少保，卒。<br /><br />

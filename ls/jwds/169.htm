<tr><td class="t50">张温传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张温，字德润，魏州魏县人也。始仕梁祖为步直小将，改崇明都校。<br /><br />
　　贞明初，蒋殷以徐州叛，从刘鄩讨平之，改左右捉生都指挥使。庄宗伐邢台，获之，用为永清都校，历武州刺史、山后八军都将。从庄宗袭契丹于幽州，收新州，历银枪效义都指挥使，再任武州刺史。<br /><br />
　　同光初，契丹陷妫、儒、檀、顺、平、蓟六州，武州独全，改授蔚州刺史。天成初，历振武、昭武留后，寻授利州节度使，入为右卫上将军。无几，授洋州节度使、右龙武统军，改云州节制。清泰初，屯兵雁门，逐契丹出塞，移镇晋州，婴疾而卒。诏赠太尉。<br /><br />
</td></tr>

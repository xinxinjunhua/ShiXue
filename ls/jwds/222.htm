<tr><td class="t50">李保殷传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李保殷，河南洛阳人也。<br /><br />
　　昭宗朝，自处士除太子正字，改钱塘县尉。浙东帅董昌辟为推官，调补河府兵曹参军，历长水令、《毛诗》博士，累官至太常少卿、端王傅。入为大理卿，撰《刑律总要》十二卷；与兵部侍郎郗殷象论刑法事。左降房州司马。<br /><br />
　　同光初，授殿中监，以其素有明法律之誉，拜大理卿；未满秩，属为人所制。保殷曰：“人之多辟，无自立辟。”乃谢病以归，卒于洛阳。<br /><br />
</td></tr>

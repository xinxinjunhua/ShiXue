<tr><td class="t50">崔周度传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　崔周度者，父光表，举进士甲科，卢质节制横海，辟为支使。周度有文学，起家长芦令，登朝历监察御史、右补阙，以家在齐州，欲谋葬事，恳求外任，除泰宁军节度判官。而性刚烈，又以尝为谏官，睹凶帅之不法，不忍坐视其弊，因极言以谏彦超，故及斯祸。<br /><br />
　　太祖平兖州，诏曰：“阎宏鲁、崔周度，死义之臣，礼加二等，所以渗漏泽而贲黄泉也。尔等贞节昭彰，正容肃厉，以从顺为己任，以立义作身谋，履此祸机，并罹冤横，宜伸赠典，以慰贞魂。宏鲁可赠左骁卫大将军，周度可赠秘书少监。”<br /><br />

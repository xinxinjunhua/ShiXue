<tr><td class="t50">孔崇弼传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　孔崇弼，唐僖宗宰相纬之子也。仕后唐，自吏部郎中授给事中，时族兄昭序繇给事中改左常侍，兄弟同居门下，时论荣之。<br /><br />
　　崇弼，天福中迁左散骑常侍。无他才，但能谈笑，戏玩人物，扬眉抵掌，取悦于人。五年，诏令泛海使于杭越。<br /><br />
　　先是，浙中赠贿，每岁恒及万缗，时议者曰：“孔常侍命奇薄，何消盈数，有命即无财，有财即无命。”明年使还，果海中船坏，空手而归。<br /><br />
　　【案：以下残阙。】<br /><br />

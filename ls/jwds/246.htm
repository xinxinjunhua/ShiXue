<tr><td class="t50">曹廷隐传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　曹廷隐，魏州人也，为本州典谒虞候。贺德伦使西迎庄宗于晋阳，庄宗既得邺城，擢为马步都虞候，以其称职，自是迁拜日隆。天成初，除齐州防御使。下车严整，颇有清白之誉。<br /><br />
　　时有孔目吏范弼者，为人刚愎，视廷隐蔑如也。弼监军廪，鬻空乏以取赀；又私货官盐，廷隐按之，遂奏其事。弼家人诉于执政，并下御史府劾之。弼虽伏法，廷隐以所奏不实，并流永州，续敕赐自尽，时人冤之。<br /><br />
</td></tr>

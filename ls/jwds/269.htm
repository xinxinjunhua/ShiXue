<tr><td class="t50">窦廷琬传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　窦廷琬者，世为青州牙将，梁祖擢置左右。<br /><br />
　　同光初，为复州游奕使，奸盗屏迹，历贝州刺史。未几，请制置庆州盐池，逐年出绢十万匹，米十万斛，遂以廷琬为庆州防御使。俾制置之，由是严刑峻法，屡挠边人。课利不集，诏移任于金州。廷琬据庆州叛，诏邠州节度使李敬周率兵讨平之，夷其族。<br /><br />
</td></tr>

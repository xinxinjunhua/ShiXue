<tr><td class="t50">程福赟传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　程福赟，未详何许人也。性沉厚，有勇力，累为军校。<br /><br />
　　天福七年冬，杜重威讨镇州，与安重荣大战于宗城，以功迁洺州团练使、检校太保，未几，入为奉国左厢都指挥使。<br /><br />
　　九年春，少帝将幸澶渊，福赟部下有军士文荣等八人，潜谋作乱，于本营纵火，福赟寻领腹心之士扑灭之，福赟亦有所伤。福赟性本纯厚，又以车驾顺动，秘而不奏。同列李殷，居福赟下无名，欲危福赟以自升，遂密陈其事，云：“福赟若不为乱，何得无言？”少帝至封丘，出福赟为商州刺史，寻下狱鞫之。福赟终不自明，以至见杀，人甚冤之。<br /><br />

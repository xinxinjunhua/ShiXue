<tr><td class="t50">归蔼传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　归蔼，字文彦，吴郡人也。曾祖登，祖融，父仁泽，位皆至列曹尚书、观察使。蔼登进士第，及升朝，遍历三署。<br /><br />
　　【案：以下疑有阙文。据《旧唐书·昭宗纪》：天祐元年七月，宴于文思殿。朱全忠入，百官或坐于廊下，全忠怒，笞通引官何凝。丙寅，制金紫光禄大夫、行御史中丞、上柱国韩仪责授棣州司马，侍御史归蔼责授登州司户，坐百官傲全忠也。】<br /><br />
　　同光初，为尚书右丞，迁刑、户二部侍郎，以太子宾客致仕，卒年七十六。<br /><br />

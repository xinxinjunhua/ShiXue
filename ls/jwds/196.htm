<tr><td class="t50">孔勍传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　孔勍，字鼎文，兖州人，后徙家宿州。少便骑射，为军中小校，事梁祖渐至郡守，累迁齐州防御使、唐邓节度使。<br /><br />
　　梁贞明中，王球据襄州叛，勍讨平之，因授山南东道节度使。庄宗至洛阳，勍自镇来朝，复令归镇，寻移昭义节度使。<br /><br />
　　同光季年，监军杨继源与都将谋据潞州，事泄，勍诛之。明宗即位之岁，诏还京师，授河阳节度使。未几，以太子太师致仕，卒年七十九。赠太尉。<br /><br />
</td></tr>

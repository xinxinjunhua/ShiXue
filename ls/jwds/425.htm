<tr><td class="t50">皇甫立传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　皇甫立，代北人也。唐明宗之刺代州，署为牙校，从历藩镇。性纯谨，明宗深委信之，王建立、安重诲策名委质、皆在立后。明宗践阼，以立为忻州刺史。<br /><br />
　　长兴末，转洺州团练使。应顺初，迁鄜州节度使，检校太保。<br /><br />
　　清泰三年春，移镇潞州，未几，改华州。<br /><br />
　　晋天福中，授左神武统军。少帝即位，历左金吾卫上将军，累官至检校太尉。<br /><br />
　　高祖定天下，授特进、太子太师致仕。<br /><br />
　　乾祐二年秋卒。<br /><br />
</td></tr>

<tr><td class="t50">孙岳传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　孙岳，冀州人也。强干有才用，历府卫右职。<br /><br />
　　天成中，为颍耀二州刺史、阆州团练使，所至称治，迁凤州节度使。受代归京，秦王从荣欲以岳为元帅府都押衙，事未行，冯赟举为三司使，时预密谋。朱、冯患从荣之恣横，岳曾极言其祸之端，康义诚闻之不悦。及从荣败，义诚召岳同至河南府检阅府藏。时纷扰未定，义诚密遣骑士射之，岳走至通利坊，为骑士所害，识与不识皆痛之。<br /><br />
　　子琏，历诸卫将军、藩阃节度副使。<br /><br />

<tr><td class="t50">李怀忠传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李怀忠，字光孝，太原晋阳人。父海，本府军校。怀忠形质魁壮，初事唐庄宗，隶于保卫军。夹城之役，怀忠率先登城，以功补本军副兵马使。庄宗平定山东，累迁保卫军使。<br /><br />
　　天成中，历陕府、许州、沧州都指挥使，遥领辰州刺史。清泰初，以河西蕃部寇钞，命怀忠屯方渠。晋祖受命，以怀忠故人，召典禁兵，三迁护圣左右厢都指挥使，遥领寿州节度使、检校太保。未几，为同州节度使、检校太傅。少帝嗣位，入为右羽林统军，改左武卫上将军。<br /><br />
　　广顺中，以太子太傅致仕。三年夏卒，年六十六。诏赠太子太师。<br /><br />

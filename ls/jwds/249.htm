<tr><td class="t50">贾馥传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贾馥，故镇州节度使王镕判官也。家聚书三千卷，手自刊校。张文礼杀王镕，时庄宗未即尊位，文礼遣馥至邺都劝进，因留邺下，栖迟邮舍。<br /><br />
　　庄宗即位，授鸿胪少卿。后以鸿胪卿致仕，复归镇州，结茅于别墅，自课儿孙耕牧为事。馥初累为镇、冀属邑令，所莅有能政，性恬澹，与物无竞，乃镇州士人之秀者也。<br /><br />
</td></tr>

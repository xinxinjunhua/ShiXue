<tr><td class="t50">于德辰传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　于德辰，字进明，元城人也。幼敏悟，笃志好学，及射策文场，数上不调。<br /><br />
　　后唐明宗镇邢州，德辰往谒焉，明宗见而器之，因得假官于属邑。后继历州县，历仕晋、汉、周，官至工部尚书。<br /><br />
</td></tr>

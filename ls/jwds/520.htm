<tr><td class="t50">王环传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王环，本真定人。唐天成初，孟知祥镇西川，环往事之，及知祥建号，环累典军卫，孟昶嗣位，环常宿卫于中。<br /><br />
　　显德二年秋，王师西伐，时环为凤州节度使。初，偏师傅其城下，为环所败，裨将胡立为环所擒。是冬，王师大集，急攻其城，蜀之援兵相次败走。环闻之，守备愈坚，王师攻击数月方克。城陷，环就擒。及到阙，世宗以忠于所事，释其罪，授若骁卫大将军。<br /><br />
　　四年冬，世宗南征，环随驾至泗州，遇疾而卒。<br /><br />

<tr><td class="t50">伊广传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　伊广，字言□，元和中右仆射慎之后。广，中和末除授忻州刺史。遇天下大乱，乃委质于武皇。广襟情洒落，善占对，累历右职，授汾州刺史。时武皇主盟，诸侯景附，军机缔结，聘遗旁午，广奉使称旨，累迁至检校司徒。<br /><br />
　　乾宁四年，从征刘仁恭，武皇之师不利于成安寨，广殁于贼。<br /><br />
　　有女为庄宗淑妃。子承俊，历贝、辽二州刺史。<br /><br />

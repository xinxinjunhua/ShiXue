<tr><td class="t50">程逊传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　程逊，字浮休，寿春人。【案：此下有阙文。据《浯田程氏宗谱》云：善属文。梁贞明二年进士。卢文纪持宪纲，奏为监察御史，孔勍帅河阳，请为记室参军，寻征拜兵部员外郎知制诰，迁中书舍人，】召入翰林充学士，自兵部侍郎承旨授太常卿。<br /><br />
　　天福三年秋，命使吴越，【《十国春秋》云：礼部尚书程逊为加恩使。】母羸老双瞽，逊未尝白执政以辞之。将行，母以手扪其面，号泣以送之。<br /><br />
　　仲秋之夕，阴暝如晦，逊尝为诗曰：“幽室有时闻雁叫，空庭无路见蟾光。”同僚见之，讶其诗语稍异。及使回，遭风水而溺焉。<br /><br />

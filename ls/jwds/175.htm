<tr><td class="t50">李德休传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李德休，字表逸，赵郡赞皇人也。祖绛，山南西道节度使，唐史有传。父璋，宣州观察使。德休登进士第，历盐铁官、渭南尉、右补阙、侍御史。<br /><br />
　　天祐初，两京丧乱，乃寓迹河朔，定州节度使王处直辟为从事。<br /><br />
　　庄宗即位于魏州，征为御史中丞，转兵部、吏部侍郎，权知左丞，以礼部尚书致仕。卒时年七十四。赠太子少保。<br /><br />

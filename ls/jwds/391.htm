<tr><td class="t50">李郁传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李郁，字文纬，唐之宗属也。少历宗寺官，天成、长兴中，累迁为宗正卿。性平允，所历无爱憎毁誉。<br /><br />
　　高祖登极，授光禄卿。一日昼寝，梦食巨枣，觉而有疾，谓其亲友曰：“尝闻‘枣’字重‘来’，呼魂之象也。余神气逼抑，将不免乎！”天福五年夏卒。赠太子太保。<br /><br />

<tr><td class="t50">郑琮传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　郑琮，太原人也。始事唐武皇为五院军小校，屡有军功。庄宗在河上，为马步都虞候。戎伍之事，一睹不忘，凡所诘问，应答如流，故所在知名。<br /><br />
　　唐同光末，从明宗伐魏州，时军情有变，明宗退守魏县，未知趋向。安重诲将征兵于四方，琮在帐前，历数诸道屯军及主将姓名，附口传檄，相次而至。明宗即位，嘉其功，授防州刺史，秩满，父老请留。三年，授左羽林统军。<br /><br />
　　唐长兴二年二月，出刺武州。<br /><br />
　　高祖即位，复居环卫。久之，以俸薄家贫，郁郁不得志。<br /><br />
　　天福中，以疾终于官。赠司徒。<br /><br />

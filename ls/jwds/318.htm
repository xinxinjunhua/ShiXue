<tr><td class="t50">李承福传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李承福，字德华，汉阳人。少寒贱，事元行钦掌皂栈之役，后为高祖家臣。高祖登极，历皇城武德宣徽使、左千牛将军，出为澶州刺史，迁齐州防御使、检校太保。<br /><br />
　　承福性鄙狭，无器局，好察人微事，多所诋讦，虽小过不能恕，工商之业，舆隶之情，官吏之幸，皆善知之，然自任所见，无所准的，故人多薄之。<br /><br />
　　少帝嗣位，授同州节度使，寻卒于镇。少帝以高祖佐命之臣，闻之嗟叹，赙物加等，辍视朝一日，诏赠太傅。<br /><br />
</td></tr>

<tr><td class="t50">房皓传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　房皓，京兆长安人也。少为唐宰臣崔魏公家臣，后因乱，客于蒲州。<br /><br />
　　天成中，唐末帝出镇河中，皓于路左迎谒，求事军门，末帝爱之，使治宾客。及末帝登极，历南北院宣徽使，寻与赵延寿同为枢密使。时薛文遇、刘延朗之徒居中用事，皓虽处密地，其听用之言，十不得三四，但随势可否，不为事先。每朝廷有大事，皓与端明学士等环坐会议，多于众中俯首而睡，其避事也如此。<br /><br />
　　高祖即位，以皓濡足闰朝，不专与夺，故特恩原之，命为左骁卫大将军，留西京。<br /><br />
　　开运元年春，卒于洛阳。<br /><br />

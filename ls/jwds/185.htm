<tr><td class="t50">张遵诲传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张遵诲，魏州人也。父为宗城令，罗绍威杀牙军之岁，为梁军所害。遵诲奔太原，武皇以为牙门将。庄宗定山东，遵诲以典客从，历幽、镇二府马步都虞候。同光中，为金吾大将军。明宗即位，任圜保荐，授西都副留守，知留守事、京兆尹。<br /><br />
　　天成四年，入为客省使、守卫尉卿。及将有事于南郊，为修仪仗法物使。初，遵诲自以历位尹正，与安重诲素亦相款，衷心有望于节钺。及郊禋毕，止为绛州刺史，郁郁不乐。离京之日，白衣乘马于隼旟之下，至郡无疾，翌日而卒。<br /><br />
</td></tr>

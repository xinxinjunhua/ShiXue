<tr><td class="t50">药纵之传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　药纵之，太原人，少为儒。明宗刺代州，署为军事衙推。从明宗镇邢州，为掌书记，历天平、宣武两镇节度副使。<br /><br />
　　明宗镇常山，被病不从。及即位，纵之见于洛邑，安重诲怒其观望，久无所授。明宗曰：“德胜用兵时，纵之饥寒相伴，不离我左右。今有天下，何人不富贵，何为独弃纵之！”<br /><br />
　　浃旬，授磁州刺史。岁余，自户部侍郎迁吏部侍郎，铨总之法，惘然莫知。<br /><br />
　　长兴初，为曹州刺史。<br /><br />
　　清泰元年九月，以疾受代而卒。<br /><br />

<tr><td class="t50">张廷裕传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张廷裕，代北人也。幼事武皇于云中，从平黄巢，讨王行瑜，自行间渐升为小将。庄宗定魏，补天雄军左厢马步都虞候，历蔚、慈、隰三州刺史。<br /><br />
　　同光三年，除新州节度使。塞上多事，廷裕无控制之术，边鄙常耸。<br /><br />
　　天成三年，卒于治所。诏赠太保。<br /><br />

<tr><td class="t50">李晖传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李晖，字顺光，瀛州束城人。弱冠应募于龙骧军，汉祖领河东，晖请从，因得署为河东牙将。汉有天下，授检校司徒、大内皇城使。未几，迁宣徽南院使。乾祐初，拜河阳节度使、检校太傅。太祖登极，加同平章事，寻移镇沧州。显德元年，就加兼侍中。<br /><br />
　　二年秋，以世宗诞庆节来朝，改邠州节度使。<br /><br />
　　五年，移镇凤翔。岁余，卒于镇。优诏赠中书令。<br /><br />
　　晖之仪貌不及于常人，而位极将相，年登耳顺，袁、许之术，夫何恃哉！然性贪鄙，而好小惠以邀虚誉，故在河阳及沧州日，民皆诣阙请立碑以颂其美，识者亦未之许也。<br /><br />
</td></tr>

<tr><td class="t50">雍熙四年（987）正月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　春正月，初，曹彬及刘廷让等相继败覆，军亡死者，前后数万人。缘边创痍之卒，不满万计，皆无复淢志。河朔震恐，悉料乡民为兵以守城，皆白徒，未尝习战阵，但坚壁自固，不敢御敌。敌势益振，长驱入深、祁，陷易州，杀官吏，卤士民。所过郡邑，攻不能下者，则俘取村墅子女，纵火大掠，辇金帛而去。魏、博之北，咸被其祸。上深哀痛焉。<br /><br />
　　丙戌，降德音。<br /><br />
　　三司言广南诸州有积盐二百三十余万硕，约可支三十年，岁复增十万硕，颇劳人而无所用，乞权罢煮盐。戊子，诏从其请。（据本志是年废潮州松口等四场。）<br /><br />

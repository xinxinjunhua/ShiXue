<tr><td class="t50">开宝三年五月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　五月丁未，禁京城民家不得蓄兵器。<br /><br />
　　戊申，诏诸州长吏，毋得遣仆从及亲属掌厢镇局务。（此据旧录，新录无此。本纪于六月乙未乃书，今从旧录。按本志及会要并云太平兴国二年，禁藩侯补亲随为镇将，自此但用本州衙吏为之，亦有宣补者。检兴国二年，乃不见此事，疑即此也。或兴国二年又申此禁，今两存之。）<br /><br />
　　癸丑，幸城北观水硙。<br /><br />
　　丁巳，京师始置便钱务。<br /><br />
　　丁卯，诏通远军直隶京师。<br /><br />
　　戊辰，以沧州无棣县为保顺军。<br /><br />
　　改广政殿为大明殿。<br /><br />

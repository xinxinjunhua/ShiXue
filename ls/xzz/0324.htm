<tr><td class="t50">雍熙三年九月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　九月戊辰，户部郎中张去华献大政要录三十篇，上嘉之，降玺书襃美，赐帛五十段。去华初受命知陕州，因留不行。<br /><br />
　　判刑部张佖上言：“望自今应断奏失入死刑者，不得以官减赎，检法官削一任，长吏并停见任。”从之。（张佖上言，本志在五月后，今移见于此。）尝有犯大辟者，诏特减，上谓佖曰：“朕以小人冒法，原其情非巨蠹，故贷死流窜，亦足以惩艾之也。”佖对曰：“先王立法，盖为小人，君子固不犯矣。”上以语宰相，且叹赏佖，以为知言。<br /><br />

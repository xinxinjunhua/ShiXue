<tr><td class="t50">端拱二年六月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　上尝谓直史馆句中正曰：“卿深于字学，凡有声无文者几何？”中正退，条为一卷以上。上曰：“朕亦得二十余字，可并录之。”因命中正与史馆编修吴铉等撰定雍熙广韵。六月丁丑，广韵成，凡一百卷，诏书嘉奨焉。<br /><br />

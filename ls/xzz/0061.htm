<tr><td class="t50">乾德二年十月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　冬十月癸卯朔，以张勋为郴州刺史。勋性残忍好杀，每攻城邑，但扬言曰：“且斩！”颇有横罹锋刃者。初赴衡州，州民皆涕泣相谓曰：“张且斩至矣，吾属何以安乎？”<br /><br />
　　戊申，周纪王希谨卒，世宗之第三子也。（希谨，初见显德末。）<br /><br />
　　有司言十道图无全、邵二州名及其望。壬戌，诏并为中州。<br /><br />
　　改广德殿为崇政殿。<br /><br />
　　是月，唐宣城公仲宜卒，封岐王，谥怀献。仲宜早慧，昭惠后周氏甚爱之，因伤悲得疾。<br /><br />

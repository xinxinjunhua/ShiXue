<tr><td class="t50">开宝元年十二月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　先是，僧行勤游西域，上因赐大食国王书以招怀之。十二月，乙丑，遣使来贡方物。<br /><br />
　　是岁，党项直荡族首领啜佶等引北汉入寇府州，为守将所败。诏内属蕃部十六府大首领屈遇与十二府首领罗崖帅所部诛啜佶。啜佶惧，挈族来归，乃以屈遇为归德将军，罗崖及啜佶并为怀化将军。<br /><br />
</td></tr>

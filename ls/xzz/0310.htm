<tr><td class="t50">雍熙二年六月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　六月己卯，诏两街供奉僧于内殿建道场。上谓宰相曰：“今兹夏麦丰稔。比闻岁熟则民多疾疫，朕恐百姓或有灾患，故令设此，未必便能获佑，且表朕勤祷之意云。”<br /><br />
　　丙戌，命右谏议大夫刘保勋、兵部郎中杨徽之、屯田郎中孔承恭与判吏部流内铨王祜，同就尚书省以新及第进士、诸科名次先后，乡里远近之便注拟。自是为定例。<br /><br />

<tr><td class="t50">至道二年（996）正月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　春正月己酉，亲飨太庙。辛亥，合祭天地于圜丘，大赦天下。先是，礼仪使宋白奏曰：“伏详仪注，朝飨太庙，皇帝先诣罍洗，后奠瓒，其祀天地，望先诣罍洗，后奠玉币。”上遽召宰相以问，吕端等曰：“王者亲执玉帛以事上帝。玉帛者，接神之物。若沃盥而后奠献，亦足以表虔洁之意。”白曰：“如允臣所请，止一次升坛。”上耸然改容曰：“朕亲奉大祭，盖为万姓祈福，若变礼为允，当依卿奏，如合遵旧典，故不以登降为劳。”端等皆言白所陈，得礼之中也。遂从其议。<br /><br />
　　上以文物仗卫之盛，逶迤布濩，极望无际，因诏有司画为南郊图。<br /><br />

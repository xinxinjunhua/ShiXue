<tr><td class="t50">雍熙元年七月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　秋七月壬子，改乾元殿为朝元殿，文明殿为文德殿。<br /><br />
　　先是，南郊五使皆权用他司印，癸丑，始令铸印给之。<br /><br />
　　上曰：“御史台，閤门之前，四方纲准之地。颇闻台中鞫狱，御史多不躬亲，垂帘雍容，以自尊大，鞫按之柄，委在胥吏。求民之不寃，法之不滥，岂可得也？”乃诏自今鞫狱，御史必须躬亲，毋得专任胥吏。<br /><br />
　　庚申，改匦院为登闻检院，东延恩匦为崇仁检，南招谏匦为思谏检，西申寃匦为申明检，北通玄匦为招贤检。仍令谏院依旧差谏官一员主判。<br /><br />

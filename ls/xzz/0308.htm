<tr><td class="t50">雍熙二年四月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　夏四月丙子，复置明法科。分周易、尚书各为一科，附以论语、孝经、尔雅三小经；毛诗专为一科。明法亦附三小经。进士、九经以下，更不习法书。又以锁厅，求试者率多缪滥，始令诸道州府，自今择才学优茂而历官无过者乃举之，仍先奏俟报。<br /><br />
　　是日，召宰相，参知政事，枢密，三司使，翰林，枢密直学士，尚书省四品、两省五品以上，三馆学士，宴于后苑，赏花钓鱼，张乐赐饮，命群臣赋诗、习射。自是每岁皆然。赏花钓鱼曲宴，始于是也。（此据会要，赏花赋诗，已见雍熙元年三月。）<br /><br />

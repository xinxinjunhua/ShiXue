<tr><td class="t50">至道三年十月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　冬十月，陈、宋州并言先贷民钱千万令市牛，价纳外所负尚多，许随来岁夏秋税输送。诏悉除之。<br /><br />
　　知益州张咏奏屯驻兵士所请钱，乞依元降宣旨，铜钱一文，与折支铁钱五文。是时，峡路转运使韩国华到阙，又言川、峡州县幕职官等所请月俸，铜钱一文止支铁钱二文，望增加铁钱分数。帝令支铜钱一文，易给铁钱五文。（会要至道三年十月事。咸平三年五月，又五年七月可考。）<br /><br />
　　己酉，葬太宗神功圣德文武皇帝于永熙陵。<br /><br />

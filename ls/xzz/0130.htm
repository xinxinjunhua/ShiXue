<tr><td class="t50">开宝三年六月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　六月甲戌，皇长女封昭庆公主，甲申，出降左卫将军、驸马都尉王承衍。承衍，审琦之子也。<br /><br />
　　己亥，京东发运使、吏部郎中何幼冲坐受诸州馈遗，责为考功员外郎。<br /><br />
　　以诏书三百通付河东北、陕西诸州军，令分遣人赍入北汉境，招降其民吏。<br /><br />
　　汴水决宋州宁陵县，发宋、亳丁夫塞之。又塞汴口以杀水势。<br /><br />

<tr><td class="t50">淳化二年五月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　五月乙巳，复置折博仓。（折博仓即折中仓也，端拱二年九月初置，寻以岁旱中止，今仍复之。）<br /><br />
　　左正言谢泌数奏章论时政得失，上嘉其忠荩。丙辰，擢左司谏，赐金紫，并钱三十万。泌一日得对便殿，上复面加赏激，泌谢曰：“陛下从谏如流，故臣得以竭诚。昔唐末有孟昭图者朝上谏疏，暮不知所在。前代如此，安得不乱！”上动容久之。<br /><br />

<tr><td class="t50">开宝六年二月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　殿直傅廷翰为棣州兵马监押，欲谋叛北走契丹。知州、右赞善大夫周渭擒之以闻，遣使械系送御史狱，鞫之得实。二月丙戌，斩廷翰于西市。<br /><br />
　　丙申，运京师米二万石，赈曹州饥民。<br /><br />
　　辛丑，以著作佐郎陆光范为在京粮料使，太仆寺丞赵巨川为西京粮料使。（光范、巨川，未见。）国初承旧制，用三司大将领粮料之职，于是改任京官。<br /><br />
</td></tr>

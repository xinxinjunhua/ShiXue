<tr><td class="t50">端拱元年九月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　九月丁未，秘书监李至言：“著作局撰告飨宗庙及诸祠祭祝文称尊号，唐惟开元礼有之，稽古者以为非礼。且尊号起于近代，请举旧典，飨宗庙称嗣皇帝臣某，诸祠称皇帝，斯为得礼。”从之。<br /><br />

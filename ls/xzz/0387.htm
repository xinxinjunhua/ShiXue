<tr><td class="t50">淳化三年二月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　二月，杭州掌庚吏叶彦安等百二十三人，欠钱俶日官仓米八十四万八千四石，盐五万四百四十六石，甲申，诏并除之。<br /><br />
　　盐铁使魏羽等，言诸州茶盐主吏，多负官课，请行决罚。上曰：“当案问其实。若水旱灾沴，致官课亏失者，非可加刑也。帝王者，为天下主财尔。卿等司计，当以公正为心，无事割削，勿令害民而伤和气焉。”<br /><br />

<tr><td class="t50">雍熙二年（985）正月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　春正月癸亥，翰林学士贾黄中等九人权知贡举。上谓宰相曰：“夫设科取士之门，最为捷要。然而近年籍满万余人，得无滥进者乎？”己巳，诏：“自今诸科并令量定人数，相参引试，分科隔坐，命官巡察监门，谨视出入。有以文字往复与吏为奸者，寘之于法；私以经义相教者，斥出科场；伍保预知，亦连坐。进士倍加研覆，贡举人勿以曾经御试，不考而荐。”始令试官亲戚别试者凡九十八人。又罢进士试律，复贴经。<br /><br />

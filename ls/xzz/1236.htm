<tr><td class="t50">嘉祐六年二月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　二月丁巳，诏宗室赐名授官者，须年及十五，乃许计年转官。<br /><br />
　　辛酉，奉安明德章穆皇后御容于普安禅院之重徽殿。<br /><br />
　　癸亥，诏：“宗室上坟陵，毋得以黏竿、弹弓随行。”<br /><br />
　　乙丑，诏：“如闻良民子弟或为人诱隶军籍，父母泣诉而不得还者，朕甚闵之。自今有司审其所从来，隶籍百日内父母诉官者，还之。”按：百日，宋史作两月，与此小异。<br /><br />
　　丙寅，御崇政殿录系囚，杂犯死罪以下递降一等。<br /><br />
　　戊辰，诏枢密院：自今内殿崇班以上，须年二十方听受差遣。<br /><br />
　　辛未，御崇政殿试礼部进士、诸科及特奏名进士、诸科。<br /><br />

<tr><td class="t50">太平兴国五年三月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　三月甲戌朔，诏江南诸州岁贡乾蜂，甚伤生而挠民，宜罢之。<br /><br />
　　先是，令有司详定打球仪，戊子，始用其仪，召群臣会踘于大明殿，上获多算。<br /><br />
　　赠太师、南越王刘鋹卒，辍三日朝。<br /><br />
　　癸巳，潘美言自三交口巡抚至代州，会敌十万众侵雁门，令杨业领麾下数百骑自西陉出，由小陉至雁门北口南向与美合击之，敌众大败，杀其节度使、驸马、侍中萧咄李，生擒马步军都指挥使李重诲，获铠甲革马甚众。重诲，金城人也。<br /><br />
　　丙申，上作喜春雨诗，令近臣和。<br /><br />

<tr><td class="t50">开宝二年七月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　秋七月丁巳，幸封禅寺。<br /><br />
　　甲子，大宴广政殿，赐近臣袭衣、金带。<br /><br />
　　丙寅，以天雄节度使符彦卿为凤翔节度使。彦卿镇大名十余年，委政于牙校刘思遇。思遇贪而黠，招权黩货，军府久不治。于是，始议择官代之。<br /><br />
　　戊辰，西南夷顺化王子武才等一百四十二人来贡。以武才为归德将军。<br /><br />
　　诏自今祀天地用太牢，余当用牛者代以羊豕。<br /><br />
　　癸酉，幸新水硙。<br /><br />
　　汴水决宋州夏邑县。<br /><br />
　　是月，命镇、深、赵、邢、洺五州，各城其管内县镇军寨。<br /><br />

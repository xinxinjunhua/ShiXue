<tr><td class="t50">淳化四年（993）正月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　春正月庚寅朔，亲飨太庙。<br /><br />
　　辛卯，合祭天地于圜丘，以宣祖、太祖升配。大赦天下。<br /><br />
　　度支副使谢泌条上郊祀赏给军士之数，上曰：“朕爱惜金帛，止备赏赐尔。”泌因曰：“唐德宗朱泚之乱，后唐庄宗马射之祸，皆赏军不丰所致。今陛下躬御菲薄，赏赐优厚，真历代王者之所难也。”<br /><br />

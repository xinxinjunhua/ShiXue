<tr><td class="t50">天圣八年十一月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　十一月乙卯，西上閤门副使、勾当翰林司郭承佑除名，配岳州衙前编管；父比部员外郎世隆特勒停。承佑，从义曾孙，娶舒王元偁女，坐盗御酒及用上方金器，法当死，特贷之。世隆亦尝受所盗物也。<br /><br />
　　戊午，卭部川都蛮王黎在遣卑郎离灭等来贡方物。<br /><br />
　　丙寅，朝飨景灵宫。<br /><br />
　　丁卯，飨太庙。<br /><br />
　　戊辰，合祀天地于圜丘，大赦。贺皇太后于会庆殿。戚里有殴妻致死更赦事发者，太后怒曰：“夫妇齐体，奈何殴致死耶？”权知开封府寇瑊对曰：“伤居限外，事在赦前，有司不敢乱天下法。”卒免死。<br /><br />

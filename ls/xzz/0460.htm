<tr><td class="t50">咸平元年五月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　五月壬戌，始命内侍充宫闱令，限年与代，令居庙中，与知庙官同掌宗庙祀事。从屯田郎中杨延庆所请也。（史官曰：“宫闱令但掌迁皇后神主，岂宜辄居庙中专掌庙事乎？延庆不知典故，君子非之。”）<br /><br />

<tr><td class="t50">端拱二年九月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　九月戊子，以驾部员外郎、知制诰王化基为右谏议大夫、权御史中丞。上尝召至便殿，侍坐甚久，属盛暑，令搢笏挥扇，问以边事，化基曰：“治天下犹植树焉，所患根本未固，根本固则枝干不足忧。今朝廷治，边鄙何患乎不安。”上然其言。<br /><br />
　　诏京朝官有明于律令格式者，许上书自陈，当加试问，以补刑部、大理寺官属，三岁迁其秩。<br /><br />

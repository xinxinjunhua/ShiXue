<tr><td class="t50">雍熙二年五月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　五月庚午，中书门下奏，谪官在外而累经赦宥者，欲令归阙，责其后效。上不许，谓宰相曰：“朝廷致理，当任贤良，君子小人，宜在明辨。大抵人君宜先自正其身，亦如治家，身不正则家乱矣。故听谗邪之言，则骨肉至亲，坐成离间，岂能致敦叙之道欤！大小虽殊，其致一也。今海岛琼、崖远恶处，甚多窜逐之臣，郊禋以来，岂不在念！然此等务行巇崄，若小得志，即复结朋植党，恣其毁誉，如害群之马，岂宜轻议哉。”（选举志言诏从其请，盖误也。）<br /><br />

<tr><td class="t50">淳化五年六月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　六月壬午朔，继赟等捷书闻，上降诏嘉奨。传序家寄荆、湘间，其子奭泝峡求其父尸，比至夔州，船覆而死。世以为父死于忠，子死于孝。奏至，上嗟恻久之，录传序次子煦为殿直，以钱十万赐其家。传序，江宁人也。<br /><br />
　　甲辰，诏翰林学士、枢密直学士自今序立班位，依旧在丞郎之上。（建隆三年三月陶谷初改制。）<br /><br />
　　庚戌，高丽国王治遣使元郁来乞师，言契丹侵掠其境故也。<br /><br />

<tr><td class="t50">开宝七年（974）正月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　春正月庚申，占城国遣使来贡方物。<br /><br />
　　甲戌，遣使发廪赈扬、楚等州饥民。<br /><br />
　　戊寅，幸玄化门，赐治城壕卒衣履。遂幸新水硙，还宴射苑中。<br /><br />
　　燕国长公主之丧，上哀恸，谓左右曰：“明年诞节，当罢会禁乐。”己卯，中书门下上言：“王者礼绝正更，虽陛下友爱之厚，然群臣上寿，无以为礼，望许教坊作乐。”上不得已，从之。<br /><br />

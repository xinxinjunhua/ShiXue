<tr><td class="t50">嘉祐七年十一月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　十一月己巳，进封沂国公主为岐国公主；建州观察使、知卫州李玮改安州观察使，复为驸马都尉。<br /><br />
　　戊子，皇子徙入位。<br /><br />
　　辛未，徙利州路转运判官、司封员外郎王靖提点陕西路刑狱。乡户之役于州县者，优则久留，劳则欲速去，赂吏劶不以时代。靖令籍所役岁月，先期除代，毋须申诉，后遂为令。<br /><br />
</td></tr>

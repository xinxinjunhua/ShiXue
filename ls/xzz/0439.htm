<tr><td class="t50">至道二年八月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　八月，审官院引大理寺丞宣城高惠连面授朝官。上欲肃清中外，临轩亲择官吏，如有绩用而无私累者，必加奨擢焉。<br /><br />
　　江、淮发运使杨允恭，捕贩私盐贼三十九人送阙下，上悉贷之，因顾左右曰：“此等越逸江湖，习性已久，固不能工作矣，可团为一军，以备舟璙之役，号曰平河。”<br /><br />

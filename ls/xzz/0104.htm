<tr><td class="t50">开宝元年四月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　夏四月戊午，成德军节度使、兼侍中、追封南康郡王韩令坤卒。令坤有才略，识治道，与上同事周室，情好欵洽。镇常山凡七年，北边以宁。闻其丧，甚悼惜之。<br /><br />
　　丙子，户部员外郎、知制诰、史馆修撰判馆事王著复为翰林学士。<br /><br />
　　兵部郎中、知制诰卢多逊充史馆修撰判馆事。多逊喜任术数，善为巧发奇中。上好读书，每遣使取书史馆，多逊预戒吏令遽白所取书目，多逊必通夕阅览以待问。既而上果引问书中事，多逊应答无滞，同列皆服。上益宠异之。<br /><br />
　　晋州言北汉军校翟洪贵等二百余人来降。<br /><br />

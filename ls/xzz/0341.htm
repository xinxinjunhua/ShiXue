<tr><td class="t50">端拱元年四月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　夏四月庚戌，遣考功员外郎兼侍御史知杂事吕端、起居舍人巨野吕佑之使高丽，假内库钱五十万以办装。还，遇风涛，帆樯折，舟人大恐，端恬然读书不辍，佑之悉取所得货沈之，乃止，诏蠲其所贷。<br /><br />
</td></tr>

<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　上留意字学，以许慎说文差谬，学者无所依据，乃诏右散骑常侍徐铉、著作郎直史馆句中正等精加绚校。十一月乙丑朔，铉等上新定说文三十卷，凡经典相承传写及时俗要用，而说文不载者，承诏皆附益之，上称善，遂令模印颁行，各赐器币有差。<br /><br />

<tr><td class="t50">乾德五年九月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　九月己丑，渭州刺史范仁裕坐藏匿罪人，责为耀州团练使。（仁裕，未见。）<br /><br />
　　虞部郎中赵元振、国子监丞高延绪考试斋郎，诵书失实。甲午，元振责为仓部员外郎，延绪国子监主簿。（元振、延绪，未见。）<br /><br />
　　丙申，西南蕃顺化王子部才等遣使来贡方物。<br /><br />
　　庚子，夏州言节度使、守太尉、兼中书令、西平王李彝兴卒。赠太师，追封夏王。以其子行军司马光叡权知州事。<br /><br />
　　乙巳，太子少傅致仕柴守礼卒。命中使护其丧事。<br /><br />
　　己酉，畋近郊。<br /><br />

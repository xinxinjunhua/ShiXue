<tr><td class="t50">嘉祐元年二月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　二月甲午，诏两制以上日问候于内东门，余皆罢之。实录称两制以上，记闻称两府、近臣。今从实录。<br /><br />
　　丙申，广西安抚司言桂、容等州蛮人杨克端等一百三人内附。<br /><br />
　　甲辰，御延和殿，帝康复。<br /><br />
　　丙午，宰臣率百官拜表称贺。<br /><br />
　　辛亥，吏部流内铨请入令录选人，举主不犯赃滥及非致仕分司者听用之，奏可。<br /><br />

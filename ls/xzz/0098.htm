<tr><td class="t50">乾德五年十月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　先是，平蜀得锦工数百人，冬十月丙辰朔，置绫锦院以处之，命常参官监焉。<br /><br />
　　癸酉，度支判官侯陟言：“三司凡二十四案，盐铁主其六，户部主其四，余皆度支主之。自荆湖、西蜀之平，事务益众，欲令三司均主其八。”诏三司推官张纯分判度支案事。（此据旧录。）<br /><br />
　　丁丑，以溪州团练使彭允足为濮州都指挥使，义军指挥使彭允贤为卫州都指挥使，珍州录事参军田思晓为博州都指挥使。允足等溪洞酋豪，据山险，持两端，故因其入朝而置之内地。<br /><br />

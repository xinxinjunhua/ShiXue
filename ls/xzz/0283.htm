<tr><td class="t50">太平兴国八年二月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　二月戊子朔，日有食之。<br /><br />
　　丁酉，禁内属戎人私市女口，吏谨捕之，违者弃市。<br /><br />
　　丙午，有司言：“先禁江南诸州民家不得私蓄弓剑、甲铠，违者按其罪。按律疏禁民私有兵器，谓甲、弩、书、具装等，若弓箭、刀櫍、短矛并听私蓄，望厘改之。”诏从其请。<br /><br />

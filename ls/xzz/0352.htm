<tr><td class="t50">端拱二年三月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　三月，先是，翰林学士、知贡举苏易简等固请御试。壬寅，上御崇政殿试合格举人，得进士阆中陈尧叟，晋江曾会等一百八十六人，并赐及第；诸科博平孙奭等四百五十人，亦赐及第，七十三人，同出身。赐宴，始令两制、三馆文臣皆预。赐尧叟等箴一首，勉以修身谨行，稽古效官之意。尧叟及会并授光禄寺丞、直史馆，第三人以下分授职事、州县官。越州进士刘少逸者，年十三中选，既覆试，又别试御题赋诗数章，皆有旨趣，授校书郎，令于三櫲读书。时中书令史、守当官陈贻庆举周易学究及第，既而上知之，令追夺所授敕牒，释其罪，勒归本局。<br /><br />
</td></tr>

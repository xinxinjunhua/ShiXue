<tr><td class="t50">太平兴国三年九月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　九月甲申朔，上御讲武殿，覆试合格人，进士加论一首，自是常以三题为准。得渤海胡旦以下七十四人，乙酉，得诸科七十人，并赐及第，始赐宴于迎春苑，授官如二年之制。故事，礼部唯春放牓，至是秋试，非常例也。<br /><br />
　　诏自今广文馆及诸州府、礼部试进士律赋，并以平侧依次用韵。<br /><br />
　　己亥，改杭州衣锦军为顺化军。<br /><br />
　　壬子，以布衣张遁为开封府襄邑县主簿，张文旦为澶州濮阳县主簿。上微时，尝与遁等同肄业乡校。至是诣阙自言，故有是命。<br /><br />
</td></tr>

<tr><td class="t50">至道元年十一月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　十一月己未，上阅武于便殿，卫士挽弓有及一石五斗者，矢二十发而绰有余力，因谓近臣曰：“事有奇异惊听者，此是也。方今寰海无事，美才间出，悉在吾彀中矣。朕向于行伍中选气质端谨、勇而知礼、进退有度者，授以挽强之法，俾相讲教，所以弧矢之妙，敻无伦比。”又令骑兵步兵各数百，东西列阵，挽强彀弩，视其进退，发矢如一，容止中节。上曰：“此殿廷间数百人尔，犹兵威可观，况堂堂之阵，数万成列者乎！”<br /><br />
　　初，梁氏建都草创，闾巷皆因旧号。丁卯，诏参知政事张洎，改撰京城内外坊名八十余。由是分定布列，始有雍洛之制云。<br /><br />

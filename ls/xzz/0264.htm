<tr><td class="t50">太平兴国六年七月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　秋七月丙申朔，延州言大水溢入城，坏官寺民舍千六百区。<br /><br />
　　上将大举伐契丹，遣使赐渤海王诏书，令发兵以应王师。其略云：“闻尔国本为大藩，近年颇为契丹所制。尔迫于兵势，屈膝事之，谗慝滋多，诛求无已，虽欲报怨，力且不能。所宜尽出族帐，助予攻取，俟其翦灭，当行封赏。幽蓟土宇，复归中朝，沙漠之外，悉以相与。”然渤海竟无至者。<br /><br />
　　河中府、鄜州皆言大水。<br /><br />
　　乙卯，岚州言戎人五十三户三百六十三口内附，遣戍卒迎之，为敌骑所邀，因击破其众，斩首十七级。<br /><br />

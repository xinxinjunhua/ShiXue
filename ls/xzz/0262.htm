<tr><td class="t50">太平兴国六年五月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　五月辛丑，契丹以七千人入侵平寨军，守将击走之，所杀获甚众，诏折之。（此据别本实录，恐即是六月丙子所奏也，然别本特以为二事，当考。）<br /><br />
　　癸丑，令内侍省细仗内先衣黄者并衣碧，吏部黄衣选人改为白衣选人。<br /><br />
　　甲寅，遣供奉官王延德、殿前承旨白尚勋使高昌。<br /><br />
　　己未，德音降死罪囚，流以下释之，祷而雨故也。<br /><br />
　　太子中允潘昭纬知天长军，擅增价鬻官茶，为商人所诉。乙丑，昭纬坐除籍为民。<br /><br />
</td></tr>

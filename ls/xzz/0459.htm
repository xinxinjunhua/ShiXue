<tr><td class="t50">咸平元年四月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　夏四月己丑朔，诏诸州长吏洁除牢狱，疏理淹系，有疾病及贫乏者疗治资给之。<br /><br />
　　甲辰，改御带曰带御器械，以授供备库副使张旻等三人。旻，开封人，尝给事藩邸云。<br /><br />
　　上谓宰相曰：“诸路逋欠，先朝每有赦宥，皆令蠲放。而有司不认朝旨，尚令理纳，颇闻细民愁叹，此甚亡谓也。”己酉，遣使乘传与诸路转运使、州军长吏按百姓逋欠文籍，悉除之。始用王钦若之言也。除逋欠凡一千余万，释系囚三千余人。上由是眷钦若益厚。<br /><br />
</td></tr>

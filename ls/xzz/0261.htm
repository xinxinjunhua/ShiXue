<tr><td class="t50">太平兴国六年四月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　夏四月戊辰，废湖州织罗，放女工五十八人。<br /><br />
　　辛未，幸太平兴国寺、相国寺祷雨。<br /><br />
　　上躬亲听断，京城诸司狱有疑者，多临决之。是岁，自春涉夏不雨，上意狱讼有冤滥。会归德军节度推官李承信市鳂有烂者，笞园户，病创数日死。己卯，承信坐弃市。<br /><br />
　　丙戌，高丽国遣使来贡方物。<br /><br />
　　禁东、西川诸州白衣巫师。<br /><br />

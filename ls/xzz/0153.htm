<tr><td class="t50">开宝五年四月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　夏四月庚寅朔，三佛齐国王释利乌耶遣使来贡方物。<br /><br />
　　上按岭南图籍，州县多而户口少，命知广州潘美及转运使王明度其地里并省以便民。甲午，初废白州及常乐州。<br /><br />
　　己亥，以参知政事薛居正子惟吉、吕余庆子惟恭、枢密副使沈义伦子继宗并为西头供奉官。<br /><br />
　　丙午，以水灾，遣左司员外郎侯陟等四人，乘传分视民田。<br /><br />
　　隰州团练使、兼晋隰等州沿边都巡检周勋，筑垒北汉界上，北汉人袭破之。戊午，责勋为义州刺史。<br /><br />
　　禁岭南诸州略卖生口。<br /><br />

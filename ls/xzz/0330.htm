<tr><td class="t50">雍熙四年三月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　三月庚辰，诏：“天下知州、通判，先给御前印纸，令书课绩。自今并条其事迹，凡决大狱几何，凡政有不便于时，改而更张，人获其利者几何，及公事不治曾经殿罚，皆具书其状，令同僚共署，无得隐漏。罢官日，上中书考较。”<br /><br />
　　丙戌，上御便殿，对绛州团练副使李度，面赐五品服，仍赐钱十万。度尝知歙州，坐事左迁，十年不调。有中黄门得度歙州所著诗石本，传入禁中，上见之，因问宰相曰：“度今安在？”即召赴阙，寻授虞部员外郎。度进贺雨诗，上特与继和，令宰相召度至中书宣示之。度，洛阳人也。<br /><br />

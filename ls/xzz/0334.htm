<tr><td class="t50">雍熙四年八月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　八月乙未，令诸路转运使及州郡长吏自今并不得擅举人充部内官，其有阙员实时具奏。前所论荐，多涉亲党，故窒其幸门也。<br /><br />
　　外州吏逋在京诸仓官米二十六万七千石，上疑仓吏槩量为奸所致。庚子，诏并除之。<br /><br />
　　己酉，水部员外郎、诸王府侍讲邢昺献分门礼选二十卷。上采其奏，得文王世子篇观之，甚悦，因问入内西头供奉官卫绍钦曰：“昺为诸王讲说，曾及此乎？”绍钦曰：“诸王常时访昺经义，昺每至发明君臣父子之道，必重复陈之。”上益喜，赐昺器币。<br /><br />

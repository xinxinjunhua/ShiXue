<tr><td class="t50">太平兴国二年六月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　六月乙未，磁州言保安等县有黑虫群飞，夜出昼隐，食桑叶殆尽，诏免其桑税。<br /><br />
　　癸卯，知秦州张炳言：“先受诏以仓粟粜与贫民，使者刘文保复赍诏诏臣罢之，民饥益甚，转死沟壑者愈众。臣与文保矫诏开仓，救百姓倒垂之急，愿以属吏。”诏释其罪。<br /><br />
　　全州、颍州言大水坏民庐舍。<br /><br />
　　乙卯，幸开宝寺，遂幸飞龙院，赐从官马，人一匹。<br /><br />
　　己未，江南西路转运司言：“诸州蚕桑少而金价颇低，今折税，绢估小而伤民，金估高而伤官。金上等，旧估两十千，今请估八千。绢上等，旧匹一千，今请估一千三百。余以次增损。”从之。<br /><br />

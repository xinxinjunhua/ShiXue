<tr><td class="t50">雍熙四年七月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　秋七月，诏即内客省使厅事置三班院，以崇仪副使蔚进知院事。（太平兴国六年，初有点检三班公事之名，今始正名曰三班院耳。诸书或云太平兴国中已置三班院者皆误。职官志又云咸平三年始置三班院，真宗实录亦于三年六月乃书名三班曰三班院，今不取。）<br /><br />

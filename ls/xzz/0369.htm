<tr><td class="t50">淳化元年九月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　九月戊寅，以乡贡进士吕蒙叟为郾城县主簿，蒙庄楚邱县主簿，蒙巽沈邱县主簿，皆宰相蒙正诸弟，从其请而命之。初，蒙正父龟图多内宠，与妻刘氏不睦，并蒙正出之，颇沦踬窘乏，刘亦誓志不嫁。及蒙正始仕，乃迎二亲同居异室，奉养并至云。<br /><br />
　　崇仪副使郭载言：“臣前任使剑南，见川、峡富人多招赘壻，与所生子齿，富人死，即分其财，故贫人多舍亲而出赘，甚伤风化而益争讼，望禁之。”诏从其请。<br /><br />

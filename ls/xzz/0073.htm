<tr><td class="t50">乾德三年十月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　冬十月戊申，遣染院副使李光嗣如江南吊祭。（光嗣，未见。）<br /><br />
　　忠州民以鱼为膏，伪蜀时，尝取其算，乙卯，诏除之。<br /><br />
　　己未，太子中舍王沼弃市，坐权知西县受赃枉杀人也。<br /><br />
　　乙丑，令吏部流内铨以见任京西南州县官满一周年者，移注西川南北边，归降人及年七十以上者，勿复移注。<br /><br />

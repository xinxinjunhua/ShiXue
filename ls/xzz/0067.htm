<tr><td class="t50">乾德三年四月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　夏四月辛丑朔，王全斌诱杀蜀兵二万七千人于夹城中。（此据康延泽平蜀实录，与耆旧传合。）<br /><br />
　　诏孟昶先代坟茔无得焚毁，复守冢户，官岁给粟帛充时享。<br /><br />
　　己巳，回鹘遣使来贡方物。<br /><br />
　　壬子，令京城夜漏未及三鼓，不得禁止行人。<br /><br />
　　癸丑，唐主遣使来修贡，贺平蜀也。<br /><br />
　　丙辰，改西川感化、耀武等军并为虎捷。王全斌奏诸军平草寇有功，请备禁旅故也。<br /><br />
　　癸亥，募诸军子弟导五丈河，贯宫城，历后苑，内庭池沼，水皆至焉。<br /><br />
　　乙丑，放洋州义军八百人归农。<br /><br />
　　赐西川行营将士姜茶。<br /><br />

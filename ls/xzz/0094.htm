<tr><td class="t50">乾德五年六月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　六月戊午朔，日有食之。<br /><br />
　　丙子，令诸州通判及钤辖、都监使臣，毋得受所在州官赐外添给钱物。<br /><br />
　　辛巳，幸建隆观，遂幸飞龙院。<br /><br />
　　知施州王仁都敛于民以修贡，甲申，命仁都还民钱。（仁都，未见。）<br /><br />
　　丁亥，知西南蕃南宁州蕃落使龙彦瑫等来贡方物。诏以彦瑫为归德将军、南宁州刺史、蕃落使。又以顺化王子武才为怀化将军。武才弟若启为归德司阶。武龙州部落王子若溢等八人，并为司戈。<br /><br />
</td></tr>

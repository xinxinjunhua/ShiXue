<tr><td class="t50">淳化元年五月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　五月辛卯，令刑部置详覆官六员，专阅天下所上案牍，勿复遣鞫狱。置御史台推勘官二十人，并以京朝官充，若诸州有大狱，则乘传就鞫。辞日，上必临遣，谕旨曰：“无滋蔓，无留滞。”咸赐以装钱。还必召见，问以所推事状，著为彝制。凡满三岁，考其殿最而黜陟之。<br /><br />
　　甲午，诏致仕官有曾历中外职任者，给半俸，以他物充。<br /><br />
　　国初，钱文曰“宋元通宝”，乙未，又改铸“淳化元宝”钱，上亲书其文，作真、草、行三体。自后，每改元必更铸，以年号元宝为文。<br /><br />
</td></tr>

<tr><td class="t50">天圣八年二月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　二月戊子，诏五代时官三品以上告身存者，子孙听用荫，仍须得保官三人。<br /><br />
　　复置韶州乐昌县银铅场。<br /><br />
　　庚寅，置彭州九陇县采金场。明道元年正月己丑，高觌责官，可参考。<br /><br />
　　丙申，上封者言，自今选补僧官，须经四十腊、二十夏以上，仍设六科考试。诏开封府下左右街，具奏以闻。而卒无应格者，乃命次补如旧。<br /><br />
　　乙巳，诏：“文武官当磨勘而隐落公罪者，以违制失论，赃私罪以违制论。公罪徒以上情重者，仍听奏裁。”先是，右班殿直张从恩当磨勘而隐落公罪，杖，坐徒二年，追两官勒停。上以所坐太重，特免追官，而更著此条。<br /><br />

<tr><td class="t50">雍熙二年十月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　冬十月辛丑朔，上录京城诸司系囚，多所原减，决事遂至日旰。近臣或谏以劳苦过甚，上曰：“不然，傥惠及无告，使狱讼平允，不致枉挠，朕意深以为适，何劳之有！”因谓宰相曰：“中外臣僚，若皆留心政务，天下安有不治者。古人宰一邑，守一郡，使飞蝗避境，猛虎渡江。况人君能惠养黎庶，申理冤滞，岂不感召和气乎！朕每自勤不怠，此志必无改易。或云百司细故，帝王不当亲决，朕意则异乎此。若以尊极自居，则下情不得上达矣。”<br /><br />

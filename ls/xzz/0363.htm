<tr><td class="t50">淳化元年二月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　二月己酉，改大明殿为含光殿。<br /><br />
　　辛酉，诏自今游宴，宣召馆职，其集贤、秘阁校理等并令预会。先是，上宴射苑中，三馆学士悉预，李宗谔任集贤校理，阁门吏拒之，不得入。宗谔献诗述其事，故有是诏。<br /><br />
　　国家因唐制，建昭文、史馆、集贤院于禁中。昭文、集贤置大学士、直学士；史馆置监修国史、修撰、直馆，昭文亦置直馆，集贤又有修撰、校理之职，名数虽异，而职务略同。閤门拒校理不得预宴，盖吏失之也。<br /><br />
</td></tr>

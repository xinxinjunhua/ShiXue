<tr><td class="t50">开宝四年八月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　八月甲申，群臣奉表请加尊号曰兴化成功。诏答曰：“余虽以兴化为心，未能力致，傥便以成功自大，是所难安。”群臣再奉表，讫不允。<br /><br />
　　诏广南道伪汉诸宫库务所有课役户，并还本属州县，仍给复二年。<br /><br />

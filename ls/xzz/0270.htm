<tr><td class="t50">太平兴国七年（982）正月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　春正月壬寅，诏翰林学士承旨李昉等详定士庶车服丧葬制度，付有司颁行，违者论其罪。<br /><br />
　　甲寅，以右卫大将军侯赟知灵州。赟既至，按视蕃落，犒以牛酒，戎人悦服，部内甚治。在朔方凡十年，上虽念赟久次，而难其代者，赟竟卒于治所。<br /><br />
　　初，太祖免潭州岁所调纸十年。期满当征，州言民饥，愿竢丰岁乃输，诏并除之。<br /><br />

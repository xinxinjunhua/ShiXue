<tr><td class="t50">端拱元年七月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　上谓宰相曰：“今岁炎暑尤甚。流俗有言，人生如病疟，于大寒大暑中过岁，寒暑迭变，不觉渐成衰老。苟不竞为善事，虚度流年，良可惜也。”秋七月戊戌，谓赵普曰：“卿耆年触热，固应不易。自今长春殿对罢，宜即归私第颐养，俟稍凉乃赴中书视事。”普顿首谢。<br /><br />

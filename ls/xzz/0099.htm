<tr><td class="t50">乾德五年十一月</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　十一月乙酉朔，工部侍郎毋守素免，坐居父昭裔丧纳妾。其兄子岳州司法参军正己告之，正己仍夺一任官。<br /><br />
　　己丑，畋近郊，遂幸金凤园。赐从臣马各一疋。<br /><br />
　　供奉官武仁诲前为嘉州监押，枉杀人，坐弃市。<br /><br />
　　戊戌，日南至，御乾元殿受朝。<br /><br />
　　癸卯，以金水县为怀安军。<br /><br />

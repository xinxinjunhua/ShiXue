<td class="t50">朱学熙传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　朱学熙，字维四，广东清远人。工诗文，为岭海知名士，所著有《禺峡志》行于世。补弘光恩选贡生，素结海上豪族。<br /><br />
　　广东陷，与清远卫谭指挥纠众起义。陈子壮帅义兵围广州，学熙举众自上流应之，断飞来寺峡口，拒北兵援路，南攻三水县，下之。子壮檄授兵部主事。子壮败没，义旅骇散。李成栋来攻，拒守清远县，城破被执，不屈，死之。<br /><br />

<td class="t50">何图复传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　何图复者，广西富川人。父廷相，万历丁未进士，官御史。图复入赀为太学生。粤、楚乱，结砦自保。闻志建之劫胤锡也，密遣人迎胤锡入其砦，赍送赴行在。<br /><br />
　　志建举兵围之，不克。敕授图复监军佥事，令志建释兵。志建佯奉诏，与图复和，诱与相见，执而磔杀之。<br /><br />
</td></tr>

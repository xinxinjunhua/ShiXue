<td class="t50">周师文传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　周师文，字期岐，湖广大冶人。以制义名家，兼工诗，豪隽不屑羁绁。武昌陷，匿兴国山中，潜招义旅。江西反正，师文起兵应之。军败，走九江，文德翼资送之。至吉安，刘季矿为题授职方司主事。<br /><br />
　　时耒阳义民谢照、龙尚可等纠众起抗清，师文入其军，尝以身先士卒掠阵。何腾蛟顾不喜之，师文乃返酃县。盖遇时自江西奔酃、郴间，师文与遇时遇。说令收溃卒，联义旅，图复吉、袁。遇时奉师文监其军。已而遇时意变，欲降清，师文涕泣，称说大义以止之。遇时怒，遂见杀。遇时降。<br /><br />

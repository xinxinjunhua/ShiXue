<td class="t50">朱昌时传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　朱昌时，字若木，直隶广平人。父□□，为沅州判官。清兵至，城守，被擒不屈，遂遇害。昌时早为诸生，稍通吟咏。隆武中，大学士路振飞与昌时同里闬相知闻，荐授推官。<br /><br />
　　永历元年，擢兵部主事。丁艰，居桂林。筑草舍于灵川山中，读书自适。桂林陷，御史吴德操、给事中丁时魁、待诏姚端皆降，为孔有德所赡礼。昌时深匿不出，并日而食，以死自誓。李定国复桂林，昌时同刘远生守桂林。桂林复陷，益走瑶中，愤恚，饥病以卒。<br /><br />

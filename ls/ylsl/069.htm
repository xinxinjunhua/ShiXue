<td class="t50">张孝起传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张孝起，字将子，直隶吴县人。中崇祯壬午乡举。被俘，走闽，授□□知县。李成栋陷广东，分兵略地，孝起婴城守。民溃，敌兵且至，孝起与其妻引缳自缢。其小胥奔救之，其妻已卒。小胥舁孝起走，得达行在，擢吏科给事中，颇以清直著。已而忌丁时魁之先己也，遂与王化澄比，陷时魁、堡，因升都给事中。以意行刑赏，国事炝乱，两粤垂危不恤，师师为狂□，以迄于亡。孝起逃去，不知所终。<br /><br />
　　议者谓小胥之救，差之俄倾，孝起与城俱亡，虽与日月争光可也。晚节不终，徒乱人国，人之不得终为君子，岂亦有命耶！<br /><br />

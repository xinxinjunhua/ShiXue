<td class="t50">郭承吴传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　郭承吴，江西泰和人。故都御史郭子章之孙也。以子章军功，荫授锦衣卫千户。崇祯间，谄事内竖，屡官至都督同知、太子少保。驰驿归里，以货殖豪纵为乡里患。<br /><br />
　　隆武元年，赴闽陛见，以积资掌锦衣卫事。闽陷，走粤，依附拥戴，加左都督。与王坤、马吉翔比。从上至全州，结刘承胤。承胤为请封伯爵，御史毛寿登参劾之，被削。承昊遂得封泰和伯。承昊挟宝玉金币巨万金，女乐十余人，从上至武冈。以女乐分馈承胤、吉翔，相比为奸。江、楚无赖求仕进者皆附之。已而随承胤降清，见杀。<br /><br />

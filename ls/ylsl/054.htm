<td class="t50">朱嗣敏传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　朱嗣敏，字兼五，直隶怀宁人。颇工诗，善行书，以诸生参江督吕大器军谋，用功贡，授衡阳教谕。中湖广丙戌乡举。严起恒奏授中书舍人，历粤、楚军中，改御史，监焦琏、曹志建军，擢佥都御史。方受命，桂平陷。上奔南宁，嗣敏崎岖走贺县，入志建军中，鼓厉志建固守不降。未几，以疾卒。<br /><br />
　　嗣敏文辩有余，非军旅才，其为监督也，坐啸而已。顾守正不媕阿于强帅，张同敞重之。<br /><br />
</td></tr>

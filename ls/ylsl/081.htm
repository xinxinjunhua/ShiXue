<td class="t50">杨进喜传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　杨进喜，陕西延安人。与马进忠俱起，为进忠前营副将。进忠之擒杨么与麻河之战，皆进喜先陷阵，骁勇为三军最。<br /><br />
　　永历三年春，随进忠会何腾蛟于湘潭。清兵猝至，进忠军惊溃。进喜方理发，闻兵溃，大叫起曰：“朝廷不惜高爵养我辈何为？况吾营迎何公至而忍弃之乎！”约发，不及戴兜牟，挥刀驰马出，求腾蛟，与清兵巷遇，相格斗，手刃数人。露额中流矢，贯颅，死。腾蛟遂陷。<br /><br />
</td></tr>

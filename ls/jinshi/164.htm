<td class="t50">耶律涂山传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律涂山，系出遥辇氏，在辽世为显族。涂山仕至金吾卫大将军、遥里相温。辽帝奔天德，涂山以所部降，宗翰承制授尚书，为西北路招讨使。宗翰伐宋，涂山率本部为先锋。至汾州，遇宋将折家军，请济师并力破之。从攻太原、隆德府，从入汴，克洛阳。及从娄室平陕右。<br /><br />
　　天会七年，授太子少保。<br /><br />
　　十年，迁尚书左仆射。致仕，卒，年九十一。<br /><br />
　　正隆例赠特进、郜国公。<br /><br />

<tr><td class="t50">三师三公</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　三师<br /><br />
　　太师、太傅、太保各一员，皆正一品。师范一人，仪刑四海。<br /><br />
　　三公<br /><br />
　　太尉、司徒、司空各一员，皆正一品。论道经邦，燮理阴阳。<br /><br />

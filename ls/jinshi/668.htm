<tr><td class="t50">国史院</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　国史院。（先尝以谏官兼其职，明昌元年诏谏官不得兼，恐于其奏章私溢已美故也。）监修国史，掌监修国史事。修国史，掌修国史，判院事。<br /><br />
　　同修国史二员。（女直人、汉人各一员。承安四年更拟女直一员，罢契丹同修国史。）<br /><br />
　　编修官，正八品。女直、汉人各四员。（明昌二年罢契丹编修三员，添女直一员。大定十八年用书写出职人。）检阅官，从九品。（书写，女直、汉人各五人。）修《辽史》刊修官一员，编修官三员。<br /><br />

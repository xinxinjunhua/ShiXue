<tr><td class="t50">试学士院官</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　试学士院官。大定二十八年，敕设科取士为学士院官。礼部下太常，按唐典，初入学士院例先试，今若于进士已仕者，以随朝六品，外路五品职事官荐，试制诏诰等文字三道，取文理优者充应奉。由是翰苑之选为精。明昌五年，以学士院撰文字人少，命尚书省访有文采者勾取权试之。<br /><br />
</td></tr>

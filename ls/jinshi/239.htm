<td class="t50">神土懑传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　神土懑，本诸宗室，赠银青光禄大夫胡速鲁改子也。年十五，事太宗为左奉宸。<br /><br />
　　皇统二年，充护卫，除武器署丞，累官肇州防御使。<br /><br />
　　大定初，除元帅右都监，与咸平尹吾扎忽率泰州兵及曷懒路兵千五百人，会临潢尹移室懑讨契丹。契丹犯临潢，移室懑死，攻之不能克，乃引众东行。神土懑表乞济师。<br /><br />
　　十二月甲辰，世宗次海滨县，得奏，上曰：“神土懑、吾扎忽军不少，可以从长攻袭矣。”会右副元帅谋衍以大军至，神土懑改曷速馆节度使，隶右翼，与纥石烈志宁败贼于长泺，战霿淞河，皆有功，改婆速路兵马都总管，卒。<br /><br />

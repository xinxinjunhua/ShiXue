<tr><td class="t50">漳河滹沱河志</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　滹沱河<br /><br />
　　大定八年六月，滹沱犯真定，命发河北西路及河间、太原、冀州民夫二万八千，缮完其堤岸。十年二月，滹沱河创设巡河官二员。十七年，滹沱决白马岗，有司以闻，诏遣使固塞，发真定五百里内民夫，以十八年二月一日兴役，命同知真定尹鹘沙虎、同知河北西路转运使徐伟监护。<br /><br />
　　漳河<br /><br />
　　大定二十年春正月，诏有司修护漳河闸，所须工物一切并从官给，毋令扰民。明昌二年六月，漳河及卢沟堤皆决，诏命速塞之。四年春正月癸未，有司言修漳河堤埽计三十八万余工，诏依卢沟河例，招被水阙食人充夫，官支钱米，不足则调碍水人户，依上支给。<br /><br />

<td class="t50">乌延蒲离黑传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　乌延蒲离黑，速频路哲特猛安人，改属合懒路。祖思列，预平乌春、窝谋罕之乱，及伐辽、宋，皆有功，追授猛安，赠银青光禄大夫。父国也，袭猛安。蒲离黑从太祖伐辽，勇闻军中。<br /><br />
　　天眷三年，袭猛安，授宁远大将军，累官武宁军节度使，迁京兆尹。海陵伐宋，行武威军都总管。军还，为顺义军节度使。徒单合喜定秦、陇，蒲离黑统完颜习尼列、颜盏门都兵救德顺州，改延安、平凉尹。致仕，封任国公。<br /><br />
　　大定十九年卒。<br /><br />

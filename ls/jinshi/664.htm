<tr><td class="t50">宣抚司</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　泰和六年置陕西路宣抚使，节制陕西右监军、右都监兵马公事，八年，改陕西宣抚司为安抚司。山东东西、大名、河北东西、河东南北、辽东、陕西、咸平、隆安、上京、肇州、北京凡十处置司。<br /><br />
　　使，从一品。副使，正三品。<br /><br />

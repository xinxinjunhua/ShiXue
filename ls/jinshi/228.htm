<td class="t50">刘徽柔传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘徽柔，字君美，大兴安次人。<br /><br />
　　天眷二年，擢进士第。初为真定栾城主簿，转开远军节度掌书记，迁洪洞令。徽柔明敏善听断。县人杨远者，投牒于县，以为夜雨屋坏，压其侄死，号诉哀切。徽柔熟视而笑曰：“汝利侄财而杀之，乃诬雨耶？”叱付狱，其人立伏曰：“公神明也，不敢延死。”遂置于法。秩满，县人遮恋不得去者弥日，为立生祠，刻石颂德。<br /><br />
　　正隆二年，入为大理评事，迁司直。<br /><br />
　　大定二年，同知河东南路转运使事，以廉第一，改知平定军，入为大理少卿。<br /><br />
　　七年，知磁州，改同知南京留守事。<br /><br />
　　十年，迁中都路转运使，卒官。<br /><br />

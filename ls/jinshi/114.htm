<td class="t50">虞仲文传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　虞仲文字质夫，武州宁远人也。七岁知作诗，十岁能属文，日记千言，刻苦学问。第进士，累仕州县，以廉能称。举贤良方正，对策优等。擢起居郎、史馆修撰，三迁至太常少卿。宰相有左降，仲文独出饯之。或指以为党，仲文乃求养亲。久之，召复前职。宰相荐文行第一，权知制诰，除中书舍人。讨平白霫，拜枢密直学士，权翰林学士，为翰林侍讲学士。<br /><br />
　　年五十五，卒，谥文正。<br /><br />
　　天会七年，赠兼中书令。<br /><br />
　　正隆二年，改赠特进、濮国公。<br /><br />

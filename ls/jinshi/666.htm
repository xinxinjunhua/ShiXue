<tr><td class="t50">司农司</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　司农司。兴定六年置，兼采访公事。<br /><br />
　　大司农一员，正二品。卿三员，正四品。少卿三员，正五品。知事二员，正七品。兴定六年，陕西并河南三路置行司农司，设官五员。正大元年，归德、许州、河南、陕西各置，作三员。卿一员，正四品。少卿一员，正五品。丞一员，正六品。卿以下迭出巡案，察官吏臧否而升黜之。使节所过，奸吏屏息，十年之间民政修举，实赖其力。<br /><br />

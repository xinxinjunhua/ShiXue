<td class="t50">迪姑迭传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　迪姑迭，温迪罕部人。祖扎古乃，父阿胡迭，世为胡论水部长。迪姑迭年二十余代领父谋克，攻宁江州，败辽援兵，获甲马财物。攻破奚营，回至韩州，遇敌二千人，击走之。斡鲁古与辽人战于咸州，兵已却，迪姑迭以本部兵力战，诸军复振，遂大破之。护步答冈之役，乙里补孛堇陷敌中，迪姑迭援出之。攻黄龙府，身被数创，授猛安。<br /><br />
　　天辅七年，从上至山西，病卒，年四十七。<br /><br />
　　天眷中，赠光禄大夫。<br /><br />

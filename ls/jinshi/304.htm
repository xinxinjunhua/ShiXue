<td class="t50">杨伯元传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　杨伯元，字长卿，开封尉氏人。<br /><br />
　　登大定三年进士第，调郾城主簿。升榆次令，召为大理评事，累除定海军节度副使，用廉，超授同知河东北路转运事，入为尚书刑部员外郎，以忧免，起为辽州刺史。明昌元年，移涿州。久之，擢工部侍郎，四迁安武军节度使。<br /><br />
　　泰和三年致仕，卒。<br /><br />
　　伯元以才干多被委注，凡两为推排定课使，累为审录官，人称其平。每有疑狱，必专遣决，明辩多中理。赐谥曰达。<br /><br />
</td></tr>

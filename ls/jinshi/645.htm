<tr><td class="t50">司天医学试科</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　凡司天台学生，女直二十六人，汉人五十人，听官民家年十五以上，三十以下试补。又三年一次，选草泽人试补。其试之制，以《宣明历》试推步，及《婚书》、《地理新书》试合婚、安葬，并《易》筮法，六壬课、三命五星之术。凡医学十科，大兴府学生三十人，余京府二十人，散府节镇十六人，防御州十人，每月试疑难，以所对优劣加惩劝，三年一次试诸太医，虽不系学生，亦听试补。<br /><br />
</td></tr>

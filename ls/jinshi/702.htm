<tr><td class="t50">诸府</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　诸府（谓非兼总管府事者。）<br /><br />
　　尹一员，正三品。同知一员，正四品。少尹一员，正五品。府判一员，从六品。掌纪纲众务，分判吏、户、礼案事，专掌通检推排簿籍。推官一员，正七品。掌同府判兵、刑、工案事。府教授一员。知法一员。（司吏，女直皆三人，汉人，若管十六万户四十人，十四万以上三十八人，十二万以上三十五人，十万以上三十二人，七万以上三十人，五万以上二十五人，三万户以上二十人，不及三万户十七人。译人一人，通事一人，抄事一人，公使七十人。）<br /><br />
</td></tr>

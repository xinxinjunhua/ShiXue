<td class="t50">田颢传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　田颢，字默之，兴中人。辽天庆八年进士，历官金部员外郎，权归德节度使。<br /><br />
　　太祖定燕，颢举四州版图归朝，加都官郎中，权节度使事，四迁知真定府事。招降齐博、游贵等贼众五千余人。已而贵复叛去，颢遣齐博伪叛从贵，因令伺间杀之，降其众，贼垒悉平。三迁行台左丞、彰德军节度使。是时，新定力役，颢蠲籍之半而上之，故相之徭赋比他州独轻。徙同知河北东路都总管，改同签燕京留守司事，民遮留不得出，易服夜去。改河东南路转运使，寻改绛阳军节度使。<br /><br />
　　居三年，以疾请谢事，径解印归。数奏不允，移镇振武军。入为刑部尚书，居三月请老，卒于家。<br /><br />

<td class="t50">夹谷石里哥传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　夹谷石里哥，上京路猛安人。<br /><br />
　　明昌五年进士，泰州防御判官，补尚书省令史，历临潢、婆速路都总管判官，累除刑部主事，改蓟州副提控，驻军大名。俄迁翰林待制，为宿州提控。与山东宣抚完颜弼攻大沫堌，贼众千余逆战，石里哥以骑兵击之，尽殪。提控没烈入自北门，遂擒刘二祖。以功迁武卫军副都指挥使。坐前在宿州掠良人为生口，当死，特诏决杖八十。徙洺州防御使、山东路副统军。坐不时进兵，往宿迁取妻子，解职。起为东平行军提控。<br /><br />
　　兴定元年，破宋兵于宿州，以功遥授安化军节度使，移定海军，卒。<br /><br />

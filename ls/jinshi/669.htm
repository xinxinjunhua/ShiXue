<tr><td class="t50">翰林学士院</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　翰林学士院。（天德二年，命翰林学士院自侍读学士至应奉文字，通设汉人十员，女直、契丹各七员。）<br /><br />
　　翰林学士承旨，正三品。掌制撰词命。凡应奉文字，衔内带“知制诰”。（直学士以上同。）贞祐三年升从二品。翰林学士，正三品。翰林侍读学士，从三品。翰林侍讲学士，从三品。翰林直学士，从四品。不限员。翰林待制，正五品。不限员，分掌词命文字，分判院事，衔内不带“知制诰”。翰林修撰，从六品。不限员，掌与待制同。应奉翰林文字，从七品。<br /><br />

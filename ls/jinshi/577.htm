<tr><td class="t50">乐志序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　《传》曰：“王者功成作乐，治定制礼。”岂二帝三王之弥文哉！盖有天下者，将一轨度、正民俗、合人神、和上下，舍礼乐何以焉。<br /><br />
　　金初得宋，始有金石之乐，然而未尽其美也。及乎大定、明昌之际，日修月葺，粲然大备。其隶太常者，即郊庙、祀享、大宴、大朝会宫县二舞是也。隶教坊者，则有铙歌鼓吹，天子行幸卤簿导引之乐也。有散乐。有渤海乐。有本国旧音，世宗尝写其意度为雅曲，史录其一，其俚者弗载云。<br /><br />

<td class="t50">张用直传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张用直，临潢人。少以学行称。辽王宗干闻之，延置门下，海陵与其兄充皆从之学。<br /><br />
　　天眷二年，以教宗子赐进士及第，除礼部郎中。<br /><br />
　　皇统四年，为宣徽判官，历横海军节度副使，改宁州刺史。海陵即位，召为签书徽政院事、太常卿、太子詹事。海陵尝谓用直曰：“朕虽不能博通经史，亦粗有所闻，皆卿平昔辅导之力。太子方就学，宜善导之。朕父子并受卿学，亦儒者之荣也。”为贺宋国正旦使，卒于汴。海陵深悼惜之，遣使迎护其丧，官给道途费。丧至，亲临奠，赐钱千万。其养子始七岁，特授武义将军。<br /><br />

<td class="t50">阎公贞传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　阎公贞，字正之，大兴宛平人。<br /><br />
　　大定七年擢进士第，调朝邑主簿。由普润令补尚书省令史，察廉，升同知亳州防御事，改中都左警巡使。以政绩闻，迁同知武定军节度使。<br /><br />
　　明昌初，召为大理正，累进大理卿。<br /><br />
　　承安元年，迁翰林侍读学士，仍兼前职，命与登闻检院贾益同看读陈言文字。<br /><br />
　　公贞居法寺几十年，详慎周密，未尝有过举。被命校定律令，多所是正，金人以为法家之祖云。<br /><br />

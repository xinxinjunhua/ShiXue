<tr><td class="t50">逆臣传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　昔者孔子作《春秋》而乱臣贼子惧，其法有五焉：微而显，志而晦，婉而成章，尽而不污，惩恶而劝善。夫惩恶乃所以劝善也，作《逆臣传》。<br /><br />

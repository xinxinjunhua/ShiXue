<tr><td class="t50">金银之税</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　大定三年，制金银坑冶许民开采，二十分取一为税。泰和四年，言事者以金银百分中取一，诸物取三，今物价视旧为高，除金银则额所不能尽该，自余金银可并添一分。诏从之。七年三月，户部尚书高汝砺言：“旧制，小商贸易诸物收钱四分，而金银乃重细之物，多出富有之家，复止三分，是为不伦，亦乞一例收之。”省臣议以为如此恐多匿隐。遂止从旧。<br /><br />

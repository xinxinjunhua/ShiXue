<td class="t50">李师雄传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李师雄，字伯威，雁门人也。有材力，喜谈兵，慕古之英雄，故名师雄。宋宣和中以骑射登科，累官大名、清平尉。王师至大名，师雄与府僚出降，摄本路兵马都监。齐国建，以为大总管府先锋都统制，知淄州。齐废，为汴京马军都虞候，历知宁海军、曹州刺史。<br /><br />
　　皇统二年，为武胜军节度使。<br /><br />
　　正隆末，为河州防御使。宋将吴璘军攻秦、陇，会师雄以事就逮临洮，宋兵至城下，州人乘城拒守，谋欲出降，师雄止之。宋将权仪鞭马方上浮桥，师雄射之，坠于桥下，遂擒权仪，宋师退。后从元帅左监军徒单合喜以兵攻河州，有功。未几，以疾归汴，卒。<br /><br />
</td></tr>

<td class="t50">阿勒根没都鲁传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　阿勒根没都鲁，上京纳邻河人也，后徙咸平路梅黑河。雄伟美须髯，勇毅善射。国初伐辽，没都鲁在军中，领谋克猛安，每遇敌，往来驰突，人莫敢当，故所战皆克。<br /><br />
　　皇统元年，计功擢宣威将军。<br /><br />
　　明年，授同知通远军节度使，改移剌都乣详稳。授世袭本路宁打浑河谋克。为滑州刺史，改肇州防御使、蒲与路节度使，迁骠骑上将车。累官金吾卫上将军。<br /><br />
　　是岁，以年老致仕，卒。年七十三。<br /><br />
</td></tr>

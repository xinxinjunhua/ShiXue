<tr><td class="t50">叛臣传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　古书“畔”与“叛”通，畔之为言界也。《左氏》曰，政犹“农之有畔”，是也。君臣上下之定分，犹此疆彼界之截然，违此向彼，即为叛矣。<br /><br />
　　善恶判于跬步，祸患极于怀襄，吁，可畏哉！作《叛臣传》。<br /><br />

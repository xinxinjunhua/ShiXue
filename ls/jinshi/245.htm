<td class="t50">移剌按答传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　移剌按答，辽横帐人也。父留斡，与耶律余睹俱来降。西京下，复叛，留斡遇害，按答以死事之子，授左奉宸。<br /><br />
　　熙宗初，充护卫，除安州刺史，累官东京副留守。参知政事完颜守道经略北方，摄咸平路屯军都统。入为兵部侍郎，徙西北、西南两路旧设堡戍迫近内地者于极边安置，仍与泰州、临潢边堡相接。除武定军节度使，以招徕边部功迁东北路招讨使，改临潢尹，卒。<br /><br />
　　按答骑射绝伦，善相马，尝论及善射者，世宗曰：“能如卿乎？”阅马于市，见良马，虽羸瘦，辄与善价取之，他日果良马也。<br /><br />

<tr><td class="t50">大理寺</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　大理寺，天德二年置。自少卿至评事，汉人通设六员，女直、契丹各四员。<br /><br />
　　卿，正四品。少卿，从五品。正，正六品。丞，从六品。掌审断天下奏案、详谳疑狱。司直四员，正七品。掌参议疑狱、披详法状。（旧有契丹司直一员，明昌二年罢。）评事三员，正八品。掌同司直。（明昌二年省契丹评事二员，大安二年省汉人一员。）知法十一员，从八品。（女直司五员，汉人司六员。）掌检断刑名事。明法二员，从八品。兴定二年置，同流外，四年罢之。<br /><br />

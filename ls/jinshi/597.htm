<tr><td class="t50">诸妃嫔导从</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　四十人，幞头、绣盘蕉紫衫、涂金束带。妃用偏扇、方扇、团扇各十六，诸嫔各十四，皆宫人执，服云脚纱帽、紫四衤癸衫、束带、绿靴。大伞各一，伞子二人，就用本服锦袄幞带。大长公主导从一十二人，皇妹皇女一十人，并服紫罗绣胸背葵花夹袄、盘裹、幞头、大佩银腰带，牙杖各二。其诸宗室女，各以亲疏差降之。伞制，皇太子三位妃皆青罗表紫里、金浮图，亲王公主王妃金镀银浮图、郡主县主夫人银浮图，皆青表紫里，诸臣下母妻各从其夫子勋封品级用伞。<br /><br />
</td></tr>

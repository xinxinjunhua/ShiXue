<td class="t50">完颜习不主传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　完颜习不主，年十六，从伐宋，攻下怀仁县，功居最。从睿宗经略陕西，以兵七百人入丹州诸山，遇盗三千，击败之。又破贼四千，生擒其将帅。出陇州，以兵四百败敌数千。宋兵七千来取巩州，复击走之。又以五千兵败吴玠之众三万，白塔口遇敌五千，复败之。别降定远等寨。<br /><br />
　　皇统二年，授同知临洮尹，以忧去官。未期，以旧职起复，改孟州防御使，迁临洮尹。复以罪罢。<br /><br />
　　正隆三年，起为京兆尹，改河南尹。卒，年五十八。<br /><br />

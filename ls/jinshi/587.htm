<tr><td class="t50">仪卫志序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　金制，天子之仪卫，一曰立仗，二曰行仗。其卫士，曰护卫、曰亲军、曰弩手，曰控鹤、曰伞子、曰长行。<br /><br />
　　立仗则有殿庭内仗、殿庭外仗，凡大礼、大朝会则用之。其朔望常朝，弩手百人分立两阶而已。<br /><br />
　　行仗则有法驾、大驾、黄麾仗，凡行幸及郊庙祀享则用之。其非大礼远出，则有常行仪卫、宫中导从焉。<br /><br />
　　——大抵模仿宋制，错综增损而用之。其宿卫则见《兵志》云。<br /><br />

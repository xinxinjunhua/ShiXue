<tr><td class="t50">审官院</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　审官院。（承安四年设，大安二年罢之，若注拟失当，上令御史台官论列。）<br /><br />
　　知院一员，从三品。掌奏驳除授失当事。（随朝六品、外路五品以上官除授，并送本院审之。补阙、拾遗、监察虽七品，亦送本院。或御批亦送禀，惟部除不送。）同知审官院事一员，从四品。掌书四人。（女直、汉人各二人，以御史台终场举人辟充。）<br /><br />

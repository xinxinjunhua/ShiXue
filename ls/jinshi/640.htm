<tr><td class="t50">律科</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　律科进士，又称为诸科，其法以律令内出题，府试十五题，每五人取一人。大定二十二年定制，会试每场十五题，三场共通三十六条以上，文理优、拟断当、用字切者，为中选。临时约取之，初无定数。其制始见于海陵庶人正隆元年，至章宗大定二十九年，有司言：“律科止知读律，不知教化之源，可使通治《论语》、《孟子》，以涵养其气度。”遂令自今举后，复于《论语》、《孟子》内试小义一道，府会试别作一日引试，命经义试官出题，与本科通考定之。<br /><br />
</td></tr>

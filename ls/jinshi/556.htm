<tr><td class="t50">武成王庙</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　泰和六年，诏建昭烈武成王庙于阙庭之右，丽泽门内。其制一遵唐旧，礼三献，官以四品官已下，仪同中祀，用二月上戊。七年，完颜匡等言：“我朝创业功臣，礼宜配祀。”于是，以秦王宗翰同子房配武成王，而降管仲以下。又跻楚王宗雄、宗望、宗弼等侍武成王坐，韩信而下降立于庑。又黜王猛、慕容恪等二十余人，而增金臣辽王斜也等。其祭，武成王、宗翰、子房各羊一、豕一，余共用羊八，无豕。宣宗迁汴，余会朝门内阙庭之右营庙如制，春秋上戊之祭仍旧。<br /><br />
</td></tr>

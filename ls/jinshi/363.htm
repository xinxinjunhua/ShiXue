<td class="t50">纥石烈胡失门传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　纥石烈胡失门，上京路猛安人。明昌五年进士，累官补尚书省令史，除中都路支度判官，调河北东路都勾判官，累官翰林直学士、大理卿、右谏议大夫。<br /><br />
　　兴定二年，伐宋，充元帅左都监纥石烈牙吾塔参议官。牙吾塔至楚州，不待行省仆散安贞节制，辄进兵。宋人坚壁不出，野无所掠，军士疲乏，饿死相望，直前至江而复。安贞劾奏之，牙吾塔坐不奉诏约，胡失门不矫正，特诏原之。改同知彰德府事。五迁吏部尚书。<br /><br />
　　五年，拜御史大夫。<br /><br />
　　元光元年，兼大司农。<br /><br />
　　二年，薨，宣宗辍朝，百官致奠。<br /><br />

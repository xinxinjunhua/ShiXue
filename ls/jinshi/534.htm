<tr><td class="t50">高禖</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　明昌六年，章宗未有子，尚书省臣奏行高禖之祀，乃筑坛于景风门外东南端，当阙之卯辰地，与圜丘东西相望，坛如北郊之制。<br /><br />
　　岁以春分日祀青帝、伏羲氏、女娲氏，凡三位，坛上南向，西上。<br /><br />
　　姜嫄、简狄位于坛之第二层，东向，北上。<br /><br />
　　前一日未三刻，布神位，省牲器，陈御弓矢弓韣于上下神位之右。其斋戒、奠玉币、进熟，皆如大祀仪。青帝币玉皆用青，余皆无玉。每位牲用羊一、豕一。有司摄三献司徒行事。<br /><br />
　　礼毕，进胙，倍于他祀之肉。进胙官佩弓矢韣以进，上命后妃嫔御皆执弓矢东向而射，乃命以次饮福享胙。<br /><br />

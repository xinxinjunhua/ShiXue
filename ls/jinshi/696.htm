<tr><td class="t50">太后两宫官属</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　太后两宫官属。正大元年置。<br /><br />
　　卫尉，从三品。副卫尉，从四品。左典禁，右典禁，从五品。奉令，正七品。奉丞，正八品。太仆，正六品。副仆，正七品。门卫二员，正六品。典宝二员，正六品。谒者二员，从六品。阁正，从七品。阁丞，从八品。食官令，正八品。食官丞，正九品。宫令，正八品。宫丞，正九品。医令，正八品。医丞，正九品。饮官令，正八品。饮官丞，正九品。主藏，正八品。副主藏、主廪，从八品。副主廪，正九品。<br /><br />

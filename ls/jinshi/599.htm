<tr><td class="t50">舆服志序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　古者军舆之制，各有名物表识，以祀以封，以田以戎，所以别上下、明等威也。历代相承，互有损益，或因时创始，或袭旧致文，奇巧日滋，浮靡益荡。加以后世便习骑乘，车用盖寡，惟于郊庙祀享法驾导引，为一代令仪而不敢废也。其于先王经世立法之意，寥乎阔哉！<br /><br />
　　金初得辽之仪物，既而克宋，于是乎有车辂之制。熙宗幸燕，始用法驾。迨至世宗，制作乃定，班班乎古矣！<br /><br />
　　考礼文，证国史，以见一代之制度云。<br /><br />

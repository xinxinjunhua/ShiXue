<tr><td class="t50">亲王傔从</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　引接十人，皂衫、盘裹、束带、乘马。牵拢官五十人，首领紫罗袄、素幞头，执银裹牙杖，伞子紫罗团荅绣芙蓉袄、间金花交脚幞头，余人紫罗四衤癸绣芙蓉袄、两边黄绢义襕，并用金镀银束带，幞头同。邀喝四人。伞用青表紫里，金镀银浮图。椅用银裹圈背。水罐、鏾锣、唾盂并用银。郡王牵拢官三十人，未出宫者二十人。国公牵拢官二十人，未出宫者十四人。郡王引接六人，国公四人，未出宫者各减半。人从仪物并依一品职事官制。<br /><br />
</td></tr>

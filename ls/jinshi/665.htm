<tr><td class="t50">劝农使司</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　劝农使司。泰和八年罢，贞祐间复置。兴定六年罢劝农司，改立司农司。<br /><br />
　　使一员，正三品。副使一员，正五品。掌劝课天下力田之事。<br /><br />

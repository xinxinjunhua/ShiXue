<tr><td class="t50">祈禜</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　大定四年五月，不雨。命礼部尚书王竞祈雨北岳，以定州长贰官充亚、终献。又卜日于都门北郊，望祀岳镇海渎，有司行事，礼用酒脯醢。后七日不雨，祈太社、太稷。又七日祈宗庙，不雨，仍从岳镇海渎如初祈。其设神座，实樽罍，如常仪。其樽罍用瓢齐，择甘瓠去柢以为尊。祝版惟五岳、宗庙、社稷御署，余则否。后十日不雨，乃徒市，禁屠杀，断伞扇，造土龙以祈。雨足则报祀，送龙水中。十七年夏六月，京畿久雨，遵祈雨仪，命诸寺观启道场祈祷。<br /><br />
</td></tr>

<tr><td class="t50">荐新</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　天德二年，命有司议荐新礼，依典礼合用时物，令太常卿行礼。正月，鲔，明昌间用牛鱼，无则鲤代。二月，雁。三月，韭，以卵、以葑。四月，荐冰。五月，荀、蒲，羞以含桃。六月，彘肉、小麦仁。七月，尝雏鸡以黍，羞以瓜。八月，羞以芡、以菱、以栗。<br /><br />
　　九月，尝粟与稷，羞以枣、以梨。十月，尝麻与稻，羞以兔。十一月，羞以麕。十二月，羞以鱼。从之。大定三年，有司言：“每岁太庙五享，若复荐新，似涉繁数。拟遇时享之月，以所荐物附于笾豆荐之，以合古者‘祭不欲数’之义。”制可。（牛鱼状似鲔，鲔之类也。）<br /><br />

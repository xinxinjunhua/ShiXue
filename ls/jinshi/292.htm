<td class="t50">斡勒忠传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　斡勒忠，本名宋浦，盖州人也。习女直、契丹字，历兵部、枢密院、尚书省令史，再转大理寺知法，迁右三部司正。练达边事，尝奉命使北，归致马四千余匹，诏褒谕之。<br /><br />
　　大定二十六年，为监察御史，转尚书省都事。章宗立，迁尚书兵部员外郎，出为沧州刺史。河东路提刑副使徒单移刺古举以自代，改滕州刺史。尝调发黄河船，数以稽期听赎。授北京副留守，入为同签枢密院事，兼沂王傅。<br /><br />
　　承安二年，拜武宁军节度使，致仕。<br /><br />
　　泰和三年卒，年七十一。<br /><br />
　　忠性敦悫，通法律，以直自守，不交权贵，故时誉归之。<br /><br />

<td class="t50">高竑传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　高竑，渤海人。以荫补官，累调贵德县尉。提刑司举任繁剧，迁奉圣州录事。察廉，迁内黄令，累官左藏库副使。元妃李氏以皂弊易红币，竑独拒不肯易。元妃奏之。章宗大喜，遣人谕之曰：“所执甚善。今姑与之，后不得为例。”转仪鸾局、少府少监，改户部员外郎、安州刺史。大安中，越王永功判中山，竑以王傅同知府事。改同知河南府，充安抚使。徙同知大名府，兼本路安抚使。<br /><br />
　　贞祐二年，迁河北西路按察转运使，录大名功，迁三官，致仕。<br /><br />
　　兴定四年，卒。<br /><br />
</td></tr>

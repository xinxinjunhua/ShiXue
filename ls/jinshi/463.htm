<tr><td class="t50">佞幸传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　世之有嗜欲者，何尝不被其害哉。龙，天下之至神也，一有嗜欲，见制于人，故人君亦然。嗜欲不独柔曼之倾意也，征伐、畋猎、土木、神仙，彼为佞者皆有以投其所好焉。金主内蛊声色，外好大喜功，莫甚于熙宗、海陵，而章宗次之。<br /><br />
　　《金史》自萧肄至胥持国，得佞臣之尤者七人，皆被宠遇于三君之朝，以亡其身，以蠹其国，其祸皆始于此，可不戒哉。作《佞幸传》。<br /><br />
</td></tr>

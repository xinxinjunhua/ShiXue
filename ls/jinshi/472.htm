<tr><td class="t50">宦者传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　古之宦者皆出于刑人，刑余不可列于士庶，故掌宫寺之事，谓之“妇寺”焉。东汉以来，宦者养子以继世。唐世，继者皆为阉人，其初进也，性多巧慧便僻、善固恩宠，及其得志，党比纠结不可制。东汉以宦者亡，唐又甚焉。世儒论宦者之害，如毒药猛虎之不可拯也。<br /><br />
　　金法置近侍局，尝与政事，而宦者少与焉。惟海陵时有梁珫，章宗时有梁道、李新喜干政，二君为所误多矣。世传梁道劝章宗纳李妃后宫，金史不载梁道始末，弗得而论次之。惟宋珪、潘守恒颇能讽谏宣、哀，时有裨益，盖佣之佼佼、铁之铮铮者也。作《宦者传》。<br /><br />
</td></tr>

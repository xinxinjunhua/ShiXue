<tr><td class="t50">醋税</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　自大定初，以国用不足，设官榷之，以助经用。至二十三年，以府库充牣，遂罢之。章宗明昌五年，以有司所入不允所出，言事者请榷醋息，遂令设官榷之，其课额，俟当差官定之。后罢。承安三年三月，省臣以国用浩大，遂复榷之。五百贯以上设都监，千贯以上设同监一员。<br /><br />

<td class="t50">卢孝俭传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　卢孝俭，宣德州人。登天眷二年第，调宪州军事判官，补尚书省令史，累官太原少尹。<br /><br />
　　大定二年，陕西用兵，尚书省发本路税粟赴平凉充军实，期甚严迫。孝俭辄易以金帛，驰至平凉，用省而不失期，并人称之。用廉，进官二阶，迁同知广宁尹。广宁大饥，民多流亡失业，乃借僧粟，留其一岁之用，使平其价市与贫民，既以救民，僧亦获利。累迁山东东路转运使。孝俭素褊躁，与同僚王公谨失欢。其子尝私用官帑，孝俭不知也。既而改河北西路转运使，公谨乃发其事。孝俭闻被逮，莫测所以，行至章丘，自缢死。<br /><br />

<tr><td class="t50">散乐</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　元日、圣诞称贺，曲宴外国使，则教坊奏之。其乐器名曲不传。皇统二年宰臣奏：“自古并无伶人赴朝参之例，所有教坊人员只宜听候宣唤，不合同百寮赴起居。”从之。章宗明昌二年十一月甲寅，禁伶人不得以历代帝王为戏及称万岁者，以不应为事重法科。泰和初，有司又奏太常工人数少，即以渤海，汉人教坊及大兴府乐人兼习以备用。<br /><br />

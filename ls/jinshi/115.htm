<td class="t50">曹勇义传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　曹勇义，广宁人。第进士，除长春令。枢府辟令史。上书陈时政，累擢馆阁，迁枢密副都承旨，权燕京三司使，加给事中。召为枢密副使，加太子少保。与大公鼎、虞仲文、龚谊友善。与虞仲文同在枢密，群小挤之。复出为三司使，加宣政殿大学士。卒，谥文庄。<br /><br />
　　天会七年，赠守太保。<br /><br />
　　正隆二年，改赠特进、定国公。<br /><br />

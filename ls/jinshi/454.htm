<tr><td class="t50">文艺传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　金初未有文字。世祖以来，渐立条教。太祖既兴，得辽旧人用之，使介往复，其言已文。太宗继统，乃行选举之法，及伐宋，取汴经籍图，宋士多归之。熙宗款谒先圣，北面如弟子礼。世宗、章宗之世，儒风丕变，庠序日盛，士由科第位至宰辅者接踵。当时儒者虽无专门名家之学，然而朝廷典策、邻国书命，粲然有可观者矣。<br /><br />
　　金用武得国，无以异于辽，而一代制作，能自树立唐、宋之间，有非辽世所及，以文而不以武也。<br /><br />
　　《传》曰：“言之不文，行之不远。”文治有补于人之家国，岂一日之效哉。作《文艺传》。<br /><br />

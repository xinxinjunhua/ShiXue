<tr><td class="t50">国初即位仪</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　收国元年春正月壬申朔，诸路官民耆老毕会，议创新仪，奉上即皇帝位。阿离合懑、宗翰乃陈耕具九，祝以辟土养民之意。复以良马九队，队九匹，别为色，并介胄弓矢矛剑奉上。国号大金，建元收国。天会元年九月六日，皇弟谙版孛极烈即皇帝位。己未，告祀天地。丙寅，大赦，改元。<br /><br />
</td></tr>

<tr><td class="t50">宗室及外戚并一品命妇</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　衣服听用明金，期亲虽别籍、女子出嫁并同。又五品以上官母、妻，许披霞帔。唯首饰、霞帔、领袖、腰带，许用明金、笼金、间金之类。其衣服止用明银、象金及金条压绣。正班局分承应带官人，虽未出职系班，其祖母及母、妻、子孙之妇、同籍兄弟之妻、及在室女、孙、姊妹并同。又禁私家用纯黄帐幕陈设，若曾经宣赐鸾舆服御，日月云肩、龙文黄服、五个鞘眼之鞍皆须更改。<br /><br />

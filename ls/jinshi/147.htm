<td class="t50">鹘谋琶传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　鹘谋琶，术吉水斜卯部人也。性忠直宽厚，重节义，勇于战。父阿鹘土，赠金吾卫上将军。<br /><br />
　　穆宗时，鹘谋琶内附，先遣子宁吉从间道送款。遂使活里疃与鹘谋琶合军攻降诸部，因领其众，与弟胡麻谷、浑坦、侄阿里等攻下诸城，从撒改破坞塔城，穆宗屡赏之。破高丽戍兵。与石适欢讨平诸部。蒲察部雅里孛堇与其兄弟胡八、双括等欲叛归辽，鹘谋琶执之，送于康宗，赐赉甚厚。破高丽曷懒甸及下陀鲁城有功。<br /><br />
　　天辅六年卒，年七十二。<br /><br />
　　天眷中，赠银青光禄大夫。<br /><br />

<td class="t50">元弼传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　元弼，字辅宗，魏司空晖之子。性刚正，有文学。位中散大夫。以世嫡应袭先爵。为季父尚书仆射丽因于氏亲宠，遂夺弼王爵，横授同母兄子诞，于是弼绝弃人事，托疾还私第。宣武中为侍中，弼上表固让。入嵩山，以穴为室，布衣蔬食，卒。建元元年，子晖业诉，复王爵。永安三年，追赠尚书令、司徒公，谥曰文献。初，弼尝梦人谓之曰：“君身不得传世封，其绍先爵者，君长子绍远也。”弼觉，即告晖业，终如其言。<br /><br />

<td class="t50">金祚传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　金祚，字神敬，安定人也。性骁雄，尚气任侠。魏正光中，陇右贼起，诏雍州刺史元猛讨之，召募狼家，以为军导，祚应选。以军功累迁龙骧将军、灵州刺史。高祖举义，尔朱天光率关右之众与仲远等北抗义师。天光留祚东秦，总督三州，镇静二州。天光败，归高祖，除车骑大将军。邙山之战，以大都督从破西军。祚除华州刺史，加开府仪同三司，别封临济县子，卒。赠司空。<br /><br />
</td></tr>

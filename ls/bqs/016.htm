<td class="t50">文襄元后传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　文襄敬皇后元氏，魏孝静帝之姊也。孝武帝时，封冯翊公主而归于文襄。容德兼美，曲尽和敬。初生河间王孝琬，时文襄为世子，三日而孝静帝幸世子第，赠锦彩及布帛万匹。世子辞，求通受诸贵礼遗，于是十屋皆满。次生两公主。文宣受禅，尊为文襄皇后，居静德宫。及天保六年，文宣渐致昏狂，乃移居于高阳之宅，而取其府库，曰：“吾兄昔奸我妇，我今须报。”乃淫于后。其高氏女妇无亲疏，皆使左右乱交之于前。以葛为瑴，令魏安德主骑上，使人推引之，又命胡人苦辱之。帝又自呈露，以示群下。武平中，后崩，祔葬义平陵。<br /><br />

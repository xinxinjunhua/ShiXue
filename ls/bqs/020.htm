<td class="t50">后主斛律后传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　后主皇后斛律氏，左丞相光之女也。初为皇太子妃。后主受禅，立为皇后。武平三年正月生女，帝欲悦光，诈称生男，为之大赦。光诛，后废在别宫，后令为尼。齐灭，嫁为开府元仁妻。<br /><br />

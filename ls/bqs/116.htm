<td class="t50">萧祗传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　萧祗，字敬式，梁武弟南平王伟之子也。少聪敏，美容仪。在梁封定襄侯，位东扬州刺史。于时江左承平，政宽人慢，祗独莅以严切，梁武悦之。迁北兖州刺史。太清二年，侯景围建邺。祗闻台城失守，遂来奔。以武定七年至邺，文襄令魏收、邢邵与相接对。历位太子少傅，领平阳王师，封清河郡公。齐天保初，授右光禄大夫，领国子祭酒。时梁元帝平侯景，复与齐通好，文宣欲放祗等还南。俄而西魏克江陵，遂留邺都，卒。赠中书监、车骑大将军、扬州刺史。<br /><br />
</td></tr>

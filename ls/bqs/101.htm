<td class="t50">元斌传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　元斌，字善集，祖魏献文皇帝。父高阳王雍，从孝庄于河阴遇害。斌少袭祖爵，历位侍中、尚书左仆射。斌美仪貌，性宽和，居官重慎，颇为齐文襄爱赏。齐天保初，准例降爵，为高阳县公，拜右光禄大夫。二年，从文宣讨契丹还，至白狼河，以罪赐死。<br /><br />
</td></tr>

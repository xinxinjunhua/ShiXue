<td class="t50">燕子献传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　燕子献，字季则，广汉下洛人。少时相者谓之曰：“使役在胡代，富贵在齐赵。”其后，遇宇文氏称霸关中，用为典签，将命使于茹茹。子献欲验相者之言，来归。高祖见之大悦，尚淮阳公主，甚被待遇。显祖时，官至侍中、开府。济南即位之后，委任弥重，除右仆射。子献素多力，头又少发，当狼狈之际，排众走出省门，斛律光逐而擒之。子献叹曰：“丈夫为计迟，遂至于此矣。”<br /><br />

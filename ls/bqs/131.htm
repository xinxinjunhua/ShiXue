<td class="t50">刘祎传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘祎，字彦英，彭城人。父世明，魏兖州刺史。祎性弘裕，有威重，容止可观，虽昵友密交，朝夕游处，莫不加敬。好学，善《三礼》，吉凶仪制，尤所留心。魏孝昌中，释巾太学博士。累迁睢州刺史，边人服其威信，甚得疆埸之和。世宗辅政，降书褒奖，云：“以卿家世忠纯，奕代冠冕，贤弟贤子，并与吾共事，怀抱相托，亦自依然。宜勖心力，以副所委，莫虑不富贵。”秩满，迳归乡里侍父疾，竟不入朝。父丧，沉顿累年，非杖不起。世宗致辟，祎称疾不动。五子，璿、玘、璞、瑗、瓒，并有志节，为世所称。<br /><br />

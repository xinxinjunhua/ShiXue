<td class="t50">皇甫和传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　皇甫和，字长谐，安定朝那人，其先因官寓居汉中。祖澄，南齐秦、梁二州刺史。父徽，字子玄，梁安定、略阳二郡守。魏正始二年，随其妻父夏侯道迁入魏，道迁别上勋书，欲以徽为元谋。徽曰：“创谋之始，本不关预，虽贪荣赏，内愧于心。”遂拒而不许。梁州刺史羊灵祐重其敦实，表为征虏府司马，卒。和十一而孤，母夏侯氏，才明有礼则，亲授以经书。及长，深沉有雅量，尤明礼仪，宗亲吉凶，多相谘访。卒于济阴太守。<br /><br />
</td></tr>

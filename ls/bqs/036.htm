<td class="t50"> 长乐太守灵山（嗣子伏护）传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　长乐太守灵山，字景嵩，神武族弟也。从神武起兵信都，终于长乐太守。赠大将军、司空，谥曰文宣。子懿，卒于武平镇将，无子，文宣帝以灵山从父兄齐州刺史建国子伏护为灵山后。<br /><br />
　　伏护，字臣援，粗有刀笔。天统初，累迁黄门侍郎。伏护历事数朝，恒参机要，而性嗜酒，每多醉失，末路逾剧，乃至连日不食，事事酣酒，神识恍惚，遂以卒。赠兖州刺史。建国侯孙乂袭。乂少谨。武平末，给事黄门侍郎。隋开皇中，为太府少卿，坐事卒。<br /><br />
</td></tr>

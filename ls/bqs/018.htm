<td class="t50">孝昭元后传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　孝昭皇后元氏，开府元蛮女也。初为常山王妃。天保末，赐姓步六孤。孝昭即位，立为皇后。帝崩，梓宫之邺。始渡汾桥，武成闻后有奇药，追索之不得，使阉人就车顿辱。降居顺成宫。武成既杀乐陵王，元被閟隔，不得与家相知。宫闱内忽有飞语，帝令检推，得后父兄书信，元蛮由是坐免官。后以齐亡入周氏宫中。隋文帝作相，放还山东。<br /><br />
</td></tr>

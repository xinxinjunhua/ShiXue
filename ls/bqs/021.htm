<td class="t50">胡后传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　后主皇后胡氏，陇东王长仁女也。胡太后失母仪之道，深以为愧，欲求悦后主，故饰后于宫中，令帝见之。帝果悦，立为弘德夫人，进左昭仪，大被宠爱。斛律后废，陆媪欲以穆夫人代之，太后不许。祖孝征请立胡昭仪，遂登为皇后。陆媪既非劝立，又意在穆夫人，其后于太后前作色而言曰：“何物亲侄女，作如此语言！”太后问有何言，曰：“不可道。”固问之，乃曰：“语大家云，太后行多非法，不可以训。”太后大怒，唤后出，立剃其发，送令还家。帝思之，每致物以通意。后与斛律废后俱召入内，数日而邺不守。后亦改嫁。<br /><br />
</td></tr>

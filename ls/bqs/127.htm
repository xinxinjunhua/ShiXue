<td class="t50">李构传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李构，字祖基，黎阳人。祖平，魏尚书仆射。构少以方正见称，释褐开府参军，累迁谯州刺史，卒。<br /><br />
　　构从父弟庶，魏大司农谐子。方雅好学，风流规检，甚有家风。稍迁临漳令。《魏书》出，庶与卢斐、王松年等讼其不平，并系狱。魏收书王慧龙自云太原人，又言王琼不善事；卢同附《卢玄传》；李平为陈留人，云其家贫贱。故裴等致讼，语杨愔云：“魏收合诛。”愔党助魏收，遂白显祖罪斐等，并髡头，鞭二百。庶死于临漳狱中，庶兄岳痛之，终身不历临漳县门。<br /><br />

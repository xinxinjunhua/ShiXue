<td class="t50">武兴王普传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　武兴王普，字德广，归彦兄归义之子也。性宽和有度量。九岁，归彦自河州俱入洛，神武使与诸子同游处。天保初，封武兴郡王。武平二年，累迁司空。六年，为豫州道行台、尚书令。后主奔邺，就加太宰。周师逼，乃降。卒于长安。赠上开府、豫州刺史。<br /><br />
</td></tr>

<td class="t50">郑颐传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　郑颐，字子默，彭城人。高祖据，魏彭城守，自荥阳徙焉。颐聪敏，颇涉文义。初为太原公东阁祭酒，与宋钦道特相友爱，钦道每师事之。杨愔始轻宋、郑，不为之礼。俄而自结人主，与参顾命。钦道复旧与济南款狎，共相引致，无所不言。乾明初，拜散骑常侍。二人权势之重，与愔相埒。愔见害之时，邢子才流涕曰：“杨令君虽其人，死日恨不得一佳伴。”颐后与愔同诏追赠殿中尚书、广州刺史。颐弟抗，字子信，颇有文学。武平末，兼左右郎中，待诏文林馆。<br /><br />
</td></tr>

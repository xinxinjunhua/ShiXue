<td class="t50">赵起传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　赵起，字兴洛，广平人也。父达，幽州录事参军。起性沉谨有干用。义旗建，高祖以段荣为定州刺史，以起为荣典签，除奉车都尉。天平中，征为相府骑曹，累加中散大夫。世宗嗣事，出为建州刺史，累迁侍中。起，高祖世频为相府骑兵二局，典知兵马十有馀年。至显祖即阼之后，起罢州还阙，虽历位九卿、侍中，常以本官监兵马，出内驱使，居腹心之寄，与二张相亚。出为西兖州刺史，纠劾禁止，岁馀，以无验获免。河清二年，征还晋阳。三年，又加祠部尚书、开府。天统初，转太常卿，食琅邪郡干。二年，除沧州刺史，加六州都督。武平中，卒于官。<br /><br />
</td></tr>

<td class="t50">厍狄盛传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　厍狄盛，怀朔人也。性和柔，少有武用。初为高祖亲信都督，除伏波将军，每从征讨。以功封行唐县伯，复累加安北将军，幽州刺史，加中军将军，为豫州镇城都督。以勋旧进爵为公，世宗减封二百户，以增其邑。除征西大将军、开府仪同三司、朔州刺史。齐受禅，改封华阳县公。又除北朔州刺史，以华阳封邑在远，随例割并州之石艾县、肆州之平寇县、原平之马邑县各数十户，合二百户为其食邑。未几，例罢，拜特进，卒。赠使持节、都督朔瀛赵幽安五州诸军事、太尉公、朔州刺史。<br /><br />
</td></tr>

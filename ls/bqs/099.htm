<td class="t50">韦子粲传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　韦子粲，字晖茂，京兆人。曾祖阆，魏咸阳守。父隽，都水使者。子粲仕郡功曹史，累迁为大行台郎中，从尔朱天光平关右。孝武入关，以为南汾州刺史。神武命将出讨，城陷，子弟俱破获，送晋阳，蒙放免。以粲为并州长史，累迁豫州刺史，卒。初，子粲兄弟十三人，子侄亲属，阖门百口悉在西魏。以子粲陷城不能死难，多致诛灭，归国获存，唯与弟道谐二人而已。谐与粲俱入国。粲富贵之后，遂特弃道谐，令其异居，所得廪禄，略不相及，其不顾恩义如此。<br /><br />
</td></tr>

<td class="t50">萧放传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　萧放，字希逸，随父祗至邺。祗卒，放居丧以孝闻。所居庐室前有二慈鸟来集，各据一树为巢，自午以前，驯庭饮啄，午后更不下树，每临时，舒翅悲鸣，全似哀泣。家人伺之，未常有阙。时以为至孝之感。服阕，袭爵。武平中，待诏文林馆。放性好文咏，颇善丹青，因此在宫中披览书史及近世诗赋，监画工作屏风等杂物见知，遂被眷待。累迁太子中庶子、散骑常侍。<br /><br />

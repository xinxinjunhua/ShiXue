<td class="t50">广平公盛传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　广平公盛，神武从叔祖也。宽厚有长者风。神武起兵于信都，以盛为中军大都督，封广平郡公。历位司徒、太尉。天平三年，薨于位。赠假黄钺，太尉、太师、录尚书事。无子，以兄子子瑗嗣。天保初，改封平昌王，卒于魏尹。<br /><br />
</td></tr>

<tr><td class="t50">钱惟演改判河南</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　天圣九年正月辛未，改新判陈州钱惟演判河南府。始惟演托疾，久留京师。既除陈州，迁延不赴，且图相位。天章阁待制范讽奏曰：“惟演尝为枢密使，以皇太后姻属罢之，示天下以不私。今固不可复用。”殿中侍御史郭劝亦请督惟演上道。惟演自言先陇在洛阳，愿司宫钥，遂命惟演守河南，促其行。他日讽入对，太后曰：“惟演去矣！”讽曰：“惟演奴仆皆得官，不去尚奚以为？”时惟演弟处州观察使、知定州惟济亦迁武昌留后、知澶州，寻复知定州。劝又言惟演不当与其弟求迁。惟演且就总兵权，乞罢之。不报。<br /><br />

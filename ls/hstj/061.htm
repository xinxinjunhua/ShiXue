<tr><td class="t50">真宗诏诸州府军监建天庆观</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　大中祥符二年十月甲午，诏诸路州、府、军、监、关、县择官地建道观，悉以“天庆”为额。民有愿舍地材创盖者亦听。先是，道教之行，时罕习尚，惟江西、剑南人素崇重。及是，天下始遍有道像矣。殿中侍御史张士逊上言：“今营造竞起，远近不胜其扰。愿因诸旧观为之。”诏从其请。<br /><br />
</td></tr>

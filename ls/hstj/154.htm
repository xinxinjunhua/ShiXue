<tr><td class="t50">仁宗朝广惠仓</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　嘉祐二年八月丁卯，置天下广惠仓。初，枢密使韩琦请罢鬻诸路户绝田募人承佃，以夏、秋所输之课给在城老幼贫乏不能自存者。既建仓，乃诏逐路提点刑狱司专领之，岁终具所支纳上三司，十万户以上留一万石，七万户八千石，五万户六千石，三万户四千石，二万户三千石，万户一千石，不满万户一千石，有余则许鬻之。<br /><br />
</td></tr>

<tr><td class="t50">张士逊得谢</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　康定元年五月。先是，诏御辇院拣下都辇官年四十已下为禁军，辇官千余人携妻子，遮宰相、枢密使喧诉，门下侍郎兼兵部尚书、平章事张士逊方朝，马惊坠地。己未，御史中丞柳植等奏其事，请付有司治。诏枢密院推鞫以闻。时军兴，机务填委，士逊位首相，无所补，谏官以为言。士逊不自安，七上章请老，又数面陈。壬戌，优拜太傅，进封郑国公致仕，听朔望大朝会缀中书门下班，月给宰相俸三之一，出入施伞。又与一子五品服。士逊乞免朝朔望，从之。本朝以宰相得谢者，自士逊始。<br /><br />
</td></tr>

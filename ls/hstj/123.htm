<tr><td class="t50">余靖分司南京</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　庆历六年七月丙申，右正言、知制诰、知吉州余靖为将作少监、分司南京，许居韶州。<br /><br />
　　初，靖为谏官，尝劾奏太常博士茹孝标不孝，匿母丧坐废。靖既失势，孝标因与知谏院钱明逸言靖少游广州，犯法受笞。明逸即劾奏靖不宜在近侍。靖闻之不自安，求侍养去。会朝廷下广州，按得其实：靖初名希古，举进士未得解，曲江主簿善遇之。知韶州者疾主簿，捃其罪无所得，惟得与靖接坐。主簿既以违勅停任，而靖受笞，后乃更名，取解他州及第。案牍具在，故有是命。<br /><br />

<td class="t50">王观传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王观，南京人。博学有才辩。重熙七年，中进士乙科。兴宗崩，充夏国报哀使；还，除给事中。<br /><br />
　　咸雍初，迁翰林学士。五年，兼乾文阁学士。七年，改南院枢密副使，赐国姓，参知政事，兼知南院枢密事。坐矫制修私第，削爵为民，卒。<br /><br />
</td></tr>

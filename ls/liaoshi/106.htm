<td class="t50">耶律谐理传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律谐理，字乌古邻，突举部人。<br /><br />
　　统和四年，宋将杨继业来攻山西，谐理从耶律斜轸击之，常居先锋，侦候有功。是岁，伐宋，宋人拒于滹沱河，谐理率精骑便道先济，获其将康保威，以功诏世预节度使选。<br /><br />
　　太平元年，稍迁本部节度使。<br /><br />
　　六年，从萧惠攻甘州，不克。会阻卜攻围三克军，谐理与都监耶律涅鲁古往救，至可敦城西南，遇敌，不能阵，中流矢卒。<br /><br />

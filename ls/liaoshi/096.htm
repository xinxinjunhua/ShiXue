<td class="t50">耶律奚低传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律奚低，孟父楚国王之后。便弓马，勇于攻战。景宗时，多任以军事。<br /><br />
　　统和四年，为右皮室详稳。时宋将杨继业陷山西郡县，奚低从枢密使斜轸讨之。凡战必以身先，矢无虚发。继业败于朔州之南，匿深林中。奚低望袍影而射，继业堕马。先是，军令须生擒继业，奚低以故不能为功。后太后南伐，屡有战绩。以病卒。<br /><br />
</td></tr>

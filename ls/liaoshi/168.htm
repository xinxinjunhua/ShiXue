<td class="t50">耶律弘古传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律弘古，字胡笃堇，枢密使化哥之弟。统和间，累迁顺义军节度使，入为北面林牙。<br /><br />
　　太平元年，加同政事门下平章事，出为彰国军节度使，兼山北道兵马都部署，徙武定军节度使。<br /><br />
　　六年，拜惕隐。讨阻卜有功。圣宗尝刺臂血与弘古盟为友，礼遇尤异，拜南府宰相，改上京留守。重熙六年，迁南院大王，御制诰辞以宠之。<br /><br />
　　十二年，加于越。帝闵其劳，复授武定军节度使，卒。<br /><br />
　　讣闻，上哭曰：“惜哉善人！”丧至，亲临奠焉。<br /><br />

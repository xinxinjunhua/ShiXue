<td class="t50">部族表</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　司马迁作《史记》，叙四裔于篇末。秦、汉以降，各有其国。延续疆此界，道里云邈。不能混一寰宇，周知种落，邻国聘贡往来，焉能历览。或口传意记，模写梗概耳。<br /><br />
　　辽接五代，汉地远近，载诸简册可考。西北沙漠之地，树艺五谷，衣服车马礼文，制度文为，士产品物，得其粗而失其精。部落之名，姓氏之号，得其音而未得其字。历代踵讹，艰于考索。<br /><br />
　　辽氏与诸部相通，往来朝贡，及西辽所至之地，见于《纪》、《传》亦岂少也哉。其事则书于《纪》，部族则列于《表》云。<br /><br />
　　（表略）<br /><br />

<td class="t50">耶律独攧传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律独攧，字胡独堇，太师古昱之子。<br /><br />
　　重熙初，为左护卫，将禁兵从伐夏有功，授十二行糺司徒。再举伐夏，独攧括山西诸郡马。还，迁拽剌详稳。西南未平，命独攧同知金肃军事。夏人来侵，击败之，进涅剌奥隗部节度使。<br /><br />
　　清宁元年，召为皇太后左护卫太保。四年，改宁远军节度使。东路饥，奏振之。历五国、乌古部、辽兴军三镇节度使，四捷军详稳。<br /><br />
　　大康元年卒，追赠同中书门下平章事。子阿思，有传。<br /><br />

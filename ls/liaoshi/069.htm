<td class="t50">萧海璃传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　萧海璃，字寅的哂，其先遥辇氏时为本部夷离堇。父塔列，天显间为本部令稳。海璃貌魁伟，膂力过人。<br /><br />
　　天禄间，娶明王安端女蔼因翁主。<br /><br />
　　应历初，察割乱，蔼因连坐，继娶嘲瑰翁主。上以近戚，嘉其勤笃，命预北府宰相选。顷之，总知军国事。时诸王多坐反逆，海璃为人廉谨，达政体，每被命按狱，多得其情，人无冤者，由是知名。汉主刘承钧每遣使入贡，必别致币物，诏许受之。年五十卒，帝愍悼，辍朝二日。<br /><br />
</td></tr>

<td class="t50">耶律洼传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律洼，字敌辇，隋国王释鲁孙，南院夷离堇绾思子。少有器识，人以公辅期之。太<br /><br />
　　祖时，虽未官，常任以事。<br /><br />
　　太宗即位，为惕隐。天显末，帝援河东，洼为先锋，败张敬达军于太原北。<br /><br />
　　会同中，迁北院大王。及伐晋，复为先锋，与梁汉璋战于瀛州，败之。<br /><br />
　　太宗崩于栾城，南方州郡多叛，士马困乏，军中不知所为。洼与耶律吼定策立世宗，乃令诸将曰：“大行上宾，神器无主，永康王人皇王之嫡长，天人所属，当立；有不从者，以军法从事。”诸将皆曰：“诺。”<br /><br />
　　世宗即位，赐宫户五十，拜于越。卒，年五十四。<br /><br />

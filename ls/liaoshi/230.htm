<td class="t50">耶律铎鲁斡传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律铎鲁斡，字乙辛隐，季父房之后。廉约重义。<br /><br />
　　重熙末，给事诰院。咸雍中，累迁同知南京留守事。被召，以部民恳留，乃赐诏褒奖。大康初，改西南面招讨使，为北面林牙，迁左夷离毕。大安五年，拜南府宰相。<br /><br />
　　寿隆初，致仕，卒。<br /><br />
　　铎鲁斡所至有声，吏民畏爱。及退居乡里，子普古为乌古部节度使，遣人来迎。既至，见积委甚富。谓普古曰：“辞亲入仕，当以裕国安民为事。枉道欺君，以苟货利，非吾志也。”命驾而归。普古后为盗所杀。<br /><br />

<td class="t50">逆臣传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　《易》曰：“天尊地卑，乾坤定矣；卑高以陈，贵贱位矣。”贵贱位而后君臣之分定，君臣之分定而后天地和，天地和而后万化成。五帝三王之治，用此道也。三代而降，臣弑其君者有之，子弑其父者有之。孔子作《春秋》以寓王法，诛死者于前，惧生者于后，其虑深远矣。欧阳修作《唐书》，创《逆臣传》，盖亦《春秋》之意也。<br /><br />
　　辽叛逆之臣二十有二，迹其事则又有甚焉者，然岂一朝一夕之故哉。列于《传》，所以公天下之贬，以示夫戒云。<br /><br />
</td></tr>

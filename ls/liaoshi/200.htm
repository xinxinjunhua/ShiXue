<td class="t50">萧速撒传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　萧速撒，字秃鲁堇，突吕不部人。性沉毅。重熙间，累迁右护卫太保。蒲奴里叛，从耶律义先往讨，执首乱陶得里以归。清宁中，历北面林牙、彰国军节度使，入为北院枢密副使。咸雍十年，经略西南边，撤宋堡障，戍以皮室军，上嘉之。<br /><br />
　　大康二年，知北院枢密使事。耶律乙辛权宠方盛，附丽者多至通显，速撒未尝造门。乙辛衔之，诬构速撒首谋废立。按之无验，出为上京留守。乙辛复令萧讹都斡以前事诬告，上怒，不复加讯，遣使杀之。时方盛暑，尸诸原野，容色不变，乌鹊不敢近。<br /><br />
　　乾统间，追封兰陵郡王，绘像宜福殿。<br /><br />

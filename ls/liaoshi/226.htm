<td class="t50">能吏传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　汉以玺书赐二千石，唐疏刺史、县令于屏，以示奖率，故二史有《循吏》、《良吏》之传。<br /><br />
　　辽自太祖创业，太宗抚有燕、蓟，任贤使能之道，亦略备矣。然惟朝廷参置国官，吏州县者多遵唐制。历世既久，选举益严。时又分遣重臣巡行境内，察贤否而进退之。是以治民、理财、决狱、弭盗，各有其人。考其德政，虽未足以与诸循、良之列，抑亦可谓能吏矣。作《能吏传》。<br /><br />
</td></tr>

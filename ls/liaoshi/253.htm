<tr>
<td class="t50">耶律娄国传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　娄国，字勉辛，文献皇帝之子。<br /><br />
　　天禄五年，遥授武定军节度使。及察割作乱，穆宗与屋质从林牙敌猎计，诱而出之，娄国手刃察割。改南京留守。穆宗沉湎，不恤政事，娄国有觊觎之心，诱敌猎及群不逞谋逆。事觉，按问不服。帝曰：“朕为寿安王时，卿数以此事说我，今日岂有虚乎？”娄国不能对。<br /><br />
　　及余党尽服，遂缢于可汗州西谷，诏有司择绝后之地以葬。<br /><br />

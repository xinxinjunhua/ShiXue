<td class="t50">舆服</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　自黄帝而降，舆服之制，其来远矣。禹乘四载作小车，商人得桑根之瑞为大辂，周人加金玉，象饰益备。秦取六国仪物，而分别其用，先王之制，置而弗御。至汉中叶，锐意稽古，然礼文之事，名存实亡，盖得十一于千百焉。唐之车辂因周、隋遗法，损益可知。而祭服皆青，朝服皆绛，常服用宇文制，以紫、绯、绿、碧分品秩。五代颇以常服代朝服。<br /><br />
　　辽国自太宗入晋之后，皇帝与南班汉官用汉服；太后与北班契丹臣僚用国服，其汉服即五代晋之遗制也。考之载籍之可徵者，著《舆服篇》，冠诸《仪卫》之首。<br /><br />
</td></tr>

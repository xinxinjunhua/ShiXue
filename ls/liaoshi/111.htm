<td class="t50">萧塔列葛传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　萧塔列葛，字雄隐，五院部人。八世祖只鲁，遥辇氏时尝为虞人。唐安禄山来攻，只鲁战于黑山之阳，败之。以功为北府宰相，世预其选。塔列葛仕开泰间，累迁西南面招讨使。<br /><br />
　　重熙十一年，使西夏，谕伐宋事，约元昊出别道以会。<br /><br />
　　十二年，改右夷离毕、同知南京留守，转左夷离毕，俄授东京留守，以世选为北府宰相，卒。<br /><br />
</td></tr>

<td class="t50">仪卫志序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　辽太祖奋自朔方，太宗继志述事，以成其业。于是举渤海，立敬瑭，破重贵，尽致周、秦、两汉、隋、唐文物之遗馀而居有之。路车法物以隆等威，金符玉玺以布号令。是以传至九主二百馀年，岂独以兵革之利，士马之强哉！文谓之仪，武谓之卫，足以成一代之规模矣。<br /><br />
　　考辽所有舆服、符玺、仪仗，作《仪卫志》。<br /><br />

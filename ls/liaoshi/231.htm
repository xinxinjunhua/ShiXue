<td class="t50">杨遵勖传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　杨遵勖，字益诫，涿州范阳人。重熙十九年登进士第，调儒州军事判官，累迁枢密院副承旨。<br /><br />
　　咸雍三年，为宋国贺正使；还，迁都承旨。天下之事，丛于枢府，簿书填委。遵勖一目五行俱下，剖决如流，敷奏详敏。上嘉之。奉诏征户部逋钱，得四十余万缗，拜枢密直学士，改枢密副使。<br /><br />
　　大康初，参知政事，徙知枢密院事，兼门下侍郎、平章事，拜南府宰相。耶律乙辛诬皇太子，诏遵勖与燕哥按其事，遵勖不敢正言，时议短之。寻拜北府宰相。<br /><br />
　　大安中暴卒，年五十六。赠守司空，谥康懿。<br /><br />
　　子晦，终昭文馆直学士。<br /><br />

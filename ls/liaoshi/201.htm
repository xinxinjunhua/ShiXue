<td class="t50">耶律挞不也传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律挞不也，字撒班，系出季父房。父高家，仕至林牙，重熙间破夏人于金肃军有功，优加赏赉。挞不也清宁中补牌印郎君，累迁永兴宫使。九年，平重元之乱，以功知点检司事，赐平乱功臣，为怀德军节度使。咸雍五年，迁遥辇克。<br /><br />
　　大康三年，授北院宣徽使。耶律乙辛谋害太子，挞不也知其奸，欲杀乙辛及萧特里得、萧十三等。乙辛知之，令其党诬构挞不也与废立事，杀之。乾统间，追封漆水郡王，绘像宜福殿。<br /><br />
</td></tr>

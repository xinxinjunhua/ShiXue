<td class="t50">萧韩家传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　萧韩家，国舅之族。性端简谨愿，动循礼法。<br /><br />
　　清宁中，为护卫太保。<br /><br />
　　大康二年，迁知北院枢密副使。三年，经画西南边天池旧堑，立堡砦，正疆界，刻石而还，为汉人行宫都部署。是年秋猎，堕马卒。<br /><br />
</td></tr>

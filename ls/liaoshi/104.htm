<td class="t50">萧观音奴传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　萧观音奴，字耶宁，奚王搭纥之孙。<br /><br />
　　统和十二年，为右祗候郎君班详稳，迁奚六部大王。<br /><br />
　　先是，俸秩外，给獐鹿百数，皆取于民，观音奴奏罢之。及伐宋，与萧挞凛为先锋，降祁州，下德清军，上加优赏。同知南院事，卒。<br /><br />
</td></tr>

<td class="t50">耶律朔古传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律朔古，字弥骨顶，横帐孟父之后。幼为太祖所养。既冠，为右皮室详稳。从伐渤海，战有功。<br /><br />
　　天显七年，授三河乌古部都详稳。平易近民，民安之，以故久其任。会同间，为惕隐。时晋主石重贵渝盟，帝亲征，晋将杜重威拥众拒滹沱。月余，帝由他渡济。朔古与赵延寿据中渡桥，重威兵却，遂降。是岁，入汴。<br /><br />
　　世宗即位，朔古奉太宗丧归上京，佐皇太后出师，坐是免官，卒。<br /><br />

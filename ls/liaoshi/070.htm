<td class="t50">萧护思传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　萧护思，字延宁，世为北院吏，累迁御史中丞，总典群牧部籍。<br /><br />
　　应历初，迁左客省使。未几，拜御史大夫。时诸王多坐事系狱，上以护思有才干，诏穷治，称旨，改北院枢密使，仍命世预宰相选。护思辞曰：“臣子孙贤否未知，得一客省使足矣。”从之。<br /><br />
　　上晚岁酗酒，用刑多滥，护思居要地，龊龊自保，未尝一言匡救，议者以是少之。年五十七卒。<br /><br />
</td></tr>

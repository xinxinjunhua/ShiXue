<td class="t50">耶律鲁不古传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律鲁不古，字信宁，太祖从侄也。初，太祖制契丹国字，鲁不古以赞成功，授林牙、监修国史。后率偏师，为西南边大详稳，从伐党项有功。会河东节度使石敬瑭为其主所讨，遣人求援，鲁不古导送于朝，如其请。帝亲率师往援，鲁不古从击唐将张敬达于太原北，败之。<br /><br />
　　会同初，从讨党项，俘获最诸将，师还。<br /><br />
　　天禄中，拜于越。六年，为北院大王。终年五十五。<br /><br />
</td></tr>

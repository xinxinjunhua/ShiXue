<td class="t50">萧普达传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　萧普达，字弹隐。统和初，为南院承旨。开泰六年，出为乌古部节度使。<br /><br />
　　七年，敌烈部叛，讨平之，徙乌古敌烈部都监。遣敌烈骑卒取北阻卜名马以献，赐诏褒奖。<br /><br />
　　重熙初，改乌古敌烈部都详稳，讨诸蕃有功。普达深练边事，能以悦使人。有所俘获，悉散麾下，由是大得众心。历西南面招讨使。党项叛入西夏，普达讨之，中流矢，殁于阵。帝闻，惜之，赙赠加厚。<br /><br />
</td></tr>

<td class="t50">杨皙传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　杨皙，字昌时，安次人。幼通《五经》大义。圣宗闻其颖悟，诏试讲，授秘书省校书郎。<br /><br />
　　太平十一年，擢进士乙科，为著作佐郎。<br /><br />
　　重熙十二年，累迁枢密都承旨，权度支使。登对称旨，进枢密副使。历长宁军节度使，山西路转运使，知兴中府。<br /><br />
　　清宁初，入知南院枢密使，与姚景行同总朝政。请行柴册礼。封赵国公。以足疾，复知兴中府。<br /><br />
　　咸雍初，徙封齐，召赐同德功臣、尚书左仆射，兼中书令，拜枢密使，改封晋，给宰相、枢密使两厅傔从，封赵王。屡请归政，益赐保节功臣，致仕。<br /><br />
　　大康五年，例改辽西郡王，薨。<br /><br />

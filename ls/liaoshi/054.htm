<td class="t50">耶律拔里得传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律拔里得，字孩邻，太祖弟剌葛之子。太宗即位，以亲爱见任。<br /><br />
　　会同七年，讨石重贵，拔里得进围德州，下之，擒刺史师居璠等二十七人。<br /><br />
　　九年，再举兵，次滹沱河，降杜重威，战功居多。太宗入汴，以功授安国军节度使，总领河北道事。师还，州郡往往叛，以应刘知远，拔里得不能守而归。<br /><br />
　　世宗即位，迁中京留守，卒。<br /><br />

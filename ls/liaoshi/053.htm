<td class="t50">耶律解里传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律解里，字泼单，突吕不部人，世为小吏。解里早隶太宗麾下，擢为军校。<br /><br />
　　天显间，唐攻定州，既陷，解里为唐兵所获。晋高祖立，始归国。太宗贳其罪，拜御史大夫。<br /><br />
　　会同九年伐晋，师次滹沱河，夺中渡桥，降其将杜重威。上命解里与降将张彦泽率骑兵三千疾趋河南，所至无敢当其锋。既入汴，解里等迁晋主重贵于开封府。彦泽恣杀掠，乱宫掖，解里不能禁，百姓骚然，莫不怨愤。车驾至京，数彦泽罪，斩于市，汴人大悦。解里亦被诘责，寻释之。<br /><br />
　　天禄间，加守太子太傅。<br /><br />
　　应历初，置本部令稳，解里世其职，卒。<br /><br />

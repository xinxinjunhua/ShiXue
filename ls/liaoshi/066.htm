<td class="t50">耶律颓昱传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律颓昱，字团宁，孟父楚国王之后。父末掇，尝为夷离堇。颓昱性端直。会同中，领九石烈部，政济宽猛。世宗即位，为惕隐。<br /><br />
　　天禄三年，兼政事令，封漆水郡王。<br /><br />
　　及穆宗立，以匡赞功，尝许以本部大王。后将葬世宗，颓昱恳言于帝曰：“臣蒙先帝厚恩，未能报；幸及大葬，臣请陪位。”帝由是不悦，寝其议。薨。<br /><br />
</td></tr>

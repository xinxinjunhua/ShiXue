<td class="t50">耶律海里传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律海里，字涅剌昆，遥辇昭古可汗之裔。<br /><br />
　　太祖传位，海里与有力焉。初受命，属籍比局萌觊觎，而遥辇故族尤觖望。海里多先帝知人之明，而素服太祖威德，独归心焉。以故太祖托为耳目，数从征讨。既清内乱，始置遥辇敞稳，命海里领之。<br /><br />
　　天显初，征渤海，海里将遥辇糺破忽汗城。师班，卒。<br /><br />

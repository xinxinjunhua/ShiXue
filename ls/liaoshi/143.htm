<td class="t50">萧塔剌葛传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　萧塔剌葛，字陶哂，六院部人。素刚直。太祖时，坐叔祖台哂谋杀于越释鲁，没入弘义宫。世宗即位，以舅氏故，出其籍，补国舅别部敞史。或言泰宁王察割有无君心。塔剌葛曰：“彼纵忍行不义，人孰肯从！”他日侍宴，酒酣，塔剌葛捉察割耳，强饮之曰：“上固知汝傲狠，然以国属，曲加矜悯，使汝在左右，且度汝才何能为。若长恶不悛，徒自取赤族之祸！”察割不能答，强笑曰：“何戏之虐也！”<br /><br />
　　天禄末，塔剌葛为北府宰相，及察割作乱，塔剌葛醉詈曰：“吾悔不杀此逆贼！”寻为察割所害。<br /><br />

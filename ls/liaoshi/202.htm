<tr>
<td class="t50">萧挞不也传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　萧挞不也，字斡里端，国舅郡王高九之孙。性刚直。<br /><br />
　　咸雍中，补祗候郎君。<br /><br />
　　大康元年，为彰愍宫使，尚赵国公主，拜驸马都尉。<br /><br />
　　三年，改同知汉人行宫都部署。与北院宣徽使耶律挞不也善，乙辛嫉之，令人诬告谋废立事。不胜搒掠，诬伏。上引问，昏聩不能自陈，遂见杀。<br /><br />
　　乾统间，追封兰陵郡王，绘像宜福殿。<br /><br />

<td class="t50">耶律撒剌竹传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　撒剌竹，孟父房涤冽之孙。性凶暴。<br /><br />
　　清宁中，累迁宣徽使，改殿前都点检，首与重元谋乱。会帝猎滦河，重元恐事泄，与扈从军仓卒而战。其子涅鲁古既死，同党溃散。撒剌竹适在畋所，闻乱，劫猎夫以援。既至，知涅鲁古已死，大悔恨之，谓曰：“我辈惟有死战，胡为若儿戏，自取殒灭？今行宫无备，乘夜劫之，大事可济。若俟明旦，彼将有备，安知我众不携贰？一失机会，悔将无及。”<br /><br />
　　重元、萧胡睹等曰：“今夕但可四面围之，勿令外军得入，彼何能备！”<br /><br />
　　不从。迟明，投仗而走，<br /><br />
　　撒剌竹战死。<br /><br />

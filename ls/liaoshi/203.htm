<td class="t50">萧忽古传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　萧忽古，字阿斯怜，性忠直，趫捷有力。甫冠，补禁军。<br /><br />
　　咸雍初，从招讨使耶律赵三讨番部之违命者。及请降，来介有能跃驼峰而上者，以儇捷相诧。赵三问左右谁能此，忽古被重铠而出，手不及峰，一跃而上，使者大骇。赵三以女妻之。帝闻，召为护卫。时北院枢密使耶律乙辛以狡佞得幸，肆行凶暴。忽古伏于桥下，伺其过，欲杀之。俄以暴雨坏桥，不果。后又欲杀于猎所，为亲友所沮。<br /><br />
　　大康三年，复欲杀乙辛及萧得里特等，乙辛知而械系之。考劾不服，流于边。及太子废徙于上京，召忽古至，杀之。<br /><br />
　　乾统初，追赠龙虎卫上将军。<br /><br />

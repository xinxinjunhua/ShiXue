<td class="t50">耶律引吉传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律引吉，字阿括，品部人。父双古，镇西边二十余年，治尚严肃，不殖货利，时多称之。引吉寅畏好义。以荫补官，累迁东京副留守、北枢密院侍御。时萧革、萧图古辞等以佞见任，鬻爵纳贿，引吉以直道处其间，无所阿唯。改客省使。时朝廷遣使括三京隐户不得，以引吉代之，得数千余户。时昭怀太子知北南院事，选引吉为辅导。枢密使乙辛将倾太子，恶引吉在侧，奏出之，为群牧林牙。<br /><br />
　　大康元年，乙辛请赐牧地，引吉奏曰：“今牧地褊狭，畜不蕃息，岂可分赐臣下。”帝乃止。乙辛由是益嫉之，除怀德军节度使，徙漠北猾水马群太保，卒。<br /><br />
</td></tr>

<td class="t50">皇子表</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　帝官天下，王者为焉。至于亲九族，敬五宗，其揆一也。三代以上，封建久长，故吴、鲁、燕、蔡、卫、晋、郑，太史迁既者《世家》，又列《年表》，不厌其详。<br /><br />
　　自汉以降，封建实亡，犹有其名，长世者登《世家》，自绝者置《列传》，然王子侯犹可以年表也，班固以为文无实，并诸侯削年而表，世君子之韪之。自魏以降，不帝不世，王侯身徙数封，朝不谋夕，于是列而传之。功不足以垂法，罪不足以著戒，碌碌然，抑又甚焉。<br /><br />
　　今摘其功罪杰然者列诸《传》；叙亲亲之恩，敬长之义，而无他可书者，略表见之，为《皇子表》。<br /><br />
　　（表略）<br /><br />

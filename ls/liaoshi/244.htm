<td class="t50">耶律合鲁传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律合鲁，字胡都堇，六院舍利褭古直之后。柔佞喜苟合。仕清宁初。时乙辛引用群小，合鲁附之，遂见委任，俄擢南面林牙。乙辛谮皇太子，杀忠直，合鲁多预其谋。弟吾也亦党乙辛，时号“二贼”。乙辛荐为北院大王，卒。<br /><br />
　　吾也亦至南院大王。<br /><br />

<td class="t50">南面分司官</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　平理庶狱，采摭民隐，汉、唐以来，贤主以为恤民之令典。官不常设，有诏，则选材望官为之。<br /><br />
　　分决诸道滞狱使。圣宗统和九年，命邢抱朴等五员，又命马守瑛等三员，分决诸道滞狱。<br /><br />
　　按察诸道刑狱使。开泰五年遣刘泾等分路按察刑狱。<br /><br />
　　采访使。太宗会同三年命于骨邻为采访使。<br /><br />

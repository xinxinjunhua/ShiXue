<td class="t50">高正传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　高正，不知何郡人。<br /><br />
　　统和初，举进士第，累迁枢密直学士。上将伐高丽，遣正先往谕意。及还，迁右仆射。时高丽王询表请入觐，上许之，遣正率骑兵千人迓之。馆于路，为高丽将卓思正所围。正以势不可敌，与麾下壮士突围出，士卒死伤者众。上悔轻发，释其罪。明年，迁工部侍郎，为北院枢密副使。<br /><br />
　　开泰五年卒。<br /><br />
</td></tr>

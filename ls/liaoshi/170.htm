<td class="t50">萧滴冽传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　萧滴冽，字图宁，遥辇鲜质可汗宫人。<br /><br />
　　重熙初，遥摄镇国军节度使。<br /><br />
　　六年，奉诏使宋，伤足而跛，不告遂行，帝怒。及还，决以大杖，降同签南京留守事。遥授静江军节度使，历群牧都林牙，累迁右夷离毕。以才干见任使。会车驾西征，元昊乞降，帝以前后反覆，遣滴冽往觇诚否。因为元昊陈述祸福，听命乃还。拜北院枢密副使，出为中京留守。<br /><br />
　　十九年，改西京留守，卒。<br /><br />

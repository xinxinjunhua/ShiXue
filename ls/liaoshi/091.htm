<td class="t50">武白传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　武白，不知何郡人。为宋国子博士，差知相州，至通利军，为我军所俘。诏授上京国子博士。改临潢县令，迁广德军节度副使。<br /><br />
　　先是，有讼宰相刘慎行与子妇姚氏私者，有司出其罪。圣宗诏白鞫之，白正其事。使高丽还，权中京留守。时慎行诸子皆处权要，以白断百姓分籍事不直，坐左迁。<br /><br />
　　未几，迁尚书左丞，知枢密事，拜辽兴军节度使。致仕，卒。<br /><br />
</td></tr>

<td class="t50">耶律弘古传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律弘古，字盆讷隐，遥辇鲜质可汗之后。统和初，尝以军事任为拽剌详稳，寻徙南京统军使。<br /><br />
　　十三年，徇地南鄙，克敌于四岳桥，斩首百余级。攻宋，以战功迁东京留守，封楚国公。后伐高丽，副先锋耶律盆奴，擒康肇于铜州。<br /><br />
　　三十年，西北部叛，从南府宰相耶律奴瓜讨之。及典禁军，号令整肃，诸部多降。寻迁侍中，卒。<br /><br />
</td></tr>

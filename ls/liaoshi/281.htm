<td class="t50">御帐亲军</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　汉武帝多行幸之事，置期门、佽飞、羽林之目，天子始有亲军。唐太宗加亲、勋、翊、千牛之卫，布腹心之地，防卫密矣。<br /><br />
　　辽太祖宗室盛强，分迭剌部为二，宫卫内虚，经营四方，未遑鸠集。<br /><br />
　　皇后述律氏居守之际，摘蕃汉精锐为属珊军。<br /><br />
　　太宗益选天下精甲，置诸爪牙为皮室军。合骑五十万，国威壮矣。<br /><br />
　　大帐皮室军：太宗置，凡三十万骑。<br /><br />
　　属珊军：地皇后属，二十万骑。<br /><br />
</td></tr>

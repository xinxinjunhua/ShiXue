<td class="t50">萧阳阿传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　萧阳阿，字稍隐。端毅简严，识辽、汉字，通天文、相法。父卒，自五蕃部亲挽丧车至奚王岭，人称其孝。年十九，为本班郎君。历铁林、铁鹞、大鹰三军详稳。<br /><br />
　　乾统元年，由乌古敌烈部屯田太保为易州刺史。幸臣刘彦良尝以事至州，怙宠恣横，为阳阿所沮。彦良归，妄加毁訾，寻遣人代阳阿。州民千余诣阙请留，即日授武安州观察使。历乌古涅里、顺义、彰信等军节度使，权知东北路统军使事。闻耶律狼不、铎鲁斡等叛，独引麾下三十余人追捕之，身被二创，生擒十余人，送之行在。坐不获首恶，免官。<br /><br />
　　未几，权南京留守，卒。<br /><br />

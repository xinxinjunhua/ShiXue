<td class="t50">历象志序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　辽以幽、营立国，礼乐制度，规模日完，授历颁朔二百余年。今奉诏修辽史，体与宋、金似，其《大明历》不可少也。历书法禁不可得，求《大明历》元，得祖冲之法于外史。冲之之法，辽历之所从出也欤？国朝亦尝因之。以冲之法算，而至于辽更历之年，以起元数，是盖辽《大明历》。<br /><br />
　　辽历因是固可补，然弗之补，史贵阙文也。外史纪其法，司天存其职，《辽史》志是足矣。作《历象志》。<br /><br />

<td class="t50">耶律马六传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律马六，字扬隐，孟父楚国王之后。性宽和，善谐谑，亲朋会遇，一坐尽倾。恬于荣利。与耶律弘古为刺血友，弘古为惕隐，荐补宿直官。<br /><br />
　　重熙初，迁旗鼓拽剌详稳。为人畏慎容物，或有面相陵折者，恬然若弗闻，不臧否世务。以故上益亲狎。<br /><br />
　　三年，迁崇德宫使，为惕隐，御制诰辞以褒之。拜北院宣徽使，宠遇过宰辅，帝常以兄呼之。改辽兴军节度使，卒，年七十。<br /><br />
　　子奴古达，终南京宣徽使。<br /><br />

<td class="t50">耶律勃古哲传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律勃古哲，字蒲奴隐，六院夷离堇蒲古只之后。勇悍，善治生。<br /><br />
　　保宁中，为天德军节度使，历南京侍卫马步军都指挥使。以讨平党项羌阿理撒米、仆里鳖米，迁南院大王。圣宗即位，太后称制，会群臣议军国事，勃古哲上疏陈便宜数事，称旨，即日兼领山西路诸州事。<br /><br />
　　统和四年，宋将曹彬等侵燕，勃古哲击之甚力，赐输忠保节致主功臣，总知山西五州。会有告勃古哲曲法虐民者，按之有状，以大杖决之。<br /><br />
　　八年，为南京统军使，卒。<br /><br />
　　子爻里，官至详稳。<br /><br />

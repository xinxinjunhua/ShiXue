<td class="t50">萧阿鲁带传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　萧阿鲁带，字乙辛隐，乌隗部人。父女古，仕至糺详稳。阿鲁带少习骑射，晓兵法。<br /><br />
　　清宁间始仕，累迁本部司徒，改乌古敌烈统军都监。大安七年，迁山北副部署。<br /><br />
　　九年，达理得、拔思母二部来侵，率兵击却之。达理得复劫牛羊去，阿鲁带引兵追及，尽获所掠，斩渠帅数人。是冬，达理得等以三百余人梗边，复战却之，斩首二百余级，加金吾卫上将军，封兰陵县公。<br /><br />
　　寿隆元年，第功，加同中书门下平章事，进爵郡公，改西北路招讨使。<br /><br />
　　乾统三年，坐留宋俘当遣还者为奴，免官。后被征，以老疾致仕，卒。<br /><br />

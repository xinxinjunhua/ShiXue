<td class="t50">耶律奴瓜传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律奴瓜，字延宁，太祖异母弟南府宰相苏之孙。有膂力，善调鹰隼。<br /><br />
　　统和四年，宋杨继业来侵，奴瓜为黄皮室糺都监，击败之，尽复所陷城邑。军还，加诸卫小将军。及伐宋，有功，迁黄皮室详稳。<br /><br />
　　六年，再举，将先锋军，败宋游兵于定州，为东京统军使，加金紫崇禄大夫。从奚王和朔奴伐兀惹，以战失利，削金紫崇禄阶。<br /><br />
　　十九年，拜南府宰相。<br /><br />
　　二十一年，复伐宋，擒其将王继忠于望都，俘杀甚众，以功加同政事门下平章事。<br /><br />
　　二十六年，为辽兴军节度使，寻复为南府宰相。<br /><br />
　　开泰初，加尚父，卒。<br /><br />

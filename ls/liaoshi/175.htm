<td class="t50">萧素飒传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　萧素飒，字特免，五院部人。重熙间始仕，累迁北院承旨，彰愍宫使。<br /><br />
　　清宁初，历左皮室详稳、右夷离毕。<br /><br />
　　咸雍五年，剖阿里部叛，素飒讨降之，率其酋长来朝。帝嘉其功，徙北院林牙，改南院副部署，卒。子谋鲁斡，字回琏，初补夷离毕郎君，迁文班太保。<br /><br />
　　大康中，改南京统军使，为右夷离毕。与枢密使耶律阿思论事不合，见忌，出为马群太保。北部来侵，谋鲁斡破之，以功迁同知乌古敌烈统军，仍许便宜行事。后以谗毁，降领西北路戍军，复为马群太保，卒。<br /><br />

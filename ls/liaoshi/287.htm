<td class="t50">边境戍兵</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　又得高丽《大辽事迹》，载东境戌兵，以备高丽、女直等国，见其守国规模，布置简要，举一可知三边矣。<br /><br />
　　东京至鸭渌西北峰为界：黄龙府正兵五千。咸州正兵一千。<br /><br />
　　东京沿女直界至鸭渌江：军堡凡七十，各守军二十人，计正兵一千四百。<br /><br />
　　来远城宣义军营八：太子营正兵三百。大营正兵六百。蒲州营正兵二百。新营正兵五百。加陀营正兵五百。王海城正兵三百。柳白营正兵四百。沃野营正兵一千。<br /><br />
　　神虎军城正兵一万。大康十年置。<br /><br />
　　——右一府、一州、二城、七十堡、八营，计正兵二万二千。<br /><br />

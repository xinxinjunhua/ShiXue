<td class="t50">耶律滑哥传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　滑哥，字斯懒，隋国王释鲁之子。性阴险。初蒸其父妾，惧事彰，与克萧台哂等共害其父，归咎台哂，滑哥获免。太祖即位，务广恩施，虽知滑哥凶逆，姑示含忍，授以惕隐。<br /><br />
　　六年，滑哥预诸弟之乱。事平，群臣议其罪，皆谓滑哥不可释，于是与其子痕只俱凌迟而死，敕军士恣取其产。帝曰：“滑哥不畏上天，反君弑父，其恶不可言。诸弟作乱，皆此人教之也。”<br /><br />

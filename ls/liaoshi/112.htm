<td class="t50">耶律撒合传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律撒合，字率懒，乙室部人，南府宰相欧礼斯子。天禄间始仕。<br /><br />
　　应历中，拜乙室大王，兼知兵马事。<br /><br />
　　乾亨初，宋来侵，诏以本部兵守南京，与北院大王奚底、统军萧讨古等逆战，奚底等败走，独撒合全军还。上谕之曰：“拒敌当如此。卿勉之，无忧不富贵。”加守太保。<br /><br />
　　统和间卒。<br /><br />
　　＊＊＊<br /><br />
　　论曰：辽在统和间，数举兵伐宋，诸将如耶律谐理、奴瓜、萧柳等俱有降城擒将之功。最后以萧挞凛为统军，直抵澶渊。将与宋战，挞凛中弩，我兵失倚，和议始定。或者天厌其乱，使南北之民休息者耶！<br /><br />
</td></tr>

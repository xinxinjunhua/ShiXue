<td class="t50">耶律侯哂传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律侯哂，字秃宁，北院夷离堇蒲古只之后。祖查只，北院大王。父忽古，黄皮室详稳。侯哂初为西南巡边官，以廉洁称，累迁南京统军使，寻为北院大王。<br /><br />
　　重熙十一年，党项部人多叛入西夏，侯哂受诏，巡西边沿河要地，多建城堡以镇之，徙东京留守。<br /><br />
　　十三年，与知府萧欧里斯讨蒲卢毛朵部有功，加兼侍中。致仕，卒。<br /><br />

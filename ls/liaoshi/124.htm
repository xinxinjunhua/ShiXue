<td class="t50">耶律蒲古传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律蒲古，字提隐，太祖弟苏之四世孙。以武勇称。统和初，为涿州刺史，从伐高丽有功。开泰末，为上京内客省副使。<br /><br />
　　太平二年，城鸭渌江，蒲古守之，在镇有治绩。<br /><br />
　　五年，改广德军节度使，寻迁东京统军使。莅政严肃，诸部慑服。<br /><br />
　　九年，大延琳叛，以书结保州。夏行美执其人送蒲古，蒲古入据保州，延琳气沮。以功拜惕隐。<br /><br />
　　十一年，为子铁骊所弑。<br /><br />

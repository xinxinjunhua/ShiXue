<td class="t50">国乐</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　辽有国乐，犹先王之风；其诸国乐，犹诸侯之风。故志其略。<br /><br />
　　正月朔日朝贺，用宫县雅乐。元会，用大乐；曲破后，用散乐；角觝终之。是夜，皇帝燕饮，用国乐。<br /><br />
　　七月十三日，皇帝出行宫三十里卓帐。十四日设宴，应从诸军随各部落动乐。十五日中元，大宴，用汉乐。<br /><br />
　　春飞放杏埚，皇帝射获头鹅，荐庙燕饮，乐工数十人执小乐器侑酒。<br /><br />

<td class="t50">奸臣传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　《春秋》褒贬，善恶并书，示劝惩也。故迁、固传佞幸、酷吏，欧阳修则并奸臣录之，将俾为君者知所鉴，为臣者知所戒。此天地圣贤之心，国家安危之机，治乱之原也。<br /><br />
　　辽自耶律乙辛而下，奸臣十人，其败国皆足以为戒，故列于《传》。<br /><br />
</td></tr>

<td class="t50">耶律的琭传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律的琭，字耶宁，仲父房之后。习兵事，为左皮室详稳。<br /><br />
　　统和二十八年，伐高丽，的琭率本部军与盆奴等擒康肇、李玄蕴于铜州。帝壮之曰：“以卿英才，为国戮力，真吾家千里驹也！”乃赐御马及细铠。<br /><br />
　　明年，为北院大王，出为乌古敌烈部都详稳。<br /><br />
　　年七十二卒。<br /><br />

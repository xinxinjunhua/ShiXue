<td class="t50">耶律特麽传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律特麽，季父房之后。重熙间，为北克，累迁六部秃里太尉。<br /><br />
　　大安四年，为倒塌岭节度使。顷之，为禁军都监。是冬，讨磨古斯，斩首二千余级。十年，复讨之。既捷，授南院宣徽使。<br /><br />
　　寿隆元年，为北院大王。<br /><br />
　　四年，知黄龙府事，薨。<br /><br />

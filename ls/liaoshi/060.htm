<td class="t50">耶律沤里思传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律沤里思，六院夷离堇蒲古只之后。负勇略，每战被重铠，挥铁槊，所向披靡。<br /><br />
　　会同间，伐晋，上至河而猎，适海东青鹘搏雉，晋人隔水以鸽引去。上顾左右曰：“谁为我得此人？”沤里思请内厩马，济河擒之，并杀救者数人还。上大悦，优加赏赉。既而晋将杜重威逆于望都，据水勒战。沤里思介马突阵，余军继之。被围，众言阵薄处可出，沤里思曰：“恐彼有他备。”竟引兵冲坚而出；回视众所指，皆大堑也。其料敌多此类。<br /><br />
　　是年，总领敌烈皮室军，坐私免部曲，夺官，卒。<br /><br />

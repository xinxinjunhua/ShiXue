<td class="t50">萧常哥传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　萧常哥，字胡独堇，国舅之族。祖约直，同政事门下平章事，父实老，累官节度使。常哥魁伟寡言。年三十余，始为祗候郎君。历本族将军、松山州刺史。<br /><br />
　　寿隆二年，以女为燕王妃，拜永兴宫使。及妃生子，为南院宣徽使，寻改汉人行宫都部署。<br /><br />
　　乾统初，加太子太师，为国舅详稳。<br /><br />
　　二年，改辽兴军节度使，召为北府宰相，以柴册礼，加兼侍中。<br /><br />
　　天庆元年，致仕，卒，谥曰钦肃。<br /><br />

<td class="t50">大康乂传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　大康乂，渤海人。<br /><br />
　　开泰间，累官南府宰相，出知黄龙府，善绥抚，东部怀服。榆里底乃部长伯阴与榆烈比来附，送于朝。且言蒲卢毛朵界多渤海人，乞取之。诏从其请。康乂领兵至大石河驼准城，掠数百户以归。未几卒。<br /><br />
　　＊＊＊<br /><br />
　　论曰：高句骊弑其君诵而立询，辽兴问罪之师，宜其箪食壶浆以迎，除舍以待；而乃乘险旅拒，俾智者竭其谋，勇者穷其力。虽得其要领，而端端独居一海之中自若也。岂服人者以德而不以力欤？况乎残毁其宫室，系累其民人，所谓以燕伐燕也欤？呜呼！朱崖之弃，捐之之力也，敌烈之谏有焉。<br /><br />

<tr>
<td class="t50">耶律塔不也传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律塔不也，仲父房之后。以善击鞠幸于上，凡驰骋，鞠不离杖。咸雍初，补祗候郎君。与耶律乙辛善，故内外畏之。及太子被谮，按无迹，塔不也附乙辛，欲实其诬，与讹都斡等密奏：“太子谋乱事本实，臣不首，恐事觉连坐。”帝信之，废太子。改延庆宫副使。<br /><br />
　　寿隆元年，为行宫都部署。天祚嗣位，以塔不也党乙辛，出为特免部节度使。及枢密使耶律阿思大索乙辛旧党，塔不也以赂获免。徙敌烈部节度使，复为敦睦宫使。<br /><br />
　　天庆元年，出为西北路招讨使。以疾卒。<br /><br />

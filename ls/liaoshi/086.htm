<td class="t50">陈昭衮传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　陈昭衮，小字王九，云州人。工译鞮，勇而善射。统和中，补祗候郎君，为奚拽剌详稳，累迁敦睦宫太保，兼掌围场事。<br /><br />
　　开泰五年秋，大猎，帝射虎，以马驰太速，矢不及发。虎怒，奋势将犯跸。左右辟易，昭衮舍马，捉虎两耳骑之。虎骇，且逸。上命卫士追射，昭衮大呼止之。虎虽轶山，昭衮终不堕地。伺便，拔佩刀杀之。辇至上前，慰劳良久。即日设燕，悉以席上金银器赐之，特加节钺，迁围场都太师，赐国姓，命张俭、吕德懋赋以美之。迁归义军节度使，同知上京留守，历西南面招讨都监，卒。<br /><br />
</td></tr>

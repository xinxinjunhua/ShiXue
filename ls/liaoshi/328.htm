<td class="t50">诸国乐</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　太宗会同三年，晋宣徽使杨端、王朓等及诸国使朝见，皇帝御便殿赐宴。朓起进酒，作歌舞，上为举觞极欢。<br /><br />
　　会同三年端午日，百僚及诸国使称贺，如式燕饮，命回鹘、敦煌二使作本国舞。<br /><br />
　　天祚天庆二年，驾幸混同江，头鱼酒筵，半酣，上命诸酋长次第歌舞为乐。女直阿骨打端立直视，辞以不能。上谓萧奉先曰：“阿骨打意气雄豪，顾视不常，可托以边事诛之。不然，恐贻后患。”奉先奏：“阿骨打无大过，杀之伤向化之意。蕞尔小国，又何能为。”<br /><br />

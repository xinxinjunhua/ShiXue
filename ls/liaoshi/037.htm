<td class="t50">耶律斜涅赤传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律斜涅赤，字撒剌，六院部舍利褭古直之族。始字铎碗，早隶太祖幕下，尝有疾，赐樽酒饮而愈，辽言酒樽曰“撒剌”，故诏易字焉。<br /><br />
　　太祖即位，掌腹心部。<br /><br />
　　天赞初，分迭剌部为北、南院，斜涅赤为北院夷离堇。帝西征至流沙，威声大振，诸夷溃散，乃命斜涅赤抚集之。及讨渤海，破扶余城，斜涅赤从太子大元帅率众夜围忽汗城，大諲歙降。已而复叛，命诸将分地攻之。诘旦，斜涅赤感励士伍，鼓噪登陴，敌震慑，莫敢御，遂破之。<br /><br />
　　天显中卒，年七十，居佐命功臣之一。<br /><br />
　　侄老古、颇德。<br /><br />

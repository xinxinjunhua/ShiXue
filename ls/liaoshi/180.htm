<td class="t50">萧德传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　萧德，字特末隐，楮特部人。性和易，笃学好礼法。太平中，领牌印、直宿，累迁北院枢密副使，敷奏详明，多称上旨。诏与林牙耶律庶成修《律令》，改契丹行宫都部署，赐宫户十有五。<br /><br />
　　清宁元年，迁同知北院枢密使，封鲁国公。上以德为先朝眷遇，拜南府宰相。五年，转南京统军使。<br /><br />
　　九年，复为南府宰相。重元之乱，推锋力战，斩涅鲁古首以献，论功封汉王。<br /><br />
　　咸雍初，以告老归，优诏不许。久之，加尚父，致仕。卒，年七十二。<br /><br />

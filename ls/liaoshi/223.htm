<td class="t50">刘辉传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘辉，好学善属文，疏简有远略。大康五年，第进士。<br /><br />
　　大安末，为太子洗马，上书言：“西边诸番为患，士卒远戍，中国之民疲于飞挽，非长久之策。为今之务，莫若城于盐泺，实以汉户，使耕田聚粮，以为西北之费。”言虽不行，识者韪之。<br /><br />
　　寿隆二年，复上书曰：“宋欧阳修编《五代史》，附我朝于四夷，妄加贬訾。且宋人赖我朝宽大，许通和好，得尽兄弟之礼。今反令臣下妄意作史，恬不经意。臣请以赵氏初起事迹，详附国史。”上<br /><br />
　　嘉其言，迁礼部郎中。诏以贤良对策，辉言多中时病。擢史馆修撰，卒。<br /><br />

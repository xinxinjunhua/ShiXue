<td class="t50">鼓吹乐</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　鼓吹乐，一曰短箫铙歌乐，自汉有之，谓之军乐。《辽杂礼》，朝会设熊罴十二案，法驾有前后部鼓吹，百官卤簿皆有鼓吹乐。<br /><br />
　　前部：<br /><br />
　　鼓吹令二人<br />
　　掆鼓十二<br />
　　金钲十二<br />
　　大鼓百二十<br />
　　长鸣百二十<br />
　　铙十二<br />
　　鼓十二<br />
　　歌二十四<br />
　　管二十四<br />
　　箫二十四<br />
　　笳二十四<br /><br />
　　后部：<br /><br />
　　鼓吹丞二人<br />
　　大角百二十<br />
　　羽葆十二<br />
　　鼓十二<br />
　　管二十四<br />
　　箫二十四<br />
　　铙十二<br />
　　鼓十二<br />
　　箫二十四<br />
　　笳二十四<br /><br />
　　——右前后鼓吹，行则导驾奏之，朝会则列仗，设而不奏。<br /><br />
</td></tr>

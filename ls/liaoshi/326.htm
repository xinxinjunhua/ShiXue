<td class="t50">乐志序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　辽有国乐，有雅乐，有大乐，有散乐，有铙歌、横吹乐。旧史称圣宗、兴宗咸通音律，声气、歌辞、舞节，徵诸太常、仪凤、教坊不可得。按《纪》、《志》、《辽朝杂礼》，参考史籍，定其可知者，以补一代之阙文。<br /><br />
　　呜呼！《咸》、《韶》、《夏》、《武》之乐，声亡书逸，河间作《记》，史迁因以为《书》，寥乎希哉，辽之乐，观此足矣。<br /><br />

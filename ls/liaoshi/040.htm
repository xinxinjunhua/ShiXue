<td class="t50">耶律欲稳传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律欲稳，字辖剌干，突吕不部人。祖台押，遥辇时为北边拽剌。简献皇后与诸子之罹难也，尝倚之以免。太祖思其功不忘，又多欲稳严重有济世志，乃命典司近部，以遏诸族窥觊之想。欲稳既见器重，益感奋思报。太祖始置宫分以自卫，欲稳率门客首附宫籍。帝益嘉其忠，诏以台押配享庙廷。及平剌葛等乱，以功迁奚迭剌部夷离堇。从征渤海有功。<br /><br />
　　天显初卒。<br /><br />
　　后诸帝以太祖之与欲稳也为故，往往取其子孙为友。宫分中称“八房”，皆其后也。<br /><br />
　　弟霞里，终奚六部秃里。<br /><br />

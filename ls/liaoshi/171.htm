<td class="t50">耶律适禄传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律适禄，字撒懒。清宁初，为本班郎君，稍迁宿直官。<br /><br />
　　乾统中，从伐阻卜有功，加奉宸。历护卫太保，改弘义宫副使。时上京枭贼赵钟哥跋扈自肆，适禄擒之，加泰州观察使，为达鲁虢部节度使。<br /><br />
　　天庆中，知兴中府，加金吾卫上将军。为盗所杀。<br /><br />

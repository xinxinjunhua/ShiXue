<td class="t50">萧达鲁古传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　萧达鲁古，遥辇嘲古可汗宫分人。性奸险。<br /><br />
　　清宁间，乙辛为枢密使，窃权用事，阴怀逆谋。达鲁古比附之，遂见奖拔，稍迁至旗鼓拽剌详稳。乙辛欲害太子，以达鲁古凶果可使，遣与近侍直长撒把诣上京，同留守萧挞得夜引力士至囚室，绐以有赦，召太子出，杀之，函其首以归，诈云疾薨。以达鲁古为国舅详稳。达鲁古恐杀太子事白，出入常佩刀，有急召即欲自杀。<br /><br />
　　乾统间，诏枢密使耶律阿思大索乙辛党人，达鲁古以赂获免。后以疾卒。<br /><br />
</td></tr>

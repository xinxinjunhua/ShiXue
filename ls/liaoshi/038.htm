<td class="t50">耶律老古传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　老古，字撒懒，其母淳钦皇后姊也。老古幼养宫掖，既长，沉毅有勇略，隶太祖帐下。既即位，屡有战功。<br /><br />
　　剌葛之乱也，欲乘我不备为掩袭计，绐降。太祖将纳之，命老古、耶律欲稳严号令，勒士卒，控辔以防其变。逆党知有备，惧而遁。以功授右皮室详稳，典宿卫。<br /><br />
　　太祖侵燕、赵，遇唐兵云碧店，老古恃勇轻敌，直犯其锋。战久之，被数创，归营而卒。太祖深悼惜之，佐命功臣其一也。<br /><br />
</td></tr>

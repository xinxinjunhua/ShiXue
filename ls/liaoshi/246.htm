<td class="t50">萧讹都斡传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　萧讹都斡，国舅少父房之后。咸雍中，补牌印郎君。<br /><br />
　　大康三年，枢密使乙辛阴怀逆谋，乃令护卫太保耶律查剌诬告耶律撒剌等废立事。诏按无状，皆补外。顷之，讹都斡希乙辛意，欲实其事，与耶律塔不也等入阙诬首：“耶律撒剌等谋害乙辛，欲立皇太子事，臣亦预谋。今不自言，恐事泄连坐。”帝果怒，徙皇太子于上京。讹都斡尚皇女赵国公主，为驸马都尉。后与乙辛议不合，衔之，复以车服僣拟人主，被诛。讹都斡临刑，语人曰：“前告耶律撒刺事，皆乙辛教我。恐事彰，杀我以灭口耳！”<br /><br />

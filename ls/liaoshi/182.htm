<td class="t50">萧乐音奴传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　萧乐音奴，字婆丹，奚六部敞稳突吕不六世孙。父拔剌，三岁居父母丧，毁瘠过甚，养于家奴奚列阿不。<br /><br />
　　重熙初，兴宗猎奚山，过拔剌所居，奚列阿不言于近臣，拔剌得见上。年甫十岁，气象如成人。帝悦之，锡赉甚厚。既长，有远志，不乐仕进，隐于奚王岭之插合谷。上以其名家，又有时誉，就拜舍利军详稳。乐音奴貌伟言辨，通辽、汉文字，善骑射击鞠，所交皆一时名士。年四十，始为护卫。平重元之乱，以功迁护卫太保，改本部南克，俄为旗鼓拽剌详稳。监障海东青鹘，获白花者十三，赐榾柮犀并玉吐鹘。拜五蕃部节度使，卒。<br /><br />
　　子阳阿，有传。<br /><br />

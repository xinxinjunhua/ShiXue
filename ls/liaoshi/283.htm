<td class="t50">大首领部族军</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　辽亲王大臣，体国如家，征伐之祭，往往置私甲以从王事。大者千余骑，小者数百人，著籍皇府。国有戎政，量借三五千骑，常留余兵为部族根本。<br /><br />
　　太子军。<br />
　　伟王军。<br />
　　永康王军。<br />
　　于越王军。<br />
　　麻答军。<br />
　　五押军。<br /><br />

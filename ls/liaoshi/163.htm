<td class="t50">耶律速撒传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律速撒，字阿敏，性忠直简毅，练武事。应历初，为侍从，累迁突吕不部节度使。历霸、济、祥、顺、圣五州都总管，俄为敦睦宫太师。<br /><br />
　　保宁三年，改九部都详稳。<br /><br />
　　四年，伐党项，屡立战功，手诏劳之。<br /><br />
　　统和初，皇太后称制，西边甫定，速撒务安集诸蕃，利害辄具以闻，太后益信任之。凡临戎，与士卒同甘苦，所获均赐将校。赏顺讨逆，威信大振。<br /><br />
　　在边二十年卒。<br /><br />
</td></tr>

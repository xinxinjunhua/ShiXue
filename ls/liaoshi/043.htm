<td class="t50">萧痕笃传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　萧痕笃，字兀里轸，迭剌部人。其先相遥辇氏。<br /><br />
　　痕笃少慷慨，以才能自任。早隶太祖帐下，数从征讨。既践阼，除北府宰相。痕笃事亲孝，为政尚宽简。<br /><br />

<td class="t50">耶律敌剌传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律敌剌，字合鲁隐，遥辇鲜质可汗之子。太祖践阼，与敞稳海里同心辅政。太祖知其忠实，命掌礼仪，且诿以军事。后以平内乱功，代辖里为奚六部吐里，卒。<br /><br />
　　敌剌善骑射，颇好礼文。<br /><br />
</td></tr>

<td class="t50">萧得里特传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　萧得里特，遥辇洼可汗宫分人。善阿意顺色。清宁末，乙辛用事，甚见引用，累迁北面林牙、同知北院宣徽使事。及皇太子废，遣得里特监送上京。得里特促其行，不令下车，起居饮食数加陵侮，至则筑圜堵囚之。<br /><br />
　　大康中，迁西南招讨使，历顺义军节度使，转国舅详稳。<br /><br />
　　寿隆五年，坐怨望，以老免死，阖门籍兴圣宫，贬西北统军司，卒。<br /><br />
　　二子：得末、讹里，乾统间以父与乙辛谋，伏诛。<br /><br />

<td class="t50">耶律仙童传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律仙童，仲父房之后。重熙初，为宿直官，累迁惕隐、都监。以宽厚称。蒲奴里叛，仙童为五国节度使，率师讨之，擒其帅陶得里。又击乌隗叛，降其众，改彰国军节度使，拜北院大王。<br /><br />
　　清宁二年，知黄龙府事，迁侍卫亲军马步军都指挥，历忠顺、武定二军节度使。致仕，封蒋国公。<br /><br />
　　咸雍初，徙封许国，卒。<br /><br />

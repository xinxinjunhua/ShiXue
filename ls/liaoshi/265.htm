<td class="t50">古迭传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　古迭，本宫分人，不知姓氏。好戏狎，不喜绳检。膂力过人，善击鞠。重熙初，为护卫，历宿直官。<br /><br />
　　十三年，西征，以古迭为先锋。夏人伏兵掩之，古迭力战，麾下士多殁，乃单骑突出。遇夏王李元昊来围，势甚急。古迭驰射，应弦辄仆，跃马直击中坚，夏兵不能当，晡乃还营。改兴圣宫太保。<br /><br />
　　清宁九年，从重元、涅鲁古乱，与扈从兵战，败而遁，追擒之，陵迟而死。<br /><br />

<td class="t50">耶律朗传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　朗，字欧新，季父房罨古只之孙。性轻佻，多力，人呼为“虎斯”。天显间以材勇进，每战辄克，由是得名。<br /><br />
　　会同九年，太宗入汴，命知澶渊，控扼河渡。<br /><br />
　　天禄元年，燕、赵已南皆应刘知远，朗与汴守萧翰弃城归阙。先是，朗祖罨古只为其弟辖底诈取夷离堇，自是族中无任六院职事者；世宗不悉其事，以朗为六院大王。及察割作乱，遣人报朗曰：“事成矣！”朗遣详稳萧胡里以所部军往，命曰：“当持两端，助其胜者。”<br /><br />
　　穆宗即位，伏诛，籍其家属。<br /><br />

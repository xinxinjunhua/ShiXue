<td class="t50">耶律合里只传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律合里只，字特满，六院夷离堇蒲古只之后。<br /><br />
　　重熙中，累迁西南面招讨都监。充宋国生辰使，馆于白沟驿。宋宴劳，优者嘲萧惠河西之败。合里只曰：“胜负兵家常事。我嗣圣皇帝俘石重贵，至今兴中有石家寨。惠之一败，何足较哉！”宋人惭服。帝闻之曰：“优令失辞，何可伤两国交好！”鞭二百，免官。<br /><br />
　　清宁初，起为怀化军节度使。<br /><br />
　　七年，入为北院大王，封豳国公。历辽兴军节度使、东北路详稳，加兼侍中。致仕，卒。<br /><br />
　　合里只明达勤恪，怀柔有道。置诸宾馆及西边营田，皆自合里只发之。<br /><br />

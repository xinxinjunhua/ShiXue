<td class="t50">文学传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　辽起松漠，太祖以兵经略方内，礼文之事固所未遑。及太宗入汴，取晋图书、礼器而北，然后制度渐以修举。至景、圣间，则科目聿兴，士有由下僚擢升侍从，骎骁崇儒之美。但其风气刚劲，三面邻敌，岁时以蒐浯为务，而典章文物，视古犹阙。<br /><br />
　　然二百年之业，非数君子为之综理，则后世恶所考述哉？作《文学传》。<br /><br />

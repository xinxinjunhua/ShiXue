<td class="t50">耶律牒蜡传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　牒蜡，字述兰，六院夷离堇蒲古只之后。天显中，为中台省右相。<br /><br />
　　会同元年，与赵思温持节册晋帝。及我师伐晋，至滹沱河，降晋将杜重威，牒蜡功居多。<br /><br />
　　大同元年，平相州之叛，斩首数万级。世宗即位，遣使驰报，仍命牒蜡执偏将术者以来。其使误入术者营，术者得诏，反诱牒蜡，执送太后。牒蜡亡归世宗。和约既成，封燕王，为南京留守。<br /><br />
　　天禄五年，察割弑逆，牒蜡方醉，其妻扶入察割之幕，因从之。明旦，寿安王讨乱，凡胁从者皆弃兵降；牒蜡不降，陵迟而死。妻子皆诛。<br /><br />

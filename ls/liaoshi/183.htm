<td class="t50">耶律敌烈传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耶律敌烈，字撒懒，采访使吼五世孙。宽厚好学，工文词。重熙末，补牌印郎君，兼知起居注。<br /><br />
　　清宁元年，稍迁同知永州事，禁盗有功，改北面林牙承旨。九年，重元作乱，敌烈赴援，力战平之，遥授临海军节度使。十年，徙武安州观察使。咸雍五年，累迁长宁宫使。捡括户部司乾州钱帛逋负，立出纳经画法，公私便之。<br /><br />
　　大康四年，为南院大王。秩满，部民请留，同知南京留守事。有疾，上命乘传赴阙，遣太医视之。迁上京留守。<br /><br />
　　大安中，改塌母城节度使。以疾致仕，加兼侍中，赐一品俸。八年卒。<br /><br />

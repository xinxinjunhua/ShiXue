<td class="t50">契丹國志提要補正</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　胡玉縉<br /><br />
　　契丹國志二十七卷。「忽而內宋，則或稱遼帝，或稱國主；忽而內遼，則以宋帝年號分注遼帝年號之下，既自相矛盾。」<br /><br />
　　案：卷首載乾隆四十六年諭云：「甚至大書遼帝紀元於上，而以宋祖建隆等年號分注於下，尤為紕繆。」竊謂書既名契丹國志，則以遼紀年即公羊「地從主人」之例。提要於此處，但議其矛盾，不斥其紕繆，頗見斟酌。<span class="zs">〔四庫全書總目提要補正上冊卷十七。〕</span><br /><br />
</td></tr>

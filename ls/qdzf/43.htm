<tr><td>
<br />
　　章鈺<br /><br />
　　據藝芸精舍校本，每半葉十一行，行二十二字，疑出原式，唐翰題書衣題語謂「從元刊本影出」，或當有據，今藏海豐吳氏，乙卯（一八五五年）三月備校，五日訖事。章鈺。<br /><br />
　　四庫提要云：「仰遵聖訓，改正胡安國謬說。」又黃蕘圃跋元刻本云：「其上方有小字標明書中眼目」。是掃葉源出閣本，故不存胡說。<br /><br />
　　汪鈔校本與黃跋符合，鷦菴定為從元本出，昭然無可疑，海豐吳氏又藏舊鈔大金國志一部，行格與契丹國志上方小字標目亦同，知二書必有同刻之本也。<br /><br />

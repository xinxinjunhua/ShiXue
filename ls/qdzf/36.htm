<tr><td>
<br />
　　杭世駿<br /><br />
　　契丹國志二十七卷，淳熙七年秘書丞葉隆禮表進。其劉六符、耶律余覩諸傳及諸番雜記全襲洪氏松漠紀聞，晉出帝降表暨東丹王傳又割五代史以成文。其與他書異者，惟王沂公、富鄭公行程錄，文獻通考雖載其目，而其書已亡，得此為不墜於地。至胡嶠陷北記，五代史、遼史間一稱引之，此獨載其全，為可寶也。<br /><br />
　　<span class="zs">〔道古堂文集卷二十六。〕</span><br /><br />

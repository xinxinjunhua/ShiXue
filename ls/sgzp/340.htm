<td class="t50">刘惇传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘惇字子仁，平原人也。遭乱避地，客游庐陵，事孙辅。以明天官达占数显于南土。每有水旱寇贼，皆先时处期，无不中者。辅异焉，以为军师，军中咸敬事之，号曰神明。<br /><br />
　　建安中，孙权在豫章，时有星变，以问惇，惇曰：“灾在丹杨。”权曰：“何如？”曰：“客胜主人，到某日当得问。”是时边鸿作乱，卒如惇言。<br /><br />
　　惇于诸术皆善，尤明太乙，皆能推演其事，穷尽要妙，著书百馀篇，名儒刁玄称以为奇。惇亦宝爱其术，不以告人，故世莫得而明也。<br /><br />
</td></tr>

<tr><td class="t50">刘秉直传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘秉直，字清臣，大都武清人。<br /><br />
　　至正八年，为卫辉路总管，平徭役，兴教化。贼劫汲县民聚钞一千二百锭而杀之，贼不获，秉直祷城隍祠，使人伺于死所，忽有村民阿莲者，战怖仆地，具言贼之姓名及所在，遂得贼于汴。正其罪。<br /><br />
　　秋七月，螟生，民患之，秉直祷八蜡祠，虫皆自死。岁大饥，人相食，死者过半，秉直出俸米，倡富民分粟，馁者食之，病者与药，死者与棺以葬。天不雨，秉直诣太行山之苍峪神祠，具词祈祝，有青蛇蜿蜒而出，观者异之。及还行数里，雷雨大至，秩满，以亲老去官。卒于家。<br /><br />

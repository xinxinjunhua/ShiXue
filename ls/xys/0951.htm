<tr><td class="t50">戴良齐熊禾传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　戴良齐，字彦肃，台州人，精通六经奥义，谓经书虽皆完具，而《礼经》独为残阙，加以汉儒诸说抵牾者多，著《礼辨》一书，特出已见，考证独为明确。吴澄常师之，以衍其说。<br /><br />
　　※<br /><br />
　　熊禾，字去非，福建建阳人。有志濂洛之学，受业于朱子之门人辅广。宋咸淳间进士，宁武州司户参军。<br /><br />
　　宋亡，隐居不仕，筑云谷书院以教生徒。郡有考亭书院，大德十一年有司更新之，辟禾分教大小学于中，学者称勿轩先生。<br /><br />
　　皇庆元年卒。<br /><br />

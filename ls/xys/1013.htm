<tr><td class="t50">萨都剌传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　萨都剌，字天锡，笞失蛮氏，后徙居河间。萨都剌本朱氏子，其父养为己出。弱冠，成泰定四年进士，授应奉翰林文字。擢御史于南台，以弹劾权贵，左迁镇江隶事司达鲁花赤。历淮西廉访司经历。<br /><br />
　　至正三年，擢江浙行省郎中。迁江南行台侍御史。明年，左迁淮西江北道经历。<br /><br />
　　诗才清丽，名冠一时，虞集雅重之。晚年，寓居武林。每风日晴好，则肩一杖，挂瓢笠，踏芒蹻，凡深岩邃壑，无不穷其幽胜，兴至则发为诗歌。著有《雁门集》八卷，《西湖十景词》一卷。后入方国珍幕府，卒。<br /><br />
</td></tr>

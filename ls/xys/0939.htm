<tr><td class="t50">儒林传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　自赵复至中原，北方学者始读朱子之书。许衡、萧&#15034;讲学，为大师，皆诵法朱子者也。金祥履私淑于朱子之门人，许谦又受业于履祥。朱子之学，得履祥与谦而益尊，迨南北混一，衡为国子祭酒，谦虽屡聘不起，为朝廷所礼敬。承学之士，闻而兴起，《四书章句集注》及《近思录》《小学》通行于海内矣。<br /><br />
　　延祐开科，遂以朱子之书为取士之规程，终元之世，莫之改易焉。是故元之儒者，服膺朱子之学，笃信谨守，言行相顾，无后世高谈性命，阳儒阴释之习，呜乎！是亦足以通六经之大义，传孔、孟之心法矣。作《儒林传》。<br /><br />

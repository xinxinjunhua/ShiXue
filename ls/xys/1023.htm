<tr><td class="t50">陶宗仪传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　陶宗仪，字九成，黄岩人。父煜为福建行院都事。宗仪幼好古，洒浇不凡。少举进士，一不中即弃去。工文章，尤刻意字学。<br /><br />
　　至正间，浙帅泰不华、南台御史丑闾辟举行人校官，皆不就。艺圃一区，躬耕之暇，以笔墨自随，时辍耕树阴，抱膝而叹，每记一事，辄摘叶书之，贮一破盎，去则埋于树根，人莫能测。如是者十年，遂累盎至数十。<br /><br />
　　一日，尽发其藏，萃而录之，合三十卷，题曰《南村辍耕隶》。<br /><br />
　　又有《说郛》一百卷，《书史会要》九卷，《四书备遗》二卷。其未脱稿者不与焉。<br /><br />

<tr><td class="t50">宇文公谅传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　宇文公谅，字子贞，其先成都人，父挺祖徙湖州。公谅弱冠有操行，嘉兴富民延为子弟师。夜将半，有叩门者，问之，乃一妇人，公谅叱去。翼日即辞归。<br /><br />
　　至顺四年，登进士第，授徽州路同知婺源州事。改同知余姚州事。省檄察实松江海淤田，公谅以潮汐不常，后必遗患，请一概免科，省臣从之。除国子助教，调应奉翰林文字、同知制诰，兼国史院编修官。改佥岭南廉访司事，以疾请老。<br /><br />
　　公谅平居，虽暗室必正衣冠端坐。尝挟手记一册，昼有所为，夜必书之，其不可书即不敢为。门人私谥曰纯节先生。<br /><br />

<tr><td class="t50">阿老瓦丁传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　阿老瓦丁，西域木发里人，世祖至元八年，遣使征炮匠于宗王阿八哈，以阿老瓦丁、亦思马因应诏。首造火炮置于五门前，帝命试之，各赐衣段。<br /><br />
　　十一年，阿里海涯伐宋，奏乞炮手匠。命阿老瓦丁往，破潭州、静江等路。<br /><br />
　　十五年，授管军总管。<br /><br />
　　十七年，入觐，赐钞五千贯。<br /><br />
　　十八年，屯田南京。<br /><br />
　　二十二年，改元帅府为回回炮手军匠上万户，以阿老瓦不为副万户。<br /><br />
　　大德四年，告老，以子富谋只袭职。<br /><br />

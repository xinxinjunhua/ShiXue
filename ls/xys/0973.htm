<tr><td class="t50">武恪传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　武恪，字伯威，宣德人。吴澄为江西儒学提举，荐入国学。<br /><br />
　　明宗在潜邸，选为说书秀才，及出镇云南，而恪从行。明宗至陕西，欲起兵，恪谏曰：“太子南行，于国为君命，于家为叔父命，何可违也？若向京师发一矢，史官必书太子反，不可悔矣！”左右恶其言，遣之归。<br /><br />
　　隐居教授。文宗知其名，除秘书典簿。秩满，丁忧。再除中瑞司典簿，改汾西尹，皆不就。至正间，泰不花举为沁水县尹。亦不赴。近臣又荐为授经郎，恪阳为疾病，不与人接。或问：“先生之学，何以为本？”恪曰：“以敬为本。”著有《水云集》。卒于家。<br /><br />

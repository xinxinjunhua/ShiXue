<tr><td class="t50">苏津传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　苏津，滕州人。兄润，金末起义兵。累迁怀远大将军，滕州太守。孛鲁攻滕州，润巡城中流矢，卒。城降。<br /><br />
　　时津为杞县丞，弃官归。东平总管石天禄，津之乡人也，招之为沛县兵马都总领兼分治县令。津安辑流亡，沛人德之。迁武显将军，左监军，同知滕州。<br /><br />
　　中统三年，李璮据济南叛，宋人乘衅遣夏贵袭陷蕲，宿等城。当从张禧援之。所至号令严明，市不易肆。阿术鲁上功，擢定远大将军，左副元帅兼睢州知州，卒于官。<br /><br />
</td></tr>

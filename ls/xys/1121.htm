<tr><td class="t50">天文志序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　郭守敬创制诸仪表，台官遵用百年，测验之精，远逾前代。于是日食、月五星凌犯，与夫彗孛、飞流之躔次，凡台官所测者，毕上于中书省，而载于中书之日历。虽不论占候，然元之季世，太史尚豫推林咎，因事上言。意者司天所掌，其书禁秘，故轶而不传欤？<br /><br />
　　今仍旧史之文，为《天文志》，又据本纪订其疏脱。盖旧志与本纪所书者，皆出于日历也。观天察变之君子，庶几有取焉。<br /><br />

<tr><td class="t50">隐逸传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　《易·蛊》之上九曰：“不事王侯，高尚其事。”后汉严子陵、魏管幼安，其人也。孔子称为逸民者七人，能考论者，伯夷、叔刘、柳下惠而已。三子者，岂与山林遁也之士，同其志事诸哉。自斯以降，列于隐逸者，其人有二：惓惓故国，不仕新朝，自附于夷、齐者也；穷居伏处，修天爵而有人爵，合于蛊上九之义者也。<br /><br />
　　宋之亡也，士大夫多以节概相高。谢皋羽、郑所南，其尤著者，所谓不降、不辱者与！张特立，金人，而受知于世祖，然不食元禄，亦其次也。杜瑛、杜本、张枢、王鉴，隐居不仕，庶几高尚其志者。今类次诸人，为《隐逸传》，以务尚论者之采焉。<br /><br />
</td></tr>

<tr><td class="t50">马成龙传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　马成龙，成都广都人，宋濠州团练使。<br /><br />
　　大军至临安，宋谢太后诏内外悉罢兵内附，成龙奉常德府版籍以降。召见，赐金符，授昭勇大将军、昭军安抚使。徇湖南、江西、广东西诸路，皆下之，迁昭毅大将军、招讨使。寻拜辅国上将军、海北海南道宣慰使。<br /><br />
　　大军征交趾，公私烦费，成龙主馈运，事办而民不扰，又出新意，造大舰数十，名日海哨马，师赖以济。卒，年六十六。<br /><br />
　　子兴祖，明威将军、镇巢万户，战殁；寿祖，临川县尹；复祖，袭万户。<br /><br />

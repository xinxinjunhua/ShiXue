<tr><td class="t50">许维桢传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　许维桢，字周卿，遂州人。<br /><br />
　　至元十五年，为淮安总管府判官。属县盐城及丁溪场，有二虎为害，维桢祷于神祠，一虎去，一虎死祠前。境内旱蝗，维桢祷而雨，蝗亦息。是年冬，无雪，父老言于维桢曰：“冬无雪，民多疾，奈何？”维桢曰：“吾当为尔祷。”已而雪深三尺。<br /><br />
　　朝廷闻其事，未及擢用而卒，年四十四。<br /><br />

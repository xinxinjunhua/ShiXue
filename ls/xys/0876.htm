<tr><td class="t50">合剌不花传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　合剌不花，杰烈宜氏，台州路达鲁花赤。与许谦友善，其为学，以诚意不欺为主。<br /><br />
　　至正四年，迁徽州路达鲁花赤。合剌不花廉平自持，专务以德化民。徽州六县输永丰仓粟，吏官攫攘，病民最甚，合剌不花亲临监视，通其利害缓急，旧弊尽除。尝曰：“法所以防奸，事苟办集，不用法可也。”官事毕，则携一羊皮，坐于山颠水浚，歌咏终日。有讼者就决于途。或自渐诬罔而退。<br /><br />
　　考绩为天下第一，赐衣锦一袭，且布告诸路，使知所劝。后去官，卒于家。<br /><br />

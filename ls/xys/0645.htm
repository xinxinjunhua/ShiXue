<tr><td class="t50">苗好谦传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　苗好谦，东平城武人。大德中，由大宗正府都事累擢佥江北淮南道廉访司事。弹劾不法，甚有名誉。<br /><br />
　　至大二年，佥淮西道廉访司事，献种桑之法：分农民为三等，上户地十亩，中户五亩，下户二亩或一亩，周筑垣墙，以时收采桑椹，依法种之。武宗善之，颁其法于各路。<br /><br />
　　延祐三年，以好谦所至种桑，皆有成效，申命各路著为令。入为司农丞。<br /><br />
　　五年，大司农买住等进好谦所撰《栽桑图说》，帝曰；“农桑衣食之本，此图甚善。”命刊印千帙散之。<br /><br />
　　后迁江北淮南道廉记使，卒于官。<br /><br />

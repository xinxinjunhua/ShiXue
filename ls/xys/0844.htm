<tr><td class="t50">刘济传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘济，字巨川，真定行唐人。父信，宋义兵都统，战殁。<br /><br />
　　济，中统初，以荐擢中书左曹掾，迁磨勘官。真定民郭文运告白、萧二人杀其父，岁久不决，命济往谳之。不终日，而虚实辨，真定人称为神明。<br /><br />
　　至元七年，授太原总管府判官。会大水，川泽泛溢，济相度形势，凿渠以泄水势。自是无漂没之患。九年，擢献州知州。下车。罪囚累累，济裁判五日，狱讼一空。迁佥燕南河北道提刑按察司事。十六年，卒。<br /><br />
　　子珪，大名路总管，亦有能名。<br /><br />

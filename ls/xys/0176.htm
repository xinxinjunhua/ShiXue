<tr><td class="t50">铁迈赤传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　铁迈赤，合鲁氏，善骑射。初事忽兰皇后帐前为桐马官。从太祖定西夏。又从皇子阔出、行省铁木答儿定河南，累有战功。<br /><br />
　　宪宗伐宋，遣元帅兀良哈台自云南捣宋，与诸军合。时世祖方围鄂州。闻兀良哈台至长沙，遣铁迈赤将劲卒千人，铁骑三千迎之。兀良哈台得援，始抵江夏，世祖即位，从讨阿里不哥于昔木土之地。<br /><br />
　　至元七年，授蒙古诸万户府奥鲁总管。<br /><br />
　　十九年，卒。<br /><br />
　　子八人，虎都铁木禄最显。<br /><br />

<tr><td class="t50">刘彭寿传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘彭寿，眉州人。<br /><br />
　　父渊，经术深邃，事母以孝闻。著有《读易记》、《易学须知》、《春秋例义》、《春秋续传记》、《左氏记事本末》等书。用荐为永州路学正，卒。<br /><br />
　　彭寿有俊才，延祐三年进士，授桂阳路平阳县丞，转岳州路行用库使，擢建德路淳安县尹。每月朔日，辄幅巾深衣，升座讲书，淳安士庶听讲无惰容。卒年六十四。<br /><br />
　　彭寿教学者，必以经术为本。为文，先义理，而后词章。著有《四书提要》、《春秋泽存》《春秋正经句释》。<br /><br />
</td></tr>

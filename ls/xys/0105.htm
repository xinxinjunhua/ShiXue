<tr><td class="t50">爱牙赤传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　爱牙赤，世祖第六子。<br /><br />
　　至元二十二年，赐银印。<br /><br />
　　二十四年，叛王势都儿犯咸平，爱牙赤率宣慰使塔出，自沈州北讨，命宣慰使亦力撒合分兵趋懿州，寇遁去。后病卒。<br /><br />
　　元贞初，其子孛颜帖木儿入朝，赐金帛如诸王大会例。所部在兀剌海路，地硗瘠贫乏，泰定元年移镇阔连东部。孛颜帖木儿之兄曰阿木干，阿木干子曰也的古不花，泰定中亲信用事，车驾幸上都，与中书省臣兀伯都剌等居守焉。<br /><br />

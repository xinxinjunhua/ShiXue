<tr><td class="t50">关保传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　关保，河南人。至正间为总兵野庵裨将。时山西盗起，调守泽、潞，与百户虎林赤破贼于泽州。及高平，又擒贼首刘子才。擢后部侍郎，赐龙衣、金帛有差。从察罕帖木儿攻汴梁，以功如同佥检枢密院事。<br /><br />
　　二十七年，拜中书平章政事，分省济宁。<br /><br />
　　二十八年，朝廷以扩廓帖木儿抗命，封关保国公，命与貊高同攻扩廓帖木儿。师次太原，扩廓帖木儿自平阳来，袭禽貊高、关保，皆杀之。<br /><br />
</td></tr>

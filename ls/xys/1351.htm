<tr><td class="t50">宣圣庙祭服</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　宣圣庙祭服：献官法眼，七梁冠三，簪全。鸦青袍三，绒锦绶绅三，各带青绒网并锔环二。方心曲领三，蓝结带三，铜佩三，红罗裙三，白绢中单三，红罗蔽膝三，革履三，白绢袜全。<br /><br />
　　执事儒服，软角唐巾，白襕插领，黄鞓角带，皂靴各九十有八。<br /><br />
　　大德十年六月，全州儒学学正涂庆安呈：“春秋释奠，天寿圣节行礼，诸儒诸各服唐巾、襕带。学正师儒之官却以常服到班陪祀，似无旌别，路府州学正，合无与巡检案牍吏目典史一体制造服色。”礼部议从之。<br /><br />

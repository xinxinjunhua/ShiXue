<tr><td class="t50">失鲁孩传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　失鲁孩那颜，沼兀列台氏。从太祖同饮巴泐渚纳水。授千户，统沼兀列部从征诸国。卒于河西。<br /><br />
　　子麦吉，从太祖平金。<br /><br />
　　孙麦里，从定宗平乞卜察克、阿速、斡罗斯诸国。又从宪宗征蜀。<br /><br />
　　中统初，诸王禾忽附阿里不可，麦里以为上初即位，而禾忽为乱首，不可不诛。与共弟桑忽答儿帅所部讨之。一月八战，夺所掠札刺亦儿台，塔塔儿诸部民而还。桑忽答儿为禾忽所杀。帝闻，遣使者以银钞羊马迎致麦里，赐号答剌罕。寻卒。<br /><br />
　　子秃忽鲁。<br /><br />

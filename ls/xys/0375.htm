<tr><td class="t50">月举连赤海牙传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　月举连赤海牙，畏兀氏。从宪宗攻合州，奉命修药曲以疗疫，赏白金五十两。又从皇子忙哥都征云南。<br /><br />
　　中统三年，火都暨答离叛，从大军讨平之。<br /><br />
　　至元十二年，佩虎符，为陇右河西道提刑按察使。番酋兀朗孩、火石颜谋为从，从皇子安西王讨平之。<br /><br />
　　十五年，与伯速带讨平土鲁蕃，皇子赐衣带、金碗。<br /><br />
　　十七年，进嘉议大夫。<br /><br />
　　二十年，进中奉大夫、四川行省参知政事。寻以疾归秦州。<br /><br />
　　大德八年，卒。<br /><br />
　　至顺中，赠推忠宣力定远功臣、资善大夫、陕西行省左丞、护军，追封威宁郡公，谥襄靖。<br /><br />

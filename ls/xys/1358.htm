<tr><td class="t50">皇帝玺宝</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　中统二年，定用御宝制。宣命：一品、二品用玉，三品至五品用金。其文曰“皇帝行宝”者，即位时所制，惟用之诰敕。别铸宣命金宝行之。<br /><br />
　　至元六年，作玉玺大小十纽，其制未闻。<br /><br />
　　天历二年，作玉玺二：一曰天历之宝，一曰金章国宝，命虞集篆文。<br /><br />
　　至正元年，诏刻宣文、至正二宝。<br /><br />
　　九年，作至正珍秘小玉印，又作小玉玺二：一曰明政殿宝，一曰洪禧，命杨瑀篆文。洪禧玺，纯白，龟纽黑色。<br /><br />
　　皇太后、皇后皆玉宝，皇太子金宝。<br /><br />
　　至大元年，仁宗为皇太子受金宝，遣使求四方经籍，以玉刻印章，近侍掌之。<br /><br />

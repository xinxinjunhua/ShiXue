<tr><td class="t50">康里传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　康里亦曰康邻，古高车之后，赤狄之馀种也。或曰其先为匈奴之甥。无总汗，各有君长。迁徙随水草，衣皮，食肉，牛羊畜牧与蠕蠕同，惟车轮高大，轮辐至多。后徙于鹿浑海西北，或谓其部侵掠他族，虏获骑不胜负。有部人能制车高大，胜重载，故以高车名其部云。蒙古初，康里之名始著其地，直咸海北，而西及于里海，与钦察为邻。<br /><br />
　　太祖十六年，命哲别、速不台讨钦察。十九年，乘胜东入，康里部众迸散，与钦察并为皇子术赤封地。<br /><br />

<tr><td class="t50">历志·立成</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　至元十九年，郭守敬以《授时历》虽颁行，然立成之数尚无定稿，乃比类编次，整齐分秒，裁为二卷。《明志》据监本题：太史令臣王恂奉敕撰，谓恂之稿本，守敬卒成之。监本久轶，然《明志》所载《大统通轨》之立成，则出于守敬原书无疑也。今采附《历经》之后，以备步七政盈缩迟疾者之用焉。<br /><br />
　　太阳盈初缩未限立成（冬至前后二象限同用）<br /><br />
　　（表略）<br /><br />

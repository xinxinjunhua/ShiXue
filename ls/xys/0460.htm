<tr><td class="t50">虎益传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　虎益，河西人。父穆苏和勒善，为夏兀纳城钤部官，首出降。从李恒父惟忠，隶于诸王哈札尔，官淄川军民总管。卒。<br /><br />
　　益，姓其祖名为虎氏，从讨李璮有功，赐鞍马、弓矢、甲胄。以承事郎、知万户府事，从恒下襄阳。<br /><br />
　　又从徇地江西，破刘槃、熊飞诸军，凡定江西州七、福建州三、广东州十四，护送宋丞相文天祥至京师，擢中顺大夫、龙兴路达理花赤，历抚州、袁州、微州三路。累擢少中大夫。乞病归。<br /><br />
　　卒于家。<br /><br />

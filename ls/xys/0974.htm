<tr><td class="t50">刘庄孙传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘庄孙，字正仲，天台人。在大学五年，不获释褐，以诸生卒。喜著书。《尚书》有古文、今文，陈振孙掇拾援据，确然明白，言传心者犹依违不敢置论。庄孙愤然曰：“吾不能接响相附和，各为论者，不没其实。”<br /><br />
　　著《书传》上下篇，二十卷。又著《易志》十卷，《诗传音指补》二十卷，《周官集传》二十卷，《春秋本义》二十卷，诗文集曰《芳润稿》，共五十卷，《和陶诗》一卷。<br /><br />

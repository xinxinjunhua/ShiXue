<tr><td class="t50">托克帖木儿传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　托克帖木儿，术赤第十三子。分地在浮而嗄河上，后忙哥帖木耳赐以克雷木、几富两地。其后人因在喀散、喀西莫甫、克雷木三地立国称汗。以分地南北俱近金斡尔朵，故拔都后王嗣位之际，托克帖木儿后王恒起而相争。<br /><br />
　　＊＊＊<br /><br />
　　史臣曰：术赤可谓骁将，非治国之才。太祖不传位于术赤宜也。或疑其惭于察合台，不亦诬乎。拔都为宗王之长，又建大功，拥戴宪宗以安社稷。宗子维城，拔都无愧焉。<br /><br />
</td></tr>

<tr><td class="t50">戚崇增传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　戚崇增，字仲咸，金华人。少好学，能为诗、古文辞。年二十七，始尽弃其学，从同县许谦游。<br /><br />
　　著有《春秋学讲》一卷，《春秋纂例原指》三卷，《四书仪对》二卷，《复古编》一卷，《昭穆图》一卷，《历代指掌图》一卷。以经籍之文传写讹舛，乃考许慎《说文》，参以近代诸儒之所订，用古文写《易》、《书》、《诗》、《仪礼》、《春秋》、《孝经》、《论语》、《大学》、《中庸》、《孟子》，将献于有司，未及上而卒。<br /><br />
</td></tr>

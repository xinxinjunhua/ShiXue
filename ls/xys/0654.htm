<tr><td class="t50">张完传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张完，献州交河人。性简重。事成宗于潜邸，授兴国路判官，廉明有声。迁户部司计，点视仓站，见鹰房官为民害，白于执政斥罢之。再迁监察御史，纠劾无所避忌。超拜治书侍御史，劾尚书省臣脱虎脱等，举朝愕眙。<br /><br />
　　会仁宗立，罢尚书省，始获免。<br /><br />
　　丁父忧，起为河东道廉访使，辞不赴。服除，拜工部尚书。卒。谥端恪。<br /><br />
　　完劾尚书省时，吴澄为国子司业，完子彝肄业国学，澄遣彝告完曰：“人臣惟忠与智，忠者危身奉国，智者有益于国，不危其身。”完复澄曰：“吾宁死，不顾也。”澄嘉叹之。<br /><br />

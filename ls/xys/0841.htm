<tr><td class="t50">张耕传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张耕，佚其籍贯，中统初，为邢州安抚使。兵后，户不满数百。有两达尔罕，言于世祖，请选良吏抚治之。世祖从其言，承制以耕为安抚使，刘肃为副使，邢州大治，流民复业，又兴铁冶、行钞币，公私两济。<br /><br />
　　裕宗在东宫，尝曰：“安得治民如张耕者乎！”<br /><br />
　　后卒于官。<br /><br />

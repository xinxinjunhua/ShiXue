<tr><td class="t50">兀鲁思传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　兀鲁思，钦察氏。伯父别鲁古，至元二十三年，立钦察卫，充本卫佥事，佩金符。武宗镇北庭，从征杭爱，命总扈驾军为万户，力战有功。寻复为钦察卫佥事，卒。子脱欢不花袭，卒，无子。以兀鲁思袭伯父职。<br /><br />
　　天历元年秋九月，从讨倒剌沙有功，赐名拔都儿。<br /><br />
　　二年，从燕帖木儿护送国玺，迎明宗于漠北，赐虎符。擢明威将军大都督府副使。卒。<br /><br />

<tr><td class="t50">刑法志序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　元之刑法，论者，谓得之仁厚，失之纵弛；是不然。蒙古初入中原，百司裁决率依金律。至世祖，始取见行格例，颁之有司，为《至元新格》。然帝临时裁决，往往以意出入增减，不尽用格例也。其后挟私用谲之吏，夤缘放效，骫法自专，是谓任意不任法，非纵弛之过也。<br /><br />
　　呜乎！以世祖之仁明，成宗之宽恕，不能损益古今，权衡中外，以制一代之刑典。乃谓古今不必相沿，中外不必强同。其去整齐画一之规远矣。<br /><br />
　　今博采旧闻，为《刑法志》，俾后之人有以推究其得失焉。<br /><br />

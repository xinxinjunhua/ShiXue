<tr><td class="t50">合剌江传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　合剌江，宏吉剌氏。<br /><br />
　　祖纳鲁都，从太祖伐金。授千户。卒。<br /><br />
　　父门特哥，袭为平阳府达鲁共赤，赐金虎符。卒。<br /><br />
　　合剌江袭。累官武略将军，晋、潞、吉三州达鲁花赤。至元四年，李璮叛，从宗正合必赤讨之。璮突围出，适当合剌江分地。力战，却贼。合必赤饮以酒，并饮器赐之。世祖又赐白金。卒。<br /><br />
　　子阿尔答蓝嗣。历晋、朔、应三州达鲁花赤。以治最，拜监察御史。历浙东西、广西等路廉访司佥事、副使。<br /><br />

<tr><td class="t50">元淮传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　元淮，字国泉，别号水镜，临川人，徙家邵武。以军功官至溧阳路总管。常有诗云：“截发搓绳聊断铠，撦旗作带系金创，卧薪尝胆经营了，更理毛锥治溧阳。”<br /><br />
　　溧阳，至元十三年升为溧州，继改溧阳府，已升为路。淮到省，乞改为直隶州，少苏民力。及去任，作诗云：“问归行李轻如羽，沿路吟诗有一船。”<br /><br />
　　著《金囦吟》一卷。<br /><br />

<tr><td class="t50">王炎午宏毅传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王炎午，字鼎翁，庐陵人，宋太学士。文天祥被执赴大都，炎午作文，生祭之曰：“采西山之薇，酌汨罗之水，以祭文山先生未死之灵。”<br /><br />
　　天祥死，张宏毅持其发齿归炎午，复作望祭文，著有《吾汶稿》。<br /><br />
　　宏毅，亦庐陵人，别号千载心。天祥辟为幕僚，不就。及天祥被执，宏毅曰：“丞相赴北，吾当偕往。”至大都，馆于天祥囚所之侧，日馈食，凡三年，终始如一。制一椟，以藏其首，付天祥家。炎午及宏毅，均隐居不仕而卒。<br /><br />
</td></tr>

<tr><td class="t50">成宗仁宗诸子传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　成宗皇太子德寿，母曰失怜答里皇后。大德九年六月庚辰，册立为皇太子。是年十二月卒。<br /><br />
　　※<br /><br />
　　仁宗二子：英宗为阿纳失舍里皇后所出，庶长子兀都思不花。<br /><br />
　　兀都思不花，延佑二年封安王，赐兽纽金印。四年，置王傅。五年，以湖州路为分地，其户数视魏王阿木哥。英宗即位，降封顺阳王，寻赐死。遣怯辞歹定住括王府资财入章佩监。<br /><br />

<tr><td class="t50">靳和传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　靳和，字达道，平阳曲沃人。家富，喜施予。<br /><br />
　　太祖十四年，率义兵三千人降于木华黎，授征南元帅。木华黎南征，留和守曲沃。金将据弹平、青龙诸寨，屡出剽掠，和选募乡兵，且耕且战，境内卒免流殍。太祖嘉之，拜绛阳军节度使，赐金符。后乞致仕，卒。<br /><br />
　　长子麟，袭节度使。<br /><br />
　　次子用，初授荣河尹，迁汲县尹。廷议开沁水通漕，用力争不可，以举家没入为请，事获寝。已而沁水涌溢，壤民田千余顷，其言卒验。拜监察御史，出为岭北湖南道廉访佥事。所至廉直有声。卒于官。<br /><br />

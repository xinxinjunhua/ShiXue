<tr><td class="t50">傅若金传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　傅若金，字与砺，新喻人。少孤刻，励于学，能文章，受业范椁之门。甫三十，游京师，虞集见其诗，大称赏之。<br /><br />
　　元统三年，介使安南，乘传至真定，若金始悟曰：“安南自陈日烜绝王封，朝廷降诏，止称世子。今不然，是无故王之也。”还白中书，更之。至安南，馆姬侍，却之曰：“吾曹非陶谷，曷为以此见污！”<br /><br />
　　使还，授广州教授。卒。<br /><br />
　　有文集二十卷。<br /><br />

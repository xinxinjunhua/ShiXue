<tr><td class="t50">姚应凤谢晖传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　姚应凤，字时和，慈溪人。自雄其才，喜驰聘，每属笔于广众中，词锋横逸，惊一座。后持以谒同郡袁桷，桷语之曰：“子文不受束缚，然法度自不可废也。”应凤颔之。自是，务为简严，日益深邃。<br /><br />
　　至元间，尝就试省部，时以龙虎台命题，有司得应凤赋，叹曰：“此秦汉间故物也。”置高第，著有《讷轩稿》。<br /><br />
　　※<br /><br />
　　谢晖，字彦实，资阳人。识见通敏。早岁受业胡长孺之门，以德业自勉。或劝习举子业，答曰：“学以博通古今，资文行耳，仕奚所急？”<br /><br />
　　赵孟頫见而爱之，授以书法，一临池遂得神似。文章质实，皆布帛菽粟之言。<br /><br />

<tr><td class="t50">顾德辉传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　顾德辉，字仲瑛，昆山人。性警敏，才赡思捷，下笔成诗。与一时名士张翥、李孝光、杨维桢等相酬和。年逾四十，筑草堂自居，名曰玉山草堂，集唱和诗十三，为《草堂雅集》。自号金粟道人。至大间，微为儒学教谕，不就。<br /><br />
　　至正十七年，张士诚屡欲辟用之，皆以病谢。后卒。<br /><br />
　　同县郭翼，字义仲。沈潜百家，尤邃于《易》。善诗歌，杨维桢称其有乐府才。<br /><br />

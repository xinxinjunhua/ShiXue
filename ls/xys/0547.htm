<tr><td class="t50">乞台传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　乞台，察台氏。世祖时为钦察卫百户，从士土哈征失烈吉及乃颜有功，赐金符，擢千户。从征忽剌出，战于阿里台之地。<br /><br />
　　元贞二年，卒。<br /><br />
　　※<br /><br />
　　子哈赞赤，初从土土哈征哈丹罕，战于贵烈儿，有功。<br /><br />
　　大德五年，从征杭爱。又从武宗讨哈剌阿答。又从床兀儿征不别、八怜，为前锋，以功受赏。<br /><br />
　　皇庆二年，赐金符，为千户。<br /><br />
　　延祐四年，从周王举兵，与诸王秃满帖木儿战于失剌答儿马，不胜。王北奔金山，哈赞赤从王居其地十有三年。<br /><br />
　　天历二年，周王即位，赐金符，授昭勇大将军、同知大都督府事。卒。<br /><br />

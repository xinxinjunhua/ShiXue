<tr><td class="t50">五行志序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　太祖十四年夏，西征，大雨雪。帝疑之，耶律楚材进曰：“克敌之征也。”明年冬，震雷。帝又疑之，楚材曰：“西域主将死矣。”已而，皆然。<br /><br />
　　夫天之垂戒，无分于夷夏。夷夏虽殊族姓，又无不知天变之可畏者。或乃疑其附会失实，不亦妄乎！<br /><br />
　　抑吾观楚材之占侯，虽验于已事，然准以《洪范》五行之说，皆不合。于是又知禨祥术数之学，或别有所承，而不必尽轨于经传也。然考天变以征人事，则岂有外于《洪范》之大义者哉！作《五行志》。<br /><br />
</td></tr>

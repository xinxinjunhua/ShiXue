<tr><td class="t50">方技传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘秉忠事世祖于潜邸，其玉数之学，尤为帝所敬信。及即位，诏访奇材异能之士，秉忠亦荐其所知，虽寻常艺术，皆得亲承顾问，待以优礼。岂非雄才大略之主，其度量所包括者，无所不至乎！<br /><br />
　　今博考其人，为《方技传》以存梗概焉。<br /><br />

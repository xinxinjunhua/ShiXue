<tr><td class="t50">周密传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　周密，字公谨，其先济南人，后徙吴兴。密学问渊雅，为宋相马廷鸾所知。累官丰储仓所检察。<br /><br />
　　宋亡，寓杭州，居癸辛街杨沂中之瞰碧园，与王沂中、张炎、仇远等相倡和。其诗感慨激发，乐府尤工。有《蜡屐集》《弁阳诗集》、《苹洲渔笛谱》。<br /><br />
　　密著书甚多，其《齐东野语》、《癸辛杂语》、《绝妙好词》，皆盛行于世。<br /><br />
</td></tr>

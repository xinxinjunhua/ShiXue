<tr><td class="t50">王昌世传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王昌世，字昭甫，庆元鄞县人。父应麟，宋礼部尚书。宋亡，应麟杜门不出，日取经史、百家之书讨论之。昌世甫十岁，能传其家学。凡应麟著述，昌世皆为之校订。应麟有重名东南，学者以为宋三百年文献所存。<br /><br />
　　昌世，名父之子，台省荐之，力辞曰：“士之大节，嗣守为难。敬身所以敬亲，肥遯所以无不利，不愿乎外也。”泰定四年卒，年六十一，子原孙、宁孙。昌世尝戒二子曰：“务学以实，忽事虚文。持身以诚，勿遁诡道”。<br /><br />
　　晚自称静学居士。有《静学稿》二十卷。<br /><br />

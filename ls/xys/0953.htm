<tr><td class="t50">俞琰传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　俞琰，字玉吾叟，平江人。宋亡，隐居著书，自号林屋山人。精于《易》。著《经传考证》、《读易须知》、《六十四封图》、《古占法》、《封爻象占分类》、《易图合璧连珠》等书，皆佚。惟《周易集说》附以《易图》、《易外传》，行于世。<br /><br />
　　时信都人李简，亦通《易》学，官泰安州通判，著《学易记》九卷。<br /><br />

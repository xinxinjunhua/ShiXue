<tr><td class="t50">阙里庙</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　阙里之庙，始自大宗九年，令先圣五十一代孙袭爵衍圣公元措修之，官绐其费。而代祠之礼，则始于武宗。牲用太牢，礼物别给白金五十两，彩币表里各十有三匹。<br /><br />
　　四年冬，复遣祭酒刘赓往祀，牲礼如旧。<br /><br />
　　延祐之末，泰定、天历初载，皆循是典，锦币杂彩有加焉。<br /><br />

<tr><td class="t50">勖实带传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　勖实带，克烈氏。祖昔里吉思、父兀都，世为炮手军千户。<br /><br />
　　至元中，勖实带袭职。从伯颜南伐，以渡江功，授武义将军，佩金符。迁武触将军、本军总管，诸将渡江争掠金帛、妇女，勖实带独取图书百卷。士之被俘者，辄赎而归之。宋平，还屯闻喜，建伊川书院以教士。手不释卷。与陈天样、姚燧、卢挚、赵简友喜。台省交荐之。会卒。<br /><br />
　　勖实带晚改名士希。字及之，有诗五百余篇，曰《伊东拙藁》。<br /><br />
　　子慕颜帖木儿袭千户，亦有学行。<br /><br />

<tr><td class="t50">陈君用传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　陈君用，字子材，延平人，少负气，勇猛过人。<br /><br />
　　红巾入闽，闽帅授君用南平县尹，给钱五万缗，俾募千兵。君用散家财继之，导官军复建阳、浦城等县，以功授同知建宁路事。亡何，贼围福州，君用率兵往援，大败贼众。廉访佥事郭兴祖使权同知副都元帅，遂引兵逾北岭，至连江，阻水而阵。君用曰：“今日不尽杀贼，吾不复生还矣？”乃率壮北士六十人，徒涉，贼稍溃。既而复合，君用大呼转战，中枪死。<br /><br />
　　事闻。赠怀远大将军、浙东道宣慰司同知副元帅、轻车都尉、颖州郡侯，谥忠毅。<br /><br />
</td></tr>

<tr><td class="t50">忠义传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　昔宋亡，其降将入朝，世祖召问曰：“汝等何降之易？”对曰：“贾似道轻侮臣等，故皆无斗志。”帝曰：“此似道一人之罪，汝主何负焉！”符宝郎董文忠从旁责之曰：“宋主贵汝、富汝，未尝薄汝也。今坐视社稷之亡，可乎？”诸降将皆惭谢而退。大矣哉，世祖之教忠也。<br /><br />
　　吾观元之亡也，民叛于下，而士死其官，损躯脰糜妻子以赴国家之难者，史不绝书。盖过于辽金之季远甚。<br /><br />
　　呜乎！王者一言之予夺，而人心习尚为之转移，岂不诚然哉！作《忠义传》。<br /><br />

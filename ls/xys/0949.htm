<tr><td class="t50">徐之纲传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　徐之纲，字汉臣，济州人，少为词赋有名，久而曰：“是果为学邪？”益研究义理，以二程、朱子为根抵，治《易》、《春秋》二经。以明经选益都教授，佐省事，李璮有异志，阴练士卒，习劳苦。纲曰：“使民以时，相公不知邪！”璮默然。又曰：“周衰，战国之士知有诸侯，百不尊周。唐河北将士，知有藩镇，而不尊唐。”璮恶其言直，黜为滕县尉。<br /><br />
　　中统四年卒。<br /><br />
　　后璮果以反诛。<br /><br />
　　有《默志》三卷，《麟台杂著》七卷。<br /><br />

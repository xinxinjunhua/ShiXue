<tr><td class="t50">袁易传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　袁易，字通甫，平江长洲人。力学，不求仕进。行省使者将荐之，易固辞，辟署石洞书院山长，亦不就，居吴淞，具区间，筑堂曰静春，聚书万卷，手自校雠。著《静春堂诗集》四卷。<br /><br />
　　与郡人龚璛、郭麟孙，为吴中三君子。赵孟頫尝作《卧雪图》以美之。<br /><br />
　　子泰，字仲长，为郡学教授，别号寓斋，亦有诗名。<br /><br />

<tr><td class="t50">朱玉传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　朱玉，字君璧，昆山人，喜绘事，闻佳山水，即悠然独往，虽数城不以为难。永嘉王振鹏，在仁宗时，以界画称旨，跻显仕。玉往受笔法，振鹏嘫称之。未几，奉中宫命，图《藏经》佛像，曲尽意态。人言振鹏之艺，不能过之。<br /><br />
　　至正中，清宁殿成。敕画史图其壁。赵雍以玉名闻，遣使召之，以道阻不果至。未几，卒。<br /><br />

<tr><td class="t50">闵本传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　闵本，字宗先，河内人。性刚正，早岁得推择为礼部令史，御史大夫不花奇本之才，辟为掾，平反冤狱有声，擢御史台照磨。累迁枢密院都事，拜监察御史，五转为吏部尚书，移刑、户二部。<br /><br />
　　本素贫，且有目疾，尝上章乞谢事，不允，诏授集贤侍讲学士。明兵薄京师，本谓其妻程氏曰：“国事至此，吾知之久矣。愧不能立功补报，敢爱六尺躯苟活哉！”程氏曰：“君能死忠，我尚有爱于君乎！”本乃朝服，与程氏北向再拜，大书于屋壁曰：“元中奉大夫、集贤侍讲学士闵本死。”遂各缢。<br /><br />
　　二女：长真真，次女女；见本死，亦皆自缢。<br /><br />

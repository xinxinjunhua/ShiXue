<tr><td class="t50">泰定帝诸子传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　泰定帝四子：长皇太子阿速吉八，见本纪；次八的麻亦儿间卜，次小薛，次允丹藏卜。<br /><br />
　　八的麻亦儿间卜，泰定元年三月以皇子嗣封晋王。四年，敕右丞相塔失帖木儿、左丞相倒剌沙兼领晋王内史四斡儿朵事。<br /><br />
　　小薛，泰定三年，以其夜啼，赐高年钞以压之。<br /><br />
　　允丹藏卜，泰定四年三月出镇北边。<br /><br />
　　三皇子俱早殒，无后。<br /><br />

<tr><td class="t50">胡一桂传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　胡一桂，字庭芒，徽州婺源人。父方平。一桂生而颖悟，好读书，尤精于《易》。初，饶州德兴沈贵珤受《易》于董梦程，梦程受朱子之《易》于黄干，而一桂之父方平及从贵珤。梦程学尝著《易学启蒙通释》。一桂之学出于方平，得朱子源委之正。<br /><br />
　　宋景定中，一桂年十八，领乡荐，试礼部不第，退而讲学，远近师之。号双湖先生。<br /><br />
　　所著书有《周易本义附录纂疏本义启蒙翼传》、《朱子诗传附录纂疏》、《十七史纂》，并行于世。<br /><br />
</td></tr>

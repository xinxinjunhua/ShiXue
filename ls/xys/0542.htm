<tr><td class="t50">周全传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　周全，光州人，宋广南西路马步军副总管。降于伯颜，遥授衡州知州。入觐，赐金符，遥授泉州知州，兼千户。从宋都碍平江西。又从大军攻韶州，杀安抚使熊飞。广东平，全功居多。<br /><br />
　　十四年，从攻静江，宋将李梦龙迎降。授全管军总管。<br /><br />
　　十五年，讨平赣州崖石山贼寨。<br /><br />
　　十七年，进广威将军、管军副万户，镇守龙兴。<br /><br />
　　二十年，以疾去官。大德九年，卒。<br /><br />
　　赠怀远大将军万户，追封汝南郡侯，子祖瑞袭职。<br /><br />

<tr><td class="t50">朱震亨传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　朱震亨，字彦修，婺州义乌人。天资爽郎，读书即了大义。闻同郡许廉之学，抠衣至门师事之。廉为开明圣贤大旨，震亨心解，抑其豪迈归于纯粹，不以一毫苟且自恕，其清修苦节，绝类古笃行土，所至人多化之。<br /><br />
　　一日，母病延医，因自悟曰：“人子不知医，或委之庸之，宁无有失。”于是，研究医理，博求名师，得罗知悌之传，治症多奇效。尝著《格致余论》、《局方发挥》《伤寒辨疑》、《外科精要》、《本草衍补》、《丹溪心法》诸书于世，学者称丹溪先生。<br /><br />
　　太仓人王履，字安道，震亨门人，得其心传。著月《溯泗集》、《百病钩元》诸书。<br /><br />

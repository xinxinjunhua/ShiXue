<tr><td class="t50">郭钰传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　郭钰，字彦章，吉水人。壮年负盛气，为诗清丽有法。其于离乱穷愁之作，尤凄惋动人。年逾六十，竟以贫死。<br /><br />
　　其《春夜诗序》云：“余值时危，一贫到骨。今春雨雪连旬，牛衣以当长夜，遂戌痁疟。”其固穷如此。<br /><br />
　　所著《静思集》，诗文甚富。<br /><br />

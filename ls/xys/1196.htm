<tr><td class="t50">百官志序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　世祖命刘秉忠、许衡定官制，以中书省管政事，枢密院管兵，御史台司纠劾，又设行省、行台，使内外均其轻重，以相维系，立法之善，殆为唐宋所不及。<br /><br />
　　然上自中书省，下逮郡县亲民之吏，必以蒙古人为之长，汉人、南人贰之。终元之世，奸臣恣睢于上，贪吏掊克于下，痡民蠹国，卒为召乱之阶甚矣。王天下者，不可以有所私也。<br /><br />
　　至一事而分数官，一官而置数员，秩位滥于遥授，事权隳于添设，率大德以后之所增益，不尽为世祖旧制也。<br /><br />
　　《元典章》之内外文武职品，与旧史亘有同，今亦附著下方，备参考云。<br /><br />

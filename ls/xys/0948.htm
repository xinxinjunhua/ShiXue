<tr><td class="t50">车若绾传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　车若绾，字给臣，后更名捄，台州黄岩人。少警敏，与从兄若水同学。久之，觉胸中浩浩，发而为言，宏放无涯涘。于是，车氏之学，为一郡所崇尚。宋咸淳末，用特恩授建宁浦城县尉。<br /><br />
　　宋亡，隐于马家山，卒年五十五。<br /><br />
　　若绾精于礼学，谓丧服之亲疏隆杀，深衣之续衽钩边，虽家礼之证定，注疏之援引，亦庸有所未尽，用广头在下之说，以改正深衣，辨内外正降之义，以图列服制，皆能发行儒所未及云。<br /><br />
</td></tr>

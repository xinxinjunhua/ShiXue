<tr><td class="t50">张洪传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张洪，河间沧州人。以千户从讨李璮，赐金符。至元四年，董修大都城，赏金织衣。<br /><br />
　　十一年，从征五河口。<br /><br />
　　十四年，从讨叛王撒里蛮，擢宣武将军、侍卫亲军总管。还至和林塔迷儿之地，辎重为贼所掠。<br /><br />
　　十六年，进左卫亲军副都指挥使。<br /><br />
　　十七年，加安远大将军。<br /><br />
　　二十四年，扈驾征乃颜。明年，以昭毅大将军致仕。<br /><br />
　　子奉政，袭千户，佥左卫亲军都指挥司事。<br /><br />
　　元贞元年，提调左卫屯田。<br /><br />
　　大德十一年，卒。<br /><br />
　　子庸嗣。<br /><br />

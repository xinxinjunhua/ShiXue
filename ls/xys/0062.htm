<tr><td class="t50">后妃传(3)</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　太宗孛刺合真皇后，次曰昂灰二皇后，氏族均佚。太宗在潜邸，以宪宗为子，命昂灰皇后抚育之。次曰忽帖尼三皇后，乞里吉思氏，生二子：曰阔端。曰灭里。宪宗二年，迁后于阔端所居地之西。<br /><br />
　　※<br /><br />
　　又有土拉起那妃子，本蔑儿乞部长答亦思兀妻，太祖灭蔑儿乞，以土拉起那赐太宗。<br /><br />
　　※<br /><br />
　　太宗昭慈皇后乃马真氏，讳朵列格捏，号六皇后。先为蔑儿乞部长脱黑脱阿长子忽秃妻，太祖灭蔑儿乞，以后赐太宗。生一子，为定宗。太宗崩，后称制五年；复归政于定宗，而国事犹决于后；事具本纪。至元二年，追上尊谥，袝太宗庙。<br /><br />

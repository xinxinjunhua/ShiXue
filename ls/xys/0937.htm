<tr><td class="t50">狄琮传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　狄琮，字子玉，保德州人。躯干魁梧，尚气节，读书能知大义。裕宗在东宫，召为晋王宿卫。王开藩云南，擢奉议大夫、王府司马。府中事，咸咨之。王镇西边，转朝列大夫、内史府司马。未几，进大中大夫。琮因事纳规，知无不言。<br /><br />
　　王薨，琮恸哭，哎血而卒。临卒，召子东山戒之曰：“为人臣子，惟忠孝尔！其勿违。”<br /><br />
　　东山刚正，有父风，授中书舍人，进监察御史，出为同知大都路总管。以材选授礼部郎中，进大中大夫、同佥宣徽院事。卒。<br /><br />

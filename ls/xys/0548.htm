<tr><td class="t50">答答呵儿传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　答答呵儿，脱脱忒氏。<br /><br />
　　父孛儿速，世祖时直宿卫，扈驾征哈赖刺章。还，世祖驻跸商阜，见河北有乘船至者，顾谓左右曰：“此贼也，奈何？”孛儿速解衣径渡，挥戈刺杀舵手二人，拖其船近岸，贼悉就擒。以功受赏。<br /><br />
　　答答呵儿袭父职，从征孛可有功，进武德将军、揭只揭烈温千户所达鲁花赤。从征乃颜、也不干等，擒也不干，收其所管钦察户。<br /><br />
　　武宗时，进怀远大将军、都元帅。卒。<br /><br />

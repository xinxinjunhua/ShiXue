<tr><td class="t50">倪瓒传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　倪瓒，字元镇，无锡人。工诗，善书画。所居曰《清閟阁》，藏书数千卷，皆手自勘定。自号云林居士。有洁癖，畲濯不离手。家本素f丰，至正初，忽散其财给亲故，人咸怪之。未几，兵起，富室悉被祸，瓒扁舟箬笠，往来江湖上，独免于难。<br /><br />
　　张士诚欲招之，不肯出。其弟士信怒，一日，与宾客宴湖上，闻苇中有异香，疑为瓒，物色渔舟中，果得之，抶几死，终无一言。明洪武初，卒。<br /><br />
　　与瓒画齐名者，有常熟人黄公望，字子久；嘉兴人吴镇，字仲圭；吴兴人王蒙，字叔明。公望辟书佐，以罪免，遂为黄冠。镇隐居不仕。惟蒙仁于明，坐法死。<br /><br />
</td></tr>

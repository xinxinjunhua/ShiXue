<tr><td class="t50">拜住传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　拜住，康里人，字闻善，累官至翰林国史院都事、太子司经。兵至，拜住谓家人曰：“吾始祖海蓝伯封河东公者，与太祖同事王可汗。太祖取王可汗，收诸部落，吾祖引数十骑驰西北而去。太祖使人追问之，曰：‘昔者，与皇帝同事王可汗。王可汗今已灭，欲为之报仇，则帝乃天命，欲改事帝，则吾心有所不忍，故避之于远地，以没余生耳。’此吾祖之言也。且吾祖生朔漠，其言尚如此，今吾生长中原，读书国学，可不知大义乎？况吾上世受国厚恩，至吾又食禄。与其苟生，不如死。”遂赴井死。<br /><br />
　　其家人瘗之舍东，焚其书以为殉。<br /><br />

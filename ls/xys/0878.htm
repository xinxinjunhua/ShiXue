<tr><td class="t50">李惟闰叶森传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李惟闰，安理人，官中书右司掾。有馈兄肉，而兄以他疾死，娣婿利其资，诬肉中有毒。狱上，惟闰疑其冤，覆讯得实，释之。其人绘象事之。<br /><br />
　　累迁陕西行台御史。华州狱囚诬承强盗，惟闰平反其狱。西岳道士陷民作驱奴，惟闰出为良民。时论称之。迁福州路总管。卒。<br /><br />
　　※<br /><br />
　　叶森，江阴人，盐官州判官。大饥，斗粟十千，森具粟平粜，全活甚众。调新喻判官。<br /><br />
　　时蒙山银场，以官估抑民市木炭，森白行省蠲之。擢上高尹，有大猾武断一乡，为民害，森搒诸市，仍疏其恶于城市门，猾敛迹不敢逞，后卒于官。<br /><br />

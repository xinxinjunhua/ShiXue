<tr><td class="t50">赵汸传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　赵汸，字子常，体宁人。姿禀卓绝。幼读朱子四书，多所疑难，乃尽取朱子书读之。闻九江黄泽有学行，往从之游，得六经疑义千余事以归。复往，留二年，得口授六十四卦大义与《春秋》之学。<br /><br />
　　又从学于临川虞集，闻吴澄之绪论。著《春秋集传》十五卷、《左氏补注》十卷、《春秋师说》三卷，发明师说，度越唐宁诸家。学者称东山先生。<br /><br />
　　卒年五十一。<br /><br />

<tr><td class="t50">撒里传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　撒里，垮塔儿氏。父哈剌拔都与兄忽里，俱为太祖忽兰皇后所抚养。撒里从攻西夏之托奇城，蒙哥见一壮士登城战甚为，问其人，则撒里也。遂擢用之。其后从征西域，至印度斯单，大掠而回。西域屯田，多撒里旧部。<br /><br />
　　子鄂尔多诺颜，袭父职。<br /><br />

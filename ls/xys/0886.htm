<tr><td class="t50">阚文兴传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　阙文兴，漳州万户府知事。<br /><br />
　　至元十三年，从贾万户戍漳州。<br /><br />
　　十七年八月，陈吊眼聚众为乱，杀招讨使傅全，文兴力战死。其妻王氏，建康人，为贼所执，逼污之，给曰：“吾不幸至此，岂敢爱吾身，愿葬吾夫，然后从命。”贼义而许之。王氏得其夫尸，焚之，遂自跃火中，并焚死。<br /><br />
　　至顺三年，赠文兴英毅侯，王氏贞烈夫人，有司立庙祀之，号双节庙。<br /><br />

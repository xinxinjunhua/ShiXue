<tr><td class="t50">周惠传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　周惠，字德甫，晋州隰县人。<br /><br />
　　宪宗二年，朝廷经略江淮，擢惠江淮都转运使，置转运司于胙州。<br /><br />
　　四年，惠入觐，图利病上之。诏以彰德、卫辉、大名民户各五千，实胙州，复其赋，改胙州为淇州。惠治官廨、仓库及境内之廛市、阡陌，皆井井有法。民贫无食者，令习陶甓之业，躬为规劝，无倦色。西山铁官瓷灶久废，惠出资修复之。由是商贾四集。后卒于官。<br /><br />
　　子锴，淮东高邮路总管。<br /><br />

<tr><td class="t50">谟克博罗传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　谟克博罗，威尼斯国人。从其父来中国贸易。<br /><br />
　　世祖平江南，授为杭州管税官，乞解职返国，从之。时旭烈兀后王阿鲁浑使者至求汉女妃，世祖以蒙古女库喀奇赐之，媵以宋宗室女，使谟克博罗送之，并使通好于英吉利、法兰西、日斯巴尼亚诸国。<br /><br />
　　谟克博罗与阿鲁浑使者三人，从海道归。逾年，始抵西域城模子。阿鲁浑已前卒，盖喀图嗣立，命谟克博罗送女于合赞，阿鲁浑之长子也。<br /><br />
　　谟克博罗著游记，载西哉及中国事甚悉。<br /><br />
　　泰西人入中国，著书，以谟克博罗为称首云。<br /><br />

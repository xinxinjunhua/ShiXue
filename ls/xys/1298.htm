<tr><td class="t50">七祀</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　七祀曰：<br /><br />
　　户、司命、灶、中溜、门、厉、行，附祀神位于庙庭中街之东西向，其分为四时之祭，并与宋同。<br /><br />
　　宋制：立春祭户、祭司命，立夏祭灶，季夏土王日祭中溜，立秋祭门、祭厉，立冬祭行。惟中簋特祭则遍设之。各位笾、豆各二，簠、簋各一，樽二，俎二。<br /><br />
</td></tr>

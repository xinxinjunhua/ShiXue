<tr><td class="t50">刘辰翁传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘辰翁，字会孟，吉安庐陵人，宋太学生。廷试言：“济王无后，可悯。忠良戕害，可伤。风节不竞，可憾。”忤贾似道，置丙等。<br /><br />
　　宋亡，不仕。著有《须溪文集》。<br /><br />
　　子尚友，亦能文。吴澄评其父子之文，谓辰翁奇诡变化，尚友浩瀚演迤，皆能成一家之言。<br /><br />
　　同县黄圭，字唐佐，罗志仁，字寿可，宋末有诗名。以荐，圭授莆田丞，志仁授天长书院山长。刘辰翁尝称之曰：“黄西月五言，罗秋壶小词，它人莫能及也。”<br /><br />

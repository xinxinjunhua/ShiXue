<tr><td class="t50">笃列图传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　笃列图，字敬夫，捏古氏，后徒永丰。父卜里也秃思，从文宗于潜邸，官靖江路总管。<br /><br />
　　笃列图，天历三年，举进士第一，文宗览其对策曰：“是必世家子弟，何以知吾家事若是之详？”授集贤修撰。御史中丞马祖常以其妹妻之。累迁江南行台监察御史，按治湖广、江浙诸路，咸有名迹。威顺王宽彻不花素不法，夺山泽之利，民尤苦之，告于官，笃列图一无所贷，劾王罪宜削爵土，会赦免。<br /><br />
　　故事，御史按部至，官吏供张甚盛，笃列图命撤去，及视事，莫不震慑，曰：“慎勿犯捏古状元。”<br /><br />
　　召为内台御史，以病卒，年三十七。<br /><br />

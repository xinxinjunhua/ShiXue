<tr><td class="t50">杨居宽传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　杨居宽，字子裕，东昌莘县人。辟中书省掾，擢左右司郎中，累迁江浙行省参议，入为中书省参知政事。性刚直。桑哥为总制院使，幸进者入贿即得美官，居宽在中书省恒裁抑之。桑哥怒，及拜尚书右丞相，诬以罪杀之，籍其家，惟其子集贤直学士勋，不连坐。居宽死时，年五十五。<br /><br />
　　弟居简，从世祖伐宋，累迁唐州知州，有能名。桑哥伏诛，上诉兄冤，诏还所籍产，官其二孙。<br /><br />
　　居简子升，翰林国史院检阅官。<br /><br />
　　居宽从弟居义，浦东场盐司丞，亦有吏能。<br /><br />

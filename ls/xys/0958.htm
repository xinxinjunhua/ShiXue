<tr><td class="t50">荣肇传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　荣肇，字子与，盐官州人。幼端谨，不苟言笑。既长，博通经史。服膺朱子之学，以诚意正心为学之根本。宋季，贾似道当国。应试者例自署，非假道学。肇太息曰：“君子患不力学，苟抱道自处，虽穷困，不荣于附时相以获功名乎。”遂拂衣而出。<br /><br />
　　宋亡，隐居不仕。<br /><br />
　　成宗即位，有荐于朝者，诏有司征之。召见，奏对称旨，帝曰：“汝宜为国子师，以表率天下。”乃补国子助教。<br /><br />
　　累擢祭酒，以年老乞致仕。卒于家，年八十一。<br /><br />

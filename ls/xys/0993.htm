<tr><td class="t50">戴表元传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　戴表元，字帅初，一字曾伯，庆元奉化州人。宋咸淳中，登进士乙科，教授建宁府。后迁临安教授，不就。<br /><br />
　　大德八年，执政荐于朝，起家授信州教授，再调婺州，以疾辞。<br /><br />
　　初，表元闵宋季文章气萎恭而辞骫骲，慨然以振起斯文为己任。时四明王应麟、天台舒岳祥，并当代儒宗，表元皆从受业。故其学博而肆，其文清氵突雅洁，蓄而始发。至元、大德间，东南以文章大家名重一时者，表元一人而已。其门人最知名为袁桷。桷之文，体裁、议论，皆取法于表元者。<br /><br />
　　表元晚年，翰林、集贤以修撰、博士二职论荐，不肯起。年六十七卒。有《剡源集》三十卷。<br /><br />

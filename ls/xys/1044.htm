<tr><td class="t50">王鉴传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王鉴，字明卿，真定安平人，性耿介。娶同郡李氏，资装甚盛，鉴悉归之。受学于虞集，善唐人近体诗。游京师，大臣荐其才行，授侍仪司舍人，鉴辞曰：“吾虽不敏，安能为人所役？”即宵遁。后乐吴中风土，遂隐居焉，足迹不出户者二十年。<br /><br />
　　家贫，无儋石之储。然非其义，虽一毫不取。<br /><br />
　　张士诚每过之，劝以忠义。士诚退谓人曰：“明卿高尚士也。”<br /><br />
　　卒年七十二。<br /><br />

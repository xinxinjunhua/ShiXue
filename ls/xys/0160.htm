<tr><td class="t50">察合安不洼传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　察合安不洼，捏古歹氏。早从太祖。札木合与太祖战于巴泐渚纳，我军失利，察合安不洼殁于阵。札木合悬其首于马尾而去。<br /><br />
　　太祖即位，以其子纳邻脱斡邻为千户，受孤独之赏。纳邻脱斡邻言：有弟捏古思散在各部落内，愿收集其众，以觅之，太祖许之，命其子孙世袭捏古歹千户。<br /><br />
</td></tr>

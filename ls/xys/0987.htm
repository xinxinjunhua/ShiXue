<tr><td class="t50">文苑传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　昔金之末造，文章衰敝，至元好问出，始无愧于唐宋之作者，然蒙古初入中原，好问之学不甚显于当世。<br /><br />
　　中统以后，浸尚词术，上下百有余年，称诗者推杨载、虞集、揭傒斯、范椁，称文者推虞集、揭傒斯、黄溍、柳贯，皆质有其文，彬彬然立言之君子也。<br /><br />
　　皇朝黄宗羲以姚燧、虞集为元文之最盛者，王士祯以吴莱之诗配苏轼，翁方纲以虞集之诗继黄庭坚，盖议论之不同如此。文章之士，因派别而为爱憎，至论定于千载之后，其言固不可易也。作《文苑集》。<br /><br />

<tr><td class="t50">老保传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　老保，姓李氏，一名保保，阳武人。<br /><br />
　　察罕帖木儿起义兵，老保从之，以复罗山县。授泽州路治中。从平方脱脱之乱，改授枢密院知院，守石州。又从察罕帖木儿攻取山东郡县。<br /><br />
　　察罕帖木儿为田丰所害，老保与扩廓帖木儿共破田丰，擢平章政事，留守益都。明遣大将军徐达攻益都，谕老保降，不从。达谓诸将曰：“老保所恃者河上援兵，吾已分兵拒黄河南岸，断其臂矣。”即督兵填坝而进，拔其城，执老保与白锁住送建康。平章普颜不花死之，老保降于明。<br /><br />
　　后，明太祖遣老保招谕扩廓帖木儿，扩郭帖木儿鸩杀之。<br /><br />

<tr><td class="t50">乃丹传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　乃丹，达里伯氏。其部落在和林之外千余里，世有都刺合之地。乃丹闻太祖起兵，率其众来附，命隶国王木华黎部下，从收云中、九原，取辽西，俱有功。卒。<br /><br />
　　子二人：忻都、合刺。<br /><br />
　　忻都，以材武从国王平河朔，早卒。子八人：哈剌、朵忽兰、瘦瘦儿、阿里罕、爱不哥察儿、忽里罕、万奴、众家奴、忙驴，皆有勇略，常为诸军冠。<br /><br />
　　忽里罕、万奴、阿里罕子高奴及合刘子纽邻，俱战及。爱不哥察儿，至大元年授宣抚将军、韶州路达鲁花赤，卒。子纳怀，廉镇端直，武宗闻其名拜监察御史，累官吉安路总管，兼管劝农事。<br /><br />

<tr><td class="t50">泉州神女</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　泉州神女灵惠夫人，至元十五年，加号护国明著灵惠协已善虔显济天妃，天历元年，加号护国庇民广济福惠明著天妃，赐庙号曰灵慈，直沽、平江，周泾、泉、福、兴化等处皆有庙。<br /><br />
　　皇庆以来，岁遣使斋香遍祭，金幡一，合银一锭，付平江漕司及本府官，用柔毛酒醴便服行事。祝文云“维年月日，皇帝特遣某官等致祭于护国庇民广济福惠明著天妃。”<br /><br />
</td></tr>

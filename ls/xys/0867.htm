<tr><td class="t50">白景亮传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　白景亮，字明甫，南阳人。明法律，善书算。由征东行省译史，超迁南恩知州，升沔阳府尹，奏最于朝，特授衢州路总管。<br /><br />
　　先是，为郡者于民间徭役不尽校田亩以为则，吏得高下其手，富民有余力，而贫弱者多至破产。景亮深知其弊，乃始核验田亩以均之，役之轻重，一视田之多寡，由是民不劳而事易集。他郡邑皆取以为法。郡学诸生无廪膳，祭服乐器不备，景亮皆增之，士风大振，搢绅称颂焉。<br /><br />
　　景亮性廉介勤苦，自奉甚薄，妻尤俭约，惟以脱粟对饭而已。部使者上其事，特诏褒美，赐以宫锦，改授台州路总管。卒于官。<br /><br />

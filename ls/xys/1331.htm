<tr><td class="t50">节乐之器</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　麾一，制以绛缯，长七尺，画升龙于上，以金涂龙首朱杠县之，乐长执之，举以作乐，偃以止乐。<br /><br />
　　照烛二，以长竿置绛罗笼于其末，然烛于中，夜暗，靡远难辨，乐正执之，举以作乐，偃以上乐。<br /><br />
</td></tr>

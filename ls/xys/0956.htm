<tr><td class="t50">何中传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　何中，字太虚，抚州乐安人。父天声，宋咸淳进士，管主管刑部架阁文字，与兄时齐名。文天祥建都督府，兄弟皆为幕僚。<br /><br />
　　中，少颖拔，以古学自任，程钜夫、元明善皆器遇之，与门人讲《易》、《书》、《春秋》之学。吴澄与中为中表兄弟，恒推让之，不敢置弟子列。<br /><br />
　　著《易象类》二卷，《书传补遗》十卷，《通鉴纲目测海》二卷，《通书问》一卷，《叶补疑》一卷，《六书纲领》一卷，《补校六书故》三十二卷，《知非堂集》十卷，《支颐集》二卷，《蓟邱述游录》一卷。<br /><br />
　　卒年六十八。<br /><br />

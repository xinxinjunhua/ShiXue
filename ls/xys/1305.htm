<tr><td class="t50">功臣祠</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　至大四年，淮安忠武王伯颜庙于杭州，春秋二仲月次戊致祭，祀以少牢，用笾、豆、簠、簋，行酌献礼。<br /><br />
　　若魏国文正公许衡庙在大名。河南王阿术庙在扬州。皇庆元年，又命河南行省建丞相阿术祠堂。<br /><br />
　　延祐五年，敕杭州守臣岁时致祭。<br /><br />
　　至治二年，赐祭田二十顷。<br /><br />
　　东平忠宪王安童庙在东平，颀德忠献王哈剌哈孙庙在顺德、武昌者，皆岁时致祭。<br /><br />
　　后至元六年，建太师木华黎祠堂。是年，又立坷喽罕、伯颜祠堂，皆家庙，官为建之者。<br /><br />

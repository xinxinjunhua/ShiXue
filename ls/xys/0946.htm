<tr><td class="t50">牟应龙传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　牟应龙，字伯成，本蜀人。后徙居湖州，祖子才，仕宋，赠光禄大夫。谥清忠。父巘，为大理少卿。<br /><br />
　　应龙当以荫补京官，尽让诸从弟，而擢咸淳进士。时贾似道当国，属马廷鸾致意应龙来谒，当处以高第，应龙拒之。及对策，具言国势危急，考官不敢置上列。调光州定城尉。沿海制置司辟为掾，以疾辞。<br /><br />
　　宋亡，留梦炎事世祖为吏部尚书，以书招之，许以馆职，应龙不受。起家教授溧阳州。晚以上元县主簿致仕。<br /><br />
　　诸经皆有成说，惟《五经音考》盛行于世。时人称曰隆山先生。<br /><br />

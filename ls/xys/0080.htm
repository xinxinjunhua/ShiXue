<tr><td class="t50">昔班土斡耳传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　昔班，术赤第五子，从拔都伐斡罗斯有功。拔都使居鄂尔达牧地之北，西至于乌拉河。其斡儿朵，色尚蓝。或曰：昔班从拔都伐马加，战胜有功，拔都授以马加汗名号，师还，拔都以北边地与之。昔班之六世孙孟古帖木儿与月思别同时。<br /><br />
　　※<br /><br />
　　土斡耳，术赤第七子。其孙诺该，为拔都后王任事，以斡济称，后忤脱脱意，谪处浮尔嗄河之东，其子孙散居乌拉河、恩拔可之间。<br /><br />

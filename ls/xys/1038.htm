<tr><td class="t50">龚开汪元量传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　龚开，字圣予，山阳人。博学，负才气。著文天祥、陆秀夫二传。开，少与陆秀夫同居李庭芝幕府，宋亡，不肯求仕。家贫，坐无几席，每次令其子浚，俯伏榻上，就其背，按纸作书画焉。<br /><br />
　　同时，汪元量，字大有，钱塘人。以善鼓琴，受知于宋理宗。国亡，奉宋三宫留燕，世祖欲官之，不肯，因赐为黄冠师。南归，后往来匡庐、彭蠡之间，人以为神仙云。<br /><br />
</td></tr>

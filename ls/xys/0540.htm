<tr><td class="t50">蒲寿庚传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　蒲寿庚，本西域人，与兄寿宬以互市至泉州。<br /><br />
　　宋咸淳末，御海寇有功。寿庚授闽广招抚使，以全军来降。宋幼主过泉州，众欲应之，寿庚闭门不纳。及张世杰回军攻城，宋宗室在城内者又谋应世杰，寿庚置酒延其人议城守事，酒半，尽杀之。世杰攻城三阅月不下，遂解去。世祖嘉其功，进昭勇大将军、兵马招讨使。<br /><br />
　　十四年，拜江西行省参知政事。子孙并为显仕。<br /><br />

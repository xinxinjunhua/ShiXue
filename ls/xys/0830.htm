<tr><td class="t50">李质传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李质，字文彬，德庆人。通经史，有器局，浮庆府掾中。<br /><br />
　　至元中，广东大乱。质亦聚众保乡里，据有肇沈、封川、新会等州县之地。一时三山、龙潭诸贼，莫能与争。朝廷嘉之，授广东枢密同佥。<br /><br />
　　何真恐质图之，遣其幕士孙贲说与连和。质每以安民为念，雅好儒学，衣冠之士多往从之。如江西伯颜子中、茶陵刘善、建安张智等，皆见宾礼。<br /><br />
　　后亦降于明，仕至江浙行省参政，卒。<br /><br />
　　时乐昌有小张元帅者，出没邻境。廖永忠兵至虎头门，张亦迎降。<br /><br />

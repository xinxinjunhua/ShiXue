<tr><td class="t50">任志传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　任志，潞州人。太祖十三年，木华黎略地至潞州，志迎降，木华黎授以虎符，充元帅，收辑山寨之众。数与金兵战，比有功。金人擒其长子如山以招之，曰：“降则尔子得生，不降则死。”志曰：“我为大朝之师，岂爱一子！”亲射其子殪之。<br /><br />
　　木华黎召志议军事，道过武安，其县已反为金，志死之。木华黎令其子存袭，太宗二年，武仙攻潞州，存战死。<br /><br />
　　三年正月，诏潞州元帅任存妻孥，令有司禀给，仍赐第居之。十一月，以存父子死事，子立尚幼，先官其侄成为潞州长官。成卒，授立潞州长官，佩金符。后历泽州尹，迁陈州，卒。<br /><br />

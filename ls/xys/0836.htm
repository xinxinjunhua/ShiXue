<tr><td class="t50">刘义传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘义，辽州人。父恩为金晋阳公郭文振裨将，累迁同知元帅府事，金亡，率所部来降，胡士虎那颜、杨惟中交荐之，拜辽州军民长官，佩银符，以老致仕。<br /><br />
　　义袭辽州军民长官，迁同知绛州事。再迁孟州知州，加武略将军，吏民畏爱，治绩为一路之最。<br /><br />
　　至元九年，移知临州，孟州人诣阙上书，乞义再任孟州。<br /><br />
　　十五年，卒于孟州。<br /><br />
　　义每到官，其目有四：一劝农，二兴学，三励风俗，四不贷枉法吏。前后莅四州，未尝有败事云。<br /><br />
</td></tr>

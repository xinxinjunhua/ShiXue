<tr><td class="t50">刘则礼传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘则礼，临江人。从答失八都鲁平河南，擢安陆府同知，累迁河南行枢密院副使，镇白羊口。扩廓帖木儿总兵南伐，授湖广行省左丞。<br /><br />
　　明兵入京师，则礼兵溃，率麾下百作人壁易州龙居山，间道谒扩廓帖木儿于大同。时将作院使田迈鲁团结沿山民寨，留则礼共守。未几，扩廓帖木儿败于太原，则礼知事不可为，欲拥众赴行在，迈鲁无去意。<br /><br />
　　明兵至，迈鲁迎降，欲授则礼以官，辞不受。寓蓟州而卒。<br /><br />
</td></tr>

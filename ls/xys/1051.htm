<tr><td class="t50">李国同传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李国同，登州人，能望气占休咎，又善相人。<br /><br />
　　宋末，见赵孟頫于客坐，孟頫风疮满面。即语人曰：“我过江，仅见些人。其疮愈，即见至尊，异日官至一品，名满天下。<br /><br />
　　先是，襄阳未下，世祖命国同至军中望气。行逾三两舍即还奏曰：“臣见卒伍中，往往有台辅器。襄阳不破，江南不平，置此辈于何地乎？”其术之神如此。<br /><br />

<tr><td class="t50">刘德渊传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘德渊，字道济，内邱人。性癖直，有操守。好学，能自刻厉。及游滹南王若虚门，闻思索、辨惑等说，遂餍饫史学，为专门之业。非义理不妄言动，一介不取于人。<br /><br />
　　中统初，用中书荐，授翰林待制，以不合于时，告归。立言传后，著书数万言。又通古文奇字，士多传习之。太保刘秉忠以乡曲义，来周恤，却之。许衡每过邢州，必式闾致敬而去。<br /><br />
　　至元二十三年卒。年七十九。<br /><br />

<tr><td class="t50">吴信传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　吴信，晋宁荣河人。目了能夜视，月下射雉兔于百步之外，矢无虚发。<br /><br />
　　太祖十七年，率众降于木华黎，授镇西元帅，留戍禹门东卫堡。进据汾阴乡，金荣州守将惮信威名，不敢迎击。信遂定荣州。<br /><br />
　　太宗二年，太傅耶律秃花遣信进攻夹家堡，中伏，士卒溃散。信突围而出，过深阱，跃马过之，如有神助。已而溃卒复集，现战，大破之，堡众遂降。<br /><br />
　　及境内宁谧，信躬勤稼穑，公私皆足。在任十余年，为政廉平，远近归之。后以疾致仕，卒年六十八。<br /><br />
　　子思，袭荣河诸军奥鲁。<br /><br />

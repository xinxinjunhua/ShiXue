<tr><td class="t50">选举志序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　自世祖以来，科举议而未行，士之进身，皆由椽吏。其岁贡之法曰吏习儒书，儒通吏事。奉行既久，考选多不如法。<br /><br />
　　仁宗即位，设科取士，论才首德行，衡文先经术，立法之善，易世不能废也。惟以稔知吏弊，凡由吏出身着，限以一切之法。其后御史许有壬极论文，以为通事、知印、宣使之属尚获优升，独于椽吏待之过严，绳之过刻。然吾观元之选格烦琐凌杂，务在迁其仕进之途而已，匪独仁宗之限吏为弊法也。<br /><br />
　　今为《选举志》区为四事，曰：学校、科举、铨法、考课。读史者可以甄其得失焉。<br /><br />

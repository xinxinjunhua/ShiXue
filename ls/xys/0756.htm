<tr><td class="t50">曾福仲传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　曾福仲者，其先泰和人，后徒于邵阳。福仲通《春秋》、《三礼》。<br /><br />
　　元统二年，以经明行修征入京师，久不报，馆鲁曾家。鲁曾从福仲言，请以真哥皇后配享，且告伯颜曰：“此馆客曾福仲之议也。”伯颜召福仲问之，对如初，乃以福仲为太常博士。福仲与刘闻同为博士，相友善，议宁宗祭拜礼，福仲助闻争之，性刚，忤丞相朵儿只歹，左迁天临路录事，弃官归，卒。<br /><br />
　　刘闻，字久廷，安福人。父蒙正，淹贯六籍，读书过目成诵，闻亦有学行。<br /><br />

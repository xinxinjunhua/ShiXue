<tr><td class="t50">谢天吉传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　谢天吉，字钟祥，临晋人，累官昭勇大将军、镇边元帅、行河中府事，赐金符。<br /><br />
　　金亡，流民多逃难于河南，知天吉以公事至，流民相谓曰：“吾谢帅素有仁名，舍此曷归？”于是来附者数千人。时行省征发无度，天吉计民力必不能供，自出家资助之。复又征黄金百余笏，天吉自度无所出，乃假自投于河。家属迎丧至，观者无不泣下。征金事遂寝。<br /><br />
　　后又征役，民相谓曰：“若谢帅在，事必不至此。”左右或谓之曰：“谢帅实在，向之死伪也。”众皆惊喜，同往谒天吉，求复领府事。天吉起，事果寝，其为人所敬信如此。卒年五十九。<br /><br />

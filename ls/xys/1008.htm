<tr><td class="t50">李孝光传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李孝光，字季和，温州乐清人。少居雁荡山五峰下，四方之士远来受学，名誉日闻，泰不华以师事之。<br /><br />
　　至正七年，诏征隐士。以秘书监著作朗召，与完者图、执礼哈琅、董立同应诏，赴京师，见帝于宣文阁，进《考经图说》，帝大说，赐上尊。<br /><br />
　　明年，长文林郎、秘书监丞，卒于官，年五十三。<br /><br />
　　孝光以文章负名当世，其文取法古人，非先泰、两汉语，弗以措辞。有文集二十卷。<br /><br />
　　同时莆田人朱文霆，字原道，仕至泉州路总管，博学能文，宋濂称其言醇而理彰。著《葵山集》。<br /><br />

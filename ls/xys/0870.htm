<tr><td class="t50">卢琦传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　卢琦，字希韩，泉州惠安人。至正二年进士，授台州录事。迁永春县尹。减口盐一百余引，民德之。邻县盗发，琦与义士吕用宾等大募民兵击之，屡战屡克，威惠行于境外。后琦巡县境，盗遥见，迎拜曰：“此永春大夫也。”琦立马谕以祸福，皆投刀槊请降。<br /><br />
　　十六年，改调宁德尹。迁盐司提举。以近臣荐，除平阳州知州，命下而卒。琦工诗文，著有《圭峰集》七卷。<br /><br />
　　时江州总管王大中，岁饥货富民粟以赈贫民，免富民之徭役，民德之，其名誉与琦相埒。<br /><br />

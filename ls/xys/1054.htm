<tr><td class="t50">刘岳传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘岳，字公泰，南康星子人。祖闻，宋名医。岳读书于白鹿洞书院，能世其家学。<br /><br />
　　世祖定江南，有司以岳应聘，召对便殿，命以奉议大夫，官太医院使。称为刘三点，以指三下，即知受病之源也。未几，改翰林学士、知制诰同修国史。出为建昌路推官，卒。<br /><br />
</td></tr>

<tr><td class="t50">祃牙祭旗鼓</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　蒙古军礼之仅见者。<br /><br />
　　宪宗二年七月，命皇弟忽必烈征大理，诸王祃牙西行。<br /><br />
　　七年六月，谒太祖行宫，祭旗鼓。<br /><br />
　　八年十一月，令皇弟忽必烈祃牙于开平西北。其祃牙之礼与扶旗鼓之礼，均未闻。辽景宗将伐宋，命巫者祠兵神及祭旗鼓。益辽金旧嗣，蒙古袭而用之。<br /><br />

<tr><td class="t50">李俊民传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李俊民，字用章，泽州人。金承安中，以经学举进士第一，授应奉翰林文字。未几，弃官归，以所不教授乡里。金南迁后，隐嵩山。再徒怀州，俄复归嵩山。既而变起仓卒，人服其先知。<br /><br />
　　俊民在河南时，隐士荆先生授以皇极数学。时知数乾无出刘秉忠右。之自以为弗以。世祖在藩邸，以安车召至，延访无虚日。遽乞还山，世祖重违其意，遣中贵护送之。<br /><br />
　　又尝令张易问以祯祥，及即位，其言皆验。而俊民已卒，年八十余。赐谥庄静先生。<br /><br />
</td></tr>

<tr><td class="t50">阿儿思兰传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　阿儿思兰，阿速氏。宪宗伐阿速部，阿儿思兰偕其子阿散真上谒，帝赐手诏，命专领阿速部众，留其众之年，余悉遣归，以阿散真侍左右。道遇阇里哥叛。阿散真力战死。帝命裹其尸还葬之。阿思兰言于帝曰：“臣长子死，今以次子捏古来侍，陛下愿用之。”<br /><br />
　　捏古来，从兀良合台征剌章有功。又从伐宋，中流矢卒。<br /><br />
　　子忽都儿，世祖命从孛罗那颜便于哈儿真，以疾卒。<br /><br />
　　子忽都帖木儿。<br /><br />

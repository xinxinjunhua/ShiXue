<tr><td class="t50">速客图传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　速客图，晃豁坛氏。事太祖，以千户营钦膳。<br /><br />
　　太祖用兵西域，分四路攻之。速客图与阿剌黑、塔孩二人将五千人为一路，东南攻白讷克特城。围三日，降之，分康里兵与民置两地，尽杀康里兵，取工匠从军，忽毡城酋帖木儿玛里克守锡尔河中潬，与城犄角，矢石不能及，又造十二艘。裹以毡泥，御火箭。速客图以兵力不足，请援。<br /><br />
　　援兵至，驱民五万，运石填河，为甬道，达于中潬。玛里克不能守，遂遁。<br /><br />

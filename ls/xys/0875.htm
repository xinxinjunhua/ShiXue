<tr><td class="t50">郭思恭传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　郭思恭，字子敬，彰德安阳人，肄业国子学。故事，陪堂生输钱，乃得食。祭酒耶律有尚悯思恭贫，免其输，补伴读。授汝宁州教授，迁光山县主簿。有惠政。光山县尹马祖节亟称之。累转猗氏县。有争田久不决者，思恭至即决之。召为国子助教，迁博士。拜监察御史，出佥燕南、河南两道廉访司事。<br /><br />
　　转淮西道，谢病归，中途召为集贤直学士，兼国子祭酒，至任甫三月，又谢病归。<br /><br />
　　至正五年，卒，年七十二。<br /><br />
</td></tr>

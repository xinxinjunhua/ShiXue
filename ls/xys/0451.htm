<tr><td class="t50">季庭璋传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　季庭璋，莒州人。父智仙，千户。<br /><br />
　　庭璋从大军围襄阳，败宋援兵，授敦武校尉、右卫亲军百户。<br /><br />
　　十三年，巡哨高邮、宝应，累有功，进忠显校尉、侍卫亲军总把。宋平，赐银符，进忠翊校尉。<br /><br />
　　十五年，从大军北征，擢汉军都元帅府都镇抚。率所部戍和林成阔阔之地，宗王伯木儿赐以牛羊。<br /><br />
　　十八年，擢武略将军、管军千户。<br /><br />
　　二十六年，世祖亲征乃颜，命左丞李庭举精于韬略者，以庭璋应选，诏驰驿至军中。<br /><br />
　　二十七年，军还，换金符，进武德将军、右卫亲军千户。卒。<br /><br />
　　子珍袭父职。<br /><br />

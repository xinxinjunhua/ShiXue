<tr><td class="t50">亦思马因传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　亦思马因，别马里斯丹人。人大兵攻襄阳。亦思因置炮于城东南隅。机发，声震天地。守将吕文焕惧，以城降。授回回炮手总管，佩虎符。<br /><br />
　　十一年，卒。<br /><br />
　　子布伯袭职。从大兵波江。每战皆有功。<br /><br />
　　十八年，赐三珠虎符，加都元帅。明年，时军匠府万户。迁刑部尚书。以弟亦不敕金为万户，佩元降虎符。布伯改通奉大夫、浙东宣慰使。卒。<br /><br />
</td></tr>

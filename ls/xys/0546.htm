<tr><td class="t50">塔海传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　塔海，方数岁，世祖一见奇之，命肄业国子监。成宗即位，授枢密院断事官。<br /><br />
　　大德末，辅立武宗，转同佥枢密院事。擢枢密副使。寻迁大司农、同知宣徽院事。<br /><br />
　　仁宗在东宫，或建议立黑军卫率府，塔海力谏，仁宗嘉纳之。及即位，迁集贤大学士，太医、宣徽院使，进翰林学土承旨、知制诰兼修国史。卒。<br /><br />
</td></tr>

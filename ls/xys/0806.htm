<tr><td class="t50">魏赛因不花传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　魏赛因不花，息州人，幼卓荦不群，善骑射。<br /><br />
　　至正间，红巾贼起，募义勇御之，以众属察罕帖木儿。尝单骑杀贼百余人，又从扩廓帖木儿讨孛罗帖木儿于大同，破之。累官河南江北知枢密院事。又讨奥秃坚帖木儿于岭北，获之，进拜中书平间政事，卒。<br /><br />
</td></tr>

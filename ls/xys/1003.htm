<tr><td class="t50">刘诜传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘诜，字桂翁，吉安庐陵人，少有文名。江南行御史台屡以教官、馆职，遗逸荐，皆不报。诗文曰《桂隐集》。桂隐，诜别号也。至正十年卒。年八十三。赐谥文敏。<br /><br />
　　同郡龙仁夫，字观复，刘岳申高字促，其文学皆与诜刘名。有集行世。而仁夫之文尤奇逸流丽，所著《周易》多发前儒所未发。岳申用荐为辽阳儒学副提举，仁夫江浙儒学副提举，皆不就。<br /><br />
</td></tr>

<tr><td class="t50">董朴传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　董朴，字大初，顺德人，自幼强记，比冠，幡然有求道之志。<br /><br />
　　至元十六年，用荐起家为陕西知法官。未几，以亲老归养。寻召为太史院主事，复辞不赴。皇庆初年，已逾八十，诏以翰林修撰致仕。<br /><br />
　　延祐三年，无疾而终。<br /><br />
　　朴所为学，自六经及孔、孟微言，与凡先儒所以开端阐幽者，莫不研其旨而会通之。其事亲孝，与人交，无智愚贵贱，一待以诚，或有犯之者，夷然不与校。中山王结曰：“朴之学，告诣既深，充养交至，其为人清而通和，和而介，君子人也。”所居近龙冈，学者称龙冈先生云。<br /><br />

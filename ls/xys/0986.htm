<tr><td class="t50">江克宽传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　汪克宽，字德一，祁门人，祖华，为饶鲁门人，传黄勉斋之学。<br /><br />
　　克宽十岁，其父授以《双峰问答》，辄有悟。后从浮梁吴仲迂受业。<br /><br />
　　泰定中，应进士举，以策对伉直，见黜。乃弃科举业，尽力于经学。著《春秋经传附录纂疏》、《程朱传义音考》、《诗集传音义会通》、《礼经补逸》、《纲目凡例考异》，又《环谷集》八卷。<br /><br />
　　元末，为朱子之学者，以克宽为大师。明初，聘修《元史》，欲官之，固辞不受。卒年六十九。<br /><br />
</td></tr>

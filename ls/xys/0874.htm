<tr><td class="t50">许义夫传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　许义夫，砀山人。为夏邑县尹，每亲诣乡社教民稼穑，见民勤谨者，出己俸赏之，怠惰者罚之。三年之间，境内丰足。<br /><br />
　　后为封丘县尹。值至正四年大饥，盗贼群起，抄掠州县。义夫闻贼近境，乃单马出郊十里外迎之，见贼数百人。义夫力言：“封丘县小，民贫，已惊惶逃窜，幸无入吾境。”言辞愿款，贼遂去，民免于难。<br /><br />
</td></tr>

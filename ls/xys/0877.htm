<tr><td class="t50">罗文焕传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　罗文焕，字显卿，巨野人。以荐除胶州判官。行用库吏，应者必破产，文焕择精识楮币者十余家，以次应役，民便之。有盗金珠者，已诬服，谳而疑之。俄得真盗，尽释诬者。代去，民立去思碑。<br /><br />
　　后为吴桥尹。御河岁决，文焕筑堤百余里，水患遂绝，民为立生祠。改武冈路推官，不赴。晚号独慎主人。<br /><br />
　　后至元五年，卒。<br /><br />

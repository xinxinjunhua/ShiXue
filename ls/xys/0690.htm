<tr><td class="t50">王毅传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王毅，字栗夫，东不汶上人。以大臣荐，累官翰林学士承旨、太子詹事。武宗欲幸寿安佛寺，毅疏谏止之。仁宗即位，劾铁木迭儿营私蠹政，伏阙极论之，不报。以亲老告归，用御史台荐，召不。<br /><br />
　　延祐三年，拜中书右丞。四年，出为江浙行省右丞，迁中书平章政事。<br /><br />
　　六年，复以亲老致仕。仁宗崩，欠木迭儿复相，诬以征理钱谷不实，欲奏杀之，英宗不从，始获免。后卒于家。<br /><br />
　　初毅召用时，父玉附诏使奏曰：“臣玉虽老尚健，谨遣毅一心事陛下。”仁宗大喜，特授玉集贤学士，阶资德大夫，士论荣之。<br /><br />

<tr><td>
<br />
　　杭世骏<br /><br />
　　契丹国志二十七卷，淳熙七年秘书丞叶隆礼表进。其刘六符、耶律余睹诸传及诸番杂记全袭洪氏松漠纪闻，晋出帝降表暨东丹王传又割五代史以成文。其与他书异者，惟王沂公、富郑公行程录，文献通考虽载其目，而其书已亡，得此为不坠于地。至胡峤陷北记，五代史、辽史间一称引之，此独载其全，为可宝也。<br /><br />
　　<span class="zs">〔道古堂文集卷二十六。〕</span><br /><br />

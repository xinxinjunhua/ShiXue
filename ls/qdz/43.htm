<tr><td>
<br />
　　章钰<br /><br />
　　据艺芸精舍校本，每半叶十一行，行二十二字，疑出原式，唐翰题书衣题语谓“从元刊本影出”，或当有据，今藏海丰吴氏，乙卯（一八五五年）三月备校，五日讫事。章钰。<br /><br />
　　四库提要云：“仰遵圣训，改正胡安国谬说。”又黄荛圃跋元刻本云：“其上方有小字标明书中眼目”。是扫叶源出阁本，故不存胡说。<br /><br />
　　汪钞校本与黄跋符合，鹪庵定为从元本出，昭然无可疑，海丰吴氏又藏旧钞大金国志一部，行格与契丹国志上方小字标目亦同，知二书必有同刻之本也。<br /><br />

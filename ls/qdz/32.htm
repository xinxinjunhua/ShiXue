<td class="t50">契丹国志提要补正</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　胡玉缙<br /><br />
　　契丹国志二十七卷。“忽而内宋，则或称辽帝，或称国主；忽而内辽，则以宋帝年号分注辽帝年号之下，既自相矛盾。”<br /><br />
　　案：卷首载乾隆四十六年谕云：“甚至大书辽帝纪元于上，而以宋祖建隆等年号分注于下，尤为纰缪。”窃谓书既名契丹国志，则以辽纪年即公羊“地从主人”之例。提要于此处，但议其矛盾，不斥其纰缪，颇见斟酌。<br /><br />
　　<span class="zs">〔四库全书总目提要补正上册卷十七。〕</span><br /><br />

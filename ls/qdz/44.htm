<td class="t50">跋石莲阁艺芸精舍影元本稿</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　此书渔洋书跋、读书敏求记均未标明何本，惟士礼居藏十七卷，乃残元本也。今通行扫叶山房刻本，系出四库，不但删去胡安国说及上方小字标目，文中触目字样，均经馆臣改过，与钰前见孔荭谷抄校邵二云手辑旧五代史原本相同。此本尚存真面目，故可秘珍。<br /><br />
　　乙卯（一八五五年）四月，借校一过，因记。<br /><br />
　　<span class="zs">〔北京图书馆藏章钰识记清复印件契丹国志。〕</span><br /><br />

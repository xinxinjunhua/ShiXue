<td class="t50">道悼王静传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　道悼王静，字贤籀，滕穆王瓚之子也。出继叔父嵩。嵩在周代，以太祖军功，赐爵兴城公，早卒。高祖践位，追封道王，谥曰宣。以静袭焉。卒，无子，国除。<br /><br />

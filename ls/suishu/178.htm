<td class="t50">杨处纲传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　杨处纲，高祖族父也。生长北边，少习骑射。在周尝以军功拜上仪同。高祖受禅，赠其父钟葵为柱国、尚书令、义城县公，以处纲袭焉。授开府，督武候事。寻为太子宗卫率，转左监门郎将。后数载，起授右领军将军。处纲虽无才艺，而性质直，在官强济，亦为当时所称。寻拜蒲州刺史，吏民悦之。进位大将军。后迁秦州总管，卒官。谥曰恭。<br /><br />
　　弟处乐，官至洛州刺史。汉王谅之反也，朝廷以为有二心，废锢不齿。<br /><br />

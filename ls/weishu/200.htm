<td class="t50">胡方回传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　胡方回，安定临泾人。父义周，姚泓黄门侍郎。方回，赫连屈丐中书侍郎。涉猎史籍，辞彩可观，为屈丐《统万城铭》、《蛇祠碑》诸文，颇行于世。世祖破赫连昌，方回入国。雅有才尚，未为时所知也。后为北镇司马，为镇修表，有所称庆。世祖览之嗟美，问谁所作。既知方回，召为中书博士，赐爵临泾子。迁侍郎，与太子少傅游雅等改定律制。司徒崔浩及当时朝贤，并爱重之。清贫守道，以寿终。<br /><br />
　　子始昌，亦长者，有父风。历位南部主书。子丑孙，中书学生、秘书郎、中散。世不治产业，家甚贫约。兄弟并早亡。<br /><br />

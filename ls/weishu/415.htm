<tr><td class="t50">邓至传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　邓至者，白水羌也，世为羌豪，因地名号，自称邓至。其地自亭街以东，平武以西，汶岭以北，宕昌以南。土风习俗，亦与宕昌同。其王像舒治遣使内附，高祖拜龙骧将军、邓至王，遣贡不绝。<br /><br />
　　邓至之西有赫羊等二十国，时遣使朝贡，朝廷皆授以杂号将军、子男、渠帅之名。<br /><br />

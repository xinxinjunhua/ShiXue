<tr><td class="t50">豆莫娄传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　豆莫娄国，在勿吉国北千里，去洛六千里，旧北扶余也。在失韦之东，东至于海，方二千里。其人土著，有宫室仓库。多山陵广泽，于东夷之域最为平敞。地宜五谷，不生五果。其人长大，性强勇，谨厚，不寇抄。其君长皆以六畜名官，邑落有豪帅。饮食亦用俎豆。有麻布，衣制类高丽而幅大，其国大人，以金银饰之。用刑严急，杀人者死，没其家人为奴婢。俗淫，尤恶妒妇，妒者杀之，尸其国南山上至腐。女家欲得，输牛马乃与之。或言本秽貊之地也。<br /><br />
</td></tr>

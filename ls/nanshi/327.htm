<td class="t50">胡颖传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　胡颖，字方秀，吴兴人也。伟姿容，性宽厚。梁末，陈武帝在广州，颖深自结托。从克元景仲，平蔡路养、李迁仕皆有功。武帝进军顿西昌，以颖为巴丘令，镇大皋，督粮运。下至豫章，以颖监豫章郡。武帝率众与王僧辩会白茅湾，同讨侯景，以颖知留府事。<br /><br />
　　梁承圣初，元帝授颖罗州刺史，封汉阳县侯。寻除豫章内史，随武帝镇京口。齐遣郭元建出东关，武帝令颖率府内骁勇随侯瑱，于东关大破之。后从武帝袭王僧辩，又随周文育于吴兴讨杜龛。武帝受禅，兼左卫将军。天嘉元年，除散散常侍，吴兴太守。卒官，谥曰壮。二年，配享武帝庙庭。子六同嗣。<br /><br />

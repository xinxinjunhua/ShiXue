<td class="t50">张惠绍传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张惠绍，字德继，义阳人也。少有武干，仕齐为竟陵横桑戍主。母丧归乡里。闻梁武帝起兵，乃自归，累有战功。武帝践阼，封石阳县侯，位骁骑将军、直阁、左细仗主。时东昏余党数百人窃入南、北掖门，夜烧神兽门，害卫尉张弘策。惠绍驰率所领赴战，贼乃散走。迁太子右卫率，以军功累增爵邑。历位卫尉卿，左卫将军，司州刺史，领安陆太守。在州和理，吏人亲爱之。征还为左卫将军，加通直散骑常侍，甲仗百人，直卫殿中。卒，谥曰忠。<br /><br />
　　子登嗣。累有战功，与湛僧智、胡绍世、鱼弘并为当时骁将。历官卫尉卿，太子左卫率。卒官，谥曰愍。<br /><br />

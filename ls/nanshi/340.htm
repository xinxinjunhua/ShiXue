<td class="t50">赵知礼传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　赵知礼，字齐旦，天水陇西人也。父孝穆，梁候官令。知礼涉猎文史，善书翰。陈武帝之讨元景仲也，或荐之，引为书记。知礼为文赡速，每占授军书，下笔便就，率皆称旨。由是恒侍左右，深被委任，当时计画，莫不预焉。<br /><br />
　　武帝征侯景，至白茅湾，上表于梁元帝及与王僧辩论军事，其文并知礼所制。及景平，授中书侍郎，封始平县子。陈受命，位散骑常侍、太府卿，权知领军事。天嘉元年，进爵为伯。王琳平，授吴州刺史。知礼沉静有谋谟，每军国大事，文帝辄令玺书问之。再迁右将军，领前军将军。卒，赠侍中，谥曰忠。子元恭嗣。<br /><br />
</td></tr>

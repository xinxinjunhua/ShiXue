<td class="t50">孙处传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　孙处，字季高，会稽永兴人也。籍注字，故以字行。少任气，武帝征孙恩，季高乐从。及平建邺，封新番县五等侯。<br /><br />
　　卢循之难，武帝谓季高曰：“此贼行破，非卿不能破其窟穴。”即遣季高泛海袭番禺，拔之。循父嘏、长史孙建之、司马虞尫夫等轻舟奔始兴，即分遣振武将军沈田子等讨平岭表诸郡。循于左里走还袭广州，季高破走之。义熙七年，季高卒，追赠南海太守，封候官县侯。九年，武帝表赠交州刺史。<br /><br />

<td class="t50">席阐文传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　席阐文，安定临泾人也。孤贫，涉猎书史。齐初，为雍州刺史萧赤斧中兵参军，由是与其子颖胄善。复历西中郎中兵参军，领城局。梁武帝之将起兵，阐文劝颖胄同焉，仍遣客田祖恭私报帝，并献银装刀，帝报以金如意。<br /><br />
　　和帝称尊号，为卫尉卿。颖胄暴卒，州府骚扰，阐文以和帝幼弱，中流任重，时始兴王憺留镇雍部，乃与西朝群臣迎憺总州事，故赖以宁辑。帝受禅，除都官尚书，封山阳伯，出为东阳太守。在郡有能名。冬至，悉放狱中囚，依期而至。改封湘西侯。卒官，谥曰威。<br /><br />

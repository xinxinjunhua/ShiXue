<td class="t50">齐文惠诸子传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　文惠太子四男：安皇后生废帝郁林王昭业，宫人许氏生废帝海陵恭王昭文，陈氏生巴陵王昭秀，褚氏生桂阳王昭粲。<br /><br />
　　巴陵王昭秀，字怀尚，太子第三子也。郁林即位，封临海郡王。隆昌元年，为都督、荆州刺史。延兴元年，征为车骑将军。明帝建武二年，改封巴陵王。永泰元年见杀，年十六。<br /><br />
　　＊＊＊<br /><br />
　　桂阳王昭粲，太子第四子也。郁林立，封永嘉郡王。延兴元年，出为荆州刺史，加都督。建武二年，改封桂阳王。四年，为太常。永泰元年见杀，年八岁。<br /><br />

<tr><td class="t50">毛公</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　毛公，赵人也。治《潍》，为河间献王博士，授同国贯长卿。长卿授解延年。延年为阿武令，授徐敖。敖授九江陈侠，为王莽讲学大夫。由是言《毛诗》者，本之徐敖。<br /><br />

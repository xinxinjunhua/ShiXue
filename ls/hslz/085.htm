<tr><td class="t50">公孙敖传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　公孙敖，义渠人，以郎事景帝。至武帝立十二岁，为骑将军，出代，亡卒七千人，当斩，赎为庶人。后五岁，以校尉从大将军，封合骑侯。后一岁，以中将军从大将军再出定襄，无功。后二岁，以将军出北地，后票骑期，当斩，赎为庶人。后二岁，以校尉从大将军，无功。后十四岁，以因杅将军筑受降城。七岁，复以因杅将军再出击匈奴，至余吾，亡士多，下吏，当斩，诈死，亡居民间五、六岁。后觉，复系。坐妻为巫蛊，族。凡四为将军。<br /><br />
</td></tr>

<tr><td class="t50">颜安乐</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　颜安乐字公孙，鲁国薛人，眭孟姊子也。家贫，为学精力，官至齐郡太守丞，后为仇家所杀。安乐授淮阳泠丰次君、淄川任公。公为少府，丰淄川太守。由是颜家有泠、任之学。始贡禹事嬴公，成于眭孟，至御史大夫，疏广事孟卿，至太子太傅，皆自有传。<br /><br />
　　广授琅邪管路，路为御史中丞。禹授颍川堂溪惠，惠授泰山冥都，都为丞相史。都与路又事颜安乐，故颜氏复有管、冥之学。路授孙宝，为大司农，自有传。丰授马宫、琅邪左咸。咸为郡守九卿，徒众尤盛。宫至大司徒，自有传。<br /><br />
</td></tr>

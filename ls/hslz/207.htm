<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　费直字长翁，东莱人也。治《易》为郎，至单父令。长于卦筮，亡章句，徒以《彖》、《象》、《系辞》十篇文言解说上下经。琅邪王璜平中能传之。璜又传古文《尚书》。<br /><br />

<tr><td class="t50">夏侯始昌传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　夏侯始昌，鲁人也。通《五经》，以《齐诗》、《尚书》教授。自董仲舒、韩婴死后，武帝得始昌，甚重之。始昌明于阴阳，先言柏梁台灾曰，至期日果灾。时，昌邑王以少子爱，上为选师，始昌为太傅。年老，以寿终。<br /><br />
　　族子胜亦以儒显名。<br /><br />
</td></tr>

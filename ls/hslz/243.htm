<tr><td class="t50">尹齐传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　尹齐，东郡茌平人也。以刀笔吏稍迁至御史。事张汤，汤数称以为廉。武帝使督盗贼，斩伐不避贵势。迁关都尉，声甚于甯成。上以为能，拜为中尉。吏民益凋敝，轻齐木强少文，豪恶吏伏匿而善吏不能为治，以故事多废，抵罪。后复为淮阳都尉。王温舒败后数年，病死，家直不满五十金。所诛灭淮阳甚多，及死，仇家欲烧其尸，妻亡去，归葬。<br /><br />
</td></tr>

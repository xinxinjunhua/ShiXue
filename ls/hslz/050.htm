<tr><td class="t50">济北王刘勃传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　济北贞王勃者，景帝四年徙。徙二年，因前王衡山，凡十四年薨。子式王胡嗣，五十四年薨。子宽嗣。十二年，宽坐与父式王后光、姬孝兒奸，悖人伦，又祠祭祝诅上，有司请诛。上遣大鸿胪利召王，王以刃自刭死。国除为北安县，属泰山郡。<br /><br />
　　【淮南衡山济北王传论】<br /><br />
　　赞曰：《诗》云“戎狄是膺，荆舒是惩”，信哉是言也！淮南、衡山亲为骨肉，疆土千里，列在诸侯，不务遵蕃臣职，以丞辅天子，而剸怀邪辟之计，谋为畔逆，仍父子再亡国，各不终其身。此非独王也，亦其俗薄，臣下渐靡使然。夫荆楚剽轻，好作乱，乃自古记之矣。<br /><br />

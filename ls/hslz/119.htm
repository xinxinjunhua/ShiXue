<tr><td class="t50">桑弘羊传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　桑弘羊为御史大夫八年，自以为国家兴榷管之利，伐其功，欲为子弟得官，怨望霍光，与上官桀等谋反，遂诛灭。<br /><br />
　　<span class="zs">（胡案：桑弘羊只此一句？疑被人删削。）</span><br /><br />

<tr><td class="t50">甘延寿传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　甘延寿字君况，北地郁郅人也。少以良家子善骑射为羽林，投石拔距绝于等伦，尝超逾羽林亭楼，由是迁为郎。试弁，为朝门，以材力爱幸。稍迁至辽东太守，免官。<br /><br />
　　车骑将军许嘉荐延寿为郎中，谏大夫，使西域都护、骑都尉，与副校尉陈汤共诛斩郅支单于，封义成侯。薨，谥曰壮侯。<br /><br />
　　传国至曾孙，王莽败，乃绝。<br /><br />

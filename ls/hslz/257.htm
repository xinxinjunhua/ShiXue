<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　赞曰：<br /><br />
　　柔曼之倾意，非独女德，盖亦有男色焉。观籍、闳、邓、韩之徒非一，而董贤之宠尤盛，父子并为公卿，可谓贵重人臣无二矣。然进不由道，位过其任，莫能有终，所谓爱之适足以害之者也。汉世衰于元、成，坏于哀、平。哀、平之际，国多衅矣。主疾无嗣，弄臣为辅，鼎足不强，栋干微挠。一朝帝崩，奸臣擅命，董贤缢死，丁、傅流放，辜及母后，夺位幽废，咎在亲便嬖，所任非仁贤。故仲尼著“损者三友”，王者不私人以官，殆为此也。<br /><br />
</td></tr>

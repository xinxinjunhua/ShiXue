<tr><td class="t50">萧由传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　由字子骄，为丞相西曹卫将军掾，迁谒者，使匈奴副校尉。后举贤良，为定陶令，迁太原都尉，安定太守。治郡有声，多称荐者。初，哀帝为定陶王时，由为定陶令，失王指，顷之，制书免由为庶人。哀帝崩，为复土校尉、京辅左辅都尉，迁江夏太守。平江贼成重等有功，增秩为陈留太守，元始中，作明堂辟雍，大朝诸侯，征由为大鸿胪，会病，不及宾赞，还归故官，病免。复为中散大夫，终官。家至吏二千石者六七人。<br /><br />
</td></tr>

<tr><td class="t50">赵食其传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　赵食其，祋祤人。武帝立十八年，以主爵都尉从大将军，斩首六百六十级。元狩三年，赐爵关内侯，黄金百斤。明年，为右将军，从大将军出定襄，迷失道，当斩，赎为庶人。<br /><br />

<tr><td class="t50">任敖传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　任敖，沛人也，少为狱吏。高祖尝避吏，吏系吕后，遇之不谨。任敖素善高祖，怒，击伤主吕后吏。及高祖初起，敖以客从为御史，守丰二岁。高祖立为汉王，东击项羽，遨迁为上党守。陈豨反，敖坚守，封为广阿侯，食邑千八百户。高后时为御史大夫，三岁免。孝文元年薨，谥曰懿侯。传子至曾孙越人，坐为太常庙酒酸不敬，国除。<br /><br />

<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　赞曰：<br /><br />
　　自武帝立《五经》博士，开弟子员，设科射策，劝以官禄，讫于元始，百有余年，传业者浸盛，支叶蕃滋，一经说至百余万言，大师众至千余人，盖禄利之路然也。<br /><br />
　　初，《书》唯有欧阳，《礼》后，《易》杨，《春秋》公羊而已。至孝宣世，复立《大小夏侯尚书》，《大小戴礼》，《施》、《孟》、《梁丘易》，《穀梁春秋》。<br /><br />
　　至元帝世，复立《京氏易》，平帝时，又立《左氏春秋》、《毛诗》、逸《礼》、古文《尚书》，所以罔罗遗失，兼而存之，是在其中矣。<br /><br />

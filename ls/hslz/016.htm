<tr><td class="t50">刘辟强传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　辟强字少卿，亦好读《诗》能属文。武帝时，以宗室子随二千石论议，冠诸宗室。清静少欲，常以书自娱，不肯仕。<br /><br />
　　昭帝即位，或说大将军霍光曰：“将军不见诸吕之事乎？处伊尹，周公之位，摄政擅权，而背宗室，不与共职，是以天下不信，卒至于灭亡。今将军当盛位，帝春秋富，宜纳宗室，又多与大臣共事，反诸吕道，如是则可以免患。”光然之，乃择宗室可用者。<br /><br />
　　辟强子德待诏丞相府，年三十余，欲用之。或言父见在，亦先帝之所宠也。遂拜辟强为光禄大夫，守长乐卫尉，时年已八十矣。徙为宗正，数月卒。<br /><br />

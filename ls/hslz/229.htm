<tr><td class="t50">左传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　汉兴，北平侯张苍及梁大傅贾谊、京兆尹张敞、太中大夫刘公子皆修《春秋左氏传》。谊为《左氏传》训故，授赵人贯公，为河间献王博士，子长卿为荡阴令，授清河张禹长子。禹与萧望之同时为御史，数为望之言《左氏》，望之善之，上书数以称说。后望之为太子太傅，荐禹于宣帝，征禹待诏，未及问，会疾死。授尹更始，更始传子咸及翟方进、胡常。常授黎阳贾护季君，哀帝时待诏为郎，授苍梧陈钦子佚，以《左氏》授王莽，至将军。而刘歆从尹咸及翟方进受。由是言《左氏》者本之贾护、刘歆。<br /><br />

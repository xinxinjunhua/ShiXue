<tr><td class="t50">冯立传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　立字圣卿，通《春秋》。以父任为郎，稍迁诸曹。竟宁中，以王舅出为五原属国都尉。数年，迁五原太守，徙西河、上郡。立居职公廉，治行略与野王相似，而多知有恩贷，好为条教。吏民嘉美野王、立相代为太守，歌之曰：<br /><br />
　　“大冯君，小冯君，兄弟继踵相因循，聪明贤知惠吏民，政如鲁、卫德化钧，周公、康叔犹二君。”<br /><br />
　　后迁为东海太守，下湿病痹。天子闻之，徙立为太原太守。更历五郡，所居有迹。年老卒官。<br /><br />
</td></tr>

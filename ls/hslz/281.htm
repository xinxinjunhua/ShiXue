<tr><td class="t50">外戚传论</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　赞曰：<br /><br />
　　《易》著吉凶而言谦盈之效，天地鬼神至于人道靡不同之。夫女宠之兴，由至微而体至尊，穷富贵而不以功，此固道家所畏，祸福之宗也。序自汉兴，终于孝平，外戚后庭色宠著闻二十有余人，然其保位全家者，唯文、景、武帝太后及邛成后四人而已。至如史良娣、王悼后、许恭哀后身皆夭折不辜，而家依托旧恩，不敢纵恣，是以能全。其余大者夷灭，小者放流，呜呼！鉴兹行事，变亦备矣。<br /><br />
</td></tr>

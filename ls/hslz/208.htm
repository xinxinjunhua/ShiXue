<tr><td class="t50">高相</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　高相，沛人也。治《易》与费公同时，其学亦亡章句，专说阴阳灾异，自言出于丁将军。传至相，相授子康及兰陵母将永。康以明《易》为郎，永至豫章都尉。及王莽居摄，东郡太守翟谊谋举兵诛莽，事未发，康候知东郡有兵，私语门认，门人上书言之。后数月，翟谊兵起，莽召问，对“受师高康鸀。莽恶之，以为惑众，斩康。<br /><br />
　　由是《易》有高氏学。高、费皆未尝立于学官。<br /><br />
</td></tr>

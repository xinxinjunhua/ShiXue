<tr><td class="t50">后苍</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　后苍字近君，东海郯人也。事夏侯始昌。始昌通《五经》，苍亦通《诗》、《礼》，为博士，至少府，授翼奉、萧望之、匡衡。奉为谏大夫，望之前将军，衡丞相，皆有传。衡授琅邪师丹、伏理斿君、颍川满昌君都。君都为詹事，理高密太傅，家世传业。丹大司空，自有传。<br /><br />
　　由是《齐诗》有翼、匡、师、伏之学。满昌授九江张邯、琅邪皮容、皆至大官，徒众尤盛。<br /><br />
</td></tr>

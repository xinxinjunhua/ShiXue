<tr><td class="t50">京房</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　<span class="zs">（胡案：京房传已见前，此处专叙学术传承。）</span><br /><br />
　　京房受《易》梁人焦延寿。延寿云尝从孟喜问《易》。会喜死，房以为延寿《易》即孟氏学，翟牧、白生不肯，皆曰非也。至成帝时，刘向校书，考《易》说，以为诸《易》家说皆祖田何、杨叔元、丁将军，大谊略同，唯京氏为异，党焦延寿独得隐士之说，托之孟氏，不相与同。房以明灾异得幸，为石显所谮诛，自有传。<br /><br />
　　房授东海殷嘉、河东姚平、河南乘弘，皆为郎、博士。由是《易》有京氏之学。<br /><br />

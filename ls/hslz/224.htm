<tr><td class="t50">胡母生</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　胡母生字子都，齐人也。治《公羊春秋》，为景帝博士。与董仲舒同业，仲舒著书称其德。年老，归教于齐，齐之言《春秋》者宗事之，公孙弘亦颇受焉。而董生为江都相，自有传。弟子遂之者，兰陵褚大、东平赢公、广川段仲、温吕步舒。大至梁相，步舒丞相长史，唯赢公守学不失师法，为昭帝谏大夫，授东海孟卿、鲁眭孟。孟为符节令，坐说灾异诛，自有传。<br /><br />
</td></tr>

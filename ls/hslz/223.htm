<tr><td class="t50">孟卿</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　孟卿，东海人也。事萧奋，以授后仓、鲁闾丘卿。仓说《礼》数万言，号曰《后氏曲台记》，授沛闻人通汉子方、梁戴德延君、戴圣次君、沛庆普孝公。孝公为东平太傅。德号大戴，为信都太傅；圣号小戴，以博士论石渠，至九江太守。由是《礼》有大戴、小戴、庆氏之学。通汉以太子舍人论石渠，至中山中尉。普授鲁夏侯敬，又传族子咸，为豫章太守。大戴授琅邪徐良斿卿，为博士、州牧、郡守，家世传业。小戴授梁人桥仁季卿、杨荣子孙。仁为大鸿胪，家世传业，荣琅邪太守。由是大戴有徐氏，小戴有桥、杨氏之学。<br /><br />

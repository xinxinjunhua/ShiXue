<tr><td class="t50">李延年传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李延年，中山人，身及父母兄弟皆故倡也。延年坐法腐刑，给事狗监中。女弟得幸于上，号李夫人，列《外戚传》。<br /><br />
　　延年善歌，为新变声。是时，上方兴天地祠，欲造乐，令司马相如等作诗颂。延年辄承意弦歌所造诗，为之新声曲。而李夫人产昌邑王，延年由是贵为协律都尉，佩二千石印绶，而与上卧起，其爱幸埒韩嫣。久之，延年弟季与中人乱，出入骄恣。及李夫人卒后，其爱弛，上遂诛延年兄弟宗族。<br /><br />
　　是后，宠臣大氐外戚之家也。卫青、霍去病皆爱幸，然亦以功能自进。<br /><br />

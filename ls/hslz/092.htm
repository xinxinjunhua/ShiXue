<tr><td class="t50">路博德传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　最票骑将军去病凡六出击匈奴，其四出以将军，斩首虏十一万余级。浑邪王以众降数万，开河西酒泉之地，西方益少胡寇。四益封，凡万七千七百户。其校尉吏有功侯者六人，为将军者二人。<br /><br />
　　路博德，西河平州人，以右北平太守从票骑将军，封邳离侯。票骑死后，博德以卫尉为伏波将军，伐破南越，益封。其后坐法失侯。为强弩都尉，屯居延，卒。<br /><br />
</td></tr>

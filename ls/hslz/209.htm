<tr><td class="t50">伏生</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　伏生，济南人也，故为秦博士。孝文时，求能治《尚书》者，天下亡有，闻伏生治之，欲召。时伏生年九十余，老不能行，于是诏太常，使掌故朝错往受之。秦时禁《书》，伏生壁藏之，其后大兵起，流亡。<br /><br />
　　汉定，伏生求其《书》，亡数十篇，独得二十九篇，即以教于齐、鲁之间。齐学者由此颇能言《尚书》，山东大师亡不涉《尚书》以教。伏生教济南张生及殴阳生。张生为博士，而伏生孙以治《尚书》征，弗能明定。是后鲁周霸、雒阳贾嘉颇能言《尚书》云。<br /><br />
</td></tr>

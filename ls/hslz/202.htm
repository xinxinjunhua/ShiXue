<tr><td class="t50">丁宽</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　丁宽字子襄，梁人也。初，梁项生从田何受《易》，时宽为项生从者，读《易》精敏，才过项生，遂事何。学成，何谢宽。宽东归，何谓门人曰：“《易》以东矣。”<br /><br />
　　宽至雒阳，复从周王孙受古义，号《周氏传》。景帝时，宽为梁孝王将军距吴、楚，号丁将军，作《易说》三万言，训故举大谊而已，今《小章句》是也。宽授同郡砀田王孙。王孙授施雠、孟喜、梁丘贺。繇是《易》有施、孟、梁丘之学。<br /><br />

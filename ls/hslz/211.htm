<tr><td class="t50">林尊</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　林尊字长宾，济南人也。事欧阳高，为博士，论石渠。后至少府、太子太傅，授平陵平当、梁陈翁生。当至丞相，自有传。翁生信都太傅，家世传业。由是欧阳有平、陈之学。翁生授琅邪殷崇、楚国龚胜。崇为博士，胜右扶风，自有传。而平当授九江朱普公文、上党鲍宣。普为博士，宣司隶校尉，自有传。徒众尤盛，知名者也。<br /><br />

<tr><td class="t50">张欧传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张欧字叔，高祖功臣安丘侯说少子也。欧孝文时以治刑名侍太子，然其人长者。景帝时尊重，常为九卿。至武帝元朔中，代韩安国为御史大夫。殴为吏，未尝言按人，剸以诚长者处官。官属以为长者，亦不敢大欺。上具狱事，有可却，却之；不可者，不得已，为涕泣，面而封之。其爱人如此。<br /><br />
　　老笃，请免，天子亦宠以上大夫禄，归老于家。家阳陵。子孙咸至大官。<br /><br />
　　【万石卫直周张传论】<br /><br />
　　赞曰：仲尼有言“君子欲讷于言而敏于行”，其万石君、建陵侯、塞侯、张叔之谓与？是以其教不肃而成，不严而治。至石建之浣衣，周仁为垢污，君子讥之。<br /><br />

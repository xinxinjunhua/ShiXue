<tr><td class="t50">周仁传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　周仁，其先任城人也。以毉见。景帝为太子时，为舍人，积功迁至太中大夫。景帝初立，拜仁为郎中令。<br /><br />
　　仁为人阴重不泄。常衣弊补衣溺裤，故为不洁清，以是得幸，入卧内。于后宫秘戏，仁常在旁，终无所言。上时问人，仁曰：“上自察之。”然亦无所毁，如此。景帝再自幸其家。家徙阳陵。上所赐甚多，然终常让，不敢受也。诸侯群臣赂遗，终无所受。武帝立，为先帝臣重之。仁乃病免，以二千石禄归老。子孙咸至大官。<br /><br />
</td></tr>

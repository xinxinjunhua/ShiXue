<tr><td class="t50">夏侯胜</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　夏侯胜，其先夏侯都尉，从济南张生受《尚书》以传族子始昌。始昌传胜，胜又事同郡蕳卿者。倪卿者，倪宽门人。胜传从兄子建，建又事欧阳高。胜至长信少府，建太子太傅，自有传。由是《尚书》有大小夏侯之学。<br /><br />
</td></tr>

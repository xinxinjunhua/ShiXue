<tr><td class="t50">五成传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　五成，不知何郡人也。为胶东相，治甚有声。宣帝最先褒之，地节三年下诏曰：“盖闻有功不赏，有罪不诛，虽唐、虞不能以化天下。今胶东相成，劳来不怠，流民自占八万余口，治有异等之效。其赐成爵关内侯，秩中二千石。”未及征用，会病卒官。后诏使丞相、御史问郡国上计长吏守丞以政令得失，或对言前胶东相成伪自增加，以蒙显赏，是后俗吏多为虚名云。<br /><br />
</td></tr>

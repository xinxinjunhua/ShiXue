<tr><td class="t50">赵子</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　赵子，河内人也。事燕韩生，授同郡蔡谊。谊至丞相，自有传。谊授同郡食子公与王吉。吉为昌邑王中尉，自有传。食生为博士，授泰山栗丰。吉授淄川长孙顺。顺为博士，丰部刺史。由是《韩诗》有王、食、长孙之学。丰授山阳张就，顺授东海发福，皆至大官，徒众尤盛。<br /><br />

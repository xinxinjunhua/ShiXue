<tr><td class="t50">皮轩车黄钺车豹尾车</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　皮轩车，汉前驱车也。冒以虎皮为轩，取《曲礼》“前有士师，则载虎皮”之义，赤质，曲壁，上有柱，贯五轮相重，画虎文。驾四马，驾士十八人。政和之制，用漆柱，贯朱漆皮轩五。<br /><br />
　　黄钺车，汉制，乘舆建之，在大驾后。晋卤簿有黄钺车。唐初无之，贞观后始加。赤质，曲壁，中设金钺一，锦囊绸杠。左武卫队正一人，在车中执钺。驾两马，驾士十五人。<br /><br />
　　豹尾车。古者军正建豹尾。汉制，最后车一乘垂豹尾，豹尾以前即同禁中。唐贞观后，始加此车于卤簿内，制同黄钺车。上戴朱漆竿，首缀豹尾，右武卫队正一人执之。驾两马，驾士十五人。<br /><br />

<tr><td class="t50">佞幸传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　人君生长深宫之中，法家、拂士接耳目之时少，宦官、女子共启处之日多，二者，佞幸之梯媒也。刚明之主亦有佞幸焉，刚好专任，明好偏察，彼佞幸者一投其机，为患深矣。他日败阙，虽能殄除，隳城以求狐，灌社以索鼠，亦曰殆哉！<br /><br />
　　宋世中材之君，朝有佞幸，所不免也。太宗有弭德超，赵赞，孝宗有曾觌、龙大渊，二君固不可谓非刚明之主也。作《佞幸传》。<br /><br />
</td></tr>

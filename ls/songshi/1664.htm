<tr><td class="t50">许希传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　许希，开封人。以医为业，补翰林医学。景祐元年，仁宗不豫，侍医数进药，不效，人心忧恐。冀国大长公主荐希，希诊曰：“针心下包络之间，可亟愈。”左右争以为不可，诸黄门祈以身试，试之，无所害。遂以针进，而帝疾愈。命为翰林医官，赐绯衣、银鱼及器币。希拜谢已，又西向拜，帝问其故，对曰：“扁鹊，臣师也。今者非臣之功，殆臣师之赐，安敢忘师乎？”乃请以所得金兴扁鹊庙。帝为筑庙于城西隅，封灵应侯。其后庙益完，学医者归趋之，因立太医局于其旁。<br /><br />
　　希至殿中省尚药奉御，卒。著《神应针经要诀》行于世。录其子宗道至内殿崇班。<br /><br />

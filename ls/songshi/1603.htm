<tr><td class="t50">隐逸传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　中古圣人之作《易》也，于《遁》之上九曰“肥遁，无不利”，《蛊》之上九曰“不事王侯，高尚其事”。二爻以阳德处高地，而皆以隐逸当之。然则隐德之高于当世，其来也远矣。巢、由虽不见于经，其可诬哉。<br /><br />
　　五季之乱，避世宜多。宋兴，岩穴弓旌之招，叠见于史，然而高蹈远引若陈抟者，终莫得而致之，岂非二卦之上九者乎？种放之徒，召对大廷，亹亹献替，使其人出处，果有合于《艮》之君子时止时行，人何讥焉。作《隐逸传》。<br /><br />
</td></tr>

<tr><td class="t50">循吏传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　宋法有可以得循吏者三：太祖之世，牧守令录，躬自召见，问以政事，然后遣行，简择之道精矣；监司察郡守，郡守察县令，各以时上其殿最，又命朝臣专督治之，考课之方密矣；吏犯赃遇赦不原，防闲之令严矣。<br /><br />
　　承平之世，州县吏谨守法度以修其职业者，实多其人。其间必有绝异之绩，然后别于赏令，或自州县善最，他日遂为名臣，则抚子之长又不足以尽其平生，故始终三百余年，循吏载诸简策者十二人。作《循吏传》。<br /><br />
</td></tr>

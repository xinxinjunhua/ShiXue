<tr><td class="t50">景星</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　景星，德星也，一曰瑞星，如半月，生于晦朔，大而中空，其名各异。曰周伯，其色黄，煌煌然，所见之国大昌。曰含誉，光耀似彗，喜则含誉射。曰格泽，状如炎火，下大上锐，色黄白，起地上，见则不种而获。曰归邪，两赤彗向上，有盖。曰天保星，有音，如炬火下地、野鸡鸣。皆五行冲和之气所生也。其王蓬芮、玄保、昭明、昏昌、旬始、司危、菟昌、地维臧光之类，亦皆为瑞星。然前志以王蓬芮已下星为妖星。又奇星，古无所考，见于仁宗、英宗之时，故附于景星之末云。<br /><br />
</td></tr>

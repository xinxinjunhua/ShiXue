<tr><td class="t50">龟兹传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　龟兹本回鹘别种。其国主自称师子王，衣黄衣，宝冠，与宰相九人同治国事。国城有市井而无钱货，以花蕊布博易。有米麦瓜果。西至大食国行六十日，东至夏州九十日。或称西州回鹘，或称西州龟兹，又称龟兹回鹘。<br /><br />
　　自天圣至景祐四年，入贡者五，最后赐以佛经一藏。熙宁四年，使李延庆、曹福入贡。五年，又使卢大明、笃都入贡。绍圣三年，使大首领阿连撒罗等三人以表章及玉佛至洮西。熙河经略使以其罕通使，请令于熙、秦州博买，而估所赍物价答赐遣还，从之。<br /><br />
</td></tr>

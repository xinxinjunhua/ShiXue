<tr><td class="t50">王大寿薛良显传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王大寿，泉州人，为左翼队将。绍定五年，海寇王子清犯围头，守真德秀遣大寿领卒百人防遏。猝与贼遇，奋前控弦，毙贼十余，后无援者，遂没。从死者五人。贼就俘，剖心祭之。事闻，赠官，恤其家。<br /><br />
　　＊＊＊<br /><br />
　　薛良显，字贵勤，温之瑞安人。登崇宁二年进士第，累官为大宗正丞，出为江东转运使。江宁军校周德作乱，良显闻变，率众与战，斩十余级，力不胜，死之。事闻，赠恤良渥。<br /><br />
</td></tr>

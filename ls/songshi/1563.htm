<tr><td class="t50">屈坚传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　屈坚，为右武大夫、忠州防御使。建炎二年，金人围陕府，坚引所部救之。围解，金人执坚，坚曰：“始吾所以来，为解围也。城苟全，吾死何憾。”叱金人使速杀之。后赠三官，录其家五人。<br /><br />
　　王琦，为弓门砦巡检。建炎四年，金人还自熙河，琦御之。金人立招降旗榜，改年号阜昌，众皆拜，琦独不屈。金人执而杀之。<br /><br />
　　韦永寿者，绍兴三十二年，以统制官与金人战和州，子承节郎世坚救之，同死。张浚以言，赠中卫大夫、融州观察使，世坚赠三官。<br /><br />

<tr><td class="t50">赞引</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　旧中书门下、翰林学士、御史中丞并绯衣双引，仍传呼。（开宝中，学士止令一吏前导，亦罢传呼，惟谢恩初上日，双引传呼云。）使相、仆射、两省五品已上，一吏前引。（枢密使兼相者，二吏，不赞引。大中祥符五年，止令于本厅赞引。不带相及副使，止令本院紫衣吏前赞引之。）<br /><br />
　　淳化四年，令东宫三少、尚书、丞、郎入朝以绯衣吏前导，并通官呵止。二品已上用朝堂驱使官，馀用本司驱使官，宰臣、亲王仍令紫衣二吏引马。<br /><br />

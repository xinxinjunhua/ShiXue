<tr><td class="t50">许彪孙传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　许彪孙，显谟阁学士奕之子也。为四川制置司参谋官。景定二年，刘整叛，召彪孙草降文，以潼川一道为献。彪孙辞使者曰：“此腕可断，此笔不可书也。”即闭门与家人俱仰药死。<br /><br />
　　整既降，遂引兵袭都统张桂营，桂及统制金文德战死。纳溪曹赣阖门死之。景定四年，沔州都统胡世全护粮运至虎象山，遇敌兵战败死。咸淳二年，北兵取开州，守将庞彦海死之。德祐元年，泸守梅应春杀判官李丁孙、推官唐奎瑞以城降，珍州守将江彦清巷战死之。<br /><br />
</td></tr>

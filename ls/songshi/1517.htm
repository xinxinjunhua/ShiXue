<tr><td class="t50">尹玉传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　尹玉，宁都人。以捕盗功为赣州三砦巡检。秩满城居，从文天祥勤王。<br /><br />
　　及天祥至平江，调玉同淮将张全、广将朱华拒大兵，战于伍牧，全等军败，以淮、广军先遁，曾全、胡遇、谢荣、曾玉以赣州四指挥军亦遁，唯玉残军五百殊死战。玉手杀数十人，箭集于胄如猬毛，援绝力屈，遂被执。大军横四枪于其项，以梃击之死。余兵犹夜战，杀人马蔽田间，无一降者。质明，生还者四人。<br /><br />
　　赠玉濠州围练使，官其二子，赐田二顷，以恤其家。<br /><br />

<tr><td class="t50">五纬俱见</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　乾德五年三月，五星如连珠，聚于奎、娄之次。<br /><br />
　　景德四年七月，五星当聚鹑火而近太阳，同时伏。<br /><br />
　　庆历三年十一月壬辰，五星皆见东方。<br /><br />
　　靖康元年六月丙辰，填星、荧惑、太白，岁星聚。<br /><br />
　　乾道四年二月壬子、六月辛丑、八月己亥、六年五月乙亥、十月庚申、八年十月癸卯，五星俱见。<br /><br />
　　淳熙十三年闰七月戊午，五星皆伏。八月乙亥，七曜俱聚于轸。<br /><br />

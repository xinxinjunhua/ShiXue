<tr><td class="t50">强霓康杰李伸传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　强霓，自金归宋，为武功大夫、阁门宣赞舍人、知环州、环庆路统制军马兼沿边安抚使。隆兴间，金兵围环州，与其弟武经大夫、环庆路统领沿边忠义军马震坚守孤城，招诱使降，不屈，城陷死焉。兴州驻紥御前诸军统制吴挺言于朝，并赠观察使，立庙西和州，赐额旌忠。<br /><br />
　　＊＊＊<br /><br />
　　康杰者，权知扶风县，与金将冯宣战，宣爱而欲招之，杰奋曰：“吾今也当死于阵，不能降敌。”宣杀之。<br /><br />
　　＊＊＊<br /><br />
　　李伸者，知天兴县，坚守不下，城陷，曰：“吾岂使敌杀我。”遂自杀。<br /><br />

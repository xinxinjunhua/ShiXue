<tr><td class="t50">朱长文传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　朱长文，字伯原，苏州吴人。年未冠，举进士乙科，以病足不肯试吏，筑室乐圃坊，著书阅古，吴人化其贤。长吏至，莫不先造请，谋政所急，士大夫过者以不到乐圃为耻，名动京师，公卿荐以自代者众。元祐中，起教授于乡，召为太学博士，迁秘书省正字。元符初，卒。哲宗知其清，赙绢百。<br /><br />
　　有文三百卷，《六经》皆为辨说。又著《琴史》而序其略曰：“方朝廷成太平之功，制礼作乐，比隆商、周，则是书也，岂虚文哉！”盖立志如此。<br /><br />
</td></tr>

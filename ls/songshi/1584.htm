<tr><td class="t50">黄申传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　黄申，字酉乡，井研人。开庆元年进士，授德安尉，摄主簿兼提点江西刑狱司签厅，狱事多所辨明。丞相江万里、提刑黄震交荐之，调乐安丞。<br /><br />
　　申为政廉谨，有治声。以恩升从事郎。大兵拔抚州，下诸县索降状，乐安令率其僚联署以上。申初闻变，悉遣家人远避，至是独抗不往。令遣吏促之，申不动。吏白令，令怒。俄而吏民数百人集于庭，强舆致之，申颠踣于地，若中风然。众捽蹴诟叱曰：“为尔不顺，将累我辈。”申阳死为不闻，令无如之何。申有惠爱在民，至暮，众舁入置中堂，翼日或食以粥，得免。遂去，隐巴山中以终。<br /><br />

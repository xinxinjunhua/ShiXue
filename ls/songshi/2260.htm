<tr><td class="t50">钲鼓舆钟鼓楼舆</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　交龙钲、鼓舆各一，皆刻木为二青龙相交，下有木台、长竿，一持画鼓，一挂金钲，上皆有绯盖，亦绣交龙。舆士各二人。中兴后，相风、行漏、十二神、钲鼓四舆，悉省去。<br /><br />
　　钟、鼓楼舆各一，本隋大驾钟车、鼓车也。皆刻木为屋，中置钟、鼓，下施木台、长竿，如钲、鼓舆。舆士各二十四人。<br /><br />
　　行漏舆、十二神舆、交龙钲鼓舆、钟鼓楼，旧礼无文，皆太祖开宝定礼所增。<br /><br />
</td></tr>

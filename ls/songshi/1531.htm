<tr><td class="t50">邓得遇传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　邓得遇，字达夫，邛州人。淳祐十年进士。调宁远主簿，改知南昌县，通判隆兴府，监行在左藏库，出知昭州，迁广西提点刑狱，逾年摄经略事兼知静江府。<br /><br />
　　德祐元年，长沙被兵，得遇遣都统马骥、马应麒赴援。骥潜叛而还，得遇斩之，军事悉委之应麒。未几，马塈代阃，议事不合。二年，移治苍梧。<br /><br />
　　静江破，得遇朝服南望拜辞，书幅纸云：“宋室忠臣，邓氏孝子。不忍偷生，宁甘溺死。彭咸故居，乃吾潭府。屈公子平，乃吾伴侣。优哉悠哉，吾得其所！”遂投南流江而死。<br /><br />

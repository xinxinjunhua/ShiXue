<tr><td class="t50">郑覃传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　郑覃，字季厚，明州人。靖康二年贡于乡。建炎四年春，金人陷明州，纵兵大掠，覃挈族辟难山谷间。金人追及，与兄章俱被执，胁以刃，曰：“予吾金，即贳死。”覃号泣指所瘗黄金钗遗之，遂见释。而金兵相属，覃拿小舟与其妻董同载去，顾谓章曰：“万一不得脱，覃岂北面事异国者，兄勉主祭祀。”复为兵所劫去，迫使之降，覃厉辞骂不屈，跃入水中。董哭曰：“夫亡矣，与其受辱以生，不如死。”亦自沈。<br /><br />
　　覃死后，孙、曾多举进士，而清之最显。覃累赠太师、秦国公，董秦国夫人。<br /><br />

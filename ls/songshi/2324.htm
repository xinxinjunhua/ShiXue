<tr><td class="t50">六部监门六部架阁</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　〖六部监门〗<br />
　　六部监门官一员，掌司门钥。绍兴二年置。选升朝文臣有才力人充，仍令六部踏逐奏差。序位、请给依寺、监丞，郎官有阙得兼之。初从吏部尚书沈与求之请也。<br /><br />
　　〖主管架阁库〗<br />
　　掌储藏帐籍文案以备用。择选人有时望者为之。旧有管干架阁库官，宣和罢之，绍兴十五年复置，吏、户部各差一员，礼、兵部共差一员，刑、工部共差一员，以主管尚书某部架阁库为名，从大理寺丞周楙请也。喜定八年，又置三省、枢密院架阁官。<br /><br />
</td></tr>

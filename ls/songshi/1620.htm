<tr><td class="t50">孙侔传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　孙侔，字少述，与王安石、曾巩游，名倾一时。早孤，事母尽孝。志于禄养，故屡举进士。及母病革，自誓终身不求仕。客居江、淮间，士大夫敬畏之。<br /><br />
　　刘敞知扬州，言其孝弟忠信，足以扶世矫俗，求之朝廷，吕公著、王安石之流也。诏以为扬州教授，辞。敞守永兴，辟入幕府，亦辞。英宗时，沈遘及王陶、韩维连荐之，授忠武军推官、常州推官，皆不赴。<br /><br />
　　少与安石友善，安石为相，过真州与相见，侔待之如布衣交。卒，年六十六。<br /><br />
　　初，王回、王令、常秩与侔皆有盛名，回、令不寿，秩为隐不竟，唯侔以不仕始终。<br /><br />

<tr><td class="t50">郭浒传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　郭浒，德顺中安堡人。从军，积官至武经郎，为泾原第八副将。金人犯陕西，渭帅以下叛降，独浒义不许，称病去。帅恶忌之，傅致以罪，下之狱，胁使俱降。浒奋而呼曰：“大丈夫今得死所矣！终不能受污。叛逆大恶，天地所不容，吾虽死，誓不尔贷，当诉于地下耳。”众丑其语，即杀之。建炎三年，赠武翼大夫、忠州刺史。<br /><br />
　　同死者朱友恭，西安人。以忠翊郎为泾原第一副将。部兵捍金人于华亭，数有功。会金兵大集，友恭赴敌力战，为所得。渭帅既降，诱以甘言，许优进官秩，不肯从，更诋辱之。帅不胜忿，断其胫以徇，经日乃斩之。后赠敦武郎。<br /><br />
</td></tr>

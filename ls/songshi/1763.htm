<tr><td class="t50">奸臣传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　《易》曰：“阳卦多阴，阴卦多阳。”君子虽多，小人用事，其象为阴；小人虽多，君子用事，其象为阳。<br /><br />
　　宋初，五星聚奎，占者以为人才众多之兆。然终宋之世，贤哲不乏，奸邪亦多。方其盛时，君子秉政，小人听命，为患亦鲜。及其衰也，小人得志，逞其狡谋，壅阏上听，变易国是，贼虐忠直，屏弃善良，君子在野，无救祸乱。有国家者，正邪之辨，可不慎乎！作《奸臣传》。<br /><br />
</td></tr>

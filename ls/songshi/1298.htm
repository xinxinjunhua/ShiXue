<tr><td class="t50">刘绚李吁传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘绚字质夫，常山人。以荫为寿安主簿、长子令，督公家逋赋，不假鞭扑而集。岁大旱，府遣吏视伤所，蠲财什二，绚力争不得，封还其楬，请易之。富弼叹曰：“真县令也。”元祐初，韩维荐其经明行修，为京兆府教授。王岩叟、朱光庭又荐为太学博士，卒于官。绚力学不倦，最明于《春秋》。程颢每为人言：“他人之学，敏则有矣，未易保也，若绚者，吾无疑焉。”<br /><br />
　　＊＊＊<br /><br />
　　李吁字端伯，洛阳人。登进士第。元祐中为秘书省校书郎，卒。程颐谓其才器可以大受，及亡也，祭之以文曰：“自予兄弟倡明道学，能使学者视仿而信从者，吁与刘绚有焉。”<br /><br />

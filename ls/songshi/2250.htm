<tr><td class="t50">芳亭辇凤辇</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　芳亭辇，黑质，顶如幕屋，绯罗衣，裙襕、络带皆绣云凤。两面朱绿窗花版，外施红丝网绸，金铜帉錔，前后垂帘，下设牙床、勾阑。长竿四，银龙头，银饰梯，行马。主辇一百二十人。政和之制，帘以红罗绣鹅为额，内设御坐，长竿饰以金涂铜螭首，横竿二。<br /><br />
　　凤辇，赤质，顶轮下有二柱，绯罗轮衣，络带、门帘皆绣云凤。顶有金凤一，两壁刻画龟文、金凤翅。前有轼匮、香炉、香宝、结带，下有勾阑二重，内设红锦褥。长竿二，银饰梯，行马。主辇八十人。法驾卤簿，不设凤辇。<br /><br />
</td></tr>

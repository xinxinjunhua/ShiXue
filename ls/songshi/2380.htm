<tr><td class="t50">庙令丞簿</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　庙令、丞、主簿<br /><br />
　　旧制，五岳、四渎、东海、南海诸庙各置令、丞。庙之政令多统于本县令。京朝知县者称管勾庙事，或以令、录老耄不治者为庙令，判、司、簿、尉为庙簿，掌葺治修饰之事。（凡以财施于庙者，籍其名数而掌之。）<br /><br />

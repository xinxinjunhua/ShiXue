<tr><td class="t50">流求国传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　流求国在泉州之东，有海岛曰彭湖，烟火相望。其国堑栅三重，环以流水，植棘为藩，以刀槊弓矢剑铍为兵器，视月盈亏以纪时。无他奇货，商贾不通，厥土沃壤，无赋敛，有事则均税。<br /><br />
　　旁有毗舍邪国，语言不通，袒裸盱睢，殆非人类。淳熙间，国之酋豪尝率数百辈猝至泉之水沃、围头等村，肆行杀掠。喜铁器及匙箸，人闭户则免，但刓其门圈而去。掷以匙箸则頫拾之，见铁骑则争剚其甲，骈首就戮而不知悔。临敌用标枪，系绳十余丈为操纵，盖惜其铁不忍弃也。不驾舟楫，惟缚竹为筏，急则群舁之泅水而遁。<br /><br />

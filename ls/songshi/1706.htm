<tr><td class="t50">宦者传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　宋世待宦者甚严。太祖初定天下，掖庭给事不过五十人，宦寺中年方许养子为后。又诏臣僚家毋私蓄阉人，民间有阉童孺为货鬻者论死。去唐未远，有所惩也。<br /><br />
　　厥后，太宗却宰相之请，不授王继恩宣徽；真宗欲以刘承规为节度使，宰相持不可而止。中更主幼母后听政者凡三朝，在于前代，岂非宦者用事之秋乎！祖宗之法严，宰相之权重，貂珰有怀奸慝，旋踵屏除，君臣相与防微杜渐之虑深矣。<br /><br />
　　然而宣政间童贯、梁师成之祸，亦岂细哉！南渡苗、刘之逆，亦宦者所激也。《坊记》曰：“君子之道，辟则坊与！大为之坊，民犹逾之。”可不戒哉！作《宦者传》。<br /><br />

<tr><td>
<br />
　　经制边防财用司<br /><br />
　　掌经昼钱帛、刍粮以供边费，凡榷易货物、根括耕地及边部弓箭手等事，皆奏而行之。熙宁末，以熙、河连岁用兵，仰给支度，费用不赀，始置是司。元祐初，罢。崇宁中，复置提举兵马、提辖兵甲，皆守臣兼之。掌按练军旅，督捕盗贼，以清境内；凡诸营之名籍，较其壮怯而赏罚之。<br /><br />
</td></tr>

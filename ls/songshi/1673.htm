<tr><td class="t50">皇甫坦传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　皇甫坦，蜀之夹江人。善医术。显仁太后苦目疾，国医不能疗，诏募他医，临安守臣张偁以坦闻。高宗召见，问何以治身，坦曰：“心无为则身安，人主无为则天下治。”引至慈宁殿治太后目疾，立愈。帝喜，厚赐之，一无所受。令持香祷青城山，还，复召问以长生久视之术，坦曰：“先禁诸欲，勿令放逸。丹经万卷，不如守一。”帝叹服，书“清静”二字以名其庵，且绘其像禁中。<br /><br />
　　荆南帅李道雅敬坦，坦岁谒道。隆兴初，道入朝，高宗、孝宗问之，皆称皇甫先生而不名。坦又善相人，尝相道中女必为天下母，后果为光宗后。<br /><br />

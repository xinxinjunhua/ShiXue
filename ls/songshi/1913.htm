<tr><td class="t50">辰星</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　景德四年九月戊子，见东方，在亢。<br /><br />
　　大中祥符四年六月己巳，犯轩辕大星。六年十月壬戌，入氐。<br /><br />
　　天圣八年四月壬寅，犯鬼积尸。<br /><br />
　　熙宁四年十一月丁亥，犯罚南第一星。五年九月癸酉，入氐。<br /><br />
　　元丰八年十月癸未，入氐。<br /><br />
　　元祐五年七月丁亥，犯轩辕大星。六年十月庚午，犯键闭。<br /><br />
　　元符元年五月戊午，入舆鬼，犯积尸气。十月辛丑，犯西咸。二年闰九月壬辰，入氐。<br /><br />
　　绍兴二十一年十月庚午、二十八年十月癸卯，俱入氐。<br /><br />
　　隆兴二年十月壬申，入氐，至戊寅出，凡七日。<br /><br />

<tr><td class="t50">彗孛</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　彗星，小者数寸，长者或竟天。见则兵起，大水，除旧布新之兆也。其体无光，傅日而为光。故夕见则东指，晨见则西指。光芒所及则为灾。有五色，各依五行本精所生。<br /><br />
　　孛星，彗属。偏指曰彗，芒气四出曰孛。孛者，孛孛然，非常恶气之所生也。主大乱，主大兵，灾甚于彗。旄头星，《玉册》云：亦彗属也。<br /><br />

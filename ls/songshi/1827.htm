<tr><td class="t50">蒲甘邈黎传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　蒲甘国，崇宁五年，遣使入贡，诏礼秩视注辇。尚书省言：“注辇役属三佛齐，故熙宁中敕书以大背纸，缄以匣袱，今蒲甘乃大国王，不可下视附庸小国。欲如大食、交阯诸国礼，凡制诏并书以白背金花绫纸，贮以间金镀管籥，用锦绢夹袱缄封以往。”从之。<br /><br />
　　邈黎国，元祐四年，般次冷移、四抹粟迷等赍于阗国黑汗王并本国王表章来。有司以其国未尝入贡，请视于阗条式。从之。<br /><br />

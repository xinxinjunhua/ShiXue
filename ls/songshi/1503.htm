<tr><td class="t50">马俊传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　马俊或曰进，太平州慈湖砦兵也。绍兴二年，砦军陆德、周青、张顺等据州叛，青为谋主，约翌日尽黥城中少壮，而屠其老弱，然后拥众渡江。俊隶青左右，得其谋，阴结其徒十人杀贼，然后谕众开门，其徒许之。俊归语其妻孙氏，与之诀，至南门，伺青出上马，斫中颊，九人惧不敢前。俊与妻子皆遇害。青被伤卧旬日，贼党散，官军至，德、青遂伏诛。三年，赠俊修武郎，为立祠，号登勇。<br /><br />

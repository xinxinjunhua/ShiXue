<tr><td class="t50">王俦朱嗣孟传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王俦，以通判真州权通判广德军。建炎末，盗戚方既为刘晏所破，引兵欲趋宣城，道过广德，入其郛。俦不屈，与权判官李唐俊、权司法潘偊、权知广德县韦绩、权丞蒋夔皆死。后赠俦二官，唐俊等皆京秩，录其家一人。<br /><br />
　　＊＊＊<br /><br />
　　朱嗣孟，饶州乐平人。宣和间进士，为广德司户兼司理。叛卒戚方破镇江，犯广德，守仓皇遣招安，无敢往者，奇嗣孟状貌有胆略，遂以命焉。嗣孟雅自负，不复逊，直诣贼垒，问所以涉吾地何故，为陈逆顺祸福，使自择所处。方以迕己杀之。事闻，赠宣教郎，官其子。<br /><br />
</td></tr>

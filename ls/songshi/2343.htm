<tr><td class="t50">司天监</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　监、少监、丞、主簿、春官正、夏官正、中官正、秋官正、冬官正、灵台郎、保章正、挈壶正各一人。掌察天文祥异，钟鼓漏刻，写造历书，供诸坛祀察告神名版位画日。监及少监阙，则置判监事二人。（以五官正充。）礼生四人，历生四人，掌测验浑仪，同知算造三式。元丰官制行，罢司天监，立太史局，隶秘书省。<br /><br />
</td></tr>

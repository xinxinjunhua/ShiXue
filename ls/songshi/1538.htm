<tr><td class="t50">李翼阮骏传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李翼，麟州新秦人。宣和末，为代州西路都巡检使，屯崞县。金人取代，执守将嗣本，遣来谕降，翼射却之，帅士卒坚守。义胜军统领崔忠杀都监张洪辅，夜引金兵入城，翼挺身搏战达旦，力不敌被执。酋粘罕欲臣之，怒骂不屈，与县令李耸、丞王唐臣、尉刘子英、监酒阎诚、将官折可与同死之。<br /><br />
　　＊＊＊<br /><br />
　　阮骏者，兴化军人。绍圣元年进士，为河南府少尹。金人犯京师，率所隶兵拥护神御殿，抱神御，骂声不绝口，卒被害。特赠朝议大夫。<br /><br />
</td></tr>

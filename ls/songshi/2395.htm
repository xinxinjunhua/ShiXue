<tr><td class="t50">功臣</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　功臣<br /><br />
　　推忠 佐理 协谋 同德 守正 亮节<br /><br />
　　翊戴 赞治 崇仁 保连 经邦<br /><br />
　　右赐中书、枢密臣僚。（宰相初加六字，馀官初加四字，其次并加两字，旧有功臣者改赐。）<br /><br />
　　推忠 保德 翊戴 守正 亮节 同德<br /><br />
　　佐运 崇仁协恭 赞治 宣德 纯诚<br /><br />
　　保节 保顺 忠亮 竭诚 奉化 效顺<br /><br />
　　顺化<br /><br />
　　右赐皇子、皇亲、文武臣僚、外臣（初加四字，次加两字。）<br /><br />
　　拱卫 翊卫 卫圣 保顺 忠勇 拱极 护圣 奉庆 果毅 肃卫<br /><br />
　　右赐诸班直将士禁军初加二字，再加亦如之。<br /><br />

<tr><td class="t50">韩浩周中传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　韩浩，丞相琦孙。以奉直大夫守濰州。建炎二年，金人攻城，浩率众死守，城陷力战死。通判朱庭杰身被数箭，亦死。权北海县丞王允功、司理参军王荐皆全家陷没。浩特赠三官，官其家三人。庭杰、允功、荐各官其家一人。<br /><br />
　　朝议大夫周中世居濰州，率家人乘城拒守，中弟辛家最富，尽散其财以享战士。城陷，中阖门百口皆死。绍兴六年，以周聿请，赠官。<br /><br />
</td></tr>

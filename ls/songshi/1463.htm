<tr><td class="t50">秦传序传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　秦传序，江宁人。淳化五年，充夔峡巡检使。李顺之乱，贼众奄至，傅夔州城下，传序督士卒昼夜拒战，婴城既久，危蹙日甚，长吏皆奔窜投贼。传序谓士卒曰：“吾为监军，尽死节以守城，吾之职也，安可苟免乎！”城中乏食，传序出囊橐服玩，尽市酒肉以犒士卒，慰勉之，众皆感泣力战。传序度力不能拒，乃为蜡书遣人间道上言：“臣尽死力，誓不降贼。”城坏，传序赴火死。<br /><br />
　　传序家寄荆湖间，子奭溯峡求父尸，溺死。人以为父死于忠，子死于孝。奏至，太宗嗟恻久之，录传序次子煦为殿直，以钱十万赐其家。煦卒，复以煦弟昉为三班奉职。<br /><br />

<tr><td class="t50">李大同传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李大同，字从仲，婺州东阳人。嘉定十六年进士。历官为秘书丞兼崇政殿说书，拜右正言兼侍讲。疏言：“赵、冀分野，乃有荧惑犯填星之变，则我师之出，岂无当长虑而却顾者。故臣愿陛下勿以星文为小异而或加忽。一话一语，一政一事，必求有以格天心而弭灾变。至于进兵攻讨，尤切谨重。”<br /><br />
　　迁太常少卿兼国史编修、实录检讨，兼侍讲，兼权侍立修注官，迁起居郎，拜殿中侍御史，权刑部侍郎兼同修国史、实录院同修撰，选吏部侍郎，进工部尚书，以宝谟阁直学士知平江府，提举江州太平兴国宫。乞致仕，不许，后卒于家。<br /><br />
</td></tr>

<tr><td class="t50">流星</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　流星，天使也。自上而降曰流，东西横行亦曰流。流星有八，曰天使，曰天晖，曰天雁，曰天保，曰地雁，曰梁星，曰营头，曰天狗。流星之为天使者，有祥有妖，为天晖、天雁、夜陨而为天保，则祥；若夜陨而为地雁、梁星，昼陨而为营头，则妖。流星之大者为奔星，夜陨而为天狗，厥妖大。自下而升曰飞。飞星有五，亦有妖祥之分，飞星化而为天刑则祥；为降石，为顿顽，为解衔，为大滑，则为妖。<br /><br />
</td></tr>

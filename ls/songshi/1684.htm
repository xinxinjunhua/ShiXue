<tr><td class="t50">郭崇仁传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　郭崇仁，字永年，守文之子，章穆皇后弟也，淳化四年，补左班殿直，迁东头供奉官、阁门祗候。契丹入寇，赍密诏谕河北诸将，还奏称旨，累迁崇仪副使兼阁门通事舍人。章穆崩，特除庄宅使、康州刺史，再迁宫苑使、昭州团练使。丁母忧，起复云麾将军，拜解州团练使，改蔡州，擢捧日天武四厢都指挥使、贺州防御使、高阳关路马步军副都总管。以疾落军职，改磁州防御使。卒，赠彰德军节度观察留后。<br /><br />
　　崇仁虽外戚，朝廷未尝过推恩泽，其为解州团练使十年不迁，尝除知相、卫二州，皆辞不行，盖性慎静，不乐外官也。<br /><br />
</td></tr>

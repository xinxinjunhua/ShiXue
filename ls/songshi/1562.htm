<tr><td class="t50">姜绶刘宣传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　姜绶，处州丽水人。金人再犯京师，内外不相闻。朝迁募忠勇士赍蜡书往南京总管司调兵赴援，绶以忠翊郎应募，乃刲股藏书，缒下南壁，为逻骑所获，厉声叱骂，遂被害。建炎中，州上其事，官其子特立承信郎。<br /><br />
　　＊＊＊<br /><br />
　　刘宣，为秦凤路兵马都监。金人入关、陕，宣遣蜡书密与吴玠相结，且率金将任拱等以所部归朝。约日已定，有告之者，金人取宣缕擘之，其家属配曹州。<br /><br />
</td></tr>

<tr><td class="t50">册皇太子妃仪</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　册皇太子妃。政和五年三月，诏选皇太子妃。六年六月，诏选少傅、恩平郡王朱伯材女为皇太子妃，令所司备礼册命。庚辰，帝服通天冠、绛纱袍，御文德殿发册。先是，议礼局上《五礼新仪》：“皇太子纳妃，乘金辂亲迎。”皇太子三奏辞乘辂及临轩册命，诏免乘辂，而发册如礼焉。<br /><br />
</td></tr>

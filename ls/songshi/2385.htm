<tr><td class="t50">监当官</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　掌茶、盐、酒税场务征输及冶铸之事，诸州军随事置官，其征榷场务岁有定额，岁终课其额之登耗以为举刺。凡课利所入，日具数以申于州。建炎初，诏监当官阙，许转运司具名奏辟一次，以二年为任，实有六考，方许关升。烦剧去处，许添差一员。凡交割必置历以稽其剩欠，合选差文臣处，更不差武臣。淳熙二年，诏二万贯以下库分，选有才干存留一员，指挥、诸班直、亲从亲事官、保义郎以下差充。建炎四年，诏每州每以五员为额。<br /><br />
</td></tr>

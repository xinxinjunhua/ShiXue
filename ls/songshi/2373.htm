<tr><td class="t50">提举河北籴便司</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　提举河北籴便司<br /><br />
　　籴便刍粮以供边储之用。<br /><br />
　　提举制置解盐司<br /><br />
　　掌盐泽之禁令，使民入粟塞下，予钞给盐，以足民用而实边备。凡盐价高下及文钞出纳多寡之数，皆掌之。<br /><br />

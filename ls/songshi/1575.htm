<tr><td class="t50">连万夫谢皋传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　连万夫，德安人，或曰南夫弟也。补将仕郎。建炎四年，群贼犯应山，万夫率邑人数千保山砦，贼不能犯。寇浪子者以兵至，围之三日，卒破之。贼知万夫勇敢有谋，欲留为用，万夫怒，厉声骂贼，为所害。赠右承务郎，官其家一人。<br /><br />
　　＊＊＊<br /><br />
　　谢皋者，开封人，为镇抚司统制官。李成陷虢州，欲降之，皋指腹示贼曰：“此吾赤心也。”自剖其心以死。<br /><br />
</td></tr>

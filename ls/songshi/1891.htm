<tr><td class="t50">客星</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　客星有五：周伯、老子、王蓬絮、国皇、温星是也。周伯，大而黄，煌煌然，所见之国，兵丧，饥馑，民庶流亡。老子，明大纯白，出则为饥，为凶，为善，为恶，为喜，为怒。王蓬絮，状如粉絮，拂拂然，见则其国兵起，有白衣之会。国皇，大而黄白，有芒角，主兵起，水灾，人主恶之。温星，色白，状如风动摇，常出四隅。皆主兵。此五星错出乎五纬之间，其见无期，其行无度，各以其所在分野而占之。又四隅各有三星：东南曰盗星，主大盗；西南曰种陵，出则谷贵；西北曰天狗，见则天下大饥；东北曰女帛，主有大丧。<br /><br />

<tr><td class="t50">高弁传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　高弁字公仪，濮州雷泽人。弱冠，徒步从种放学于终南山，又学古文于柳开，与张景齐名。至道中，以文谒王禹偁，禹偁奇之。举进士，累官侍御史。谏修玉清昭应宫，降知广济军。寻以户部判官试开封府进士，私发糊名，夺二官。稍复知单州、邢州、盐铁判官。河决澶州，请弛堤防，纵水所之，可省民力，且以扼契丹南向。议寝。知陕州，卒。<br /><br />
　　弁性孝友。所为文章多祖《六经》及《孟子》，喜言仁义。有《帝则》三篇，为世所传。与李迪、贾同、陆参、朱頔、伊淳相友善。石延年、刘潜皆其门人也。<br /><br />

<tr><td class="t50">极度</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　极星之在紫垣，为七曜、三垣、二十八宿众星所拱，是谓北极，为天之正中。而自唐以来，历家以仪象考测，则中国南北极之正，实去极星之北一度有半，此盖中原地势之度数也。中兴更造浑仪，而太史令丁师仁乃言：“临安府地势向南，于北极高下当量行移易。”局官吕璨言：“浑天无量行更易之制，若用于临安与天参合，移之他往必有差忒。”遂罢议。后十余年，邵谔铸仪，则果用临安北极高下为之。以清台仪校之，实去极星四度有奇也。<br /><br />

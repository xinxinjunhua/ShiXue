<tr><td class="t50">江南西路枪仗手</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　熙宁七年，诏籍虔、汀、漳三州乡丁、枪手等，以制置盗贼司言三州壤界岭外，民喜贩盐且为盗，非土人不能制故也。<br /><br />
　　元丰二年，诏虔州枪仗手千五百三十六人，抚州、建昌军乡丁、关军、枪仗手各千七百七十八人为定额。每岁农隙，轮监司、提举司官案阅武艺，以备奸盗。从前江西转运副使蒋之奇请也。<br /><br />
　　宣和三年，兵部言：“近因江西漕臣谓本路枪仗手，元丰七年以八千三十五人为额，至元祐中减罢七千一百四十二人，元符间虽尝增立人数，比之元额犹减其七。乞诏诸路监司、帅臣并遵熙宁旧制补足元额。”从之。<br /><br />

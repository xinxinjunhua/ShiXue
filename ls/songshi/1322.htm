<tr><td class="t50">辛文悦传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　辛文悦者，不知何许人。以《五经》教授，太祖幼时从其肄业。周显德中，太祖历禁卫为殿前都点检，节制方面。文悦久不获接见，一日，梦邀车驾请见，既拜，乃太祖也。太祖亦梦其来谒，因令左右寻访，文悦果自至，太祖异之。及登位，召见，授太子中允，判太府事。开宝三年，出知房州。时周郑王出居是州，上以文悦长者，故命焉。文悦后累迁至员外郎。<br /><br />
　　又有张遁、张文旦者，尝与太宗同学校，太平兴国中，诣阙自言，各起家为主簿。<br /><br />
</td></tr>

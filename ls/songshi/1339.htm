<tr><td class="t50">王当传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王当，字子思，眉州眉山人。幼好学，博览古今，所取惟王佐大略。尝谓三公论道经邦，燮理阴阳，填抚四方，亲附百姓，皆出于一道，其言之虽大，其行之甚易。尝举进士不中，退居田野，叹曰：“士之居世，苟不见其用，必见其言。”遂著《春秋列国名臣传》五十卷，人竞传之。<br /><br />
　　元祐中，苏辙以贤良方正荐。廷对慷慨，不避权贵，策入四等。调龙游县尉。蔡京知成都，举为学官，当不就。其后京相，当遂不复仕，卒，年七十二。当于经学尤邃《易》与《春秋》，皆为之传，得圣人之旨居多。又有《经旨》三卷，《史论》十二卷，《兵书》十二篇。<br /><br />
</td></tr>

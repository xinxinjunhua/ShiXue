<tr><td class="t50">云气</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　《周礼·保章氏》：“以五云之物辨吉凶，水旱降丰荒之祲象。”故鲁僖公日南至登观台以望，汉明帝升灵台以望元气，吹时律，观物变。盖古者分至主启闭必书，云物为备故也。迨乎后世，其法寝备。瑞气则有庆云、昌光之属，妖气则有虹蜺、牂云之类，以候天子之符应，验岁事之丰凶，明贤者之出处，占战阵之胜负焉。<br /><br />

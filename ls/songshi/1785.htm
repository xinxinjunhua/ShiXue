<tr><td class="t50">叛臣传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　宋失其政，金人乘之，俘其人民，迁其宝器，效辽故事，立其臣为君，冠屦易位，莫甚斯时。<br /><br />
　　高宗南渡，国势弗振，悍仆狂奴，欺主衰败，易动于恶。兵虽凶器，尤忌残忍，将用忍人，先无仁心，视背君亲犹反掌耳。世将之子使握重兵，居之厄塞之地，岂非召乱之道乎？大义昭明，旋踵殄灭，盖天道也。扶纲常，遏乱略，作《叛臣传》。<br /><br />
</td></tr>

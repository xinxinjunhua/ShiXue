<tr><td class="t50">僧智缘传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　僧智缘，随州人，善医。嘉祐末，召至京师，舍于相国寺。每察脉，知人贵贱、祸福、休咎，诊父之脉而能道其子吉凶，所言若神，士大夫争造之。王珪与王安石在翰林，珪疑古无此，安石曰：“昔医和诊晋侯，而知其良臣将死。夫良臣之命乃见于其君之脉，则视父知子，亦何足怪哉！”<br /><br />
　　熙宁中，王韶谋取青唐，上言蕃族重僧，而僧结吴叱腊主部帐甚众，请智缘与俱至边。神宗召见，赐白金，遣乘传而西，遂称“经略大师”。智缘有辩口，径入蕃中，说结吴叱腊归化，而他族俞龙珂、禹藏讷令支等皆因以书款。韶颇忌恶之，言其挠边事，召还，以为右街首坐，卒。<br /><br />

<tr><td class="t50">陈隆之传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　陈隆之，不知所仕履。为四川制置使。淳祐元年十一月，成都被围，守弥旬，弗下。部将田世显乘夜开门，北兵突入，隆之举家数百口皆死。槛送隆之至汉州，命谕汉州守臣王夔降，隆之呼夔语之曰：“大丈夫死尔，毋降也。”遂见杀。后五年，提刑袁简之上其事，特赠徽猷阁待制，合得恩泽外，特与两子恩泽，赐谥立庙。<br /><br />
　　又有史季俭者，威州棋城主簿也。成都之陷，子良震与婿杨城夫争相为死，各特赠两官，与一子下州文学。<br /><br />
</td></tr>

<tr><td class="t50">刘颜传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘颜字子望，彭城人。少孤，好古，学不专章句。师事高弁。举进士第，以试秘书省校书郎知龙兴县，坐法免。久之，授徐州文学。居乡里，教授数十百人。采汉、唐奏议为《辅弼名对》。冯元、刘筠、钱易、滕涉、蔡齐上其书，除任城主簿。岁饥，发大姓所积粟，活数千人。李迪知兖州、青州，皆辟为从事，卒。著《儒术通要》、《经济枢言》复数十篇。石介见其书，叹曰：“恨不在弟子之列。”子庠，自有传。<br /><br />
</td></tr>

<tr><td class="t50">提举解盐保甲三白渠弓箭手等职</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　提举保甲司<br /><br />
　　掌什伍其民，教之武艺，视其优劣而进退之。元丰初，置于开封府界，遂下其法河北、河东、陕西三路，既而悉置提举官，如府界焉。<br /><br />
　　提举三白渠公事<br /><br />
　　掌潴泄三白渠，以给关中灌溉之利。<br /><br />
　　拨发司、辇运司<br /><br />
　　掌以时起发纲运而督其滞留，以供京师之用。<br /><br />
　　提举弓箭手<br /><br />
　　掌沿边郡县射地弓箭手之籍，及团结、训练、赏罚之事。政和五年，复以所招弓箭手之数为殿最。<br /><br />
</td></tr>

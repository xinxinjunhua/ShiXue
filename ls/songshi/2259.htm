<tr><td class="t50">相风乌舆行漏舆十二神舆</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　相风乌舆，上载长竿，竿杪刻木为乌，垂鹅毛筒，红绶带，下承以小盘，周以绯裙，绣乌形。舆士四人。<br /><br />
　　行漏舆，隋大业行漏车也。制同钟、鼓楼而大，设刻漏如称衡。首垂铜钵，末有铜象，漆匮贮水，渴乌注水入钵中。长竿四，舆士六十人。<br /><br />
　　十二神舆，赤质，四门旁刻十二辰神，绯绣轮衣、络带。舆士十二人。<br /><br />

<tr><td class="t50">岁星昼见</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　嘉祐五年三月乙未，岁星昼见。六年六月壬申，昼见。七年六月丙子，昼见。八年七月癸亥，昼见。<br /><br />
　　治平元年六月壬戌，昼见。<br /><br />
　　元符二年八月癸未，昼见。<br /><br />

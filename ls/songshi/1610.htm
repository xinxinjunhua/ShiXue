<tr><td class="t50">邢敦传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　邢敦，字君雅，不知何许人。家于雍丘，与宋准、赵昌言交游甚厚。<br /><br />
　　太平兴国初，尝举进士不第，慨然有隐遁意。性介僻，不妄交友。耽玩经史，精于术数，工绘画，颇嗜酒。或游市廛，过客询以休咎者，多不之语。里中号邢夫子。<br /><br />
　　大中祥符七年，真宗幸亳回，邑人列上其事，王曾为考制度使，以名闻。诏曰：“敦早预词场，勤修天爵，超然处退，亦既累年。属览公车之言，俾参郡学之职，用精儒业，以宠耆年。可许州助教。”敦让而不受。<br /><br />
　　乾兴元年，无疾而卒，年七十四。<br /><br />

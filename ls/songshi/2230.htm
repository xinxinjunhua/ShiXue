<tr><td class="t50">四夷乐</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　四夷乐者，元丰六年五月，召见米脂砦所降戎乐四十二人，奏乐于崇政殿，以三班借职王恩等六人差监在京闲慢库务门及旧城门敢勇三十六，与茶酒新任殿侍。《大晟乐书》曰：“前此宫架之外，列熊罴案，所奏皆夷乐也，岂容淆杂大乐！乃奏罢之。然古鞮鞻氏掌四夷乐，靺师、旄人各有所掌，以承祭祀，以供宴享。盖中天下而立，得四海之欢心，使鼓舞焉，先王之所不废也。《汉律》曰：‘每大朝会宜设于殿门之外。’天子御楼，则宫架之外列于道侧，岂可旋于广庭，与大乐并奏哉！”<br /><br />

<tr><td class="t50">外戚传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　自西汉有外戚之祸，历代鉴之，崇爵厚禄，不畀事权，然而一失其驭，犹有肺附之变焉。<br /><br />
　　宋法待外戚厚，其间有文武才谞，皆擢而用之；怙势犯法，绳以重刑，亦不少贷。仁、英、哲三朝，母后临朝听政，而终无外家干政之患，将法度之严，体统之正，有以防闲其过欤？抑母后之贤，自有以制其戚里欤？<br /><br />
　　——作《外戚传》。<br /><br />
</td></tr>

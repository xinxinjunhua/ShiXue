<tr><td class="t50">威州蛮传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　威州保霸蛮者，唐保、霸二州也。天宝中所置，后陷没。酋董氏，世有其地，与威州相错，因羁縻焉。<br /><br />
　　保州有董仲元、霸州有董永锡者，嘉祐及熙宁中皆尝请命于朝。政和三年，知成都庞恭孙始建言开拓，置官吏。于是以董舜咨保州地为祺州，董彦博霸州地为亨州，授舜咨刺史，彦博团练使。舜咨寻迁观察使；彦博留后，遂为节度使。诏成都给居第、田十二顷。二州经费岁用钱一万二千一百缗，米麦一万四千七百石，绢二千八百五十匹，紬布、绫绵、茶、盐、银等不预焉。后皆为砦。<br /><br />

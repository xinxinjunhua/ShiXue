<tr><td class="t50">文苑传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　自古创业垂统之君，即其一时之好尚，而一代之规橅，可以豫知矣。艺祖革命，首用文吏而夺武臣之权，宋之尚文，端本乎此。太宗、真宗其在藩邸，已有好学之名，及其即位，弥文日增。自时厥后，子孙相承，上之为人君者，无不典学；下之为人臣者，自宰相以至令录，无不擢科，海内文士，彬彬辈出焉。<br /><br />
　　国初，杨亿、刘筠犹袭唐人声律之体，柳开、穆修志欲变古而力弗逮。庐陵欧阳修出，以古文倡，临川王安石、眉山苏轼、南丰曾巩起而和之，宋文日趋于古矣。南渡文气不及东都，岂不足以观世变欤！作《文苑传》。<br /><br />

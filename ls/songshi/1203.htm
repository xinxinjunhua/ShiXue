<tr><td class="t50">章鉴传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　章鉴，字公秉，分宁人。以别院省试及第，累官中书舍人、侍左郎官、崇政殿说书，进签书枢密院事兼权参知政事，迁同知枢密院事。咸淳十年，王爚拜左丞相，鉴拜右丞相，并兼枢密使。明年，大元兵逼临安，鉴讬故径去。遣使亟召还朝，既至，罢相予祠。殿帅韩震之死，鉴与曾渊子明震无他。至是，御史王应麟缴其录黄，谓震有逆谋，鉴与渊子曲芘之。坐是削一官，放归田里。<br /><br />
　　后有告鉴家匿宝玺者，霜晨，鉴方拥败衾卧，兵士至，大索其室，惟敝箧贮一玉杯，余无一物，人颇叹其清约。鉴在朝日，号宽厚，然与人多许可，士大夫目为“满朝欢”云。<br /><br />
</td></tr>

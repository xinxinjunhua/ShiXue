<tr><td class="t50">列国世家序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　唐自安、史之乱，藩镇专制，百有余年，浸成割据。及巢贼蹂躏，郡邑丘墟。降臻五季，豪杰蜂午，各挟智力，擅为封疆，自制位号，以争长雄。天厌祸乱，授宋大柄。太祖命将出师，十余年间，南平荆、楚，西取巴、蜀，刘鋹既俘，李氏纳款。至于太宗，吴越请吏，漳、泉来归，薄伐太原，遂偾北汉，而海内一矣！<br /><br />
　　王称《东都事略》用东汉隗嚣、公孙述例，置孟昶、刘鋹等于列传，旧史因之。<br /><br />
　　今仿欧阳修《五代史记》，列之世家。凡诸国治乱之原，天下离合之势，有足鉴者，悉著于篇。其子孙诸臣事业有可考者，各疏本国之下。作《列国世家》。<br /><br />

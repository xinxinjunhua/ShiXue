<tr><td class="t50">刘弇传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘弇，字伟明，吉州安福人。儿时警颖，日诵万余言。登元丰二年进士第，继中博学宏词科。历官知嘉州峨眉县，改太学博士。元符中，有事于南郊，弇进《南郊大礼赋》，哲守览之动容，以为相如、子云复出，除秘书省正字。徽宗即位，改著作佐郎、实录院检讨官，以疾卒于官。<br /><br />
　　弇少嗜酒，不事拘检。为文辞剷剔瑕颣，卓诡不凡。有《龙云集》三十卷，周必大序其文，谓“庐陵自欧阳文忠公以文章续韩文公正传，遂为一代儒宗，继之者弇也”。其相推重如此云。<br /><br />
</td></tr>

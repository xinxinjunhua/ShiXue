<tr><td class="t50">郑丙传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　郑丙，字少融，福州长乐人。绍兴十五年进士。积官至吏部尚书、浙东提举。朱熹行部至台州，奏台守唐仲友不法事，宰相王淮庇之。熹章十上。丙雅厚仲友，且迎合宰相意，奏：“近世士大夫有所谓‘道学’者，欺世盗名，不宜信用。”盖指熹也。于是监察御史陈贾奏：“道学之徒，假名以济其伪，乞摈斥勿用。”道学之目，丙倡贾和，其后为庆元学禁，善类被厄，丙罪为多。<br /><br />
　　尝知泉州，为政暴急，或劝之尚宽，丙曰：“吾疾恶有素，岂以晚节易所守哉。”闻者哂之。丙官终端明殿学士，卒，谥简肃。<br /><br />

　　大理司直 大理评事 秘书省校书郎 正字 寺、监主簿 助教<br /><br />
　　右幕职，初授则试秘书省校书郎，再任至两使推官，则试大理评事。掌书记、支使、防御、团练判官则试大理司直、评事，又加则兼监察御史。亦有解褐试大理评事、校书郎、正字、寺监主簿、助教者，谓之试衔。有选集，同出身例。<br /><br />

<tr><td class="t50">河南应天府</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　牧 尹 少尹 司录 户曹 法曹 士曹 
尹以下掌同开封会，尹阙则置知府事一人，（以郎中以上充，二品以上曰判府。次府及节度州淮此。）通判一人，（以朝官充。）判官、推官各一人，（或以京朝官签书。）使院牙职、左右军巡悉同开封，而主、典以下差减其数。户曹通掌府院户籍、考课、税赋，法曹专掌谳议，士曹或荫叙起家，不常置。（诸州府同。至道初，罢司理院，州置司士，取官吏强慢者为，给簿、尉奉。）助教有特恩而受者，不厘务。<br /><br />

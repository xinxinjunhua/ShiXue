<tr><td class="t50">阎进传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　阎进，隶宣武。建炎初，遣使通问，进从行。既至云中府，金人拘留使者散处之，进亡去。追还，留守高庆裔问：“何为亡？”进曰：“思大宋尔。”又问：“郎主待汝有恩，汝亡何故？”进曰：“锦衣玉食亦不恋也。”庆裔义而释之。凡三亡乃见杀。临刑，进谓行刑者：“吾南向受刃，南则我皇帝行在也。”行刑者曳其臂令面北，进踊身直起，盘旋数四，卒南乡就死。<br /><br />
　　进武校尉朱绩亦从之，分在粘罕所。绩见粘罕数日，遽求妻室。粘罕喜，令择所虏内人妻之，绩取最丑者，人莫谕其意。不半月亡去，追之还，粘罕大怒，绩含笑死梃下。盖绩求妻者，所以固粘罕也。<br /><br />

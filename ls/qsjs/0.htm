　　<span class="zs">（胡案：原题为《提要》）</span><br /><br />
　　有清一代，文治武功，内政外交，创多于因皆辟前古未有之局。兹就宋袁氏《通鉴纪事本末》例，自满洲初起至宣统让位，共成四十万言，都为八十卷。每事各详起讫，自为标题；每篇各编年月，自为首尾。二百七十余年之纪载可以一览了然，研究史事者不可不手此编。<br /><br />

<tr><td class="t50">尔朱文畅传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　文殊弟文畅，初封昌乐郡公。以荣破葛贼之勋，进爵为王。其姊魏孝庄皇后。及韩陵之败，齐神武纳之，待其家甚厚。文畅由是拜开府仪同三司、肆州刺史。家富于财，招致宾客，穷极豪侈。与丞相司马任胄、主簿李世林、都督郑仲礼、房子远等相狎，外示杯酒交，而潜谋害齐神武。自魏氏旧俗，以正月十五日夜为打蔟戏，能中者即时赏帛。胄令仲礼藏刀于袴中，因神武临观，谋窃发，事捷，共奉文畅。为任氏家客薛季孝所告。以姊宠，止坐文畅一房。文畅死时年十八。<br /><br />
</td></tr>

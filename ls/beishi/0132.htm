<tr><td class="t50">贺狄干传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贺狄干，代人也。家本小族，世忠厚，为将以平当称。稍迁北部大人。登国初，与长孙嵩为对。明于听察，为人爱敬。道武遣狄干致马千匹，结婚于姚苌。会苌死，兴立，因止狄干而绝婚。兴弟平寇平阳，道武讨平之，禽其将狄伯支、唐小方等四十余人。后兴以骏马千匹赎伯支，而遣狄干还，帝许之。干在长安，因习读书史，通《论语》、《尚书》诸经，举止风流，有似儒者。初，帝普封功臣，狄干虽为姚兴所留，遥赐狄干爵襄武侯，加秦兵将军。及狄干至，帝见其言语衣服类中国，以为慕而习之，故忿焉，既而杀之。<br /><br />
</td></tr>

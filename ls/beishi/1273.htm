<tr><td class="t50">晁崇传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　晁崇，字子业，辽东襄平人也。善天文术数，为慕容垂太史郎。从慕容宝败于参合，为道武所获。从平中原，拜太史令。诏崇造浑仪，迁中书侍郎，令如故。天兴五年，月晕左角，崇奏，占为角虫将死。帝既克姚平于柴壁，以崇言之徵，遂命诸军焚车而反。牛果大疫，舆驾所乘巨犗数百头，亦同日毙于路侧，自余首尾相继。是岁天下牛死者十七八，麋鹿亦多死。<br /><br />
　　崇弟懿，明辩而才不及崇。以善北人语，为黄门侍郎。懿好矜容仪，被服僭度，言音类帝，左右每闻其声，莫不惊悚。帝知而恶之。后其家奴告崇、懿叛，招引姚兴。及兴寇平阳，帝以奴言为实，执崇兄弟，并赐死。<br /><br />
</td></tr>

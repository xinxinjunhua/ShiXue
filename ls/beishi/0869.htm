<tr><td class="t50">韦艺传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　瓘弟艺，字世文。周武帝时，以军功位上仪同，赐爵修武县侯，授左旅下大失，出为魏郡太守。及隋文帝为丞相，尉迟迥阴图不轨，朝廷遣艺季父孝宽驰往代迥。孝宽将至邺，诈病止传舍，从迥求药，以密观变。艺因投孝宽，即从孝宽击迥。以功进位上大将军，改封武威县公，以修武县侯别封一子。文帝受禅，进封魏兴郡公，拜齐州刺史。为政通简，士庶怀惠。迁营州总管。艺容貌瑰伟，每夷狄参谒，必整仪卫，盛服以见之，独坐满一榻。蕃人畏惧，莫敢仰视。而大修产业，与北夷贸易，家资巨万。颇为清论所讥。卒官。谥曰怀。<br /><br />

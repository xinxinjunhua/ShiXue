<tr><td class="t50">萧退传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　萧退，梁武帝弟司空、鄱阳王恢之子也。退在梁封湘潭侯，位青州刺史。建业陷，与从兄祗俱入东魏。齐天保中，位金紫光禄大夫，卒。<br /><br />
　　子慨，深沈有体表，好学，善草隶书，南士中称为长者。历著作佐郎，待诏文林馆。卒于司徒从事中郎。<br /><br />

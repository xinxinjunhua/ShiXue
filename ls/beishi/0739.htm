<tr><td class="t50">步大汗萨传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　步大汗萨，代郡西部人。祖荣，代郡太守。父居，龙骧将军、领人别将。萨初从尔朱荣入洛。及平葛荣，累功为都督。荣死，又从兆入洛。及韩陵之败，以所部降神武。稍迁车骑大将军，封行唐县公，晋州刺史。齐受禅，改封义阳郡公。<br /><br />
</td></tr>

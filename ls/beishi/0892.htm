<tr><td class="t50">常善传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　常善，高阳人也。家本豪族。魏孝昌中，从尔朱荣入洛，封房城县男。后周文平侯莫陈悦，除天水郡守。累迁骠骑大将军、开府仪同三司、西安州刺史，转蔚州刺史。频莅二籓，有政绩。进爵永阳郡公。周孝闵帝践祚，拜大将军、宁州总管。保定二年，入为小司徒。卒，赠柱国大将军、都督、延州刺史。子昂和嗣。<br /><br />
</td></tr>

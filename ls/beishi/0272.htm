<tr><td class="t50">辛少雍传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　祥弟少雍，字季和，少聪颖，有孝行，尤为祖父绍先所爱。绍先性嗜羊肝，常呼少雍共食。及绍先卒，少雍终身不食肝。性仁厚，有礼义，门内之法，为时所重。稍迁司空、高阳王雍田曹参军。少雍清正，不惮强御，积年久讼，造次决之。请托路绝，时称贤明。正始中，诏百官各举所知，高阳王雍及吏部郎中李宪俱以少雍为举首。卒于给事中。<br /><br />
　　少雍妻王氏，有德义。少雍与从弟怀仁兄弟同居。怀仁等事之甚谨，闺门礼让，人无间焉。士大夫以此称美。<br /><br />
　　子元桓，武定中，仪同府司马。<br /><br />
　　元桓弟逊士，太师开府功曹参军。<br /><br />

<tr><td class="t50">辛馥传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　辛穆子子馥，字元颖，早有学行，累迁平原相。父子并为此郡，吏人怀安之。元颢入洛，子馥不从。庄帝反政，封三门县男。天平中，除太尉府司马。白山连接三齐，瑕丘数州之界，多有贼盗。子馥受使检覆，因辨山谷要害宜立镇戍之所。又诸州豪右。在山鼓铸，奸党多依之，又得密造兵仗。上表请破罢诸冶。朝廷善而从之。后卒于清河太守。子馥以《三传》经同说异，遂总为一部，传注并出，校比短长。会亡，未就。<br /><br />
</td></tr>

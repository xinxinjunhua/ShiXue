<tr><td class="t50">尉长命传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　尉长命，太安狄那人也。父显，魏代郡太守。长命性和厚，有器识。参预齐神武起兵，破尔朱氏于韩陵，拜安南将军。樊子鹄据衮州反，除东南道大都督，与诸军讨平之。徙幽州刺史，督安、平二州。虽多聚敛，然以恩抚人，少得安集。卒，赠司空，谥曰武壮。<br /><br />
　　子兴，字敬兴。便弓马，有武艺，位冠军将军。<br /><br />

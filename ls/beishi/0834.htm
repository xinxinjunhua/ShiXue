<tr><td class="t50">独孤善传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　善字伏陀。幼聪慧，善骑射，以父勋，封魏宁县公。魏废帝元年，又以父勋，授骠骑大将军、开府仪同三司，加侍中，进爵长城郡公。周孝闵帝践阼，除河州刺史。以父负衅，久废于家。保定三年，乃授龙州刺史。天和六年，袭爵河内郡公。从帝东讨，以功授上开府。寻除兗州刺史，政在简惠，百姓安之。卒于州，赠持节、柱国、五州诸军事、定州刺史。<br /><br />
　　子览嗣，位右候卫大将军。大业末卒。<br /><br />

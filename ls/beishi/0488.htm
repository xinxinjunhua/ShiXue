<tr><td class="t50">郑雏传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　郑述祖族子雏，有识尚，操行清整，仕至胶州刺史。初，齐文宣为皇太子纳其女为良娣，雏时为尚书郎，赵郡李祖升兄弟微相敬惮。杨愔奏授雏赵郡太守，祖升兄弟具服至雏门，投刺拜谒。文宣闻之喜，笑曰：“足得杀李家兒矣。”<br /><br />
</td></tr>

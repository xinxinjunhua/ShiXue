<tr><td class="t50">张琼传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张琼，字连德，代人也。少壮健，有武用，初随葛荣为乱。荣败，尔朱荣以为都督。后历位济州刺史。及尔朱氏败，归神武，拜沧州刺史，加骠骑大将军、开府仪同三司。天平中，神武袭克夏州，以琼为慰劳大使，留镇之。寻为周文帝所陷，卒。赠司徒、都督、恒州刺史。<br /><br />
　　琼子欣，尚魏平阳公主，除驸马都尉、骠骑大将军、开府仪同三司、建州刺史，南郑伯。琼常忧其太盛，每谓亲识曰：“凡人官爵，莫若处中。欣位秩太高，深为忧虑。”而欣豪险，遂与公主情好不笃。寻为孝武所害。时人称琼先见。<br /><br />

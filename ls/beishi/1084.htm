<tr><td class="t50">贺迷传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贺迷，代人，太武敬哀皇后之从父也。皇后生景穆。初，后少孤，父兄近亲唯迷，故蒙赐爵长乡子。卒，赠光禄大夫、五原公。<br /><br />

<tr><td class="t50">崔徽传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　宏弟徽，字玄猷，少有文才，与勃海高演俱知名。历位秘书监，赐爵贝丘侯。乐安王范镇长安，选旧德之士与范俱，以徽为平西将军副将，行乐安王傅，进爵济南公。徽为政务存大体，不亲小事。性好人伦。引接宾客，或谈及平生，或讲论道义，诲诱后进，终日不止。以疾，征还京师，卒，谥曰元公，士类无不叹惜。<br /><br />
</td></tr>

<tr><td class="t50">张膺等传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张膺，不知何许人也。延兴中，为鲁郡太守。履行贞素，妻女樵采自供。孝文深嘉之。迁京兆太守，清白著称，得吏人之忻心焉。<br /><br />
　　※<br /><br />
　　路邕，阳平人也。宣武时，除东魏郡太守。莅政清勤。经年俭，日出家粟，赈赐贫窘。灵太后下诏褒美，赐龙厩马一匹、衣一袭、被褥一具。稍迁南青州刺史，卒。<br /><br />
　　※<br /><br />
　　阎庆胤，不知何许人也。为东秦州敷城太守。频年饥俭，庆胤岁常以家粟千石，赈恤贫穷，人赖以济。部人阳宝龙一千余人申颂美政。有司以闻，灵太后卒无褒赏。<br /><br />

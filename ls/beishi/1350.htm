<tr><td class="t50">郭秀传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　郭秀，范阳涿人也。事齐神武，稍迁行台右丞，封寿阳伯。亲宠日隆，多受赂遗，进退人物。张伯德、祁仲彦、张华原之徒，皆深相附会。秀疾，神武亲视之，问所欲官，乃启为七兵尚书，除书未至而卒。家无成人子弟，神武自至其宅，亲使录知其家资粟帛多少，然后去。赠仪同三司、恒州刺史。命其子孝义与太原公以下同学读书。初，秀忌嫉杨愔，诳胁令其逃亡。秀死后，愔还，神武追忿秀，即日斥遣孝义，终身不齿。<br /><br />
</td></tr>

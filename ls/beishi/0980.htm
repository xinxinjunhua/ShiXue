<tr><td class="t50">檀翥传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　檀翥，字凤翔，高平金乡人也。六世祖毓，晋步兵校尉。父江，始还北，仁至太常少卿，赠兗州刺史。翥十岁丧父，还京师宅，与营人杂居。虽幼孤寒，不与邻人来往。好读书，解属文，能鼓琴，早为琅邪王诵所知。年十九，以名家子为魏明帝挽郎。后客游三辅，时毛遐为行台，镇北雍，表翥为行台郎中。庄帝既诛尔朱荣，遐使翥诣亦师，因除著作佐郎，郎中如故。后孝武帝西幸，除兼中书舍人，修国史。大统初，又兼著作佐郎。以守关迎贺勋，封高唐子。后坐谈论轻躁，为黄门侍郎徐招所纠，死于廷尉狱。<br /><br />

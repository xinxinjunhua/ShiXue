<tr><td class="t50">尉拨传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　尉拨，代人也。父那，濮阳太守。拨为太学生，募从兗州刺史罗忸击贼于陈、汝，有功，赐爵介休男。讨和龙，击吐谷浑，皆有军功，进爵为子。累迁杏城镇将，大得人和。文成以拨清平有惠绩，赐以衣服。献文即位，为北征都将。南攻悬瓠。进爵安城侯，位北豫州刺史。卒，谥敬侯。<br /><br />
</td></tr>

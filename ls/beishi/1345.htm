<tr><td class="t50">王温传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王温，字桃汤，赵郡栾城人也。父冀，高邑令，坐事诛，温与兄继叔俱充宦者，稍迁中尝食典御、中给事，加左中郎将。宣武之崩，群官迎明帝于东宫，温于卧中起明帝，与保母扶抱明帝，入践帝位。高阳王雍既居冢宰，虑中人朋党，出为巨鹿太守。灵太后临朝，征为中常侍，赐爵栾城伯。累迁左光禄大夫、光禄勋卿、侍中，进封栾城县侯。温自陈本阳平武阳人，改封武阳县侯。建义初，于河阴遇害。<br /><br />
</td></tr>

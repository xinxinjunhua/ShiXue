<tr><td class="t50">闾大肥传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　闾大肥，蠕蠕人也。道武时归魏，尚华阳公主，赐爵其思子。与弟并为上宾，入八议。明元即位，为内都大官，进爵为侯。宜城王奚斤之攻武牢，大肥与娥清领十二军出中道。太武初，复与奚斤出云中白道讨大檀，破之。后从讨赫连昌，以功授荣阳公。公主薨，复尚护泽公主。太武将拜大肥为王，遇疾卒。<br /><br />
</td></tr>

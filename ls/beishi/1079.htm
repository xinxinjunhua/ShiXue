<tr><td class="t50">宇文述等传论</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　论曰：宇文述便辟足恭，柔颜取悦。君所谓可，亦曰可焉，君所谓不，亦曰不焉。无所是非，不能轻重，默默苟容，偷安高位，甘素餐之责，受彼己之讥。此固君子所不为，亦丘明之深耻。化及以此下才，负恩累叶。时逢崩拆，不能竭命，乃因利乘便，先图干纪，率群不逞，职为乱阶，扰本塞源，裂冠毁冕。衅深指鹿，事切食蹯，天地所不容，人神所同愤矣，世充头筲小器，遭逢时幸，与蒙奖擢，礼越旧臣。而躬为戎首，亲行鸠毒。竟而蛇豕丑类，继踵诛夷，枭獍凶魁，相寻菹戮。垂炯戒于来叶，快忠义于当年，为人臣者，可无殷鉴哉！<br /><br />
</td></tr>

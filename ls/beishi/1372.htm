<tr><td class="t50">尹正传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　尹正，其先天水人。詧莅雍州，正为其府中兵参军。禽张缵，获杜岸，皆正之力。詧称帝，除护军将军，位柱国，封新野县侯。卒，赠开府仪同三司，谥曰刚。岿之五年，以正配食詧庙。<br /><br />
　　子德毅，多权略，位大将军。后以见疑赐死。<br /><br />

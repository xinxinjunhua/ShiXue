<tr><td class="t50">王质传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王质，字绍奴，高阳易人也。其家坐事，幼下蚕室。颇解书学，为中曹吏、内典监。稍迁秘书中散，赐爵永昌子，领监御。迁为侍御给事。又领选部、监御二曹事，进爵魏昌侯。转选部尚书。出为瀛州刺史，风化粗行，人庶畏服之；而刑政峻刻，号为威酷。孝文颇念其忠勤宿旧，每行留大故、冯司徒亡、废冯后、陆睿、穆泰等事，皆赐质以玺书手笔，莫不委至，同之戚贵。质皆宝掌。入为大长秋卿，卒。<br /><br />
</td></tr>

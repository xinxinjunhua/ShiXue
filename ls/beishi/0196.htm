<tr><td class="t50">崔叔仁传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　仲文弟叔仁，轻侠重衿期。仕魏为颍州刺史。以贪污，为御史中丞高仲密劾，赐死于宅。临刑，赋诗五绝，与诸弟诀别。不及其兄甗，以其不甚营救也。子彦武，有识用。隋开皇初，位魏州刺史。<br /><br />
</td></tr>

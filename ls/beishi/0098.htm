<tr><td class="t50">尉诺传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　古真弟诺，以忠谨著称。从道武围中山，先登，伤一目。道武叹曰：“诺兄弟并毁目以建功效，诚可嘉也！”赐安乐子。从平姚平，还，拜国部大人。太武时，改邑辽西公。卒，第八子欢袭。<br /><br />

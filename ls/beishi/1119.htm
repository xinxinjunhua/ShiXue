<tr><td class="t50">刘轨思传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘轨思，勃海人也。说《诗》甚精。少事同郡刘敬和，敬和事同郡程师则，故其乡曲多为《诗》者。轨思仕齐，位国子博士。<br /><br />

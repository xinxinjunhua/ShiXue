<tr><td class="t50">王嶷传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　崇弟嶷，字道长。孝文初，为南部尚书，在任十四年。时南州多事，讼者填门。嶷性儒缓不断，终日昏睡。李訢、邓宗庆等，号为明察，而二人终见诛戮。余十数人或出或免，唯嶷卒得自保。时人语曰：“实痴实昏，终得保存。”后封华山公，入为内都大官，卒。<br /><br />
　　子祖念袭爵。<br /><br />
　　祖念弟云，字罗汉，颇有风尚，位南兗州刺史。坐受所部荆山戍主杜虔财，又取官绢，因染遂有割易，御史纠劾。会赦免。卒官，赠豫州刺史，谥文昭。长子昕。<br /><br />
</td></tr>

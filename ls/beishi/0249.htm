<tr><td class="t50">和其奴传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　和其奴，代人也。少有操行，善射御。初为三郎。文成初，封平昌公，累迁尚书左仆射。又与河东王闾毗、太宰常英等并平尚书事。在官慎法，不受私请。迁司空，加侍中。文成崩，乙浑与林金闾擅杀尚书杨保年等。时殿中尚书元郁率殿中宿卫士欲加兵于浑。浑惧，归咎于金闾，执以付郁。时其奴以金闾罪恶未分，出之为定州刺史。皇兴元年，长安镇将东平王道符反，诏其奴讨之，未至而道符败。军还，薨，内外叹惜之。赠平昌王，谥曰宣。子受袭爵。<br /><br />
</td></tr>

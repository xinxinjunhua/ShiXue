<tr><td class="t50">魏宁传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　魏宁，钜鹿人也。以善推禄命，征为馆客。武成以己生年月，托为异人，问之。宁曰：“极富贵，今年入墓。”武成惊曰：“是我！”宁变辞曰：“若帝王，自有法。”<br /><br />
　　又有阳子术语人曰：“谣言：卢十六，雉十四，犍子拍头三十二。且四八天之大数，太上之祚，恐不过此。”既而武成崩，年三十二。<br /><br />

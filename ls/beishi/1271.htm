<tr><td class="t50">隐逸传论</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　论曰：古之所谓隐逸者，非伏其身而不见也，非闭其言而不出也，非藏其智而不发也。盖以恬淡为心，不皦不昧，安时处顺，与物无私者也。眭夸忘怀缨冕，毕志丘园，或隐不违亲，贞不绝俗；或不教而劝，虚往实归，非有自然纯德，其孰能至此？然文诩见伤无愠，徐则志在沈冥，不可亲疏，莫能贵贱，皆可谓抱朴之士矣。崔廓感于屈辱，遂以肥遁见称；祖浚文籍之美，足以克隆堂构。父子虽动静殊方，其于成名一也，美哉！<br /><br />
</td></tr>

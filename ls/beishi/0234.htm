<tr><td class="t50">车路头传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　车路头，代人也。少以忠厚选给东宫，为帐下帅。天赐末，明元出于外，路头随侍竭力。及即位，封宣城公、忠意将军。帝性明察，群臣多以职事遇谴，至有杖罚，故路头优游不任事。性无害，每评狱处理，常献宽恕之议，以此见重于朝，帝亦敬纳之。卒，明元亲临哀恸，赠太保、宣城王，谥曰忠贞。丧礼一依安城王叔孙俊故事。陪葬金陵。子眷袭爵。<br /><br />

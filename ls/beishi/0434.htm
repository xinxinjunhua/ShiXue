<tr><td class="t50">李式传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李敷弟式，字景则，学业知名。位西兗州刺史、濮阳侯。式自以家据权要，心虑危祸，常敕津吏，台有使者，必先启然后度之。既而使人卒至，始云南过，既济，突入执式赴都，与兄俱死。<br /><br />

<tr><td class="t50">贺谊传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　敦弟谊。谊性刚果，有干略。周文据关中，引之左右，累迁仪同三司、略阳公府长史。周闵帝受禅，封霸城县子，加开府，历原、信二州总管。及兄敦以谗毁伏诛，坐免官。从武帝平齐，拜洛州刺史，进封建威县侯。<br /><br />
　　开皇中，位左武候将军、海陵郡公。后以突厥为边患，谊素有威名，拜灵州刺史，进位柱国。谊时年老，犹能重铠上马，甚为北夷所惮。数载，上表乞骸骨，卒于家。<br /><br />
　　子举袭爵。<br /><br />

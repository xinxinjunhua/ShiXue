<tr><td class="t50">崔纂传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　崔挺族子纂，字叔则。博学有文才，既不为时知，乃著《无谈子论》。寻为廷尉正，每有大狱，多所据明，有当官之誉。时太原王静自廷尉监迁少卿，纂耻居其下，乃与静书，辞气抑扬，无上下礼。入启求解位。后为洛阳令，卒，赠司徒左长史。<br /><br />
　　纂兄穆，字子和，雅有度量，州辟主簿，卒。穆子暹。<br /><br />
</td></tr>

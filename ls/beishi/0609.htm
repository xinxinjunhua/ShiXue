<tr><td class="t50">崔敬友传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　光弟敬友，本州从事。颇有受纳，御史案之。乃与守者俱逃。后除梁郡太守，会遭所生忧，不拜。敬友精心佛道，昼夜诵经，免丧之后，遂菜食终身。恭宽接下，修身厉节。自景明已降，频岁不登，饥寒请丐者，皆取足而去。又置逆旅于肃然山南大路之北，设食以供行者。卒于家。<br /><br />
　　弟子鸿。<br /><br />
</td></tr>

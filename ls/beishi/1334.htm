<tr><td class="t50">剧鹏传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　剧鹏，高阳人也。粗览经史，闲晓吏事。与王质等俱充宦官，性通率，不以阍阉为耻。孝文迁洛，常为宫官任事。幽后之惑薛菩萨也，鹏密谏止之，不从，遂发愤卒。<br /><br />

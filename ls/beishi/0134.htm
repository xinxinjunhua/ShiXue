<tr><td class="t50">奚眷传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　奚眷，代人也。少有将略。道武世，有战功。明元时，为武牢镇将，为寇所惮。太武时，赐爵南阳公。及征蠕蠕，眷以都曹尚书督偏将出别道。诏会鹿浑海，眷与中山王辰等诸大将俱后期，斩于都南，爵除。<br /><br />
</td></tr>

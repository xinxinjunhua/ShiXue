<tr><td class="t50">韩茂等传论</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　论曰：韩茂、皮豹子、封敕文、吕罗汉、孔伯恭之为将也，皆以沈勇笃实，仁厚扶众，功成事立，不徒然矣。与夫苟要一战之利，侥幸暂胜之名，岂同年而语也。田益宗蛮夷荒帅，翻然效款，终于怀金曳紫，不其美欤。孟表之致名位，不徒然也。夫人主闻鞞鼓之响，则思将帅之臣，何则？夷难平暴，折冲御侮，为国之所系也。奚康生等俱以熊虎之姿，奋征伐之气，亦一时之骁猛，壮士之功名乎。<br /><br />

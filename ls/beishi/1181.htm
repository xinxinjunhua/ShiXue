<tr><td class="t50">杨引传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　杨引，乡郡襄垣人也。三岁丧父，为叔所养。母年九十二终，引年七十五，哀毁过礼。三年服毕，恨不识父，追服斩衰，食粥粗服，誓终身命。经十三年，哀慕不改，为郡县乡闾三百余人上状称美。有司奏宜旌赏，复其一门，树其纯孝。诏别敕集书标扬引至行，又可假以散员之名。<br /><br />

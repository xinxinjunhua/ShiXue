<tr><td class="t50">赵猛传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　赵猛，太安狄那人也。姊为齐文穆皇帝继室，生赵郡公琛。猛性方直，颇有器干。齐神武举义，以预义勋，封信都县伯。累迁南营州刺史。卒，赠司空公。<br /><br />
</td></tr>

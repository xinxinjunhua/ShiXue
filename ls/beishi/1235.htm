<tr><td class="t50">苏淑传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　苏淑，字仲和，武邑人也。兄寿兴，坐事为阉官，后拜河间太守，赐爵晋阳男。及寿兴将卒，遂冒养淑为子。淑熙平中袭其爵。后除乐陵内史，在郡绥抚，甚有人誉。后谢病乞解，有诏听之，人吏老幼诉乞淑者甚众。后历荥阳、中山二郡太守，卒。<br /><br />
　　淑清心爱下，所历三郡，皆为吏人所思，当时称为良二千石。武定初，赠卫大将军、都官尚书、瀛州刺史，谥曰懿。齐神武追美清操，与羊敦同见优赏。<br /><br />
</td></tr>

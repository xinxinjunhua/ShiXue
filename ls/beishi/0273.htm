<tr><td class="t50">辛穆传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　凤达弟穆，字叔宗，举茂才，东雍州别驾。初随父在下邳，与彭城陈敬文友善。敬文弟敬武，少为沙门，从师远学，经久不返。敬文病临卒，以杂绫二十匹托穆与敬武。穆久不得见，经二十年，始于洛阳见敬武，以物还之，封题如故。世称廉信。历东荆州司马，转长史，带义阳太守，领戍。雅有恤人之志。再转汝阳太守。遇水涝人饥，上表请轻租赋。帝从之，遂敕汝阳一郡，听以小绢为调。除平原相。征为征虏将军、太中大夫，未发，卒于郡。赠后将军、幽州刺史。<br /><br />
</td></tr>

<tr><td class="t50">王崇传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王崇，字乾邕，阳夏雍人也。兄弟并以孝称，身勤稼穑，以养二亲。仕梁州镇南府主簿。母亡，杖而后起，鬓发堕落。未及葬，权殡宅西。崇庐于殡所，昼夜哭泣，鸠鸽群至。有一小鸟，素质黑眸，形大于雀，栖于崇庐，朝夕不去。母丧阕，复丁父忧，哀毁过礼。是年夏，风雹，所经处，禽兽暴死，草木摧折。至崇田畔，风雹便止，禾麦十顷，竟无损落。及过崇地，风雹如初。咸称至行所感。崇虽除服，仍居墓侧。于其室前，生草一根，茎叶甚茂，人莫能识。至冬中，复有鸟巢崇屋，乳养三子，毛羽成长，驯而不惊。守令闻之，亲自临视。州以闻奏，标其门闾。<br /><br />

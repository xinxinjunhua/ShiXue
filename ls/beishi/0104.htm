<tr><td class="t50">尉聿传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　古真族玄孙聿，字成兴，性耿介。明帝时，为武卫将军。时领军元叉执权，百寮莫不加敬，聿独长揖不拜。寻出为凉州刺史。凉州绯色，天下之最，叉送白绫二千匹令染，聿拒不受。叉讽御史劾之，驿征至京。覆，无状。还任，卒。<br /><br />
</td></tr>

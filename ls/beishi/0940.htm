<tr><td class="t50">杨达传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　雄弟达，字士达，有学行，仕周，位仪同、内史下大夫，封遂宁县男。文帝受禅，拜给事黄门侍郎，进爵为子。迁兼吏部侍郎，加开府。转内史侍郎、鄯郑赵三州刺史，俱有能名。平陈后，帝差品天下牧宰，达为第一，擢拜工部尚书，加上开府。达为人弘厚，有局度，杨素每曰：“有君子貌兼君子心者，唯杨达耳。”献皇后及文帝山陵制度，达并参预焉。炀帝嗣位，转纳言，领营东都副监。<br /><br />
　　辽东之役，领右武卫将军。进位左光禄大夫。卒于师。赠吏部尚书、始安侯，谥曰恭。<br /><br />

<tr><td class="t50">魏玄传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　魏玄，字僧智，其先任城人也，后徙于新安。玄少慷慨，有胆略。孝武西迁，东魏北徙，人情各怀去就，玄每率乡兵抗拒东魏。芒山之役，大军不利，宜阳、洛州皆为东魏守，而玄母及弟并在宜阳。玄以为忠孝不两立，乃率义徒还阙南镇抚。周文手书劳之。除洛阳令，封广宗县子。周保定元年，累迁骠骑大将军、开府仪同三司，镇阎韩。迁熊州刺史，政存简惠，百姓悦之。转和州刺史、伏流防主，进爵为公。及齐将斛律明月率众向宜阳，兵威甚盛，玄率众御之，每战辄克。后以疾卒于位。<br /><br />
</td></tr>

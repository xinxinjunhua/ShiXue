<tr><td class="t50">成轨传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　成轨，字洪义，上谷居庸人也。少以罪刑，入事宫掖。以谨厚称，为中谒者仆射。孝文意有所欲，轨候容色，时有奏发，辄合帝心。从驾南征，专进御食。时孝文不豫，常居禁中，昼夜无懈。延昌末，迁中常侍、尝食典御、光禄大夫，统京染都将。孝昌二年，以勤旧封始平县伯。明帝所幸潘嫔以轨为假父，颇为中官之所敬惮。后进爵为侯，卒于卫将军，赠雍州刺史，谥曰孝惠。<br /><br />
</td></tr>

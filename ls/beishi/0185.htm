<tr><td class="t50">于义诸弟传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　义弟礼，上将军、赵州刺史、安平郡公。<br /><br />
　　礼弟智，初为开府。以受宣帝密旨，告齐王宪反，遂封齐国公。寻拜柱国，位大司空。<br /><br />
　　智弟绍，上开府、绥州刺史、华阳郡公。<br /><br />
　　绍弟弼，上仪同、平恩县公。<br /><br />
　　弼弟兰，上仪同、襄阳县开国公。<br /><br />
　　兰弟旷，上仪同。赠恒州刺史。<br /><br />

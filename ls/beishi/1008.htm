<tr><td class="t50">阴世师传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　阴寿子世师，少有节概，性忠厚，多武艺。以功臣子拜仪同。炀帝嗣位，拜张掖太守，深为戎狄所惮。后拜楼烦太守，迁左翊卫将军。与代王留守京师。及义军至，世师自以世荷隋恩，遂拒守不下。及城平，与京兆郡丞骨仪等见诛。<br /><br />
</td></tr>

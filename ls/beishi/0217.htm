<tr><td class="t50">封肃传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　肃字元邕，博涉经史。太傅崔光见而赏焉。位尚书左中兵郎中。性恭俭，不妄交游，唯与崔励、励从兄鸿尤相亲善。所制文章多亡失，存者十余卷。<br /><br />

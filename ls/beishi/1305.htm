<tr><td class="t50">刘祐传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘祐，荥阳人也。隋开皇初，为大都督，封索卢县公。其所占候，合如符契，文帝甚亲之。初与张宾、刘晖、马显定历。后奉诏撰兵书十卷，名曰《金韬》，上善之。复著《阴策》二十卷，《观台飞候》六卷，《玄象要记》五卷，《律历术文》一卷，《婚姻志》三卷，《产乳志》二卷，《式经》四卷，《四时立成法》一卷，《安历志》十二卷，《归正易》十卷，并行于世。<br /><br />
</td></tr>

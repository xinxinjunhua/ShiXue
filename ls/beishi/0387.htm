<tr><td class="t50">高翼传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　高祐从父弟翼，字次同，豪侠有风神。孝昌末，葛荣作乱，朝廷以翼山东豪右，即家拜勃海太守。翼率合境，徙居河、济间。魏朝因置东冀州，以翼为刺史，封乐城县侯。俄除定州刺史，以贼乱不行。及尔朱兆弑庄帝，翼保境自守，卒。中兴初，赠使持节、侍中、太保、录尚书、六州诸军事、冀州刺史，谥曰文宣。子乾。<br /><br />

<tr><td class="t50">阚骃传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　阚骃，字玄阴，燉煌人也。祖倞，父玖，并有名于西土，玖位会稽令。骃博通经传，聪敏过人，三史群言，经目则诵，时人谓之宿读。注王朗《易传》，撰《十三州志》。沮渠蒙逊甚重之，常侍左右，访以政事损益。拜秘书、考课郎中，给文吏三十人，典校经籍，刊定诸子三千余卷。牧犍待之弥重，拜大行台，迁尚书。及姑臧平，乐安王丕镇凉州，引为从事中郎。王薨，迁京师。家甚贫，不免饥寒。性能多食，一饭至三升乃饱。卒，无后。<br /><br />
</td></tr>

<tr><td class="t50">崔说传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　崔士谦弟说，本名士约。少有气概，膂力过人，尤工骑射。贺拔胜牧荆州，以为假节、冠军将军、防城都督。又随奔梁。复自梁归西魏。授武卫将军、都督，封安昌县子。从周文复弘农，战沙苑，皆有功，进爵为侯，除京兆郡守。累迁都官尚书、定州大中正，改封安固县侯；赐姓宇文，并赐名说焉。进骠骑大将军、开府仪同三司，加侍中，进爵万年县公。再迁总管、凉州刺史。说莅政强毅，百姓畏之。后除使持节、能和中三州、崇德等十三防诸军事，加授大将军，改封安平县公。<br /><br />
　　建德四年，卒，赠廓、延等五州刺史，谥曰壮。<br /><br />
　　子弘度。<br /><br />

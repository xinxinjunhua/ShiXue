<tr><td class="t50">胡方回传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　胡方回，安定临泾人也。父义周，姚泓黄门侍郎。方回仕赫连屈丐为中书侍郎。涉猎史籍，辞彩可观，为屈丐《统万城铭》、《蛇祠碑》诸文，颇行于世。太武破赫连昌，方回入魏，未为时知。后为北镇司马，为镇修表，有所称荐，帝览之嗟美。闾知方回，召为中书博士，赐爵临泾子。迁侍郎，与太子少傅游雅等改定律制。司徒崔浩及当时朝贤，并爱重之。清贫守道，以寿终。<br /><br />
</td></tr>

<tr><td class="t50">东魏孝静帝元善见纪(2)</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　元象元年春正月辛酉朔，日有蚀之。有巨象自至砀郡陂中，南兗州获送于邺。丁卯，大赦，改元。<br /><br />
　　二月丙辰，遣兼散骑常侍郑伯猷聘于梁。<br /><br />
　　夏四月庚寅，曲赦畿内，开酒禁。<br /><br />
　　六月壬辰，帝幸华林都堂，听讼。是夏，山东大水，虾蟆鸣于树上。<br /><br />
　　秋七月乙亥，高丽遣使朝贡。<br /><br />
　　八月辛卯，大败西魏于河阴。<br /><br />
　　九月，大都督贺拔仁击邢磨纳、卢仲礼等破平之。<br /><br />
　　冬十月，梁人来聘。<br /><br />
　　十二月庚寅，遣陆操聘于梁。<br /><br />

<tr><td class="t50">恩幸传论</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　论曰：古谚有之，“人之多幸，国之不幸。”然则宠私为害，自古忌之。大则倾国亡身，小则伤贤害政，率由斯也，所宜诫焉。《诗》曰：“殷鉴不远，近在夏后之世。”观夫魏氏以降，亦后来之殷鉴矣。为国家者，可无鉴之哉？<br /><br />

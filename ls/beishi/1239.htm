<tr><td class="t50">路去病传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　路去病，阳平人也。风神疏朗，仪表瑰异。齐河清初，为殿中侍御史，弹劾不避贵戚，以正直知名。敕用士人为县宰，以去病为定州饶阳县令。去病明闲时务，性颇严毅，人不敢欺，然至廉平，为吏人叹伏。武平四年，为成安县令。都下有邺、临漳、成安三县，辇毂之下，旧号难为。重以政乱时艰，纲纪不立，近臣内戚，请属百端。去病消息事宜，以理抗答。势要之徒，虽厮养小人，莫不惮其风格，亦不至嫌恨。自迁邺以还，三县令政术，去病独为称首。周武平齐，重其能官，与济阴郡守公孙景茂二人不被替代，发诏褒扬。去病后以尉迟迥事。隋大业初，卒于冀氏县令。<br /><br />
</td></tr>

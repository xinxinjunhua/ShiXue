<tr><td class="t50">韦朏传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　彧弟朏，字遵显，少有志业。年十八，辟州主簿。时属岁俭，朏以家粟造粥，以饲饥人，所活甚众。解褐太学博士。稍迁右军将军，为荆、郢和籴大使。南郢州刺史田夷启称朏父珍往任荆州，恩洽夷夏，乞朏充南道别将，领荆州骁勇，共为腹背。诏从之。未几，行南荆州事。迁东徐州刺史。梁遣其郢州刺史田粗憘率众来寇，朏于石羊冈破斩之，以功封杜县子。卒于侍中、雍州刺史，谥曰宣。<br /><br />
　　长子鸿，字道衍，颇有干用，累迁中书舍人。天平三年，坐漏泄，赐死于家。<br /><br />

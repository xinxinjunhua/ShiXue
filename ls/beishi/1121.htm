<tr><td class="t50">邢峙传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　邢峙，字士峻，河间郑人也。少学通《三礼》、《左氏春秋》。仕齐，初为四门博士，迁国子助教，以经入授皇太子。峙方正纯厚，有儒者风。厨宰进太子食，菜有邪蒿，峙令去之，曰：“此菜有不正之名，非殿下宜食。”文宣闻而嘉之，赐以被褥缣纩，拜国子博士。皇建初，除清河太守，有惠政。年老归，卒于家。<br /><br />
</td></tr>

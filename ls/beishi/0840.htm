<tr><td class="t50">叱列伏龟传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　叱列伏龟，字摩头陀，代郡西部人也。其先为部落大人，魏初入附，遂世为第一领人酋长，至龟五世。龟容貌瑰伟，腰带十围，进止详雅，兼有武艺。嗣父业复为领人酋长。魏孝昌三年，以别将从长孙承业西征，累迁金紫光禄大夫。从还洛，授都督，遂为齐神武所宠任，加授大都督。沙苑之败，随例来降。周文帝以其豪门，解缚礼之，仍以邵惠公女妻之。大统四年，封长乐县公。自此常从征讨，亟有战功。历侍中、骠骑大将军、开府仪同三司、恒州刺史。卒，子椿嗣。<br /><br />
　　椿字千年。明帝时，位骠骑大将军、开府仪同三司，改封永世县公。天和初，除左宫伯，进位大将军。<br /><br />

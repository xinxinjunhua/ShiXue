<tr><td class="t50">李灵家族传论</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　论曰：古人云“燕、赵多奇士”，观夫李灵兄弟，并有焉。灵则首应弓旌，道光师傅。顺则器标楝干，一时推重。孝伯风范鉴略，盖亦过人。各能克广门业，道风不殒，余庆之美，岂非此之谓乎。至如元忠之倜傥从横，功名自卒；季初之家风素业，昆季兼举。有齐之日，雅道方振。宪之子弟，特盛衣缨，岂唯戚里是凭，固亦文雅所得。安世识具通雅，时干之良。玚以豪俊达，郁则儒博显，谧之高逸，固可谓世有人焉。义深弟兄，人位兼美；子雄才官，不替门绪，茂矣。<br /><br />
</td></tr>

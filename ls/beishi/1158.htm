<tr><td class="t50">荀士逊传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　荀士逊，广平人也。好学，有思理，为文清典，见赏知音。武定末，举司州秀才，迄齐天保，十年不调。皇建中，马敬德荐为主书，转中书舍人。状貌甚丑，以文辞见重。尝有事须奏，遇武成在后庭，因左右传通，传通者不得士逊姓名，乃云“丑舍人”。帝曰：“必士逊也。”看封题果是，内人莫不欢笑。累迁中书侍郎，号为称职。与李若等撰《典言》，行于世。齐亡年卒。<br /><br />
</td></tr>

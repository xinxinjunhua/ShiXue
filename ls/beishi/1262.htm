<tr><td class="t50">酷吏传论</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　论曰：士之立名，其途不一，或以循良进，或以严酷显。故宽猛相资，德刑互设。然不严而化，君子所先。于洛侯等为恶不同，同归于酷，肆其毒螫，多行残忍。贱人肌肤，同诸木石；轻人性命，甚于刍狗。长恶不悛，鲜有不及。故或身婴罪戮，或忧恚俱殒，异术皆毙，各其宜焉。凡百君子，以为有天道矣。<br /><br />
</td></tr>

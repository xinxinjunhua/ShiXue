<tr><td class="t50">陈建传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　陈建，代人也。以善骑射擢为三郎，迁下大夫、内行长。太武讨山胡白龙，轻之，单将骑数十，每自登山。白龙伏壮士，出不意；帝坠马，几至不测。建以身捍贼，奋击，杀数人，被十余疮。帝壮之，赐别户二十。文成初，出为幽州刺史，假秦郡公。帝以建贪暴懦弱，遣使就州罚杖五十。孝文初，征为尚书右仆射，加侍中，进爵赵郡公。建与晋阳侯元仙德、长乐王穆亮、平原王陆睿密表启南伐，帝嘉之。迁司徒，进爵魏郡王。帝与文明太后频幸建第，赐建妻宴于后庭。薨，子念生袭。有罪，爵除。<br /><br />
</td></tr>

<tr><td class="t50">崔庠传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　崔长文从弟庠，字文序，有干用。为东郡太守，元颢寇逼郡界，庠拒不从命，弃郡走还乡里。孝庄还宫，赐爵平原伯，拜颍川太守，颇有政绩。永熙初，除东徐州刺史。二年，为城人王早、兰宝等所害。后赠骠骑将军、吏部尚书、齐州刺史。子罕袭爵，齐受禅，例降。<br /><br />
</td></tr>

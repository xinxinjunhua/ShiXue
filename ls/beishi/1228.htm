<tr><td class="t50">郎方贵传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　郎方贵，淮南人也。少有志尚，与从父弟双贵同居。隋开皇中，方贵常于淮水津所寄渡，舟人怒之，挝方贵臂折。至家，双贵问知之，恚恨，遂向津，殴杀船人。津者执送之。县以方贵为首，当死，双贵从坐，当流。兄弟争为首坐，县司不能断，送诣州。兄弟各引死，州不能定。二人争欲赴水死。州以状闻。上闻，异之，特原其罪，表其门闾，赐物百段。后为州主簿。<br /><br />
</td></tr>

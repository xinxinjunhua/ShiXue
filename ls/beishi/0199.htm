<tr><td class="t50">崔子约传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　子聿弟子约。五岁丧父，不肯食肉。后丧母，居丧哀毁骨立。人云：“崔九作孝，风吹即倒。”禫月，兄子度死，又百日不入房。长八尺余，姿神俊异，潜观梁使刘孝仪，宾从见者骇目。武定中，为平原公开府祭酒。与兄子赡俱诣晋阳，寄居佛寺。赡长于子约二岁，每退朝久立，子约冯几对之，仪望俱华，俨然相映。诸沙门窃窥之，以为二天人也。乾明中，为考功郎。病且卒，谓赡曰：“自诸兄殁，而门业颓替，居家大唯吾与尔。命之修短，曾何足悲。汝能免之，吾不馁矣。”<br /><br />

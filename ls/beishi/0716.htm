<tr><td class="t50">破六韩常传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　破六韩常，单于之裔也。初呼厨貌入朝汉，为魏武所留，遣其叔父右贤王去卑监本国户。魏氏方兴，率部南转，去卑遣弟右谷蠡王潘六奚率军北御。军败，奚及五子俱没于魏，其子孙遂以潘六奚为氏。后人讹误，以为破六韩。世领部落。父孔雀，少骁勇，背其宗人拔陵，率部降尔朱荣。诏封永安县侯，第一领人酋长。常，孔雀少子，沉敏有胆略，善骑射。尔朱荣死，常居河西。天平中，与冀州刺史万俟受洛干等东归，神武上为武卫将军。齐受禅，封广川县公，拜太子太保。卒于沧州刺史。赠尚书令、司徒公、太傅、第一领人酋长、假王，谥曰忠武。<br /><br />
</td></tr>

<tr><td class="t50">杨俭传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　穆弟俭，字景则。伟容仪，有才行。位北雍州刺史，政尚宽惠，夷夏安之。后从破齐神武于沙苑，封夏阳县侯，位开府仪同三司、华州刺史。卒，谥静。<br /><br />

<tr><td class="t50">穆丑善传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　崇宗人丑善，道武初，率部归附，与崇同心戮力，捍御左右。拜天部大人，居东蕃。<br /><br />
　　子莫提，从平中原，位相州刺史、假陵阳侯。其子孙位亦通显。<br /><br />

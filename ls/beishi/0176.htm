<tr><td class="t50">于天恩传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　劲弟天恩，位内行长、辽西太守。赠平东将军、燕州刺史。<br /><br />
　　天恩子仁生，位太中大夫。<br /><br />
　　仁生子安定，平原郡太守、高平郡都将。<br /><br />
　　安定子子提，陇西郡守、茂平县伯。周保定二年，以子谨著勋，追赠太保、建平郡公。<br /><br />

<tr><td class="t50">阳元景传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　阳固从弟昭，字元景，学涉史传，尤闲案牍。为齐文襄府墨曹参军，甚见亲委，与陈元康、崔暹等参谋机密。及崔甗为崔暹所告，元景劾成其狱，赖邢子才证白以免，时以元景为告而顺旨。初，文襄择日将受魏禅，令元景等定仪注，草诏册，并授官，未毕而文襄殂，罢府。天保初，除给事黄门侍郎。后以风气弥留，不堪近侍，出除青州高阳内史，卒于郡。文集十卷。<br /><br />
　　子静立，性淳孝，操履清方，美词令，善尺牍。仕齐，位三公郎中。隋开皇初，州主簿。<br /><br />
</td></tr>

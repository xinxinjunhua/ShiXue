<tr><td class="t50">扶猛传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　扶猛，字宗略，上甲黄土人也。其种落号白兽蛮。猛仕梁，位南洛、北司二州刺史，封宕梁县男。魏废帝元年，以众降。周文厚加抚纳，复爵宕渠县男，割二郡为罗州，以猛为刺史。令从开府贺若敦南讨信州。敦令猛直道白帝，所由之路，人迹不通。猛乃梯山扪葛，备历艰阻，遂入白帝。抚慰人夷。莫不悦附。以功进开府仪同三司。俄则信州蛮反，猛复从贺若敦平之，进爵临江县公。后从田弘破汉南诸蛮，进位大将军。卒。<br /><br />
</td></tr>

<tr><td class="t50">鲜于世荣传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　鲜于世荣，渔阳人也。父宝业，怀朔镇将。武平初，赠仪同三司、祠部尚书。世荣少沈敏，有器干。兴和二年，为神武亲信都督，稍迁平西将军，赐爵石门县子。天统二年，累加开府仪同三司，除郑州刺史。武平中，以领军从平高思好，封义阳郡王、领军大将军、太子太傅。及周武帝入代，送马脑酒钟与之，得便撞破。周兵入邺，诸将皆降，世荣在三台之前，独鸣鼓不辍。及被执不屈，乃见杀。世荣虽武人，无文艺，以朝危政乱，每常窃叹。见徵税无厌，赏赐过度，发言叹息焉。<br /><br />
　　子贞，武平末，假仪同三司。<br /><br />

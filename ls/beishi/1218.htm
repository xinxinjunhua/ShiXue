<tr><td class="t50">游元传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　游元，字楚客，广平任城人也。父宝藏，位至郡守。元少聪敏。仕周，历寿春令、谯州司马，俱有能名。开皇中，为殿内侍御史。炀帝嗣位，迁尚度支郎。辽东之役，领左骁卫长史，为盖牟道监军，拜朝请大夫，兼书侍御史。宇文述等九军败绩，帝令元主其狱。述时贵幸，势倾朝廷，遣家僮造元，有所请属，元不之见。他日，案述逾急，仍以属请状劾之。帝嘉其公正，赐朝服一袭。后奉使黎阳督运。杨玄感作逆，告以情。元引正义责之，遂见困，竟不屈节，见害。帝甚嘉之，赠银青光禄大夫，拜其子仁宗为正议大夫、弋阳郡通守。<br /><br />

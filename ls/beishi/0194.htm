<tr><td class="t50">崔仲文传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　甗弟仲文，有文学。太和中，为丞相掾。<br /><br />
　　沙苑之败，仲文持马尾度河，波中乍没乍出。神武望见，曰：“崔掾也。”遽遣船赴接。及至，谓曰：“卿为君为亲，不顾万死，可谓家之孝子，国之忠臣也。”<br /><br />
　　后文襄欲使行青州，闻其多醉，乃止。<br /><br />
　　天保初，甗为侍中，仲文为银青光禄大夫，同日受拜，时云两凤连飞。<br /><br />
　　尝被敕召，宿酲未解。文宣怒，将罚之。试使为观射诗十韵，操笔立成，乃原之。拜散骑常侍、光禄大夫。卒。<br /><br />
　　子偃，太子洗马、尚书郎。<br /><br />
　　偃弟儦。<br /><br />

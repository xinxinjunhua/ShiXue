<tr><td class="t50">尉眷传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　诺长子眷，忠谨有父风。明元时，执事左右，为太官令。时侍臣受斤亡入蠕蠕，诏眷追之。遂至虏庭，禽之大檀前。由是以骁烈闻。太武即位，命眷与散骑侍郎刘库仁等八人分典四部，绾奏机要，加陈兵将军。文成时，拜侍中、太尉，封渔阳王，与太宰常英等录尚书事。文成北巡狩，以寒雪方降，议还。眷曰：“今去都不远而旋，虏必疑我有内难。方寒雪，宜更进前。”帝遂度漠而还。帝以眷元老，赐杖履上殿。薨，谥曰庄。子多侯袭爵。<br /><br />
</td></tr>

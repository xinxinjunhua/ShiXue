<tr><td class="t50">奚牧传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　奚牧，代人也。重厚有智谋，道武宠遇之，称曰仲兄。初，刘显害帝，梁眷知之，潜使牧与穆崇至七个山以告。帝录先帝旧臣，又以牧告显功，使敷奏政事，参与计谋。从征慕容宝，以功拜并州刺史，赐爵任城公。州与姚兴接界，兴颇寇边。牧乃与兴书，称顿首，均礼抗之，责兴侵边不直之意。兴以与国和通，恨之，有言于道武，道武戮之。<br /><br />
</td></tr>

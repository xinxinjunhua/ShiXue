<tr><td class="t50">于景传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　忠弟景，字百年。忠薨后，为武卫将军。谋废元叉，叉黜为怀荒镇将。及蠕蠕主阿那瑰叛，镇人请粮，景不给。镇人遂执缚景及其妻，拘守别室，皆去其衣服，令景著皮裘，妻著故绛旗袄，毁辱如此。月余，乃杀之。<br /><br />

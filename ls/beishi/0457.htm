<tr><td class="t50">赵逸传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　赵逸，字思群，天水人也。父昌，石勒黄门郎。逸好学夙成，仕姚兴，历中书侍郎。后为赫连屈丐所虏，拜著作郎。太武平统万，见逸所著，曰：“此竖无道，安得为此言乎！作者谁也？速推之。”司徒崔浩进曰：“彼之谬述，亦子云《美新》，固宜容之。”帝乃止。历中书侍郎、赤城镇将，频表乞免，久乃见许。性好坟典，白首弥勤，年逾七十，手不释卷，凡所著述，诗赋铭颂五十余篇。<br /><br />
</td></tr>

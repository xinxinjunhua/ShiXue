<tr><td class="t50">王琚传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王琚，高平人也。自云本太原人，高祖始，晋豫州刺史。琚以秦常中被刑，入宫禁。小心守节，久乃见叙用，稍迁礼部尚书，赐爵广平公。孝文以琚历奉前朝，志存公正，授散骑常侍。后历位冀州刺史，假广平王，进爵高平王。孝文、文明太后东巡冀州，亲幸其家。还京，以其年老，拜散骑常侍，养老于家，前后赐以车马、衣物，不可称计。又降爵为公。扶老自平城从迁洛邑。常饮牛乳，色如处子。卒年九十，赠冀州刺史，谥靖公。<br /><br />
</td></tr>

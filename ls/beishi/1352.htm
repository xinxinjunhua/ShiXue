<tr><td class="t50">安吐根传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　安吐根，安息胡人，曾祖入魏，家于酒泉。吐根魏末充使蠕蠕，因留塞北。天平初，蠕蠕主使至晋阳，吐根密启本蕃情状，神武得为之备。蠕蠕果遣兵入掠，无获而反。神武以其忠款，厚加赏赉。其后与蠕蠕和亲，结成婚媾，皆吐根为行人也。吐根性和善，颇有计策，频使入朝，为神武亲待。在其本蕃，为人所谮，奔投神武。文襄嗣事，以为假节、凉州刺史、率义侯，稍迁仪同三司，食永昌郡干。皇建中，加开府。齐亡年，卒。<br /><br />
</td></tr>

<tr><td class="t50">邢晏传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　邢伟弟晏，字幼平。美风仪，博涉经史，善谈释老，雅好文咏。位沧州刺史，为政清静，吏人安之。卒，赠尚书左仆射、瀛州刺史，谥曰文贞。<br /><br />
　　晏笃于义让，初为南兗州，例得一子解褐，乃启其孤弟子子慎为朝请。子慎年甫十二，而其子已弱冠矣。后为沧州，复启孤兄子昕为府主簿，而其子并未从宦，世人以此多之。<br /><br />
　　子亢，字子高，颇有文学。位兼通直散骑常侍。使于梁，时年二十八。后为中外府属，坐事死于晋阳。<br /><br />
</td></tr>

<tr><td class="t50">张伦传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　(白泽)长子伦，字天念，大司农少卿、燕州大中正。熙平中，蠕蠕主丑奴遣使来朝，抗敌国之礼，不修臣敬。朝议将依汉答匈奴故事，遣使报之。伦表以为：“虏虽慕德，亦来观我。惧之以强，傥或归附；示之以弱，窥觎或起。《春秋》所谓以我卜也。高祖、世宗知其若此，来既莫逆，去又不追。必其委贽玉帛之辰，屈膝籓方之礼，则丰其劳贿，藉以珍物。至于王人远役，衔命虏庭，优以匹敌之尊，加之想望之宠，恐徒生虏慢，无益圣朝。”不从。孝庄初，卒于大司农卿。<br /><br />
</td></tr>

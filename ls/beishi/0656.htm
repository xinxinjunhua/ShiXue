<tr><td class="t50">袁跃传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　跃字景腾，博学俊才，性不矫俗，笃交友。翻每谓人曰：“跃可谓我家千里驹也。”历位尚书都兵郎中，加员外散骑常侍。将立明堂，跃乃上议，当时称其博洽。蠕蠕主阿那环亡破来奔，朝廷矜之，送复其国。既而每使朝贡，辞旨颇不尽礼。跃为朝臣书与环，陈以祸福，言辞甚美。后迁车骑将军太傅清河王怿文学，雅为怿所爱赏。怿之文表，多出于跃。卒，赠冠军将军、吏部郎中。所制文集行于世。无子，兄翻以子聿脩继。<br /><br />
</td></tr>

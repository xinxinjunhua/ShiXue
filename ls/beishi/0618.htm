<tr><td class="t50">崔光家族传论</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　论曰：崔光风素虚远，学业深长，孝文归其才博，许其大至，明主固知臣也。历事三朝，师训少主，不出宫省，坐致台傅，斯亦近世之所希有。但顾怀大雅，托迹中庸，其于容身之讥，斯乃胡广所不免也。鸿博综古今，立言为事，亦才志之士乎。崔亮既明达从事，动有名迹，于断年之选，失之逾远，救弊未闻，终为国蠹，无苟而已，其若是乎。光韶居雅仗正，有国士之风矣。<br /><br />

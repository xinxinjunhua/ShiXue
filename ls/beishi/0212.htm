<tr><td class="t50">封子绣传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　子绘弟子绣，位霍州刺史。陈将吴明彻侵淮南，子绣城陷，送扬州。齐亡后，逃归。终于通州刺史。子绣外貌儒雅，而使气难犯。兄女婿司空娄定远为瀛州刺史，子绣为勃海太守。定远过之，对妻及诸女宴集言戏，微有亵慢。子绣鸣鼓集众将攻之，定远免冠拜谢，久之乃释。<br /><br />
</td></tr>

<tr><td class="t50">郭绚传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　郭绚，河东安邑人，家世寒微。初为尚书令史，后以军功拜仪同，历数州司马、长史，皆有能名。大业初，刑部尚书宇文幹巡省河北，引绚为副。炀帝将有事辽东，以涿郡为冲要，访可任者。闻绚有干局，拜涿郡赞务，吏人悦服。数载，迁为通守，兼领留守。及山东盗起，绚逐捕之，多所克获。时诸郡无复完者，唯涿郡独全。后将兵击窦建德于河间，战死，人吏哭之，数月不息。<br /><br />
</td></tr>

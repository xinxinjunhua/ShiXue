<tr><td class="t50">宇文虬传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　宇文虬，字乐仁，代武川人也。骁悍有胆略。少从征讨，累有战功，封南安侯。孝武西迁，以独孤信为行台，信引虬为帐内都督。随信奔梁。大统三年归阙，进爵为公。禽窦泰，复弘农，及沙苑、河桥之战，皆有功。又从独孤信讨梁仚定，破之。累迁南秦州刺史、骠骑大将军、开府仪同三司。虬每经行阵，必身先士卒，故上下同心，战无不克。后除金州刺史、大将军。卒。<br /><br />
</td></tr>

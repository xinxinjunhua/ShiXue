<tr><td class="t50">董谧传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　(崔)宏同郡董谧。<br /><br />
　　谧父京，与同郡崔康时、广阳霍原等，俱以硕学，播名辽海。谧好学，传父业。中山平，入朝，拜仪曹郎，撰朝觐、飨宴、郊庙、社稷之仪。<br /><br />

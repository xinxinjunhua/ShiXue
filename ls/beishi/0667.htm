<tr><td class="t50">袁翻等传论</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　论曰：袁翻弟兄，可为一时才秀；聿修行业，亦乃不殒家风。景文学义见称，敬安正情自立，休之加以藻思，可谓载德者焉。思伯经明行修，乃惟门素。祖莹干能艺用，实曰时良；孝徵俊才虽多，适足败国。叔鸾器怀清峻，元景才干知名，并匡佐齐初，一时推重，美矣哉！<br /><br />
</td></tr>

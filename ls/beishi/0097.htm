<tr><td class="t50">尉古真传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　尉古真，代人也。道武之在贺兰部，贺染干遣侯引乙突等将肆逆。古真知之，密以驰告。染干疑古真泄其谋，乃执拷之，以两车轴押其头，伤其一目。不服，乃免之。后从平中原，以功赐爵束州侯。明元初，为鸿飞将军，镇大洛。卒于定州刺史。子亿万袭。<br /><br />
</td></tr>

<tr><td class="t50">穆弼传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　观弟翰，平原镇将、西海王。薨。<br /><br />
　　子龙兒袭爵，降为公。卒。<br /><br />
　　子弼，有风格，善自位置，涉猎经史，与长孙承业、陆希道等齐名。然而矜己陵物，颇以此损焉。孝文定氏族，欲以弼为国子助教，弼辞以为屈。帝曰：“朕欲敦励胄子，屈卿先之。白玉投泥，岂能相污！”弼曰：“既遇明时，耻沈泥滓。”会司州牧咸阳王禧入。帝曰：“朕与卿作州督，举一主簿。”即命弼谒之。因为帝所知。宣武初，为广平王怀国郎中令，数有匡谏之益。除中书舍人，卒于华州刺史，谥曰懿。<br /><br />

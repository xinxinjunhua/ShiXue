<tr><td class="t50">裴虔通传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　裴虔通，河东人。初，炀帝为晋王，以亲信从，稍迁至监门校尉。帝即位，擢旧左右，授宣惠尉。累从征役，至通议大夫。与司马德戡同谋作乱，先开宫门，骑至成象殿，杀将军独孤盛，执帝于西閤。化及以虔通为光禄大夫、莒国公。化及引兵之北也，令镇徐州。化及败后，归于大唐，即授徐州总管，转辰州刺史，封长蛇男。寻以隋朝弑逆之罪，除名，徙于岭表而死。<br /><br />
</td></tr>

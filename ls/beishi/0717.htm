<tr><td class="t50">金祚传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　金祚，字神敬，安定人也。性骁雄，尚气侠。魏末，以军功至太中大夫，随元天穆讨平邢杲。历泾、岐二州刺史。后大行台贺拔岳表授东雍州刺史，令讨仇池氏杨绍先于百顷。未还，岳为侯莫陈悦所杀。祚克仇池还，莫知所归。俄而神武遣行台侯景慰谕，祚遂解甲而还，封安定县公。后随魏孝武西入，周文帝以祚为兗州刺史。历太仆、卫尉二卿。寻除东北道大都督、晋州刺史，入据东雍州。神武遣尉景攻降之。芒山之战，以大都督从破西军，除华州刺史。文宣受禅，加开府仪同三司，别封临济县子。卒，赠司空公。<br /><br />

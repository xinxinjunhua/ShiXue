<tr><td class="t50">孟威传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　孟威，字能重，河南洛阳人也。颇有气尚，尤知北土风俗。历东宫齐帅、羽林监。后以明解北人语，敕在著作，以备推访。累迁沃野镇将。前后频使远籓。粗能称旨。普泰中，除大鸿胪卿，卒，赠司空公。子恂嗣。<br /><br />
</td></tr>

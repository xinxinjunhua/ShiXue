<tr><td class="t50">任果传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　任果，字静鸾，南安人也。本方隅豪族。父褒，仕梁，为沙州刺史、新巴县公。果性勇决，志在立功。魏废帝元年，率所部来附。周文嘉其远至，待以优礼。果因面陈取蜀策，深被纳之。乃授沙州刺史、南安县公。从尉迟迥伐蜀。寻进授骠骑大将军、开府仪同三司。及成都平，除始州刺史。周文以其方隅首领，早立忠节，进爵乐安郡公，赐以铁券，听相传袭，并赐路车驷马及仪卫等以光宠之。寻为刺客所害。<br /><br />
</td></tr>

<tr><td class="t50">苻承祖传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　苻承祖，略阳氐人也。因事为阉人，为文明太后所宠，赐爵略阳公。历吏部尚书，加侍中，知都曹事。初，太后以承祖居腹心之任，许以不死之诏。后承祖坐赃应死，孝文原之，命削职禁锢在家，授悖义将军、佞浊子。月余遂死。<br /><br />
</td></tr>

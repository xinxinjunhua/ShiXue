<tr><td class="t50">车伊洛传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　车伊洛，焉耆胡也。世为东境部落帅，恒修职贡。延和中，授平西将军，封前部王。伊洛规欲归阙，为沮渠无讳断路，伊洛连战破之。无讳卒。伊洛前后遣使招喻其子乾寿等，及其户五百余家，送之京师。又率部众二千余人伐高昌，讨破焉耆东关七城。正平二年，伊洛朝京师，拜都官尚书，将军、王如故。卒，谥康王，葬礼依卢鲁元故事。子歇袭爵。<br /><br />
</td></tr>

<tr><td class="t50">张宗之传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张宗之，字益宗，河南巩人也。家世寒微。父孟舒，晋将刘裕西征，板假洛阳令。初、缑氏宗文邕谋反，胁孟舒等事晋。孟舒败，走免。宗之被执入京，腐刑。以忠厚谨慎，擢为侍御中散，赐爵巩县侯。历仪曹、库部二曹尚书，领中秘书，进爵彭城公，后例降为侯。卒于冀州刺史，赠怀州刺史，谥曰敬。<br /><br />
　　始宗之纳南来殷孝祖妻萧氏，宋仪同三司思话弟思度女也，多悉妇人仪饰故事。太和中，初制六宫服章，萧被命在内，豫见访采，数蒙赐赉云。<br /><br />
</td></tr>

<tr><td class="t50">包恺传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　包恺，字和乐，东海人。其兄愉，明《五经》，恺悉传其业。及从王仲通受《史记》、《汉书》，尤称精究。大业中，为国子助教。于是《汉书》学者以萧、包二人为宗，远近聚徒教授者数千人。卒，门人起坟立碣焉。<br /><br />
</td></tr>

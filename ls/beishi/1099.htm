<tr><td class="t50">卢丑传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　卢丑，昌黎徒何人也。襄城王鲁元之族也。太武监国，丑以博学入授经。后以师傅旧恩，赐爵济阴公。位尚书，加散骑常侍，卒于河内太守。<br /><br />

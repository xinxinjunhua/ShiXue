<tr><td class="t50">卢尚之传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　卢昶弟尚之，字季儒，小字羡夏。亦以儒素见重，位司徒左长史、前将军、济州刺史、光禄大夫。<br /><br />
　　长子文甫，字元祐，涉历文史，有名誉于时。位司空行参军。<br /><br />
　　文甫弟文翼，字仲祐，少甚轻躁，晚颇改节。以军功赐爵范阳子，位太中大夫。<br /><br />
　　文翼弟文符，字叔伟，性通率，位通直散骑侍郎。子潜。<br /><br />

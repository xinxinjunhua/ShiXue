<tr><td class="t50">刘模传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　初，高允所引刘模者，长乐信都人，颇涉经籍。允撰修国记，选为校书郎，与其缉著。常令模带持管籥，每日同入史阁，接膝对筵，属述时事。允年已九十，手目稍衰，多遣模执笔而占授裁断之，如此者五六岁。允所成篇卷，模预有功。太和中，除南颍川太守。<br /><br />
　　王肃之归阙，路经县瓠，羁旅穷悴，时人莫识。模独经给所须，吊待以礼，肃深感其意。及肃临豫州，模犹在郡，征报复之，由是为新蔡太守。在二郡积十年，宽猛相济，颇有声称。迁陈留太守。时年七十余矣，而饰老隐年，昧禁自效。遂家于南颍川，不复归其旧乡矣。<br /><br />

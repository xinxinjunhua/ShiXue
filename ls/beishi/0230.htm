<tr><td class="t50">周几传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　周几，代人也。少以善射为猎郎。明元即位，为左部尚书，以军功封交趾侯。太武以几有智勇，遣镇河南，威信著于外境。几常嫌奚斤等绥抚关中失和，每至言论，形于声色，斤等惮焉。进号宋兵将军，率洛州刺史于栗磾以万人袭陕城，卒于军，军人无不叹惜之。归葬京师。谥曰桓。子步袭爵。<br /><br />
</td></tr>

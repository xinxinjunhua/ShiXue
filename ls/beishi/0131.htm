<tr><td class="t50">莫题传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　莫题，代人也。多智，有才用。初为幢将，领禁兵。道武之征慕容宝，宝夜犯营，军人惊骇。遂有亡还京师者，言官军败于柏肆。京师不安，南安公元顺因欲摄国事。题曰：“大事不可轻尔，不然，祸将及矣！”顺乃止。后封高邑公。窟咄寇南鄙，题时贰于帝，遗箭于窟咄，谓之曰：“三岁犊岂胜重载！”言窟咄长而帝少也。帝既衔之，后有告题居处倨傲，拟则人主。帝乃使人示之箭，告之曰：“三岁犊能胜重载不？”题奉昭，父子对泣。诘朝，乃刑之。<br /><br />
</td></tr>

<tr><td class="t50">薛安都等传论</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　论曰：薛安都一武夫耳，虽轻于去就，实启东南。事窘图变，而竟保宠禄，优矣。休宾穷而委质；孝标名重东南；法寿拓落不羁，克昌厥后；景伯兄弟儒素，良可称乎。众敬举地纳诚，荣曜朝国；人位并列，无乏于时。羊祉刚酷之风，得死为幸。深以才干从事，声迹可称。敦、烈持己所遵，殆时彦也。<br /><br />

<tr><td class="t50">刘灵晖传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　灵晖少明敏，有器度。得惠蔚手录章疏，研精寻问，更求师友，《三礼》、《三传》，皆通宗旨。然始就鲍季详、熊安生质问疑滞，其所发明，熊、鲍无以异也。举冀州秀才，射策高第。仕齐，累至国子博士，授南阳王绰府谘议参军。绰除定州刺史，仍随绰之镇。所为猖蹶，灵晖唯默默忧悴，不能谏止。绰表请灵晖为王师，以管记马子结为谘议。朝廷以王师三品，奏启不合。后主于启下手诏云：“但用之。”儒者甚以为荣。绰除大将军，灵晖以王师领大将军司马。绰诛，停废。从绰死后，每至七日至百日，灵晖恒为绰请僧设斋行道。齐亡，卒。<br /><br />
</td></tr>

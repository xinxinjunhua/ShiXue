<tr><td class="t50">魏恺传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　恺自散骑常侍迁青州长史，固辞。文宣大怒曰：“何物汉子，与官不就！”时帝已失德，朝廷为之惧，恺容色坦然。帝曰：“死与长史，任卿所择。”答曰：“能杀臣者陛下，不受长史者愚臣。”帝谓杨愔曰：“何虑无人，苦用此汉！放还，永不须收。”由是积年沈废。<br /><br />
　　后遇愔于路，微自陈。愔云：“咸由中旨。”恺应声曰；“虽复零雨自天，终待云兴四岳，公岂得言不知？”杨愔欣然曰：“此言极为简要。”数日，除霍州刺史，在职有政理。后卒于胶州刺史。<br /><br />
</td></tr>

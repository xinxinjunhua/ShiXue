<tr><td class="t50">宋显传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　宋显，字仲华，敦煌效谷人也。性果毅，有干用。初事尔朱荣，稍迁为记室参军。荣死，世隆等以为晋州刺史。后归神武为行台左丞，拜西衮州刺史。在州多所受纳，然勇决有气干，检御左右，咸得其心力。及河阴之战，深入，没于行阵。赠司徒公。<br /><br />
</td></tr>

<tr><td class="t50">李栗传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李栗，雁门人也。昭成时，父祖入北。栗少辩捷，有才能兼将略。初随道武幸贺兰部，爱其艺能。时王业草创，爪牙心腹，多任亲近，唯栗一介远寄，兼非戚旧。数有战功，拜左军将军。栗性简慢，矜宠，不率礼度。每在道武前舒放倨傲，不自祗肃，笑唾任情。道武即其宿过诛之。于是威严始厉，制勒群下尽卑谦之礼，自栗始也。<br /><br />
</td></tr>

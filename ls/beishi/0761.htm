<tr><td class="t50">娄睿传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　睿字佛仁。父拔，魏南部尚书。睿幼孤，被叔父昭所养。为神武帐内都督，封掖县子。累迁光州刺史。在任贪纵，深为文襄所责。后改封九门县公。齐受禅，除领军将军，别封安定侯。睿无他器干，以外戚贵幸，纵情财色。为瀛州刺史，聚敛无厌。皇建初，封东安王。大宁元年，进位司空。平高归彦于冀州，还拜司徒。河清三年，滥杀人，为尚书左丞宋仲羡弹奏，经赦乃免。寻为太尉，以军功进大司马。武成至河阳，仍遣总偏师赴县瓠。睿在豫境，留停百余日，专行非法。诏免官，以王还第。寻除太尉，薨，赠大司马。<br /><br />
　　子子产嗣，位开府仪同三司。<br /><br />

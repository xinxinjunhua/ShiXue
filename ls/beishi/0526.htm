<tr><td class="t50">裴谒之传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　让之第六弟谒之，字士敬。少有志节，好直言。文宣末年昏纵，朝臣罕有言者。谒之上书正谏，言甚切直。文宣将杀之，白刃临颈，谒之辞色不变。帝曰：“痴汉何敢如此！”杨愔曰：“望陛下放以取后世名。”帝投刀叹曰：“小子望我杀尔以取后世名，我终不成尔名。”遣人送出。齐亡，卒于壶关令。<br /><br />

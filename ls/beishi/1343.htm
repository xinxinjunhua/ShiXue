<tr><td class="t50">杨范传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　杨范，字法僧，长乐广宗人也。文成时，坐事宫刑，为王琚所养，恩若父子。累迁为中尹。灵太后临朝，为中常侍、崇训太仆，领中尝药典御，赐爵华阴子，出为华州刺史。中官内侍贵者，灵太后皆许其方岳，以范年长，拜跪为难，故遂其请。父子纳货，为御史所纠，遂废于家。后为崇训太仆、华州大中正，卒。<br /><br />
</td></tr>

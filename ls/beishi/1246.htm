<tr><td class="t50">敬肃传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　敬肃，字敬俭，河东蒲坂人。少以贞介知名，释褐州主簿。开皇初，为安陵令，有能名。擢拜秦州司马，转幽州长史。仁寿中，为卫州司马，俱有异绩。炀帝嗣位，迁颍川郡赞务。大业五年，朝东都。帝令司隶大夫薛道衡为天下郡官之状，称肃曰：“心如铁石，老而弥笃。”时左翊卫大将军宇文述当涂用事，其邑在颍州，每有书属肃，肃未尝开封，辄令使者持去。述宾客有放纵者，以法绳之，无所宽贷，由是述衔之。八年，朝于涿郡。帝以其年老，有能名，将擢为太守者数矣，辄为述所毁，不行。大业末，乞骸骨，优诏许之。去官之日，家无余财。岁余，终于家。<br /><br />
</td></tr>

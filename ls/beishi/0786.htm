<tr><td class="t50">白建传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　白建，字彦举，太原阳邑人。初入大丞相府任兵曹，典文帐，明解书计，为同局所推。天保末，兼中书舍人。孝昭辅政，除大丞相骑兵参军。河清二年，除员外散骑常侍，仍舍人。三年，突厥入境，代、忻二牧，悉是细马，合数万疋，在五台山北合谷中避贼。贼退，敕建送马定州，付人养饲。建以马瘦，违敕以便宜从事。戎马无损，建有力焉。武平末，历位尚书、特进、侍中、中书令，封高昌郡公。父长命，赠开府仪同三司、都官尚书。建虽无他才伎，勤于在公，以温柔自处。与唐邕俱以典执兵马，致位卿相。诸子幼弱，俱为州郡主簿；男女婚嫁，皆得胜流。卒，赠司空。<br /><br />
</td></tr>

<tr><td class="t50">荀济传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　荀济，字子通。其先颍川人，世居江左。济初与梁武帝布衣交。知梁武当王，然负气不服，谓人曰：“会楯上磨墨作檄文。”或称其才于梁武，梁武曰：“此人好乱者也。”济又上书讥佛法，言营费太甚。梁武将诛之，遂奔魏，馆于崔甗家。及是见执。杨愔音谓曰：“迟暮何为然？”济曰：“叱叱，气耳，何关迟暮！”乃下辩曰：“自伤年几摧颓，恐功名不立。舍兒女之情，起风云之事，故挟天子，诛权臣。”齐文襄惜其才，将不杀，亲谓曰：“荀公何意反？”济曰：“奉诏诛将军高澄，何为反！”于是燔杀之。邺下士大夫多传济音韵。<br /><br />

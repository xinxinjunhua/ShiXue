<tr><td class="t50">赵柔传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　赵柔，字元顺，金城人也，少以德行才学，知名河右。沮渠牧犍时，为金部郎。太武平凉州，内徙京师。历著作郎、河内太守，甚著信惠。柔尝在路，得人所遗金珠一贯，价直数百缣，柔呼主还之。后有人遗柔铧数百枚者，柔与子善明鬻之市。有人从柔买，柔索绢二十疋。有商人知其贱，与柔三十匹。善明欲取之，柔曰：“与人交易，一言便定，岂可以利动心？”遂与之。晋绅之流，闻而敬服。陇西王源贺采佛经幽旨作《祗洹精舍图偈》六卷，柔为之注解，为当时俊僧所钦味。又凭立铭赞，颇行于世。子默，字冲明，武威太守。<br /><br />
</td></tr>

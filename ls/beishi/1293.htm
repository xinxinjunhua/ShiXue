<tr><td class="t50">张子信传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张子信，河内人也。颇涉文学，少以医术知名。恒隐白鹿山，时出游京邑，甚为魏收、崔季舒所重。大宁中，征为尚药典御。武平初，又以太中大夫征之，听其所志，还山。又善《易》筮及风角之术。武卫奚永洛与子信对坐，有鹊鸣庭树，斗而堕焉。子信曰：“不善。向夕，当有风从西南来，历此树，拂堂角，则有口舌事。今夜有人唤，必不可往，虽敕亦以病辞。”子信去后，果有风如其言。是夜，琅邪王五使切召永洛，且云：“敕唤。”永洛欲起，其妻苦留之，称坠马腰折，不堪动。诘朝而难作。子信，齐亡卒。<br /><br />

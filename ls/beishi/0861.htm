<tr><td class="t50">苏椿传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　绰弟椿，字令钦。性廉慎，沈勇有决断。魏正光中，关右贼乱，椿应募讨之，授荡寇将军。以功累迁中散大夫，赐爵美阳子。大统初，拜镇东将军、金紫光禄大夫，赐姓贺兰氏。后除帅都督，行弘农郡事。椿当官强济，特为周文帝所知。<br /><br />
　　十四年，置当州乡师，自非乡望允当众心者不得预焉。乃令驿追椿，领乡兵。其年，破槃头氏有功，除散骑常侍，加大都督。十六年，征随郡。军还，除武功郡守。既为本邑，以清俭自居，小大之政，必尽忠恕。进爵为侯，位骠骑大将军、开府仪同三司、大都督。卒。子植嗣。<br /><br />

<tr><td class="t50">薛孤延传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　薛孤延，代人也。少骁果，从神武起兵，以功累加仪同三司。从西征，至蒲津。及窦泰失利，神武班师，延后殿，且战且行，一日斫折十五刀。神武尝阅马于北牧，道逢暴雨，大雷震地，火烧浮图。神武令延视之。延案槊直前，大呼绕浮图走，火遂灭。延还，须及马鬃尾皆焦。神武叹其勇决，曰：“延乃能与霹雳斗！”后封平秦公，与诸将讨颍川。延专监造土山，以酒醉，为敌所袭据。颍川平，诸将还京师，宴华林园。文襄启魏帝，坐延阶下以辱之。齐受禅，别赐爵都昌县公。延性好酒，率多昏醉。以善战，每大军征讨，常为前锋。位太子太保、太傅。<br /><br />
</td></tr>

<tr><td class="t50">封兴之传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　隆之弟兴之，字祖胄。经明行修，恬素清静。位瀛冀二州刺史、平北府长史。所历有当官誉。卒，以隆之佐命功，赠殿中尚书、雍州刺史，谥曰文。<br /><br />
　　子孝琬，字士茜。七岁而孤，为隆之鞠养；慈爱甚笃，隆之启以父爵富城子授焉。位东宫洗马。卒，赠太府少卿。<br /><br />
　　孝琬性恬静，颇好文咏。太子少师邢邵、七兵尚书王昕并先达高才，与孝琬年位悬隔，晚相逢遇，分好遂深。孝琬灵榇言归，二人送于郊外，悲哭凄恸，有感路人。<br /><br />
</td></tr>

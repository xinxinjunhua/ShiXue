<tr><td class="t50">伊娄穆传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　伊娄穆，字奴干，代人也。父灵，善骑射，为周文所知，尝谓之曰：“若伊尹阿衡于殷，致主尧、舜。卿既姓伊，庶卿不替前绪。”于是赐名尹焉。历卫将军、隆州刺史、卢奴县公。穆弱冠为周文帐内亲信，以机辩见知。历中书舍人、通直散骑常侍。尝入白事，周文望见悦之，字之曰：“奴干作仪同面见我矣。”于是拜仪同三司，赐封安阳县伯。周孝闵帝践阼，进位骠骑大将军。建德中，卒。<br /><br />

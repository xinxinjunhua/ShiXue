<tr><td class="t50">郭遵传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　郭遵者，钜鹿人也。齐文宣为太原公时，为国常侍。帝家人有盖丰洛者，典知家务，号曰盖将。遵因其处分，曾抗拒，为高德正所贵。齐受禅，由是擢为主书，专令访察。中书舍人朱谓为钜鹿太守，遵为弟子求官，谓启文宣，鞭之二百，付京畿。久之，除并省尚书都令史、建州别驾。会韩长鸾父永兴为刺史，因此遂相参附。后擢为黄门侍郎，被诛。<br /><br />
　　遵出自贱微，易为盈满。宫门逢诸贵，辄呼姓字，语言布置，极为轻率。尝于宫门牵韩长鸾，辞曰：“王在得言。主上纵放如此，曾不规谏，何名大臣？”长鸾嫌其率尔，便掣手而去，由是不加援，故及于祸。<br /><br />
</td></tr>

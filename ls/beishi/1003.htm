<tr><td class="t50">独孤盛传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　楷弟盛，性刚烈，有胆略。以落邸之旧，累迁右屯卫将军。宇文化及之乱，裴虔通引兵至成象殿，宿卫者皆释仗走。盛谓虔通曰：“何物兵？形势太异！”虔通曰：“事已然，不预将军事。”盛骂曰：“老贼，何物语！”不及被甲，与左右十余人逆拒之，为乱兵所杀。越王侗称制，赠光禄大夫、纪国公，谥曰武节。<br /><br />
</td></tr>

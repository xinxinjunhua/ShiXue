<tr><td class="t50">西魏废帝元钦纪</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　废帝讳钦，文皇帝之长子也。母曰乙皇后。大统元年正月乙卯，立为皇太子。十七年三月，即皇帝位。是月，梁邵陵王萧纶侵安陆，大将军杨忠讨禽之。<br /><br />
　　元年冬十一月，梁湘东王萧绎讨侯景，禽之。遣其舍人魏彦来告，仍嗣位于江陵。<br /><br />
　　二年秋八月，大将军尉迟迥克成都，剑南平。冬十一月，安定公宇文泰杀尚书元烈。<br /><br />
　　三年春正月，安定公宇文泰废帝而立齐王廓。帝自元烈之诛，有怨言。淮安王育、广平王赞等并垂泣谏，帝不听，故及于辱。<br /><br />
</td></tr>

<tr><td class="t50">宗如周传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　宗如周，南阳人。有才学，以府僚随詧，后至度支尚书。如周面狭长，詧以《法华经》云：“闻经随喜，面不侠长。”尝戏之曰：“卿何为谤经？”如周踧躇，自陈不谤。詧又谓之如初。如周惧，出告蔡大宝。大宝知其旨，笑谓之曰：“君当不谤余经，正应不信《法华》耳。”如周乃悟。又尝有人诉事于如周，谓为经作如州官也。乃曰：“某有屈滞，故来诉如州官。”如周曰：“尔何小人，敢呼我名！”其人惭谢曰：“祗言如周官作如州，不知如州官名如周，早知如州官名如周，则不敢唤如周官作如州。”如周乃笑曰：“令卿自责，见侮反深。”众咸服其宽雅。<br /><br />

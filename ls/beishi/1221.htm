<tr><td class="t50">卢楚传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　卢楚，涿郡范阳人也。祖景祚，魏司空掾。楚少有才学，性鲠急，口秘，言语涩难。大业中，为尚书左司郎。当朝正色，甚为公卿所惮。及帝幸江都，东都官僚多不奉法。楚每存纠举，无所回避。越王侗称尊号，以楚为内史令、左备身将军、尚书左丞、右光禄大夫，封涿郡公，与元文都等同心戮力以辅侗。及王世充作乱，兵犯太阳门。武卫将军皇甫无逸斩关逃难，呼楚同去。楚曰：“仆与元公有约，若社稷有难，誓以俱死。今舍去不义。”及世充入，楚匿太官署，执之。世充奋袂令斩，于是锋刃交下，支体糜碎。<br /><br />

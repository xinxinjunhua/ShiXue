<tr><td class="t50">长孙礼传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　瓬弟礼，少以父任为散骑侍郎，与襄城公卢鲁元等内侍。恭敏有才志。太武宠信之，曰：“其父亲近吾祖，子在我左右，不亦宜乎。”<br /><br />

<tr><td class="t50">韦阆传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　韦阆，字友观，京兆杜陵人也。世为三辅冠族。祖楷，晋长乐清河二郡太守。父逵，慕容垂大长秋卿。阆少有器望，遇慕容氏政乱，避地蓟城。太武初，征拜咸阳太守，转武都太守。卒郡。<br /><br />
　　子范，试守华山郡，赐爵高平男。卒。<br /><br />

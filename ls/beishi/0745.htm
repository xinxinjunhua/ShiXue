<tr><td class="t50">暴显传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　暴显，字思祖，魏郡斥丘人也。祖喟，仕魏，为朔州刺史，因家焉。父诞，恒州刺史、乐安公。显幼时，见一沙门指之曰：“此郎子好相表，大必为良将，贵极人臣。”语终失之。显善骑射，曾从魏孝庄猎，一日中，手获禽兽七十三。后从齐神武起义信都，累迁北徐州刺史，封屯留公。天保中，以赃货解州，大理禁止。处判未讫，为合肥被围，遣显与步大汗萨等攻梁北徐州，禽其刺史王强。天统中，累迁，位特进，封定阳王，卒。<br /><br />
</td></tr>

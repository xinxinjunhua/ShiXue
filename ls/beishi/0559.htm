<tr><td class="t50">韩麒麟等传论</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　论曰：韩麒麟由才器识用，遂见纪于齐士。显宗以文学自立，而时务屡陈；至于实录之功，未之闻也。子熙清尚自守，荣过其器。程骏才业见知，盖当时之长策。李彪生自微族，见擢明世，輶轩骤指，声骇江南，执笔立言，遂为良史。逮于直绳在手，厉气明目，持坚无术，末路蹉跎。行百里者半于九十，彪之谓也。高道悦謇直之风，见惮于世，丑正贻祸，有可悲乎！甄琛以学尚刀笔，早树声名；受遇三朝，终至崇重。高聪才尚见知，名位显著。而异轨同奔，咸经于危覆之辙，惜乎！<br /><br />
</td></tr>

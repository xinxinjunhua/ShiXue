<tr><td class="t50">皇甫遐传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　皇甫遐，字永贤，河东汾阴人也。累世寒微，而乡里称其和睦。遐性纯至，少丧父，事母以孝闻。后遭母丧，乃庐于墓侧，负土为坟。复于墓南作一禅窟，阴雨则穿窟，晴霁则营墓。晓夕勤力，未尝暂停。积以岁年，坟高数丈，周回五十余步，禅窟重台两匝，总成十有二室，中间行道，可容百人。遐食粥枕塊，栉风沐雨，形容枯悴，家人不识。当其营墓之初，乃有鸱鸟各一，徘徊悲鸣，不离墓侧，若助遐者，经月余日乃去。远近闻其至孝，竞以米面遗之，遐皆受而不食，悉以营佛斋焉。郡县表上其状，有诏旌异之。<br /><br />

<tr><td class="t50">马子结传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　马子结者，其先扶风人，世仕凉土，魏太和中入洛。父祖俱清官。子结及兄子廉、子尚三人，皆涉文学。阳休之牧西兗，子廉、子尚、子结与诸朝士各有赠诗。阳总为一篇酬答。诗云：“三马皆白眉”者也。子结为南阳王绰管记，随绰定州。绰每出游猎，必令子结走马从禽。子结既儒缓，衣垂帽落，或叫或啼，令骑驱之，非坠马不止。绰以为笑。由是渐见亲狎，启为谘议焉。<br /><br />
</td></tr>

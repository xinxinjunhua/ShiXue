<tr><td class="t50">郭琰传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　郭琰，字神宝，京槃人也。少丧父，事母以孝闻。孝武帝之居籓邸，琰以通侠被知。及即位，封新丰县公，除洛州刺史。孝武西入，改封冯翊郡公，授行台尚书、潼关大都督。大统中，齐神武遣大都督窦泰袭恒农。时琰为行台，众少战败，乃奔洛州。至刺史泉仙城守力穷，城将陷，乃仰天哭曰：“天乎！天乎！何由纵此长蛇，而不助顺也？”言发涕流，不能自止。兵士见之，咸自厉愤。竟为东魏将高敖曹所禽。复谓敖曹曰：“天子之臣，乃为贼所执。”敖曹素闻其名，义不杀之，送于并州。见齐神武，言色不屈，见害。<br /><br />

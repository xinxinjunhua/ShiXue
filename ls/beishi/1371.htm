<tr><td class="t50">魏益德传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　魏益德，襄阳人也。有材干，胆勇过人。詧称帝，进位柱国，封上黄县侯。卒，赠司空，谥曰忠壮，进爵为公。岿之五年，以益德配食察庙。<br /><br />

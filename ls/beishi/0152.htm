<tr><td class="t50">燕凤等传论</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　论曰：<br /><br />
　　昭成、道武之时，云雷方始，至于经邦纬俗，文武兼资。燕凤博识多闻，首膺礼命。许谦才术俱美，驱驰艰虞。不然，何以成帝业也。崔宏家世隽伟，仍属权舆，总机任重，守正成务，礼从清庙，固其宜也。浩才艺通博，究览天文，政事筹策，时莫之二。此其所以自比于子房焉。属明元为政之秋，太武经营之日，言听计从，宁廓区夏，遇既深矣，勤亦茂哉。谋虽盖世，威未震主，末途邂逅，遂不自全。岂鸟尽弓藏，人恶其上，将器盈必概，阴害贻祸，何斯人而遭斯酷乎？至若张衮才策，不免其戾，彦海贞白，祸非其罪，亦足痛云。洪让世著循吏，家风良可贵矣。<br /><br />

<tr><td class="t50">尉庆宾传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　多侯弟子庆宾，善骑射，有将略，稍迁太中大夫。明帝时，朝议送蠕蠕主阿那瑰还国。庆宾上表固争，不从。后蠕蠕遂执行台元孚。庆宾后拜肆州刺史。时尔朱荣兵威渐盛，曾经肆州，庆宾恶之，据城不纳。荣袭之，拘还秀容，呼为假父。后以忧还都。寻起为光禄大夫、都督，镇汝阴。还朝，卒，赠司空。子瑾。<br /><br />
</td></tr>

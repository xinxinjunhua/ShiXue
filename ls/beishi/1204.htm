<tr><td class="t50">石文德传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　石文德，中山蒲阴人也。有行义。真君初，县令黄宣在任丧亡。宣单贫，无期亲。文德祖父苗以家财殡葬，持服三年。奉养宣妻二十余载，及亡，又衰缞敛祔，率礼无阙。自苗逮文德，刺史守令卒官者，制服送之。五世同居，闺门雍睦。<br /><br />
　　又梁州上言，天水白石县人赵令安、孟兰强等四世同居，行著州里。诏并标榜门闾。<br /><br />

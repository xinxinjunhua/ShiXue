<tr><td class="t50">刘旷传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘旷，不知何许人也，性谨厚，每以诚恕应物。开皇初，为平乡令，单骑之官。人有诤讼者，辄丁宁晓以义理，不加绳劾，各自引咎而去。所得俸禄，赈施穷乏。百姓感其德化，更相笃励曰：“有君如此，何得为非？”在职七年，风教大洽。狱中无系囚，诤讼绝息，囹圄皆生草，庭可张罗。及去官，吏人无少长号泣，沿路将送，数百里不绝。迁为临颍令，清名善政为天下第一。尚书左仆射高颎言状，上召之。及引见，劳之曰：“天下县令固多矣，卿能独异于众，良足美也。”顾谓侍臣曰：“若不殊奖，何以劝人？”于是下优诏，擢拜莒州刺史。<br /><br />

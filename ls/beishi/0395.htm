<tr><td class="t50">崔鉴传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　崔鉴，字神具，博陵安平人也。六世祖赞，魏尚书仆射。五世祖洪，晋吏部尚书。曾祖懿，字世茂，仕燕，位秘书监。祖遭，字景遇，位钜鹿令。父绰，少孤，学行修明，有名于世。与范阳卢玄、勃海高允、赵郡李灵等俱被征，寻以母老固辞。后为郡功曹，卒。<br /><br />
　　鉴颇有文学，自中书博士转侍郎，赐爵桐庐县子。出为东徐州刺史。鉴欲安新附，人有年老者，表求假以守令，诏从之。又于州内铜冶为农具，兵人获利。卒，赠青州刺史、安平侯，谥曰康。<br /><br />
　　※<br /><br />
　　子合，字贵和，少有时誉，袭爵桐庐子，位终常山太守。<br /><br />

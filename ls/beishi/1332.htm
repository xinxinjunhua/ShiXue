<tr><td class="t50">孙小传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　孙小，字茂翘，咸阳石安人也。父瓚，姚泓安定护军，为赫连屈丐所杀，小没入宫刑。会魏平统万，遂徙平城。内侍东宫，以聪识有智略称。未几，转四台中散。太武幸瓜步，虑有北寇之虞，赐爵泥阳子，除留台将军。车驾还都，乃请父瓚赠谥，求更改葬。诏赠秦州刺史、石安县子，谥曰戴。小后拜并州刺史，进爵中都侯。州内四郡百余人，诣阙颂其政化。后迁冀州刺史，声称微少于前。然所在清约，当时牧伯，无能及也。性颇忍酷，所养子息，驱逐鞭挞，视如仇雠。小之为并州，以郭祚为主簿。重祚文才，兼任以书记，时人多之。<br /><br />
</td></tr>

<tr><td class="t50">韦缵传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　珍长子缵，字遵彦。年十三，补中书学生。聪敏明辩，为博士李彪所称。再迁侍御中散。孝文每与德学沙门谈论往复，缵掌缀录，无所遗漏，颇见知赏。累迁长兼尚书左丞。寿春内附，尚书令王肃出镇扬州，请缵行，为州长史。加平远将军，带梁郡太守。肃薨，敕缵行州事。任城王澄代肃为州，复启缵为长史。澄出征之后，梁将姜庆真乘虚攻袭，遂据外郭。虽寻克复，缵坐免官。卒。<br /><br />
</td></tr>

<tr><td class="t50">袁敞传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　袁敞，陈郡人。祖昂，司空。父士俊，安成内史。敞少有识量，博涉文史。以吏部郎使诣周。时主者以敞班在陈使之后，敞固不从命曰：“昔陈之祖父，乃梁诸侯下吏，盗有江东。今周朝宗万国，招携以礼。若使梁之行人在陈之后，便恐彝伦失序。岂使臣之所望焉。”主者不能屈，遂以状奏。周武帝善之，乃诏敞与陈使异日而进。使还，以称旨，迁侍中。转左户尚书。从琮入隋，授开府仪同三司。终于谯州刺史。<br /><br />
</td></tr>

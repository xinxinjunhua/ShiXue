<tr><td class="t50">庾自直传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　庾自直，颍川人。父持，《南史》有传。少好学，沈静寡欲。仕陈，历豫章王府外兵参军、记室。陈亡入关，不得调。晋王广闻之，引为学士。大业初，授著作佐郎。自直解属文，于五言诗尤善。性恭慎，不妄交游。特为帝所爱，有篇章必先示自直，令其诋诃。自直所难，帝辄改之。或至于再三，俟其称善，然后方出。其见亲礼如此。后以本官知起居舍人事。化及作逆，与之北上，自载露车中，感激发病卒。有文集十卷，行于世。<br /><br />
</td></tr>

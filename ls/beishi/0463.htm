<tr><td class="t50">宗钦传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　宗钦字景若，金城人。少好学，有儒者风。仕沮渠蒙逊为中书郎、世子洗马。上《东宫侍臣箴》。太武平凉州，入魏，赐爵卧树男，拜著作郎。与高允书，赠诗，允答书并诗，甚相褒美。在河西撰《蒙逊记》十卷，无足可称。<br /><br />

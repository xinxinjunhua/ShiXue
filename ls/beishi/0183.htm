<tr><td class="t50">于宣道传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　宣道字元明，性谨密，不交非类。仕周，以父功，赐爵城安县男，位小承御上士。隋文帝为丞相，引为外兵曹。及践阼，迁内史舍人，进爵为子。父忧，水浆不入口者累日。岁余，起令视事。免丧，拜车骑将军，兼右卫长史，舍人如故。后迁太子左卫副率，进位上仪同。卒。<br /><br />
　　子志宁，早知名。出继叔父宣敏。<br /><br />

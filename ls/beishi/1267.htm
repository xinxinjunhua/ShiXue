<tr><td class="t50">崔廓传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　崔廓，字士玄，博陵安平人也。父子元，齐燕州司马。廓少孤贫，母贱，由是不为邦族所齿。初为里佐，屡逢屈辱，于是感激，逃入山中。遂博览书籍，多所通涉，山东学者皆宗之。既还乡，不应辟命。与赵郡李士谦为忘言友，时称崔、李。士谦死，廓哭之恸，为之作传，输之秘府。士谦妻卢氏寡居，每家事，辄令人谘廓取定。廓尝著论言刑名之理，其义甚精，文多不载。隋大业中，终于家。<br /><br />
</td></tr>

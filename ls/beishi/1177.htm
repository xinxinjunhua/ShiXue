<tr><td class="t50">长孙虑传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　长孙虑，代人也。母因饮酒，其父真呵叱之，误以杖击，便即致死。真为县囚执，处以重坐。虑列辞尚书云：“父母忿争，本无余恶，直以谬误，一朝横祸。今母丧未殡，父命旦夕，虑兄弟五人并冲幼。虑身居长，今年十五，有一女弟，向始四岁。更相鞠养，不能保全，父若就刑，交坠沟壑。乞以身代老父命，使婴弱众孤，得蒙存立。”尚书奏云：“虑于父为孝子，于弟为仁兄，寻情究状，特可矜感。”孝文帝诏特恕其父死罪，以从远流。<br /><br />

<tr><td class="t50">李公绪传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李彻弟公绪，字穆叔，性聪敏，博通经传。魏末为冀州司马，属疾去官，绝迹赞皇山。齐天保初，以侍御史征，不就。公绪沈冥乐道，又不闲时务，故誓心不仕。尤明天文，善图纬之学，尝谓子弟曰：“吾观齐之分野，福德不多，国家祚终四七。”及齐亡岁，距天保之元二十八年矣。公绪雅好著书，撰《典言》十卷、《礼质疑》五卷、《丧服章句》一卷、《古今略记》二十卷、《玄子》五卷、《赵记》八卷、《赵语》十二卷，并行于世。公绪既善阴阳之术，有秘记，传之子孙而不好焉，临终取以投火。子少通，有学行。<br /><br />
</td></tr>

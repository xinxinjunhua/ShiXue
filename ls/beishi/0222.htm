<tr><td class="t50">崔逞等传论</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　论曰：崔逞文学器识，当年之俊，忽微虑远，俱以为灾。休立身有本，当官著称。长儒才望之美，祸因骄物，虽有周公之才，犹且为累。况未足谕其高下，能无及乎？赡词韵温雅，风神秀发，固人望也。王宪名公之孙，老见优异。元景昆季履道，标映人伦，美哉！封回克光家世，隆之勤劳霸业，子绘实隆堂构，可谓载德者矣。君义聚敛啬吝，无乃鄙哉！<br /><br />

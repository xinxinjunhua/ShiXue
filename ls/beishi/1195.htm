<tr><td class="t50">纽因传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　纽因，字孝政，河东安邑人也。性至孝。周武成中，父母丧，庐于墓侧，负土成坟。庐前生麻一株，高丈许，围之合拱，枝叶郁茂，冬夏恒青。有鸟栖上，因举声哭，鸟即悲鸣。时人异之。周武帝表其闾，擢授甘棠令。隋开皇初卒。<br /><br />
　　子士雄，少质直孝友。丧父，复庐于墓侧，负土成坟。其庭前有一槐树，先甚郁茂，及士雄居丧，树遂枯死。服阕还宅，死槐复荣。隋文帝闻之，叹其父子至孝，下诏褒扬，号其居为累德里。<br /><br />
</td></tr>

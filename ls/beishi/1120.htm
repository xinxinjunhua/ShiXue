<tr><td class="t50">鲍季详传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　鲍季详，勃海人也。甚明《礼》，兼通《左氏春秋》。少时，恒为李宝鼎都讲。后亦自有徒众，诸儒称之。仕齐，卒于太学博士。<br /><br />
　　从弟长暄，兼通《礼》、《传》。为任城王湝丞相掾。恒在都教授贵游子弟。齐亡，卒于家。<br /><br />
</td></tr>

<tr><td class="t50">宇文忠之传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　宇文忠之，河南洛阳人也。其先南单于之远属，世据东部，后居代都。父侃，卒于书侍御史。忠之涉猎文史，颇有笔札，释褐太学博士。天平初，除中书侍郎。裴伯茂与之同省，常侮忽之，以忠之色黑，呼为“黑宇”。后敕修国史。元象初，兼通直散骑常侍，副郑伯猷，使梁。武定初，为尚书右丞，仍修史。未几，以事除名。忠之好荣利。自为中书郎六七年矣，遇尚书省选右丞，预选者皆射策，忠之试焉。既获丞职，大为忻满，志气嚣然，有骄物之色。识者笑之。既失官爵，怏怏发疾，卒于君山。<br /><br />

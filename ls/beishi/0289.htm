<tr><td class="t50">张蒲传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张蒲，字玄则，河内修武人也。本名谟。父攀，仕慕容垂，位兵部尚书，以清方称。蒲少有父风，仕慕容宝为尚书左丞。道武定中山，宝官司叙用，多降品秩。帝既素闻蒲名，仍拜尚书左丞。明元即位，为内都大官，赐爵泰昌子。参决庶狱，私谒不行。后改为寿张子。太武即位，以蒲清贫，妻子衣食不给，乃以为相州刺史。扶弱抑强，进善黜恶，风化大行。卒于官，吏人痛惜之。蒲在谋臣之列，屡出为将，朝廷论之，常以为称首。赠平东将军、广平公，谥曰文恭。子昭袭。以军功进爵修武侯，位幽州刺史，以善政见称。<br /><br />

<tr><td class="t50">李法行传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李搔妹曰法行，幼好道，截指自誓不嫁，遂为尼。所居去邺三百里，往来恒步，在路或不得食，饮水而已。逢屠牵牛，脱衣求赎，泣而随之。雉兔驯狎，入其山居房室。齐亡后，遭时大检，施糜粥于路。异母弟宗侃与族人孝衡争地相毁，尼曰：“我有地，二家欲得者，任来取之，何为轻致忿讼？”宗侃等惭，遂让为闲田。<br /><br />

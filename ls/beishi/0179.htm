<tr><td class="t50">于顗传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　顗字元武，身长八尺，美须眉。周大冢宰宇文护见而器之，以女妻之。以父勋，赐爵新野郡公。历左右宫伯、郢州刺史。大象中，以水军总管从韦孝宽经略淮南。尉迟迥之反，时总管赵文表与顗素不协，顗将图之，因卧阁内，诈疾。文表独至，顗杀之。因言文表与迥通谋，其麾下无敢动者。时隋文帝以迥未平，虑顗复生边患，因宥免之，即拜吴州总管。以频败陈师，赐采数百段。及隋受禅，文表弟诣阙称兄无罪。上令按其事，太傅窦炽等议顗当死。上以其门著勋绩，特原之，贬为开府。后袭爵燕国公。寻拜泽州刺史。免，卒于家。<br /><br />
　　子世虔。<br /><br />
　　顗弟仲文。<br /><br />

<tr><td class="t50">王肃等传论</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　论曰：古人云：才未半古，功已过之。王肃流寓之士，见知一面，荣任赫然，寄同旧列，虽器业自致，抑亦逢时之所致焉。刘芳矫然特立，沈深好古，博通洽识，为世儒宗。懋才流识学，见重于世，不虚然也。常爽以儒素著称，景以文义见宗，美乎。<br /><br />
</td></tr>

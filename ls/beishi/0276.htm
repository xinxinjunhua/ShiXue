<tr><td class="t50">韦俊传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　范子俊，字颖超，早有学。少孤，事祖母以孝闻。性温和廉让，为州里所称。太和中，袭爵。历位都水使者。宣武崩，领军于忠矫擅威刑，俊与左仆射郭祚昏嫁，故亦同时遇害。临终，诉枉于尚书元钦，钦知而不敢申理。俊叹曰：“吾一生为善，未蒙善报；常不为恶，今为恶终，悠悠苍天，抱直无诉！”时人咸怨伤焉。熙平元年，追赠洛州刺史，谥曰贞。子子粲。<br /><br />
</td></tr>

<tr><td class="t50">索敞传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　索敞，字巨振，燉煌人也。为刘延明助教，专心经籍，尽能传延明业。凉州平，入魏，以儒学为中书博士。京师贵游之子，皆敬惮威严，多所成益，前后显达位至尚书、牧、守者数十人，皆受业于敞。敞以丧服散在众篇，遂撰比为《丧服要记》。出补扶风太守，在位清贫，卒官。时旧同学生等为请谥，诏赠凉州刺史，谥曰献。<br /><br />
　　初，敞之在凉州，与乡人阴世隆，文才相友。世隆至京师，被罪，徙和龙，屈上谷，困不前达，土人徐能抑掠为奴。敞因行至上谷，遇见世隆，对泣而别。敞为诉理，得免。世隆子孟贵，性至孝。每向田芸耨，早朝拜父，来亦如之，乡人钦焉。<br /><br />
</td></tr>

<tr><td class="t50">张黎传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张黎，雁门平原人也。善书计，道武知待之。明元器其忠亮，赐爵广平公，管综机要。太武以其功旧，任以辅弼，除大司农卿。军国大议，黎常与焉。以征赫连定功，进号征北大将军。与乐安王范、济南公崔徽镇长安。清约公平，甚著声称，代下之日，家无余财。太武征凉州，蠕蠕吴提乘虚入寇，黎与司空长孙道生拒击走之。景穆初总百揆，黎与崔浩等辅政，忠于奉上，非公事不言。诏赐浩、黎布帛各千疋，以褒旧勋。吴王余立，以黎为太尉。后文成即位，与古弼俱诛。<br /><br />
</td></tr>

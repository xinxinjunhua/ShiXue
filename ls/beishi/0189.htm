<tr><td class="t50">崔彧传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　彧字文若，颐兄祎之孙也。父勋之，字宁国，位大司马、外兵郎，赠通直郎。彧与兄相如俱自宋入魏。相如以才学知名，早卒。<br /><br />
　　彧少逢隐沙门，教以《素问》、《甲乙》，遂善医术。中山王英子略曾病，王显等不能疗。彧针之，抽针即愈，后位冀州别驾。性仁恕，见疹者，喜与疗之。广教门生，令多救疗。其弟子清河赵约、勃海郝文法之徒，咸亦有名。<br /><br />
　　彧子景哲，豪率，亦以医术知名。仕魏，太中大夫、司徒长史。<br /><br />

<tr><td class="t50">王宝兴传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　宝兴少孤，事母至孝。尚书卢遐妻，崔浩女也。初，宝兴母及遐妻俱孕，浩谓曰：“汝等将来所生，皆我之自出，可指腹为亲。”及昏，浩为撰仪，躬自监视，谓诸客曰：“此家礼事，宜尽其美。”及浩被诛，卢遐后妻宝兴从母也，缘坐没官。宝兴亦逃避，未几得出。卢遐妻时官赐度斤镇高车滑骨，宝兴尽卖货产，自出塞赎之以归。州辟中从事、别驾，举秀才，皆不就。闭门不交人事。袭爵封长社侯、龙骧将军。卒，子琼袭爵。<br /><br />
</td></tr>

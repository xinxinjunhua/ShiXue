<tr><td class="t50">燕子献传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　燕子献字季则，广汉下洛人。少时相者谓曰：“使役在胡、代，富贵在齐、赵。”后遇周文于关中创业，用为典签，将命使于蠕蠕。子献欲验相者之言，来归。神武见之大悦。神武旧养韩长鸾姑为女，是为阳翟公主，遂以嫁之，甚被待遇。文宣时，官至侍中。济南即位，委任弥重，除尚书右仆射。子献素多力，头少发，当狼狈之际，排众走出省门，斛律光逐而禽之。子献叹曰：“丈夫为计迟，遂至此！”天统五年，追赠司空。天和事见兄元传。<br /><br />

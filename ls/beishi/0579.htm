<tr><td class="t50">杨异传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　杨俭子异，字文殊。美风仪，有器局。髫龀就学，日诵千言，见者奇之。九岁丁父忧，哀毁过礼，殆将灭性。及免丧之后，绝庆吊，闭户读书。数年之间，博涉书记。周闵帝时，为宁都郡太守，甚有能名，赐爵乐昌县子，后数以军功进爵为侯。隋文帝作相，行济州事。及践阼，拜宗正少卿，加上开府。蜀王秀之镇益州也，朝廷盛选纲纪，以异方直，拜益州总管长史，寻迁西南道行台兵部尚书。后历宗正卿、刑部尚书，出为吴州总管，甚有能名。时晋王广镇扬州，诏令异每岁一与王相见，评论得失，规谏疑阙。卒于官。<br /><br />
　　子虔逊。<br /><br />

<tr><td class="t50">杜松赟传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　杜松赟，北海人也。性刚烈，重名义。为石门府队正。大业末，杨厚来攻北海县，松赟觇贼被执。使谓城中，云“郡兵已破，宜早归降”，松赟伪许之。既至城下，大呼曰：“我邂逅被执，非力屈也。官军大来，贼旦暮禽翦。”贼以刀筑其口，引之去。松赟骂厚曰：“老贼何敢辱贤良！”言未卒，贼断其腰。城中望之，莫不流涕扼腕，锐气益倍，北海卒完。优赠朝请大夫、本郡通守。<br /><br />
</td></tr>

<tr><td class="t50">宋隐等传论</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　论曰：宋隐操行贞白，遗略荣名；宣、愔并保退素，咸见征辟，可谓德门者矣。义和以才度见知，迹参顾命，拔萃出类，当有以哉！无子之叹，岂徒羊舌！宗祀不亡，盖其幸也。翻刚鲠自立，猛而断务。世良昆季，雅有家风。道谟卜筮取达，季良累于学浅。刁雍才识恢远，著声立事，礼遇优隆，世有人爵，堂构之义也。辛、韦不殒门风。杜铨所在为重。正玄难兄难弟，信为美哉！<br /><br />
</td></tr>

<tr><td class="t50">梁椿传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　梁椿，字千年，代人也。初从尔朱荣入洛，又从贺拔岳讨平万俟丑奴，仍从周文平侯草陈悦。大统中，累以战功封东平郡公，位开府仪同三司。周孝闵帝践祚，除华州刺史，改封清陵郡公。保定元年，拜大将军，卒于位。赠都督、恒州刺史，谥曰烈。椿性果毅，善于抚纳，所获赏物，分赐麾下，故每践敌场，咸得其死力。雅好俭素，不营赀产，时论以此称焉。<br /><br />
　　子明，以椿功赐爵丰阳县公。后袭椿爵，旧封回授弟朗。<br /><br />

<tr><td class="t50">薛湖传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　薛洪隆弟湖，字破胡。少有节操，笃志于学；专精讲习，不干时务；与物无竞，好以德义服人。或有兄弟忿阋，邻里争讼者，恐湖闻之，皆内自改悔。乡闾化其风教，咸以敬让为先。三召州都，再辟主簿，州将倾心致礼，并不获己而应之。为本州中从事、别驾、除河东太守。兄弟并为本郡，当世荣之。复受诏为仇池都将。后罢郡，终于家。有八子，长子聪知名。<br /><br />
</td></tr>

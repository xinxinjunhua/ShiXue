<tr><td class="t50">段进传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　段进，不知何许人也。太武初，为白道守将。蠕蠕大檀入塞，围之，力屈被执。进抗声大骂，遂为贼杀。帝愍之，追赠安北将军，赐爵显美侯，谥曰庄。<br /><br />

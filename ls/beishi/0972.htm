<tr><td class="t50">皇甫璠传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　皇甫璠，字景瑜，安定三水人也。世为西州著姓，后徙居京兆。父和，本州中从事。大统末，追赠散骑常侍、仪同三司、泾州刺史。璠少忠谨，有干略，永安中，辟州都督。周文帝为牧，补主簿，以勤事被知。大统四年，引为丞相府行参军。周孝闵帝践祚，为守庙下大夫、长乐县子。保定中，为鸿州刺史，入为小纳言。累迁蕃部中大夫，进骠骑大将军、开府仪同三司。璠性平和，小心奉法，安贞守志，恒以清白自处，当时称为善人。建德三年，为随州刺史，政存简惠，百姓安之，卒官，赠交、渭二州刺史，谥曰恭。<br /><br />
　　子谅，少知名。大象中，位吏部下大夫。谅弟诞。<br /><br />

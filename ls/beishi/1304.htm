<tr><td class="t50">临孝恭传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　临孝恭，京兆人也。明天文、算术，隋文帝甚亲遇之。每言灾祥之事，未尝不中。上因令考定阴阳书，官至上仪同。著《欹器图》三卷，《地动铜仪经》一卷，《九宫五墓》一卷，《遁甲录》十卷，《元辰经》十卷，《元辰厄》百九卷，《百怪书》十八卷，《禄命书》二十卷，《九宫龟经》一百一十卷，《太一式经》三十卷，《孔子马头易卜书》一卷，并行于世。<br /><br />
</td></tr>

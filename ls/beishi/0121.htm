<tr><td class="t50">安原传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　屈弟原，雅性矜严，沈勇多智略。明元时，为猎郎，出监云中军事。时赫连屈丐犯河西，原以数十骑击之，杀十余人。帝以原轻敌，违节度，加罪。然知原骁勇，遂任以为将，镇云中。蠕蠕犯塞，原辄破之，以功赐爵武原侯，加鲁兵将军。<br /><br />
　　太武即位，拜驾部尚书。车驾征蠕蠕大檀，分为五道。迁尚书左仆射，进爵河间公。原在朝无所比周，然恃宠骄恣，多所排抑。为子求襄城公卢鲁元女，鲁元不许。原告其罪状，事相连逮，历时不决。原惧不胜，遂谋逆，事泄，伏诛。原兄弟外节俭而内实积聚，及诛后，籍其财至数万。<br /><br />
</td></tr>

<tr><td class="t50">杨庆传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　杨庆，字伯悦，河间人也。祖玄、父刚，并以至孝知名。庆美容止，性辩慧。年十六，齐国子博士徐遵明见而异之。及长，颇涉书记。年二十五，郡察孝廉，以侍养不赴。母有疾，不解襟带者七旬。及居母忧，哀毁骨立，负土成坟。齐文宣表其门闾，赐帛及绵粟各有差。隋文帝受禅，屡加褒赏，擢授仪同三司，板平阳太守。卒于家。<br /><br />
</td></tr>

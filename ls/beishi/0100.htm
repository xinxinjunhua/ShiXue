<tr><td class="t50">尉多侯传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　多侯少有武干。献文时，假节、领护羌戎校尉、敦煌镇将。至，求轻骑五千，西入于阗，兼平诸国，因敌取资，平定为效。弗许。孝文初，又求北取伊吾，断蠕蠕通西域路。帝善其计，以东作方兴，难之。为妻元氏所害。<br /><br />
</td></tr>

<tr><td class="t50">萧该传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　萧该，兰陵人。梁鄱阳王恢之孙，少封攸侯。荆州平，与何妥同至长安。性笃学，《诗》、《书》、《春秋》、《礼记》并通大义，尤精《汉书》，甚为贵游所礼。开皇初，赐爵山阴县公，拜国子博士。奉诏与妥正定经史。然各执所见，递相是非，久而不能就。上谴而罢之。该后撰《汉书》及《文选音义》，咸为当时所贵。<br /><br />
</td></tr>

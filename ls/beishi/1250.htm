<tr><td class="t50">循吏传论</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　论曰：为政之道，宽猛相济，犹寒暑迭代，俱成岁功者也。然存夫简久，必藉宽平，大则致鼓腹之欢，小则有息肩之惠。故《诗》曰：“虽无德与汝，式歌且舞。”张膺等皆有宽仁之心，至诚待物，化行所属，爱结人心，故得所去见思，所居而化。《诗》所谓“恺悌君子，人之父母”，岂徒然哉！<br /><br />

<tr><td class="t50">郭文恭传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　郭文恭，太原平遥人也。仕为太平县令。年逾七十，父母丧亡。文恭孝慕罔极，乃居祖父墓次，晨夕拜跪。跣足负土，培祖父二墓，寒暑竭力，积年不已。见者莫不哀叹。尚书闻奏，标其门闾。<br /><br />
</td></tr>

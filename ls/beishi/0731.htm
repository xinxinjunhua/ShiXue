<tr><td class="t50">斛律羌举传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　斛律羌举，太安人也。世为部落酋长。羌举少骁果，从尔朱兆。兆破，乃归诚神武。神武以其忠于所事，亦加嗟赏。天平中，除大都督。后从神武战于沙苑，时议进趣计，羌举曰：“黑獭若欲固守，无粮援可恃。今揣其情，欲一死决，有同狾犬，或能噬人。且渭曲土泞，无所用力。若不与战，径趣咸阳，咸阳空虚，可不战而克。拔其根本，则黑獭之首，可悬军门。”神武欲纵火焚之，侯景曰：“当禽以示百姓，烧杀谁复信之？”诸将议既有异同，遂战于渭曲，大军败绩。后封密县侯，为东夏州刺史。有疫疾，刺胸，竹筒吮之，垂愈。因怒，创裂而卒。赠仪同三司。子孝卿嗣。<br /><br />

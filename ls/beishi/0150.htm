<tr><td class="t50">张苌年传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　代子苌年，为汝南太守。郡人刘崇之兄弟分析，家贫，唯一牛，争不能决，讼于郡庭。苌年凄而见之，谓曰：“汝曹当以一牛，故致此竞；脱有二牛，必不争。”乃以己牛一头赐之。于是境中各相戒约，咸敦敬让。卒于郡。<br /><br />
　　子琛，字宝贵，少有孝行，位至太子翊军校尉。卒。<br /><br />

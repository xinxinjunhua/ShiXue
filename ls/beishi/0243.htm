<tr><td class="t50">吕洛拔传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　吕洛拔，代人也。曾祖渴侯，昭成时率户五千归魏。父匹知，太武时为西部长，封荣阳公。洛拔以壮勇知名。文成末，为平原镇都将。随尉元攻宋将张永，大败之，赐爵成武侯。卒。<br /><br />
　　长子文祖，献文以其勋臣子，补龙牧曹奏事中散。以牧产不滋，坐徙武川镇。后文祖以旧语译注皇诰，辞义通辩，为外都曹奏事中散。后坐事伏法。<br /><br />
</td></tr>

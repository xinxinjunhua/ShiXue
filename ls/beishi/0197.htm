<tr><td class="t50">崔叔义传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　叔仁弟叔义，魏孝庄时为尚书库部郎。初，叔义父休为青州刺史，放盗魁，令出其党，遂以为门客。在洛阳，与兄叔仁铸钱。事发，合家逃逸，叔义见执。时城阳王徽为司州牧，临淮王彧以非其身罪，骤为致言。徽以求婚不得，遂停赦书而杀之。<br /><br />
</td></tr>

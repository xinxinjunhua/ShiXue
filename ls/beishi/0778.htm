<tr><td class="t50">张纂传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张纂，字徽纂，代郡平城人也。初事尔朱荣，又为尔朱兆长史，使于神武，遂被顾识。及相州城拔，参丞相军事，封武安县伯。累迁神武行台右丞。从征玉壁，大军将还山东，至晋州忽遇寒雨，士卒饥冻有死者。州以边禁，不听入城。时纂为别使，遇见，辄令开门内之，分寄人家，给其火食，多所全济。神武闻而善之。纂性便僻，事神武二十余岁，通传教令，甚见亲赏。文宣时，卒于护军将军。<br /><br />
</td></tr>

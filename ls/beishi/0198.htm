<tr><td class="t50">崔子侃传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　叔义弟子侃，以寄名从军窃级为中书郎。为尚书左丞和子岳弹纠，失官。性兼使气。从自修改，闭门读书，当时称为博洽。后兼通直散骑常侍，使梁，为阳斐副。耻居斐下，自负才地，呼斐为阳子，语辄折之。还，卒于路。<br /><br />
　　子拯，位太子仆、武德郡守。<br /><br />
　　子侃弟子植，位冀州别驾。走马从禽，发挂木而死。子珪。<br /><br />
　　子植弟子聿，位东莞太守。<br /><br />

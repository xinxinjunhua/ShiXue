<tr><td class="t50">王操传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王操，字子高，其先太原晋阳人，詧母龚氏之外弟也。性敦厚，有筹略。初为詧外兵参军，亲任亚于蔡大宝。及詧称帝，历五兵尚书、郢州刺史，进位柱国，封新康县侯。岿嗣位，授镇右将军、尚书仆射。及吴明彻为寇，岿出顿纪南，操抚循将士，莫不用命。明彻既退，江陵获全，操之力也。迁侍中、中卫将军、尚书令、开府仪同三司，领荆州刺史。操既位居朝右，每自挹损，深得当时之誉。卒，岿举哀于朝堂，流涕曰：“天不使吾平荡江表，何夺吾贤相之速也！”及葬，亲祖于瓦官门。赠司空，进爵为公，谥曰康节。<br /><br />
　　有七子，次子衡最知名。有才学，位中书、黄门侍郎。<br /><br />

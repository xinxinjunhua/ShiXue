<tr><td class="t50">马元熙传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　元熙字长明，少传父业，兼长文藻。以通直待诏文林馆。武平中，皇太子将讲《孝经》，有司请择师。帝曰：“马元熙，朕师之子，文学不恶。”于是以《孝经》入授皇太子。儒者荣其世载。性和厚，在内甚得名誉。隋开皇中，卒于秦王文学。<br /><br />
</td></tr>

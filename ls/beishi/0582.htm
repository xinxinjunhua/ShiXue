<tr><td class="t50">杨纪传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　杨纪字温范，少刚正，有器局。在周，袭爵华山郡公。累迁安州总管长史，将兵迎陈降将王瑗于齐安，与陈将周法尚遇，击走之，以功进开府。入为虞部下大夫。文帝为丞相，改封汾阴县公。从梁睿讨王谦，以功进授上大将军。历资州刺史、宗正少卿，坐事除名。后寻复其爵位，拜熊州刺史，改封上明郡公。除宗正卿，兼给事黄门侍郎，判礼部尚书事。迁荆州总管。卒，谥曰恭。<br /><br />
</td></tr>

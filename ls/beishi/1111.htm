<tr><td class="t50">刘万寿传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘灵晖子万寿，字仙期，一字遐年。聪识机警，博涉经史，善属文，美谭笑。在齐，仕为阳休之开府行参军。及隋文帝受禅，滕穆王引为文学。坐衣冠不整，配防江南。行军总管宇文述，召典军书。万寿本自书生，从容文雅，一旦从军，郁郁不得志。为五言诗赠京邑知友。诗至京，盛为当时吟诵，天下好事者，多书壁上而玩之。后归乡里，十余年不得调。仁寿初，拜豫章王长史，非其好也。王转封于齐，即为齐王文学。当时，诸王官属，多被夷灭，由是弥不自安，因谢病免。久之，授大理司直，卒于官。有集十卷，行于世。<br /><br />
</td></tr>

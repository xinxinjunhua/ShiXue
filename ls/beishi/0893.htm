<tr><td class="t50">辛威传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　辛威，陇西人也。少慷慨有志略。初从贺拔岳征伐有功，假辅国将军、都督。及周文统岳众，见威奇之，引为帐内，封白土县伯，后进爵为公。累迁开府仪同三司，赐姓普屯氏。出为鄜州刺史。威时望既重，朝廷以桑梓荣之，迁河州刺史、本州大中正。频领二镇，颇得人和。周孝闵帝践祚，拜大将军，进爵枹罕郡公。宣政元年，进位上柱国。大象二年，进封宿国公，复为少傅。薨。威性持重，有威严。历官数十年，未尝有过，故得以身名终。兼其家有义，五世同居，时以此称之。<br /><br />
　　子永达嗣。位仪同大将军。<br /><br />

<tr><td class="t50">石曜传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　石曜字白曜，中山安善人。亦以儒学进，居官清俭。武平中，为黎阳郡守。时丞相咸阳王世子斛律武都出为兗州刺史，性贪暴。先过卫县，令丞以下，敛绢数千疋遗之。至黎阳，令左右讽动曜及县官。曜手持一绢谓武都曰：“此是老石机杼，聊以奉赠。自此以外，并须出于吏人。吏人之物，一毫不敢辄犯。”武都亦知曜清素纯儒，笑而不责。曜著《石子》十卷，言甚浅俗。位终谯州刺史。<br /><br />
</td></tr>

<tr><td class="t50">于劲传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　果弟劲。劲字钟葵，颇有武略，位沃野镇将，赐爵富昌子。宣武纳其女为后，封劲太原郡公，妻刘氏为章武郡君。后为征北将军、定州刺史。卒，赠司空，谥曰恭庄公。自栗磾至劲，累世贵盛，一皇后，四赠公，三领军，二尚书令，三开国公。劲虽以后父，但以顺后早崩，竟不居公辅。<br /><br />
　　子晖，字宣明，后母弟也。少有气干。袭爵，位汾州刺史。晖善事人，为尔朱荣所亲，以女妻其子长儒。历侍中、河南尹。后兼尚书仆射、东南道行台，与齐神武讨平羊侃于兗州。元颢入洛，害之。<br /><br />
</td></tr>

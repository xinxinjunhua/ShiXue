<tr><td class="t50">褚该传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　褚该，字孝通，河南阳翟人也。父义昌，梁鄱阳王中记室。该幼而谨厚，尤善医术。仕梁，历武陵王府参军，随府西上，后与萧捴同归周。自许奭死后，该稍为时人所重，宾客迎候，亚于姚僧垣。天和初，位县伯下大夫，进授车骑大将军、仪同三司。该性淹和，不自矜尚，但有请之者，皆为尽其艺术。时论称其长者。后以疾卒。子则，亦传其家业。<br /><br />

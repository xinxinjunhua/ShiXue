<tr><td class="t50">王怀传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王怀，字怀周，不知何许人也。少好弓马，颇有气尚。随齐神武于冀州起兵，讨破尔朱兆于广阿，又从破四胡何于韩陵，以功封卢乡县侯。天平中，为都督、广州刺史。后从神武袭克西夏州。还，为大都督，镇下馆。除车骑大将军、仪同三司。卒，赠司徒公、尚书仆射。<br /><br />
　　怀以武艺勋诚，为神武所知。志力未申，论者惜其不遂。皇建初，配飨神武庙庭。<br /><br />

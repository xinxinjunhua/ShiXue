<tr><td class="t50">柳旦传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　弘弟旦，字匡德。工骑射，颇涉书籍。仕周，位兵部下大夫。以行军长史从梁睿讨王谦，以功授仪同三司。开皇元年，加开府，封新城县男，授掌设骠骑。历罗、淅、鲁三州刺史，并有能名。大业初，拜龙川太守。郡人居山洞，好相攻击。旦为开设学校，大变其风。帝闻，下诏褒美之。征为太常少卿，摄判黄门侍郎事。卒。<br /><br />
　　子燮，官至河内郡掾。<br /><br />

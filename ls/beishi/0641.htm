<tr><td class="t50">潘永基传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　潘永基，字绍业，长乐广宗人也。父灵乾，中书侍郎。永基性通率，轻财好施。为长乐太守。时葛荣攻信都，永基与刺史元孚同心防捍。力穷城陷，荣欲害孚，永基请以身代孚死。永安二年，除颍川太守，迁东徐州刺史。永熙中，为车骑将军、左光禄大夫，寻加卫大将军。复除东徐州刺史，前后在州，为吏人所爱。卒，赠尚书右仆射、司徒公、冀州刺史。<br /><br />
　　子子义、子智。子义学涉有父风，仕随，至尚书右丞。<br /><br />

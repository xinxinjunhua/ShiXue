<tr><td class="t50">孝行传论</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　论曰：塞天地而横四海者，唯孝而已矣。然则孝始爱敬之方，终极哀思之道，厥亦多绪，其心一焉。若上智禀自然之质，中庸有企及之义，及其成名，其美一也。长孙虑等或出公卿之绪，藉礼教之资；或出茆笪之下，非奖劝所得。并因心乘理，不逾礼教，感通所致，贯之神明。乃有负土成坟，致毁灭性，虽乖先王之典制，亦观过而知仁矣。<br /><br />

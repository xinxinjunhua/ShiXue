<tr><td class="t50">陆俟等传论</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　论曰：陆俟以智识见称，珝乃不替风范，雅杖名节，自立功名；其传芳铭典，岂徒然也？丽忠国奉主，郁为梁栋。资忠履义，赴难如归，世载克昌，名不虚得。睿、琇以沈雅显达，何末亦披猖？子彰令终之美，家声孔振。仰及彦师俱以孝为本，出处之誉，并可作范人伦。爽学业有闻，亦人誉也。源贺堂堂，非徒武节、观其翼佐文成，廷抑禅让，殆乎社稷之臣。怀干略兼举，出内驰誉，继迹贤孝，不堕先业。子邕功立夏方，身亡冀野。彪著名齐朝。师、雄官成隋代，美矣。刘尼忠国，岂徒骁猛之用？薛提正议忠谋，见害奸阉，痛乎！<br /><br />
</td></tr>

<tr><td class="t50">封津传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　封津，字丑汉，勃海蓚人也。父令德，娶常宝女。宝伏诛，令德以连坐伏法。津受刑，给事宫掖。累迁奉车都尉、中给事中。灵太后令津侍明帝书，迁常山太守。津少长宫闱，给事左右，善候时情，号为机悟。天平初，除开府仪同三司、怀州刺史。元象初，复为中侍中、大长秋卿，仍开府仪同。薨，赠司徒、冀州刺史，谥曰孝惠。<br /><br />
</td></tr>

<tr><td class="t50">华秋传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　华秋，汲郡临河人也。幼丧父，事母以孝闻。家贫，佣赁为养。其母患疾，秋容貌毁悴，鬓须尽改。母终，遂绝栉沐，发尽秃落。庐于墓侧，负土成坟。有人欲助之者，秋辄拜而止之。隋大业初，调狐皮，郡县大猎。有一兔，逐之，奔入秋庐中，匿秋膝下。猎人至庐所，异而免之。自尔，此兔常宿庐中，驯其左右。郡县嘉其孝感，具以状闻。降使劳问，而表其门闾。后群盗起，常往来庐之左右，咸相诫曰：“勿犯孝子乡。”赖秋全者甚众。<br /><br />
</td></tr>

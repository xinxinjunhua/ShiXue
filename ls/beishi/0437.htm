<tr><td class="t50">李弈传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李式弟弈，字景世，美容貌，有才艺。位都官尚书、安平侯，与兄敷同死。太和初，文明太后追念弈兄弟，及诛訢，存问宪等一二家，岁时赐以布帛。<br /><br />

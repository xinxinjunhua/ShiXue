<tr><td class="t50">厍狄昌传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　厍狄昌，字恃德，神武人也。少便弓马，有膂力。及长，进止闲雅，胆气壮烈，每以将帅自许。从尔朱天光定关中。天光败，又从贺拔岳征讨。及岳被害，昌与诸将议翊戴周文。从平侯莫陈悦，赐爵阴盘县子。后从迎孝武，复潼关，改封长子县子。大统初，累迁开府仪同三司，进爵方城公。六官建，授稍伯中大夫。周孝闵帝践祚，拜大将军。卒。<br /><br />
</td></tr>

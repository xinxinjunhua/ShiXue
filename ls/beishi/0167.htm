<tr><td class="t50">长孙翰传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　翰少有父风。道武时，以善骑射，为猎郎。明元之在外，翰与元磨浑等潜谋奉迎。明元即位，与磨浑等拾遗左右。以功累迁平南将军。率众镇北境，威名甚著。太武即位，封平阳王。蠕蠕大檀之入寇云中，太武亲征之。遣翰与东平公娥清出长川讨大檀。大檀北遁，追击克获而还。迁司徒。从袭赫连昌，破之。翰清正严明，喜抚将士，薨，太武为之流涕，亲临其丧。丧礼依安城王叔孙俊故事。谥曰威，陪葬金陵。<br /><br />
　　子成袭爵，降为公，位南部尚书。卒，陪葬金陵。<br /><br />
　　翰弟陵，位驾部尚书。性宽厚，好学爱士。封吴郡公，赠吴郡王。谥恭，陪葬金陵。<br /><br />
</td></tr>

<tr><td class="t50">崔遹传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　崔逞兄遹，字宁祖，亦有名于时。为慕容垂尚书左丞、范阳昌黎二郡太守。<br /><br />
　　遹曾孙延寿，冀州主簿。轻财好施，甚收乡曲誉。<br /><br />
　　延寿子隆宗，简率友悌，居丧以孝闻。位兰陵、燕二郡太守。仁信待物，检慎至诚，故见重于时。卒，赠齐州刺史，谥曰孝。<br /><br />
　　子敬保，冀州仪同府从事中郎。卒，赠冀州刺史。<br /><br />
　　敬保子子恒，位鲁郡太守，早卒。<br /><br />
　　子恒弟子安、子升，武定中，连元瑾事伏法。<br /><br />

<tr><td class="t50">裴敬宪传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　敬宪字孝虞，少有志行，学博才清，抚训诸弟，专以读诵为业。淡于荣利，风气俊远。郡征功曹不就，诸府辟命，先进其弟，世人欢美之。司州牧、高阳王雍举秀才，射策高第，除太学博士。性和雅，未尝失色于人。工隶草，解音律，五言之作，独擅于时，名声甚重，后进咸共宗慕之。中山将之部，朝贤送于河梁，赋诗言别，皆以敬宪为最。其文不能赡逸，而有清丽之美。少有气病，年三十三卒，人物甚悼之。敬宪世有仁义于乡里，孝昌中，蜀贼陈双炽所过残暴，至敬宪宅，辄相约束，不得焚烧，为物所伏如此。永兴三年，赠中书侍郎，谥曰文。<br /><br />
</td></tr>

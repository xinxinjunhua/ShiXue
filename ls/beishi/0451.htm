<tr><td class="t50">李翥传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李翥，字彦鸿，世居柏仁，弱冠以文章知。仁齐，位东平太守。后待诏文林馆，除通直散骑常侍，聘于梁。晚节颇以贪酒为累。贪无居宅，寄止佛寺中。尝著巾帔，终日对酒，招致宾客，风调详雅。<br /><br />
　　翥从兄子朗，才辞翥之亚，兼有吏能，位中书舍人。<br /><br />

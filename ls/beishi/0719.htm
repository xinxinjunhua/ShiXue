<tr><td class="t50">蔡俊传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　蔡俊，广宁石门人也。父普，北方扰乱，走奔五原，守战有功，拜宁朔将军。卒，赠燕州刺史。俊豪爽有胆略，齐神武微时，深相亲附。俊初为杜洛周所虏，时神武亦在洛周军中。神武谋诛洛周，俊预其计。事泄奔葛荣。仍背荣归尔朱荣。从入洛。及从破葛荣，平元颢，封乌洛县男。随神武举义，及平邺，破韩陵，并有战功，进爵为侯。出为齐州刺史。为政严暴，又多受纳。然亦明解，有部分，吏人畏服之。性好宾客，颇称施惠。天平中，卒于扬州刺史，赠尚书令、司空公，谥曰威武。齐受禅，诏祭告其墓。皇建初，配享神武庙庭。<br /><br />

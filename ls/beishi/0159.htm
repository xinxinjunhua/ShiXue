<tr><td class="t50">长孙子裕传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　子裕位卫尉少卿。启舍凡阶十七级，为子义贞求官。除左将军，加通直散骑常侍。又以父勋，封平原县伯。<br /><br />
　　义贞弟兕，字若汗。性机辩，强记博闻，雅重宾游，尤善谈论。从魏孝武西迁，别封邺县侯。周天和初，进骠骑大将军、开府仪同三司。历熊、绛二州刺史，并有能名。袭爵平原县公。卒，子炽嗣。<br /><br />
</td></tr>

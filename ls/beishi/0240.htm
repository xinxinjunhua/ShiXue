<tr><td class="t50">周观传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　周观，代人也，骁勇有膂力。太武以军功赐爵金城公，位高平镇将。善抚士卒，号有威名。后拜内都大官，出为秦州刺史。抚驭失和，部人薛永宗聚众汾曲以叛。观讨永宗，为流矢所中。太武幸蒲坂，观闻帝至，惊怖而起，疮重遂卒。帝怒，绝其爵云。<br /><br />
</td></tr>

<tr><td class="t50">文苑传论</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　论曰：古人之所贵名不朽者，盖重言之尚存。王褒、庾信、颜之推、虞世基、柳&#18130;、许善心、明克让、刘臻、王贞、虞绰、王胄等，并极南土誉望，又加之以才名，其为贵显，固其宜也。自余或位下人微，居常亦何能自达。及其灵蛇可握，天纲俱顿，并编缃素，咸贯辞林。虽其位可下，其身可杀，千载之外，贵贱一焉。非此道也，孰云能致？凡百士子，可不务乎！<br /><br />

<tr><td class="t50">于洛侯传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　于洛侯，代人也。为秦州刺史，贪酷安忍。部人富炽夺人吕胜胫缠一具，洛侯辄鞭富炽一百，截其右腕。百姓王陇客刺杀人王羌奴、王愈二人，依律罪死。而洛侯生拔陇客舌，刺其本，并刺胸腹二十余疮。陇客不堪苦痛，随刀战动。乃立四柱，磔其手足。命将绝，始斩其首，支解四体，分悬道路。见者无不伤楚叹愕。百姓王元寿等一时反叛。有司纠劾，孝文诏使者于州常刑人处，宣告兵人，然后斩洛侯以谢百姓。<br /><br />
</td></tr>

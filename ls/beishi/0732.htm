<tr><td class="t50">斛律孝卿传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　孝卿少聪敏，机悟有风检。武平末，位侍中、开府仪同三司，封义宁王，知内省事，典外兵、骑兵机密。时政由群竖，自赵彦深死后，朝贵典机密者，唯孝卿一人差居雅道，不至贪秽。后主至齐州，以孝卿为尚书令，又以中书侍郎薛道衡为侍中，封北海王。二人劝后主作承光诏，禅位任城王。令孝卿赍诏策及传国玺往瀛州，孝卿便诣邺。仍从周武帝入关，授仪同大将军、宣纳上士。隋开皇中，位太府卿、户部尚书。<br /><br />
</td></tr>

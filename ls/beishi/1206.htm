<tr><td class="t50">王玄威传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王玄威，恒农北陕人也。献文崩，玄威立草庐于州城门外，衰裳蔬粥，哭踊无时。刺史苟颓以事表闻。诏令问状，云：“先帝泽被苍生，玄威不胜悲慕，恋心如此，不知礼式。”诏问玄威，欲有所诉，听为表列。玄威云：“闻讳悲号，窃谓臣子同例，无所求谒。”及至百日，乃自竭家财，设四百人斋会。忌日，又设百僧供。至大除日，诏送白紬裤褶一具与玄威释服，下州令表异焉。<br /><br />

<tr><td class="t50">尔朱度律传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　度律，荣从父弟也，鄙朴少言。庄帝初，封乐乡县伯。荣死，与世隆赴晋阳。元晔之立，以度律为太尉公、四面大都督，封常山王。与尔朱兆入洛。兆迁晋阳，留度律镇京师。节闵帝时，为使持节、侍中、大将军、太尉公，兼尚书令、东北道行台，与仲远出拒义旗。齐神武间之，与尔朱兆遂相疑贰，自败而还。度律虽在军戎，聚敛无厌，所经为百姓患毒。其母山氏闻度律败，遂恚愤发病。及至，母责之曰：“汝荷国恩，无状而反，我何忍见他屠戮汝也！”言终而卒，时人怪异之。后韩陵之败，斛斯椿先据河桥，遂西走灅波津，为人执送。椿囚之，送齐神武，斩之都市。<br /><br />

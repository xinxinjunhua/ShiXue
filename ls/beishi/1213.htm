<tr><td class="t50">沓龙超传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　沓龙超，晋寿人也。性尚义侠，少为乡里所重。永熙中，梁将樊文炽来寇益州，刺史傅和孤城固守。龙超每出战，辄破之。时攻围既久，粮矢方尽，刺史遣龙超夜出，请援于汉中，遂为文炽所得。许以封爵，使告城中曰：“外无援军，宜早降。”乃置龙超于攻楼上。龙超乃告刺史曰：“援军数万，近在大寒。”文炽大怒，火炙杀之。至死，辞气不挠。大统二年，诏赠龙骧将军、巴州刺史。<br /><br />

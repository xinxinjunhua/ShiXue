<tr><td class="t50">房亮传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　房亮，字景高，清河人也。父法延，谯郡太守。亮好学有节操。太和中，举秀才，为奉朝请。后兼员外常侍，使高丽。高丽王托疾不拜。以亮辱命，坐白衣守郎中。历济北、平原二郡太守，以清严称。后为东荆州刺史，亮留心抚纳，夷夏安之。时边州刺史例得一子出身，亮不言其子而启弟子起为奉朝请，议者称之。卒于光禄大夫，赠抚军将军、齐州刺史。<br /><br />
　　弟诠、悦等，并历位清显。<br /><br />

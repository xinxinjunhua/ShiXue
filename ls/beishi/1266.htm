<tr><td class="t50">郑修传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　郑修，北海人也。少隐于岐南凡谷中，依岩结宇，不交世俗，雅好经史，专意玄门。前后州将，每征不至。岐州刺史魏兰根频遣致命，修不得已，暂出见兰根，寻还山舍。兰根申表荐修，明帝诏付雍州刺史萧宝夤访实以闻。会宝夤作逆，事不行。<br /><br />
</td></tr>

<tr><td class="t50">耿玄传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　耿玄，钜鹿宋子人也。善卜占。有客叩门，玄在室已知其姓字，并所赍持及来问之意。其所卜筮，十中八九。别有《林占》，时或传之。而性不和俗，时有王公欲求其筮者，玄则拒而不许。每云：“今既贵矣，何所求而复卜也？欲望意外乎？”代京法禁严切，王公闻之，莫不惊悚而退。故玄多见憎忿，不为贵胜所亲。官止钜鹿太守。<br /><br />
</td></tr>

<tr><td class="t50">孟栾传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　孟栾，字龙兒，不知何许人也。坐事为阉人。灵太后临朝，为左中郎将、给事中。素被病，面常黯黑。于九龙殿下暴疾，归家，甚夜亡。栾初出，灵太后闻之曰：“栾必不济，我为之忧。”乃奏其死，为之下泪曰：“其事我如此，不见我一日忻乐时也。”赐帛三百疋、黄绢一十疋，以供丧用。七日，灵太后为设二百僧斋。<br /><br />
</td></tr>

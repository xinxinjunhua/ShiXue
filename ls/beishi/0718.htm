<tr><td class="t50">刘贵传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘贵，秀容阳曲人也。刚格有气断。历尔朱荣府骑兵参军。荣性猛急，贵尤严峻，任使多惬荣心。普泰初，行汾州事，弃戍归齐神武。累迁御史中尉、肆州大中正，加开府、西道行台仆射。贵所历，莫不肆其威酷，非理杀害，视下如草芥。性峭直，攻讦无所回避。虽非佐命元功，然与神武布衣旧，特见亲重。卒，赠太保、太尉公、录尚书事，谥忠武。齐受禅，诏祭告其墓。皇建中，配享神武庙庭。<br /><br />
　　次子洪徽嗣乐县男。卒，赠都督、燕州刺史。<br /><br />

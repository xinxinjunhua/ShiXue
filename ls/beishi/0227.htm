<tr><td class="t50">娥清传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　娥清，代人也。少有将略，累著战功，稍迁给事黄门侍郎。明元南巡，幸邺，以清为中领军将军。与宋兵将军周几等度河，略地至湖陆，以功赐爵须昌侯。与几等遂镇枋头。太武初，乃还京师，进为东平公。后从平统万，遂与奚斤讨赫连昌，至安定。及昌弟定西走，斤追之。清欲寻水往，斤不从，遂与斤俱为定禽。克平凉，乃得还。后与古弼等东讨冯弘，以不急战，弘奔高丽。槛车征，黜为门卒而卒于家。子延，赐爵南平公。<br /><br />
</td></tr>

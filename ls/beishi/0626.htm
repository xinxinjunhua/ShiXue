<tr><td class="t50">席法友传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　席法友，安定人也，祖、父南奔。法友仕齐，以膂力自效，任安丰新蔡二郡太守、建安戍主。后与裴叔业同谋归魏，拜豫州刺史、苞信县伯。叔业卒后，法友与裴植追成业志，淮南克定，法友有力焉。历华、并二州刺史。后为别将出淮南，欲解朐山之围。法友始渡淮而朐山败没，遂停十年。恬静自安，不竞世利。<br /><br />
　　宣武末，除济州刺史，廉和著称。又徙封乘氏。后卒于光禄大夫，赠秦州刺史，谥襄侯。<br /><br />
　　子景通袭，善事元叉，兼赂叉父继。继为司空，引景通为掾。卒，赠卫尉少卿。子郾袭，走关西。<br /><br />

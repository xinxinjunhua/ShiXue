<tr><td class="t50">褚晖传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　褚晖，字高明，吴郡人。以《三礼》学称于江南。炀帝时，徵天下儒术之士，悉集内史省，相次讲论。晖辩博，无能屈者，由是擢为太学博士。撰疏一百卷。<br /><br />

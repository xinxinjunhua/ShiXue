<tr><td class="t50">秦族传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　秦族，上郡洛川人也。祖白、父雚，并有至性，闻于闾里。魏太和中，板白颍州刺史。大统中，板雚郦城郡守。族性至孝，事亲竭力。及父丧，哀毁过礼，每一恸哭，酸感行路。既以母在，恒抑割哀情，以慰其母意。四时珍羞，未尝匮乏。与弟荣先，复相友爱，闺门之中，怡怡如也。寻而其母又没，哭泣无时，唯饮水食菜而已。终丧之后，犹蔬食，不入房室二十许年。乡里咸叹异之。其邑人王元达等七十余人上其状，有诏表其门闾。<br /><br />
　　※<br /><br />
　　荣先亦至孝，遭父丧，哀慕不已，遂以毁卒。邑里化其孝行。周文嘉之，乃下诏褒美其行，赠沧州刺史，以旌厥异。<br /><br />

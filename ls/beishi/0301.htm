<tr><td class="t50">朱修之传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　朱修之者，仕宋为司徒从事中郎。守滑台，为安颉所禽。太武善其固守，以宗室女妻之，以为云中镇将。后奔冯弘。弘送之江南。颉之克滑，宋陈留太守严稜戍仓垣。及山阳公奚斤军至颍川，稜率文武五百人诣斤降。明元嘉其诚款，赐爵郃阳侯，假荆州刺史。随驾南讨，还为上客。及太武践阼，以归化之功，除中山太守，有清廉称。卒于家。子幼玉袭。稜旧书有传，今附之云。修之在宋显达，事并具《南史》。<br /><br />
</td></tr>

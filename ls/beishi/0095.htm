<tr><td class="t50">刘罗辰传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　眷第三子罗辰，机警有智谋，谓眷曰：“从兄显，忍人也，愿早图之。”眷不以为意。后库仁子显果杀眷而代立。显既杀眷，又谋逆。及道武即位，讨显于马邑，追至弥泽，大破之。后奔慕容驎，驎徙之中山。<br /><br />
　　罗辰即宣穆皇后兄也。显既杀眷，罗辰遂奔道武。显恃强，每谋逆，罗辰辄先闻奏。拜南部大人。从平中原，以功赐爵永安公。以军功除征东将军、定州刺史。卒，谥曰敬。<br /><br />
　　子殊晖袭爵，位并州刺史，卒。子求引，位武卫将军。卒，谥曰贞。子尔头，位魏昌、瘿陶二县令，赠钜鹿太守。<br /><br />

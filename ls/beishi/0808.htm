<tr><td class="t50">李询传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　询，字孝询，深沉有大略，颇涉书记。仕周，累迁司卫上士。武帝幸云阳宫，委以留府事。卫王直作乱，焚肃章门，询于内益火，故贼不得入。武帝善之。累迁英果中大夫，屡以军功，加位大将军，赐爵平高郡公。隋文帝为丞相，尉迟迥作乱，遣韦孝宽击之，以询为元帅长史，委以心膂。军至永桥，诸将不一。询密启请重臣监护。文帝令高颎监军。与颎同心，唯询而已。及迥平，进位上柱国，改封陇西郡公。开皇初，历位隰州总管，以疾征还京师。卒，帝悼惜者久之，谥曰襄。子元方嗣。<br /><br />
</td></tr>

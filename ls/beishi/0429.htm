<tr><td class="t50">李德佋传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李德饶弟德佋，性重然诺。大业末为离石郡司法书佐，太守杨子崇特礼之。及义兵起，子崇遇害，弃尸城下。德佋赴哭尽哀，收瘗之。至介休，诣义师请葬子崇。见许，因赠子崇官，令德佋为使者，往离石礼葬子崇。<br /><br />
</td></tr>

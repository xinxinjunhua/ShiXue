<tr><td class="t50">于什门传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　于什门，代人也。魏明元时为谒者，使喻冯跋。及至和龙，住外不入，使谓跋曰：“大魏皇帝有诏，须冯主出受，然后敢入。”跋使人牵逼令入。见跋不拜，跋令人按其项。什门曰：“冯主拜受诏，吾自以宾主致敬，何须苦见逼也？”与跋往复，声气厉然，初不挠屈。既而跋止什门。什门于群众中回身背跋，披裤后裆以辱之。既而拘留，随身衣裳，败坏略尽，虮虱被体。跋遗以衣服，拒而不受。历二十四年。后冯弘上表称臣，乃送什门归。拜书侍御史。太武下诏褒美，比之苏武，赐羊千口、帛千匹，进为上大夫，策告宗庙，班示天下。<br /><br />

<tr><td class="t50">田翼传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　田翼，不知何许人也。养母以孝闻。其后母卧疾岁余，翼亲易燥湿，母食则食，母不食则不食。隋开皇中，母患暴痢。翼谓中毒药，遂亲尝秽恶。母终，翼一恸而绝。妻亦不胜哀而死。乡人厚共葬之。<br /><br />
</td></tr>

<tr><td class="t50">僣伪附庸传论</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　论曰：自金行运否，中原丧乱，元氏唯天所命，方一函复。铁弗、徒何之辈，虽非行录所归，观其递为割据，亦一时之杰。然而卒至夷灭，可谓魏之驱除。梁主任术好谋，爱贤养士，盖有英雄之志，霸王之略焉。及淮海版荡，骨肉猜贰，拥众自固，称籓内款，终能据有全楚，中兴颓运。虽士宇殊于旧邦，而位号同于曩日。眙厥自远，享国虽短，可不谓贤哉！嗣子纂业，增修遣构，赏罚得衷，举厝有方。密迩寇雠，则威略具举；朝宗上国，则声猷远振。岂非继世之令主乎？琮大去其邦，因而不反，遂为外戚。不事自持，盖亦守满之道也。<br /><br />

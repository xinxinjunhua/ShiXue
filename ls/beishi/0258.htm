<tr><td class="t50">宋颖传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　弁族弟颖，字文贤，位魏郡太守。纳货刘腾，腾言之，以为凉州刺史。颖前妻刘氏亡后十五年，颖梦见之。拜曰：“新妇今被处分为高崇妻，故来辞君。”泫然涕流。颖且见崇，言之。崇后数日而卒。<br /><br />
　　颖族弟鸿贵，为定州平北府参军。送戍兵于荆州，坐取兵绢四百匹，兵欲告之，乃斩兵十人。又疏凡不达见令，律有枭首罪，乃生断兵手，以水浇之，然后斩决。寻坐伏法。时人哀兵之苦，笑鸿贵之愚。<br /><br />

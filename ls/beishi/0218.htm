<tr><td class="t50">封恺传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　懿从兄子恺，字思悌，奕之孙也。父劝，慕容垂侍中、太常卿。恺位给事黄门侍郎、散骑常侍。后入代都，名出懿子玄之右。俱坐司马氏事死。恺妻，卢玄女也。恺子伯达，弃母及妻李氏南奔河表，改婚房氏。献文末，伯达子休杰内入。祖母卢犹存，垂百岁矣。而李已死。休杰位冀州咸阳王府谘议参军。<br /><br />
</td></tr>

<tr><td class="t50">辛雄等传论</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　论曰：辛雄吏能历职，琛以公方行己，怀哲体有清监，德源雅业无亏，并素门之所得也。杨机清断在公。道穆兄弟有政事之用。綦俊遭逢受职。山伟位行颇爽。忠之虽文史足用，而雅道蔑闻。费穆出身效力，功名著矣，末路一言，祸延簪带，其死也宜哉！孟威以方言陈力，其勤亦可称矣。<br /><br />

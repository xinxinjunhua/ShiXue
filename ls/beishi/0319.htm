<tr><td class="t50">陆定国传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　定国在襁抱，文成幸其第，诏养宫内。至于游止，常与献文同处。年六岁，为中庶子。及献文践祚，拜散骑常侍，赐封东郡王。定国以承父爵，辞，不许。又以父爵让弟睿，乃听之。俄迁侍中、仪曹尚书，转殿中尚书。前后大驾征巡，擢为行台，录都曹事，超迁司空。定国恃恩，不循法度，延兴五年，坐事免官爵为兵。<br /><br />
　　大和初，复除侍中、镇南将军、秦益二州刺史，复王爵。八年，薨于州。赠以本官，谥曰庄王。<br /><br />
</td></tr>

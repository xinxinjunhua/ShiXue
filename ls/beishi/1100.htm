<tr><td class="t50">张伟传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张伟，字仲业，太原中都人也。学通诸经。乡里受业者，常数百人。儒谨泛纳。虽有顽固，问至数十，伟告喻殷勤，曾无愠色。常依附经典，教以孝悌，门人感其仁化，事之如父。性清雅，非法不言。太武时，与高允等俱被辟命，授中书博士，累迁为中书侍郎，本国大中正。使酒泉慰劳沮渠无讳，又使宋，赐爵成皋子。出为营州刺史，进爵建安公。卒，赠并州刺史，谥曰康。<br /><br />
</td></tr>

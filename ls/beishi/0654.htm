<tr><td class="t50">孙绍等传论</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　论曰：孙绍关左之士，又能指论时务。张普惠明达典故，强直从官，侃然不挠，其有王臣之风矣。成淹、范绍、刘桃符、鹿悆、张耀、刘道斌、董绍、冯元兴等，身遭际会，俱得效其所能，苟曰非才，亦何能致于此也。<br /><br />

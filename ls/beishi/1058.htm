<tr><td class="t50">裴政等传论</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　论曰：大厦之构，非一本之枝，帝王之功，非一士之略，长短殊用，大小异宜，咨棁栋梁，莫可弃也。裴政、李谔、鲍宏、高构、荣毗、陆知命等，或文能道义，或才足干时，识用显于当年，故事留于台阁。参之有隋多士，取其开物成务，皆廊庙之榱桷，亦北辰之众星也。赵绰居大理，囹圄无冤。柳彧之处宪台，奸邪自肃。然不畏御，梁毗得之矣。邦之司直，柳彧近之矣。杜整以声绩著美，其有以取之乎！<br /><br />
</td></tr>

<tr><td class="t50">楼伏连传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　娄伏连，代人也。代为酋帅。伏连忠厚有器量，年十三，袭父位，领部落。道武初，从破贺兰部，又平中山。及征姚平于柴壁，以功赐爵安邑侯。明元时，为晋兵将军、并州刺史。太武即位，封广陵公，再迁光禄勋，进爵为王。后镇统万。薨，谥恭王。<br /><br />
　　子真袭，降爵为公。<br /><br />
　　真弟大拔，封钜鹿子。<br /><br />

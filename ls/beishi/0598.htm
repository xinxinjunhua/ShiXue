<tr><td class="t50">邢祐邢产传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　邢峦叔祖祐，字宗祐。少有学尚，知名于时。假员外散骑常侍，使于宋。以将命之勤，除建威将军、平原太守、赐爵城平男。政清刑肃，百姓安之。卒于官。<br /><br />
　　子产，字神宝。好学善属文，少时作《孤蓬赋》，为进所称。举秀才，除著作佐郎。假常侍、鄚县子，使于齐。产仍世将命，时人美之。历中书侍郎、太子中庶子，卒，朝廷嗟惜焉。赠平州刺史、乐城子，谥曰定。<br /><br />

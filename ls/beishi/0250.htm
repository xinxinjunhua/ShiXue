<tr><td class="t50">苟颓传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　苟颓，代人也。本姓若干。父洛拔，内行长。颓厚重寡言，少严毅清直，武力过人。擢为中散，小心谨敬。太武至江，赐爵建德男。累迁司卫监、洛州刺史。抑强扶弱，山蛮畏威，不敢为寇。太和中，历位侍中、都曹尚书，进爵河南公。颓方正好直言，虽文明太后生杀不允，颓亦言至恳切。李惠、李訢之诛，颓并致谏。迁司空，进爵河东王。以旧老，听乘步挽，杖于朝。大驾行幸三川，颓留守京师。沙门法秀谋反，颓率禁旅收掩毕获，内外晏然。薨，谥僖王。长子恺袭爵河东王，例降为公。<br /><br />
</td></tr>

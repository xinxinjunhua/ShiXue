<tr><td class="t50">王贞传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王贞，字孝逸，梁郡陈留人也。少聪敏，七岁好学，善《毛诗》、《礼记》、《左氏传》、《周易》，诸史百家无不毕览。善属文，不事产业，每以讽读为娱。开皇初，汴州刺史樊叔略引为主簿。后举秀才，授县尉。非其好也，谢病于家。炀帝即位，齐王暕镇江都，闻其名，以书召之。及至，以客礼待之，索其文集。贞上三十三卷，为启陈谢。齐王览集，甚善之，赐良马四匹。贞复上《江都赋》，王赐钱十万贯、良马二匹。未几，以疾甚还乡，终于家。<br /><br />
</td></tr>

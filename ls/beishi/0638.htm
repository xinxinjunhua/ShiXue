<tr><td class="t50">路恃庆传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　路恃庆，字伯瑞，阳平清泉人也。祖绰，阳平太守。恃庆有干用，与广平宋翻俱知名，为乡闾所称。太和中，除奉朝请，恃庆以从兄文举有才望，因推让之，孝文遂并拜焉。累迁定州河间王琛长史。琛贪暴肆意，恃庆每进苦言。卒，赠左将军、安州刺史，谥曰襄。子祖璧，给事中。<br /><br />
　　恃庆弟仲信、思令，并有令名官位。<br /><br />

<tr><td class="t50">郦恽传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　范弟夔子恽，字幼和。好学有文才，尤长吏干。举秀才，射策高第。历位尚书外兵郎。行台长孙承业引为行台郎。恽颇兼武用，恒以功名自许。每进计于承业，多见纳用。以功赏魏昌县子。恽在军启求减身官爵，为父请赠，诏授征虏将军、安州刺史。恽后与唐州刺史崔元珍固守平阳。尔朱荣称兵赴阙，恽与元珍不从，为荣行台郎中樊子鹄陷城，被害。所作文章，颇行于世。撰慕容氏书，不成。<br /><br />
　　子怀则，司空长流参军。<br /><br />
</td></tr>

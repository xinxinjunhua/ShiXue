<tr><td class="t50">骨仪传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　骨仪，天竺胡人。性刚鲠，有不可夺之志，开皇初，为御史，处法平当，不为势利所回。炀帝嗣位，迁尚书左司郎。于时朝政渐乱，货贿公行，凡当枢要之职，无问贵贱，并家累金宝。天下士大夫莫不变节，而仪励志守常，介然独立。帝嘉其清苦，拜京兆郡丞，公方弥著。时刑部尚书卫玄兼领京兆内史，颇行诡道，辄为仪所执正。玄虽不便之，不能伤。及义兵至，玄恐祸及，辞老病。仪与世师同心协契，父子并诛，其后绝。世师有子弘智等，各以年幼获全。<br /><br />
</td></tr>

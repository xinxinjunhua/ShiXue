<tr><td class="t50">张耀传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张耀，字景世，自云南阳西鄂人也。仕魏，累迁步兵校尉。永宁寺塔大兴，经营务广。灵太后曾幸作所，凡有顾问，耀敷陈指画，无所遗阙，太后善之。后为别将，以军功封长平男。历岐、东荆州刺史。<br /><br />
　　天平初，迁邺草创，右仆射高隆之、吏部尚书元世俊奏曰：“南京宫殿，毁撤送都，连筏竟河，首尾大至，自非贤明一人，专委受纳，则恐材木耗损，有关经构。耀清直素著，有称一时，臣等辄举为大将。”诏从之。耀勤于其事，寻转营构左都将。兴和初，加卫大将军。宫殿成，除东徐州刺史。卒于州，赠司空公，谥曰懿。<br /><br />

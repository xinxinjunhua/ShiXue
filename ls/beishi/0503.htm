<tr><td class="t50">薛辩家族传论</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　论曰：薛辩有魏之初，功业早树，门膺人爵，无替荣名。端以谦直见知；胄以公平自命。浚之孝悌，素绪之所得也。道衡雅道弈叶，世擅文宗，令望攸归，岂徒然矣。而运逢季叔，卒蹈诛戮，痛乎！仲良任惟繁剧，弘益流誉；而陷齐谄护，以要权宠，易名为缪，斯岂虚哉！寘、憕并学称该博，文擅雕龙，或挥翰凤池，或著书麟阁，咸居禄位，各逞琳琅。拟彼徐、陈，惭后生之可畏；论其任遇，实当时之良选也。<br /><br />
</td></tr>

<tr><td class="t50">岑善方传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　岑善方，字思义，南阳棘阳人。祖惠甫，给事中。父昶，散骑侍郎。善方有器局，博综经史。同刑狱参军随詧至襄阳。詧初请内附，以善方兼记室充使，往来凡数十反。魏恭帝二年，封长宁县公。及詧称帝，位散骑侍郎、起部尚书。善方性清慎，有当世干能，故詧委以机密。卒，赠太常卿，谥曰敬。所著文集十卷。<br /><br />
　　有七子，并有操行。之元、之利、之象最知名。之元太子舍人，早卒。之利仕隋，位零陵郡丞。之象仕隋，尚书虞部员外侍郎，邵陵、上宜、渭南、邯郸四县令。<br /><br />
</td></tr>

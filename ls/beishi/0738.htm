<tr><td class="t50">叱列平传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　叱列平，字杀鬼，代郡西部人，世为酋帅。平有容貌，美须髯，善射驭。袭第一领人酋长、临江伯。魏末，以军功至武卫将军。随尔朱荣破葛荣，平元颢，封瘿陶县伯。荣死，尔朱氏陵僭。平惧祸，后归神武。从破四胡于韩陵。以军功，天保初累迁衮州刺史，开府仪同三司。卒，赠都督、瀛州刺史，谥曰庄惠。子孝冲嗣。<br /><br />
　　孝冲弟长叉，武平末，侍中、开府仪同三司，封新宁王。隋开皇中，位上柱国，卒于泾州刺史。长叉无他才技，在官以清干称。<br /><br />
</td></tr>

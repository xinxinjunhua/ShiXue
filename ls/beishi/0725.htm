<tr><td class="t50">厍狄回洛传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　厍狄回洛，代人也。少有武力，仪貌魁伟。初事尔朱荣。荣死，隶尔朱兆。神武举兵于信都，回洛拥众来归。从破四胡于韩陵，以军功封顺阳县子，累迁夏州刺史。昭帝即位，封顺阳郡王。大宁初，为朔州刺史，转太子太师。卒，赠太尉、定州刺史。<br /><br />
</td></tr>

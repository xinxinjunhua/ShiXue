<tr><td class="t50">万安国传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　万安国，代人也。世为酋帅。父振，尚高阳长公主，拜驸马都尉，位长安镇将，爵冯翊公。安国少明敏，以国甥复尚河南公主，拜驸马都尉。献文特亲宠之，与同卧起。拜大司马、大将军，封安城王。安国先与神部长奚买奴不平，承明初，矫诏杀买奴于苑中。孝文闻之，大怒，遂赐死，年二十三。子翼袭王爵。有嵇根者，世为纥奚部帅。皇始初，率部归魏，尚昭成女。生子拔，位尚书令。拔尚华阴公主，生子敬。元绍之逆也，主有功，超授敬大司马，封长乐王。薨，子护袭，拜外都大官。根事迹遗落，故略附云。<br /><br />
</td></tr>

<tr><td class="t50">王春传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王春，河东安邑人也。少精《易》占，明阴阳风角，齐神武引为馆客。韩陵之战，四面受敌，从寅至午，三合三离，将士皆惧。神武将退军，春叩马谏曰：“比至未时，必当大捷。”遽缚其子诣军门为质，若不胜请斩之。贼果大败。后从征讨，恒令占卜，其言多中。位东徐州刺史，赐爵安夷县公。卒，赠秦州刺史。<br /><br />
</td></tr>

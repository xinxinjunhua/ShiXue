<tr><td class="t50">翟普林传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　翟普林，楚丘人也。事亲以孝闻。州郡辟皆不就，躬耕色养。乡闾谓为楚丘先生。后父母疾，亲易澡湿，不解衣者七旬。大业初，父母俱终，哀毁殆将灭性。庐于墓侧，负土成坟。盛冬不衣缯絮，唯著单缞而已。家有鸟犬，随其在墓，若普林哀临，犬亦悲号，见者嗟异。有二鹊巢其庐前柏树，入庐驯狎，无所惊惧。司隶巡察，奏其孝感，擢授孝阳令。<br /><br />
</td></tr>

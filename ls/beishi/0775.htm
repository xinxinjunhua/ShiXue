<tr><td class="t50">杜台卿传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　台卿字少山，好学博览，解属文。仕齐，位中书、黄门侍郎，修国史。既居清显，忌害人物。赵彦深、和士开、高阿那肱等亲信之。后兼尚书左丞，省中以其耳聋，多戏弄之。下辞不得理者，乃至大骂。台卿见其口动，谓为自陈。令史又故不晓喻，训对往往乖越，听者以为嗤笑。及周武平齐，归乡里。以礼记、春秋讲授子弟。隋开皇初，被征入朝。台卿采月令，触类广之，为书名玉烛宝典十二卷，至是奏之，赐帛二百疋。患耳，不堪吏职，请修国史，拜著作郎。后致仕，终于家。有集十五卷，撰齐记二十卷，并行于世。无子。<br /><br />
</td></tr>

<tr><td class="t50">李崇祖传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　崇祖字子述。文襄集朝士，命卢景裕讲《易》。崇祖时年十一，论难往复，景裕惮之。业兴助成其子，至于忿阋。文襄色甚不平。姚文安难服虔《左传解》七十七条，名曰《驳妄》。崇祖申明服氏，名曰《释谬》。齐文宣营构三台，材瓦工程，皆崇祖所算也。封屯留县侯。遵祖，齐天保初难宗景历甚精。崇祖为元子武卜葬地，醉而告之曰：“改葬后，当不异孝文。”武成，或告之，兄弟伏法。<br /><br />

<tr><td class="t50">外戚传论</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　论曰：三五哲王，防深虑远；舅甥之国，罕执钧衡；母后之家，无闻倾败。爰及汉晋，颠覆继轨，皆由乎进不以礼，故其毙亦速。自魏至隋，时移四代，得失之迹，斯文可睹。苟不倾宗，终致亡国，周隋之际，可为鉴焉。若使开皇创业，不取惩于已往，独孤权侔吕、霍，必败于仁寿之前；萧氏势均梁、窦，岂全于大业之后。今或不陨旧基，或更隆先构，岂非处之以道，远权之所致乎？<br /><br />
</td></tr>

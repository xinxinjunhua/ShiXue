<tr><td class="t50">万俟普传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　万俟普，字普拨，太平人，其先匈奴之别也。少雄果，有武力。正光中，破六韩拔陵构逆，逼授太尉。后归魏，累迁第二镇人酋长。孝武帝初，封清水郡公。随入关，拜司空。神武平夏州，普自覆靺城率部归齐神武。神武躬自迎接，封河西郡公，位太尉，薨。赠太师、大司马、录尚书事。子洛。<br /><br />
</td></tr>

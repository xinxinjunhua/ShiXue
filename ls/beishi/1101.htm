<tr><td class="t50">梁祚传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　梁祚，北地泥阳人也。父邵，皇始二年归魏，位济阳太守。至祚，居赵郡。祚笃志好学，历习经典，尤善《公羊春秋》、郑氏《易》，常以教授。有儒者风，而无当世之才。与幽州别驾平恒有旧，恒时请与论经史。辟秘书中散，稍迁秘书令，为李訢所排摈，退为中书博士。后出为统万镇司马，征为散令。撰并陈寿《三国志》，名曰《国统》。又作《代都赋》，颇行于世。清贫守素，不交势贵，卒。子元吉，有父风。<br /><br />
</td></tr>

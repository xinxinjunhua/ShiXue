<tr><td class="t50">王续生等传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王续生，荥阳京县人也。遭继母忧，居丧，杖而后起。乃终礼制，鬓发尽落。有司奏闻，宣武诏标旌门闾，甄其徭役。<br /><br />
　　※<br /><br />
　　李显达，颍川阳翟人也。父丧，水浆不入口七日，鬓发堕落，形体枯悴。六年庐于墓侧，哭不绝声，殆于灭性。州牧高阳王雍以状奏，灵太后诏表其门闾。<br /><br />
　　※<br /><br />
　　仓跋，荥阳京县人也。丧母，水浆不入口五日，吐血数升，居忧毁瘠，见称州里。有司奏闻，孝武帝诏标门闾。<br /><br />
　　※<br /><br />
　　张升，荥阳京县人也。丧父，饮水绝盐，哀毁过度，形骸枯悴，骨立而已，发落殆尽。声闻乡里，盗贼不侵其闾。州表以闻，标其门闾。<br /><br />

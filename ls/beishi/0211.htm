<tr><td class="t50">封子绘传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　子绘字仲藻，小名搔。性和理，有器局。释褐秘书郎，累迁平阳太守，加散骑常侍。晋州北界霍山旧号千里径者，山坂高峻，每大军往来，士马劳苦。子绘请于旧径东谷别开一路。神武从之，仍令子绘修开，旬日而就。征补大行台吏部郎中。<br /><br />
　　神武崩，秘未发丧，文襄以子绘为勃海太守。执其手曰：“诚知未允勋臣官望，但须镇抚。且衣锦昼游，古人所贵，宜善加经略，不劳习常太守向州参也。”仍听收集部曲一千人。<br /><br />
　　大宁三年，为都官尚书。高归彦作逆，命子绘参赞军事。贼平，敕子绘权行州事。征拜仪同三司、尚书右仆射。卒，谥曰简。子宝盖袭。<br /><br />

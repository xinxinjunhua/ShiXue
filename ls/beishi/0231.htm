<tr><td class="t50">豆代田传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　豆代田，代人也。明元时，以善骑射为内细射。从攻武牢，诏代田登楼射贼，矢不虚发。以功迁内三郎。从讨赫连昌，乘胜追贼，入其宫门。门闭，代田逾宫而出。太武壮之，拜勇武将军。后从讨平凉，破赫连定，得奚斤等，以定妻赐之。诏斤膝行授酒于代田。敕斤曰：“全尔身命者，代田功也。”以从讨和龙战功，封长广公。卒于统万镇大将。赠长广王，谥曰恭。子周求袭爵。<br /><br />
</td></tr>

<tr><td class="t50">梁越传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　梁越，字玄览，新兴人也。博通经传，性纯和。魏初，为《礼经》博士。道武以其谨厚，迁上大夫，令授诸皇子经书。明元初，以师傅恩，赐爵祝阿侯，出为雁门太守。获白雀以献，拜光禄大夫，卒。<br /><br />
</td></tr>

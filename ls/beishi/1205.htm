<tr><td class="t50">汲固传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　汲固，东郡梁城人也。为兗州从事。刺史李式坐事被收，吏人皆送至河上。时式子宪生始满月。式大言于众曰：“程婴、仵臼何如人也？”固曰：“今古岂殊！”遂便潜还不顾，径来入城，于式妇闺抱宪归藏。及捕者收宪，属有一婢产男，母以婢兒授之。事寻泄，固乃携宪逃遁，遇赦始归。宪即为固长育，至十余岁，恒呼固夫妇为郎婆。后高祐为兗州刺史，嘉固节义，以为主簿。<br /><br />
</td></tr>

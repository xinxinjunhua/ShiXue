<tr><td class="t50">尉地干传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　眷弟地干，机悟有才艺，驰马立射五的，时人莫能及。太武时，位库部尚书，加散骑常侍，领侍辇郎。奉上忠谨，尤善嘲笑。太武见其效人举措，忻悦不能自胜。甚见亲爱，参军国大谋。时征平原，试冲车以攻冢。地干为索所摐，折胁而卒。帝亲往哭恸，赠中领军、燕郡公，谥曰惠。<br /><br />
　　子长寿，位右曹殿中尚书，赐爵会稽公，卒于泾州刺史。<br /><br />

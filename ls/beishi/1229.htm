<tr><td class="t50">节义传论</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　论曰：于什门等或临危不挠，视死如归；或赴险如夷，唯义有所在。其大则光国隆家，其小则损己利物。故其盛烈所著，与河海而争流；峻节所标，共竹柏而俱茂。并蹈履之所致，身没名立，岂徒然也！<br /><br />

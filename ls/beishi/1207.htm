<tr><td class="t50">娄提等传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　娄提，代人也。献文时，为内三郎。献文暴崩，提谓人曰：“圣主升遐，安用活为！”遂引佩刀自刺，几死。文明太后诏赐帛二百匹。<br /><br />
　　时有敕勒部人蛭拔寅，兄地于坐盗食官马，依制命死。拔寅自诬己杀，兄又云实非弟杀。兄弟争死，辞不能定，孝文昭原之。<br /><br />
　　刘渴侯，不知何许人也。禀性刚烈。太和中，为徐州后军，以力死战，众寡不敌，遂禽。瞋目大骂，终不降屈，为贼所杀。孝文赠立忠将军、平州刺史、上庸侯，赐绢千匹、谷千斛。<br /><br />
　　有严季者亦为军校尉，与渴侯同殿，势穷被执，终不降屈。后得逃还，除立节将军，赐爵五等男。<br /><br />

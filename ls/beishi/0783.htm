<tr><td class="t50">敬显俊传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　敬显俊，字孝英，阳平太平人也。少英侠，从神武信都义举，历位度支尚书。神武攻邺，显俊督造土山，以功封永安县侯。出内多历显官，所在著名。河清中，卒于兗州刺史。<br /><br />
　　子长瑜，武成时为广陵太守，多所受纳，刺史陆骏将表劾之以货事。和士开以书屏风诈为长瑜献，武成大悦，骏表寻至，遂不问焉。迁合州刺史，陷于陈，卒。子德亮，齐亡后，负尸归。<br /><br />
　　德亮，隋开皇中，卒于尚书郎。<br /><br />

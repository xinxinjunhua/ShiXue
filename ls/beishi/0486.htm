<tr><td class="t50">郑先护传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　郑思明子先护，少有武干。庄帝居籓也，先护得自结托。及尔朱荣称兵向洛，灵太后令先护与郑季明等守河梁。先护闻庄帝即位于河北，遂开门纳荣。以功封平昌县侯，广州刺史。元颢入洛，庄帝北巡，先护据州起义兵，不受命。庄帝还京，进爵郡公。历东雍、豫二州刺史，兼尚书右仆射。及尔朱荣死，徐州刺史尔朱仲远拥兵向洛。诏先护与都督贺拔胜、行台杨昱同讨之。闻京师不守，先护部众逃散，因奔梁。寻归，为仲远所害。孝武初，赠使持节、都督、四州刺史。<br /><br />
　　子伟。<br /><br />

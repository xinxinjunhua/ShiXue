<tr><td class="t50">朱元旭传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　朱元旭，字君升，本乐陵人也。颇涉子史，开解几案。稍迁尚书度支郎中。神龟末，以郎选不精，大加沙汰。元旭与陇西辛雄、范阳祖莹、太山羊深、西平源子恭并以才用见留。寻兼尚书右丞，仍郎中、本州中正。时关西都督萧宝夤启云所统十万，食唯一月。明帝大怒，诏问所由，录、令已下皆推罪元旭。入见御坐前，屈指校计，宝夤兵粮乃逾一年，事乃得释。后迁卫将军、左光禄大夫。天平中，复拜尚书左丞。既无风操，俛仰随俗，性多机数，自容而已。于时朝廷分汲郡河内二界挟河之地立义州，置关西归款户，除元旭义州刺史，卒官。<br /><br />
</td></tr>

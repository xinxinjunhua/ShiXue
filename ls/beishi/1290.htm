<tr><td class="t50">解法选传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　解法选，河内人也。少明相术，又受《易》于权会，筮亦颇工。陈郡袁叔德以太子庶子出行博陵太守，不愿之官，以亲老言于执政杨愔。愔语云：“既非正除，寻当遣代。”叔德意欲留尊累在京，令法选占。云：“不逾三年，得代，终不还也。”劝其尽家而行。又为叔德相云：“公邑邑，终为吏部尚书，鉴照人物。”后皆如言。又频为和士开相中，士开牒为开府行参军。<br /><br />

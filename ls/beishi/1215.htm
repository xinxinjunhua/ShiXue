<tr><td class="t50">李棠传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李棠，字长卿，勃海蓚人也。祖伯贵，魏宣武时，官至鲁郡守。有孝行，居父丧，哀戚过礼，遂以毁卒。宣武嘉之，赠勃海相。父元胄，员外散骑侍郎。棠幼孤，好学，有志操。高仲密为北豫州刺史，请棠为掾。仲密将图西附。时东魏又遣镇城奚寿兴典兵事。仲密遂与堂谋杀寿兴，率其众据城，遣棠诣关中归款。周文嘉之，封广宗县公，位给事黄门侍郎，加车骑大将军、仪同三司、散骑常侍。从魏安公尉迟迥伐蜀，棠乃应募喻之。既入成都，萧捴问迥军中委曲，棠不对。捴乃苦辱之。棠曰：“我王者忠臣，有死而已，义不为尔移志也。”遂害之。子敞嗣。<br /><br />

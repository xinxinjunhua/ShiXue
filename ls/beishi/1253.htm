<tr><td class="t50">胡泥传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　胡泥，代人也。历官至司卫监，赐爵永成侯。泥率勒禁中，不惮豪贵。殿中尚书叔孙侯头应内直而阙于一时，泥以法绳之。侯头恃宠，遂与口诤。孝文闻而嘉焉，赐泥衣服一袭，出为幽州刺史，假范阳。以北平阳尼硕学，遂表荐之。转为定州刺史。以暴虐，刑罚酷滥，受纳货贿，徽还戮之。将就法，孝文临太华殿引见，遣侍臣宣诏责之，遂就家赐尽。<br /><br />
</td></tr>

<tr><td class="t50">乞伏保传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　乞伏保，高车部人也。父居，献文时为散骑常侍，领牧曹尚书，赐爵宁国侯。以忠谨慎密，常在左右，出内诏命。赐宫人河南宗氏，亡后，赐以宫人申氏，宋太子左率申坦兄女也。岁余，居卒。申抚养伏保，性严肃，捶骂切至，而伏保奉事孝谨，初无恨色。袭父侯爵，例降为伯。稍迁左中郎将。每请禄赐，在外公私尺丈所用，无不白知。出为鄯善镇将。申年逾八十，伏保手制马车，亲自扶接，申欣然随之。申亡，伏保解官，奉丧还洛。复为长兼南中郎将，卒。<br /><br />
</td></tr>

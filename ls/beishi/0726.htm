<tr><td class="t50">厍狄盛传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　厍狄盛，字安盛，怀朔人也。性和柔，少有武用。初为神武亲信都督，从征伐。累迁幽州刺史，封长广县公。齐受禅，改封华阳县公，后拜特进。卒，赠太尉公。<br /><br />

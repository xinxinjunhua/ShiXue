<tr><td class="t50">乙速孤佛保传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　乙速孤佛保，北秀容胡酋也。少骁武，善射。孝武帝时，为直阁将军。从入关，封蒲子县公，并赐弓矢。大统初，梁将兰钦来寇，遂陷汉中。佛保时为都督，统兵力战。知将败，乃先城未陷，仰天大哭曰：“此马吾常所乘，此弓矢天恩赐我，岂可令贼得吾弓马乎！”遂斩马及弓，自刎而死。三军莫不壮之。黄门郎赵僧庆时使汉中，闻，乃收运其尸致长安。天子叹感，诏著作录之。<br /><br />
</td></tr>

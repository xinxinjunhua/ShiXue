<tr><td class="t50">姚黄眉传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　姚黄眉，姚兴之子，明元昭哀皇后之弟也。姚泓灭，黄眉间来归魏。明元厚礼待之，赐爵陇西公。尚阳翟公主，拜附马都尉，隶户二百。太武即位，迁内都大官，后拜太常卿，卒。赠雍州刺史、陇西王，谥曰献，陪葬金陵。黄眉宽和温厚，希言得失，太武悼惜之，故赠礼有加。<br /><br />
</td></tr>

<tr><td class="t50">豆卢永恩传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　豆卢宁弟永恩，少有识度，与宁俱归周文。以迎孝武功，封新兴伯。屡从征讨，皆有功，进位骠骑大将军、开府仪同三司。周孝闵帝践祚，授鄯州刺史，改封沃野县公。保定元年，入为司会中大夫。宁封楚国公，请以先封武阳郡三千户益沃野之封，诏许焉。卒于官。赠少保，谥曰敬。子通嗣。<br /><br />
　　通字平东，一名会，弘厚有器局。在周，以父功赐爵临贞县侯，改封沃野县公。位开府、北徐州刺史。开皇初，进爵南陈郡公，尚隋文帝妹昌乐县长公主。历定相二州刺史、夏洪二州总管，并以宽惠称。卒官。谥曰安。子宽嗣。<br /><br />
</td></tr>

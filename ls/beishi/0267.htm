<tr><td class="t50">刁整传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　楷弟整，字景智。少有大度，颇涉书史。太和十五年，为奉朝请。孝文都洛，亲自临选，除司空法曹参军。累迁黄门郎。普泰初，假征东大将军、沧冀瀛三州刺史、大都督。寻加车骑将军、右光禄大夫。遂逢本乡贼乱，奉母客于齐州。既而母卒。母即高允之女。崔光、崔亮皆经允接待，是以凉燠之际，光等每致拜焉。天平四年，卒于邺，赠司空公，谥曰文献。整解音律，轻财好施，交结名胜，声酒自娱。然贪而好色，为议者所贬。子柔。<br /><br />
</td></tr>

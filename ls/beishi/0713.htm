<tr><td class="t50">万俟洛传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　洛，字受洛干，随孝武入关，除尚书左仆射。天平中，随父东归，封建昌郡公，再迁领军将军。初，神武以其父普尊老，特崇礼之，尝亲扶上马。洛免冠稽首，愿出万死力以报深恩。及河阴之战，诸军北度桥，洛以一军不动，谓西人曰：“万俟受洛干在此，能来可来也！”西人畏而去之。神武名其所营地为回洛。洛慷慨有气节，勇锐冠世。卒，赠太师、大司马、太尉、录尚书，谥曰武。<br /><br />

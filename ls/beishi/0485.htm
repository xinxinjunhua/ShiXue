<tr><td class="t50">郑思明传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　叔夜子伯夏，位东莱太守。卒，赠青州刺史。伯夏弟谨，字仲恭，琅邪太守。<br /><br />
　　连山性严暴，挝挞僮仆，酷过人理。父子一时为奴所害，断首投马槽下，乘马北逃。其第二子思明，骁勇善骑射，被发率村义驰追之。及河，奴乘马投水。思明止将从，自射之，一发而中，落马堕流，禽至家，脔杀之。<br /><br />
　　思明，弟思和，并以武力自效。思明位直阁将军，坐弟思和同元禧逆，徙边。会赦，免。卒后，赠济州刺史。<br /><br />

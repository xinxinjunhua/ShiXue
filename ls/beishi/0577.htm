<tr><td class="t50">杨穆传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　穆字绍叔，暄弟也。仕魏，华州别驾。孝武末，弟宽请以澄城县伯让穆，诏许之。终于并州刺史，赠开府仪同三司、华州刺史。<br /><br />

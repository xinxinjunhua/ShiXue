<tr><td class="t50">刘祥传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　祥字休徵。幼聪慧，宾客见者皆号神童。事嫡母以至孝闻。其伯父黄门郎璆，有名江左，在岭南，闻而奇之，乃令名祥字休徵。后以字行于世。十岁能属文，十二通《五经》。仕梁，为宜丰侯记室参军。江陵平，随例入关中。齐公宪召为记室，府中书记皆令掌之。封汉安县子。宪进爵为王，以休徵为王友。俄除内史上士。武帝东征，休徵陪侍帷幄，平齐露布即休徵文也。累迁车骑大将军、仪同大将军。历长安、万年二县令，颇获时誉。卒于官。初，璠所选《梁典》始就，未及刊定而卒，临终谓休徵曰：“能成我志，其在此书乎！”休徵修定缮写。勒成一家，行于世。<br /><br />

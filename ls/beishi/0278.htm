<tr><td class="t50">韦道福传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　阆从叔道福，父罴，为苻坚丞相王猛所器重，以女妻焉。仕坚为东海太守。坚灭，奔江左，仕宋为秦州刺史。道福有志略，仕宋位盱眙、南沛二郡太守，领镇北府录事参军。与徐州刺史薛安都谋拥州内附，赐爵高密侯，因家彭城。卒，赠兗州刺史，谥曰简。<br /><br />
　　子欣宗，以归国勋，别赐爵杜县侯。历位太中大夫、行幽州事。卒，赠南兗州刺史，谥曰简。<br /><br />
</td></tr>

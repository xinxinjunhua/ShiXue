<tr><td class="t50">韩僧寿传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　禽母弟僧寿，字玄庆，亦以勇烈知名。周武帝时，为侍伯中旅下大夫。隋文帝得政，从韦孝宽平尉迟迥。以功授大将军。封昌乐县公。开皇初，拜安州刺史。时禽为庐州总管，朝廷不欲其兄弟同在淮南，转熊、蔚二州刺史，进爵广陵郡公。寻以行军总管击破突厥于鸡头山。后坐事免。数岁，复拜蔚州刺史。突厥甚惮之。后检校灵州总管事。从杨素破突厥，进位上柱国，改封江都郡公。<br /><br />
　　炀帝即位，封新蔡郡公，自是不复任用。大业五年，从幸太原。时有京兆人达奚通妾王氏，能清歌，朝臣多相命观之，僧寿亦预焉。坐除名。寻命复位，卒于京师。子孝基。<br /><br />
</td></tr>

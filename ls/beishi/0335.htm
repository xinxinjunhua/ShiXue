<tr><td class="t50">薛提传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　薛提，太原人，皇始中，补太学生，拜侍御史，累迁晋王丕卫兵将军、冀州刺史，封太原公。有政绩，征拜侍中，摄都曹事。太武崩，秘不发丧，尚书左仆射兰延、侍中和延等议。以皇孙幼冲，宜立长君，征秦王翰置之秘室。提曰：“皇孙有世嫡之重，人望所系，春秋虽少，令问闻于天下。废所宜立而更别求，必有不可。”延等未决，中常侍宗爱知其谋，矫皇后令，征提等入，杀之。文成即位，以提有谋立之诚，诏提弟浮子袭先爵太原公，有司奏降为侯。<br /><br />
</td></tr>

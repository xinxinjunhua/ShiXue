<tr><td class="t50">刘弘传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘弘，字仲远，彭城丛亭里人也。少好学，有羁检，重节概。仕齐，位西楚州刺史。齐亡，周武帝以为本郡太守。及隋文帝平陈，以行车长史从总管吐万绪度江，加上仪同，封濩泽县公，拜泉州刺史。会高智慧乱，以兵攻州。弘城守，粮尽，煮犀甲腰带及剥树皮食之，一无离叛。贼欲降之，弘抗节弥厉。城陷，为贼所害。文帝闻而嘉叹者久之，赐物二千段。子长信，袭其官爵。<br /><br />
</td></tr>

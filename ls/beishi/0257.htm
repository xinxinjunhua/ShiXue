<tr><td class="t50">宋钦道传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　钦道仕齐，历位中山太守。长于抚接，然好察细事。其州府佐吏使人间者，先酬钱然后敢食。临莅处称为严整。寻征为黄门侍郎，又令在东宫教太子吏事。时郑子默以文学见知，亦被亲宠。钦道本文法吏，不甚谙识古今，凡有疑事，必询子默。二人幸于两宫，虽诸王贵臣莫敢不敬惮。钦道又迁秘书监，仍带黄门侍郎。乾明初，迁侍中，与杨愔同诛。赠吏部尚书、赵州刺史。<br /><br />
</td></tr>

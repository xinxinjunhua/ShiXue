<tr><td class="t50">徐孝肃传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　徐孝肃，汲郡人也。宗族数十家，多以豪侈相尚，唯孝肃俭约。事亲以孝闻。虽在幼小，宗党间每有争讼，皆至孝肃所平论，短者无不引咎而退。孝肃早孤，不识父。及长，问其母父状，因画工图其形，构庙置之而定省焉，朔望享祭。养母至孝，数十年家人未见其忿恚色。母老疾，孝肃视易燥湿，忧悴数年，见者莫不悲悼。母终，孝肃茹蔬饮水，盛冬单缞，毁瘠骨立。祖父母、父母墓，皆负土成坟。庐于墓所四十余载，被发徒跣，遂以终身。<br /><br />
　　其弟德备终，子处默，又庐于墓侧。弈世称孝焉。<br /><br />

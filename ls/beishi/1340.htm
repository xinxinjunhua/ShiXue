<tr><td class="t50">李坚传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李坚，字次寿，高阳易人也。文成初，坐事为阉人，稍迁中给事中，赐爵魏昌伯。小心谨慎，常在左右，虽不及王遇、王质等，而亦见任用。宣武初，自太仆卿出为瀛州刺史。本州之荣，同于王质。所在受纳，家产巨万。卒于光禄大夫，赠相州刺史。<br /><br />
　　太和末，又有秦松、白整，位并长秋卿。<br /><br />

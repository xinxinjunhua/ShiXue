<tr><td class="t50">邸珍传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　邸珍，字安宝，本中山上曲阳人也，魏太和中，徙居武州镇。孝昌中，六镇兵起，珍遂从杜洛周贼。洛周为葛荣所吞，珍入荣军。荣为尔朱荣所破，珍与其余党，俱徙并州。从齐神武出山东。神武起义信都，拜珍长史，封上曲县侯，除殷州刺史。珍求取无厌，大为州人所疾苦。后兼尚书右仆射、大行台，节度诸军事，击梁州将成景携等，解东行围，回军彭城。珍御下残酷，士众离心，至于土人豪族，遇之无礼，遂为州人所害。后赠定州刺史、司空公。<br /><br />
</td></tr>

<tr><td class="t50">李搔传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李搔字德沈，少聪敏，有才艺。曾采诸声，别造一器，号曰八弦，时人称有思理。武定末，自丞相记室除河内太守。居数载，流人尽复。代至，将还都，父老号泣，追送二百余里，生为立碑。终于仪曹郎。<br /><br />
</td></tr>

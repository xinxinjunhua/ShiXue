<tr><td class="t50">曹世表传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　曹世表，字景升，魏大司马休九世孙也。祖谟，父庆，并有学问。世表性雅正，工尺牍，涉猎群书。为司徒记室，与武威贾思伯、范阳卢同、陇西辛雄并相友善。侍中崔光，乡里贵达，每称美之。延昌中，除清河太守，临官省约，百姓安之。孝昌中，为尚书左丞，出行东豫州刺史，迁东南道行台。卒，赠齐州刺史。<br /><br />
</td></tr>

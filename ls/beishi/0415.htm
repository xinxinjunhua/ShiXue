<tr><td class="t50">崔敬邕传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　崔挺从祖弟敬邕，性长者，为左中郎将，以军功赐爵临淄男，位营州刺史。库莫奚国有马数百疋，因风入境，敬邕悉令送还，于是夷人感附。卒于太中大夫，赠济州刺史，谥曰恭。<br /><br />
　　敬邕从弟接，字愿宾。容貌魁伟，放迈自高，不拘检。为中书博士、乐陵内史。雅为任城王澄所礼待，及澄为本部，接了无人王敬，王忻然容下之。后为乐陵太守，还乡卒。<br /><br />
</td></tr>

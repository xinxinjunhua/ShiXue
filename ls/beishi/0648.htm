<tr><td class="t50">刘桃符传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘桃符，中山卢奴人也。生不识父，九岁丧母。性恭谨，好学。举孝廉，射策甲科。历碎职，累迁中书舍人。以勤明见知，久不迁职。宣武谓曰：“扬子云为黄门，顿历三世。卿居此任始十年，不足辞也。”东豫州刺史田益宗居边贪秽，宣武频诏桃符慰喻之。桃符还，具称益宗老耄，而诸子非理处物。宣武后欲代之。恐其背叛，拜桃符东豫州刺史，与后将军李世哲领众袭益宗。语在《益宗传》。桃符善恤蛮左，为人吏所怀。久之，徵还。病卒，赠洛州刺史。<br /><br />
</td></tr>

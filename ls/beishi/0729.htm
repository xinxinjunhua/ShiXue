<tr><td class="t50">侯莫陈相传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　侯莫陈相，代人也。祖社伏颓，魏第一领人酋长。父斛古提，朔州刺史，白水公。相七岁丧父，号慕过人。及长，性雄杰。后从神武起兵，破四胡于韩陵，力战有功，封阳平县伯，后改封白水郡公。天保初，累迁司空公，进爵白水王，又迁大将军，拜太尉公，兼瀛州刺史。历太保、朔州刺史，又授太传，别封义宁郡公。薨于州，赠假黄钺、右丞相、太宰、太尉、都督、朔州刺史。<br /><br />
　　次子晋贵，严重有文武干略，袭爵白水王，武卫将军、开府仪同三司、梁州刺史。归周，授上大将军，封信安县公。子仲宣，太常丞。子弘颖、弘信，雍州司士参军。子行方、行俭、行恭。<br /><br />
</td></tr>

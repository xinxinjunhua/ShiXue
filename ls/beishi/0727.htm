<tr><td class="t50">张保洛传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张保洛，自云本出南阳西鄂，家世好宾客，尚气侠，颇为北土所知。保洛少便弓马。初从葛荣。荣败，仍为尔朱荣统军。后隶齐神武。神武起兵，保洛为帐内，从破尔朱兆于广阿及韩陵战。元象初，为西夏州刺史，以前后功，封安武县伯。又从战芒山，进爵为侯。文襄嗣事，历梁州刺史，进爵为公。齐受禅，加开府，仍为刺史。聚敛，为百姓所患。济南初，兼侍中，寻出为沧州刺史，封敷城郡王。以聚敛免官，夺王爵。卒，赠前官，追复本封。<br /><br />
</td></tr>

<tr><td class="t50">王峻传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王峻，字峦嵩，灵丘人也。明悟有干略。历事神武、文襄，为相府佐，赐爵北平男，除营州刺史。营州地接边贼，数为人患。峻至州，远设斥候，广置疑兵，贼不敢发，合境获安。先是，刺史陆士茂诈杀室韦八百余人，因此朝贡遂绝。至是，峻要其行路，大破之。虏其酋帅，厚加恩礼，放遣之。室韦遂献诚款，朝贡不绝，峻有力焉。蠕蠕主庵罗辰东徙，峻设伏大破之，于此遁走。历位尚书。河清中，位南道行台，坐违格私度禁物，并盗截军粮，有司定处斩刑，家口配没。诏决鞭一百，除名配甲坊，蠲其家口。武平初，卒于侍中，赠司空。<br /><br />
</td></tr>

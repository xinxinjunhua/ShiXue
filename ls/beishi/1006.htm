<tr><td class="t50">和洪传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　和洪，汝南人也。勇烈过人。仕周，以军功位车骑大将军、仪同三司。时龙州蛮任公忻、李国立等，聚众为乱，刺史独孤善不能御。朝议以洪有武略，代善为刺史。月余，斩公忻、国立等，皆平之。后从武帝平齐，位上仪同，赐爵北平侯，拜左勋曹下大夫。柱国王轨之禽吴明彻也，洪有功焉，加位开府，迁折冲中大夫。尉迟迥作乱，洪以行军总管从韦孝宽击之，以功封广武郡公。时东夏初平，物情尚梗，隋文帝以洪有威名，令领冀州事，甚得人和。后拜泗州刺史。属突厥寇边，诏洪为北道行军总管，击走之，追虏至碛而还。后迁徐州总管。卒。<br /><br />

<tr><td class="t50">刘雄传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘雄，字猛雀，临洮子城人也。少机辩，慷慨有大志，初为周文亲信，后拜中大夫，兼中书舍人，赐姓宇文氏。周孝闵帝践阼，加大都督。天和中，累迁骠骑大将军、开府仪同三司，封周昌侯。历位纳言、内史中大夫、候正。武帝尝从容谓曰：“古人云：‘富贵不归故乡，犹衣锦夜游。’”乃以雄为河州刺史。雄先已为本县令，复有此授，乡里荣之。及皇太子西征吐谷浑，雄自凉州从滕王道先入，功居多，加上开府仪同三司。从平并州，拜上大将军，进爵赵郡公。平邺城，进柱国。宣政元年，突厥寇幽州，雄战殁。赠亳州总管。<br /><br />
　　子升嗣。以雄死王事，授仪同大将军。<br /><br />

<tr><td class="t50">穆观传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　逐留弟观，字闼拔，袭崇爵。少以文艺知名。明元中，位为左卫将军，绾门下、中书，出纳诏命，及访旧事，未尝有遗漏。尚宜阳公主，拜驸马都尉，位太尉。<br /><br />
　　太武监国，观为右弼，出则统摄朝政，入则应对左右，事无巨细，皆关决焉。终日怡怡，无愠色。劳谦善诱，不以富贵骄人。泰常八年，暴疾薨，年三十五。<br /><br />
　　明元亲临其丧，悲动左右。赐以通身隐起金饰棺，丧礼一依安城王叔孙俊故事。赠宜都王，谥曰文成。太武即位，每与群臣谈宴，未尝不叹息殷勤，以为自道武以来，佐命勋臣文武兼济无及之者。<br /><br />

<tr><td class="t50">周澹传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　周澹，京兆鄠人也。多方术，尤善医药，遂为太医令。明元尝苦风头眩，淡疗得愈，由此位特进，赐爵成德侯。神瑞二年，京师饥，朝议迁都于邺，淡与博士祭酒崔浩进计，言不可。明元曰：“唯此二人，与朕意同。”诏赐淡、浩妾各一人。卒，谥曰恭。<br /><br />
</td></tr>

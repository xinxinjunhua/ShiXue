<tr><td class="t50">魏收家族传论</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　论曰：伯起少颇疏放，不拘行检，及折节读书，郁为伟器。学博今古，才极从横，体物之旨，尤为富赡，足以入相如之室，游尼父之门。勒成魏籍，追从班、马，婉而有则，繁而不芜，持论序言，钩深致远。但意存实录，好抵阴私，到于亲故之家，一无所说，不平之议，见于斯矣。王松年、李庶等并论正家门，未为谤议，遂凭附时宰，鼓动淫刑，庶因鞭挞而终，此公之失德。长贤思树风声，抗言昏俗，有朱子游之风。季景父子，雅业相传，抑弓冶之义。兰根道冠时英，功参霸业，亦一代之伟人也。<br /><br />

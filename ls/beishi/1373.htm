<tr><td class="t50">甄玄成传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　甄玄成，字敬平，中山人。博达经史，善属文。少为简文所知。以录事参军随詧镇襄阳，转中记室参军，颇参政事。以江陵甲兵殷盛，遂怀贰心，密书与元帝，具申诚款。或有得其书，送于詧。詧深信佛法，常愿不杀诵《法华经》人。玄成素诵《法华经》，遂以此获免。詧后见之，常曰：“甄公好得《法华经》力。”后位吏部尚书，有文集二十卷。<br /><br />
　　子诩，少沈敏，闲习政事。历中书舍人、尚书右丞。从琮入隋，授开府仪同三司，终于太府少卿。<br /><br />
</td></tr>

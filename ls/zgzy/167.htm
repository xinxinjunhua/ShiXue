<td class="t50">悔过3</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十七年，太宗谓侍臣曰：“人情之至痛者，莫过乎丧亲也。故孔子云：‘三年之丧，天下之通丧，自天子达於庶人也。’又曰：‘何必高宗？古之人皆然。’近代帝王遂行不逮汉文以日易月之制，甚乖於礼典。朕昨见徐幹《中论》《复三年丧》篇，义理甚深，恨不早见此书。所行大疏略，但知自咎自责，追悔何及！”因悲泣久之。<br /><br />
</td></tr>

<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观二年，关中旱，大饥。太宗谓侍臣曰：“水旱不调，皆为人君失德。朕德之不修，天当责朕，百姓何罪，而多遭困穷！闻有鬻男女者，朕甚愍焉。”乃遣御史大夫杜淹巡检，出御府金宝赎之，还其父母。<br /><br />

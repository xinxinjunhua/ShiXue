<tr>
<td class="t50" colspan="2">尊敬师傅1</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观三年，太子少师李纲，有脚疾，不堪践履。太宗赐步舆，令三卫轝入东宫，诏皇太子引上殿，亲拜之，大见崇重。纲为太子陈君臣父子之道，问寝视膳之方，理顺辞直，听者忘倦。太子尝商略古来君臣名教，竭忠尽节之事。<br /><br />
　　纲懔然曰：“讬六尺之孤，寄百里之命，古人以为难，纲以为易。”每吐论发言，皆辞色慷慨，有不可夺之志，太子未尝不耸然礼敬。<br /><br />
</td></tr>

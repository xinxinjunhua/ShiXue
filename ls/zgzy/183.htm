<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十一年，著作佐郎邓隆表请编次太宗文章为集。太宗谓曰：“朕若制事出令，有益於人者，史则书之，足为不朽。若事不师古，乱政害物，虽有词藻，终贻后代笑，非所须也。只如梁武帝父子及陈后主、隋炀帝，亦大有文集，而所为多不法，宗社皆须臾倾覆。凡人主惟在德行，何必要事文章耶？”竟不许。<br /><br />

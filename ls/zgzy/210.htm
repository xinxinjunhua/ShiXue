<td class="t50">赦令1</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观七年，太宗谓侍臣曰：“天下愚人者多，智人者少，智者不肯为恶，愚人好犯宪章。凡赦宥之恩，惟及不轨之辈。古语云：‘小人之幸，君子之不幸。’‘一岁再赦，善人喑哑。’凡养稂莠者伤禾稼，惠奸宄者贼良人，昔‘文王作罚，刑兹无赦。’又蜀先主尝谓诸葛亮曰：‘吾周旋陈元方、郑康成之间，每见启告理乱之道备矣，曾不语赦。’故诸葛亮理蜀十年不赦，而蜀大化。梁武帝每年数赦，卒至倾败。夫谋小仁者，大仁之贼，故我有天下已来，绝不放赦。今四海安宁，礼义兴行，非常之恩，弥不可数。将恐愚人常冀侥幸，惟欲犯法，不能改过。”<br /><br />

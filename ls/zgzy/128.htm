<td class="t50">公平6</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刑部尚书张亮坐谋反下狱，诏令百官议之，多言亮当诛，惟殿中少监李道裕奏亮反形未具，明其无罪。太宗既盛怒，竟杀之。俄而刑部侍郎有阙，令宰相妙择其人，累奏不可。<br /><br />
　　太宗曰：“吾已得其人矣，往者李道裕议张亮云‘反形未具’，可谓公平矣。当时虽不用其言，至今追悔。”遂授道裕刑部侍郎。<br /><br />

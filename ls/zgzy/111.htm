<td class="t50">论忠义8</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观九年，萧瑀为尚书左仆射。尝因宴集，太宗谓房玄龄曰：“武德六年已后，太上皇有废立之心，我当此日，不为兄弟所容，实有功高不赏之惧。萧瑀不可以厚利诱之，不可以刑戮惧之，真社稷臣也。”乃赐诗曰：“疾风知劲草，板荡识诚臣。”<br /><br />
　　瑀拜谢曰：“臣特蒙诫训，许臣以忠谅，虽死之日，犹生之年。”<br /><br />

<td class="t50">崇儒学6</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　太宗尝谓中书令岑文本曰：“夫人虽禀定性，必须博学以成其道，亦犹蜃性含水，待月光而水垂；木性怀火，待燧动而焰发；人性含灵，待学成而为美。是以苏秦刺股，董生垂帷。不勤道艺，则其名不立。”<br /><br />
　　文本对曰：“夫人性相近，情则迁移，必须以学饬情以成其性。《礼》云：‘玉不琢不成器，人不学不知道。’所以古人勤於学问，谓之懿德。”<br /><br />

<td class="t50">慎所好2</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观二年，太宗谓侍臣曰：“神仙事本是虚妄，空有其名。秦始皇非分爱好，为方士所诈，乃遣童男童女数千人，随其入海求神仙。方士避秦苛虐，因留不归，始皇犹海侧踟蹰以待之，还至沙丘而死。汉武帝为求神仙，乃将女嫁道术之人，事既无验，便行诛戮。据此二事，神仙不烦妄求也。”<br /><br />

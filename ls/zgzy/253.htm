<td class="t50">慎终2</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观六年，太宗谓侍臣曰：“自古人君为善者，多不能坚守其事。汉高祖，泗上一亭长耳，初能拯危诛暴，以成帝业，然更延十数年，纵逸之败，亦不可保。何以知之？孝惠为嫡嗣之重，温恭仁孝，而高帝惑於爱姬之子，欲行废立；萧何、韩信，功业既高，萧既妄系，韩亦滥黜，自馀功臣黥布之辈，惧而不安，至於反逆。君臣父子之间悖谬若此，岂非难保之明验也？朕所以不敢恃天下之安，每思危亡以自戒惧，用保其终。”<br /><br />
</td></tr>

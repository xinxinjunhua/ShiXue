<td class="t50">俭约6</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　岑文本为中书令，宅卑湿，无帷帐之饰，有劝其营产业者，文本叹曰：“吾本汉南一布衣耳，竟无汗马之劳，徒以文墨，致位中书令，斯亦极矣。荷俸禄之重，为惧已多，更得言产业乎？”言者叹息而退。<br /><br />
</td></tr>

<td class="t50">刑法7</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十四年，戴州刺史贾崇以所部有犯十恶者，被刺史劾奏。太宗谓侍臣曰：“昔陶唐大圣，柳下惠大贤，其子丹朱甚不肖，其弟盗跖为巨恶。夫以圣贤之训，父子兄弟之亲，尚不能使陶染变革，去恶从善。今遣刺史，化被下人，咸归善道，岂可得也。若令缘此皆被贬降，或恐递相掩蔽，罪人斯失。诸州有犯十恶者，刺史不须从坐，但令明加纠访科罪，庶可肃清奸恶。”<br /><br />
</td></tr>

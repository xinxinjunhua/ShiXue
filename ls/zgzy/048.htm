<td class="t50" colspan="2">纳谏10</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　太宗尝怒苑西监穆裕，命於朝堂斩之，时高宗为皇太子，遽犯颜进谏，太宗意乃解。司徒长孙无忌曰：“自古太子之谏，或乘间从容而言。今陛下发天威之怒，太子申犯颜之谏，诚古今未有。”太宗曰：“夫人久相与处，自然染习。自朕御天下，虚心正直，即有魏徵朝夕进谏，自徵云亡，刘洎、岑文本、马周、褚遂良等继之。皇太子幼在朕膝前，每见朕心说谏者，因染以成性，故有今日之谏。”<br /><br />
</td></tr>

<td class="t50">悔过2</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观中，太子承乾多不修法度，魏王泰尤以才能为太宗所重，特诏泰移居武德殿。<br /><br />
　　魏徵上疏谏曰：“魏王既是陛下爱子，须使知定分，常保安全，每事抑其骄奢，不处嫌疑之地也。今移居此殿，使在东宫之西，海陵昔居，时人以为不可，虽时移事异，犹恐人之多言。又王之本心，亦不宁息，既能以宠为惧，伏愿成人之美。”<br /><br />
　　太宗曰：“我几不思量，甚大错误。”遂遣泰归於本第。<br /><br />

<td class="t50">征伐11</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　太宗《帝范》曰：“夫兵甲者，国家凶器也。土地虽广，好战则人凋；中国虽安，忘战则民殆。凋非保全之术，殆非拟寇之方，不可以全除，不可以常用。故农隙讲武，习威仪也；三年治兵，辨等列也。是以勾践轼蛙，卒成霸业；徐偃弃武，终以丧邦。何也？越习其威，徐忘其务也。孔子曰：‘以不教人战，是谓弃之。’故知弧矢之威，以利天下，此用兵之机也。”<br /><br />

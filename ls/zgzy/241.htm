<td class="t50">行幸3</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十三年，太宗谓魏徵等曰：“隋炀帝承文帝馀业，海内殷阜，若能常处关中，岂有倾败？遂不顾百姓，行幸无期，径往江都，不纳董纯、崔象等谏诤，身戮国灭，为天下笑。虽复帝祚长短，委以玄天；而福善祸淫，亦由人事。朕每思之，若欲君臣长久，国无危败，君有违失，臣须极言。朕闻卿等规谏，纵不能当时即从，再三思审，必择善而用之。”<br /><br />

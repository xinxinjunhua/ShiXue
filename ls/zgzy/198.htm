<td class="t50">务农1</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观二年，太宗谓侍臣曰：“凡事皆须务本，国以人为本，人以衣食为本，凡营衣食，以不失时为本。夫不失时者，在人君简静乃可致耳。若兵戈屡动，土木不息，而欲不夺农时，其可得乎？”<br /><br />
　　王珪曰：“昔秦皇、汉武，外则穷极兵戈，内则崇侈宫室，人力既竭，祸难遂兴，彼岂不欲安人乎？失所以安人之道也。亡隋之辙，殷鉴不远，陛下亲承其弊，知所以易之，然在初则易，终之实难。伏愿慎终如始，方尽其美。”<br /><br />
　　太宗曰：“公言是也。夫安人宁国，惟在於君，君无为则人乐，君多欲则人苦，朕所以抑情损欲，克己自励耳。”<br /><br />

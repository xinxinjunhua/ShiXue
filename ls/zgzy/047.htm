<td class="t50" colspan="2">纳谏9</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十八年，太宗谓长孙无忌等曰：“夫人臣之对帝王，多顺从而不逆，甘言以取容。朕今发问，不得有隐，宜以次言朕过失。”长孙无忌、唐俭等皆曰：“陛下圣化道致太平，以臣观之，不见其失。”黄门侍郎刘洎对曰：“陛下拨乱创业，实功高万古，诚如无忌等言。然顷有人上书，辞理不称者，或对面穷诘，无不惭退。恐非奖进言者。”太宗曰：“此言是也，当为卿改之。”<br /><br />

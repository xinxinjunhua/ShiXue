<td class="t50" colspan="2">择官9</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十三年，太宗谓侍臣曰：“朕闻太平后必有大乱，大乱后必有太平。大乱之后，即是太平之运也。能安天下者，惟在用得贤才。公等既不知贤，朕又不可遍识。日复一日，无得人之理。今欲令人自举，於事何如？”<br /><br />
　　魏徵对曰：“知人者智，自知者明。知人既以为难，自知诚亦不易。且愚暗之人，皆矜能伐善，恐长浇竞之风，不可令其自举。”<br /><br />

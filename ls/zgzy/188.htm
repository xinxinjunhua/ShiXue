<td class="t50">礼乐3</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观四年，太宗谓侍臣曰：“比闻京城士庶居父母丧者，乃有信巫书之言，辰日不哭，以此辞於吊问，拘忌辍哀，败俗伤风，极乖人理。宜令州县教导，齐之以礼典。”<br /><br />

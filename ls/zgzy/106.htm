<td class="t50">论忠义3</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观二年，将葬故息隐王建成、海陵王元吉，尚书右丞魏徵与黄门侍郎王珪，请预陪送。上表曰：“臣等昔受命太上，委质东宫，出入龙楼，垂将一纪。前宫结衅宗社，得罪人神，臣等不能死亡，甘从夷戮，负其罪戾，寘录周行，徒竭生涯，将何上报？陛下德光四海，道冠前王，陟冈有感，追怀棠棣，明社稷之大义，申骨肉之深恩，卜葬二王，远期有日。臣等永惟畴昔，忝曰旧臣，丧君有君，虽展事居之礼；宿草将列，未申送往之哀。瞻望九原，义深凡百，望於葬日，送至墓所。”<br /><br />
　　太宗义而许之，於是宫府旧僚吏，尽令送葬。<br /><br />

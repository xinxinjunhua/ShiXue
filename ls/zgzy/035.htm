<td class="t50" colspan="2">求谏8</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观八年，太宗谓侍臣曰：“朕每閒居静坐，则自内省。恒恐上不称天心，下为百姓所怨。但思正人匡谏，欲令耳目外通，下无怨滞。又比见人来奏事者，多有怖慑，言语致失次第。寻常奏事，情犹如此，况欲谏诤，必当畏犯逆鳞。所以每有谏者，纵不合朕心，朕亦不以为忤。若即嗔责，深恐人怀战惧，岂肯更言！”<br /><br />

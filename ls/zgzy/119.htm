　　虞世南，初仕隋，历起居舍人，宇文化及杀逆之际，其兄世基时为内史侍郎，将被诛，世南抱持号泣，请以身代死，化及竟不纳。世南自此哀毁骨立者数载，时人称重焉。<br /><br />

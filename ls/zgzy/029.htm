<td class="t50" colspan="2">求谏2</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观元年，太宗谓侍臣曰：“正主任邪臣，不能致理，正臣事邪主，亦不能致理。惟君臣相遇，有同鱼水，则海内可安。朕虽不明，幸诸公数相匡救，冀凭直言鲠议，致天下太平。”<br /><br />
　　谏议大夫王珪对曰：“臣闻木从绳则正，后从谏则圣。是故古者圣主必有争臣七人，言而不用，则相继以死。陛下开圣虑，纳刍荛，愚臣处不讳之朝，实愿罄其狂瞽。”<br /><br />
　　太宗称善，诏令自是宰相入内平章国计，必使谏官随入，预闻政事。有所开说，必虚己纳之。<br /><br />

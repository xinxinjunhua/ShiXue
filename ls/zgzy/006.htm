<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观初，太宗谓萧瑀曰：“朕少好弓矢，自谓能尽其妙。近得良弓十数，以示弓工。乃曰：‘皆非良材也。’朕问其故，工曰：‘木心不正，则脉理皆邪，弓虽刚劲而遣箭不直，非良弓也。’朕始悟焉。朕以弧矢定四方，用弓多矣，而犹不得其理。况朕有天下之日浅，得为理之意，固未及於弓，弓犹失之，而况於理乎？”<br /><br />
　　自是诏京官五品以上，更宿中书内省。每召见，皆赐坐与语，询访外事，务知百姓利害，政教得失焉。<br /><br />

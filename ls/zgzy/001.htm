<td class="t50" colspan="2">君道1</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观初，太宗谓侍臣曰：“为君之道，必须先存百姓，若损百姓以奉其身，犹割股以啖腹，腹饱而身毙。若安天下，必须先正其身，未有身正而影曲，上治而下乱者。朕每思伤其身者不在外物，皆由嗜欲以成其祸。若躭嗜滋味，玩悦声色，所欲既多，所损亦大，既妨政事，又扰生民。且复出一非理之言，万姓为之解体，怨讟既作，离叛亦兴。朕每思此，不敢纵逸。”谏议大夫魏徵对曰：“古者圣哲之主，皆亦近取诸身，故能远体诸物。昔楚聘詹何，问其理国之要。詹何对以修身之术。楚王又问理国何如？詹何曰：‘未闻身理而国乱者。’陛下所明，实同古义。”<br /><br />

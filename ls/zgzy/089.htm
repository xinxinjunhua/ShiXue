<td class="t50" colspan="2">教戒太子诸王1</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观七年，太宗谓太子左庶子于志宁、杜正伦曰：<br /><br />
　　“卿等辅导太子，常须为说百姓间利害事。朕年十八，犹在人间，百姓艰难，无不谙练。及居帝位，每商量处置，或时有乖疏，得人谏诤，方始觉悟。若无忠谏者为说，何由行得好事？况太子生长深宫，百姓艰难，都不闻见乎？且人主安危所系，不可辄为骄纵。但出敕云，有谏者即斩，必知天下士庶无敢更发直言。故克己励精，容纳谏诤，卿等常须以此意共其谈说。每见有不是事，宜极言切谏，令有所裨益也。”<br /><br />
</td></tr>

<td class="t50">贪鄙3</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观四年，太宗谓公卿曰：“朕终日孜孜，非但忧怜百姓，亦欲使卿等长守富贵。天非不高，地非不厚，朕常兢兢业业，以畏天地。卿等若能小心奉法，常如朕畏天地，非但百姓安宁，自身常得驩乐。古人云：‘贤者多财损其志，愚者多财生其过。’此言可为深诫。若徇私贪浊，非止坏公法，损百姓，纵事未发闻，中心岂不常惧？恐惧既多，亦有因而致死。大丈夫岂得苟贪财物，以害及身命，使子孙每怀愧耻耶？卿等宜深思此言。”<br /><br />

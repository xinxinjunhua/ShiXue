<td class="t50" colspan="2">政体3</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观二年，太宗问黄门侍郎王珪曰：“近代君臣治国，多劣於前古，何也？”<br /><br />
　　对曰：“古之帝王为政，皆志尚清静，以百姓之心为心。近代则唯损百姓以適其欲，所任用大臣，复非经术之士。汉家宰相，无不精通一经，朝廷若有疑事，皆引经决定，由是人识礼教，理致太平。近代重武轻儒，或参以法律，儒行既亏，淳风大坏。”<br /><br />
　　太宗深然其言。自此百官中有学业优长、兼识政体者，多进其阶品。累加迁擢焉。<br /><br />

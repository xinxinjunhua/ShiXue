<td class="t50" colspan="2">求谏6</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观六年，太宗以御史大夫韦挺、中书侍郎杜正伦、秘书少监虞世南、著作郎姚思廉等上封事称旨，召而谓曰：“朕历观自古人臣立忠之事，若值明主，便宜尽诚规谏，至如龙逄、比干，不免孥戮。为君不易，为臣极难。朕又闻龙可扰而驯，然喉下有逆鳞。卿等遂不避犯触，各进封事。常能如此，朕岂虑宗社之倾败！每思卿等此意，不能暂忘，故设宴为乐。”仍赐绢有差。<br /><br />

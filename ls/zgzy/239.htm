<td class="t50">行幸1</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观初，太宗谓侍臣曰：“隋炀帝广造宫室，以肆行幸，自西京至东都，离宫别馆，相望道次，乃至并州、涿郡，无不悉然。驰道皆广数百步，种树以饰其傍。人力不堪，相聚为贼。逮至末年，尺土一人，非复己有。以此观之，广宫室，好行幸，竟有何益？此皆朕耳所闻，目所见，深以自诫。故不敢轻用人力，惟令百姓安静，不有怨叛而已。”<br /><br />

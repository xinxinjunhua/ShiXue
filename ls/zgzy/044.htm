<td class="t50" colspan="2">纳谏6</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观八年，陕县丞皇甫德参上书忤旨，太宗以为讪谤。侍中魏徵进言曰：“昔贾谊当汉文帝上书云云‘可为痛哭者一，可为长叹息者六。’自古上书，率多激切。若不激切，则不能起人主之心。激切即似讪谤，惟陛下详其可否。”<br /><br />
　　太宗曰：“非公无能道此者。”令赐德参帛二十段。<br /><br />

<td class="t50">礼乐6</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　礼部尚书王珪子敬直，尚太宗女南平公主。珪曰：“《礼》有妇见舅姑之仪，自近代风俗弊薄，公主出降，此礼皆废。主上钦明，动循法制，吾受公主谒见，岂为身荣，所以成国家之美耳。”遂与其妻就位而坐，令公主亲执巾，行盥馈之道，礼成而退。<br /><br />
　　太宗闻而称善。是后公主下降有舅姑者，皆遣备行此礼。<br /><br />

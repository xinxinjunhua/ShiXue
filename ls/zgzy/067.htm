<td class="t50" colspan="2">择官2</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观二年，太宗谓房玄龄、杜如晦曰：“公为仆射，当助朕忧劳，广闻耳目，求访贤哲。比闻公等听受辞讼，日有数百。此则读符牒不暇，安能助朕求贤哉？”<br /><br />
　　因敕尚书省，细碎务皆付左右丞，惟冤滞大事合闻奏者，关於仆射。<br /><br />

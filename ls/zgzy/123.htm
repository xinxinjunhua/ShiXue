<td class="t50">公平1</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　太宗初即位，中书令房玄龄奏言：“秦府旧左右未得官者，并怨前宫及齐府左右处分之先己。”太宗曰：“古称至公者，盖谓平恕无私。丹朱、商均，子也，而尧、舜废之。管叔、蔡叔，兄弟也，而周公诛之。故知君人者，以天下为公，无私於物。昔诸葛孔明，小国之相，犹曰‘吾心如称，不能为人作轻重’，况我今理大国乎？朕与公等衣食出于百姓，此则人力已奉於上，而上恩未被於下，今所以择贤才者，盖为求安百姓也。用人但问堪否，岂以新故异情？凡一面尚且相亲，况旧人而顿忘也！才若不堪，亦岂以旧人而先用？今不论其能不能，而直言其嗟怨，岂是至公之道耶？”<br /><br />

<td class="t50">辩兴亡4</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观九年，北蕃归朝人奏：“突厥内大雪，人饥，羊马并死。中国人在彼者，皆入山作贼，人情大恶。”<br /><br />
　　太宗谓侍臣曰：“观古人君，行仁义，任贤良则理；行暴乱，任小人则败。突厥所信任者，并共公等见之，略无忠正可取者。颉利复不忧百姓，恣情所为，朕以人事观之，亦何可久矣？”<br /><br />
　　魏徵进曰：“昔魏文侯问李克，诸侯谁先亡？克曰：‘吴先亡。’文侯曰：‘何故？’克曰：‘数战数胜，数胜则主骄，数战则民疲，不亡何待？’颉利逢隋末中国丧乱，遂恃众内侵，今尚不息，此其必亡之道。”太宗深然之。<br /><br />

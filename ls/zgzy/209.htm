<td class="t50">刑法8</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十六年，太宗谓大理卿孙伏伽曰：“夫作甲者欲其坚，恐人之伤；作箭者欲其锐，恐人不伤。何则？各有司存，利在称职故也。朕常问法官刑罚轻重，每称法网宽於往代。仍恐主狱之司，利在杀人，危人自达，以钓声价，今之所忧，正在此耳！深宜禁止，务在宽平。”<br /><br />
</td></tr>

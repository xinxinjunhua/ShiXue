<td class="t50">礼乐7</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十二年，太宗谓侍臣曰：“古者诸侯入朝，有汤沐之邑，刍禾百车，待以客礼。昼坐正殿，夜设庭燎，思与相见，问其劳苦。又汉家京城亦为诸郡立邸舍。顷闻考使至京者，皆赁房以坐，与商人杂居，才得容身而已。既待礼之不足，必是人多怨叹，岂肯竭情於共理哉。”乃令就京城闲坊，为诸州考使各造邸第。<br /><br />
　　及成，太宗亲幸观焉。<br /><br />

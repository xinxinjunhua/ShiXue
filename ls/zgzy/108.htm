<td class="t50">论忠义5</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观六年，授左光禄大夫陈叔达礼部尚书，因谓曰：“武德中，公曾进直言於太上皇，明朕有克定大功，不可黜退云。朕本性刚烈，若有抑挫，恐不胜忧愤，以致疾毙之危。今赏公忠謇，有此迁授。”<br /><br />
　　叔达对曰：“臣以隋氏父子自相诛戮，以至灭亡，岂容目睹覆车，不改前辙？臣所以竭诚进谏。”<br /><br />
　　太宗曰：“朕知公非独为朕一人，实为社稷之计。”<br /><br />

<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观七年，工部尚书段纶奏进巧人杨思齐至，太宗令试，纶遣造傀儡戏具。太宗谓纶曰：“所进巧匠，将供国事，卿令先造此物，是岂百工相戒无作奇巧之意耶？”乃诏削纶阶级，并禁断此戏。<br /><br />

<td class="t50">崇儒学5</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观四年，太宗以经籍去圣久远，文字讹谬，诏前中书侍郎颜师古於秘书省考定《五经》。及功毕，复诏尚书左仆射房玄龄集诸儒重加详议。时诸儒传习师说，舛谬已久，皆共非之，异端蜂起。而师古辄引晋、宋已来古本，随方晓答，援据详明，皆出其意表，诸儒莫不叹服。太宗称善者久之，赐帛五百匹，加授通直散骑常侍，颁其所定书於天下，令学者习焉。太宗又以文学多门，章句繁杂，诏师古与国子祭酒孔颖达等诸儒，撰定《五经》疏义，凡一百八十卷，名曰《五经正义》，付国学施行。<br /><br />

<td class="t50" colspan="2">择官7</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十一年，侍御史马周上疏曰：“治天下者以人为本。欲令百姓安乐，惟在刺史、县令。县令既众，不能皆贤，若每州得良刺史，则合境苏息。天下刺史悉称圣意，则陛下可端拱岩廊之上，百姓不虑不安。自古郡守、县令，皆妙选贤德，欲有迁擢为将相，必先试以临人，或从二千石入为丞相及司徒、太尉者。朝廷必不可独重内臣，外刺史、县令，遂轻其选。所以百姓未安，殆由於此。”<br /><br />
　　太宗因谓侍臣曰：“刺史朕当自简择；县令诏京官五品已上，各举一人。”<br /><br />

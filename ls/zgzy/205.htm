<td class="t50">刑法4</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观五年，诏曰：“在京诸司，比来奏决死囚，虽云三覆，一日即了，都未暇审思，三奏何益？纵有追悔，又无所及。自今后，在京诸司奏决死囚，宜二日中五覆奏，天下诸州三覆奏。”<br /><br />
　　又手诏敕曰：“比来有司断狱，多据律文，虽情在可矜而不敢违法，守文定罪，或恐有冤。自今门下省复有据法合死，而情在可矜者，宜录状奏闻。”<br /><br />

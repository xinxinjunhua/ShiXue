<td class="t50" colspan="2">君臣鉴戒3</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观六年，太宗谓侍臣曰：“朕闻周、秦初得天下，其事不异。然周则惟善是务，积功累德，所以能保八百之基。秦乃恣其奢淫，好行刑罚，不过二世而灭。岂非为善者福祚延长，为恶者降年不永？朕又闻桀、纣，帝王也，以匹夫比之，则以为辱。颜、闵匹夫也，以帝王比之，则以为荣。此亦帝王深耻也。朕每将此事以为鉴戒，常恐不逮，为人所笑。”<br /><br />
　　魏徵对曰：“臣闻鲁哀公谓孔子曰：‘有人好忘者，移宅乃忘其妻。’孔子曰：‘又有好忘甚於此者，丘见桀、纣之君乃忘其身。’愿陛下每以此为虑，庶免后人笑尔！”<br /><br />

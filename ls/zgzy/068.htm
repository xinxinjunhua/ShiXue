<td class="t50" colspan="2">择官3</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观二年，太宗谓侍臣曰：“朕每夜恒思百姓间事，或至夜半不寐。惟恐都督、刺史堪养百姓以否。故於屏风上录其姓名，坐卧恒看，在官如有善事，亦具列於名下。朕居深宫之中，视听不能及远，所委者惟都督、刺史，此辈实治乱所系，尤须得人。”<br /><br />
</td></tr>

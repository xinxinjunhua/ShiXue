<td class="t50">慎言语1</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观二年，太宗谓侍臣曰：“朕每日坐朝，欲出一言，即思此一言於百姓有利益否，所以不敢多言。”<br /><br />
　　给事中兼知起居事杜正伦进曰：“君举必书，言存左史。臣职当兼修起居注，不敢不尽愚直。陛下若一言乖於道理，则千载累於圣德，非止当今损於百姓，愿陛下慎之。”<br /><br />
　　太宗大悦，赐彩百段。<br /><br />

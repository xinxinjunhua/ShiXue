<td class="t50" colspan="2">择官11</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观二十一年，太宗在翠微宫，授司农卿李纬户部尚书。房玄龄是时留守京城。会有自京师来者，太宗问曰：“玄龄闻李纬拜尚书，如何？”<br /><br />
　　对曰：“但云‘李纬大好髭须’，更无他语。”由是改授洛州刺史。<br /><br />

<td class="t50" colspan="2">政体6</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观五年，太宗谓侍臣曰：“治国与养病无异也。病人觉愈，弥须将护，若有触犯，必至殒命。治国亦然，天下稍安，尤须兢慎，若便骄逸，必至丧败。今天下安危，系之於朕。故日慎一日，虽休勿休。然耳目股肱，寄於卿辈，既义均一体，宜协力同心，事有不安，可极言无隐。傥君臣相疑，不能脩尽肝膈，实为国之大害也。”<br /><br />

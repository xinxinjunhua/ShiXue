<td class="t50">礼乐12</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观七年，太常卿萧瑀奏言：“今《破陈乐舞》，天下之所共传，然美盛德之形容，尚有所未尽。前后之所破刘武周、薛举、窦建德、王世充等，臣愿图其形状，以写战胜攻取之容。”<br /><br />
　　太宗曰：“朕当四方未定，因为天下救焚拯溺，故不获已，乃行战伐之事，所以人间遂有此舞，国家因兹亦制其曲。然雅乐之容，止得陈其梗概，若委曲写之，则其状易识。朕以见在将相，多有曾经受彼驱使者，既经为一日君臣，今若重见其被擒获之势，必当有所不忍，我为此等，所以不为也。”<br /><br />
　　萧瑀谢曰：“此事非臣思虑所及。”<br /><br />

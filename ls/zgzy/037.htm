<td class="t50" colspan="2">求谏10</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十六年，太宗谓房玄龄等曰：“自知者明，信为难矣。如属文之士，伎巧之徒，皆自谓己长，他人不及。若名工文匠，商略诋诃，芜词拙迹，於是乃见。由是言之，人君须得匡谏之臣，举其愆过。一日万机，一人听断，虽复忧劳，安能尽善？常念魏徵随事谏正，多中朕失，如明镜鉴形，美恶必见。”<br /><br />
　　因举觞赐玄龄等数人勖之。<br /><br />

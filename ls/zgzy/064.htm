<td class="t50" colspan="2">君臣鉴戒6</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十六年，太宗问特进魏徵曰：<br /><br />
　　“朕克己为政，仰企前烈。至於积德、累仁、丰功、厚利，四者常以为称首，朕皆庶几自勉。人苦不能自见，不知朕之所行，何等优劣？”徵对曰：“德、仁、功、利，陛下兼而行之。然则内平祸乱，外除戎狄，是陛下之功。安诸黎元，各有生业，是陛下之利。由此言之，功利居多，惟德与仁，愿陛下自强不息，必可致也。”<br /><br />

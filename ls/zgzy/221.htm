<td class="t50">辩兴亡3</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观五年，太宗谓侍臣曰：“天道福善祸淫，事犹影响。昔启人亡国来奔，隋文帝不吝粟帛，大兴士众营卫安置，乃得存立。既而强富，子孙不思念报德，才至始华，即起兵围炀帝於雁门。及隋国乱，又恃强深入，遂使昔安立其国家者，身及子孙并为颉利兄弟之所屠戮，今颉利破亡，岂非背恩忘义所至也！”<br /><br />
　　群臣咸曰：“诚如圣旨。”<br /><br />

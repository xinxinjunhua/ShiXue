<td class="t50">贪鄙6</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十六年，太宗谓侍臣曰：“古人云：‘鸟栖於林，犹恐其不高，复巢於木末；鱼藏於水，犹恐其不深，复穴於窟下。然而为人所获者，皆由贪饵故也。’今人臣受任，居高位，食厚禄，当须履忠正，蹈公清，则无灾害，长守富贵矣。古人云：‘祸福无门，惟人所召。’然陷其身者，皆为贪冒财利，与夫鱼鸟何以异哉？卿等宜思此语为鉴诫。”<br /><br />

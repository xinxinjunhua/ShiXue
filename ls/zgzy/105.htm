<td class="t50">论忠义2</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观元年，太宗尝从容言及隋亡之事，慨然叹曰：“姚思廉不惧兵刃，以明大节，求诸古人，亦何以加也！”思廉时在洛阳，因寄物三百段，并遗其书曰：“想卿忠节之风，故有斯赠。”<br /><br />
　　初，大业末，思廉为隋代王侑侍读，及义旗克京城时，代王府僚多骇散，惟思廉侍王，不离其侧。兵士将升殿，思廉厉声谓曰：“唐公举义兵，本匡王室，卿等不宜无礼於王！”众服其言，於是稍却，布列阶下。须臾，高祖至，闻而义之，许其扶代王侑至顺阳閤下，思廉泣拜而去。<br /><br />
　　见者咸叹曰：“忠烈之士，仁者有勇，此之谓乎！”<br /><br />

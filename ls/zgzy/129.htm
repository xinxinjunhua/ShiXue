<td class="t50">公平7</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观初，太宗谓侍臣曰：“朕今孜孜求士，欲专心政道，闻有好人，则抽擢驱使。而议者多称‘彼者皆宰臣亲故’，但公等至公，行事勿避此言，便为形迹。古人‘内举不避亲，外举不避雠’，而为举得其真贤故也。但能举用得才，虽是子弟及有雠嫌，不得不举。”<br /><br />
</td></tr>

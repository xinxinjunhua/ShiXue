<td class="t50">崇儒学3</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十四年诏曰：“梁皇侃、褚仲都，周熊安生、沈重，陈沈文阿、周弘正、张讥，隋何妥、刘炫，并前代名儒，经术可纪，加以所在学徒，多行其讲疏，宜加优赏，以劝后生，可访其子孙见在者，录姓名奏闻。”<br /><br />
　　二十一年诏曰：“左丘明、卜子夏、公羊高、穀梁赤、伏胜、高堂生、戴圣、毛苌、孔安国、刘向、郑众、杜子春、马融、卢植、郑玄、服虔、何休、王肃、王弼、杜预、范甯等二十有一人，并用其书，垂於国胄，既行其道，理合褒崇，自今有事於太学，可并配享尼父庙堂。”<br /><br />
　　——其尊儒重道如此。<br /><br />

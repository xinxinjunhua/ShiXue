<td class="t50">诚信4</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十七年，太宗谓侍臣曰：“传称‘去食存信’，孔子曰：‘民无信不立。’昔项羽既入咸阳，已制天下，向能力行仁信，谁夺耶？”<br /><br />
　　房玄龄对曰：“仁、义、礼、智、信，谓之五常，废一不可。能勤行之，甚有裨益。殷纣狎侮五常，武王夺之，项氏以无信为汉高祖所夺，诚如圣旨。”<br /><br />

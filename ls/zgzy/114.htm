<td class="t50">论忠义11</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十二年，太宗幸蒲州，因诏曰：“隋故鹰击郎将尧君素，往在大业，受任河东，固守忠义，克终臣节。虽桀犬吠尧，有乖倒戈之志，疾风劲草，实表岁寒之心。爰践兹境，追怀往事，宜锡宠命，以申劝奖。可追赠蒲州刺史，仍访其子孙以闻。”<br /><br />

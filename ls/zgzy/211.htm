<td class="t50">赦令2</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十年，太宗谓侍臣曰：“国家法令，惟须简约，不可一罪作数种条。格式既多，官人不能尽记，更生奸诈，若欲出罪即引轻条，若欲入罪即引重条。数变法者，实不益道理，宜令审细，毋使互文。”<br /><br />

<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观二年，太宗问魏徵曰：“何谓为明君暗君？”<br /><br />
　　徵曰：“君之所以明者，兼听也；其所以暗者，偏信也。《诗》云：‘先人有言，询於刍荛。’昔唐、虞之理，辟四门，明四目，达四聪。是以圣无不照，故共、鲧之徒，不能塞也；靖言庸回，不能惑也。秦二世则隐藏其身，捐隔疏贱而偏信赵高，及天下溃叛，不得闻也。梁武帝偏信朱异，而侯景举兵向阙，竟不得知也。隋炀帝偏信虞世基，而诸贼攻城剽邑，亦不得知也。是故人君兼听纳下，则贵臣不得壅蔽，而下情必得上通也。”<br /><br />
　　太宗甚善其言。<br /><br />

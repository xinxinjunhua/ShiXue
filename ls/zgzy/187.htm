<td class="t50">礼乐2</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观二年，中书舍人高季辅上疏曰：“窃见密王元晓等俱是懿亲，陛下友爱之怀，义高古昔，分以车服，委以藩维，须依礼仪，以副瞻望。比见帝子拜诸叔，诸叔亦即答拜，王爵既同，家人有礼，岂合如此颠倒昭穆？伏愿一垂训诫，永循彝则。”<br /><br />
　　太宗乃诏元晓等，不得答吴王恪、魏王泰兄弟拜。<br /><br />

<td class="t50">悔过1</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观二年，太宗谓房玄龄曰：“为人大须学问。朕往为群凶未定，东西征讨，躬亲戎事，不暇读书。比来四海安静，身处殿堂，不能自执书卷，使人读而听之。君臣父子，政教之道，共在书内。古人云：‘不学，墙面，莅事惟烦。’不徒言也。却思少小时行事，大觉非也。”<br /><br />
</td></tr>

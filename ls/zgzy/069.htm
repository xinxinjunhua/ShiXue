<td class="t50" colspan="2">择官4</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观二年，太宗谓右仆射封德彝曰：“致安之本，惟在得人。比来命卿举贤，未尝有所推荐。天下事重，卿宜分朕忧劳，卿既不言，朕将安寄？”<br /><br />
　　对曰：“臣愚岂敢不尽情，但今未见有奇才异能。”<br /><br />
　　太宗曰：“前代明王使人如器，皆取士於当时，不借才於异代。岂得待梦傅说，逢吕尚，然后为政乎？且何代无贤，但患遗而不知耳！”<br /><br />
　　德彝惭赧而退。<br /><br />

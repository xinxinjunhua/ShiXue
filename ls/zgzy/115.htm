<td class="t50">论忠义12</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十二年，太宗谓中书侍郎岑文本曰：“梁、陈名臣，有谁可称？复有子弟堪招引否？”<br /><br />
　　文本奏言：“隋师入陈，百司奔散，莫有留者，惟尚书仆射袁宪独在其主之傍。王世充将受隋禅，群僚表请劝进，宪子国子司业承家，讬疾独不署名。此之父子，足称忠烈。承家弟承序，今为建昌令。清贞雅操，实继先风。”<br /><br />
　　由是召拜晋王友，兼令侍读，寻授弘文馆学士。<br /><br />

<td class="t50">诚信3</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　太宗尝谓长孙无忌等曰：“朕即位之初，有上书者非一，或言人主必须威权独任，不得委任群下；或欲耀兵振武，慑服四夷。惟有魏徵劝朕‘偃革兴文，布德施惠，中国既安，远人自服’。朕从此语，天下大宁，绝域君长，皆来朝贡，九夷重译，相望於道。凡此等事，皆魏徵之力也。朕任用，岂不得人？”<br /><br />
　　徵拜谢曰：“陛下圣德自天，留心政术。实以庸短，承受不暇，岂有益於圣明？”<br /><br />

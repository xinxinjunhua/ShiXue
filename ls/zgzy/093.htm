<td class="t50" colspan="2">教戒太子诸王5</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十年，太宗谓房玄龄曰：“朕历观前代拨乱创业之主，生长人间，皆识达情伪，罕至於败亡。逮乎继世守文之君，生而富贵，不知疾苦，动至夷灭，朕少小以来，经营多难，备知天下之事，犹恐有所不逮。至於荆王诸弟，生自深宫，识不及远，安能念此哉？朕每一食，便念稼穑之艰难；每一衣，则思纺绩之辛苦。诸弟何能学朕乎？选良佐以为藩弼，庶其习近善人，得免於愆过尔。”<br /><br />
</td></tr>

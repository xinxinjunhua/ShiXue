<td class="t50">论忠义10</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十一年，太宗谓侍臣曰：“狄人杀卫懿公，尽食其肉，独留其肝。懿公之臣弘演呼天大哭，自出其肝，而内懿公之肝於其腹中。今觅此人，恐不可得。”<br /><br />
　　特进魏徵对曰：“昔豫让为智伯报雠，欲刺赵襄子，襄子执而获之，谓之曰：‘子昔事范、中行氏乎？智伯尽灭之，子乃委质智伯，不为报雠；今即为智伯报雠，何也？’让答曰：‘臣昔事范、中行，范、中行以众人遇我，我以众人报之。智伯以国士遇我，我以国士报之。’在君礼之而已，亦何谓无人焉？”<br /><br />

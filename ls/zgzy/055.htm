<td class="t50" colspan="2">直谏7</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观八年，左仆射房玄龄、右仆射高士廉於路逢少府监窦德素，问北门近来更何营造。德素以闻。太宗乃谓玄龄曰：“君但知南衙事，我北门少有营造，何预君事？”玄龄等拜谢。魏徵进曰：“臣不解陛下责，亦不解玄龄、士廉拜谢。玄龄既任大臣，即陛下股肱耳目，有所营造，何容不知？责其访问官司，臣所不解。且所为有利害，役工有多少，陛下所为善，当助陛下成之，所为不是，虽营造，当奏陛下罢之。此乃君使臣、臣事君之道。玄龄等问既无罪，而陛下责之，臣所不解；玄龄等不识所守，但知拜谢，臣亦不解。”太宗深愧之。<br /><br />

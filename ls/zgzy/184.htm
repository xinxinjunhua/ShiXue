<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十三年，褚遂良为谏议大夫，兼知起居注。太宗问曰：“卿比知起居，书何等事？大抵於人君得观见否？朕欲见此注记者，将却观所为得失以自警戒耳！”<br /><br />
　　遂良曰：“今之起居，古之左、右史，以记人君言行，善恶毕书，庶几人主不为非法，不闻帝王躬自观史。”<br /><br />
　　太宗曰：“朕有不善，卿必记耶？”<br /><br />
　　遂良曰：“臣闻守道不如守官，臣职当载笔，何不书之。”<br /><br />
　　黄门侍郎刘洎进曰：“人君有过失，如日月之蚀，人皆见之。设令遂良不记，天下之人皆记之矣。”<br /><br />

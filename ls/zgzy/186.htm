<td class="t50">礼乐1</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　太宗初即位，谓侍臣曰：“准《礼》，名，终将讳之，前古帝王，亦不生讳其名，故周文王名昌，《周诗》云：‘克昌厥后。’春秋时鲁庄公名同，十六年《经》书：‘齐侯、宋公同盟于幽。’唯近代诸帝，妄为节制，特令生避其讳，理非通允，宜有改张。”<br /><br />
　　因诏曰：“依《礼》，二名义不偏讳，尼父达圣，非无前指。近世以来，曲为节制，两字兼避，废阙已多，率意而行，有违经语。今宜依据礼典，务从简约，仰效先哲，垂法将来。其官号人名，及公私文籍，有‘世’及‘民’两字不连读，并不须避。”<br /><br />

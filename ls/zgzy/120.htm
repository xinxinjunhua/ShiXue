<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　韩王元嘉，贞观初，为潞州刺史。时年十五，在州闻太妃有疾，便涕泣不食，及至京师发丧，哀毁过礼。太宗嘉其至性，屡慰勉之。元嘉闺门修整，有类寒素士大夫，与其弟鲁哀王灵夔甚相友爱，兄弟集见，如布衣之礼。其修身洁已，内外如一，当代诸王莫能及者。<br /><br />

<td class="t50">崇儒学4</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观二年，太宗谓侍臣曰：“为政之要，惟在得人，用非其才，必难致治。今所任用，必须以德行、学识为本。”<br /><br />
　　谏议大夫王珪曰：“人臣若无学业，不能识前言往行，岂堪大任。汉昭帝时，有人诈称卫太子，聚观者数万人，众皆致惑。隽不疑断以蒯聩之事。昭帝曰：‘公卿大臣，当用经术明於古义者，此则固非刀笔俗吏所可比拟。’”<br /><br />
　　上曰：“信如卿言。”<br /><br />

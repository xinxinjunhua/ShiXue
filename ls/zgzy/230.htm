<td class="t50">征伐7</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十七年，太宗谓侍臣曰：“盖苏文弑其主而夺其国政，诚不可忍，今日国家兵力，取之不难，朕未能即动兵众，且令契丹、靺鞨搅扰之，何如？”<br /><br />
　　房玄龄对曰：“臣观古之列国，无不强陵弱，众暴寡。今陛下抚养苍生，将士勇锐，力有馀而不取之，所谓止戈为武者也。昔汉武帝屡伐匈奴，隋主三征辽左，人贫国败，实此之由，惟陛下详察。”<br /><br />
　　太宗曰：“善！”<br /><br />

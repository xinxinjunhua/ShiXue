<td class="t50">仁义3</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观四年，房玄龄奏言：“今阅武库甲仗，胜隋日远矣。”<br /><br />
　　太宗曰：“饬兵备寇虽是要事，然朕惟欲卿等存心理道，务尽忠贞，使百姓安乐，便是朕之甲仗。隋炀帝岂为甲仗不足，以至灭亡，正由仁义不修，而群下怨叛故也。宜识此心。”<br /><br />
</td></tr>

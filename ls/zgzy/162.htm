<td class="t50">杜谗邪5</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观中，太宗谓房玄龄、杜如晦曰：“朕闻自古帝王上合天心，以致太平者，皆股肱之力。朕比开直言之路者，庶知冤屈，欲闻谏诤。所有上封事人，多告讦百官，细无可采。朕历选前王，但有君疑於臣，则下不能上达，欲求尽忠极虑，何可得哉？而无识之人，务行谗毁，交乱君臣，殊非益国。自今已后，有上书讦人小恶者，当以谗人之罪罪之。”<br /><br />

<tr><td>
<br />
　　太宗初践祚，即於正殿之左，置弘文馆，精选天下文儒，令以本官兼署学士，给以五品珍膳，更日宿直，以听朝之隙引入内殿，讨论坟典，商略政事，或至夜分乃罢。又诏勋贤三品已上子孙为弘文学生。<br /><br />

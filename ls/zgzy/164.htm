<td class="t50">杜谗邪7</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十六年，太宗谓谏议大夫褚遂良曰：“卿知起居，比来记我行事善恶？”<br /><br />
　　遂良曰：“史官之设，君举必书。善既必书，过亦无隐。”<br /><br />
　　太宗曰：“朕今勤行三事，亦望史官不书吾恶。一则鉴前代成败事，以为元龟；二则进用善人，共成政道；三则斥弃群小，不听谗言。吾能守之，终不转也。”<br /><br />

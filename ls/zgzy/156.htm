<td class="t50">慎言语2</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观八年，太宗谓侍臣曰：“言语者君子之枢机，谈何容易？凡在众庶，一言不善，则人记之，成其耻累。况是万乘之主，不可出言有所乖失。其所亏损至大，岂同匹夫？我常以此为戒。隋炀帝初幸甘泉宫，泉石称意，而怪无萤火，敕云：‘捉取多少於宫中照夜。’所司遽遣数千人采拾，送五百轝於宫侧。小事尚尔，况其大乎？”<br /><br />
　　魏徵对曰：“人君居四海之尊，若有亏失，古人以为如日月之蚀，人皆见之，实如陛下所戒慎。”<br /><br />

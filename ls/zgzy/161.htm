<td class="t50">杜谗邪4</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　尚书左仆射杜如晦奏言：“监察御史陈师合上《拔士论》，谓人之思虑有限，一人不可总知数职，以论臣等。”太宗谓戴胄曰：“朕以至公治天下，今任玄龄、如晦，非为勋旧，以其有才行也。此人妄事毁谤，正欲离间我君臣。昔蜀后主昏弱，齐文宣狂悖，然国称治者，以任诸葛亮、杨遵彦不猜之故也。朕今任如晦等，亦复如法。”於是流陈师合于岭外。<br /><br />

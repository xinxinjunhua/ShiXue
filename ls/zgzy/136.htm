<td class="t50">俭约1</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观元年，太宗谓侍臣曰：“自古帝王凡有兴造，必须贵顺物情。昔大禹凿九山，通九江，用人力极广，而无怨讟者，物情所欲，而众所共有故也。始皇营建宫室，而人多谤议者，为徇其私欲，不与众共故也。朕今欲造一殿，材木已具，远想秦皇之事，遂不复作也。古人云：‘不作无益害有益。’‘不见可欲，使民心不乱。’固知见可欲，其心必乱矣。至如雕镂器物，珠玉服玩，若恣其骄奢，则危亡之期可立待也。自王公已下，第宅、车服、婚嫁、丧葬，准品秩不合服用者，宜一切禁断。”<br /><br />
　　由是二十年间，风俗简朴，衣无锦绣，财帛富饶，无饥寒之弊。<br /><br />

<td class="t50">论忠义7</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观八年，太宗将发诸道黜陟使，畿内道未有其人，太宗亲定，问於房玄龄等曰：“此道事最重，谁可充使？”<br /><br />
　　右仆射李靖曰：“畿内事大，非魏徵莫可。”<br /><br />
　　太宗作色曰：“朕今欲向九成宫，亦非小，宁可遣魏徵出使？朕每行不欲与其相离者，適为其见朕是非得失。公等能正朕不？可因辄有所言，大非道理。”乃即令李靖充使。<br /><br />

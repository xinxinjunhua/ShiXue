<td class="t50">刑法5</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观九年，盐泽道行军总管、岷州都督高甑生坐违李靖节度，又诬告靖谋逆，减死徙边。时有上言者曰：“甑生旧秦府功臣，请宽其过。”<br /><br />
　　太宗曰：“虽是藩邸旧劳，诚不可忘，然理国守法，事须画一，今若赦之，使开侥幸之路。且国家建义太原，元从及征战有功者甚众，若甑生获免，谁不觊觎，有功之人，皆须犯法。我所以必不赦者，正为此也。”<br /><br />

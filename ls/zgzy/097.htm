<td class="t50">规谏太子2</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观中，太子承乾数亏礼度，侈纵日甚，太子左庶子于志宁撰《谏苑》二十卷讽之。是时太子右庶子孔颖达每犯颜进谏。承乾乳母遂安夫人谓颖达曰：“太子长成，何宜屡得面折？”<br /><br />
　　对曰：“蒙国厚恩，死无所恨。”谏诤愈切。<br /><br />
　　承乾令撰《孝经义疏》，颖达又因文见意，愈广规谏之道。太宗并嘉纳之，二人各赐帛五百匹，黄金一斤，以励承乾之意。<br /><br />
</td></tr>

<td class="t50">仁义1</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观元年，太宗曰：“朕看古来帝王以仁义为治者，国祚延长，任法御人者，虽救弊於一时，败亡亦促。既见前王成事，足是元龟，今欲专以仁义诚信为治，望革近代之浇薄也。”<br /><br />
　　黄门侍郎王珪对曰：“天下彫丧日久，陛下承其馀弊，弘道移风，万代之福。但非贤不理，惟在得人。”<br /><br />
　　太宗曰：“朕思贤之情，岂舍梦寐！”<br /><br />
　　给事中杜正伦进曰：“世必有才，随时所用，岂待梦傅说，逢吕尚，然后为治乎？”太宗深纳其言。<br /><br />

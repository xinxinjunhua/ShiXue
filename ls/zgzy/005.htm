<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十五年，太宗谓侍臣曰：“守天下难易？”<br /><br />
　　侍中魏徵对曰：“甚难。”<br /><br />
　　太宗曰：“任贤能、受谏诤，即可，何谓为难？”<br /><br />
　　徵曰：“观自古帝王，在於忧危之间，则任贤受谏。及至安乐，必怀宽怠，言事者惟令兢惧，日陵月替，以至危亡。圣人所以居安思危，正为此也。安而能惧，岂不为难？”<br /><br />

<td class="t50">论忠义13</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十五年，诏曰：“朕听朝之暇，观前史，每览前贤佐时，忠臣徇国，何尝不想见其人，废书钦叹！至於近代以来，年岁非远，然其胤绪，或当见存，纵未能显加旌表，无容弃之遐裔。其周、隋二代名臣及忠节子孙，有贞观已来犯罪配流者，宜令所司具录奏闻。”<br /><br />
　　於是多从矜宥。<br /><br />

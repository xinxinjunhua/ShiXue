<td class="t50">征伐5</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十四年，兵部尚书侯君集，伐高昌，及师次柳谷，候骑言“高昌王麹文泰死，克日将葬，国人咸集，以二千轻骑袭之，可尽得也。”副将薛万均、姜行本，皆以为然。<br /><br />
　　君集曰：“天子以高昌骄慢，使吾恭行天诛，乃於墟墓间以袭其葬，不足称武，此非问罪之师也。”遂按兵以待。葬毕，然后进军，遂平其国。<br /><br />

<td class="t50">教戒太子诸王6</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十一年，太宗谓吴王恪曰：“父之爱子，人之常情，非待教训而知也。子能忠孝则善矣！若不遵诲诱，忘弃礼法，必自致刑戮，父虽爱之，将如之何？昔汉武帝既崩，昭帝嗣立，燕王旦素骄纵，诪张不服，霍光遣一折简诛之，则身死国除。夫为臣子不得不慎。”<br /><br />
</td></tr>

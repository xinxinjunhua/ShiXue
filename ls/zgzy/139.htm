<td class="t50">俭约4</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十六年，太宗谓侍臣曰：“朕近读刘聪传，聪将为刘后起凰仪殿，廷尉陈元达切谏，聪大怒，命斩之。刘后手疏启请，辞情甚切，聪怒乃解，而甚愧之。人之读书，欲广闻见以自益耳，朕见此事，可以为深诫。比者欲造一殿，仍构重阁，今於蓝田采木，并已备具。远想聪事，斯作遂止。”<br /><br />

<td class="t50">礼乐10</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十七年，十二月癸丑，太宗谓侍臣曰：“今日是朕生日。俗间以生日可为喜乐，在朕情，翻成感思。君临天下，富有四海，而追求侍养，永不可得。仲由怀负米之恨，良有以也。况《诗》云：‘哀哀父母，生我劬劳。’奈何以劬劳之辰，遂为宴乐之事！甚是乖於礼度。”因而泣下久之。<br /><br />

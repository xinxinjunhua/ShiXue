<td class="t50" colspan="2">求谏11</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十七年，太宗问谏议大夫褚遂良曰：“昔舜造漆器，禹雕其俎，当时谏者十有馀人。食器之间，何须苦谏？”<br /><br />
　　遂良对曰：“雕琢害农事，纂组伤女工。首创奢淫，危亡之渐。漆器不已，必金为之。金器不已，必玉为之。所以诤臣必谏其渐，及其满盈，无所复谏。”<br /><br />
　　太宗曰：“卿言是矣，朕所为事，若有不当，或在其渐，或已将终，皆宜进谏。比见前史，或有人臣谏事，遂答云‘业已为之’，或道‘业已许之’，竟不为停改。此则危亡之祸，可反手而待也。”<br /><br />

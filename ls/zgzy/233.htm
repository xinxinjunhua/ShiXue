<td class="t50">征伐10</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　礼部尚书江夏王道宗从太宗征高丽，诏道宗与李勣为前锋，及济辽水克盖牟城，逢贼兵大至，军中佥欲深沟保险，待太宗至，徐进。道宗议曰：“不可。贼赴急远来，兵实疲顿，恃众轻我，一战可摧。昔耿弇不以贼遗君父，我既职在前军，当须清道以待舆驾。”<br /><br />
　　李勣大然其议。乃率骁勇数百骑，直冲贼阵，左右出入，勣因合击，大破之。<br /><br />
　　太宗至，深加赏劳。道宗在阵损足，帝亲为针灸，赐以御膳。<br /><br />

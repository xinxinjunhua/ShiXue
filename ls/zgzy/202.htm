<td class="t50">刑法1</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观元年，太宗谓侍臣曰：“死者不可再生，用法务在宽简。古人云，鬻棺者，欲岁之疫，非疾於人，利於棺售故耳。今法司覈理一狱，必求深刻，欲成其考课。今作何法，得使平允？”<br /><br />
　　谏议大夫王珪进曰：“但选公直良善人，断狱允当者，增秩赐金，即奸伪自息。”<br /><br />
　　诏从之。<br /><br />
　　太宗又曰：“古者断狱，必讯於三槐、九棘之官，今三公、九卿，即其职也。自今以后，大辟罪，皆令中书、门下四品已上及尚书九卿议之，如此，庶免冤滥。”<br /><br />
　　由是至四年，断死刑，天下二十九人，几致刑措。<br /><br />

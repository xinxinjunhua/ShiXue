<td class="t50">贪鄙1</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观初，太宗谓侍臣曰：“人有明珠，莫不贵重，若以弹雀，岂非可惜？况人之性命甚於明珠，见金钱财帛不惧刑网，径即受纳，乃是不惜性命。明珠是身外之物，尚不可弹雀，何况性命之重，乃以博财物耶？群臣若能备尽忠直，益国利人，则官爵立至。皆不能以此道求荣，遂妄受财物，赃贿既露，其身亦殒，实可为笑。帝王亦然，恣情放逸，劳役无度，信任群小，疏远忠正，有一於此，岂不灭亡？隋炀帝奢侈自贤，身死匹夫之手，亦为可笑。”<br /><br />
</td></tr>

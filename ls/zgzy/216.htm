<td class="t50">贡赋3</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十二年，疏勒、朱俱波、甘棠遣使贡方物。太宗谓群臣曰：“向使中国不安，日南、西域朝贡使，亦何缘而至？朕何德以堪之！睹此翻怀危惧。近代平一天下，拓定边方者，惟秦皇、汉武。始皇暴虐，至子而亡。汉武骄奢，国祚几绝。朕提三尺剑以定四海，远夷率服，亿兆乂安，自谓不减二主也。然二主末途，皆不能自保，由是每自惧危亡，必不敢懈怠。惟藉公等，直言正谏，以相匡弼。若惟扬美隐恶，共进谀言，则国之危亡，可立而待也。”<br /><br />
</td></tr>

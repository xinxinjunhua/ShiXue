<td class="t50">征伐6</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十六年，太宗谓侍臣曰：“北狄代为寇乱，今延陀倔强，须早为之所。朕熟思之，惟有二策：选徒十万，击而虏之，涤除凶丑，百年无患，此一策也。若遂其来请，与之为婚媾，朕为苍生父母，苟可利之，岂惜一女！北狄风俗，多由内政，亦既生子，则我外孙，不侵中国，断可知矣。以此而言，边境足得三十年来无事。举此二策，何者为先？”<br /><br />
　　司空房玄龄对曰：“遭隋室大乱之后，户口大半未复。兵凶战危，圣人所慎，和亲之策，实天下幸甚。”<br /><br />

<td class="t50">诚信1</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观初，有上书请去佞臣者，太宗谓曰：“朕之所任，皆以为贤，卿知佞者谁耶？”<br /><br />
　　对曰：“臣居草泽，不的知佞者，请陛下佯怒以试群臣，若能不畏雷霆，直言进谏，则是正人，顺情阿旨，则是佞人。”<br /><br />
　　太宗谓封德彝曰：“流水清浊，在其源也。君者政源，人庶犹水，君自为诈，欲臣下行直，是犹源浊而望水清，理不可得。朕常以魏武帝多诡诈，深鄙其为人，如此，岂可堪为教令？”<br /><br />
　　谓上书人曰：“朕欲使大信行於天下，不欲以诈道训俗，卿言虽善，朕所不取也。”<br /><br />

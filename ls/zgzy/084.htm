<td class="t50" colspan="2">尊敬师傅2</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观六年，诏曰：“朕比寻讨经史，明王圣帝，曷尝无师傅哉？前所进令遂不睹三师之位，意将未可。何以然？黄帝学大颠，颛顼学录图，尧学尹寿，舜学务成昭，禹学西王国，汤学威子伯，文王学子期，武王学虢叔。前代圣王，未遭此师，则功业不著乎天下，名誉不传乎载籍。况朕接百王之末，智不同圣人，其无师傅，安可以临兆民者哉？《诗》不云乎：‘不愆不忘，率由旧章。’夫不学，则不明古道，而能政致太平者未之有也！可即著令，置三师之位。”<br /><br />
</td></tr>

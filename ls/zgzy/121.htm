<td class="t50">孝友4</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　霍王元轨，武德中，初封为吴王，贞观七年，为寿州刺史。属高祖崩，去职，毁瘠过礼。自后常衣布服，示有终身之戚。太宗尝问侍臣曰：“朕子弟孰贤？”<br /><br />
　　侍中魏徵对曰：“臣愚暗，不尽知其能，惟吴王数与臣言，臣未尝不自失。”<br /><br />
　　太宗曰：“卿以为前代谁比？”<br /><br />
　　徵曰：“经学文雅，亦汉之间、平，至如孝行，乃古之曾、闵也。”由是宠遇弥厚，因令妻征女焉。<br /><br />

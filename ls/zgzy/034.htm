<td class="t50" colspan="2">求谏7</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　太常卿韦挺尝上疏陈得失，太宗赐书曰：“所上意见，极是谠言，辞理可观，甚以为慰。昔齐境之难，夷吾有射钩之罪，蒲城之役，勃鞮为斩袂之仇。而小白不以为疑，重耳待之若旧。岂非各吠非主，志在无二。卿之深诚，见於斯矣。若能克全此节，则永保令名。如其怠之，可不惜也。勉励终始，垂范将来，当使后之视今，亦犹今之视古，不亦美乎？朕比不闻其过，未睹其阙，赖竭忠恳，数进嘉言，用沃朕怀，一何可道！”<br /><br />
</td></tr>

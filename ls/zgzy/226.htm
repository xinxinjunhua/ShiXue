<td class="t50">征伐3</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观四年，有司上言：“林邑蛮国，表疏不顺，请发兵讨击之。”<br /><br />
　　太宗曰：“兵者，凶器，不得已而用之。故汉光武云：‘每一发兵，不觉头须为白。’自古以来穷兵极武，未有不亡者也。苻坚自恃兵强，欲必吞晋室，兴兵百万，一举而亡。隋主亦必欲取高丽，频年劳役，人不胜怨，遂死於匹夫之手。至如颉利，往岁数来侵我国家，部落疲於征役，遂至灭亡。朕今见此，岂得辄即发兵？且经历山险，土多瘴疠，若我兵士疾疫，虽克剪此蛮，亦何所补？言语之间，何足介意！”竟不讨之。<br /><br />
</td></tr>

<td class="t50" colspan="2">择官6</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观六年，太宗谓魏徵曰：“古人云，王者须为官择人，不可造次即用。朕今行一事，则为天下所观；出一言，则为天下所听。用得正人，为善者皆劝；误用恶人，不善者竞进。赏当其劳，无功者自退；罚当其罪，为恶者戒惧。故知赏罚不可轻行，用人弥须慎择。”<br /><br />
　　徵对曰：“知人之事，自古为难，故考绩黜陟，察其善恶。今欲求人，必须审访其行。若知其善，然后用之。设令此人不能济事，只是才力不及，不为大害。误用恶人，假令强干，为害极多。但乱世惟求其才，不顾其行。太平之时，必须才行俱兼，始可任用。”<br /><br />

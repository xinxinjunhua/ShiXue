<td class="t50" colspan="2">尊敬师傅4</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十一年，以礼部尚书王珪兼为魏王师。太宗谓尚书左仆射房玄龄曰：“古来帝子，生於深宫，及其成人，无不骄逸，是以倾覆相踵，少能自济。我今严教子弟，欲皆得安全。王珪我久驱使，甚知刚直，志存忠孝，选为子师。卿宜语泰，每对王珪，如见我面，宜加尊敬，不得懈怠。”<br /><br />
　　珪亦以师道自处，时议善之也。<br /><br />

<td class="t50" colspan="2">择官5</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观三年，太宗谓吏部尚书杜如晦曰：“比见吏部择人，惟取其言词刀笔，不悉其景行。数年之后，恶迹始彰，虽加刑戮，而百姓已受其弊。如何可获善人？”<br /><br />
　　如晦对曰：“两汉取人，皆行著乡闾，州郡贡之，然后入用，故当时号为多士。今每年选集，向数千人，厚貌饰词，不可知悉，选司但配其阶品而已。铨简之理，实所未精，所以不能得才。”<br /><br />
　　太宗乃将依汉时法令，本州辟召，会功臣等将行世封事，遂止。<br /><br />

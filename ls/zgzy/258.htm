<td class="t50">慎终7</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十六年，太宗问魏徵曰：“观近古帝王有传位十代者，有一代两代者，亦有身得身失者。朕所以常怀忧惧，或恐抚养生民不得其所，或恐心生骄逸，喜怒过度。然不自知，卿可为朕言之，当以为楷则。”<br /><br />
　　徵对曰：“嗜欲喜怒之情，贤愚皆同。贤者能节之，不使过度，愚者纵之，多至失所。陛下圣德玄远，居安思危，伏愿陛下常能自制，以保克终之美，则万代永赖。”<br /><br />

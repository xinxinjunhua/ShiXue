<td class="t50">务农2</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观二年，京师旱，蝗虫大起。太宗入苑视禾，见蝗虫，掇数枚而咒曰：“人以穀为命，而汝食之，是害於百姓。百姓有过，在予一人，尔其有灵，但当蚀我心，无害百姓。”将吞之，左右遽谏曰：“恐成疾，不可。”<br /><br />
　　太宗曰：“所冀移灾朕躬，何疾之避！”遂吞之。自是蝗不复为灾。<br /><br />

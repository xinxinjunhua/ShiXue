<td class="t50" colspan="2">太子诸王定分1</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观七年，授吴王恪齐州都督。太宗谓侍臣曰：“父子之情，岂不欲常相见耶！但家国事殊，须出作藩屏。且令其早有定分，绝觊觎之心，我百年后，使其兄弟无危亡之患也。”<br /><br />

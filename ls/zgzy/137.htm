<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观二年，公卿奏曰：“依《礼》，季夏之月，可以居台榭，今夏暑未退，秋霖方始，宫中卑湿，请营一阁以居之。”<br /><br />
　　太宗曰：“朕有气疾，岂宜下湿？若遂来请，糜费良多。昔汉文将起露台，而惜十家之产，朕德不逮于汉帝，而所费过之，岂为人父母之道也？”固请至于再三，竟不许。<br /><br />

<td class="t50">贡赋1</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观二年，太宗谓朝集使曰：“任土作贡，布在前典，当州所产，则充庭实。比闻都督、刺史邀射声名，厥土所赋，或嫌其不善，逾境外求，更相仿效，遂以成俗。极为劳扰，宜改此弊，不得更然。”<br /><br />

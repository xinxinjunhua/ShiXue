<td class="t50" colspan="2">求谏9</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十五年，太宗问魏徵曰：“比来朝臣都不论事，何也？”<br /><br />
　　徵对曰：“陛下虚心采纳，诚宜有言者。然古人云：‘未信而谏，则以为谤己；信而不谏，则谓之尸禄。’但人之才器，各有不同。懦弱之人，怀忠直而不能言；疏远之人，恐不信而不得言；怀禄之人，虑不便身而不敢言。所以相与缄默，俯仰过日。”<br /><br />
　　太宗曰：“诚如卿言。朕每思之，人臣欲谏，辄惧死亡之祸，与夫赴鼎镬、冒白刃，亦何异哉？故忠贞之臣，非不欲竭诚。竭诚者，乃是极难。所以禹拜昌言，岂不为此也！朕今开怀抱，纳谏诤。卿等无劳怖惧，遂不极言。”<br /><br />

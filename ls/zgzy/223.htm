<td class="t50">辩兴亡5</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观九年，太宗谓魏徵曰：“顷读周、齐史，末代亡国之主，为恶多相类也。齐主深好奢侈，所有府库，用之略尽，乃至关市无不税敛。朕常谓此犹如馋人自食其肉，肉尽必死。人君赋敛不已，百姓既弊，其君亦亡，齐主即是也。然天元、齐主，若为优劣？”<br /><br />
　　徵对曰：“二主亡国虽同，其行则别。齐主愞弱，政出多门，国无纲纪，遂至亡灭。天元性凶而强，威福在己，亡国之事，皆在其身。以此论之，齐主为劣。”<br /><br />

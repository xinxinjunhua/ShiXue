<td class="t50">辩兴亡2</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观二年，太宗谓黄门侍郎王珪曰：“隋开皇十四年大旱，人多饥乏。是时仓库盈溢，竟不许赈给，乃令百姓逐粮。隋文不怜百姓而惜仓库，比至末年，计天下储积，得供五六十年。炀帝恃此富饶，所以奢华无道，遂致灭亡。炀帝失国，亦此之由。凡理国者，务积於人，不在盈其仓库。古人云：‘百姓不足，君孰与足。’但使仓库可备凶年，此外何烦储蓄！后嗣若贤，自能保其天下；如其不肖，多积仓库，徒益其奢侈，危亡之本也。”<br /><br />
</td></tr>

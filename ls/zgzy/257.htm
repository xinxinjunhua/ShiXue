<td class="t50">慎终6</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十四年，太宗谓侍臣曰：“平定天下，朕虽有其事，守之失图，功业亦复难保。秦始皇初亦平六国，据有四海，及末年不能善守，实可为诫。公等宜念公忘私，则荣名高位，可以克终其美。”<br /><br />
　　魏徵对曰：“臣闻之，战胜易，守胜难。陛下深思远虑，安不忘危，功业既彰，德教复洽，恒以此为政，宗社无由倾败矣。”<br /><br />

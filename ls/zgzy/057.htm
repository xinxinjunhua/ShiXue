<td class="t50" colspan="2">直谏9</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十一年，所司奏凌敬乞贪之状。太宗责侍中魏徵等滥进人。徵曰：“臣等每蒙顾问，常具言其长短。有学识，强谏诤，是其所长。爱生活，好经营，是其所短。今凌敬为人作碑文，教人读《汉书》，因兹附托，回易求利，与臣等所说不同。陛下未用其长，惟见其短，以为臣等欺罔，实不敢心伏。”太宗纳之。<br /><br />

<td class="t50">赦令3</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十一年，太宗谓侍臣曰：“诏令格式，若不常定，则人心多惑，奸诈益生。《周易》称‘涣汗其大号’，言发号施令，若汗出於体，一出而不复也。《书》曰：‘慎乃出令，令出惟行，弗为反。’且汉祖日不暇给，萧何起於小吏，制法之后，犹称画一。今宜详思此义，不可轻出诏令，必须审定，以为永式。”<br /><br />

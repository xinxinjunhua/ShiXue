<td class="t50">务农3</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观五年，有司上书言：“皇太子将行冠礼，宜用二月为吉，请追兵以备仪注。”<br /><br />
　　太宗曰：“今东作方兴，恐妨农事，令改用十月。”<br /><br />
　　太子少保萧瑀奏言：“准阴阳家，用二月为胜。”<br /><br />
　　太宗曰：“阴阳拘忌，朕所不行，若动静必依阴阳，不顾理义，欲求福祐，其可得乎？若所行皆遵正道，自然常与吉会。且吉凶在人，岂假阴阳拘忌？农时甚要，不可蹔失。”<br /><br />

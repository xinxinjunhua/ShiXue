<td class="t50" colspan="2">纳谏3</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　太宗有一骏马，特爱之，恒於宫中养饲，无病而暴死。太宗怒养马宫人，将杀之。<br /><br />
　　皇后谏曰：“昔齐景公以马死杀人，晏子请数其罪云：‘尔养马而死，尔罪一也。使公以马杀人，百姓闻之，必怨吾君，尔罪二也。诸侯闻之，必轻吾国，尔罪三也。’公乃释罪。陛下尝读书见此事，岂忘之邪？”<br /><br />
　　太宗意乃解。又谓房玄龄曰，皇后庶事相启沃，极有利益尔。<br /><br />

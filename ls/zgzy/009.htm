<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观三年，太宗谓侍臣曰：<br /><br />
　　“中书、门下，机要之司。擢才而居，委任实重。诏敕如有不稳便，皆须执论。比来惟觉阿旨顺情，唯唯苟过，遂无一言谏诤者，岂是道理？若惟署诏敕、行文书而已，人谁不堪？何烦简择，以相委付？自今诏敕疑有不稳便，必须执言，无得妄有畏惧，知而寝默。”<br /><br />

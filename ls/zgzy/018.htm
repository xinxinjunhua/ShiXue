<td class="t50" colspan="2">政体13</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十九年，太宗谓侍臣曰：“朕观古来帝王，骄矜而取败者，不可胜数。不能远述古昔，至如晋武平吴、隋文伐陈已后，心逾骄奢，自矜诸己，臣下不复敢言，政道因兹弛紊。朕自平定突厥、破高丽已后，兼并铁勒，席卷沙漠以为州县，夷狄远服，声教益广。朕恐怀骄矜，恒自抑折，日旰而食，坐以待晨。每思臣下有谠言直谏，可以施於政教者，当拭目以师友待之。如此，庶几於时康道泰尔。”<br /><br />
</td></tr>

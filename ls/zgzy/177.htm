<td class="t50">崇儒学2</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观二年，诏停周公为先圣，始立孔子庙堂於国学，稽式旧典，以仲尼为先圣，颜子为先师，两边俎豆干戚之容，始备于兹矣。是岁大收天下儒士，赐帛给传，令诣京师，擢以不次，布在廊庙者甚众。学生通一大经已上，咸得署吏。国学增筑学舍四百馀间，国子、太学、四门、广文亦增置生员，其书、算各置博士、学生，以备众艺。<br /><br />
　　太宗又数幸国学，令祭酒、司业、博士讲论，毕，各赐以束帛。四方儒士负书而至者，盖以千数。俄而吐蕃，及高昌、高丽、新罗等诸夷酋长，亦遣子弟请入于学。於是国学之内，鼓箧升讲筵者，几至万人，儒学之兴，古昔未有也。<br /><br />
</td></tr>

<td class="t50">慎终4</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十二年，太宗谓侍臣曰：“朕读书见前王善事，皆力行而不倦，其所任用公辈数人，诚以为贤，然致理比於三、五之代，犹为不逮，何也？”<br /><br />
　　魏徵对曰：“今四夷宾服，天下无事，诚旷古所未有。然自古帝王初即位者，皆欲励精为政，比迹於尧、舜；及其安乐也，则骄奢放逸，莫能终其善。人臣初见任用者，皆欲匡主济时，追踪於稷、契；及其富贵也，则思苟全官爵，莫能尽其忠节。若使君臣常无懈怠，各保其终，则天下无忧不理，自可超迈前古也。”<br /><br />
　　太宗曰：“诚如卿言。”<br /><br />

<td class="t50">辩兴亡1</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观初，太宗从容谓侍臣曰：“周武平纣之乱，以有天下，秦皇因周之衰，遂吞六国，其得天下不殊，祚运长短若此之相悬也？”<br /><br />
　　尚书右仆射萧瑀进曰：“纣为无道，天下苦之，故八百诸侯，不期而会。周室微，六国无罪，秦氏专任智力，吞食诸侯。平定虽同，人情则异。”<br /><br />
　　太宗曰：“不然，周既克殷，务弘仁义；秦既得志，专行诈力。非但取之有异，抑亦守之不同。祚之修短，意在兹乎！”<br /><br />

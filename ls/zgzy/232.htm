<td class="t50">征伐9</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十九年，太宗将亲征高丽，开府仪同三司尉迟敬德奏言：“车驾若自往辽左，皇太子又监国定州，东西二京，府库所在，虽有镇守，终是空虚，辽东路遥，恐有玄感之变。且边隅小国，不足亲劳万乘，若克胜，不足为武，傥不胜，翻为所笑。伏请委之良将，自可应时摧灭。”<br /><br />
　　太宗虽不从其谏，而议者是之。<br /><br />

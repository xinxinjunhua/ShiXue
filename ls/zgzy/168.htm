<td class="t50">悔过4</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十八年，太宗谓侍臣曰：“夫人臣之对帝王，多承意顺旨，甘言取容。朕今欲闻己过，卿等皆可直言。”<br /><br />
　　散骑常侍刘洎对曰：“陛下每与公卿论事，及有上书者，以其不称旨，或面加诘难，无不惭退。恐非诱进直言之道。”<br /><br />
　　太宗曰：“朕亦悔有此问难，当即改之。”<br /><br />

<td class="t50" colspan="2">政体11</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观九年，太宗谓侍臣曰：“往昔初平京师，宫中美女珍玩，无院不满。炀帝意犹不足，徵求无已，兼东西征讨，穷兵黩武，百姓不堪，遂致亡灭。此皆朕所目见。故夙夜孜孜，惟欲清净，使天下无事。遂得徭役不兴，年穀丰稔，百姓安乐。夫治国犹如栽树，本根不摇，则枝叶茂荣。君能清净，百姓何得不安乐乎？”<br /><br />

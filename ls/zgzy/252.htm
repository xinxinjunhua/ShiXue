<td class="t50">慎终1</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观五年，太宗谓侍臣曰：“自古帝王亦不能常化，假令内安，必有外扰。当今远夷率服，百穀丰稔，盗贼不作，内外宁静。此非朕一人之力，实由公等共相匡辅。然安不忘危，理不忘乱，虽知今日无事，亦须思其终始。常得如此，始是可贵也。”<br /><br />
　　魏徵对曰：“自古已来，元首股肱不能备具，或时君称圣，臣即不贤；或遇贤臣，即无圣主。今陛下明，所以致治，向若直有贤臣，而君不思化，亦无所益。天下今虽太平，臣等犹未以为喜，惟愿陛下居安思危，孜孜不怠耳！”<br /><br />
</td></tr>

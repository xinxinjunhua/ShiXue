<td class="t50">论忠义14</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十九年，太宗攻辽东安市城，高丽人众皆死战，诏令耨萨延寿、惠真等降，众止其城下以招之，城中坚守不动。每见帝幡旗，必乘城鼓譟。帝怒甚，诏江夏王道宗筑土山，以攻其城，竟不能克。太宗将旋师，嘉安市城主坚守臣节，赐绢三百匹，以劝励事君者。<br /><br />
</td></tr>

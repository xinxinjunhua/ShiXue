<td class="t50" colspan="2">政体8</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观六年，太宗谓侍臣曰：“古人云：‘危而不持，颠而不扶，焉用彼相？’君臣之义，得不尽忠匡救乎？朕尝读书，见桀杀关龙逄，汉诛黾错，未尝不废书叹息。公等但能正词直谏，裨益政教，终不以犯颜忤旨，妄有诛责。朕比来临朝断决，亦有乖於律令者。公等以为小事，遂不执言。凡大事皆起於小事，小事不论，大事又将不可救，社稷倾危，莫不由此。隋主残暴，身死匹夫之手，率土苍生，罕闻嗟痛。公等为朕思隋氏灭亡之事，朕为公等思龙逄、晁错之诛，君臣保全，岂不美哉！”<br /><br />
</td></tr>

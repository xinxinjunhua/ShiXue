<td class="t50">务农4</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十六年，太宗以天下粟价率计斗直五钱，其尤贱处，计斗直三钱，因谓侍臣曰：“国以民为本，人以食为命，若禾黍不登，则兆庶非国家所有。既属丰稔若斯，朕为亿兆人父母，唯欲躬务俭约，必不辄为奢侈。朕常欲赐天下之人，皆使富贵。今省徭赋，不夺其时，使比屋之人，恣其耕稼，此则富矣。敦行礼让，使乡闾之间，少敬长，妻敬夫，此则贵矣。但令天下皆然，朕不听管弦，不从畋猎，乐在其中矣！”<br /><br />
</td></tr>

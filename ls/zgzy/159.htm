<td class="t50">杜谗邪2</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观七年，太宗幸蒲州，刺史赵元楷课父老服黄纱单衣，迎谒路左，盛饰廨宇，修营楼雉以求媚。又潜饲羊百馀口，鱼数千头，将馈贵戚。<br /><br />
　　太宗知，召而数之曰：“朕巡省河、洛，经历数州，凡有所须，皆资官物。卿为饲羊养鱼，雕饰院宇，此乃亡隋弊俗，今不可复行。当识朕心，改旧态也。”以元楷在隋邪佞，故太宗发此言以戒之。<br /><br />
　　元楷惭惧，数日不食而卒。<br /><br />

<td class="t50">仁恻3</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观七年，襄州都督张公谨卒，太宗闻而嗟悼，出次发哀。有司奏言：“准《阴阳书》云：‘日在辰，不可哭泣。’此亦流俗所忌。”太宗曰：“君臣之义，同於父子，情发於中，安避辰日？”遂哭之。<br /><br />

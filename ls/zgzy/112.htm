<td class="t50">论忠义9</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十一年，太宗行至汉太尉杨震墓，伤其以忠非命，亲为文以祭之。<br /><br />
　　房玄龄进曰：“杨震虽当年夭枉，数百年后方遇圣明，停舆驻跸，亲降神作，可谓虽死犹生，没而不朽。不觉助伯起幸赖欣跃於九泉之下矣。伏读天文，且感且慰，凡百君子，焉敢不勖励名节，知为善之有效！”<br /><br />
</td></tr>

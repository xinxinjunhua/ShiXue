<td class="t50" colspan="2">求谏5</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观五年，太宗谓房玄龄等曰：“自古帝王多任情喜怒，喜则滥赏无功，怒则滥杀无罪。是以天下丧乱，莫不由此。朕今夙夜未尝不以此为心，恒欲公等尽情极谏。公等亦须受人谏语，岂得以人言不同己意，便即护短不纳？若不能受谏，安能谏人？”<br /><br />
</td></tr>

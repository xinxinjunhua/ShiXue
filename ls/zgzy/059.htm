<td class="t50" colspan="2">君臣鉴戒1</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观三年，太宗谓侍臣曰：“君臣本同治乱，共安危，若主纳忠谏，臣进直言，斯故君臣合契，古来所重。若君自贤，臣不匡正，欲不危亡，不可得也。君失其国，臣亦不能独全其家。至如隋炀帝暴虐，臣下钳口，卒令不闻其过，遂至灭亡，虞世基等寻亦诛死。前事不远，朕与卿等可得不慎，无为后所嗤！”<br /><br />
</td></tr>

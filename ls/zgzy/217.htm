<td class="t50">贡赋4</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十八年，太宗将伐高丽，其莫离支遣使贡白金。黄门侍郎褚遂良谏曰：“莫离支虐杀其主，九夷所不容，陛下以之兴兵，将事吊伐，为辽东之人，报主辱之耻。古者讨弑君之贼，不受其赂。昔宋督遗鲁君以郜鼎，桓公受之於大庙，臧哀伯谏曰：‘君人者将昭德塞违。今灭德立违，而寘其赂器於大庙，百官象之，又何诛焉！武王克商，迁九鼎于雒邑，义士犹或非之。而况将昭违乱之赂器，寘诸大庙，其若之何？’夫《春秋》之书，百王取则，若受不臣之筐篚，纳弑逆之朝贡，不以为愆，将何致伐？臣谓莫离支所献，自不合受。”太宗从之。<br /><br />

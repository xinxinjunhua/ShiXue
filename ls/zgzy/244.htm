<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　谷那律为谏议大夫，尝从太宗出猎，在途遇雨，太宗问曰：“油衣若为得不漏？”<br /><br />
　　对曰：“能以瓦为之，必不漏矣！”意欲太宗弗数游猎，大被嘉纳。赐帛五十段，加以金带。<br /><br />

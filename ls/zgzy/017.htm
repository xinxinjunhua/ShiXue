<td class="t50" colspan="2">政体12</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十六年，太宗谓侍臣曰：“或君乱於上，臣理於下；或臣乱於下，君治於上。二者苟逢，何者为甚？”<br /><br />
　　特进魏徵对曰：“君心治，则照见下非。诛一劝百，谁敢不畏威尽力？若昏暴於上，忠谏不从，虽百里奚、伍子胥之在虞、吴，不救其祸，败亡亦继。”<br /><br />
　　太宗曰：“必如此，齐文宣昏暴，杨遵彦以正道扶之得治，何也？”<br /><br />
　　徵曰：“遵彦弥缝暴主，救理苍生，才得免乱，亦甚危苦。与人主严明，臣下畏法，直言正谏，皆见信用，不可同年而语也。”<br /><br />

<td class="t50">征伐8</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十八年，太宗以高丽莫离支贼杀其主，残虐其下，议将讨之。<br /><br />
　　谏议大夫褚遂良进曰：“陛下兵机神算，人莫能知。昔隋末乱离，克平寇难，及北狄侵边，西蕃失礼，陛下欲命将击之，群臣莫不苦谏，唯陛下明略独断，卒并诛夷。今闻陛下将伐高丽，意皆荧惑。然陛下神武英声，不比周、隋之主，兵若渡辽，事须克捷，万一不获，无以威示远方，必更发怒，再动兵众，若至於此，安危难测。”<br /><br />
　　太宗然之。<br /><br />

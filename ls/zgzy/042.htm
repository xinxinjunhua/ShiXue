<td class="t50" colspan="2">纳谏4</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观七年，太宗将幸九成宫，散骑常侍姚思廉进谏曰：“陛下高居紫极，宁济苍生，应须以欲从人，不可以人从欲。然则离宫游幸，此秦皇、汉武之事，故非尧、舜、禹、汤之所为也。”言甚切至。<br /><br />
　　太宗谕之曰：“朕有气疾，热便顿剧，故非情好游幸，甚嘉卿意。”因赐帛五十段。<br /><br />

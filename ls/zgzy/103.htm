<td class="t50">仁义4</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十三年，太宗谓侍臣曰：“林深则鸟栖，水广则鱼游，仁义积则物自归之。人皆知畏避灾害，不知行仁义则灾害不生。夫仁义之道，当思之在心，常令相继，若斯须懈怠，去之已远。犹如饮食资身，恒令腹饱，乃可存其性命。”<br /><br />
　　王珪顿首曰：“陛下能知此言，天下幸甚！”<br /><br />

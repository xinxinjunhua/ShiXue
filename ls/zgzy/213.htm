<td class="t50">赦令4</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　长孙皇后遇疾，渐危笃。皇太子启后曰：“医药备尽，今尊体不瘳，请奏赦囚徒并度人入道，冀蒙福祐。”<br /><br />
　　后曰：“死生有命，非人力所加，若修福可延，吾素非为恶者；若行善无效，何福可求？赦者国之大事，佛道者，上每示存异方之教耳。常恐为理体之弊，岂以吾一妇人而乱天下法？不能依汝言。”<br /><br />

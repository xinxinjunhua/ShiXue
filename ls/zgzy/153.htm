<td class="t50">慎所好3</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观四年，太宗曰：“隋炀帝性好猜防，专信邪道，大忌胡人，乃至谓胡床为交床，胡瓜为黄瓜，筑长城以避胡。终被宇文化及使令狐行达杀之。又诛戮李金才，及诸李殆尽，卒何所益？且君天下者，惟须正身修德而已，此外虚事，不足在怀。”<br /><br />

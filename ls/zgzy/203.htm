<td class="t50">刑法2</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观二年，太宗谓侍臣曰：“比有奴告主谋逆，此极弊法，特须禁断。假令有谋反者，必不独成，终将与人计之；众计之事，必有他人论之，岂藉奴告也。自今奴告主者，不须受，尽令斩决。”<br /><br />

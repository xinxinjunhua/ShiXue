<td class="t50">仁恻4</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十九年，太宗征高丽，次定州，有兵士到者，帝御州城北门楼抚慰之。有从卒一人病，不能进，诏至床前，问其所苦，仍敕州县医疗之，是以将士莫不欣然愿从。及大军回次柳城，诏集前后战亡人骸骨，设太牢致祭，亲临，哭之尽哀，军人无不洒泣。兵士观祭者，归家以言其父母曰：“吾儿之丧，天子哭之，死无所恨。”<br /><br />
　　太宗征辽东，攻白岩城，右卫大将军李思摩，为流矢所中，帝亲为吮血，将士莫不感励。<br /><br />
</td></tr>

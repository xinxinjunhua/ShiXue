<td class="t50" colspan="2">尊敬师傅3</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观八年，太宗谓侍臣曰：<br /><br />
　　“上智之人，自无所染，但中智之人无恒，从教而变，况太子师保，古难其选。成王幼小，周、召为保傅。左右皆贤，日闻雅训，足以长仁益德，使为圣君。秦之胡亥，用赵高作傅，教以刑法，及其嗣位，诛功臣，杀亲族，酷暴不已，旋踵而亡。故知人之善恶诚由近习。朕今为太子、诸王精选师傅，令其式瞻礼度，有所裨益。公等可访正直忠信者，各举三两人。”<br /><br />
</td></tr>

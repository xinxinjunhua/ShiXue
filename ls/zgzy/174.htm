<td class="t50">贪鄙5</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贞观十年，治书侍御史权万纪上言：“宣、饶二州诸山大有银坑，采之极是利益，每岁可得钱数百万贯。”<br /><br />
　　太宗曰：“朕贵为天子，是事无所少之。惟须纳嘉言，进善事，有益於百姓者。且国家賸得数百万贯钱，何如得一有才行人？不见卿推贤进善之事，又不能按举不法，震肃权豪，惟道税鬻银坑以为利益！昔尧、舜抵璧於山林，投珠於渊谷，由是崇名美号，见称千载。后汉桓、灵二帝好利贱义，为近代庸暗之主，卿遂欲将我比桓、灵耶？”是日敕放令万纪还第。<br /><br />

<td class="t50">程卫传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　程卫，字长玄，广平曲周人也。少立操行，强正方严。<br /><br />
　　刘毅闻其名，辟为都官从事。毅奏中护军羊琇犯宪应死。武帝与琇有旧，乃遣齐王攸喻毅，毅许之。卫正色以为不可，径自驰车入护军营，收琇属吏，考问阴私，先奏琇所犯狼藉，然后言于毅。<br /><br />
　　由是名振遐迩，百官厉行。遂辟公府掾，迁尚事郎、侍御史，在职皆以事干显。补洛阳令，历安定、顿丘太守，所莅著绩。卒于官。<br /><br />
</td></tr>

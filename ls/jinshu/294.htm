<td class="t50">邓骞传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　邓骞，子长真，长沙人。少有志气，为乡邻所重。常推诚行己，能以正直全于多难之时。刺史谯王承命为主簿，便说甘卓。卓留为参军，欲与同行，以母老辞卓而反。承为魏乂所败，以虞悝兄弟为承党，乂尽诛之，而求骞甚急。乡人皆为之惧，骞笑曰：“欲用我耳。彼新得州，多杀忠良，是其求贤之时，岂以行人为罪！”乃往诣乂。乂喜曰：“君所谓古之解扬也。”以为别驾。<br /><br />
　　骞有节操忠信，兼识量弘远，善与人交，久而益敬。太尉庾亮称之，以为长者。历武陵、始兴太守，迁大司农，卒于官。<br /><br />
</td></tr>

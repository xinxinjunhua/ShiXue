<td class="t50">郭彰传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　郭彰，字叔武，太原人，贾后从舅也。与贾充素相亲遇，充妻待彰若同生。历散骑常侍、尚书、卫将军，封冠军县侯。<br /><br />
　　及贾后专朝，彰豫参权势，物情归附，宾客盈门。世人称为“贾郭”，谓谧及彰也。卒，谥曰烈。<br /><br />
</td></tr>

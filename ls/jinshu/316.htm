<td class="t50">袁悦之祖台之传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　袁悦之，字元礼，陈郡阳夏人也。父朗，给事中。悦之能长短说，甚有精理。始为谢玄参军，为玄所遇，丁忧去职。服阕还都，止赍《战国策》，言天下要惟此书。后甚为会稽王道子所亲爱，每劝道子专览朝权，道子颇纳其说。俄而见诛。<br /><br />
　　祖台之，字元辰，范阳人也。官至侍中、光禄大夫。撰志怪，书行于世。<br /><br />

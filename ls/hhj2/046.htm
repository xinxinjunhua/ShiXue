<td class="t50">汉光武帝纪(45)</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　建武十四年<span class="zs">[38年]</span><br /><br />
　　春正月，匈奴遣使来献。中郎将刘襄使匈奴。<br /><br />
　　夏四月辛巳，封孔子后孔志为褒城侯。越嶲人任贵遣使降。<br /><br />
　　九月，莎车王贤、〔鄯〕善王〔安〕（心信）遣使奉献<sup><span style="color: #FF0000">①</span></sup>。<br /><br />
　　<span class="zs">①据《袁纪》本卷末之文及《范书》改。</span><br /><br />
　　济南太守王梁薨。初，梁为河南尹，穿渠引谷水，以注洛阳城下。渠成而不流，有司奏劾梁。梁惭惧，上书乞骸骨。上乃徙梁为济南相<sup><span style="color: #FF0000">①</span></sup>，更封阜城侯。<br /><br />
　　<span class="zs">①《袁纪》上文作“济南太守”，《范书》王梁传引诏文亦同，又济南国建武十五年始建，此作“济南相”，误。</span><br /><br />

<td class="t50">汉顺帝纪(14)</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　永和三年<span class="zs">[138年]</span><br /><br />
　　春二月乙亥，京师地震。<br /><br />
　　夏闰月己酉，京师地震。<br /><br />
　　秋八月乙卯，太白昼见。本志以为大将军梁商父子贵盛之象也。<sup><span style="color: #FF0000">①</span></sup><br /><br />
　　<span class="zs">①此亦《东观记》天文志之文。</span><br /><br />
　　己未，司徒黄尚以灾异罢。<br /><br />
　　九月癸酉，光禄勋刘寿为司徒<sup><span style="color: #FF0000">①</span></sup>。<br /><br />
　　<span class="zs">①《范书》作“九月己酉”。按是月庚午朔，无己酉，《范书》误。又《袁纪》“光禄”下原脱“勋”字，径补。</span><br /><br />
　　十二月戊申，日有蚀之<sup><span style="color: #FF0000">①</span></sup>。会稽（九）郡以闻<sup><span style="color: #FF0000">②</span></sup>，京师不见。<br /><br />
　　<span class="zs">①《续汉志》及《范书》均作“十二月戊戌朔”。</span><br />
　　<span class="zs">②据《续汉志》删。</span><br /><br />

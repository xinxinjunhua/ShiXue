<td class="t50">汉光武帝纪(61)</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　建武三十一年<span class="zs">[55年]</span><br /><br />
　　夏五月戊辰，赐天下男子爵，人二级；鳏寡孤独贫不能自存者粟，人五斛。<br /><br />
　　癸酉晦，日有食之。<br /><br />
　　秋九月甲辰，诏死罪下蚕室，其女子者宫。<br /><br />
　　鲜卑大人于仇贲率其种人贡献。封贲为王。鲜卑亦东胡之余也，别居鲜卑山，因号焉。其言语习俗与乌桓同。自为冒顿所破，远窜辽东，未有名通于汉，而与乌桓接。当是时南北单于更相攻伐，而鲜卑遂以强盛。<br /><br />

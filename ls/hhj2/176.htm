<td class="t50">汉桓帝纪(15)</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　延熹三年<span class="zs">[160年]</span><br /><br />
　　正月丙申，大赦天下。<br /><br />
　　丙午，车骑将军单超薨。<br /><br />
　　闰月，羌寇张掖。护羌校尉段颎讨之。<br /><br />
　　五月甲戌，诏曰：“汝南太守张彪、故河南尹鲍吉，与朕有潜龙之旧，皆封列侯。”<br /><br />
　　六月辛酉<sup><span style="color: #FF0000">①</span></sup>，司徒祝恬薨。光禄勋种暠为司徒<sup><span style="color: #FF0000">②</span></sup>。<br /><br />
　　<span class="zs">①《范书》桓帝纪作“辛丑”。</span><br />
　　<span class="zs">②《范书》桓帝纪作“司空盛允为司徒”。《通鉴考异》曰：“按祝恬薨后有盛允，允免，暠为司徒，相去半年，《袁纪》误也。”</span><br /><br />
　　九月，泰山盗贼群起。<br /><br />
　　十二月，中郎将宗资讨之。<br /><br />

<td class="t50">汉灵帝纪(25)</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　中平三年<span class="zs">[186年]</span><br /><br />
　　春二月，太尉张延久病罢。<br /><br />
　　庚戌，大赦天下。<br /><br />
　　三月，车骑将军张温为太尉<sup><span style="color: #FF0000">①</span></sup>。<br /><br />
　　<span class="zs">①时温驻车于长安，督讨边章、韩遂及先零羌。帝遣使就拜，三公在外自温始。</span><br /><br />
　　夏五月壬辰晦，日有蚀之。诏公卿举直言。<br /><br />

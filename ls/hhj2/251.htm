<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　建安十四年<span class="zs">[209年]</span><br /><br />
　　刘备以孙权行车骑将军，备自领荆州，屯公安。<br /><br />
　　七月，曹操征孙权。<br /><br />
　　冬十月晦，日有蚀之<sup><span style="color: #FF0000">①</span></sup><br /><br />
　　<span class="zs">①冬十月，荆州有地震，见《范书》。诸书是月皆不言有地震，恐系前文“冬十月癸未，日有蚀之”之重出而致误。</span><br /><br />
　　＊＊＊<br /><br />
　　十五年<span class="zs">[210年]</span><br /><br />
　　春二月乙巳，日有蚀之<sup><span style="color: #FF0000">①</span></sup>。<br /><br />
　　<span class="zs">①“乙巳”下当有“朔”字。</span><br /><br />

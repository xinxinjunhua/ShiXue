<td class="t50">汉顺帝纪(10)</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　阳嘉三年<span class="zs">[134年]</span><br /><br />
　　夏戊戌，大赦天下<sup><span style="color: #FF0000">①</span></sup>。赐民爵；八十已上米，人一斛；九十已上帛，人一匹，絮三斤。<br /><br />
　　<span class="zs">①《范书》顺帝纪“夏”下有“五月”二字，《袁纪》脱。</span><br /><br />
　　秋七月，羌寇〔汉〕（濮）阳<sup><span style="color: #FF0000">①</span></sup>。<br /><br />
　　<span class="zs">①汉濮形近而讹。</span><br /><br />
　　冬十一月，羌寇武都。<br /><br />
　　壬寅，司徒刘〔崎〕（恺）、司空孔扶以灾异免<sup><span style="color: #FF0000">①</span></sup>。<br /><br />
　　<span class="zs">①恺死于延光二年，此“恺”乃“崎”之误。</span><br /><br />
　　己巳<sup><span style="color: #FF0000">①</span></sup>，大司农黄尚为司徒，光禄勋王卓为司空。<br /><br />
　　<span class="zs">①是月壬辰朔，无己巳。“己巳”乃“乙巳”之讹。与壬寅隔二日，与事合。</span><br /><br />

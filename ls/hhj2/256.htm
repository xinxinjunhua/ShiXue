<td class="t50">汉献帝纪(40)</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　建安二十年<span class="zs">[215年]</span><br /><br />
　　春正月，立皇后曹氏，操女也。初操以二女为贵人，大贵人立为皇后。<br /><br />
　　＊＊＊<br /><br />
　　三月，曹操征张鲁。<br /><br />
　　秋七月，鲁遂降。<br /><br />
　　＊＊＊<br /><br />
　　二十一年<span class="zs">[216年]</span><br /><br />
　　春正月己丑<sup><span style="color: #FF0000">①</span></sup>，封魏公子六人为列侯。<br /><br />
　　<span class="zs">①正月辛丑朔，无己丑，疑系乙丑之讹。</span><br /><br />
　　夏四月甲午，进魏公爵为王<sup><span style="color: #FF0000">①</span></sup>。<br /><br />
　　<span class="zs">①《范书》献帝纪作“曹操自进号魏王”。又魏志武帝纪作“夏五月”，未知孰是。</span><br /><br />
　　五月己亥朔，日有蚀之。<br /><br />

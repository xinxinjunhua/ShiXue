<td class="t50">汉桓帝纪(7)</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　元嘉二年<span class="zs">[152年]</span><br /><br />
　　正月丙辰<sup><span style="color: #FF0000">①</span></sup>，京师地震。<br /><br />
　　<span class="zs">①《范书》亦同。按是月壬午朔，无丙辰，疑皆误。</span><br /><br />
　　四月甲寅，孝崇皇后崩。帝举哀洛阳西乡。有司奏“礼为人后，制服有降，公卿已下各有差。赠送之礼仪，比恭怀皇后”。是时大将军梁冀辅政，匽氏无在位者。<br /><br />
　　八月，黄龙见句阳，又见允〔街〕（衙）<sup><span style="color: #FF0000">①</span></sup>。<br /><br />
　　<span class="zs">①据《范书》及《续汉《郡国志》》改。</span><br /><br />
　　十月乙亥，京师地震。<br /><br />

<td class="t50">汉明帝纪(9)</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　永平九年<span class="zs">[66年]</span><br /><br />
　　夏四月，诏以公田赐贫民各有差，长吏居职三年尤异者与计偕。<sup><span style="color: #FF0000">①</span></sup><br /><br />
　　<span class="zs">①冯班曰：“计者，上计簿使也。偕，俱也。与上计使者偕来也。”按《范书》明帝纪“尤异者”下有“各一人”三字，并曰：“及尤不政理者，亦以闻。”欲以奖善惩恶。</span><br /><br />
　　封皇子恭为灵寿王，党为重喜王<sup><span style="color: #FF0000">①</span></sup>。<br /><br />
　　<span class="zs">①均为美号，并无国邑。</span><br /><br />

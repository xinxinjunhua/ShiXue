<td class="t50">汉灵帝纪(20)</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　光和五年<span class="zs">[182年]</span><br /><br />
　　春正月辛未，大赦天下。<br /><br />
　　二月，大疫。<br /><br />
　　三月，诏三公以谣言举刺史、二千石贪污浊秽为蠹害者。<br /><br />
　　夏，旱<sup><span style="color: #FF0000">①</span></sup>。<br /><br />
　　<span class="zs">①《范书》灵帝纪“夏”下有“四月”两字。</span><br /><br />
　　五月庚申，永乐宫署灾。<br /><br />
　　秋七月，星孛于太微。<br /><br />
　　＊＊＊<br /><br />
　　六年<span class="zs">[183年]</span><br /><br />
　　春三月辛未，大赦天下。<br /><br />
　　夏，爵号皇后母为舞阳君。<br /><br />
　　秋，金城河水溢出二十余里。<br /><br />

<td class="t50">汉献帝纪(36)</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　建安十六年<span class="zs">[211年]</span><br /><br />
　　春正月辛巳，以曹操世子丕为五官中郎将，副丞相<sup><span style="color: #FF0000">①</span></sup>。<br /><br />
　　<span class="zs">①副丞相，乃丞相副手之意，非正式官名。胡三省曰：“汉五官中郎将，主五官郎而已，未尝置官属也。领属光禄勋，未尝为丞相副也。”以五官中郎将副丞相，仅此一例。</span><br /><br />
　　三月，马超、韩遂反。<br /><br />
　　秋七月，操征超、遂，大破之。<br /><br />
　　是岁，刘备入益州。<br /><br />
</td></tr>

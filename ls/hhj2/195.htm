<td class="t50">汉灵帝纪(10)</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　熹平二年<span class="zs">[173年]</span><br /><br />
　　春二月，大赦天下。<br /><br />
　　夏四月，司隶校尉段颎为太尉<sup><span style="color: #FF0000">①</span></sup>。<br /><br />
　　<span class="zs">①《范书》作“五月”。</span><br /><br />
　　秋七月，光禄勋杨赐为司空<sup><span style="color: #FF0000">①</span></sup>。<br /><br />
　　<span class="zs">①《范书》灵帝纪作“司空杨赐免，太常颍川唐珍为司空”。按杨赐传，熹平二年，代唐珍为司空。钱大昕廿二史考异曰：“案灵帝纪，熹平二年正月，司空宗俱薨。二月，以光禄勋杨赐为司空。七月司空杨赐免，太常唐珍为司空。是赐代宗俱，而珍代赐也。传误。”据此则七月任司空者，唐珍也。又《续汉书》亦曰：“熹平二年，太常颍川唐珍为司空，中常侍唐衡弟。”《袁纪》恐误。</span><br /><br />

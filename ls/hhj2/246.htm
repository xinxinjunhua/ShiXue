<td class="t50">汉献帝纪(30)</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　建安十一年<span class="zs">[206年]</span><br /><br />
　　正月<sup><span style="color: #FF0000">①</span></sup>，有星孛于北斗。占曰：“人主易位。”<br /><br />
　　<span class="zs">①其上当脱“春”字。</span><br /><br />
　　曹操征高干，斩之。<br /><br />
　　己丑<sup><span style="color: #FF0000">①</span></sup>，增封操并前三万户，食柘城、阳夏四县，比邓禹、吴汉故事。<br /><br />
　　<span class="zs">①正月己亥朔，无己丑。疑系乙丑之误。</span><br /><br />
　　秋七月，武威太守张猛杀叙州刺史邯郸商<sup><span style="color: #FF0000">①</span></sup>。<br /><br />
　　<span class="zs">①原误作“商邯”，据《范书》、《通鉴》径改。又《范书》献帝纪“叙州”作“雍州”。按兴平元年，分叙州河西四郡置雍州，武威属河西四郡，当以《范书》为是。</span><br /><br />

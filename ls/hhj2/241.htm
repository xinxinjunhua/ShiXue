<td class="t50">汉献帝纪(25)</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　建安六年<span class="zs">[201年]</span><br /><br />
　　春三月，曹操以袁绍新败，欲悉军以征刘表，以问尚书令荀彧曰。彧曰：“今绍之败，其众离心，宜因而遂定；而欲远背兖豫，南军江汉。夫困兽犹斗，况在绍乎？若收绍其余烬承虚以出，则公之事去矣。”<br /><br />
　　四月，曹操将兵于河上。<br /><br />
　　八月辛卯，侍中郗虑、尚书令荀彧、司隶校尉钟繇侍讲于内。<br /><br />
　　冬十一月，曹操征刘备。备奔刘表，屯新野。<br /><br />

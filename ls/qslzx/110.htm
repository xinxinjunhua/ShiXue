<td class="t50">袁孙贻</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　彭孙贻，字仲谋；浙江海盐人，明拔贡生。天性孝友，读书过目成诵。与同邑吴审昌创瞻社，为名流所重；时称武原二仲。貌魁伟，好诙谐，豪于饮，人有“长鲸”之目。生平耻为龌龊士，动以古人自命。痛父殉国难，蔬食箨冠，终身不仕。<br /><br />
　　工诗，七言律诗效放翁，为王士祯所赏；其《虔台寒食怨》一篇，感刘生之义，实抱先人隐痛焉。著有《甲申亡臣表》、《流寇志》、《方士外纪》、《彭氏旧闻录》、《五言妙境茗斋集》。<br /><br />
　　——卷七十《文苑传》（一）。<br /><br />

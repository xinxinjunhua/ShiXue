<td class="t50">高祖三王传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　高祖八男：<br /><br />
　　丁贵嫔生昭明太子统，太宗简文皇帝，庐陵威王续；<br /><br />
　　阮修容生世祖孝元皇帝；<br /><br />
　　吴淑媛生豫章王综；<br /><br />
　　董淑仪生南康简王绩；<br /><br />
　　丁充华生邵陵携王纶；葛修容生武陵王纪。<br /><br />
　　综及纪别有传。<br /><br />
</td></tr>

<hr />

<tr><td>
<br />
　　陈吏部尚书姚察曰：世之诬处士者，多云纯盗虚名而无适用，盖有负其实者。若诸葛璩之学术，阮孝绪之簿阀，其取进也岂难哉？终于隐居，固亦性而已矣。<br /><br />

<td class="t50">文学传论</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　陈吏部尚书姚察曰：魏文帝称古之文人，鲜能以名节自全。何哉？夫文者妙发性灵，独拔怀抱，易邈等夷，必兴矜露。大则凌慢侯王，小则慠蔑朋党；速忌离訧，启自此作。若夫屈、贾之流斥，桓、冯之摈放，岂独一世哉？盖恃才之祸也。<br /><br />
　　群士值文明之运，摛艳藻之辞，无郁抑之虞，不遭向时之患，美矣。刘氏之论，命之徒也。命也者，圣人罕言欤，就而必之，非经意也。<br /><br />

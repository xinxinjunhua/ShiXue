<td class="t50">殷芸传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　殷芸，字灌蔬，陈郡长平人。性倜傥，不拘细行。然不妄交游，门无杂客。励精勤学，博洽群书。幼而庐江何宪见之，深相叹赏。永明中，为宜都王行参军。<br /><br />
　　天监初，为西中郎主簿、后军临川王记室。七年，迁通直散骑侍郎，兼中书通事舍人。<br /><br />
　　十年，除通直散骑侍郎，兼尚书左丞，又兼中书舍人，迁国子博士、昭明太子侍读、西中郎豫章王长史，领丹阳尹丞，累迁通直散骑常侍、秘书监、司徒左长史。<br /><br />
　　普通六年，直东宫学士省。大通三年卒，时年五十九。<br /><br />

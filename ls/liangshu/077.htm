<td class="t50">衡阳嗣王萧元简传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　衡阳嗣王元简，字熙远，高祖第四弟畅之子。畅仕齐至太常，封江陵县侯，卒。<br /><br />
　　天监元年，追赠侍中、骠骑大将军、开府仪同三司。封衡阳郡王。谥曰宣。<br /><br />
　　元简三年袭封，除中书郎，迁会稽太守。<br /><br />
　　十三年，入为给事黄门侍郎，出为持节、都督广、交、越三州诸军事、平越中郎将、广州刺史。还为太子中庶子，迁使持节、都督郢、司、霍三州诸军事、信武将军、郢州刺史。<br /><br />
　　十八年正月，卒于州。谥曰孝。子俊嗣。<br /><br />

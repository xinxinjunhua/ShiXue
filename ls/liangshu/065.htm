<td class="t50">王训传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　训字怀范，幼聪警有识量，征士何胤见而奇之。年十三，暕亡忧毁，家人莫之识。十六，召见文德殿，应对爽彻。上目送久之，顾谓朱异曰：“可谓相门有相矣。”补国子生，射策高第，除秘书郎，迁太子舍人、秘书丞。转宣城王文学、友、太子中庶子，掌管记。俄迁侍中，既拜入见，高祖从容问何敬容曰：“褚彦回年几为宰相？”敬容对曰：“少过三十。”上曰：“今之王训，无谢彦回。”<br /><br />
　　训美容仪，善进止，文章之美，为后进领袖。在春宫特被恩礼。以疾终于位，时年二十六。赠本官。谥温子。<br /><br /><br />
</td></tr>

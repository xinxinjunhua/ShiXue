<td class="t50">孔佥传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　孔佥，会稽山阴人。少师事何胤，通《五经》，尤明《三礼》、《孝经》、《论语》，讲说并数十遍，生徒亦数百人。历官国子助教，三为《五经》博士，迁尚书祠部郎。出为海盐、山阴二县令。佥儒者，不长政术，在县无绩。太清乱，卒于家。<br /><br />
　　子俶玄，颇涉文学，官至太学博士。<br /><br />
　　佥兄子元素，又善《三礼》，有盛名，早卒。<br /><br />

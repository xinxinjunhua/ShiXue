<td class="t50">袁峻传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　袁峻，字孝高，陈郡阳夏人，魏郎中令涣之八世孙也。峻早孤，笃志好学，家贫无书，每从人假借，必皆抄写，自课日五十纸，纸数不登，则不休息。讷言语，工文辞。义师克京邑，鄱阳王恢东镇破冈，峻随王知管记事。<br /><br />
　　天监初，鄱阳国建，以峻为侍郎，从镇京口。王迁郢州，兼都曹参军。高祖雅好辞赋，时献文于南阙者相望焉，其藻丽可观，或见赏擢。<br /><br />
　　六年，峻乃拟扬雄《官箴》奏之。高祖嘉焉，赐束帛。除员外散骑侍郎，直文德学士省，抄《史记》、《汉书》各为二十卷。又奉敕与陆倕各制《新阙铭》，辞多不载。<br /><br />

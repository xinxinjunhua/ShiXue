<td class="t50">刘慧斐传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘慧斐，字文宣，彭城人也。少博学，能属文，起家安成王法曹行参军。尝还都，途经寻阳，游于匡山，过处士张孝秀，相得甚欢，遂有终焉之志。因不仕，居于东林寺。又于山北构园一所，号曰离垢园，时人乃谓为离垢先生。<br /><br />
　　慧斐尤明释典，工篆隶，在山手写佛经二千余卷，常所诵者百余卷。昼夜行道，孜孜不怠，远近钦慕之。太宗临江州，遗以几杖。论者云：自远法师没后，将二百年，始有张、刘之盛矣。世祖及武陵王等书问不绝。<br /><br />
　　大同二年，卒，时年五十九。<br /><br />

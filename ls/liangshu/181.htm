<td class="t50">卞华传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　卞华，字昭丘，济阴冤句人也。晋骠骑将军忠贞公壸六世孙。父伦之，给事中。华幼孤贫好学。年十四，召补国子生，通《周易》。既长，遍治《五经》，与平原明山宾、会稽贺蒨同业友善。起家齐豫章王国侍郎，累迁奉朝请、征西行参军。<br /><br />
　　天监初，迁临川王参军事，兼国子助教，转安成王功曹参军，兼《五经》博士，聚徒教授。<br /><br />
　　华博涉有机辩，说经析理，为当时之冠。江左以来，钟律绝学，至华乃通焉。迁尚书仪曹郎，出为吴令，卒。<br /><br />
</td></tr>

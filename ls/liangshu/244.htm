<td class="t50">良吏传论</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　陈吏部尚书姚察曰：前史有循吏，何哉？世使然也。汉武役繁奸起，循平不能，故有苛酷诛戮以胜之，亦多怨滥矣。梁兴，破觚为圆，斫雕为朴，教民以孝悌，劝之以农桑，于是桀黠化为由余，轻薄变为忠厚。淳风已洽，民自知禁。尧舜之民，比屋可封，信矣。若夫酷吏，于梁无取焉。<br /><br />

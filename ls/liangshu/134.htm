<td class="t50">元愿达传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　元愿达，亦魏之支庶也。祖明元帝。父乐平王。愿达仕魏为中书令、郢州刺史。普通中，大军北伐，攻义阳，愿达举州献款，诏封乐平公，邑千户，赐甲第女乐。仍出为使持节、散骑常侍、都督湘州诸军事、平南将军、湘州刺史。<br /><br />
　　中大通二年，征侍中、太中大夫、翊左将军。<br /><br />
　　大同三年，卒，时年五十七。<br /><br />

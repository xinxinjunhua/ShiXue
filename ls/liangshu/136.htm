<td class="t50">杨华传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　杨华，武都仇池人也。父大眼，为魏名将。华少有勇力，容貌雄伟，魏胡太后逼通之，华惧及祸，乃率其部曲来降。胡太后追思之不能已，为作《杨白华歌辞》，使宫人昼夜连臂蹋足歌之，辞甚悽惋焉。<br /><br />
　　华后累征伐，有战功，历官太仆卿，太子左卫率，封益阳县侯。<br /><br />
　　太清中，侯景乱，华欲立志节，妻子为贼所擒，遂降之，卒于贼。<br /><br />

<td class="t50">刘览传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　览，字孝智，十六通《老》、《易》。历官中书郎，以所生母忧，庐于墓。再期，口不尝盐酪，冬止著单布。家人患其不胜丧，中夜窃置炭于床下，览因暖气得睡，既觉知之，号恸欧血。高祖闻其有至性，数省视之。服阕，除尚书左丞。性聪敏，尚书令史七百人，一见并记名姓。当官清正，无所私。姊夫御史中丞褚湮、从兄吏部郎孝绰，在职颇通赃货，览劾奏，并免官。孝绰怨之，尝谓人曰：“犬啮行路，览噬家人。”出为始兴内史，治郡尤励清节。还复为左丞，卒官。<br /><br />
</td></tr>

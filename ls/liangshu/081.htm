<td class="t50">萧昂传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　昂字子明，景第三弟也。天监初，累迁司徒右长史，出为轻车将军、监南兖州。初，兄景再为南兖，德惠在人，及昂来代，时人方之冯氏。征为琅邪、彭城二郡太守，军号如先。复以轻车将军出为广州刺史。<br /><br />
　　普通二年，为散骑常侍、信威将军。<br /><br />
　　四年，转散骑侍郎、中领军、太子中庶子，出为吴兴太守。<br /><br />
　　大通二年，征为仁威将军、卫尉卿，寻为侍中，兼领军将军。中大通元年，为领军将军。<br /><br />
　　二年，封湘阴县侯，邑一千户。出为江州刺史。<br /><br />
　　大同元年，卒，时年五十三。谥曰恭。<br /><br />

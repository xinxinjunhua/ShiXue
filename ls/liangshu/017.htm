<td class="t50">高祖阮修容阮令嬴传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　高祖阮修容，讳令嬴，本姓石，会稽余姚人也。齐始安王遥光纳焉。遥光败，入东昏宫。建康城平，高祖纳为彩女。<br /><br />
　　天监七年八月，生世祖。寻拜为修容，常随世祖出蕃。<br /><br />
　　大同六年六月，薨于江州内寝，时年六十七。<br /><br />
　　其年十一月，归葬江宁县通望山。谥曰宣。世祖即位，有司奏追崇为文宣太后。<br /><br />
　　承圣二年，追赠太后父齐故奉朝请灵宝散骑常侍、左卫将军，封武康县侯，邑五百户；母陈氏，武康侯夫人。<br /><br />

<td class="t50">鱼弘传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　鱼弘，襄阳人。身长八尺，白皙美姿容。累从征讨，常为军锋，历南谯、盱眙、竟陵太守。<br /><br />
　　常语人曰：“我为郡，所谓四尽：水中鱼鳖尽，山中麞鹿尽，田中米谷尽，村里民庶尽。丈夫生世，如轻尘栖弱草，白驹之过隙。人生欢乐富贵几何时！”于是恣意酣赏，侍妾百余人，不胜金翠，服玩车马，皆穷一时之绝。<br /><br />
　　迁为平西湘东王司马、新兴、永宁二郡太守，卒官。<br /><br />

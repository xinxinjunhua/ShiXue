<td class="t50">太宗皇后王灵宾传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　太宗简皇后王氏，讳灵宾，琅邪临沂人也。祖俭，太尉、南昌文宪公。<br /><br />
　　后幼而柔明淑德，叔父暕见之曰：“吾家女师也。”天监十一年，拜晋安王妃。生哀太子大器，南郡王大连，长山公主妙纮。中大通三年十月，拜皇太子妃。太清三年三月，薨于永福省，时年四十五。其年，太宗即位，追崇为皇后，谥曰简。大宝元年九月，葬庄陵。先是诏曰：“简皇后窀穸有期。昔西京霸陵，因山为藏；东汉寿陵，流水而已。朕属值时艰，岁饥民弊，方欲以身率下，永示敦朴。今所营庄陵，务存约俭。”又诏金紫光禄大夫萧子范为哀策文。<br /><br />

<td class="t50">卢广传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　卢广，范阳涿人，自云晋司空从事中郎谌之后也。谌没死冉闵之乱，晋中原旧族，谌有后焉。广少明经，有儒术。<br /><br />
　　天监中归国。初拜员外散骑侍郎，出为始安太守，坐事免。顷之，起为折冲将军，配千兵北伐，还拜步兵校尉，兼国子博士，遍讲《五经》。<br /><br />
　　时北来人，儒学者有崔灵恩、孙详、蒋显，并聚徒讲说，而音辞鄙拙；惟广言论清雅，不类北人。仆射徐勉，兼通经术，深相赏好。寻迁员外散骑常侍，博士如故。出为信武桂阳嗣王长史、寻阳太守。又为武陵王长史，太守如故，卒官。<br /><br />

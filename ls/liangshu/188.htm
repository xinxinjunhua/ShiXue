<td class="t50">皇侃传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　皇侃，吴郡人，青州刺史皇象九世孙也。侃少好学，师事贺蒨，精力专门，尽通其业，尤明《三礼》、《孝经》、《论语》。起家兼国子助教，于学讲说，听者数百人。撰《礼记讲疏》五十卷，书成奏上，诏付秘阁。顷之，召入寿光殿讲《礼记义》，高祖善之，拜员外散骑侍郎，兼助教如故。<br /><br />
　　性至孝，常日限诵《孝经》二十遍，以拟《观世音经》。丁母忧，解职还乡里。平西邵陵王钦其学，厚礼迎之。侃既至，因感心疾，大同十一年，卒于夏首，时年五十八。<br /><br />
　　所撰《论语义》十卷，与《礼记义》并见重于世，学者传焉。<br /><br />

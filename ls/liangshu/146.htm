<td class="t50">刘瑴传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘瑴，字仲宝，晋丹阳尹真长七世孙也。少方正有器局。自国子礼生射策高第，为宁海令，稍迁湘东王记室参军，又转中记室。<br /><br />
　　太清中，侯景乱，世祖承制上流，书檄多委瑴焉，瑴亦竭力尽忠，甚蒙赏遇。历尚书左丞、御史中丞。<br /><br />
　　承圣二年，迁吏部尚书、国子祭酒，余如故。<br /><br />

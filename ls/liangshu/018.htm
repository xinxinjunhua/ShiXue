<td class="t50">世祖徐妃徐昭佩传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　世祖徐妃，讳昭佩，东海郯人也。祖孝嗣，太尉、枝江文忠公。父绲，侍中、信武将军。<br /><br />
　　天监十六年十二月，拜湘东王妃。生世子方等、益昌公主含贞。<br /><br />
　　太清三年五月，被谴死，葬江陵瓦官寺。<br /><br />
　　＊＊＊<br /><br />
　　史臣曰：后妃道赞皇风，化行天下，盖取《葛覃》、《关雎》之义焉。至于穆贵嫔，徽华早著，诞育元良，德懋六宫，美矣。世祖徐妃之无行，自致歼灭，宜哉。<br /><br />
</td></tr>

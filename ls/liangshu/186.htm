<td class="t50">太史叔明传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　太史叔明，吴兴乌程人，吴太史慈后也。少善《庄》、《老》，兼治《孝经》、《礼记》，其三玄尤精解，当世冠绝，每讲说，听者常五百余人。历官国子助教。邵陵王纶好其学，及出为江州，携叔明之镇。王迁郢州，又随府，所至辄讲授，江外人士皆传其学焉。<br /><br />
　　大同十三年，卒，时年七十三。<br /><br />
</td></tr>

<td class="t50">张孝秀传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张孝秀，字文逸，南阳宛人也。少仕州为治中从事史。遭母忧，服阕，为建安王别驾。顷之，遂去职归山，居于东林寺。有田数十顷，部曲数百人，率以力田，尽供山众，远近归慕，赴之如市。孝秀性通率，不好浮华，常冠谷皮巾，蹑蒲履，手执并榈皮麈尾。服寒食散，盛冬能卧于石。博涉群书，专精释典。善谈论，工隶书，凡诸艺能，莫不明习。<br /><br />
　　普通三年，卒，时年四十二，室中皆闻有非常香气。太宗闻，甚伤悼焉，与刘慧斐书，述其贞白云。<br /><br />

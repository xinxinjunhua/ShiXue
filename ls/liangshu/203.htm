<td class="t50">刘沼传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘沼，字明信，中山魏昌人。六代祖舆，晋骠骑将军。沼幼善属文，既长博学。仕齐起家奉朝请，冠军行参军。天监初，拜后军临川王记室参军，秣陵令，卒。<br /><br />

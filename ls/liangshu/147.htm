<td class="t50">宗懔传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　宗懔，字元懔。八世祖承，晋宜都郡守，属永嘉东徙，子孙因居江陵焉。懔少聪敏好学，昼夜不倦，乡里号为“童子学士”。<br /><br />
　　普通中，为湘东王府兼记室，转刑狱，仍掌书记。历临汝、建成、广晋等令，后又为世祖荆州别驾。及世祖即位，以为尚书郎，封信安县侯，邑一千户。累迁吏部郎中、五兵尚书、吏部尚书。<br /><br />
　　承圣三年，江陵没，与瑴俱入于周。<br /><br />

<tr><td class="t50">柳子华传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　公绰伯父子华，永泰初，为严武西蜀判官，奏为成都令。累迁池州刺史。入为昭应令，知府东十三县捕贼，寻检校金部郎中、修葺华清宫使。元载欲用为京兆尹，未拜而卒。自知死日，预为墓志。有知人之明。公绰生三日，视之，谓其弟子温曰：“保惜此儿，福祚吾兄弟不能及。兴吾门者，此儿也。”因以起之为公绰字。<br /><br />
　　子华二子：公器、公度。<br /><br />
　　公度善摄生，年八十余，步履轻便。或祈其术，曰：“吾初无术，但未尝以元气佐喜怒，气海常温耳！”位止光禄少卿。<br /><br />
　　公器子遵。遵子璨。璨仕至宰相，自有传。<br /><br />

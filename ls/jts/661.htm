<tr><td class="t50">贾隐林传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贾隐林者，滑州牙将也。建中初，为本军兵马使，令率兵宿卫。朱泚之乱，诸军未集，隐林率众扈从。性质朴，在奉天，贼急攻城，隐林与侯仲庄逐急救应，难险备至。既而怀光军至，逆贼解围，从臣称庆。隐林抃舞毕，奏曰：“贼泚奔遁，臣下大庆，此皆宗社无疆之休。然陛下性灵太急，不能容忍，若旧性未改，贼虽奔亡，臣恐忧未艾也。”上不以为忤，甚称之。累官至检校右散骑常侍，封武威郡王。将幸山南而卒，赠左仆射，赐其家实封三百户，赙绢百匹、米百硕，丧葬官给。<br /><br />

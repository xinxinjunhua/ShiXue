<tr><td class="t50">张士贵传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张士贵者，虢州卢氏人也。本名忽峍，善骑射，膂力过人。<br /><br />
　　大业末，聚众为盗，攻剽城邑，远近患之，号为“忽峍贼”。高祖降书招怀之，士贵以所统送款，拜右光禄大夫。累有战功，赐爵新野县公。从平东都，授虢州刺史。高祖谓之曰：“欲卿衣锦昼游耳。”<br /><br />
　　寻入为右武候将军。<br /><br />
　　贞观七年，破反獠而还，太宗劳之曰：“闻公亲当矢石，为士卒先，虽古名将，何以加也！朕尝闻以身报国者，不顾性命，但闻其语，未闻其实，于公见之矣。”<br /><br />
　　后累迁左领军大将军，改封虢国公。<br /><br />
　　显庆初卒，赠荆州都督，陪葬昭陵。<br /><br />

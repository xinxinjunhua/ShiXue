<td class="t50">汉景帝纪(3)</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　四年春。复置诸关。用传出入。<br /><br />
　　夏四月己巳。立皇子荣为皇太子。彻为胶东王。<br /><br />
　　六月。赦天下。赐民爵一级。<br /><br />
　　七月。临江王阏薨。谥哀。无子。国除。<br /><br />
　　＊＊＊<br /><br />
　　五年春正月。作阳陵邑。<br /><br />
　　夏。募民徙阳邑钱户二十万。遣公主妻匈奴单于。<br /><br />

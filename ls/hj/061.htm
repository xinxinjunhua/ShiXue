<td class="t50">汉武帝纪(13)</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　元朔三年春。罢苍梧郡。<br /><br />
　　三月赦天下。<br /><br />
　　夏。匈奴伊雅斜单于入代。杀太守。入雁门。杀略千余人。<br /><br />
　　六月庚申。皇太后崩。御史大夫张欧免。内史公孙弘为御史大夫。<br /><br />
　　秋，罢西南夷屯。公孙弘以为疲弊中国。以奉无用之地。请罢之。筑朔方城。令人大酺五日。<br /><br />
　　＊＊＊<br /><br />
　　四年冬。行幸甘泉。<br /><br />
　　夏。匈奴入代定襄上郡。杀数千人。<br /><br />

<td class="t50">汉惠帝纪(7)</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　七年春正月辛酉朔，日有食之。是谓正朔。王者恶之。<br /><br />
　　夏五月，日有食之。<br /><br />
　　秋八月，帝崩于未央宫。<br /><br />
　　太后哭而泪不下。侍中张辟彊者，张良子，年十五余，谓陈平曰：“太后泣不下泪者，畏君等危吕氏，宜请吕产吕禄为将，监南北军事，太后必喜，君等免祸。”平从之。太后果喜而泣之泪下。<br /><br />
　　九月，皇帝葬于安陵。<br /><br />
　　＊＊＊<br /><br />
　　赞曰：本纪称孝惠内修亲亲。外礼傅相。优宠齐悼赵隐。恩爱笃矣。可谓宽仁之主。遭吕太后亏损至德。枉流滥哉。深可悲矣。<br /><br />

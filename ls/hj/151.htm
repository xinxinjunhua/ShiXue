<td class="t50">汉成帝纪(20)</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　元延三年春正月丙寅。蜀郡岷山崩。拥江水竭。逆流三日乃通。刘向以为岐山崩。三川竭。而周幽王亡。岐山。周之所兴也。蜀郡本汉所兴。今所起之地。山崩水竭。殆必亡矣。<br /><br />
　　二月。封侍中卫尉淳于长为定陵侯。<br /><br />
　　三月。行幸雍。祠五畤。<br /><br />
　　＊＊＊<br /><br />
　　四年春正月。行幸甘泉馆。<br /><br />
　　二月罢司隶校尉官。<br /><br />
　　三月行幸河东。祠后土。甘露降于京师。有石陨于关东二。<br /><br />

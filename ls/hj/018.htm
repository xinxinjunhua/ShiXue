<td class="t50">汉惠帝纪(3)</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　三年春。发京师六百里内男女十四万六千人。筑长安城。三十日罢。以宗室女为公主。妻匈奴单于。<br /><br />
　　夏五月。立闽越君繇为东瓯王。初。繇与诸粤俱佐诸侯伐秦。繇功未录。故立为王。都瓯东。号东瓯。<br /><br />
　　六月。发诸侯王列侯徒属一万人城长安。<br /><br />
　　秋七月。都厩灾。南越王尉佗称臣奉贡。殒石于绵诸一。<br /><br />

<td class="t50">建元以来王子侯者年表</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　制诏御史：“诸侯王或欲推私恩分子弟邑者，令各条上，朕且临定其号名。”<br /><br />
　　太史公曰：盛哉，天子之德！一人有庆，天下赖之。<br /><br />
　　（表略）<br /><br />

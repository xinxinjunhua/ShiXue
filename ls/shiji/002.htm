<td class="t50">五帝本纪·颛顼</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　帝颛顼高阳者，黄帝之孙而昌意之子也。<br /><br />
　　静渊以有谋，疏通而知事；养材以任地，载时以象天，依鬼神以制义，治气以教化，絜诚以祭祀。北至于幽陵，南至于交阯，西至于流沙，东至于蟠木。动静之物，大小之神，日月所照，莫不砥属。<br /><br />
　　帝颛顼生子曰穷蝉。<br /><br />
　　颛顼崩，而玄嚣之孙高辛立，是为帝喾。<br /><br />

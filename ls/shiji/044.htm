<td class="t50">惠景间侯者年表</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　太史公读列封至便侯曰：有以也夫！长沙王者，着令甲，称其忠焉。昔高祖定天下，功臣非同姓疆土而王者八国。至孝惠帝时，唯独长沙全，禅五世，以无嗣绝，竟无过，为籓守职，信矣。故其泽流枝庶，毋功而侯者数人。<br /><br />
　　及孝惠讫孝景间五十载，追修高祖时遗功臣，及从代来，吴楚之劳，诸侯子若肺腑，外国归义，封者九十有余。咸表始终，当世仁义成功之著者也。<br /><br />
　　（表略）<br /><br />

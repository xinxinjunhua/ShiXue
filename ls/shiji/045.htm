<td class="t50">建元以来侯者年表</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　太史公曰：匈奴绝和亲，攻当路塞；闽越擅伐，东瓯请降。二夷交侵，当盛汉之隆，以此知功臣受封侔于祖考矣。何者？自《诗》、《书》称三代“戎狄是膺，荆荼是征”，齐桓越燕伐山戎，武灵王以区区赵服单于，秦缪用百里霸西戎，吴楚之君以诸侯役百越。况乃以中国一统，明天子在上，兼文武，席卷四海，内辑亿万之众，岂以晏然不为连境征伐哉！自是后，遂出师北讨强胡，南诛劲越，将卒以次封矣。<br /><br />
　　（表略）<br /><br />

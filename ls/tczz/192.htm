<td class="t50">刘驾</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　驾，字司南，大中六年礼部侍郎崔屿下进士。初与曹邺为友，深相结，俱工古风诗。邺既擢第，不忍先归，待长安中，贺成名，乃同归范蠡故山。时国家复河、湟故地，有归马放牛之象，贺献乐府十章，《序》曰：“驾生唐二十八年，获见明天子以德归河、湟，臣得与天下夫妇复为太平人。恨愚且贱，不得拜舞上前，作诗十篇，虽不足贡声宗庙，形容盛德，愿与耕稼陶渔者，歌江湖田野间，亦足自快。”诗奏，上甚悦，累历达官。驾诗多比兴含蓄，体无定规，意尽即止，为时所宗。今集一卷，行于世。<br /><br />
</td></tr>

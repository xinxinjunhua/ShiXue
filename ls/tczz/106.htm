<td class="t50">窦常</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　常，字中行，叔向之子也。京兆人。大历十四年王储榜及第。初历从事，累官水部员外郎，连除阆、夔、江、抚四州刺史。后人为国子祭酒而终。常兄弟五人，联芳比藻，词价霭然，法度风流，相距不远。且俱陈力王事，膺宠清流，岂怀玉迷津区区之比哉。后人集所著诗通一百首为五卷，名《窦氏联珠集》，谓若五星然。常集十八卷，及撰韩翃至皎然三十人诗，合三百五十篇为《南薰集》，各系以赞，为三卷，今并传焉。<br /><br />
</td></tr>

<td class="t50">李山甫</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　山甫，咸通中累举进士不第，落魄有不羁才。须髯如戟，能为青白眼。生平憎俗子，尚豪侠，虽箪食豆羹，自甘不厌。为诗托讽，不得志，每狂歌痛饮，拔剑斫地，少摅郁郁之气耳。后流寓河、朔间，依乐彦稹为魏博从事，不得众情，以陵傲之，故无所遇。尝有《老将诗》曰：“校猎燕山经几春，雕弓白羽不离身。年来马上浑无力，望见飞鸿指拟人。”此伤其蹇薄无成，时人怜之。后不知所终。山甫诗文激切，耿耿有齐气，多感时怀古之作。今集一卷、赋二卷，并传。<br /><br />
</td></tr>

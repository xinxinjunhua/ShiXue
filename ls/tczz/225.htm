<td class="t50">章碣</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　碣，钱塘人，孝标之子也。累上著不第，咸通末以篇什称。乾符中，高湘侍郎自长沙携邵安古来京及第，碣恨湘不知己，赋《东都望幸》诗曰：“懒修珠翠上高台，眉月连妍恨不开。纵使东巡也无益，君王自领美人来。”后竟流落，不知所终。碣有异才，尝草创诗律，于八句中，足字平侧，各从本韵，如“东南路尽吴江畔，正是穷愁薄暮天。鸥鹭不嫌斜雨岸，波涛欺得逆风船。偶逢岛寺停帆看，深羡渔翁下钓眠。今古若论英达算，鸱夷高兴固无边。”自称变体。当时趋风者亦纷纷而起也。今有诗一卷，传于世。<br /><br />

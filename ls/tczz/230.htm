<td class="t50">牛峤</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　峤，字延峰，陇西人，宰相僧孺之后。博学有文，以歌诗著名。乾符五年孙偓榜第四人进士，仕历拾遗、补阙一尚书郎。王建镇西川，辟为判官。及伪蜀开国，拜给事中。卒。有集，本三十卷，自序云：“窃慕李长吉所为歌诗，辄效之。”今传于世。<br /><br />
</td></tr>

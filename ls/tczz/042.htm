<td class="t50">李颀</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　颀，东川人。开元二十三年贾季邻榜进士及第。调新乡县尉。性疏简，厌薄世务。慕神仙，服饵丹砂，明轻举之道，结好尘喧之外。一时名辈，莫不重之。工诗，发调既清，修词亦秀，杂歌咸善，玄理最长，多为放浪之语，足可震荡心神。惜其伟材，只到黄绶。故其论家，往往高于众作。有集今传。<br /><br />
</td></tr>

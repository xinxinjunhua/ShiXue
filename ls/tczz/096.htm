<td class="t50">冷朝阳</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　朝阳，金陵人。大历四年齐映榜进士及第。不待调官，言归省觐。自状元以下，一时名士大夫及诗人李嘉祐、李端、韩翃、钱起等，大会赋诗攀饯。以一布衣，才名如此，人皆羡之。朝阳工诗，在大历诸才子，法度稍弱，字韵清越不减也。有集传世。<br /><br />
</td></tr>

<td class="t50">陈羽</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　羽，江东人。贞元八年，礼部侍郎陆贽下第二人登科，与韩愈、王涯等共为龙虎榜。后仕历东宫卫佐。羽工吟，与灵一上人交游唱答。写难状之景，了了目前；含不尽之意，皎皎言外。如《自遣》诗云：“稚子新能编笋笠，山妻旧解补荷衣。秋山隔岸清猿叫，湖水当门白鸟飞。”此景何处无之，前后谁能道者二十八字，一片画图，非造次之谓也。警句甚多。有集传于世。<br /><br />
</td></tr>

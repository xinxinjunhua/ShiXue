<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　思颜，大顺元年杨赞禹榜进士及第，与王驾同袍。有诗名，气宇盘礴，每有过人，遂得名家，岂泛然矣。有集今传。<br /><br />

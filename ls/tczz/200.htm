<td class="t50">郑巢</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　巢，钱塘人。大中间举进士。时姚合号诗宗，为杭州刺史，巢献所业，日游门馆，累陪登览燕集，大得奖重，如门生礼然。体效格法，伏膺无斁，句意且清新。巢性疏野。两浙湖山寺宇幽胜，多名僧，外学高妙，相与往还酬酢，竟亦不仕而终。有诗一卷，今传。<br /><br />
</td></tr>

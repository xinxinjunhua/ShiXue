<td class="t50">吉中孚</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　中孚，楚州人。居鄱阳最久。初为道士，山阿寂寥。后还俗。李端赠诗云：“旧山连药卖，孤鹤带云归。”卢纶送诗云：“旧箓藏云穴，新诗满帝乡。”来长安，谒宰相，有荐于天子，日与王侯高会，名动京师。无几何，第进士，授万年尉，除校书郎。又登宏辞科，为翰林学士，历谏议大夫，户部侍郎、判度支事。贞元初卒。初，拜官后，以亲垂白在堂，归养至孝，终丧复仕。中孚神骨清虚，吟咏高雅，若神仙中人也。集一卷，今传。<br /><br />
</td></tr>

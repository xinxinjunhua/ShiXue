<td class="t50">严维</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　维，字正文，越州人。初，隐居桐庐，慕子陵之高风。至德二年，江淮选补使侍郎崔涣下以词藻宏丽进士及第，以家贫亲老，不能远离，授诸暨尉，时已四十余。后历秘书郎。严中丞节度河南，辟佐幕府。迁余姚令。仕终右补阙。维少无宦情，怀家山之乐。以儒素从升斗之禄，聊代耕耳。诗情雅重，挹魏晋之风，锻炼铿锵，庶少遗恨。一时名辈，孰匪金兰。诗集一卷，今传。<br /><br />
</td></tr>

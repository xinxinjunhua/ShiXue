<td class="t50">陈上美</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　上美，开成元年礼部侍郎高锴放榜第二人登科。以诗鸣当时，间作悉佳制。论其骨格本峭，但少气耳。有集今传。夫矻矻穷经，志在死而不亡者，天道良难，无固必也。或称硕儒，而名偶身丧；或乃颓然，而青编不削。又若以位高金多，心广体胖，而富贵骄人，文称功业黯黯，则未若腐草之有萤也。今群居论古终日，其人既远，骨已朽矣，幸而照灼简牍，未必皆扬雄、班、马之流耳。于兹传中，族匪闻望，官不隆重，俱以一咏争长岁月者亦多，岂曰小道而忽之。设有白璧，入地不满尺，出土无肤寸，虽卞和憧憧往来其间，不失者亦鲜矣。幸不幸之谓也。<br /><br />

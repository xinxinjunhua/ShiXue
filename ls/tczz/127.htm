<td class="t50">令狐楚</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　楚，字壳士，敦煌人也。五岁能文章。贞元七年尹枢榜进士及第。时李说、严绶、郑儋继领太原，高其才行，引在幕府，由掌书记至判官。德宗喜文，每省太原奏疏，必能辨楚所为，数称美之。宪宗时，累擢知制诰。皇甫镈荐为翰林学士，迁中书舍人，拜中书侍郎、同平章事。楚工诗，当时与白居易、元稹、刘禹锡唱和甚多。有《漆奁集》一百三十卷，行于世。自称曰：“白云孺子”。<br /><br />
</td></tr>

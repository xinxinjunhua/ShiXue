<td class="t50">无可</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　无可，长安人，高僧也。工诗，多为五言。初，贾岛弃俗时，同居青龙寺，呼岛为从兄。与马戴、姚合、厉玄多有酬唱，律调谨严，属兴清越，比物以意，谓之“象外句”。如曰：“听雨寒更尽，开门落叶深。”又曰：“微阳下乔木，远烧入秋山。”凡此等新奇，当时翕然称尚，妙在言用而不失其名耳。今集一卷相传。<br /><br />

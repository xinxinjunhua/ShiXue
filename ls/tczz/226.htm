<td class="t50">唐彦谦</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　彦谦，字茂业，并州人也。咸通末举进士及第。中和，王重荣表为河中从事，历节度副使，晋、绛二州刺使。重荣遇害，彦谦贬汉中掾。兴元节度使杨守亮留署判官，寻迁副使，为阆州刺使。卒。彦谦才高负气，毫发逆意，大怒叵禁。博学足艺，尤长于诗，亦其道古心雄，发言不苟，极能用事，如自己出。初师温庭筠，调度逼似，伤多纤丽之词，后变淳雅，尊崇工部。唐人效甫者，惟彦谦一人而已。自号“鹿门先生”。有诗集，传于世。薛廷珪序云。<br /><br />
</td></tr>

<td class="t50">崔国辅</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　国辅，山阴人。开元十四年严迪榜进士，与储光羲、綦毋潜同时。举县令，累迁集贤直学士、礼部郎中。天宝间，坐是王鉷近亲，贬竟陵司马。有文及诗，婉娈清楚，深宜讽咏。乐府短章，古人有不能过也。初至竟陵，与处士陆鸿渐游，三岁，交情至厚，谑笑永日。又相与较定茶水之品。临别谓羽曰：“予有襄阳太守李憕所遗白驴、乌犎牛各一头，及卢黄门所遗文槐书函一枚，此物皆己之所惜者，宜野人乘蓄，故特以相赠。”雅意高情，一时所尚。有酬酢之歌诗，并集传焉。<br /><br />

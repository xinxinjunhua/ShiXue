<td class="t50">窦牟</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　牟，字贻周，贞元二年张正甫榜进士。初，学问于江东，家居孝谨，善事继母，奇文异行，闻于京师。舅给事中袁高，当时专重名，甄拔甚多，而牟未尝干谒，竟捷文场。始佐六府五公，八迁至检校虞部。元和五年，拜尚书虞部郎中，转洛阳令、都官郎中，出为泽州刺史。仕终国子司业。牟晚从昭义卢从史，从史浸骄，牟度不可谏，即移疾归，居东都别业。长庆二年卒。昌黎韩先生为之《墓志》云。<br /><br />
</td></tr>

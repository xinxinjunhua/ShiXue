<td class="t50">常建</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　建，长安人。开元十五年与王昌龄同榜登科。大历中，授盱眙尉。仕颇不如意，遂放浪琴酒，往来太白、紫阁诸峰，有肥遯之志。尝采药仙谷中，遇女子，遍体毛绿，自言是秦时宫人，亡入山来食松叶，遂不饥寒，因授建微旨，所养非常。后寓鄂渚，招王昌龄、张偾同隐，获大名当时。集一卷，今传。古称高才而无贵仕，诚哉是言。曩刘桢死于文学，鲍照卒于参军，今建亦沦于一尉，悲夫！建属思既精，词亦警绝，似初发通庄，却寻野径，百里之外，方归大道。旨远兴僻，能论意表，可谓一唱而三叹矣。<br /><br />
</td></tr>

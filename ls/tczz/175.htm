<td class="t50">贾驰</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　驰，大和九年郑确榜进士。初负才质，蹭蹬名场。来往公卿问，担簦蹑屩，莫伸其志。尝入关赋诗云：“河上微风来，关头树初湿。今朝关城吏，又见孤客人。上国谁与期，西来徒自急。”主司得闻，有怜才之意，遂放第。不甚显宦。诗文俱得美声。后来文士集中，多称贾先辈，其名誉为时所重云。有集传世。<br /><br />
</td></tr>

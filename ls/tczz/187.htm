<td class="t50">孟迟</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　迟，字迟之，平昌人。会昌五年易重榜进士。有诗名，尤工绝句，风流妩媚，皆宫商金石之声。情与顾非熊甚相得，且同年。有诗一卷，行于世。<br /><br />

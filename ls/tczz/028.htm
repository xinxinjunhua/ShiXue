<td class="t50">包融</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　融，延陵人。开元间仕历大理司直。与参军殷遥、孟浩然交厚。工为诗。二子何、佶，纵声雅道，齐名当时，号“三包”。有诗一卷，行世。夫人之于学，苦心难；既苦心，成业难；成业者获名不朽，兼父子兄弟间尤难。历观唐人，父子如三包，六窦，张碧、张瀛，顾况、非熊，章孝标、章碣，温庭筠、温宪；公孙如杜审言、杜甫，钱起、钱珝；兄弟如皇甫冉、皇甫曾，李宣古、李宣远，姚系、姚伦等；皆联玉无瑕，清尘远播。芝兰继芳，重难改于父道；骚雅接响，庶不慊于祖风。四难之间，挥麈之际，亦可以为美谈矣。<br /><br />

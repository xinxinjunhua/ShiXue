<td class="t50">丘为</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br /><br />
　　为，嘉兴人。初累举不第，归山读书数年。天宝初刘单榜进士。王维甚称许之，尝与唱和。初，事继母孝，有灵芝生堂下。累官太子右庶子，时年八十余，母犹无恙，给俸禄之半。及居忧观察使韩滉以为致仕官给禄，所以惠养老臣，不可在丧为异，唯罢春秋羊酒。初还乡，县令谒之，为候门磬折，令坐，乃拜，里胥立庭下，既出，乃敢坐。经县署，降马而过，举动有礼。卒年九十六。有集行世。<br /><br />
</td></tr>

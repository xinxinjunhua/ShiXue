<td class="t50">阎防</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　防，河中人。开元二十二年李琚榜及第。颜真卿甚敬爱之，欲荐于朝，不屈。为人好古博雅，诗语真素，魂清魄爽，放旷山水，高情独诣。于终南山丰德寺结茅茨读书，百丈溪是其隐处，题诗云：“浪迹弃人世，还山自幽独。始傍巢由踪，吾其获心曲。”又云：“养闲度人事，达命知止足。不学鲁国儒，俟时劳伐辐。”后信命，不务进取，以此自终。有诗集行世。<br /><br />

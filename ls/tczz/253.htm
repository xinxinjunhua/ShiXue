<td class="t50">张乔</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　乔，隐居九华山，池州人也。有高致，十年不窥园以苦学。诗句清雅，迥少其伦。当时东南多才子，如许棠、喻坦之、剧燕、吴罕、任涛、周繇、张蠙、郑谷、李栖远与乔，亦称“十哲”，俱以韵律驰声。大顺中，京兆府解试，李参军频时主文，试《月中桂》诗，乔云：“根非生下土，叶不坠秋风。”遂擅场。其年频以许棠久困场屋，以为首荐。乔与喻坦之复受许下薛尚书之，欲表于朝，以他不果。竟岨峿名途，徒得一进耳。有诗集二卷，传世。<br /><br />
</td></tr>

<td class="t50">熊孺登</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　孺登，钟陵人，有诗名。元和中为西川从事，与白舍人、刘宾客善，多赠答。亦祗役湘中数年。凡下笔，言语妙天下。如：“江流如箭月如弓，行尽三湘数夜中。无奈子规知向蜀，一声声似怨春风。”又《经古墓》云：“碑折松枯山火烧，夜台从闭不曾朝。那将逝者比流水，流水东流逢上潮。”类此极多。有集今传。<br /><br />
</td></tr>

<td class="t50">张鼎</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　鼎，字台业，景福二年崔胶榜进士。工诗，集一卷，今行。同时赵抟，有爽迈之度，工歌诗。韦霭，亦进而无遇，退而有守者。诗各一卷。及谢蟠隐，云是灵运之远孙，有清才，知天下之将乱，作《杂感诗》一卷。张为，闽中人，离群拔类，工诗，存一卷，及著《唐诗主客图》等，并传于世。<br /><br />
</td></tr>

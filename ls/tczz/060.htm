<td class="t50">鲍防</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　防，字子慎，天宝十二年杨儇榜进士，襄阳人也。善辞章，笃志于学。累官至太原尹、河东节度使。人乐其治，不减龚、黄，诏图形别殿。又历福建、江西观察使。丁乱，从幸奉天，除礼部侍郎，封东海公。又迁御史大夫。贞元元年，策贤良方正，得穆质、柳公绰等，皆位至台鼎，世美其知人。时比岁旱，质对：汉故事，免三公，烹弘羊。权近独孤愐欲下按治，防曰：“使上闻所未闻，不亦善乎”置质高第，帝见策嘉之。授工部尚书，卒。防工于诗，兴思优足，风调严整，凡有感发，以讥切世弊，正国音之宗派也。与谢良弼为诗友，时亦称鲍、谢云。有集今传。<br /><br />

<td class="t50">孙鲂</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　鲂，唐末处士也，乐安人。与沈彬、李建勋同时，唱和亦多。鲂有《夜坐》诗，为世称玩。建勋尤器待之，日与谈宴，尝匿鲂于斋幕中，待沈彬来，乃问曰：“鲂《夜坐》诗如何”彬曰：“田舍翁火炉头之语，何足道哉！”鲂从幕中出，诮彬曰：“何讥谤之甚”彬曰：“‘画多灰渐冷，坐久席成痕。’此非田舍翁炉上，谁有此况”一座大笔。及《金山寺》诗云：“天多剩得月，地少不生尘。”当时谓骚情风韵，不减张祜云。有诗五卷，今传。<br /><br />
</td></tr>

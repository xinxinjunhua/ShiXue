<td class="t50">江为</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　为，考城人，宋江淹之裔，少帝时，出为建阳吴兴令，因家为郡人焉。为唐末尝举进士，辄不第。工于诗，有“天形围泽国，秋色露人家”，“月寒花露重，江晚水烟微”等句，脍炙人口。少游白鹿寺，有句：“吟登萧寺旃檀阁，醉倚王家玳瑁筵。”后主南迁见之曰：“此人大是富贵家。”时刘洞、夏宝松就传诗法，为益傲肆，自谓俯拾青紫。乃诣金陵求举，屡黜于有司。怏怏不能已，欲束书亡越，会同谋者上变，按得其状，伏罪。今建阳县西靖安寺，即处士故居，后留题者甚众。有集一卷，今传。<br /><br />
</td></tr>

<td class="t50">韩翃</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　翃，字君平，南阳人。天宝十三载杨纮榜进士。侯希逸素重其才，至是表佐淄青幕府。罢，闲居十年。及李勉在宣武，复辟之。德宗时，制诰阙人，中书两进除目，御笔不点，再请之，批曰：“与韩翃。”时有同姓名者为江淮刺史，宰相请孰与。上复批曰：“春城无处不飞花韩翃也。”俄以驾部郎中知制诰。终中书舍人。翃工诗，兴致繁富，如芙蓉出水，一篇一咏，朝士珍之。比讽深于文房，筋节成于茂政，当时盛称焉。有诗集五卷，行于世。<br /><br />
</td></tr>

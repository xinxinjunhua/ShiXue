<td class="t50">唐求</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　求，隐君也，成都人。值三灵改卜，绝念鼎钟，放旷疏逸，出处悠然，人多不识。方外物表，是所游心也。酷耽吟调，气韵清新，每动奇趣，工而不僻，皆达者之词。所行览不出二百里间，无秋豪世虑之想。有所得，即将稿捻为丸，投大瓢中。或成联片语，不拘短长，数日后足成之。后卧病，投瓢于锦江，望而祝曰：“兹瓢倘不沦没，得之者始知吾苦心耳。”瓢泛至新渠，有识者见曰：“此唐山人诗瓢也。”扁舟接之，得诗数十篇。求初未尝示人，至是方竞传，今行于世。后不知所终，江南处士杨夔，亦工诗文，名称杰出如求，今章句多传。<br /><br />

<td class="t50">刘慎虚</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　慎虚，嵩山人。姿容秀拔。九岁属文，上书，召见，拜童子郎。开元十一年，徐征榜进士，调洛阳尉，迁夏县令。性高古，脱略势利，啸傲风尘。后欲卜隐庐阜，不果。交游多山僧道侣。为诗情幽兴远，思雅词奇，忽有所得，便惊众听。当时东南高唱者数十人，声律婉态，无出其右，惟气骨不逮诸公。永明已还，端可杰立江表。善为方外之言。夫何不永，天碎国宝，有志不就，惜哉！集今传世。<br /><br />
</td></tr>

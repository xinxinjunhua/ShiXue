<td class="t50">李嘉祐</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　嘉祐，字从一，赵州人。天宝七年杨誉榜进士，为秘书正字。以罪谪南荒，未几何，有诏量移为鄱阳宰，又为江阴令。后迁台、袁二州刺史。善为诗，绮丽婉靡，与钱、郎别为一体，往往涉于齐、梁时风，人拟为吴均、何逊之敌。自振藻天朝，大收芳誉，中兴风流也。有集今传。<br /><br />
</td></tr>

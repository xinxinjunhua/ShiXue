<td class="t50">朱庆余</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　庆余，字可久，以字行，闽中人。宝历二年裴俅榜进士及第，授秘省校书。得张水部诗旨，气平意绝，社中哲匠也。有名当时。集一卷。今传。<br /><br />

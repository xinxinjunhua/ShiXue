<td class="t50">武元衡</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　元衡，字伯苍，河南人。建中四年薛展榜进士。元和三年，以门下侍郎平章事，出为剑南节度使。后秉政，明年早朝，遇盗从暗中射杀之。元衡工诗，虽时见雕镌，不动机构，要非高斫之所深忌。每好事者传之，被于丝竹。尝夏夜作诗曰：“夜久喧暂息，池台惟月明。无因驻清景，日出事还生。”翌日遇害，诗盖其谶也。议者谓工诗而宦达者惟高适，达宦而诗工者惟元衡。今有《临淮集》十卷传于世。<br /><br />
</td></tr>

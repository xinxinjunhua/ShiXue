<td class="t50">祖咏</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　咏，洛阳人。开元十二年杜绾榜进士。有文名，殷璠评其诗：“翦刻省静，用思尤苦，气虽不高，调颇凌俗，足称为才子也。”少与王维为吟侣，维在济州，寓官舍，赠祖三诗，有云：“结交二十载，不得一日展。贫病子既深，契阔余不浅。”盖亦流落不偶，极可伤也。后移家归汝坟间别业，以渔樵自终。有诗一卷，传于世。<br /><br />

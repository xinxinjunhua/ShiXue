<td class="t50">张瀛</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　瀛，碧之子也。仕广南刘氏，官至曹郎。尝为诗赠琴棋僧云：“我尝听师法一说，波上莲花水中月。不垢不净是色空，无法无空亦无灭。我尝对师禅一观，浪溢鳌头蟾魄满。河沙世界尽空空，一寸寒灰冷灯畔。我又闻师琴一抚，长松唤往秋山雨。弦中雅弄若铿金，指下寒泉流太古。我又看师棋一著，山顶坐沉红日脚。阿谁称是国手人，罗浮道士赌却鹤。输却药葫芦，斟下红霞丹，束手不敢争头角。”同列见之曰：“非其父不生是子。”瀛为诗尚气而不怒号，语新意卓，人所不思者，辄能道之。绰绰然见乃父风也。有诗集，今传于世。<br /><br />
</td></tr>

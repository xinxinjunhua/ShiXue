<td class="t50">张彪</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　彪，颍上人。初赴举，无所遇，适遭丧乱，奉老母避地隐居嵩山，供养至谨。与孟云卿为中表，俱工古调诗。云卿有赠云：“善道居贫贱，洁服蒙尘埃。行行无定心，坎壈难归来。”性高简，善草书。志在轻举，《咏神仙》云：“五谷非长年，四气乃灵药。列子何必待，吾心满寥廓。”时与杜甫往还，尝《寄张十二山人》诗云：“静者心多妙，先生艺绝伦。草书何太古，诗兴不无神。曹植休前辈，张芝更后身。数篇吟可老，一字买堪贫。”观工部之作，可知其人矣。<br /><br />

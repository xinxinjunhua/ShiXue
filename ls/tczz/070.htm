<td class="t50">秦系</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　系，字公绪，会稽人。天宝末，避乱剡溪，自称“东海钓客”。北都留守薛兼训奏为仓曹参军，不就。客泉州，南安九日山中有大松百余章，俗传东晋时所植，系结庐其上，穴石为研，注《老子》，弥年不出。时姜公辅以直言罢为泉州别驾，见系辄穷日不能去，筑室与相近，遂忘流落之苦。公辅卒，妻子在远，系为营葬山下，每好义如此。张建封闻系不可致，请就加校书郎。与刘长卿、韦应物善，多以诗相赠答。权德舆曰：“长卿自以为五言长城，系用偏师攻之矣。”虽老益壮，年八十余卒。南安人思之，号其山为“高士峰”，今有“丽句亭”在焉。集一卷，今传。<br /><br />
</td></tr>

<td class="t50">马逢</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br /><br />
　　逢，关中人。贞元五年卢顼榜进士。佐镇戎幕府，尝从军出塞。得诗名，篇篇警策。有集今传。<br /><br />

<td class="t50">温宪</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　宪，庭筠之子也。龙纪元年李瀚榜进士及第，去为山南节度府从事。大著诗名。词人李巨川草荐表，盛述宪先人之屈，辞略曰：“蛾眉先妒，明妃为去国之人；猿臂自伤，李广乃不侯之将。”上读表恻然称美，时宰相亦有知者，曰：“父以窜死，今孽子宜稍振之，以厌公议，庶几少雪忌才之恨。”上颔之。后迁至郎中，卒。有集文赋等传于世。<br /><br />
</td></tr>

<td class="t50">刘方平</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　方平，河南人。白皙美容仪。二十工词赋，与元鲁山交善。隐居颍阳大谷，尚高不仕。皇甫冉、李颀等相与赠答，有云：“篱边颍阳道，竹外少姨峰。”神意淡泊。善画山水，墨妙无前。汧国公李勉延至斋中，甚敬爱之。欲荐于朝，不忍屈，辞还旧隐。工诗，多悠远之思，陶写性灵，默会风雅，故能脱略世故，超然物外。区区斗筲，何足以系刘先生哉！有集今传。<br /><br />
</td></tr>

<td class="t50">张諲</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　諲，永嘉人。初隐少室下，闭门修肄，志甚勤苦，不及声利。后应举，官到刑部员外郎。明《易·象》，善草隶，兼画山水，诗格高古。与李颀友善，事王维为兄，皆为诗酒丹青之契。维赠诗云：“屏风误点惑孙郎，团扇草书惊内史。”李颀赠曰：“小王破体闲支策，落月梨花照空壁。诗堪记室妒风流，画与将军作勍敌。”天宝中谢官，归故山偃仰，不复来人间矣。有诗传世。<br /><br />

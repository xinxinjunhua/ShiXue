<td class="t50">刘沧</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　沧，字蕴灵，鲁国人也。体貌魁梧，尚气节，善饮酒，谈古今令人终日喜听。慷慨怀古，率见于篇。大中八年礼部侍郎郑薰下进士。榜后进谒谢，薰曰：“初谓刘君锐志，一第不足取。故人别来三十载，不相知闻，谁渭今白头纷纷矣。”调华原尉。与李频同年。诗极清丽，句法绝同赵嘏、许浑，若出一絇综然。诗一卷，今传。<br /><br />
</td></tr>

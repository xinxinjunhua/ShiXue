<td class="t50">李建勋</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　建勋，字致尧，广陵人，仕南唐为宰相，后罢，出镇临川。未几，以司徒致仕，赐号“钟山公”，年已八十，志尚散逸，多从仙侣参究玄门。时宋齐丘有道气，在洪州西山，建勋造谒致敬，欲授真果，题诗赠云：“春来涨水凉如活，晓出西山势似行。玉洞有人经劫在，携竿步步就长生。”归高安别墅，一夕无病而逝。能文赋诗，琢炼颇工，调既平妥，终少惊人之句也。有《钟山集》二十卷行于世。<br /><br />
</td></tr>

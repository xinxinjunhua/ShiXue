<td class="t50">张碧</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　碧，字太碧。贞元间举进士，累不第，便觉三山跬步，云汉咫尺。初慕李翰林之高躅，一杯一咏，必见清风，故其名字皆亦逼似，如司马长卿希蔺相如为人也。天才卓绝，气韵不凡，委兴山水，投闲吟酌，言多野意，俱状难摹之景焉。有《歌行集》二卷传世。子瀛。<br /><br />
</td></tr>

<td class="t50">沈佺期</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　佺期，字云卿，相州人。上元二年郑益榜进士。工五言。由协律、考功郎受赇，长流驩州。后召拜起居郎，兼修文馆直学士。常侍宫中，既侍宴，帝诏学士等为《回波》舞，佺期作弄辞悦帝，诏赐牙绯。历中书舍人。佺期尝以诗赠张燕公，公曰：“沈三兄诗清丽，须让居第一也。”诗名大振。自魏建安迄江左，诗律屡变。至沈约、鲍照、庾信、徐陵以音韵相婉附，属对精致。及佺期、之问，又加靡丽。回忌声病，约句准篇，著定格律，遂成近体，如锦绣成文，学者宗尚。语曰：“苏、李居前，沈、宋比肩。”谓唐诗变体，始自二公，犹始自苏武、李陵也。有集十卷，今传于世。<br /><br />

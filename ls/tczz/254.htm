<td class="t50">郑良士</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　良士，字君梦。咸通中累举进士不第。昭宗时，自表献诗五百余篇，敕授补阙而终。以布衣一旦俯拾青紫，易若反掌，浮俗莫不骇羡，难其比也。今有《白岩集》十卷传世。旧言诗，或穷人，或达人。达者，良士是矣。亦命之所为，诗何能与过诗则不揣其本也。<br /><br />

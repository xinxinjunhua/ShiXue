<td class="t50">王季友</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　季友，河南人。暗诵书万卷。论必引经。家贫卖屐，好事者多携酒就之。其妻柳氏，疾季友穷丑，遣去。来客酆城，洪州刺史李公，一见倾敬，即引佐幕府。工诗，性磊浪不羁，爱奇务险，远出常性之外。白首短褐，崎岖士林，伤哉贫也！尝有诗云：“山中谁余密白发日相亲。雀鼠昼夜无，知我厨廪贫。”又：“自耕自刈食为天，如鹿如麋饮野泉。亦知世上公卿贵，且养丘中草木年。”观其笃志山水，可谓远性风疏，逸情云上矣。有集，传于世。<br /><br />

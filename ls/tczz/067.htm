<td class="t50">皇甫曾</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　曾，字孝常，冉之弟也。天宝十二年杨儇榜进士。善诗，出王维之门。与兄名望相亚，当时以比张氏景阳、孟阳，协居上品，载处下流，侍御、补阙，文词亦然。体制清紧，华不胜文，为士林所尚。仕历侍御史。后坐事贬舒州司马，量移阳翟令。有诗一卷，传于世。<br /><br />
</td></tr>

<td class="t50">古之奇</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br /><br />
　　之奇，宝应二年礼部侍郎洪源下及第，与耿氵韦同时。尝为安西幕府书记。与李司马端有金兰之好。工古调，足幽闲淡泊之思，婉而成章，得名艺圃，不泛然矣。诗集传于世。<br /><br />

<td class="t50">张众甫</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　众甫，京口人。隐居不务进取，与皇甫御史友善，精庐接近。后各游四方，曾寄处士诗曰：“伏腊同鸡黍，柴门闭雪天。”时宦亦有征辟者，守死善道，卒不就。众甫诗婉媚绮错，巧用文字，工于兴喻，文流中佳士也。同在一时者，有赵微明、于逖、蒋涣、元季川，俱山颠水涯，苦学贞士，名同兰茝之芳，志非银黄之慕。吟咏性灵，陶陈衷素，皆有佳篇，不能湮落。惜其行藏之大概，不见于记录，故缺其考详焉。<br /><br />
</td></tr>

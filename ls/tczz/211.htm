<td class="t50">赵牧</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　牧，不知何处人。大中、咸通中，累举进士不第。有俊才，负奇节，遂舍场屋，放浪人间。效李长吉为歌诗，颇涉狂怪，耸动当时。蹙金结绣，而无痕迹装染。其余轻巧之词甚多。同时有刘光远，亦慕长吉，凡作体效犹，能埋没意绪。竟不知所终。俱有诗传世。<br /><br />
</td></tr>

<td class="t50">张子容</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　子容，襄阳人。开元元年常无名榜进士。仕为乐城令。初与孟浩然同隐鹿门山，为死生交，诗篇唱答颇多。后值乱离，流寓江表，尝送内兄李录事归故里云：“十年多难与君同，几处移家逐转蓬。白首相逢征战后，青春已过乱离中。行人杳杳看西日，归马萧萧向北风。汉水楚云千万里，天涯此别恨无穷。”后竟弃官归旧业。有诗集，兴趣高远，略去凡近。当时哲匠，咸称道焉。<br /><br />
</td></tr>

<td class="t50">李绅</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　绅，字公垂，亳州人。元和元年武翊黄榜进士，与皇甫湜同年。补国子助教。穆宗召为翰林学士，累迁中书舍人。武宗即位，拜中书侍郎平章事。绅为人短小精悍，于诗特有名，号“短李”。与李德裕、元稹同时，称“三俊”。集名《追昔游》，多纪行之作。又《批答》一卷，皆传。初为寿州刺史，有秀才郁浑，年甫弱冠，应百篇科，绅命题试之，未昏而就，警句佳意甚多，亦有集，今传。<br /><br />
</td></tr>

<td class="t50">皇甫冉</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　冉，字茂政，安定人。避地来寓丹阳，耕山钓湖，放适闲淡。或云秘书少监彬之侄也。十岁能属文，张九龄一见，叹以清才。天宝十五年卢庚榜进士。调无锡尉，营别墅阳羡山中。大历初，王缙为河南节度，辟掌书记，后入为左金吾卫兵曹参军，仕终拾遗、左补阙。公自擢桂礼闱，便称高格。往以世道艰虞，遂心江外，故多飘薄之叹。每文章一到朝廷，而作者变色，当年才子，悉愿缔交，推为宗伯。至其造语玄微，端可平揖沈、谢，雄视潘、张。惜乎长辔未骋，芳兰早凋，良可痛哉！有诗集三卷，独孤及为序，今传。<br /><br />

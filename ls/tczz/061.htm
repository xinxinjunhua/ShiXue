<td class="t50">殷遥</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　遥，丹阳人。天宝间，尝仕为忠王府仓曹参军。与王维结交，同慕禅寂，志趣高疏，多云岫之想。而苦家贫，死不能葬，一女才十岁，日哀号于亲，爱怜之者赗赠，埋骨石楼山中。工诗，词彩不群，而多警句，杜甫尝称许之。有诗传于今。<br /><br />

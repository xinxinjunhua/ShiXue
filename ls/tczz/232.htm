<td class="t50">赵光远</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　光远，丞相隐之犹子也。幼而聪悟。咸能、乾符中称气焰。善为诗。温庭筠、李商隐辈梯媒之。恃才不拘小节，皆金鞍骏马。尝将子弟恣游狭邪，著《北里志》，颇述青楼红粉之事，及有诗等传于世。光远等千金之子，厌饫膏粱，仰荫承荣，视若谈笑，骄侈不期而至矣。况年少多才，京邑繁盛，耳目所荡，素少闲邪之虑者哉。故辞意多裙裾妖艳之态，无足怪矣。有孙启、崔珏同时恣心狂狎，相为唱和，颇陷轻薄，无退让之风。惟卢弼气象稍严，不迁狐惑，如《边庭四时怨》等作，赏音大播，信不偶然。区区凉德，徒曰贵介，不暇录尚多云。<br /><br />

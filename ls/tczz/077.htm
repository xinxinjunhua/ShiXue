<td class="t50">张南史</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　南史，字季直，幽州人。工弈棋，神算无敌，游心太极。尝幅巾藜杖，出入王侯之宅十年，高谈阔视，慷慨奇士也。中岁感激，始苦节学文，无希世苟合之意。数年间，稍入诗境，调体超闲，情致兼美，如并、燕老将，气韵沉雄，时少及之者。肃宗时，庙堂奖拔，仕为左卫仓曹参军。后避乱寓居扬州扬子。难平再召，未及赴而卒。有诗一卷，今传。<br /><br />
</td></tr>

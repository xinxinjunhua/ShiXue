<td class="t50">郎士元</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　士元，字君胄，中山人也。天宝十五载卢庚榜进士。宝应初，选京畿县官。诏试政事中书，补渭南尉，历左拾遗，出为郢州刺史。与员外郎钱起齐名。时朝廷自丞相以下，出牧奉使，无两君诗文祖饯，人以为愧，其珍重如此。二公体调，大抵欲同，就中郎君稍更闲雅，逼近康乐。珠联玉映，不觉成编，掩映时流，名不虚矣。有别业在半日吴村，王季友、钱起等皆见题咏，每夸胜绝。诗集今传于世。<br /><br />
</td></tr>

<td class="t50">姚系</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br /><br />
　　系，河中人。贞元元年进士，与韦应物同时。有诗名，工古调，善弹琴，好游名山，希踪谢、郭，终身不言禄，禄亦不及之也。与林栖谷隐之士往还酬酢，兴趣超然。弟伦，诗亦清丽，有集，并传。<br /><br />
</td></tr>

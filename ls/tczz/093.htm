<td class="t50">窦叔向</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　叔向，字遗直，扶风平陵人也。有卓绝之行，登第于大历初，远振嘉名，为文物冠冕。诗法谨严，又非常格。一流才子，多仰飙尘。少与常衮同灯火，及衮相，引擢左拾遗、内供奉。及坐贬，亦出为溧水令。卒，赠工部尚书。五子：常、牟、群、庠、巩，俱能诗，咄咄有跨灶之誉，当时羡之。《艺文志》载《叔向集》七卷，今存诗甚寡，盖零落之矣。<br /><br />

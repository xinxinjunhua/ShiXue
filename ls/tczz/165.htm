<td class="t50">韦楚老</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　楚老，长庆四年中书舍人李宗闵下进士，仕终国子祭酒。工诗，气既淳雄，语亦豪健。众作古乐府居多。《祖龙行》曰：“黑云兵气射天裂，壮士朝眠梦冤结。祖龙一夜死沙丘，胡亥空随鲍鱼辙。腐肉偷生二千里，伪书先赐扶苏死。墓接骊山土未干，瑞光已向芒砀起。陈胜城中鼓三下，秦家天地如崩瓦。龙蛇撩乱入咸阳，少帝空随汉家马。”杰制颇多，俱当刮目。今并传。<br /><br />
</td></tr>

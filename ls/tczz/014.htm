<td class="t50">李峤</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　峤，字巨山，赵州人。十五通五经，二十擢进士，累迁为监察御史。武后时，同凤阁鸾台平章事。后因罪贬庐州别驾，卒。峤富才思，有所属缀，人辄传讽。明皇将幸蜀，登花萼楼，使楼前善《水调》者奏歌，歌曰：“山川满目泪沾衣，富贵荣华能几时不见只今汾水上，惟有年年秋雁飞。”帝惨怆，移时，顾侍者曰：“谁为此”对曰：“故宰相李峤之词也。”帝曰：“真才子！”不待终曲而去。峤前与王勃、杨炯接，中与崔融、苏味道齐名，晚诸人没，为文章宿老，学者取法焉。今集五十卷，《杂咏诗》十二卷，《单题诗》一百二十首，张方为注，传于世。<br /><br />
</td></tr>

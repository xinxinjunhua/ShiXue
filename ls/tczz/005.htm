<td class="t50">杨炯</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　炯，华阴人。显庆六年举神童，授校书郎。永隆二年，皇太子舍奠，表豪俊，充崇文馆学士。后为婺州盈川令。卒。炯恃才凭傲，每耻朝士矫饰，呼为“麒麟楦”。或问之，曰：“今假弄麒麟戏者，必刻画其形覆驴上，宛然异物，及去其皮，还是驴耳。”闻者甚不平，故为时所忌。初，张说以《箴》赠盈川之行，戒其苛刻，至官，果以酷称。炯博学善文，与王勃、卢照邻、骆宾王以文辞齐名，海内称四才子，亦曰“四杰”，效之者风靡焉。炯尝谓：“吾愧在卢前，耻居王后。”张说曰：“盈川文如悬河，酌之不竭。耻王后，愧卢前，谦也。”有《盈川集》三十卷行于世。<br /><br />

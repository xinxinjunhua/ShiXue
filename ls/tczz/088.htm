<td class="t50">司空曙</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　曙，字文明，广平人也。磊落有奇才。韦皋节度剑南，辟致幕府。授洛阳主薄，未几迁长林县丞。累官左拾遗，终水部郎中。与李约员外至交。性耿介，不干权要。家无儋石，晏如也。尝病中不给，遣其爱姬，亦自流寓长沙。迁谪江右，多结契双林，暗伤流景。《寄暕上人》诗云：“欲就东林寄一身，尚怜儿女未成人。柴门客去残阳在，药圃虫喧秋雨频。近水方同梅市隐，曝衣多笑阮家贫。深山兰若何时到，羡与闲云作四邻。”闲园即事，高兴可知。属调幽闲，终篇调畅，如新花笑日，不容熏染。锵锵美誉，不亦宜哉！有诗集二卷，今传。<br /><br />
</td></tr>

<td class="t50">储光羲</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　光羲，兖州人。开元十四年严迪榜进士。有诏中书试文章。尝为监察御史。值安禄山陷长安，辄受伪署。贼平后，自归，贬死岭南。工诗，格高调逸，趣远情深，削尽常言，挟风雅之道，养浩然之气。览者犹聆《韶》、《濩》音，先洗桑濮耳，庶几乎赏音也。有集七十卷，《正论》十五卷，《九经分义疏》二十卷，并传。<br /><br />
</td></tr>

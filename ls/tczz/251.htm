<td class="t50">王焕</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　焕，大顺二年礼部侍郎裴贽下进士及第。俄自左史拜考功员外郎，同年皆得美除，焕首唱感恩长句，上谢座主裴公，当时甚荣之。后以礼部侍郎致仕，年九十，见《睢阳五老图》。焕工诗，情极婉丽。尝为《惆怅诗》十三首，悉古佳人才子深怀感怨者，以崔氏莺莺、汉武李夫人、陈乐昌主、绿珠、张丽华、王昭君，及苏武、刘、阮辈事成篇，哀伤媚妩，如“谢家池馆花笼月，萧寺房廊竹飐风。夜半酒醒凭槛立，所思多在别离中。”又“梦里分明入汉宫，觉来灯背锦屏空。紫台月落关山晓，肠断君王信画工”等，皆绝唱，喧炙士林。在晚唐诸人中，霄壤不侔矣。有集今传。<br /><br />
</td></tr>

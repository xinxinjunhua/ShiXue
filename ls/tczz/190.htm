<td class="t50">曹邺</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　邺，字邺之，桂林人。累举不第，为《四怨三愁五情》诗，雅道甚古。时为舍人韦悫所知，力荐于礼部侍郎裴休。大中四年张温琪榜中第。看榜日，上主司诗云：“一辞桂岩猿，九泣都门月。年年孟春至，看花如看雪。”《杏园宴间呈同年》云：“岐路不在天，十年行不至。一旦公道开，青云在平地。”又云：“匆匆出九衢，童仆颜色异。故衣未及换，尚有去年泪。”又云：“永持共济心，莫起胡越意。”佳句类此甚多，志特勤苦。仕至洋州刺史。有集一卷，今传。<br /><br />
</td></tr>

<td class="t50">清塞</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　清塞，字南卿，居庐岳为浮屠，客南徐亦久，后来少室、终南间。俗姓周，名贺。工为近体诗，格调清雅，与贾岛、无可齐名。宝历中，姚合守钱塘，因携书投刺以丐品第，合延待甚异。见其《哭僧》诗云：“冻须亡夜剃，遗偈病中书。”大爱之，因加以冠巾，使复姓字。时夏腊已高，荣望落落，竟往依名山诸尊宿自终。诗一卷，今存。<br /><br />

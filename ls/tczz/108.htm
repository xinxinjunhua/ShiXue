<td class="t50">窦群</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　群，字丹列，初隐毗陵，称处士。性至孝，定省无少怠。及母卒，哀踊不已，啮一指置棺中，结庐墓次。终丧，苏州刺史韦夏卿荐之，举孝廉，德宗擢为左拾遗。宪宗立，转吏部郎中，出为唐州刺史。节度使于頔奇之，表以自副。武元衡辅政，荐为御史中丞。群引吕温、羊士谔为御史，宰相李吉甫不可。群等怨，遂捃摭吉甫阴事告之。帝面覆多诳，大怒，欲杀群等，吉甫又为力救得解。出为黔南观察使，迁容管经略使，卒官所。家无余财，惟图书万轴耳。<br /><br />
</td></tr>

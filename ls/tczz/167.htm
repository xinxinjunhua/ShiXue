<td class="t50">刘得仁</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　得仁，公主之子也。长庆间以诗名。五言清莹，独步文场。自开成后至大中三朝，昆弟以贵戚皆擢显仕，得仁独苦工文。尝立志，必不获科第，不愿儋人之爵也。出入举场二十年，竟无所成，投迹幽隐，未尝耿耿。有寄所知诗云：“外族帝王是，中朝亲故稀。翻令浮议者，不许九霄蜚。”忧而不困，怨而不怒，哀而不伤，铿锵金玉，难合同流，而不厌于磨淬，端能确守格律，揣治声病，甘心穷苦，不汲汲于富贵。王孙公子中，千载求一人不可得也。及卒，僧栖白吊之曰：“思苦为诗身到此，冰魂雪魄已难招。直教桂子落坟上，生得一枝冤始销。”有诗一卷行于世。<br /><br />

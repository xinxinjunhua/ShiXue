<td class="t50">包佶</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　佶，字幼正。天宝六年杨护榜进士。累迁秘书监。刘晏治财，奏为汴东两税使。及晏罢，以佶为诸道盐铁等使。未几，迁刑部侍郎、太常少卿，拜谏议大夫、御史中丞。居官谨确，所在有声。佶天才赡逸，气宇清深，神和大雅，诗家老斫轮也。与刘长卿、窦叔向诸公皆莫逆之爱。晚岁沾风痹之疾，辞宠乐高，不及荣利。卒封丹阳郡公。有诗集行于世。<br /><br />
</td></tr>

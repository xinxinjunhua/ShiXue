<td class="t50">喻坦之</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　坦之，睦州人。咸通中举进士不第，久寓长安，囊罄，忆渔樵，还居旧山。与李建州频为友。频以诗送归云：“从容心自切，饮水胜衔杯。共在山中住，相随阙下来。修身空有道，取事各无媒。不信升平代，终遗草泽才。”又“彼此无依倚，东西又别离。”盖困于穷蹇，情见于辞矣。同时严维、徐凝、章八元，枌榆相望，前后唱和亦多。诗集今传。<br /><br />
</td></tr>

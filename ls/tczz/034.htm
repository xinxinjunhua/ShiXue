<td class="t50">贺兰进明</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　进明，开元十六年虞咸榜进士及第。仕为御史大夫。肃宗时，出为河南节度使。时禄山群党未平，尝帅师屯临淮备贼，竟亦无功。进明好古博雅，经籍满腹，其所著述一百余篇，颇究天人之际。又有古诗乐府等数十篇，大体符于阮公，皆今所传者云。<br /><br />
</td></tr>

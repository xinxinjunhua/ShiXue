<td class="t50">庄南杰</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　南杰，与贾岛同时，曾从受学。工乐府杂歌，诗体似长吉，气虽遒壮，语过镌凿，盖其天资本劣，未免按抑，不出自然，亦一好奇尚僻之士耳。集二卷，今行。<br /><br />

<td class="t50">林嵩</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　嵩，字降臣，长乐人也。乾符二年礼部侍郎崔沆下进士，官至秘书省正字。工诗善赋，才誉与公乘亿相高，功名之士，翕然而慕之，有诗一卷，赋一卷，传于世。<br /><br />

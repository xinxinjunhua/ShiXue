<td class="t50">吕温</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　温，字和叔，河中人。初从陆贽治《春秋》，梁肃为文章。贞元十四年李随榜及第。中宏辞。与王叔文厚善，骤迁左拾遗，除侍御史。使吐蕃，留不得遣弥年。温在绝域，常自悲惋。元和元年还，进户部员外郎。与窦群、羊士谔相爱。群为中丞，荐温为御史，宰相李吉甫持久不报。会吉甫病，夜召术上，群等因奏之，事见群传。上怒，贬筠州，再贬道州刺史，诏徙衡州，卒官所。温藻翰粗赡，一时流辈咸推尚。性险躁，谲怪而好利。今有集十卷，行于世。<br /><br />
</td></tr>

<td class="t50">徐寅</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　寅，莆田人也。大顺三年蒋咏下进士及第。工诗，尝赋《路傍草》云：“楚甸秦川万里平，谁教根向路傍生。轻蹄绣毂长相蹋，合是荣时不得荣。”时人知其蹭蹬，后果须鬓交白，始得秘书省正字，竟蓬转客途，不知所终云。有《探龙集》五卷，谓登科射策，如探睡龙之珠也。<br /><br />
</td></tr>

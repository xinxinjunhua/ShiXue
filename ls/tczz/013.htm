<td class="t50">李百药</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　百药，字重规，定州人。幼多病，祖母以“百药”名之。七岁能文。袭父德林爵。会高祖招杜伏威，百药劝朝京师，中道而悔，怒，饮以石灰酒，因大利几死，既而宿病皆愈。贞观中，拜中书舍人，迁太子庶子。尝侍帝，同赋《帝京篇》，手诏褒美，曰：“卿何身老而才之壮，齿宿而意之新乎！”百药才行，天下推服。好奖荐后进。翰藻沉郁，诗尤所长。有集传世。<br /><br />
</td></tr>

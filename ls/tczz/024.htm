<td class="t50">王湾</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　湾，开元元年常无名榜进士。与学士綦毋潜契切。词翰早著，为天下所称。往来吴、楚间，多有著述。如《江南意》一联云：“海日生残夜，江春入旧年。”诗人以来，罕有此作。张燕公手题于政事堂，每示能文，令为楷式。曾奉使登终南山，有赋。志趣高远，识者不能弃焉。<br /><br />
</td></tr>

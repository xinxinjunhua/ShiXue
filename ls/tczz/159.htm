<td class="t50">李廓</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　廓，宰相程之子也。少有志勋业，揽辔慨然，而未肯屑就，遂困场屋中。作《下第》诗曰：“榜前潜制泪，众里独嫌身。气味如中酒，情怀似别人。”时流皆称赏，且怜之，因共推挽。元和十三年独孤樟榜进士，调司经局正字，出为鄠县令。累历显官，仕终武宁节度使，政有奇绩。工诗，极绮致。与贾岛相友善。集今传世。<br /><br />
</td></tr>

<td class="t50">张登</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　登，初隐居。性刚洁，幅巾短褐，交友名公。后就辟，历卫府参谋，迁廷尉平。久之，拜监察御史。贞元中，改河南士曹掾，迁殿中侍御史、漳州刺史，退居告老。尝晚春乘轻车出南薰门，抵暮诣宜春门入，关吏捧牌请书官位，登醉题曰：“闲游灵沼送春回，关吏何须苦见猜。八十老翁无品秩，三曾身到凤池来。”其狷迫如此。数年，坐公累被劾，吏议捃摭不堪，感疾而卒。有集六卷，权德舆为序云。<br /><br />
</td></tr>

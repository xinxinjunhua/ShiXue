<td class="t50">于鹄</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　鹄，初买山于汉阳高隐，三十犹未成名。大历中，尝应荐历诸府从事，出塞入塞，驰逐风沙。有诗甚工，长短间作，时出度外，纵横放逸，而不陷于疏远，且多警策云。集一卷，今传。<br /><br />

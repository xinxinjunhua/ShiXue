<td class="t50">沈光</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　光，吴兴人。咸通七年礼部侍郎赵骘下进士。工文章古诗，标致翘楚，大得美称。尝作《洞庭乐赋》，韦岫见之曰：“此乃一片宫商也。”又如《太白酒楼记》等文，皆仪表于世。有诗集及《云梦子》五卷，并传世。光风鉴澄爽，神情俊迈。后仕终侍御史云。<br /><br />
</td></tr>

<td class="t50">窦庠</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　庠，字胄卿，尝应辟三佐大府，调奉先令，迁东都留守判官，拜户部员外郎。贞元中，出为婺、登二州刺史。平生工文甚苦，著述亦多，今并传之。<br /><br />

<td class="t50">张谓</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　谓，字正言，河内人也。少读书嵩山，清才拔萃，泛览流观，不屈于权势。自矜奇骨，必谈笑封侯。二十四受辟，从戎营、朔十载，亭障间稍立功勋。以将军得罪，流滞蓟门。有以非辜雪之者，累官为礼部侍郎。无几何，出为潭州刺史。性嗜酒简淡，乐意湖山。工诗，格度严密，语致精深，多击节之音。今有集传于世。<br /><br />
</td></tr>

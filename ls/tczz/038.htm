<td class="t50">薛据</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　据，荆南人。开元十九年王维榜进士。天宝六年，又中风雅古调科第一人。于吏部参选，据自恃才名，请受万年录事。流外官诉宰执，以为赤县是某等清要，据无媒，改涉县令。后仕历司议郎，终水部郎中。据为人骨鲠，有气魄，文章亦然。尝自伤不得早达，造句往往追凌鲍、谢。初好栖遁，居高山炼药。晚岁置别业终南山下老焉。有集今传。<br /><br />
</td></tr>

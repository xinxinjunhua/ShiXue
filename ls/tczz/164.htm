<td class="t50">韩琮</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　琮，字成封，长庆四年李群榜进士及第。大中中，仕至湖南观察使。有诗名，多清新之制，锦不如也。《浐水送别》云：“绿暗红稀出凤城，暮云楼阁古今情。行人莫听宫前水，流尽年光是此声。”《骆谷晚望》云：“秦川如画渭如丝，去国还家一望时。公子王孙莫来好，岭花多是断肠枝。”如此等皆喧满人口，余极多，皆称是。集一卷，今传。<br /><br />
</td></tr>

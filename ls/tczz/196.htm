<td class="t50">李郢</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　郢，字楚望，大中十年崔铏榜进士及第。初居余杭，出有山水之兴，人有琴书之娱，疏于驰竞。历为藩镇从事，后拜侍御史。郢工诗，理密辞闲，个个珠玉。其清丽极能写景状怀，每使人竟日不能释卷。与清塞、贾岛最相善。时塞还俗，闻岛寻卒，郢重来钱塘，俱绝音响，感而赋诗曰：“却到城中事事伤，惠休还俗贾生亡。谁人收得文章箧，独我重经苔鲜房。一命未沾为逐客，万缘初尽别空王。萧萧竹坞残阳在，叶覆闲阶雪拥墙。”其它警策率类此。有集一卷，今传。<br /><br />

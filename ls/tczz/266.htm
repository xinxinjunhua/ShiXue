<tr>
<td class="t50">曹松</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　松，字梦征，舒州人也。学贾岛为诗，深入幽境，然无枯淡之癖。尤长启事，不减山公。早未达，尝避乱来栖洪都西山。初在建州依李频，频卒后，往来一无所遇。光化四年，礼部侍郎杜德祥下，与王希羽、刘象、柯崇、郑希颜同登第，年皆七十余矣，号为“五老榜”。时值新平内难，朝廷以放进士为喜，特授校书郎而卒。松野性方直，罕尝俗事，故拙于进宦，构身林泽，寓情虚无，苦极于诗，然别有一种风味，不沦乎怪也。集三卷，今传。<br /><br />
</td></tr>

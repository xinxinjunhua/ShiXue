<td class="t50">张说</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　说，字道济，洛阳人。垂拱四年，举学综古今科，中第三等，考策日封进，授太子校书。令曰：“张说文思清新，艺能优洽。金门对策，已居高科之首；银榜效官，宜申一命之秩。”后累迁凤阁舍人。睿宗时，兵部侍郎、同平章事。开元十八年，终左丞相、燕国公。说敦气节，重然诺。为文精壮，长于碑志。朝廷大述作，多出其手。诗法特妙，晚谪岳阳，诗益凄婉，人谓得江山之助。今有集三十卷，行于世。子均，开元四年进士，亦以诗鸣。<br /><br />
</td></tr>

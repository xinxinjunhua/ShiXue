<td class="t50">贾至</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　至，字幼几，洛阳人，曾之子也。曾开元间与苏晋同掌制诰。至天宝十年明经擢第，累官起居舍人，知制诰。从幸西川，当撰传位肃宗册文，既进稿，玄宗曰：“先天诰命，乃父所为。今兹大册，尔又为之。两朝盛典，出卿家父子，可谓继美矣。”大历初，迁京兆尹，以散骑常侍卒。初，尝以事谪守巴陵，与李白相遇，日酣杯酒，追忆京华旧游，多见酬唱。白赠诗有云：“圣主恩深汉文帝，怜君不遣到长沙。”至特工诗，俊逸之气，不减鲍昭、庾信。调亦清畅，且多素辞，盖厌于漂流沦落者也。有集三十余卷，今传。<br /><br />

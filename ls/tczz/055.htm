<td class="t50">包何</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　何，字幼嗣，润州延陵人，包融之子也。与弟佶，俱以诗鸣，时称“二包”。天宝七年杨誉榜及第。曾师事孟浩然，授格法。与李嘉祐相友善。大历中，仕终起居舍人。诗传者可数，盖流离世故，率多素辞。大播芳名，亦当时望族也。<br /><br />
</td></tr>

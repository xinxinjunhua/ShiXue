<td class="t50">伍乔</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　乔，少隐居庐山读书，工为诗，与杜牧之同时擢第。初，乔与张洎少友善，洎仕为翰林学士，眷宠优异，乔时任歙州司马，自伤不调，作诗寄洎，戒去仆曰：“俟张游宴，即投之。”洎得缄云：“不知何处好销忧，公退携樽即上楼。职事久参侯伯幕，梦魂长达帝王州。黄山向晚盈轩翠，黟水含春绕郡流。遥想玉堂多暇日，花时谁伴出城游”洎动容久之，为言于上，召还为考功员外郎，卒官。今有诗二十余篇，传于世。<br /><br />
</td></tr>

<td class="t50">张继</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　继，字懿孙，襄州人。天宝十二年礼部侍郎杨浚下及第。与皇甫冉有髫年之故，契逾昆玉。早振词名。初来长安，颇矜气节，有《感怀》诗云：“调与时人背，心将静者论。终年帝城里，不识五侯门。”尝佐镇戎军幕府，又为盐铁判官。大历间，入内侍，仕终检校祠部郎中。继博览有识，好谈论，知治体，亦尝领郡，辄有政声。诗情爽激，多金玉音。盖其累代词伯，积袭弓裘，其于为文，不雕自饰，丰姿清迥，有道者风。集一卷，今传。<br /><br />
</td></tr>

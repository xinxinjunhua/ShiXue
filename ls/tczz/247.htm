<td class="t50">唐备</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　备，龙纪元年进士。工古诗，多极讽剌，颇干教化，非浮艳轻斐之作。同时于渎者，共一机轴，大为时流所许。备诗有“天若无雪霜，青松不如草；地若无山川，何人重平道”又曰：“狂风拔倒树，树倒根已露，上有数枝藤，青青犹未悟。”又：“一日天无风，四溟波自息。人心风不吹，波浪高百尺。”又《别家》云：“兄弟惜分离，拣日皆言恶。”于渎《对花》云：“花开蝶满枝，花谢蝶来稀，惟有旧巢燕，主人贫亦旧”等诗，发为浇俗，至今人话间，必举以为警戒，足见之矣。余诗多传。<br /><br />

<td class="t50">于武陵</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　武陵，名邺，以字行，杜曲人也。大中时，尝举进士，不称意，携书与琴，往来商洛、巴蜀间，或隐于卜中，存独醒之意。避地嘿嘿，语不及荣贵，少与时辈交游。尝南来至潇湘，爱汀洲芳草，况是古骚人旧国，风景不殊，欲卜居未果，归老嵩阳别墅。诗多五言，兴趣飘逸多感，每终篇一意，策名当时，集一卷，今传。<br /><br />
</td></tr>

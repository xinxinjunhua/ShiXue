<td class="t50">康洽</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　洽，酒泉人，黄须美丈夫也。盛时携琴剑来长官，谒当道，气度豪爽。工乐府诗篇，宫女梨园，皆写于声律。玄宗亦知名，尝叹美之。所出入皆王侯贵主之宅，从游与宴，虽骏马苍头如其己有。观服玩之光，令人归欲烧物，怜才乃能如是也。后遭天宝乱离，飘蓬江表。至大历间，年已七十余，龙钟衰老，谈及开元繁盛，流涕无从。往来两京，故侯馆谷空，咸阳一布衣耳。于时文士愿与论交。李端逢之，赠诗云：“声名常压鲍参军，班位不过扬执戟。”又云：“同时献赋人皆尽，共壁题诗君独在。”后卒杜陵山中。文章不得见矣。<br /><br />

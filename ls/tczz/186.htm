<td class="t50">马戴</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　戴，字虞臣，华州人。会昌四年左仆射王起下进士，与项斯、赵嘏同榜，俱有盛名。初应辟佐大同军幕府，与贾岛、许棠唱答。苦家贫，为禄代耕。岁廪殊薄，然终日吟事，清虚自如。《秋思》一绝曰：“万木秋霖后，孤山夕照余。田园无岁计，寒近忆樵渔。”调率如此。后迁国子博士，卒。戴诗壮丽，居晚唐诸公之上，优游不迫，沉著痛快，两不相伤，佳作也。早耽幽趣，既乡里当名山，秦川一望，黄埃赤日，增起凌云之操。结茅堂玉女洗头盆下，轩窗甚僻，对悬瀑三十仞，往还多隐人。谁谓白头从宦，俸不医贫，徒兴猿鹤之诮，不能无也。有诗一卷，今传。<br /><br />
</td></tr>

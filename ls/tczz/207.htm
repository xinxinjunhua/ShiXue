<td class="t50">李昌符</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　昌符，字若梦，咸通四年礼部侍郎萧仿下进士。工诗，在长安与郑谷酬赠，仕终膳部员外郎。尝作《奴婢诗》五十首，有云：“不论秋菊与春花，个个能噇空肚茶。”“无事莫教频入库，每般闲物要些些”等句。后为御史劾奏，以为轻薄为文，多妨政务，亏严重之德，唱诽戏之风。谪去，匏系终身。有诗集一卷，行于世。<br /><br />
</td></tr>

<td class="t50">杨巨源</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　巨源，字景山，蒲中人。贞元五年刘太真下第二人及第。初为张弘靖从事，拜虞部员外郎，后迁太常博士、国子祭酒。大和中，为河中少尹，入拜礼部郎中。巨源才雄学富，用意声律，细挹得无穷之源，缓隽有愈永之味。长篇刻琢，绝句清泠，盖得于此而失于彼者矣。有诗一卷，行于世。<br /><br />
</td></tr>

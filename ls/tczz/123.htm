<td class="t50">羊士谔</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　士谔，贞元元年礼部侍郎鲍防下进士。顺宗时，累至宣歙巡官，为王叔文所恶，贬汀州宁化尉。元和初，宰相李吉甫知奖，擢为监察御史，掌制诰。后以与窦群、吕温等诬论宰执，出为资州刺史。士谔工诗，妙造梁《选》，作皆典重。早岁尝游女几山，有卜隐之志，勋名相迫，不遂初心。有诗集行于世。<br /><br />
</td></tr>

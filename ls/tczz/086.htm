<td class="t50">耿湋</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　湋，河东人也。宝应二年洪源榜进士。与古之奇为莫逆之交。初为大理司法，充括图书使来江淮，穷山水之胜。仕终左拾遗。诗才俊爽，意思不群。似湋等辈，不可多得。诗集二卷，今传。<br /><br />

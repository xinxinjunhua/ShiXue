<td class="t50">马异</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　异，睦州人也。兴元元年礼部侍郎鲍防下进士第二人。少与皇甫湜同砚席，赋性高疏，词调怪涩，虽风骨棱棱，不免枯瘠。卢仝闻之，颇合己志，愿与结交，遂立同异之论，以诗赠答，有云：“昨日仝不同，异自异，是谓大同而小异。今日仝自同，异不异，是谓同不往而异不至。”斯亦怪之甚也。后不知所终。集今传世。<br /><br />
</td></tr>

<td class="t50">窦巩</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　巩，字友封，状貌瑰伟，少博览，无不通。性宏放，好谈古今，所居多长者车辙。时诸兄已达，巩尚来场屋间，颇抑初志。作《放鱼》诗云：“黄金赎得免刀痕，闻道禽鱼亦感恩。好去长江千万里，不须辛苦上龙门。”人知其述怀也。元和二年王源中榜进士。佐缁青幕府，累迁秘书少监，拜御史中丞，仕终武昌观察副使。巩平居与人言不出口，时号为“嗫嚅翁”云。<br /><br />
</td></tr>

<td class="t50">孙逖</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　逖，博州人。幼而有文，属思警敏，援笔成篇。开元二年，举手笔俊拔、哲人奇士隐沦屠钓及文藻宏丽等科，第一人及第。玄宗引见，擢左拾遗，集贤殿修撰。改考功员外郎，迁中书舍人。与颜真卿、李华、萧颖士皆同时，称海内名士。仕终刑部侍郎。善诗，古调今格，悉其所长。集二十卷，今传。<br /><br />
</td></tr>

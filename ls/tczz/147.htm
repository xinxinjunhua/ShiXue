<td class="t50">鲍溶</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　溶，字德源，元和四年韦瓘榜第进士，在杨汝士一时。与李端公益少同袍，为尔汝交。初隐江南山中避地。家苦贫，劲气不扰，羁旅四方，登临怀昔，皆古今绝唱。过陇头古天山大阪，泉水呜咽，分流四下，赋诗曰：“陇头水，千古不堪闻。生归苏属国，死别李将军。细响风凋草，清哀雁入云。”其警绝大概如此。古诗乐府，可称独步。盖其气力宏赡，博识清度，雅正高古，众才无不备具云。卒飘蓬薄宦，客死三川。有集五卷，今传。<br /><br />
</td></tr>

<td class="t50">杨发</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　发，大和四年礼部侍郎郑澣下第二人及第。工诗，亦当时声韵之伟者。略举一篇，《宿黄花馆》云：“孤馆萧条槐叶稀，暮蝉声隔水声微。年年为客路长在，日日送人身未归。何处离鸿迷浦月，谁家愁妇捣寒衣。夜深不卧帘犹卷，数点残萤入户飞。”俱浏亮清新，颇惊凡听。恨其出处事迹不得而知也。有诗传世尚多。<br /><br />
</td></tr>

<td class="t50">章孝标</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　孝标，字道正，钱塘人。李绅镇淮东时，春雪，孝标参座席，有诗名，绅命札请赋，唯然，索笔一挥云：“六出花飞处处飘，粘窗拂砌上寒条。朱门到晚难盈尺，尽是三军喜气消。”李大称赏，荐于主文。元和十四年礼部侍郎庾承宣下进士及第，授校书郎。于长安将归家庆，先寄友人曰：“及第全胜十政官，金汤镀了出长安。马头渐入扬州郭，为报时人洗眼看。”绅适见，亟以一绝箴之曰：“假金方用真金镀，若是真金不镀金。十载长安方一第，何须空腹用高心。”孝标惭谢。伤其气宇窘急，终不大用。大和中，尝为山南道从事，试大理评事。仕终秘书正字。有集一卷，传世。<br /><br />

<td class="t50">朱昼</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　昼，广陵人。贞元间，慕孟郊之名，为诗格范相似，曾不远千里而访之，不厌勤苦，体尚奇涩。与李涉友善，相酬唱。昼《古镜》诗云：“我有古时镜，初自坏陵得。蛟龙犹泥蟠，魑魅幸月蚀。磨久见菱蕊，青于蓝水色。赠君将照心，无使心受惑。”凡如此警策者稍多，今传于世。<br /><br />

<td class="t50">喻凫</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　凫，毗陵人，开成五年李从实榜进士，仕为乌程县令。有诗名。晚岁变雅，凫亦风靡，专工小巧，高古之气扫地，所畏者务陈言之是去耳。后来才子，皆称“喻先辈”，向慕之情足见也。同时薛莹亦工诗。凫诗一卷，莹诗《洞庭集》一卷，今并传。<br /><br />
</td></tr>

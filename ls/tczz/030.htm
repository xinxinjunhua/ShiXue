<td class="t50">卢象</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　象，字纬卿，汶水人，鸿之侄也。携家来居江东最久。仕为校书郎、左拾遗、膳部员外郎。受安禄山伪官，贬永州司户参军。后为主客员外郎。有诗名，誉充秘阁，雅而不素，有大体，得国士之风。集二十卷，今传。同仕有韦述，为桑泉尉。时诏求逸书，命述等编校于朝元殿。后为翰林学士，有诗名，今亦传焉。<br /><br />
</td></tr>

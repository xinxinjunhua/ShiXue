<td class="t50">吴融</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br /><br />
　　融，字子华，山阴人。初力学，富辞，调工捷。龙纪元年李瀚榜及进士第。韦昭度讨蜀，表掌书记。坐累去官，流浪荆南，依成汭。久之，召为左补阙，以礼部郎中为翰林学士，拜中书舍人。天复元年元旦，东内反正，既御楼，融最先至，上命于前座跪草十数诏，简备精当，曾不顷刻，皆中旨，大加赏激，进户部侍郎。帝幸凤翔，融不及从，去客阌乡，俄召为翰林承旨，卒。为诗靡丽有余，而雅重不足。集四卷及制诰一卷，并行。<br /><br />
</td></tr>

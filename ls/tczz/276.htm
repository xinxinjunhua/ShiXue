<td class="t50">孟贯</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贯，闽中人。为性疏野，不以荣宦为意，喜篇章。周世宗幸广陵，贯时大有诗价，世宗亦闻之，因缮录一卷献上，首篇《书贻谭先生》云：“不伐有巢树，多移无主花。”世宗不悦曰：“朕伐叛吊民，何得有巢、无主之说！——献朕则可，他人则卿必不免。”不复终卷，赐释褐进士。虚名而已。不知其终。有诗集，今传。孟子曰：“予之不遇鲁侯，天也。”至唐开元，孟浩然流落帝心，和璧堕地。孟郊之出处梗概苦难，生平薄宦而死。今孟贯坐此诗穷，转喉触讳，非意相干，竟尔埋没，与前贤俱亦相似，命也。孟氏之不遇，一何多耶！<br /><br />

<td class="t50">张仲素</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　仲素，字绘之。贞元十四年李随榜进士，与李翱、吕温同年。以中朝无援不调，潜耀久之，复中博学宏辞，始任武康军从事。贞元二十年，迁司勋员外郎，除翰林学士。时宪宗求卢纶诗文遗草，敕仲素编集进之。后拜中书舍人。仲素能属文，法度严确。魏文帝有云：“文以意为主，以气为辅，以词为卫。”此言得之矣。其每词未达而意先备也。善诗，多警句。尤精乐府，往往和在宫商，古人有未能虑及者。集一卷，及《赋枢》三卷，今传。<br /><br />
</td></tr>

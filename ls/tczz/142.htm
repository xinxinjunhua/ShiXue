<td class="t50">长孙佐辅</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　佐辅，朔方人。举进士下第，放怀不羁。弟公辅，贞元间为吉州刺史，遂往依焉。后卒不宦，隐居以求志。然风流酝藉，一代名儒。诗格词情，繁缛不杂，卓然有英迈之气。每见其拟古、乐府数篇，极怨慕伤感之心，如水中月，如镜中相，言可尽而理无穷也。集今传。<br /><br />
</td></tr>

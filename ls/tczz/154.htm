<td class="t50">沈亚之</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　亚之，字下贤，吴兴人。初至长安，与李贺结交。举进士不第，为歌以送归。元和十年侍郎崔群下进士。泾原李汇辟为掌书记。为秘书省正字。长庆中，补栎阳令。四年，迁福建团练副使，事徐晦。后累迁殿中丞御史内供奉。大和三年，柏耆宣慰德州，取为判官。耆罢，亚之贬南康尉，后终郢州掾。亚之以文辞得名，然狂躁贪冒，辅耆为恶，颇凭陵晚达，故及于谪。尝游韩吏部门。杜牧、李商隐俱有拟沈下贤诗，盖甚为当时名辈器重云。有集九卷，传世。<br /><br />
</td></tr>

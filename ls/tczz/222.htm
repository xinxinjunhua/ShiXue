<td class="t50">聂夷中</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　夷中，字坦之，河南人也。咸通十二年礼部侍郎高湜进士，与许棠、公乘亿同袍。时兵革多务，不暇铨注，夷中滞长安久，皂裘已弊，黄粮如珠，始得调华阴县尉，之官惟琴书而已。性俭，盖奋身草泽，备尝辛楚，率多伤俗闵时之举，哀稼穑之艰难。适值险阻，进退维谷，才足而命屯，有志卒爽，含蓄讽刺，亦有谓焉。古乐府尤得体，皆警省之辞，裨补政治，乐而不淫，哀而不伤，正国风之义也。其诗一卷，今传。<br /><br />
</td></tr>

<td class="t50">陶翰</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　翰，润州人。开元十八年崔明允下进士及第，次年中博学宏辞，与郑昉同时，官至礼部员外郎。为诗词笔双美，既多兴象，复备风骨。三百年以前，方可论其裁制。大为当时所称。今有集相传。<br /><br />

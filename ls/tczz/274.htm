<td class="t50">廖图</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　图，字赞禹，虔州虔化人。文学博赡，为时辈所服。湖南马氏辟致幕下，奏授天策府学士。与同时刘昭禹、李宏皋、徐仲雅、蔡昆、韦鼎、释虚中，俱以文藻知名，赓唱迭和。齐己时寓渚宫，相去图千里，而每诗筒往来不绝，警策极多，必见高致。集二卷，今行于世。时有荆南从事郑淮，亦工诗，与僧尚颜多所酬赠，诗亦传。<br /><br />

<td class="t50">李中</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　中，字有中，九江人也。唐末，尝第进士，为新涂、淦阳、吉水三县令，仕终水部郎中。孟宾于赏其工吟，绝似方干、贾岛，时复过之。如“暖风医病草，甘雨洗荒村”，又“贫来卖书剑，病起忆江湖”，又“闲花半落处，幽鸟未来时”，又“千里梦随残月断，一声蝉送早秋来”，又“残阳影里水东注，芳草烟中人独行”，又“闲寻野寺听秋水，寄睡僧窗到夕阳”，又“香入肌肤花洞酒，冷浸魂梦石床云”，又“西园雨过好花尽，南陌人稀芳草深”等句，惊人泣鬼之语也。有《碧云集》，今传。<br /><br />
</td></tr>

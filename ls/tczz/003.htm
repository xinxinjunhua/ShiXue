<td class="t50">崔信明</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　信明，青州人。少英敏，及长，强记，美文章。高孝基语人曰：“崔生才冠一时，但恨位不到耳。”隋大业中，为尧城令。窦建德僭号，信明弟仕贼，劝信明降节，当得美官。不肯从，遂逾城去，隐太行山中。唐贞观六年，诏即家拜兴势丞，迁秦川令，卒。信明恃才蹇亢，尝自矜其文。时有扬州录事参军荥阳郑世翼，亦骜倨忤物，遇信明于江中，谓曰：“闻君有‘枫落呈江冷’之句，仍愿见其余。”信明欣然多出旧制。郑览未终，曰：“所见不逮所闻！”投卷于水中，引舟而去。今其诗传者数篇而已。<br /><br />

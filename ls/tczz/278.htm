<td class="t50">熊皎</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　皎，九华山人。唐清泰二年进士。刘景岩节度延安，辟为从事。晋天福中，说景岩归朝，以功擢右谏议，竟坐累黜为上津令。工古律诗，语意俱妙。尝赋《早梅》云：“一夜开欲尽，百花犹未知。”甚传赏士林，且知其心遇。今有《屠龙集》、《南金集》合五卷传世，学士陶谷序之。<br /><br />
</td></tr>

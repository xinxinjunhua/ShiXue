<td class="t50">任涛</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　涛，筠川人也。章句之名早擅。乾符中，应数举，每败垂成。李常侍骘廉察江西，素闻涛名，取其诗览之，见云：“露抟沙鹤起，人卧钓船流。”大加赏叹曰：“任涛奇才也，何故不成名会当荐之。”特与放乡里杂役，仍令本贯优礼。时盲俗互有论列，骘判曰：“江西境内，凡为诗得及涛者，即与放役，岂止一任涛而已哉。”未几，涛逝云，有才无命，大可怜也。诗集今传。<br /><br />
</td></tr>

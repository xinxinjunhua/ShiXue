<td class="t50">翁承赞</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　承赞，字文尧，乾宁三年礼部侍郎独孤损下第四人进士，又中宏词敕头。承赞工诗，体貌甚伟，且诙谐，名动公侯。唐人应试，每在八月，谚曰：“槐花黄，举士忙。”承赞《咏槐花》云：“雨中妆点望中黄，勾引蝉声送夕阳。忆得当年随计吏，马蹄终日为君忙。”甚为当时传诵。尝奉使来福州，见友僧亚齐，赠诗云：“萧萧风雨建阳溪，溪畔维舟见亚齐。一轴新诗剑潭北，十年旧识华山西。吟魂昔向江村老，空性元知世路迷。应笑乘轺青琐客，此时无暇听猿啼。”他诗高妙称是。仕王审知，终谏议大夫。有诗，以兵火散失，尚存百二十余篇，为一卷，秘书郎孙郃为序云。<br /><br />

<td class="t50">綦毋潜</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　潜，字孝通，荆南人。开元十四年严迪榜进士及第。授宜寿尉，迁右拾遗，入集贤院待制，复授校书，终著作郎。与李端同时。诗调屹崒峭蒨足佳句，善写方外之情，历代未有。荆南分野，数百年来，独秀斯人。后见兵乱，官况日恶，挂冠归隐江东别业。王维有诗送之，曰：“明时久不达，弃置与君同。天命无怨色，人生有素风。”一时文士咸赋诗祖饯，甚荣。有集一卷，行世。<br /><br />
</td></tr>

<td class="t50">崔峒</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　峒，博陵人。工文有价。初辟潞府功曹，后历左拾遗，终右补阙。词彩炳然，意思方雅，时人称其句为披沙拣金，往往见宝。诗集一卷，今行于世。<br /><br />

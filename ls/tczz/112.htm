<td class="t50">刘商</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　商，字子夏，徐州彭城人。擢进士第。贞元中，累官比部员外郎，改虞部员外郎。数年，迁检校兵部郎中。后出为汴州观察判官，辞疾挂印，归旧业。商性好酒，苦家贫。尝对花临月，悠然独酌，亢音长谣，放适自遂。赋诗曰：“春草秋风老此身，一飘长醉任家贫。醒来还爱浮萍草，飘寄官河不属人。”乐府歌诗，高雅殊绝。《拟蔡琰胡笳曲》，鲙炙当时。仍工画山水树石，初师吴郡张璪，后自造真。张贬衡州司马，有惆怅之诗。好神仙，炼金骨，后隐义兴胡父渚，结侣幽人，世传冲虚而去，可谓江海冥灭，山林长往者矣。有集十卷，今传，武元衡序之云。<br /><br />

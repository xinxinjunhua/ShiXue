<td class="t50">裴夷直</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　夷直，字礼卿，吴人。元和十年礼部侍郎崔群下进士，仕为中书舍人。武宗立，以罪贬驩州司户。宣宗初，为江、华二州刺史。终尚书左司员外郎、散骑常侍。工诗，有盛名。集一卷，今传于世。<br /><br />
</td></tr>

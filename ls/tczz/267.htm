<td class="t50">裴说</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　说，工诗，得盛名。天祐三年礼部侍郎薛廷珪下状元及第。初年窘迫乱离，奔走道路，有诗曰“避乱一身多”，见者悲之。后仕为补阙，终礼部员外郎。为诗足奇思，非意表琢炼不举笔，有岛、洞之风也。弟谐，亦以诗名世。仕终桂岭假官宰。今俱有集，相传。<br /><br />
</td></tr>

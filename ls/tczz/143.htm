<td class="t50">杨衡</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　衡，字中师，霅人。天宝间避地西来，与符载、崔群、李渤同隐庐山，结草堂于五老峰下，号“山中四友”，日以琴酒寓意，云月遣怀。衡诗工，苦于声韵奇拔，非常格敢窥其涯涘。尝吟罢，自赏其作，抵掌大笑，长谣曰：“一一鹤声飞上天！”谓其响彻如此，人亦叹伏。试大理评事。往来多山僧道士，为方外之期。诗一卷，今传于世。<br /><br />
</td></tr>

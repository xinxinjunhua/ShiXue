<td class="t50">翁绶</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　绶，咸通六年中书舍人李蔚下进士。工诗，多近体，变古乐府，音韵虽响，风骨憔悴，真晚唐之移习也。后亦间关，名不甚显。固知闾巷之人，欲砥行立名者，非附青云之上，恶能施于后世哉。有诗今传。<br /><br />
</td></tr>

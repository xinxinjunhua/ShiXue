<td class="t50">鱼玄机</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　玄机，长安人，女道士也。性聪慧，好读书，尤工韵调，情致繁缛。咸通中及笄，为李亿补阙侍宠。夫人妒，不能容，亿遣隶咸宜观披戴。有怨李诗云：“易求无价宝，难得有心郎。”与李郢端公同巷，居止接近，诗筒往反。复与温庭筠交游，有相寄篇什。尝登崇真观南楼，睹新进士题名，赋诗曰：“云峰满目放春情，历历银钩指下生。自恨罗衣掩诗句，举头空羡榜中名。”观其志意激切，使为一男子，必有用之才，作者颇赏怜之。时京师诸宫宇女郎，皆清俊济楚，簪星曳月，惟以吟咏自遣，玄机杰出，多见酬酢云。有诗集一卷，今传。<br /><br />

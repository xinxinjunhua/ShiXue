<td class="t50">权德舆</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　德舆，字载之，秦州人。未冠，以文章称诸儒间。韩洄黜陟河南，辟置幕府。复从江西观察使李兼府为判官。德宗闻其材，召为太常博士，改左补阙，中间累上书直言，迁起居舍人。贞元十五年知制诰，进中书舍人。宪宗初，历兵部侍郎、太子宾客。以陈说谋略多中，元和五年自太常卿拜礼部尚书、同中书门下平章事。德舆善辩论，开陈古今，觉悟人生。主辅相，尚宽，不甚察察。封扶风郡公。德舆能赋诗，工古调乐府，极多情致。积思经术，无不贯综，手不释卷。虽动止无外饰，其酝藉风流，自然可慕。贞元、元和间，为荐绅羽仪。有文集，今传，杨嗣复为序。<br /><br />
</td></tr>

<tr><td class="t50">王仁皎传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王仁皎，字鸣鹤，玄宗废后父也。景龙中，以将帅举，授甘泉府果毅，迁左卫中郎将。帝即位，以后故，擢将作大匠，进累开府仪同三司，封祁国公，食户三百。仁皎避职不事，委远名誉，厚奉养，积媵妾赀货而已。卒年六十九，赠太尉、益州大都督，谥昭宣。官为治葬。柩行，帝御望春亭过丧。诏张说文其碑，帝为题石。<br /><br />
　　子守一，与后孪生，帝微时与雅旧，后诏尚清阳公主。从讨太平主有功，由尚乘奉御迁殿中少监、晋国公，累进太子少保，袭父爵，被遇良渥。后废，贬柳州别驾，至蓝田，赐死。守一沓墨无顾藉，财蓄巨万，皆籍入于官。<br /><br />
</td></tr>

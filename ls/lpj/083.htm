<td class="t50">郭贽</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　郭贽，字仲仪，开封人。应进士，为开封首荐，太宗任京尹，得侍读藩邸，即位，擢著作佐郎。七年四迁至参知政事。太平兴国八年，晨朝被酒，责授秘书少监，稍复积至礼部尚书。卒年七十六，赠左仆射。贽长者，喜延誉后进，宋白、赵昌言辈，皆所荐也。尝对太宗曰：“臣受遇不次，惟以愚直上报。”上曰：“愚直何益！”曰：“犹胜奸邪尔！”晚节颇以治生，为物论所惜。子昭度、昭升、昭用。<br /><br />

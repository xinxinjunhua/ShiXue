<td class="t50">上官正</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　上官正，开封人。少举三传，为鄜州摄官。雍熙中，授殿前承旨，因屡鞫狱，迁至作坊使。蜀贼李顺之乱，正监兵剑门关，出兵击破其党，斩馘殆尽，方朝廷以栈道为忧，正孤军破数万众，其势遂沮，赏功授六宅使、剑门刺史。顺既诛，余党匿山泽间，正推恩信，招来之，加峰州团练使，代王继恩为西川招安使。至道末，叛卒刘旰陷邛汉州，又诏正讨平之，累擢洺州防御使，以环卫官分司，卒，年七十五。正不畏强御，而性颇急暴，多诟辱官吏，太宗常手札戒之。<br /><br />
</td></tr>

<td class="t50">任中师</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　任中师，字祖圣。大中祥符二年，登进士第，累擢至右谏议大夫，加集贤院学士，龙图阁直学士，枢密直学士。任布守河阳，数上书论塞下事，称旨，上欲用之，吕夷简素知中师，上前数称中师才不在布下。庆历初，遂并召为枢密副使，求补郡，三年，以礼部侍郎、资政殿学士、知永兴军，徙陈州，请曹州，逾年，遂请老，以太子少傅致仕，卒年七十七，赠太子少保，谥安惠。初益州税及薪蒭蔬果之属，中师知州，奏尽蠲之。性乐易，家财素丰，处通显，自奉甚约，其践历与中正多同。上数赐飞白书，归休于里中，建御书阁，乡人荣之。子昱拱之。<br /><br />
</td></tr>

<td class="t50">周审玉</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　周审玉，开封人。周显德中，以父荫补殿直。建隆至雍熙，擢为作坊使。契丹入寇，潘美在定武，审玉监军，先锋刘绪陷贼，审玉跃马趋击，拔绪而还，勇冠三军。常知凰翔府，有僧乘传而西，以市木为名，威动郡邑，审玉按诘，尽得其奸状，送阙下，时称审玉非特有武，亦通吏术，以左千牛卫大将军致仕，卒，年七十四。<br /><br />
</td></tr>

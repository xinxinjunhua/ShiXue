<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李纬，字仲文，以父广东提点刑狱遗恩，补借职，累擢至西上阁门使，卒，年七十，赠引进使、陵州团练使。子：师中、积中、纯中。纬常知渭州，请修笼竿城、瓦亭寨，及以笼竿为德顺军，范仲淹、韩琦遂举纬知德顺军，招蕃部内属者数百帐。葛怀敏既陷殁，元昊因攻瓦亭、笼竿，皆不能下。雄州未有常平仓，纬知州，以赐公使钱置焉，及民饥，遂获均济。<br /><br />
</td></tr>

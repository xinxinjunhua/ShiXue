<td class="t50">赵稹</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　赵稹，字表微，宣城人。端拱二年，登进士第，累擢谏议大夫、集贤院学士，知益州。坐市锦宽纵，落职，久之，复旧，俄迁枢密直学士。章献太后临朝既久，刘美人有婢出入禁中，稹厚结之。天圣八年，枢密副使。明道二年，罢为尚书左丞，迁礼部尚书，以太子少傅致仕，卒，年七十六，赠太子太保，谥僖质。子：士宾。稹少好学，尝为益州路转运使，有平冤狱之称。<br /><br />
</td></tr>

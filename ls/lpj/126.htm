<td class="t50">柴禹锡</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　柴禹锡，字玄圭，大名人。少有相者谓曰：“子甚贵，若辅以经术，必至将相。”由是颇读书传。太宗尹京，因委质焉。即位，累擢如京使，掌翰林，同告秦王廷美阴谋，擢宣徽北院使兼枢密副使。雍熙初，罢。淳化四年，复旧任，兼知枢密院事，除节度使。卒年六十二，赠太子太傅。<br /><br />
</td></tr>

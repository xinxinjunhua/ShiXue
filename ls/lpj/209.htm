<td class="t50">狄棐</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　狄棐，字辅之，潭州湘潭人。唐梁公十代孙也，唐末，其远祖避地因家焉。咸平二年，登进士第，多历外任。明道初，擢至谏议大夫、龙图阁直学士，进枢密直学士。卒，年六十七。子：遵道、遵度、遵礼、遵路。常守蒲中，内臣旁午有自矜权宠者，欲引援之，棐答以它语，退谓人曰：“吾湘潭一寒士，今官侍从，岂晚节缘近幸以希进哉！”知广州，不畜南海物，人称其廉慎，及终，家无余赀。<br /><br />

<td class="t50">王溥</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王溥，字齐物，太原人。汉乾祐中登进士第。周祖镇蒲津，召置幕府，从征李守贞、王景崇，得朝臣交结书，周祖欲暴其事，溥力请焚之。周祖将大渐，趣草相制，闻宣毕，曰：“吾无恨矣！”世宗尝问：“汉相李嵩蜡丸书结北虏，有记其辞者否？”溥曰：“使嵩有此，肯以示人耶？逢吉辈构之尔。”世宗遂优赠其官。建隆初，不易旧任。乾德二年罢，卒谥文献，后改曰文康。父祚，仕至上将军，祚致仕，溥犹居相位，每公侯引觞为寿，溥侍侧如婴儿，人称其孝敬。祚徇货殖，溥亦获吝啬讥。孙贻永。<br /><br />

<td class="t50">范恪</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　范恪，字许国，开封人。隶军籍，选行门历龙旗直散员押班，试换内殿崇班，积官至两使、留后，卒，年五十，赠节度使。子：愈、愿、总、诉、恕、愚、应、隐、懿、亿。恪骁勇善射，临敌敢前。初为庆州北路都巡检，预攻破白豹城，兵还，贼袭其后，恪设伏击之，杀获甚众。常会诸道兵攻十二盘暨咄当迷子寨，中流矢，神色自若，至暮以言激众，士卒争奋，遂得其城，有弓胜二石一斗，其箭镞如铧，临阵必中，闲有一矢贯二人者，虏畏之，从夺蕉蒿寨归，恪殿后，虏以数千骑来袭，恪止有二铧箭，引满不发，贼欲相及，辄复避去，终莫能近。<br /><br />
</td></tr>

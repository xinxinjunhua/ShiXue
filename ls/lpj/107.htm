<td class="t50">王仁赡</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王仁赡，字子丰，唐州人。显德中，隶太祖帐下；即位，累加进擢。乾德二年，枢密副使，是年，命与王全斌、崔彦进伐蜀。蜀平，有讼同诸将取民间子女玉帛，责右卫大将军。开宝末，领三司近十年，颇纵吏为奸，时副使陈恕辈率任苛察，与卜遇，互持本司短长，仁赡不能胜，责唐州防御使，卒。<br /><br />
</td></tr>

<td class="t50">石保吉</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　石保吉，字祐之，中书令守信之子，尚太祖第五女延庆公主，自诸将军擢至节度使。景德初，同平章事，是年契丹入寇，真宗将行幸澶渊，先遣保吉与李继隆为排阵使，对垒以待，而虏骑数万骤至城下，保吉不介马，当其前锋，虏甚畏惮，驾至卫南，师已告捷，及振旅，舍爵策勋，特加户邑。大中祥符三年，卒，赠中书令，谥壮武。保吉有武干，历世将相，家积不赀，而治生射利，所至侵扰。为魏帅，叶齐、查道皆知名士，保吉悉命械颈以督粮运，物论少之。先是守信镇宛丘，年五十七而卒，保吉继居是镇，卒年与之同，谈者异之。<br /><br />

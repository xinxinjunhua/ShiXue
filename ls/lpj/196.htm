<td class="t50">杨大雅</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　杨大雅，字子政，初名侃，避真宗藩邸名而更之，唐靖恭诸杨虞卿之后，虞卿孙承休，唐天祐初，为吴越策礼副使，因家钱塘，大雅，承休四世孙也。端拱二年，登进士第，久历外官，后与陈从易并命为知制诰，二人者皆博学有行义，颇惬时论，以右谏议大夫、集贤院学士知亳州。卒，年六十九。所著有《太隐集》三十卷、《西垣集》五卷、《职林》二十卷、《两汉博闻》十二卷。子：洎、泳、渐、沆、沨。<br /><br />
</td></tr>

<td class="t50">李怀忠</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李怀忠，涿郡人。始事太祖为牙校，以功累擢至大同军节度使，太祖洛京郊祀，爱其山川形势，有迁都意，莫敢言者，怀忠乘闲曰：“汴都岁漕江淮米四五百万斛，赡军数十万计，帑藏、重兵在焉，陛下遽欲都此，谁与共处邪？”上悟，亟还京。怀忠，太平兴国中卒。<br /><br />
</td></tr>

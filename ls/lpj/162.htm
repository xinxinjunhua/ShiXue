<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　◎第12卷 王后<br /><br />
　　周郑王，名训，世宗长子。显德六年六月，封梁王。世宗崩，即皇帝位，明年，正月，六军拥戴太祖，而王逊居西邸，封国于郑。建隆三年，王徙房陵。开宝六年，薨，年二十一。知制诰张澹请谥曰“恭皇帝”，陵曰“顺陵”。周自辛亥岁建国，至巳亥而禅位，三主，共九年。<br /><br />

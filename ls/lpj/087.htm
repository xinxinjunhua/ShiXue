<td class="t50">任中正</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　任中正，字庆之，曹州人。雍熙初，登进士第，历外官多效，翰林学士钱若水，尝荐其才，累擢至枢密直学士、知益州、并州、开封府。大中祥符九年，枢密副使，改同知院，又复为副使。天禧四年，参知政事兼太子宾客。仁宗继位，为兵部尚书，与丁谓善，谓败，力营救之，谓窜，降中正太子宾客、知郓州，复礼部尚书。丁母忧，哀毁过以疾，卒年六十六，赠左仆射，谥康懿。中正以孝行称于乡党，事亲尽敬，衣服简质，而饮食极于丰美，子易，弟中师。<br /><br />
</td></tr>

<tr><td>
<br />
　　◎宣徽使<br /><br />
　　昝居润，字广川，魏郡高唐人。少有气节，常为后唐枢密院小吏，景延广留守西洛，补为右职，契丹犯阙，以兵围延广家，故吏悉避去，特居润力为全护，时论多之。仕周，至宣徽南院使。建隆初，仍旧职，是年，除义成军节度使、检校太尉。卒，年五十九，赠太师。<br /><br />
</td></tr>

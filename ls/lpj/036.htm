<td class="t50">薛居正</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　薛居正，字子平，开封人。父仁谦，《五代史》有传。居正，后唐清泰中登进士第，仕周至刑部侍郎。建隆初，知朗州，有亡卒数千为盗，军使疑城中释子为应，欲尽杀之；居正以计缓其事，生擒贼首，乃知释子千数无预谋者。乾德二年，初置参知政事，居正及吕余庆，首当其选。开宝六年拜相，太平兴国初，进位司空。薨，谥文惠。无子，以同姓子惟吉为嗣。居正操行方重，不事苛察，好读书，为文敏赡，有集二十卷，诏李昉为之序。<br /><br />
</td></tr>

<td class="t50">宋琪</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　宋琪，字叔宝，范阳蓟人。晋天福中，在契丹举进士登第，幽帅赵延寿惜其自陷虏廷，辟为从事。建隆间，为开封府推官，太宗尹京，礼遇甚厚。即位累擢至参知政事。太平兴国八年，与李昉同相，因请卢多逊旧第，上恶而罢之。薨年八十，赠司空、谥惠安。琪有吏能，辩捷好恢谐，而寡学识。<br /><br />
</td></tr>

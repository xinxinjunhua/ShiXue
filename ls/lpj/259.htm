<td class="t50">王彦超</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王彦超，字德升，魏郡人。少事魏王继岌，在晋为刺史；汉为防御使；周，节度使兼侍中。建隆初，加中书令，改授二镇，封邠国公，以太子太师致仕，年七十三。累朝皆有战功。时以为彦超居富贵，能知止足。<br /><br />

<td class="t50">王汉忠</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王汉忠，字希杰，徐州人。以材勇给事晋邸，太宗践祚，累擢至观察使。真宗即位，进节度使，以左卫上将军卒，年五十四。汉忠有识略，军政严整，所至无盗贼，颇涉儒学，好为歌诗，聚书万卷，尊儒士，待宾佐有礼，轻财好施，得士卒心，惟喜矜恃，同列多所不悦。<br /><br />
</td></tr>

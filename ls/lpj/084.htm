<td class="t50">温仲舒</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　温仲舒，字秉阳，河南人。太平兴国三年，登进士第，尝摈废，久之，因言称旨进用，累擢谏议大夫。淳化二年，枢密副使，改同知院。四年，罢。至道二年，参知政事。咸平初，罢，久之，兼御史中丞，以户部尚书，判昭文馆。卒年七十六，赠左仆射。仲舒有应用才，屡与寇准同进，谓之“温寇”。始废黜，吕蒙正当路，力援进之，及骤用，反攻蒙正，为士论所薄。<br /><br />

<td class="t50">卢鉴</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　卢鉴，字正臣，金陵人。淳化四年，举进士，不中，授三班奉职，积官至西上阁门使、知秦州，卒，年七十。子：咸盛。初鉴鄜延路走马承受，就除本路驻泊都监，屡击走继迁，焚族帐积聚，而获其畜产以数万计，继迁声言，石陨帐前，有文曰“天戒汝，勿为中国患”，因入奏曰：“贼伪为此以绐朝廷，宜益设备。”后果陷灵州。鉴知仪州，谍者言继迁将由制胜关入寇，诏徙老幼刍粟于内地，鉴奏以为摇民心，且民弱不可徙，已而贼亦不至。<br /><br />
</td></tr>

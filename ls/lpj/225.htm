<td class="t50">刘颜</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘颜，字子望，徐州人。大中祥符元年，登进士第，初知汝州龙兴县，坐杀已就执之盗，免官，遂居乡里，以著书自适，从学者常数十百人，名闻东州，乃采摭两汉至五代名臣奏对有补于时者，为《辅弼名对》四十卷。冯元及钱易滕涉蔡齐为上之，且言颜经行淳备，乃以补任城县主簿，李迪知兖、青二州，皆辟为从事，卒，年五十一。子：庠。所著有《儒术通要》、《经济枢言》。石介见其文叹曰：“恨不得在弟子之列”。<br /><br />

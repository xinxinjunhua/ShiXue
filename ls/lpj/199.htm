<td class="t50">张师德</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张师德，字尚贤，河南人。父：去华，建隆二年，举进士第一。师德，大中祥间，复居第一，时以为荣。累擢知制诰、谏议大夫、知汝州。卒，年四十九。子：景仙、景宪、景思、景惠。师德孝谨有家法，守道不回，执政不悦，在西掖者九年。有集十卷。<br /><br />

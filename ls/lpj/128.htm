<td class="t50">王显</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王显，开封府人，少给事晋邸，即位，补右班殿直，未几，数加进擢。太平兴国八年，除宣徽南院使兼枢密副使。淳化二年，罢为节度使。咸平二年，枢密使。三年，罢，复建节。卒，年七十六，赠中书令。子：希逸，太常博士直史馆；希范，并迁官。<br /><br />

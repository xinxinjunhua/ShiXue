<td class="t50">李处耘</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李处耘，字正元，上党人。在周，以右职隶太祖帐下。建隆元年，擢宣徽北院使。三年，改南院兼枢密副使。乾德初，周保权乞师讨张文表，命处耘与慕容延钊赴之，太祖面授处耘方略，俾图荆南，处耘次江陵百余里外，潜遣数千骑入据其城，高继冲请举族归朝。荆湖平，坐与延钊不协，责淄州剌史，卒年四十七。处耘多机谋，尝权知扬州，有善政，识度详敏，论事造理，颇以功名自任，惟受遇思报，勇于敢为，朝廷以延钊宿将，乃独罪处耘，处耘亦不自辨。子：继隆、继和、继明、继靖。太宗明德皇后，即其女也。<br /><br />
</td></tr>

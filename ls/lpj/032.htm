<td class="t50">范质</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　◎第04卷 宰臣<br /><br />
　　范质，字文素，魏郡人。母梦人授以五色笔而质生。唐长兴中擢进士第，仕晋至翰林学士。周祖擢为宰相。建隆初，封鲁国公。乾德二年罢相，初和凝知贡举，爱质所试文，自以中第尝在第十三名故，亦以处质，其后质官及封国，皆与凝同，当时谓之传衣钵。质平居手不释卷，谓人曰：“尝有异人言吾当大任，无学术何以处之？”及司制诰，人服其该赡，奉行制敕，未尝破律，为相不受四方馈献，禄赒亲族，殁无余财，太祖叹其清慎，曰：“真宰相也！”太宗亦言，近世辅弼，循规矩，慎名器，无与比者；特不能死周社稷，乃其短尔。子旻<br /><br />

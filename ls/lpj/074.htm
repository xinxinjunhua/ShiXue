<td class="t50">王沔</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王沔，字楚望，齐州人。太平兴国二年，登进士第。八年，签书枢密院。雍熙三年，改副使。端拱元年，参知政事。淳化元年，罢。卒赠工部尚书。沔辩慧苛刻，尚数多诈，视士大夫犹视吏卒，惟以甘言悦人，而进退皆非。物望初与张齐贤同，在枢府不协，及齐贤同参知政事，颇不自安，因王禹偁请中书本厅不得接见宾客，许于政事堂同见，沔喜即奏行，谢泌疏驳而止，上知沔意，因切责罢之。沔冒货，虽亲旧未尝毫末相及，唯声音清畅，上亲试举人，多命近臣读之，所读常得八九。<br /><br />
</td></tr>

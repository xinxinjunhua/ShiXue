<td class="t50">弭德超</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　弭德超，尝给事晋邸。太平兴国中，累擢至酒坊使，尝诬曹彬，彬不辨。八年，擢宣徽北使兼枢密副使，怒王显等居其上，诟之且曰：“我有安社稷功，汝等何人，反在我上！上无执守，为汝辈眩惑。”显等以闻，命鞠得实，削夺官爵，同家属配隶琼州。<br /><br />
</td></tr>

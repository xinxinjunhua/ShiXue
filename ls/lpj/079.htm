<td class="t50">李昌龄</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李昌龄，字天赐，应天府人。太平兴国二年，登进士第，累擢枢密直学士、御史中丞。至道二年，参知政事。真宗即位，为户部侍郎，坐交结中人，贬许州行军司马。昌龄尝知广州，无廉誉，及起废，御史屡弹其宿负，除知梓州，改河阳，又改光州，以秘书监致仕。卒年六十二，子虞卿。<br /><br />
</td></tr>

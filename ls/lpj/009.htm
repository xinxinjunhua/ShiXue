<td class="t50">学舍</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　五代学校不修，学者多各从其师，是以庐山有白鹿洞书院，嵩阳、岳麓亦各有书院，国朝各赐以书籍。大中祥符初，应天府民曹诚即戚同文旧学之地造书舍，诏赐额曰“应天府书院”，命戚纶之子舜宾主之，其后庠序之教兴，而所谓书院者，未之或闻矣。<br /><br />
　　武学，庆历二年置于武成王庙。<br /><br />

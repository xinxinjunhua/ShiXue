<td class="t50">王贻永</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贻永，字秀长。真宗以其故相家，选尚太宗第四女郑国长公主，除右卫将军、驸马都尉。明年主薨，即纳所赐宅。累擢节度使，历宣徽使、同知枢密院事，改副使加同平章事，以疾求罢，听免，兼侍中。至和初，复以疾，丐解职，除右仆射、检校太师兼侍中、邓国公。卒，年七十一，赠太师、中书令，谥康靖。子道卿。贻永为人慎约寡言，无绮纨声色之好，尝知徐州，河决滑台，作堤城南，水至不为患。王曾守南京，表其事，诏褒之。郓州咸平中徙城，而故治为通衢，密迩梁山泺，春夏多病涉。贻永知郓州，相地筑东南道二十余里，至今人获其济。<br /><br />

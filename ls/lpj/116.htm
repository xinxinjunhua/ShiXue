<td class="t50">张逊</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张逊，辽城人。驸马都尉魏咸信同母兄也。事晋邸，即位补殿直，屡加进擢。端拱二年，除宣徽北院使、签书枢密院事。淳化二年，改副使，又加知院事。四年，坐与寇凖不协，罢诸卫将军。卒，年五十六，赠桂州观察使。<br /><br />
</td></tr>

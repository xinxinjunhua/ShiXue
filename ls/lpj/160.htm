<td class="t50">郭承祐</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　郭承祐，字天锡，开封人。娶华王元偁女永定郡主，授供奉官，累擢至建武军节度使。皇祐元年，除宣徽南院使、同群牧制置使，出判应天府，徙亳州。谏官御史劾奏承祐在应天府擅批宣头，留上供粮米及拟翰林所使用器，出入狂僭，落宣徽使。卒，年五十九，赠太尉，谥曰密。子：士逊、士选、士逸、士逵、士达。承祐骄侈狡狯，所至多兴作为烦扰，又好言事，指切人过失，时谓之武谏官。判许州苏舜元为转运使，荐其有将帅才，其政如龚黄，上谓大臣曰：“承祐庸人，而外台荐之，如此，何所取信哉！”<br /><br />

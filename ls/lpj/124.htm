<td class="t50">张宏</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张宏，字巨卿，金州人。太平兴国二年，登进士第，历官以勤干闻。雍熙三年，除枢密副使。四年，与御史中丞赵昌言对易其任。端拱初，复枢密副使。久之，罢。真宗即位，授工部尚书。卒，赠右仆射。子：可久、可道、可度。宏淳谨少廉誉。<br /><br />

<td class="t50">刘平</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘平，字士衡，开封人。景德三年，登进士第，真宗爱其才，将用之，为丁谓所恶，以为平将家子，可委以边事。仁宗即位，章献太后思谓言，乃自侍御史换以衣库使，累擢至步军都指挥使、静康军留后、鄜延路副都总管兼鄜延环庆两路同安抚使，又兼管泾原路兵马。<br /><br />
</td></tr>

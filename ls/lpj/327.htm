<td class="t50">王均</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　军贼王均，神卫指挥都虞候，益州驻札。咸平三年，神卫卒赵延顺以众怨钤辖符昭寿多用亲随仆言，榜棰军人，因马逸喧扰中，杀昭寿及仆，均率众擒延顺及其党，不能获，乃同劫均为帅，知州牛冕出汉州，均遂僭号，建元化顺，自正月叛，奏至，以雷有终知益州，命内臣秦翰同团练使石普、上官正率兵征讨，九月，均败窜，石普、秦翰、杨怀忠追斩于富顺监，枭首州市。<br /><br />
</td></tr>

<tr><td>
<br />
　　◎第10卷 枢密<br /><br />
　　王继英，开封人，少为笔吏。赵普罢相，常从者去，继英奉事愈谨，普复相，以补中书省官。真宗在襄邸，为前导，即位，擢引进使，未几，除宣徽南院使。景德二年，枢密使。三年，薨，年六十一，赠侍中，谥恭懿。<br /><br />

<td class="t50">胥偃</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　胥偃，字安道，潭州长沙人。大中祥符五年，登进士第，屡历外官。景祐初，知制诰，久之，入翰林为学士权知开封。卒，年五十七。子：元衡。其家初有田数十顷，偃既贵，遂以予族人。西边用兵，士卒亲属留京师有犯法抵死者，上不忍使就刑，言者或欲置毒饮中，令得善死，偃力谏止。天下圭田初无月日之限，争者稍众，偃请限水田以四月终，陆田以三月终，因着为令。常与谢绛试中书吏，大臣有私属者，偃不发视其缄牍而焚之，曰：“发而言之，不亦伤刻薄乎！”<br /><br />
</td></tr>

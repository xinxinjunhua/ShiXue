<td class="t50">折御卿</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　折御卿，累世边将，奄有麟府之地，从祖；阮、父：德扆，皆永安军节度，德扆卒，御勲为留后。开宝九年，来朝，授泰宁军节度使，未行，卒，朝廷遂降告敕，授御卿闲庙使，改为崇仪使知府州，以功擢至本州观察使，未几率兵大败戎人于子河汊，除永安军节度使，自是戎虏不敢深入寇，一日虏将韩德臧为李继迁所诱，内侵，方御卿被病，力疾出战，虏将闻其来不敢进，既而疾亟，母令人召归，御卿曰：“世受国恩，虏寇未灭，御卿之罪也。临敌弃士卒而归邪？太夫人勿见念也。”言讫泣下，翌日，卒，年三十八，赠侍中，录其子惟正知留务。<br /><br />

<td class="t50">马仁瑀</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　◎第17卷 武臣<br /><br />
　　马仁瑀，魏郡人。年十六，委质周祖帐下，力挽弓二百斤，世宗命卫士习射苑中，仁瑀独挽强，百发百中，赐锦袍、束带。从世宗亲征刘崇，王师不利，仁瑀谓众曰：“主辱臣死。”因跃马大呼，引弓连毙将卒数十，士气始振，崇遂败。随世宗征淮南，登楚州水寨，飞楼距城百步，城卒诟骂，左右射莫能及，召仁瑀至，应弦而毙。建隆初，以佐命功为刺史，累擢至朔州观察使。卒，年五十。<br /><br />

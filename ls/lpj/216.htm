<td class="t50">陈从易</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　陈从易，字简夫，泉州人。端拱初，登进士第，践历之久，始擢知制诰、谏议大夫，进龙图阁直学士知杭州。卒，年六十。子：绍孙、继孙维孙。所著《泉山集》二十卷、《中书制稿》五卷、《西清奏议》二卷。常与杨大雅同在西掖，俱以文学知名，时谓之“杨陈”。从易，天禧中，坐失举，送宰相，寇准素恶之，遂除知吉州，及准贬道州，从易为湖南转运使，或谓曰：“可忘庐陵之命耶？”准至，从易以故相礼敬之，言者为惭。素与王钦若善，钦若废居雎阳，亲旧畏时相，无敢见者，从易赴河南见之，钦若曰：“无乃为君累乎？”卒留数日而行。<br /><br />

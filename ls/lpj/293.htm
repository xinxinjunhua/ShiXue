<tr><td>
<br />
　　◎第19卷 武臣<br /><br />
　　杨嗣，殿前指挥使信之子，以父任为殿直，数有战功，累擢至深州团练使，以左龙武军大将军致仕，卒，年八十一。子：承宪。淳化二年，嗣知保州，有诏褒其治状。咸平三年，败契丹之众于廉良，除保州刺史，召见，特授团练使，嗣言：“久与杨延昭联事，臣不逮延昭，一旦骤居其上，臣所未安，愿仍旧。”真宗嘉其廉退，并命为团练使，令嗣因持延昭诰与之。<br /><br />

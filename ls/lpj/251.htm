<td class="t50">杨美</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　杨美，字仲和，太原人。仕周至刺史。建隆初，为北海军使。乾德初，征蜀，召委以军政，民诣公车，乞留者数百人，诏遣还不从，笞其为首者，始去。其治尚简易，民爱之如此，莅军亦为众所服。任气好施，俸赐悉以赒亲旧，官至节度使，死之日，家无余财。<br /><br />
</td></tr>

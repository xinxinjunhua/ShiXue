<td class="t50">景泰</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　景泰，字周臣，普州人。天禧三年，登进士第，累官至都官员外郎、知成州。元昊反，有荐泰知兵，召到，换左藏库使、知宁州。泰通判庆州日，常上章言元昊包藏祸心，主将任福无长策，凡三上不报。及元昊寇镇戎军，败葛怀敏，初入攻渭州，泰率兵五千，间道赴援，戮先锋殿直张向逗留而行，遇贼于彭阳西，依山为阵，阴选三百骑为左右翼，张旗帜为疑兵，贼愕视不敢进而遁，士卒请追击，泰止之，搜山果得伏兵，与战，斩首千余级，以功迁西上阁门使，久之，加忠州刺史、秦凤路都总管，卒，年五十八。子：思问、思安、思忠、思立、思谊。<br /><br />
</td></tr>

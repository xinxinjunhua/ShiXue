<td class="t50">姚内斌</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　姚内斌，平州人。少事北虏。周显德末，世宗北征，太祖将兵至瓦桥关，内斌为关使，开门请降，世宗以为汝州刺史。乾德中，改命庆州，十余年戎不敢犯塞，称之为虎。卒，年六十四。<br /><br />

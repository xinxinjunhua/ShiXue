<td class="t50">王回</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王回，字深甫，福州侯官人。常举进士，中第，补卫真县主簿，议邑事不合，移疾自免，久之，大臣荐之朝廷，授以一邑，命下而卒，年四十二。有集二十卷。弟：向，亦以文学知名，善序事，亦早卒。回孝友质直，博学知要，与临川王安石友善，安石谓：“回造次必稽孔子孟轲所为而不为小廉曲谨以求名于世，其学问所得，自汉以来，列儒林者罕及也。”<br /><br />

<td class="t50">苏绅</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　苏绅，字仪甫，泉州人。天禧中，登进士第。初名庆民，避章献太后讳，改今名。官至太常博士，举贤良方正策入等，授祠部员外郎，屡上章，仁宗嘉纳之，擢知制诰、翰林学士。谏官言绅举士马端非其人，改龙图阁学士。丧父服除，复翰林学士，言者又弹其急于进取，改翰林侍读学士知河阳，徙河中府，未行感疾，医者误用药，犹力疾杖之，卒，年四十八。子：颂衮、棁兖。<br /><br />
</td></tr>

<td class="t50">翟守素</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　翟守素，北海人。仕周至刺史。宋兴，累擢商州团练使。卒，年七十一。自汉策名将六十年，以谨厚自持，所至称治。建隆间，麟府内属，戎人争地不决，因扰边民，诏守素驰传以谕曲直，莫不悦服。梅山峒蛮人叛，又诏守素讨平，会阴雨，弓弩筋角解驰，诘朝将接战，而夜削木为弩，迟明，大破其众，焚荡巢穴，贼首包汉汤者，与数郡大吏富民交结，守素获其私书，悉焚之，以安反侧。守素建隆之前，已在高列，而后进多秉节钺，独守素二十年不迁，而能恬不为意。<br /><br />
</td></tr>

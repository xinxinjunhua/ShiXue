<td class="t50">党进</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　党进，朔北戎人。幼为天雄节度使杜重威奴，重威爱其淳谨，虽长，犹令与婢妾杂侍，重威败，周祖得之，以为铁骑都虞候。建隆初，除刺史，以军功累擢至节度使。常总禁旅，不识字，不记兵籍，一日太祖问之，举梃以军司所书兵骑戎器数，请上自视，上益喜其朴直。巡徼京师，见珍禽奇兽，必放之曰：“不养父母，反养此邪？”晋邸命亲吏臂鹰雏，进亟欲放，及知，乃戒之曰：“汝谨养视。”小民传以为笑，其变诈多此类。杜重威之后寒饥，进常分俸以给，士大夫或愧焉。<br /><br />
</td></tr>

<td class="t50">孙何</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　孙何，字汉公，蔡州人。幼嗜学，为文必本经，与丁谓同为王禹偁所题奖，时谓之“孙丁”。淳化三年，举进士，殿试及省闱俱为第一，累擢起居舍人、知制诰。卒，年四十四。性卞急，尝任京西两浙转运使，颇事苛察，然独喜称誉后进，有文集四十卷。子：言，弟：仅。<br /><br />
　　仅，字邻几。咸平初，登进士第，兄弟皆冠天下士，学者荣之，仅复举贤良方正，入等，累擢知制诰、集贤院学士、给事中。卒，年四十九。仅端懿无竞，笃于儒学，士大夫高其履尚。有文集五十卷。子：和。<br /><br />
</td></tr>

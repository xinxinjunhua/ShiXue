<td class="t50">晁宗悫</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　晁宗悫，字世良，其先澶州人。父迥，太子少傅致仕。宗悫以荫补校书郎，屡献所为歌颂。大中祥符中，召试舍人院，赐进士及第。又召试除校勘校理，累擢知制诰，入翰林为学士兼龙图阁直学士。康定元年，参知政事。庆历二年以疾免，除给事中、资政殿学士，卒年五十八，赠工部尚书，谥文庄。子仲蔚。宗悫有词学，当制颇惬人望，事父母至孝，而真笃于故旧，任子恩皆先其族人，在政府，朝廷以金饰胡床及金器赐唃厮啰，宗悫言：“昔，仲叔于奚辞邑而取繁缨，孔子曰：“不如多与之邑。”繁缨，诸侯之马饰，犹不可轻与，况乘舆之器耶！”止。<br /><br />

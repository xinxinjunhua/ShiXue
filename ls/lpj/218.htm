<td class="t50">江休复</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　江休复，字邻几，雍丘人。天圣二年，登进士第，又举书判拔萃中，先因献所著书，特除集贤校理，赴进奏院祠神会落职，久之，复旧，擢修起居注，积官刑部郎中，卒，年五十六。休复外简旷而内行甚饬，事孀姑如母，强学博览，为文典雅，尤工于诗，喜琴弈饮酒，不慕声利，著《唐鉴》十五卷、《春秋世论》三十卷、文集三十卷，又作《神告》一篇，言皇嗣事，以感悟上意，又常言昭宁太后家子孙多流落民间者，因得尽加收录。子：懋简、懋相、懋迪。<br /><br />
</td></tr>

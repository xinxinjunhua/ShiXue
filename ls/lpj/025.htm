<td class="t50">刑罚</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　诸州大辟，旧皆藩臣专决，枉滥者众，时务姑息，不复究问。建隆三年诏，自今郡国断大辟，并录案朱书格律及禁勘月日官典名衔以闻，委刑部覆视。仁宗哀矜庶，狱官失入死罪者，终身不得改官。吏部尝引对选人，韩中正以失入人罪报罢，后刑部引为详断官，上见其奏，谓王钦若曰：“此岂常引对者耶？”钦若对曰：“然。”上曰：“既常用法不当，乃可以为法官乎？”诏劾引用者罪。<br /><br />
　　沈德妃之弟惟恭，乐安郡主之婿张承衍，同管句会灵观，观燔坐黜，惟恭蔡州、承衍汝州，并管库。妃、主交为言，乞留京师，仁宗曰：“已行之命，为贵戚所回，则法徒设矣。”命趣行。<br /><br />

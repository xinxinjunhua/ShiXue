<td class="t50">宋湜</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　宋湜，字持正，京兆人。父：温故，终于补阙，季父：温舒，终于起居郎，皆有时名。湜少孤，以孝闻。太平兴国二年，登进士第，累擢知制诰、翰林学士。咸平元年，枢密副使。从幸澶渊，以疾薨于道，年五十一，赠吏部侍郎。湜秀颍有器识，好学善谈论，尤工笔札，得者珍藏之，善引重后进，有文集二十卷。<br /><br />
</td></tr>

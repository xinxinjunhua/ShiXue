<td class="t50">郭守文</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　郭守文，字国华，太原人。父晖战殁，守文方十四岁，哀毁过人。周擢为东班副使。开宝中，从潘美征岭南，又从曹彬拔金陵，彬遣护李煜赴阙，煜无生意，守文语之曰：“国家止希汉武之开疆，岂责防风之后至也。”煜遂释然。守文以战功，累擢至武州团练使。雍熙四年，除宣徽北院使。端拱元年，出为镇州路都帅，加南院。二年，卒，年五十五。武夫悍卒皆为流涕，守文善抚士卒，所得俸禄，悉以宴犒，死之日，家无余资。先是诸将邀功生事，自岐沟君子馆之败，朝廷患之，以守文知书而沈毅有谋，故自近臣付以边任，上闻其卒，深所嗟惜。<br /><br />
</td></tr>

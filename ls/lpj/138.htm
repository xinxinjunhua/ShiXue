<td class="t50">姜遵</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　姜遵，字从式，淄州人。咸平二年，登进士第，累擢至谏议大夫。天圣六年，枢密副使。八年，薨于位年六十八，赠吏部侍郎。子：延龄、余庆。初，遵为御史，言青州大姓麻士瑶不法事，诏实案诛之。其为吏尚严，而知永兴军，太后诏营浮图，遵毁汉唐以来碑碣代砖甓，躬督成之，因获进用。<br /><br />

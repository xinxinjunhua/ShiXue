<td class="t50">张君平</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张君平，字士衡，磁州人，以父战殁，补三班差使、黔州指挥使。獠寇边，君平领兵设伏夺寨，斩首百余级，迁三班奉职，为施州监押，积官至作坊使，卒。子：造、逊、达。君平有干才，明水利，朝廷议河事必访之，守官汴口，建言请审择口地岁省役渠工百余万，虽役不岁兴，而可免堙塞之患，又请沿河令佐植榆柳万株者书为课，又请以时疏导，宋、陈、宿、亳、蔡、颍、单、滑州沟洫与畿内相接者，以免水患，令州县官吏兼管句沟洫河道，言皆施行。<br /><br />
</td></tr>

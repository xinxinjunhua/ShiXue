<td class="t50">刘筠</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘筠，字子仪，大名人。咸平元年，登进士第，补馆陶县令，代还，诏杨亿试选人校勘太清楼书籍，筠中选第一，累擢知制诰、翰林学士。尝草丁谓、李迪罢相制，既又命筠草制复留谓，筠不奉诏，乃更命晏殊为之。谓方用事，筠遂请治郡，以谏议大夫，知庐州。仁宗即位，复翰林学士，以疾除礼部侍郎、枢密直学士知棣州。天圣五年，复入翰林，加承旨，兼龙图阁待制学士，再知庐州，乃营冢墓，自为志铭刻之。卒，年六十一，子：宗宪。自景德以来，居文翰之任，惟筠与杨亿齐名，号为“杨刘”。筠三典贡举，以策论升降，天下自筠始，其为人不茍合，所著有七集。<br /><br />
</td></tr>

<td class="t50">郭琼</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　郭琼，字国华，幽州庐龙人。少事契丹，迁至都校。后唐明宗朝，挈族来归，授以团练使。晋末，虏陷中原，盗贼蜂起，德光以琼为忻州刺史，即单车赴治，盗畏其威，相与遁去。汉乾祐中，淮人攻密州，以琼帅东路行营，淮人闻之亦亟引避。刘铢守平卢，称疾不朝，隐帝疑其叛，诏琼领兵屯青州，铢将害之，张宴伏兵幕下，琼无惧色，铢亦不敢发，琼徐为言去就祸福，铢遂趋召。周显德中，为齐州防御使，岁饥，出俸以济之，民多自邻境至者，郡人诣阙以言，诏为立碑。宋初，以左卫上将军致仕，卒。琼推贤接物，有士君子之风，所至民怀爱之。<br /><br />
</td></tr>

<td class="t50">都城</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　东京城以宣武军节度使治所建，周世宗命韩通，以近甸丁夫增修。太祖建隆三年，命有司广皇城夸东北隅，按洛阳宫殿图营缮。太宗太平兴国四年，重立京城内外门名二十有五【外城门南薰而次十七，内城门崇明而次八】<br /><br />
　　西京，古洛邑，今与南北京并为别都。<br /><br />
　　南京，景德三年，升应天府建。<br /><br />
　　北京，庆历二年，升太名府建。<br /><br />

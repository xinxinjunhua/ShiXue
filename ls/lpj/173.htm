<td class="t50">扈蒙</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　扈蒙，字日用，范阳人，与从弟载，皆以文学显鄠杜间。有道士鱼又玄，善知人，常谓蒙曰：“君家兄弟，当继典诰命。”其后皆验。蒙仕周已居显。宋兴，亦入翰林为学士，积官至工部尚书。卒，年九十二，赠右仆射。自张昭、窦仪卒，朝廷典故仪制，皆蒙所裁定。博洽长厚，多笑，虽侍上前亦不能自止。<br /><br />

<td class="t50">周莹</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　周莹，左领军卫上将军景之子，少给事晋邸，即位，补殿直，累擢客省使、签书提点宣徽枢密院诸房公事，与内臣刘承圭对领其任，非旧制也，机要事并令关决，枢臣皆不敢专之。咸平初，擢莹宣徽使。三年，兼知枢密院事，承圭同罢提点诸房，是后不复置。莹，五年，罢除节度使、高阳关都帅。屡历藩镇，以畏懦闻。卒，年六十六，赠侍中，谥元惠<br /><br />
</td></tr>

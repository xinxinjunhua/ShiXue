<td class="t50">王彦升</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王彦升，字光烈，本蜀人，后唐平蜀，徙居洛阳。显德末，以散员指挥使从太祖北伐，至陈桥，以军中拥戴而还，彦升先入，杀韩通，太祖怒之，出为唐州刺史，久之，徙原州防御使，卒，年五十八。彦升残忍，在原州，戎人有犯汉法者，会宾客则引而前，以手捽其耳，对众大嚼，沃以卮酒前后，虏中有无耳者，皆彦升所残也，故并塞数年，戎人畏之，无犬吠之惊。<br /><br />
</td></tr>

<td class="t50">慕容德丰</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　慕容德丰，字日新。节度使延钊之子，起家如京使。开宝中，监升州兵，泽国富庶，使多贪冒，德丰独以修洁称，诏褒之，积官至团练使，卒，年五十五。德丰轻财好施，世禄之厚，而家无余赀。<br /><br />

<td class="t50">桑怿</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　桑怿，雍丘人。举进士，不中，移居汝颖间，诸县多盗，自请补耆老，杀获殆尽，其邻因之无盗，京西转运使表其事，授郏县尉，徙渑池，而朝廷特改右班殿直，积官内殿崇班、泾原路兵马都监。<br /><br />

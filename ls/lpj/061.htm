<td class="t50">章得象</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　章得象，字希言，世居泉州，高祖任伪闽建州刺史，因家浦城，母梦登天得玉象，而得象生，既生父梦庭中积象笏如山，因名之曰得象。咸平五年，登进士第，累擢知制诰、翰林学士，加承旨。景祐三年，同知枢密院事。宝元元年，与张士逊同相。庆历五年，以使相判陈州，封邹国公，徙河南府，引疾守司空致仕，卒年七十一，赠太尉、兼侍中，谥文宪。性简重，翰林十二年，怡然自得，居相位八年，亲戚子弟皆抑而不得进。子泽之、介之、廷之、脩之。仁宗常谓得象曰：“先太后临朝，群臣邪正，朕皆默识之，卿独忠清无所附丽，故大用也。”<br /><br />

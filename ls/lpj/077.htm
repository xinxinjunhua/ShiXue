<td class="t50">辛仲甫</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　辛仲甫，字之翰，汾州人。初，从郭崇辟。建隆初，为右补阙，累擢至给事中。雍熙三年，参知政事。淳化二年，罢，以太子少保致仕，迁少傅，卒赠太子太保。子若冲、若愚。仲甫器局沉厚，数按诏狱，多伸雪非辜。尝知彭州，课种柳荫行路，郡人谓之“补阙柳”。奉使契丹，虏主问党进何如人，仲甫曰：“国家异人间出，党进何足言也！”知益州，政尚宽简，民有去思。及大用，自守而已。<br /><br />
</td></tr>

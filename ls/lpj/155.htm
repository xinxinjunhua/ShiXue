<td class="t50">张美</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张美，字玄生，清河人。少为三司小吏。周世宗建节镇宁，美掌郡财赋。即位，累擢左领军卫大将军、三司使。久之，除宣徽南院使，仍领三司使。李筠镇上党，美度其必叛，潜于怀孟多积刍粟。建隆初，美亦以宣徽使，居三司如故。李筠叛，太祖亲征，粮运有备，美有力焉，以功除宁国军节度使，镇同州。五代以来，官给钱民间，长吏十取其一，谓之率分钱，美至同州，官市木，美不受率分钱。宋兴始革其弊，诸郡尚或未悛，既而有诉其事者，皆坐责，而美独免。太宗朝，授美环卫官，因求致仕。卒。<br /><br />

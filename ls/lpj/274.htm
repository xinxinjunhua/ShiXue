<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　◎第18卷 武臣<br /><br />
　　魏丕，字齐物，相州人。少业儒，周世宗镇澶渊，奏为司法参军，后改授武职。太平兴国中，官至刺史，尝对太宗，愿除台省官，上谕之曰：“知卿本儒生，然两省不若刺史俸优也。”屡求退，以左卫大将军致仕。卒，年八十二。丕好为歌诗，有《东亭集》六卷，常咏山鹊，人多诵之。<br /><br />

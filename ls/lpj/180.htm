<td class="t50">邢昺</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　邢昺，字叔明，济阴人。太平兴国初，举九经，廷试日，召升殿讲《易》二卦，又取群经发题，太宗称其精博，擢上第，累擢至右谏议大夫、国子祭酒。咸平二年，初置翰林侍读学士，首以授昺，积官至礼部尚书。卒，年七十九，赠左仆射。国朝旧制，非宗室将相，无省疾、临丧礼，惟昺与郭贽以恩旧，上特临问其疾，为时之荣。昺在东宫及内庭，讲《孝经》、《礼记》者二，《论语》十，《书》十三，《易》、三《诗》、《左传》各一，据经敷释，仍多引时事为喻。世为农家，尤悉民事，上访民间疾苦，必俚语为证。以专经进强为诗，人多传笑之。<br /><br />

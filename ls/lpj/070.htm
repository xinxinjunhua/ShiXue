<tr><td>
<br />
　　◎第06卷 参知政事<br /><br />
　　刘熙古，字义淳，雎阳人。唐仆射仁轨十一代孙。少通经史，避祖讳，不应进士举。后唐长兴中，以三传赐第。太祖领宋州节制，熙古为节度判官；及受禅，累擢至参知政事。求退，授户部尚书致仕，卒年七十四。好学，明阴阳像纬书，虽通显，自奉养若寒素。有《历代纪要》五十卷行于世。子蒙叟。<br /><br />
</td></tr>

<td class="t50">毕士安</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　毕士安，字舜举，代州人，徙居郑州。乾德四年，登进士第，累迁至知制诰、翰林学士。真宗尹京，士安为开封府判官，即位命擢知府，复入翰林为学士，又为侍读学士。景德初，参知政事，逾月拜相。二年，薨于位，年六十八，赠太傅、中书令，谥文简。士安端重有识度，善谈论，所至以公正称，年高目昏，读书不辍。有文集三十卷藏于家。<br /><br />
</td></tr>

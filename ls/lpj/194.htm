<td class="t50">李行简</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李行简，字易从，同州人。少苦学，坐石诵六经常至夜分，虽寒暑不渝，又聚木叶学书，笔法遒劲。举进士，登第，累擢至龙图阁待制。真宗数幸阁，命讲《易》，因访大臣能否，行简必称其所长，人以为长者。仁宗即位，进给事中，以疾求外，知河中府，徙虢州。卒，年七十一。有集二十卷。子：贶阅兢元畹。行简端重，不妄交，一介不取诸人，虽善弈，人莫知者。诸子非冠带莫敢见，聚书万卷，多其自录，人谓之书楼。偶梦绿衣吏持簿至公府，自丁谓而下，皆录其官寿，至行简，云：“官议大夫。”及疾，叹曰“官给事中，已逾分矣！”<br /><br />

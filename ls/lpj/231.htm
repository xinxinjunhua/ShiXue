<td class="t50">代渊</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　代渊，字仲颜，永康军人。天圣二年，登进士第，累迁至太常丞、知益州，田况表其所著《周易旨要》二十卷，朝廷特授祠部员外郎而卒。渊恬于势利，退居青城山二十余年，以著书自适，仕进非所乐也。庆历初，知制诰王拱辰安抚西川，遗书欲起之，托疾不往见。<br /><br />
</td></tr>

<td class="t50">李漙</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李漙，始为三司小吏，太宗论及财赋，必召以问利害，颇纳用之，擢为左侍禁，自是进至宫苑使、团练使。两以赃贬，责授右千牛卫将军致仕，卒，年八十四。子：居简、文仲。景德二年，以漙制置江淮等路盐茶矾税兼发运使，江淮米运至京，旧止二百五十万，至漙遂增至六百余万石，擢为发运副使，高邮军新开湖，风涛多覆舟，漙课官舟还及泗州者，载石积湖中，成两狭岸，其患遂绝，正除发运使，既又进为修玉清昭应宫都监。漙既久颛利权，内恃丁谓为之助，又林特为其姻家，故赃污不法，以及于罪。<br /><br />
</td></tr>

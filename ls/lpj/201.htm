<td class="t50">李仲容</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李仲容，字仪父，济阴人。唐郇王祎十三世孙，祖：涛国，初为兵部尚书。仲容少好学，咸平五年，登进士第，累擢知制诰，时翰林学士员不足，众谓当次补，而不为宰相所喜，乃罢知制诰，为给事中、集贤院学士。久之，除翰林侍读学士兼龙图阁学士，官至户部侍郎。卒，年七十。子：景伦、景贤、景行、景仁。集制草为《冠凤集》十二卷。仲容性质醇易，喜读书，善记问，宾至多命酒笑谈，而不及势利。<br /><br />
</td></tr>

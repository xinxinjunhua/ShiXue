<td class="t50">王继忠</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王继忠，开封人。父为军校，戍边而死，继忠因得补殿直侍，真宗在东宫，得给事左右，即位，累擢至云州观察使。咸平末，契丹入寇，继忠帅定武，出战于望都之北，自以被遇厚恩，力战图报，而服饰稍异，戎人识之，转斗累日，援兵不至，遂陷虏中，初谓已死，赠大同军节度使，录其子怀敏、怀德、怀政，皆加等。景德初，虏俾继忠奏章，道意请修和好，朝廷允其请，戢兵息民，与有力焉，自是朝廷每遣使至，契丹必厚赐之，继忠对使臣必泣下，常附表请召还，上以誓好既定，姑诏谕之，虏王待之益厚，改其姓曰耶律，名曰显忠，又曰宗信，封为吴王。<br /><br />
</td></tr>

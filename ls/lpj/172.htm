<tr><td>
<br />
　　◎第13卷 侍从<br /><br />
　　张昭，字潜夫，河间人，旧名昭远，避汉祖讳，故去其下字。十岁诵书数十万言，及长，经史罔不该洽。仕后唐至中书舍人，在周为兵部尚书。建隆初，迁吏部尚书，未几，以本官致仕，开宝末卒。岭南平，太祖遣就家问献俘之礼，昭卧疾口占，皆有所据，当时服其博记。昭所修有《后唐庄宗实录》及《功臣列传》、《周祖实录》、《续唐湣帝、汉隐帝实录》，又撰《汉六庙谥册乐章》。在晋，为翰林学士，日常与吕琦、崔税集唐义宁终天祐末史，成书二百卷。<br /><br />
</td></tr>

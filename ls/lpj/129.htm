<td class="t50">韩崇训</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　韩崇训，字知礼，节度使重赟之子，以父任为供奉官，累擢四方馆使、枢密都承旨。景德三年，签书枢密院事，求罢，除防御使，求致仕，以本官分司卒。崇训长厚谦畏，未尝忤物。<br /><br />

<td class="t50">贾黯</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贾黯，字直孺，南阳人。庆历六年，登进士第，累擢知制诰、翰林学士、权御史中丞。在翰林，两为学士，两以侍读学士出补郡。卒，年四十四。黯有学少文，修洁无所阿附，仁宗深重之。常知襄州，父疾，请解官就养，未报，乃弃官而归，责郢州，未赴而父卒，服除，亦不复责。权开封府，史额七百人废而复叙者，皆额外补之，黯请叙者须有阙乃补。在西掖，宰相以钱延年为待制，黯不草制故罢。居宪府，与两制合议，请以汉王为皇伯，宰执不从，会大雨水，黯上疏言：“水不润下，以二三大臣阿谀容悦，违背经义，故致此灾变。”黯言事虽不皆切中，然时论称其亮直。<br /><br />
</td></tr>

<td class="t50">呼延赞</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　呼延赞，并人。少为铁骑卒，太祖爱其武力，擢为军校，屡以战功，迁至团练使，卒。赞，忠实有勇，遍体文以赤心杀贼字妻子奴婢同爨皆然，又刺镂于鞍勒器用之上，出入有破阵刀、降魔杵、铁鞭、铁幞头，两角有刃，皆十余斤，乘骓马绛抹额，自谓慕尉迟敬德，常出刺保州，请于上曰：“臣服饰奇异，愿敕郡县清道。”太宗笑而不答。又请绘形郑州灵显王庙，愿统阴兵灭虏。太宗尝谓近臣曰：“赞，服器诡异，朕屡欲诛之，既而亮无他志也。”<br /><br />
</td></tr>

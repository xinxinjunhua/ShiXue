<td class="t50">焦守节</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　焦守节，字秉节，以父彰武军节度使继勲遗奏，补殿直，累擢至四方馆使、荣州刺史，以右神武大将军致仕，卒，年七十六。子：宗说、宗简、宗庆、宗彝、宗谅、宗信。初高溪州蛮寇边，命守节往议攻取，计以为山川阻险，非大军之利，遂招抚之。三司常奏守节监香药榷易院，岁课增八十万，迁阁门副使，真宗谓宰相曰：“以财利羡余迁横行，何以劝边陲效命者！”止命以官苑副使兼通事舍人。常使契丹，馆伴丁求说颇易之，指远山曰：“此黄龙塘也。”应声问曰：“燕然山距此几许？”求说惭，乃加礼焉。黄龙塘，即德光置晋少帝之所。<br /><br />
</td></tr>

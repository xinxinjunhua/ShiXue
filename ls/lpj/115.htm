<td class="t50">杨守一</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　杨守一，字像先。其先洛阳人，唐末徙家宋郑间。初为晋邸涓人，即位累擢至翰林副使。初名守素，上为更其名。与赵镕、柴禹锡、相里勋同告秦王廷美阴谋。端拱元年，除宣徽北院（使）、签书枢密院事。卒，年六十四，赠太尉。<br /><br />

<td class="t50">李用和</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李用和，字审礼，章懿皇后之母弟也。少困穷，刘美得之于民间，奏以为三班奉职。章懿薨，特除礼宾副使，累擢节度使、殿前副都指挥使，以老乞罢军职，除宣徽北院使。庆历五年，改南院，加使相，进检校太尉兼侍中。卒，年六十二，赠太师、中书令，追封陇西郡王。子：珣、璋、琚、琦、瑛、瑊、玮、球、玘。玮尚福康公主。用和起民间，以帝舅位将相，小心避权势，公使钱，正任以上许私用，而用和悉以为军费，不入其家。<br /><br />
</td></tr>

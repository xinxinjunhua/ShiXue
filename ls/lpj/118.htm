<td class="t50">曹璨</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　曹璨，字韬光，彬之长子，以荫补供奉官，累擢至忠武军节度使，殿前都指挥使。在禁卫十余年，以疾除河阳节度使，加平章事，制入而卒，年七十，赠中书令。璨质厚寡言，父为上将，璨常从行，彬以为类己，特钟爱之，征讨得与计议，太祖知之，特授宫苑副使。太宗朝，为镇定钤辖，屡战有功，诸将多欲追奔，璨曰：“戎人多变！”力止之。璨习韬略，好读《左氏春秋》，善抚士卒，兼著威爱，居家以孝谨称，虽轻财不逮其父，而和厚亦有父风。<br /><br />
</td></tr>

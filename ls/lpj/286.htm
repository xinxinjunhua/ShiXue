<td class="t50">李重贵</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李重贵，河阳人。常给事晋邸，及即位，累擢至卫州团练使。淳化中，遣将五路讨贼，迁重贵帅麟府，得对，因言：“贼居沙碛，逐水草，无定止，闻兵势盛则远遁矣，追之，或粮不能继，欲守，又彼无坚垒，若未能平贼，将何颜以见陛下也？”太宗虽善其言，以师期既定，强遣之，卒无功而还。咸平三年，戎人入寇，范廷召战退，康保裔陷贼，独重贵与张凝力战却贼，全军以归，凝议上功状，重贵曰：“大将陷殁，我辈计功，是诚何心？”真宗闻而嘉叹，特加阶邑，以疾求致仕，授左羽大将军，卒，年五十九。<br /><br />

<td class="t50">孟元</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　孟元，字善长，洺州人。少隶禁兵，以挽强补殿侍，累擢至眉州防御使，卒，年六十，赠观察使。子：防、随。王则据贝州叛，元为真定府路钤辖，领兵攻讨，被数十枪，又中飞石坠壕中，既出，益锐，更募敢死士田永济渠穴地以进，贼平，进右骐骥使，御史中丞郭劝言赏未当，功擢普州刺史。知沧州，其民以盐为生，岁歉，商贾不行，元度军食之余，以谷易盐，民赖以济。元虽出行伍，好读书，流辈鲜及。<br /><br />
</td></tr>

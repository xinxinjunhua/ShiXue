<td class="t50">阎守恭</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　阎守恭，并州人，继元败，徙其民于大名府，因家焉。少负贩并、汾间，闻郭进被人主优遇，慨然曰：“使进不遇，亦一行伍耳！吾顾不能逮邪！”乃应募，隶拱圣军，累以战功擢德州刺史、并代路钤辖。卒，年七十五。子：继恩。守恭既仕宦，见士大夫，必访郭进平日所行以为法，其慕之如此，故驭军严饬，所得俸赐，悉以散施，虽居家如对宾客。<br /><br />
</td></tr>

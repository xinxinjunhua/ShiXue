<td class="t50">安俊</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　安俊，字智周，其先太原人，以儒家子得给事资善堂。仁宗即位，补殿直，累擢至步军都虞候、陵州防御使。卒，年六十四，赠观察使。子：介、愈、弇、合。俊历边任，有威名战功，家藏书数千卷，婚姻多择士人，常曰：“吾家集坐，有文士过半，平生足矣！”<br /><br />

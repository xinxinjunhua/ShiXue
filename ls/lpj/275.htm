<td class="t50">安守忠</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　安守忠，字信臣。父：审琦，为周节度使，封陈王，《五代史》有传。守忠以父任，仕周至鞍辔库使兼刺史。乾德中，蜀平，以守忠任汉州刺史，每遣使必戒之曰：“安守忠能律己，汝辈当效其为人。”至道中，擢为节度观察留后，久之，卒，年六十九，赠太尉。尝判雄州，方宴宾，阍吏言有军校谋变，守忠笑顾坐客曰：“此辈酒狂耳！”计未及发而就擒焉，人服其能镇物。<br /><br />

<tr><td class="jz">

</td></tr>
<tr><td>
<br />
　　楚昭辅，字拱辰，雎阳人。初太祖建节，尝召左右。建隆初，擢军器库使。开宝六年，枢密副使。九年，枢密使。太平兴国六年，以疾罢为右卫上将军，卒年六十九。<br /><br />

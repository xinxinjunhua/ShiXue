<td class="t50">贺惟忠</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贺惟忠，沂州人。初隶周世宗藩邸，召补供奉官，不辞而去，世宗怒，及即位，不复用。宋兴，擢仪鸾副使、知易州，以功就迁本州刺史。知书，晓兵法，抚士卒能得其心，乘障用兵，所向无敌。在易州十余年，契丹不敢南牧。及卒，以其子昭庆为供奉官。<br /><br />
</td></tr>

<td class="t50">王信</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王信，字公亮，太原人。初应募潞州军籍，常生擒七十贼，以功补龙卫指挥使，迁都虞候。刘平、石元孙三川之败，信独以所部兵获数千级。知保安军，以二千兵破西贼数万众。为高阳副都总管，明镐奏充恩州四面都总管，贼党三百余人，鼓噪而出，信悉捕戮之，擢留后，召为步军副都指挥使，卒，年六十一。子：继恩。信持重用兵，未常沮衄。<br /><br />
</td></tr>

<td class="t50">陈进</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　军贼陈进，宜州澄海军校。景德四年，因众怨知宜州刘永规苛役，杀永规及监押国钧据城叛，劫判官卢成均为帅，诏东上阁门使曹利用安抚广南路，率兵进讨，九月遇贼于象州仙县，击败之，袭至象州，斩陈进及其党，而卢成均挈家属以降，时象州城守四十日矣，擢知州大理寺丞何邴祠部员外郎，三子皆赐出身，以守城功也。<br /><br />
</td></tr>

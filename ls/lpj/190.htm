<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　◎第14卷 侍从<br /><br />
　　乐黄目，字公礼，抚州宜黄人。父：史，字子正，母梦许真人令吞五色珠而生史。史有文辞，初仕江南，归朝，再举进士，登甲科。所至不修谨获谴。官至职方员外郎、直史馆，卒，有杂编六百九十余卷，自为文百卷，谓之《仙洞集》。黄目，淳化中，登进士第，深沈为吏，以静胜，饰以文雅。累擢知制诰、给事中，卒，有文集五十卷，杂编六十卷。常与父史同在儒馆，人以为荣。子：理国、定国。<br /><br />

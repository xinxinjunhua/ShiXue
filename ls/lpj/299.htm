<td class="t50">张纶</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张纶，字公信，棣州人。淳化中，举进士，不中，补奉职，累擢至乾州刺史、知颖州。卒，年七十五。子：孝先、绍先。辰州溪峒蛮寇边，以纶知辰州，筑蓬山驿路，贼不得通方遁去，又修新兴寨。天禧五年，为江淮发运使，增米八十万，复置监场于杭秀海州，增岁课百五十万，疏五渠，导太湖入于海，复租米六十万，开长芦西河以避覆舟之患，筑高邮北漕河堤二百里，旁锢以巨石，为十闼以泄横流，又修复泰州捍海堰，因命兼权知泰州，堰城，复逋户三千六百，州民为立生祠。<br /><br />
</td></tr>

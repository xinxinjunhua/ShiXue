<td class="t50">李端懿</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李端懿，字元伯，万寿公主子也。七岁授如京使，积官至镇潼军节度观察留后，十年不迁，仁宗特授以节制，御史中丞韩绛以谓非功不当除，端懿亦辞不拜。知澶州，卒年四十八，赠节度使，其弟援例，册赠侍中，端懿和厚，多读书，喜宾客，所与游从，皆时之贤士大夫。子询、諲、訢。<br /><br />
</td></tr>

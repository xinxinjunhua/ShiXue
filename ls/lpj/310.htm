<td class="t50">马遂</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　马遂，开封人。初补散职，为北京指挥使，闻王则叛，中夜叱咤，晨兴，诣留守贾昌朝，请与行阵，命持榜招降，则盛服见之，与坐，遂谕以祸福，则不答，遂扼其喉，击之流血，贼徒骁捷卒石庆断其一臂，遂诟之曰：“妖贼！吾恨不斩汝万段！”即被害，时张得一侍贼侧。上闻遂死，深嗟惜之，赠遂宫苑使，五子并赐官。得石庆，付其子，使剖心祭遂。<br /><br />
</td></tr>

<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　建隆元年版籍之数，州百一十一，县六百三十八，户九十六万七千三百五十三。<br /><br />
　　开宝九年，州二百九十七，县一千八十六，户二百五十万八千九百六十五。<br /><br />
　　至道三年，户四百五十一万四千二百五十七。<br /><br />
　　大中祥符八年，户八百四十二万二千四百三，口一千八百八十万一千九百三十。夏秋税钱帛粮斛二千二百七十六万四千一百三十三，丝绵禾草二千二百八十三万六千六百三十六，茶盐酒税钱帛金银二千八百万二千。<br /><br />
　　宝元元年，户一千一十一万四千二百九十。<br /><br />

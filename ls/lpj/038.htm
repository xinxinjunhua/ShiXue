<td class="t50">卢多逊</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　卢多逊，怀州人。父亿，有操行，仕至少府监。周显德末，登进士第。开宝中，累擢参知政事。九年拜相。多逊博涉经史，善伺人主意，太祖每遣取书，多逊伺知，即通夕阅视，诘朝问书中事，应答无滞，上益宠，待为翰林学士，时屡于上前毁赵普，及在相位，普之子及其亲属多为所抑。普再相，廉知多逊，常遣亲吏交通秦王廷美，因发其事，追削官爵，并其家配崖州。卒于配所。初王祐知制诰，多逊欲祐协力挤普。一日祐以宇文融排张说事示之，怒出祐知华州。及多逊败，士大夫服祐有明识。<br /><br />
</td></tr>

<td class="t50">杨砺</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　杨砺，京兆人。曾祖：守，为唐使相，乃宦者复恭之养子。砺，建隆间登进士第。真宗在藩邸，尝为记室。即位擢给事中、翰林学士。咸平元年，枢密副使。二年，薨于位，年六十九，赠兵部尚书。砺，周显德中初应举，尝夜梦见一人，衣冠甚古，自称征君，谓砺曰：“汝能从吾游乎？”砺随往，顷之，睹宫卫严邃，俄升大殿，见一南面而坐者，征君指之曰：“此来和天尊，汝异日事之。”砺再拜而退；及为记室，谒襄邸还，谓其子曰：“今日见襄王，正昔所见来和天尊也。”砺为文无师法，诏诰迂怪，见者咍之。<br /><br />

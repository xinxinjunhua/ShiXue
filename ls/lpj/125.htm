<td class="t50">夏侯峤</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　夏侯峤，字峻极，济州人。太平兴国初，登进士第。真宗在藩邸，为翊善。尹开封，为推官。东宫建，为太子中舍。即位，除给事中，居数月，擢枢密副使。咸平元年，罢，为户部侍郎、翰林侍读学士兼秘书监。卒年七十四，赠兵部尚书。峤慕道，以养生为务，喜诵庄老书，淳谨无过，有文集十五卷。<br /><br />
</td></tr>

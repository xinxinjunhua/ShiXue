<td class="t50">留福</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　留福，徐州人。屡有战功。开宝间，以观察使判雄州，凡五年，政尚平易，民甚便之，诣阙借留，诏为立遗爱碑。卒，赠节度使。福既贵，诸子欲治第，福怒曰：“我受厚禄矣，足以庇汝曹！平日以身许国，犹未有尺寸效，更欲居大第为自安计邪？”太宗闻而喜之。其卒也，赐金五千两，市第恤其家。<br /><br />
</td></tr>

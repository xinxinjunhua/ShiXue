<td class="t50">赵赞</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　赵赞，字元辅，幽蓟人。父：延寿，尚后唐明宗公主，《五代史》有传。赞，七岁应神童，明宗赐童子及第，附长兴春榜。延寿守上党，并其父德钧皆陷虏中，赞独与母在洛阳，晋祖由鲁援立，命赞奉母北归，赞在晋末受虏伪河中节度使，虏北归，得留镇河中。汉祖起晋阳，赞因劝进改京兆尹。周世宗征淮南，留赞与诸将围寿阳，诸将皆败，赞独有功，及移军，尺椽片瓦无弃者。淮南平，赞功居多。乾德初，授晋州刺史兼建隆军节度使。太宗即位，来朝而卒，赠侍中。赞喜读书，接人以礼，才长于御众，所至吏民畏服。<br /><br />
</td></tr>

<td class="t50">张唐卿</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张唐卿，字希元，青州人。有辞学履行，景祐元年，登进士甲科，通判陕州。民母再适人而死，及葬，其子盗以归，与父同葬，有司请论如法，唐卿权郡事，曰：“是知有孝，不知有法耳。”释之而闻于上，闻者莫不嘉之，以父忧瘠，呕血而卒，年二十八，无子。<br /><br />
</td></tr>

<td class="t50">田重进</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　田重进，范阳人。周显德中，应募为卒，隶太祖麾下，积战功至刺史。太宗即位，累擢除节度使，领飞狐路都帅，破虏众，获其骁将大鹏翼并契丹游渤海三千余人，斩首数千级，逐北四十里，下飞狐灵丘数城，以功改镇彰化军、京兆尹。卒，年六十九，赠侍中。太宗在藩邸，爱其忠勇，尝遗以酒炙，不受，使者曰：“晋王赐，何敢拒！”曰：“我知有天子，不知晋王何人也。”太宗益嘉其无私交。<br /><br />

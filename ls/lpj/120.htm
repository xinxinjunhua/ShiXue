<td class="t50">曹仪</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　曹仪，字搢臣，以祖荫补右班殿直，累擢至耀州观察使。卒年五十五，赠节度使。子：诒、谒、谈。初仪知邠州，有告弓箭手都校李文扆将叛者，朝廷命仪察之，文扆习知蕃汉事，边人多畏服，其后帅府以为腹心，季父玮在邠，亦所委用，仪明其不反，益信任之，边人莫不感悦。仪尝以上军都虞候，为泾原副总管。景祐元年，皇后受册，乃请解军职，而易廉车之任。<br /><br />
</td></tr>

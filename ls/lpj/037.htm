<td class="t50">沈伦</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　沈伦，字顺宜，陈留人。名上一字，避太宗旧名，去之。太祖初，除同州节制，辟在幕府，属改命，皆从焉。及即位，擢枢密副使。开宝六年拜相，太平兴国四年罢。卒，谥恭惠。平蜀日，伦为计度制置使，诸将以贿败，伦归箧中唯图书数卷。在相位自守而已。<br /><br />
</td></tr>

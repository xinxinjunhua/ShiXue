<tr><td class="t50">巡逻军</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　仁宗皇庆元年三月，丞相铁木迭儿奏：“每岁既幸上京，于各宿卫中留卫士三百七十人，以备巡逻，今岁多盗贼，宜增百人，以严守御。”制可。仍命枢密与中书分领之。<br /><br />
　　延祐七年五月，诏留守司及虎贲司官，亲率众于夜巡逻。<br /><br />

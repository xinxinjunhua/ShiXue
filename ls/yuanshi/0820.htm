<tr><td class="t50">隆福宫前河</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　隆福宫前河，其水与太液池通。<br /><br />
　　英宗至治二年五月，奉敕云：“昔在世祖时，金水河濯手有禁，今则洗马者有之。比至秋疏涤，禁诸人毋得污秽。”于<br /><br />
　　是会计修浚，三年四月兴工，五月工毕，凡役军八百，为工五千六百三十五。<br /><br />

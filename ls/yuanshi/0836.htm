<tr><td class="t50">滏河</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　滏河者，引滏水以通洺州城濠者也。<br /><br />
　　至元五年十月，洺磁路言：“洺州城中，井泉咸苦，居民食用，多作疾，且死者众。请疏涤旧渠，置坝闸，引滏水分灌洺州城濠，以济民用。计会河渠东西长九百步，阔六尺，深三尺，二尺为工，役工四百七十五，民自备用器，岁二次放闸，且不妨漕事。”中书省准其言。<br /><br />

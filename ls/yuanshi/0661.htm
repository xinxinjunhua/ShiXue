<tr><td class="t50">韩因传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　韩因，字可宗，汴梁人。少习举子业，负气不群。<br /><br />
　　盗据汝宁，官军讨之，久不下。会朝廷诏赦叛逆，募可持诏入贼者，即借以官。因应命，乃借因以唐州判官，使焉。贼渠恐其党心摇，导因止于外，纳诏不读，诘问再三，因答以“恩宥宽大，祸福所系”，甚切。不听，乃纵因归报。因出，乘马周贼屯，大言曰：“汝辈好百姓，何不出降归田里，而甘从逆贼驱使耶！”众愕眙相顾。<br /><br />
　　或以告贼渠，渠追因，责其所言。因极口肆詈，贼怒，寸割因。<br /><br />

<td class="t50">孛儿速传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　孛儿速，脱脱忒氏。世祖时直宿卫，扈驾征哈剌章还，帝驻跸高阜，见河北有驾舟而来者，顾谓左右曰：“是贼也，奈何？”孛儿速进曰：“臣请御之。”即解衣径渡，挥戈刺死舟尾二人，拏其舟就岸，舟中之人仓惶失措，帝命左右悉擒之。哈剌章平，以功论赏。<br /><br />
　　子答答呵儿，从征孛可有功，由宿卫升武德将军、揭只揭烈温千户所达鲁花赤。从征叛王乃颜、也不干等，奋戈击死数人，擒也不干，收其所管钦察之民。<br /><br />
　　武宗时，进怀远大将军、元帅，卒。<br /><br />

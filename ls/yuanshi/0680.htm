<tr><td class="t50">桂完泽传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　桂完泽者，永嘉人。尝从江西左丞李朵儿留京师，得为平江路管军镇抚，为仇家所诉，免官。会贼攻昱岭关，行省遂假前官，令从征。<br /><br />
　　完泽勇于讨贼，凡再战关下，皆胜。寻又与贼斗，为所执，其妻弟金德亦被擒，皆反缚于树，临以白刃，胁之降。金德意未决，完泽呼曰：“金舅，男子汉即死，不可听贼。”德曰：“此言最是。”因大骂。<br /><br />
　　贼怒，剖二人之腹而死。<br /><br />

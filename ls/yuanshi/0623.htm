<tr><td class="t50">李孝光传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　李孝光，字季和，温州乐清人。少博学，笃志复古，隐居雁荡山五峰下，四方之士，远来受学，名誉日闻，泰不华以师事之，南行台监察御史阖辞屡荐居馆阁。<br /><br />
　　至正七年，诏征隐士，以秘书监著作郎召，与完者图、执礼哈琅、董立同应诏赴京师，见帝于宣文阁，进《孝经图说》，帝大悦，赐上尊。明年，升文林郎、秘书监丞。卒于官，年五十三。<br /><br />
　　孝光以文章负名当世，其文一取法古人，而不趋世尚，非先秦、两汉语，弗以措辞。有文集二十卷。<br /><br />

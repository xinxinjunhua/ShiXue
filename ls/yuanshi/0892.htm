<tr><td class="t50">郡县宣圣庙</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　中统二年夏六月，诏宣圣庙及所在书院有司，岁时致祭，月朔释奠。<br /><br />
　　八月丁酉，命开平守臣释奠于宣圣庙。成宗即位，诏曲阜林庙，上都、大都诸路府州县邑庙学、书院，赡学土地及贡士庄田，以供春秋二丁、朔望祭祀，修完庙宇。自是天下郡邑庙学，无不完葺，释奠悉如旧仪。<br /><br />
</td></tr>

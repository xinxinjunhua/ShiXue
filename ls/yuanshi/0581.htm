<tr><td class="t50">王逊志传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王逊志，字文敏，恽之曾孙也。以荫授侍仪司通事舍人，历隰州判官、大宁县尹，擢陕西行台监察御史，累迁佥汉中、河西、山北三道肃政廉访司事，入为工部员外郎，迁礼部郎中，拜监察御史。劾詹事不兰奚、平章宜童皆逆臣子孙，当屏诸遐裔。除太府少监，出为江西廉访副使，召佥太常礼仪院事。<br /><br />
　　京城不守，公卿争出降，逊志独家居，衣冠而坐。<br /><br />
　　其友中政院判官王翼来告曰：“新朝宽大，不惟不死，且仍与官，盍出诣官自言状。”<br /><br />
　　逊志艴然斥之曰：“君既自不忠，又诱人为不义耶！”因戒其子曰；“汝谨继吾宗。”即自投井中死。<br /><br />

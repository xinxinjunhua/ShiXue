<tr><td class="t50">镇遏军</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　仁宗延祐元年闰三月，枢密院官奏：“中书省言，江浙春运粮八十三万六千二百六十石，取日开洋，前来直沽，请预差军人镇遏。”诏依年例，调军一千名，命右卫副都指挥使伯颜往镇遏之。<br /><br />
　　三年四月，海运至直沽，枢密院官奏：“今岁军数不敷，乞调军士五百人巡镇。”从之。七年四月，调海运镇遏军一千人，如旧制。<br /><br />

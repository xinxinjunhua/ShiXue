<tr><td class="t50">张桓传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　张桓，字彦威，真定藁城人。父木，知汝宁府，因家焉。桓以国子生释褐，授滑之白马丞，入补中书掾，擢国子典簿。拜陕西行台监察御史，以言事不合去。未几，汝宁盗起，桓避之确山。贼久知桓名，袭获之，罗拜请为帅，弗听。囚六日，拥至渠魁前，桓直趋据榻坐，与之抗论逆顺。其徒捽桓起跪，桓仰天大呼，詈叱弥厉，且屡唾贼面。贼犹不忍杀，谓桓曰：“汝但一揖，亦恕汝死。”桓瞋目曰：“吾恨不能手斩逆首，肯听汝诱胁而折腰哉！”贼知终不可屈，遂刺之。年四十八。<br /><br />
　　贼后语人曰：“张御史真铁汉，害之可惜！”<br /><br />
　　事闻，赠礼部尚书，谥忠洁。<br /><br />

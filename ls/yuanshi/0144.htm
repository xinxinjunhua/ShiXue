<td class="t50">阿术鲁传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　阿术鲁，蒙古氏。<br /><br />
　　太祖时，命同饮班朱尼河之水，扈驾亲征有功，命领兵收附辽东女直，还，赏金甲、珠衣、宝带，他物称是。复命总兵征西夏，与敌兵大战于合剌合察儿之地。西夏势蹙，其主惧，乞降，执之以献，太宗杀之，赐以所籍赀产。继领兵收附信安，下金二十余城。<br /><br />
　　其后告老，诸王塔察儿命其子不花代领其军。<br /><br />

<tr><td class="t50">暹国传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　暹国，当成宗元贞元年，进金字表，欲朝廷遣使至其国。比其表至，已先遣使，盖彼未之知也。赐来使素金符佩之，使急追诏使同往。以暹人与麻里予儿旧相仇杀，至是皆归顺，有旨谕暹人“勿伤麻里予儿，以践尔言”。<br /><br />
　　大德三年，暹国主上言，其父在位时，朝廷尝赐鞍辔、白马及金缕衣，乞循旧例以赐。帝以丞相完泽答剌罕言“彼小国而赐以马，恐其邻忻都辈讥议朝廷”，仍赐金缕衣，不赐以马。<br /><br />

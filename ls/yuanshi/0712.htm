<tr><td class="t50">奸臣传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　古之为史者，善恶备书，所以示劝惩也。故孔子修《春秋》，于乱臣贼子之事，无不具载，而楚之史名《梼杌》，皆以戒夫为恶者，使知所惧而不敢肆焉。后世作史者，有酷吏、佞幸、奸臣、叛逆之传，良有以也。<br /><br />
　　元之旧史，往往详于记善，略于惩恶，是盖当时史臣有所忌讳，而不敢直书之尔。然奸巧之徒，挟其才术，以取富贵、窃威福，始则毒民误国而终至于殒身亡家者，其行事之概，亦或散见于实录编年之中，犹有《春秋》之意存焉。谨撮其尤彰著者，汇次而书之，作《奸臣传》，以为世鉴。而叛逆之臣，亦各以类附见云。<br /><br />
</td></tr>

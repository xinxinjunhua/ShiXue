<tr><td class="t50">卢沟河</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　卢沟河，其源出于代地，名曰小黄河，以流浊故也。自奉圣州界流入宛平县境，至都城四十里东麻谷，分为二派。<br /><br />
　　太宗七年岁乙未八月敕：“近刘冲禄言：‘率水工二百余人，已依期筑闭卢沟河元破牙梳口，若不修堤固护，恐不时涨水冲坏，或贪利之人盗决溉灌，请令禁之。’刘冲禄可就主领，毋致冲塌盗决，犯者以违制论，徒二年，决杖七十。如遇修筑时，所用丁夫器具，应差处调发之。其旧有水手人夫内，五十人差官存留不妨。已委管领，常切巡视体究，岁一交番，所司有不应副者罪之。”<br /><br />

<tr><td class="t50">郡县三皇庙</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　元贞元年，初命郡县通祀三皇，如宣圣释奠礼。太皞伏羲氏以勾芒氏之神配，炎帝神农氏以祝融氏之神配，轩辕黄帝氏以风后氏、力牧氏之神配。黄帝臣俞跗以下十人，姓名载于医书者，从祀两庑。<br /><br />
　　有司岁春秋二季行事，而以医师主之。<br /><br />
</td></tr>

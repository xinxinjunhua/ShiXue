<tr><td class="t50">平反</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　诸官吏平反冤狱，应赏者，从有司保勘，廉访司体覆，而后议之。其有冒滥不实者，罪及保勘体覆官吏。<br /><br />
　　诸路府军民长官，因收捕反叛，辄罗织平民，强奸室女，杀虏人口财产，并覆人之家，其同僚能理平民之冤，正犯人之罪，归其俘虏，活其死命者，于本官上优升一等迁用。凡职官能平反重刑一起以上，升等同。<br /><br />
　　诸职官能平反冤狱一起之上，与减一资。<br /><br />
　　诸路府曹吏，能平反冤狱者，于各道宣慰司部令史补用。<br /><br />
</td></tr>

<tr><td class="t50">功臣祠</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　功臣之祠，惟故淮安忠武王立庙于杭，春秋二仲月次戊，祀以少牢，用笾豆簠簋，行酌献礼。若魏国文正公许衡庙在大名，顺德忠献王哈剌哈孙庙在顺德、武昌者，皆岁时致祭。<br /><br />
　　自古帝王而下，祭器不用笾豆簠簋，仪非酌奠者，有司便服行礼，三上香奠酒而已。<br /><br />

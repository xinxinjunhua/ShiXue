<td class="t50">麦里传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　麦里，彻兀台氏。祖雪里坚那颜，从太祖与王罕战，同饮班真河水，以功授千户，领彻里台部，征讨诸国，卒于河西。父麦吉袭职，从太宗定中原，以疾卒。麦里袭职，从定宗略定钦察、阿速、斡鲁思诸国。从宪宗伐宋，有功。<br /><br />
　　世祖即位，诸王霍忽叛，掠河西诸城。麦里以为帝初即位，而王为首乱，此不可长，与其弟桑忽答儿率所部击之，一月八战，夺其所掠扎剌亦儿、脱脱怜诸部民以还。已而桑忽答儿为霍忽所杀，帝闻而怜之，遣使者以银钞羊马迎致麦里，赐号曰答剌罕，寻卒。<br /><br />
　　子秃忽鲁。<br /><br />

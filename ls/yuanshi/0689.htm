<tr><td class="t50">卜理牙敦传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　卜理牙敦，北庭人，累官至山南廉访使，治中兴。中兴为江汉藩屏，卜理牙敦每按临所部，威惠翕然。<br /><br />
　　至正十二年，寇犯中兴，卜理牙敦以兵与抗，射贼多死，贼稍退。明日，复拥众来袭东门，卜理牙敦力与之战，被执，不屈而死。<br /><br />
　　又明日，贼复来攻，前中兴判官上都统兵出击之。既而东门失守，上都仓黄反斗，力屈，贼执之使降，上都大骂，贼怒，刳其腹、刲其肉而死。<br /><br />

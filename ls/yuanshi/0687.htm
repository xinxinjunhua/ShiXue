<tr><td class="t50">野峻台传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　野峻台，其父世延，自有传。由四川行省左右司郎中、西行台监察御史、河西廉访使转黄州路总管。湖广既陷，朝廷察其材，升四川行省参政，命与平章咬住讨贼。咬住军五千，及分锐卒八百，使野峻台为前驱。贼方据巴东县，攻拔之。<br /><br />
　　是时，归、峡等州皆为贼所守，野峻台破贼江上，斩溺无算，已而归、峡平。又进拔枝江、松滋两县，乘胜趋江陵。贼出阵清水门，鏖战至夕，贼退入城，乃据其门，俟咬住军至。黎明，贼出战，三时顷，咬住军止百步外，不救，贼飞枪刺之，遂死。<br /><br />
　　事闻，赠荣禄大夫、陕西行省平章政事、柱国，追封凉国公，谥忠壮。<br /><br />

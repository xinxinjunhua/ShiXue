<td class="t50">术赤传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　术赤者，太祖长子也。<br /><br />
　　国初，以亲王分封西北。其地极远，去京师数万里，驿骑急行二百余日，方达京师，以故其地郡邑风俗皆莫得而详焉。术赤薨，子拔都嗣。拔都薨，弟撒里答嗣。撒里答薨，弟忙哥帖木儿嗣。忙哥帖木儿薨，弟脱脱忙哥嗣。脱脱忙哥薨，弟脱脱嗣。脱脱薨，弟伯忽嗣。伯忽薨，弟月即别嗣。<br /><br />
　　至元二年，月即别遣使来求分地岁赐，以赈给军站，京师元无所领府治。<br /><br />
　　三年，中书请置总管府，给正三品印。<br /><br />
　　至大元年，月即别薨，子札尼别嗣。其位下旧赐平阳、晋州、永州分地，岁赋中统钞二千四百锭，自至元五年己卯岁始给之。<br /><br />

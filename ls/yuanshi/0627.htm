<tr><td class="t50">良吏传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　自古国家上有宽厚之君，然后为政者得以尽其爱民之术，而良吏兴焉。班固有曰：“汉兴，与民休息，凡事简易，禁罔疏阔，以宽厚清静为天下先，故文、景以后，循吏辈出。”其言盖识当时之治体矣。<br /><br />
　　元初风气质实，与汉初相似。世祖始立各道劝农使，又用五事课守令，以劝农系其衔。故当是时，良吏班班可见，亦宽厚之效也。然自中世以后，循良之政，史氏缺于纪载。今据其事迹之可取者，作《良吏传》。<br /><br />
</td></tr>

<tr><td class="t50">萧景茂传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　萧景茂，漳州龙溪人也。性刚直孝友。家贫力农。<br /><br />
　　重改至元四年，南胜县民李智甫作乱，掠龙溪。景茂与兄佑集乡丁拒之，据观音山桥险，与贼战。众败，景茂被执。贼胁使从己，景茂骂曰：“狗盗！我生为大元民，死作隔洲鬼，岂从汝为逆耶！”隔洲，其所居里也。贼怒，缚景茂于树，脔其肉，使自啖。景茂益愤骂，贼遂以刀决其口，至耳傍，景茂骂不绝声而死。<br /><br />
　　有司上其事，朝廷命褒表之，仍给钱以葬。<br /><br />

<tr><td class="t50">郑义传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　郑义，河间人也。初，事太宗，佩金符，山东路都元帅，兼景州军民人匠长官。<br /><br />
　　从伐金，岁壬辰，与敌战于归德，死之。弟德温袭。甲午，从攻徐州，陷阵而死。子泽袭。从万户史天泽出征，多立战功。年老，弟江代其职。世祖北征，赐金符，授侍卫亲军副都指挥使，判武卫军事，兼景州军民人匠长官。<br /><br />
　　中统三年，李璮据济南叛，世祖令各州县长官子弟充千户，于是以江子郇为千户，领景州新签军千余，败贼众于王马桥，诸王哈必赤赏银五十两。璮平，郇以例罢。江升为武卫亲军都指挥使，赐虎符，寻改属左卫。<br /><br />
　　至元八年，从攻襄阳，殁于阵，郇袭其职。<br /><br />

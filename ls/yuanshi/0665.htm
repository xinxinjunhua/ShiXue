<tr><td class="t50">王士元传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　王士元，字尧佐，恩州人。<br /><br />
　　泰定四年进士，由棣州判官累迁知磁州。值军兴，馈饷需索日繁，民不堪命。士元心念其民，力为区画，至为将士陵辱诃责，弗避也。改知浚州。州滨黄河，尝经盗贼，城堞不完，市井空荒，士元邑邑不得志，而临事未尝易其素。<br /><br />
　　至正十七年，贼复迫浚州，州兵悉溃散，士元坐堂上，顾其子致微使避贼，曰：“吾守臣，居此，职也。若可逃生。”子侍立，不忍去。贼前问曰：“尔为谁？”士元叱曰：“我王知州也。强贼识我否？”贼欲缚士元，士元奋拳殴贼，贼怒，并其子杀之。<br /><br />

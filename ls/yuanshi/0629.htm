<tr><td class="t50">许维祯传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　许维祯，字周卿，遂州人。<br /><br />
　　至元十五年，为淮安总管府判官。属县盐城及丁溪场，有二虎为害，维祯默祷于神祠，一虎去，一虎死祠前。境内旱蝗，维祯祷而雨，蝗亦息。<br /><br />
　　是年冬，无雪，父老言于维祯曰：“冬无雪，民多疾，奈何！”维祯曰；“吾当为尔祷。”已而雪深三尺。朝廷闻其事，方欲用之而卒，年四十四。<br /><br />
　　子殷。<br /><br />

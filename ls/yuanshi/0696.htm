<tr><td class="t50">黄冔传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　黄冔[xǔ]，字殷士，抚州金溪人。博学明经，善属文，尤长于诗。<br /><br />
　　至正十七年，用左丞相太平奏，授淮南行省照磨，未行，除国子助教，迁太常博士，转国子博士，升监丞，擢翰林待制，兼国史院编修官。<br /><br />
　　二十八年，京城既破，冔叹曰：“我以儒致身，累蒙国恩，为胄子师，代言禁林。今纵无我戮，何面目见天下士乎！”遂赴井而死，年六十一。<br /><br />
　　有诗文传于世。<br /><br />

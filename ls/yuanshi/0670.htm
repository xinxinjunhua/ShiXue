<tr><td class="t50">盛昭传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　盛昭，字克明，归德人。由儒学官累迁淮南行省照磨。会诏使往高邮，不得达而还，谬称贼已迎拜，但乞名爵耳。行省不虞其欺，乃遣昭入高邮，授所与士诚官。士诚拒不听，拘诸舟中。昭语所从吏曰：“吾之止此，有死而已。”既而官军逼高邮，士诚授昭以兵，使出拒官军，昭叱曰：“吾奉命招谕汝，汝拘留诏使，罪不容斩，又欲吾从汝为贼耶！”大骂不绝口。<br /><br />
　　贼怒，先剜其臂肉，而后磔之。<br /><br />

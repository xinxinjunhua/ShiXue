<td class="t50">赵柔传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　赵柔，涞水人。有胆略，善骑射，好施予。金末避兵西山，栅险以保乡井。时刘伯元、蔡友资、李纯等亦各聚众数千，闻柔信义，共推为长。柔明号令，严约束，重赏罚，为众所服。<br /><br />
　　岁癸酉，太祖遣兵破紫荆关，柔以其众降，行省八札奏闻，以柔为涿、易二州长官，佩金符。丙戌，群盗并起，柔单骑遍入诸栅，说降其众，以功迁龙虎卫上将军、真定涿等路兵马都元帅，佩金虎符，兼银冶总管。<br /><br />
　　庚寅，太宗命兼管诸处打捕总管。丙申，加金紫光禄大夫，卒。<br /><br />
　　至顺元年，追封天水郡公，谥庄靖。曾孙世安，荣禄大夫、江西行省左丞。<br /><br />

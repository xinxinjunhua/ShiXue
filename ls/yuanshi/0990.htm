<tr><td class="t50">扈从军</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　世祖至元十七年三月，发忙古、抄儿赤所领河西军士，及阿鲁黑麾下二百人，入备扈从。<br /><br />
　　武宗至大二年，太后将幸五台，徽政院官请调军扈从。省臣议：“昔大太后尝幸五台，于住夏探马赤及汉军内，各起扈从军三百人，今遵故事。”从之。<br /><br />
　　十一月，枢密院臣言：“去岁六卫汉军内，以诸处兴建工役，故用六千军士于上都。臣等议，来岁车驾行幸，复令骑卒六千人，备车马器仗，与步卒二千人扈从。”制可。<br /><br />

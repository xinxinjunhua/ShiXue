<tr><td class="t50">儒学传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　前代史传，皆以儒学之士，分而为二，以经艺颛门者为儒林，以文章名家者为文苑。然儒之为学一也，《六经》者斯道之所在，而文则所以载夫道者也。故经非文则无以发明其旨趣；而文不本于六艺，又乌足谓之文哉。由是而言，经艺文章，不可分而为二也明矣。<br /><br />
　　元兴百年，上自朝廷内外名宦之臣，下及山林布衣之士，以通经能文显著当世者，彬彬焉众矣。今皆不复为之分别，而采取其尤卓然成名、可以辅教传后者，合而隶之，为《儒学传》。<br /><br />

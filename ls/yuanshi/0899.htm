<tr><td class="t50">名山大川忠臣义士之祠</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　凡名山大川、忠臣义士在祀典者，所在有司主之。惟南海女神灵惠夫人，至元中，以护海运有奇应，加封天妃神号，积至十字，庙曰灵慈。直沽、平江、周泾、泉、福、兴化等处，皆有庙。<br /><br />
　　皇庆以来，岁遣使赍香遍祭，金幡一合，银一铤，付平江官漕司及本府官，用柔毛酒醴，便服行事。祝文云：“维年月日，皇帝特遣某官等，致祭于护国庇民广济福惠明著天妃。”<br /><br />
</td></tr>

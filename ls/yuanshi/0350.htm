<td class="t50">唐庆传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　唐庆，不知何许人，事太祖，为管军万户。太祖伐金，以庆权元帅左监军。<br /><br />
　　岁丁亥，赐虎符，授龙虎卫上将军，使金。<br /><br />
　　壬辰，太宗复以庆为国信使，取金质子，督岁币，以金曹王来，见帝于官山。七月，使庆再往，令金主黜帝号称臣。金主不听，庆辄以语侵之，金君臣遂谋害庆。夜半，令兵入馆舍，杀庆及其弟山禄、兴禄并从行者十七人。<br /><br />
　　既灭金，购求庆尸不得，厚恤其家，赐金五十斤，诏官其子，仍计其家人口，给粮以养焉。<br /><br />
</td></tr>

<td class="t50">乞台传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　乞台，察台氏。<br /><br />
　　至元二十四年为钦察卫百户，从土土哈征叛王失烈吉及乃颜有功，赐金符，升千户。从征忽剌出，战于阿里台之地。<br /><br />
　　元贞二年，以疾卒。<br /><br />
　　子哈赞赤袭职，从创兀儿于魁烈儿之地，与哈答安战有功。大德五年，从战杭海。从武宗亲征哈剌阿答。复从创兀儿征不别、八怜，为前锋，以功受赏赉。<br /><br />
　　皇庆二年，授金符，为千户。明宗居潜邸，延祐四年命从西征，与秃满帖木儿战于失剌塔儿马失之地，以功复受厚赏，居其地十五年。<br /><br />
　　天历二年，赐金符，授昭勇大将军、同知大都督府事。卒。<br /><br />

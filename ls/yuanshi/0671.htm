<tr><td class="t50">杨乘传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　杨乘，字文载，滨州渤海人。<br /><br />
　　至正初，为介休县尹，民饥散为盗，乘立法招之，使自新，皆弃兵顿首，愿为良民。其后累官江浙行省左右司员外郎，坐海寇掠漕粮舟免官，寓居松江。<br /><br />
　　张士诚入平江，其徒郭良弼、董绶言乘于士诚，士诚遣张经招乘，乘曰：“良弼、绶皆名臣，今已失节，顾欲引我，以济其恶邪！”且让经平日读书云何，经俯首不能对。乘日与客痛饮，竟日不言。客问：“盍行乎？”乘曰：“乘以一小吏致身显官，有死而已，尚何行之有！”<br /><br />
　　经促其行愈急，乘乃整衣冠，自经死，年六十四。<br /><br />

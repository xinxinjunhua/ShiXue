<tr><td class="t50">风雨雷师</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　风、雨、雷师之祀，自至元七年十二月，大司农请于立春后丑日，祭风师于东北郊；立夏后申日，祭雷、雨师于西南郊。<br /><br />
　　仁宗延祐五年，乃即二郊定立坛壝之制，其仪注阙。<br /><br />

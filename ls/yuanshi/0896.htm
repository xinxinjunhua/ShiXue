<tr><td class="jz">

</td></tr>
<tr><td>
<br />
　　武成王立庙于枢密院公堂之西，以孙武子、张良、管仲、乐毅、诸葛亮以下十人从祀。每岁春秋仲月上戊，以羊一、豕一、牺尊、象尊、笾、豆、俎、爵，枢密院遣官，行三献礼。<br /><br />

<tr><td class="t50">金水河</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　金水河，其源出于宛平县玉泉山，流至和义门南水门入京城，故得金水之名。<br /><br />
　　至元二十九年二月，中书右丞马速忽等言：“金水河所经运石大河及高良河、西河俱有跨河跳槽，今已损坏，请新之。”<br /><br />
　　是年六月兴工，明年二月工毕。<br /><br />
　　至大四年七月，奉旨引金水河水注之光天殿西花园石山前旧池，置闸四以节水。闰七月兴工，九月成，凡役夫匠二十九，为工二千七百二十三，除妨工，实役六十五日。<br /><br />

<td class="t50">哈散纳传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　哈散纳，怯烈亦氏。<br /><br />
　　太祖时，从征王罕有功，命同饮班朱尼河之水，且曰：“与我共饮此水者，世为我用。”后管领阿儿浑军，从太祖征西域，下薛迷则干、不花剌等城。<br /><br />
　　至太宗时，仍命领阿儿浑军，并回回人匠三千户驻于荨麻林。寻授平阳、太原两路达鲁花赤，兼管诸色人匠，后以疾卒。<br /><br />
　　子捏古伯袭，从宪宗攻钓鱼山，有功，以疾卒。<br /><br />
　　子撒的迷失袭。<br /><br />
　　撒的迷失卒，子木八剌袭，充贵赤千户，迁西域亲军副都指挥使，大德元年卒。<br /><br />
　　弟秃满答袭，秃满答卒，子哈剌章袭。<br /><br />

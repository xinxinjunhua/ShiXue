<tr><td class="t50">杨朴传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　杨朴，字文素，河南人。早以文学得推择为吏，任至滁州全椒县尹。滁界庐江，庐江陷于寇，滁人震动。行省参政也先总兵于滁，不理军事，唯纵饮，至暮，城门不钥，寇入纵火，犹张烛挥杯，急逾城出走。<br /><br />
　　朴度必死，乃尽杀其妻女，朝服坐堂上。盗欲降之，朴指妻女示曰：“我已戕我属，政欲死官守耳，尚何云云！”乃连唾之。贼絷朴，倒悬树上，而割其肉至尽，犹大骂弗绝。<br /><br />
</td></tr>

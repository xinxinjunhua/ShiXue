<tr><td class="t50">古帝王庙</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　尧帝庙在平阳。舜帝庙，河东、山东济南历山、濮州、湖南道州皆有之。禹庙在河中龙门。<br /><br />
　　至元元年七月，龙门禹庙成，命侍臣持香致敬，有祝文。十二年二月，立伏羲、女娲、舜、汤等庙于河中解州、洪洞、赵城。<br /><br />
　　十五年四月，修会川县盘古王祠，祀之。<br /><br />
　　二十四年闰二月，敕春秋二仲丙日，祀帝尧庙。致和元年，礼部移太常送博士议，舜、禹之庙合依尧祠故事，每岁春秋仲月上旬卜日，有司蠲洁致祭，官给祭物。<br /><br />
　　至顺元年三月，从太常奉礼郎薛元德言，彰德路汤阴县北故羑里城周文王祠，命有司奉祀如故事。<br /><br />

<tr><td class="t50">河间河</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　河间河，在河间路界。<br /><br />
　　泰定三年三月，都水监言：“河间路水患，古俭河，自北门外始，依旧疏通，至大成县界，以泄上源水势，引入盐河，古陈玉带河，自军司口浚治，至雄州归信县界，以导淀泺积潦，注之易河。黄龙港，自锁井口开凿，至文安县玳瑁口，以通泺水，经火烧淀，转流入海。计河宜疏者三十处，总役夫三万，三十日可毕。”<br /><br />
　　是月省臣奏准，遣断事官定住同元委都水孙监丞洎本处有司官，于旁近州县发丁夫三万，日给钞一两、米一升，先诣古陈玉带河。寻以岁旱民饥，役兴人劳罢，候年登为之。<br /><br />

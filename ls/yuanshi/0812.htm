<tr><td class="t50">征东行省</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　征东等处行中书省，领府二、司一、劝课使五。（大德三年，立征东行省，未几罢。至治元年复立，命高丽国王为左丞相。）<br /><br />
　　高丽国。（事迹见《高丽传》。至元十八年，王睶言：“本国置站凡四十，民畜凋弊。”敕并为二十站。三十年，沿海立水驿，自耽罗至鸭绿江并杨村、海口凡三十所。）<br /><br />
　　沈阳等路高丽军民总管府。<br /><br />
　　征东招讨司。<br /><br />
　　各道劝课使。<br /><br />
　　庆尚州道。<br /><br />
　　东界交州道。<br /><br />
　　全罗州道。<br /><br />
　　忠清州道。<br /><br />
　　西海道。<br /><br />
　　耽罗军民总管府。（大德五年立。）<br /><br />

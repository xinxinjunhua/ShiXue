<td class="t50">抄儿传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　抄儿，别速氏。世居汴梁阳武县，从太祖收附诸国有功。又从征金，没于阵。<br /><br />
　　子抄海，从征河南、山东，复没于阵。<br /><br />
　　子别帖，将其父军，从攻鄂州，以功赏银帛衣甲等，继从太子忽哥赤西征大理国，复没于阵。<br /><br />
　　子阿必察，至元五年授武略将军、蒙古千户，赐金符，从围襄樊，复渡江，夺阳罗堡岸口，以功赏白金，进宣武将军、蒙古军总管，管领左右手两万户军。既下广德，从平章阿里海牙征海外国，率死士鼓战船进，夺岸口，擒勇士赵安等，以功赏银帛。<br /><br />
　　十六年，命管领蒙古侍卫军，以疾卒于军。<br /><br />

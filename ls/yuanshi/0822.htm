<tr><td class="t50">双塔河</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　双塔河，源出昌平县孟村一亩泉，经双塔店而东，至丰善村，入榆河。<br /><br />
　　至元三年四月六日，巡河官言：“双塔河时将泛溢，不早为备，恐至溃决，临期卒难措手。乃计会闭水口工物，开申都水监，创开双塔河，未及坚久。今已及水涨之时，倘或决坏，走泄水势，误运船不便。”<br /><br />
　　省准制国用司给所需，都水监差夫修治焉。<br /><br />
　　凡合闭水口五处，用工二千一百五十五。<br /><br />

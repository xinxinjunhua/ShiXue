<tr><td class="t50">韩择传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　韩择者，字从善，亦奉元人。天资超异，信道不惑，其教学者，虽中岁以后，亦必使自《小学》等书始。或疑为陵节勤苦，则曰：“人不知学，白首童心，且童蒙所当知，而皓首不知，可乎？”择尤邃礼学，有质问者，口讲指画无倦容。<br /><br />
　　士大夫游宦过秦中，必往见择，莫不虚往而实归焉。<br /><br />
　　世祖尝召之赴京，疾，不果行。<br /><br />
　　其卒也，门人为服緦麻者百余人。<br /><br />

<tr><td class="t50">郡县社稷</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　至元十年八月甲辰朔，颁诸路立社稷坛壝仪式。十六年春三月，中书省下太常礼官，定郡县社稷坛壝、祭器制度、祀祭仪式，图写成书，名《至元州郡通礼》。<br /><br />
　　元贞二年冬，复下太常，议置坛于城西南二坛，方广视太社、太稷，杀其半。壶尊二，笾豆皆八，而无乐。牲用羊豕，余皆与太社、太稷同。三献官以州长贰为之。<br /><br />
</td></tr>

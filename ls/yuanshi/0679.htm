<tr><td class="t50">俞述祖传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　俞述祖，字绍芳，庆元象山人。由翰林书写考满，调广东元帅府都事，入为国史院编修官，已而出为沔阳府推官。<br /><br />
　　至正十二年，蕲黄贼迫州境，述祖领民兵守绿水洪，并力捍御之。兵力不支，沔阳城陷，民兵悉溃。述祖为贼所执，械至其伪主徐寿辉所，诱之使降。述祖骂不辍，寿辉怒，支解之。<br /><br />
　　有子方五岁，亦死。事闻，赠奉训大夫、礼部郎中、象山县男。<br /><br />

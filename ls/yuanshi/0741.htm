<tr><td class="t50">景符</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　景符之制，以铜叶，博二寸，长加博之二，中穿一窍，若针芥然。以方跂为趺，一端设为机轴，令可开阖，榰其一端，使其势斜倚，北高南下，往来迁就于虚梁之中。窍达日光，仅如米许，隐然见横梁于其中。旧法一表端测晷，所得者日体上边之景。今以横梁取之，实得中景，不容有毫末之差。<br /><br />
　　至元十六年己卯夏至晷景，四月十九日乙未景一丈二尺三寸六分九厘五毫。<br /><br />
　　至元十六年己卯冬至晷景，十月二十四日戊戌景七丈六尺七寸四分。<br /><br />
</td></tr>

<tr><td class="t50">卞琛传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　卞琛，大名人。世为农夫，早游学京师，得补国子生，既而丁母忧，治农于家。<br /><br />
　　至正十二年，邻郡盗起。未几，来剽掠，琛与从子小十、府史李仲亨等协谋，统丁壮数百人击贼。丁壮皆民兵，无弓矢之备，直以钩锄白铤当贼。贼矢雨集，琛众溃散，被擒。仲亨、小十皆死。贼素知琛，谕之曰：“汝从我，解汝缚；不从，杀汝。”琛唾骂曰：“我国子生也。视汝逆贼，真狗彘也。吾宁义死，不从贼生！”骂不止。贼屡胁不听，杀之。<br /><br />

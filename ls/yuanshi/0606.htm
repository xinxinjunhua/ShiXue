<tr><td class="t50">侯均传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　侯均者，字伯仁，亦奉元人。父母蚤亡，独与继母居，卖薪以给奉养。积学四十年，群经百氏，无不淹贯，旁通释、老外典。每读书，必熟诵乃已。尝言：“人读书不至千遍，终于己无益。”故其答诸生所问，穷索极探，如取诸箧笥。名振关中，学者宗之。用荐者起为太常博士，后以上疏忤时相意，不待报可，即归休田里。<br /><br />
　　均貌魁梧，而气刚正，人多严惮之，及其应接之际，则和易款洽。虽方言古语，世所未晓者，莫不随问而答，世咸服其博闻。<br /><br />
</td></tr>

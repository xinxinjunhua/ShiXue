<tr><td class="t50">窥几</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　窥几之制，长六尺，广二尺，高倍之。下为趺，广三寸，厚二寸，上跂广四寸，厚如趺。以板为面，厚及寸，四隅为足，撑以斜木，务取正方。面中开明窍，长四尺，广二寸。近窍两旁一寸分画为尺，内三寸刻为细分，下应圭面。几面上至梁心二十六尺，取以为准。窥限各各长二尺四寸，广二寸，脊厚五分，两刃斜閷，取其于几面相符，着限两端，厚广各存二寸，衔入几跂。<br /><br />
　　俟星月正中，从几下仰望，视表梁南北以为识，折取分寸中数，用为直景。又于远方同日窥测取景数，以推星月高下也。<br /><br />
</td></tr>

<td class="t50">伊籍传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　伊籍字机伯，山阳人。少依邑人镇南将军刘表。先主之在荆州，籍常往来自讬。表卒，遂随先主南渡江，从入益州。<br /><br />
　　益州既定，以籍为左将军从事中郎，见待亚於简雍、孙乾等。遣东使於吴，孙权闻其才辩，欲逆折以辞。籍適入拜，权曰：“劳事无道之君乎？”籍既对曰：“一拜一起，未足为劳。”籍之机捷，类皆如此，权甚异之。后迁昭文将军，与诸葛亮、法正、刘巴、李严共造蜀科；蜀科之制，由此五人焉。<br /><br />
</td></tr>

<td class="t50">孙乾传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　孙乾字公祐，北海人也。先主领徐州，辟为从事，后随从周旋。先主之背曹公，遣乾自结袁绍，将適荆州，乾又与麋竺俱使刘表，皆如意指。后表与袁尚书，说其兄弟分争之变，曰：“每与刘左将军、孙公祐共论此事，未尝不痛心入骨，相为悲伤也。”其见重如此。<br /><br />
　　先主定益州，乾自从事中郎为秉忠将军，见礼次麋竺，与简雍同等。顷之，卒。<br /><br />

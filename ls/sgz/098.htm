<td class="t50">萧怀王曹熊传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　萧怀王熊，早薨。黄初二年追封谥萧怀公。太和三年，又追封爵为王。青龙二年，子哀王炳嗣，食邑二千五百户。六年薨，无子，国除。<br /><br />
　　＊＊＊<br /><br />
　　评曰：任城武艺壮猛，有将领之气。陈思文才富艳，足以自通后叶，然不能克让远防，终致携隙。传曰“楚则失之矣。而齐亦未为得也”，其此之谓欤！<br /><br />
</td></tr>

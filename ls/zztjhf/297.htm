<td class="t50">奖谕诏书</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　敕司马光：修《資治通鑒》成事。 <br /><br />
　　史学之废久矣，纪次无法，论议不明，岂足以示惩劝，明久远哉！卿博学多闻，贯穿今古，上自晚周，下迄五代，发挥缀缉，成一家之书，褒贬去取，有所据依。省阅以还，良深嘉叹！<br /><br />
　　今赐卿银绢、对衣、腰带、鞍辔马，具如别录，至可领也。故兹奖谕。想宜知悉。 <br /><br />
　　冬寒，卿比平安好。遣书，指不多及。<br /><br />
　　十五日<br /><br />
　　＊<br /><br />
　　元丰八年九月十七日，准尚书省札子，奉圣旨，重行校定。 <br /><br />
　　＊<br /><br />
　　元祐元年十月十四日，奉圣旨，下杭州镂板。
<br /><br />

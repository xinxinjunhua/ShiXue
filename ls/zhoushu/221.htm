<td class="t50">邓至白兰传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　邓至羌者，羌之别种也。有像舒治者，世为白水酋帅，自称王焉。其地北与宕昌相接，风俗物产亦与宕昌略同。自舒治至檐桁十一世。魏恭帝元年，檐桁失国来奔，太祖令章武公导率兵送复之。<br /><br />
　　＊＊＊<br /><br />
　　白兰者，羌之别种也。其地东北接吐谷浑，西北至利模徒，南界那鄂，风俗物产与宕昌略同。保定元年，遣使献犀甲铁铠。<br /><br />

<td class="t50">艺术传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　太祖受命之始，属天下分崩，于时戎马交驰，而学术之士盖寡，故曲艺末技，咸见引纳。<br /><br />
　　至若冀俊、蒋升、赵文深之徒，虽才愧昔人，而名著当世。及克定鄢、郢，俊异毕集。乐茂雅、萧吉以阴阳显，庾季才以天官称，史元华相术擅奇，许奭，姚僧垣方药特妙，斯皆一时之美也。<br /><br />
　　茂雅、元华、许奭，史失其传。季才、萧吉，官成于隋。自余纪于此篇，以备遗阙云尔。<br /><br />

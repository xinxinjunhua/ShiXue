<td class="t50">杞简公宇文连传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　杞简公连，幼而谨厚，临敌果毅。随德皇帝逼定州，军于唐河，遂俱殁。保定初，追赠使持节、太傅、柱国大将军、大司徒、大都督、定冀等十州诸军事、定州刺史，封杞国公，邑五千户。谥曰简。<br /><br />
　　＊＊＊<br /><br />
　　子元宝为齐神武所害。保定初，追赠大将军、小司徒、大都督、幽燕等六州诸军事、幽州刺史。袭爵杞国公，谥曰烈。以章武公导子亮嗣。<br /><br />
</td></tr>

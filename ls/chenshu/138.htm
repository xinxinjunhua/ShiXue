<td class="t50">全缓传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　全缓，字弘立，吴郡钱塘人也。幼受《易》于博士褚仲都，笃志研玩，得其精微。梁太清初，历王国侍郎、奉朝请，俄转国子助教，兼司义郎，专讲《诗》、《易》。<br /><br />
　　绍泰元年，除尚书水部郎。<br /><br />
　　太建中，累迁镇南始兴王府谘议参军，随府诣湘州，以疾卒，时年七十四。<br /><br />
　　缓治《周易》、《老庄》，时人言玄者咸推之。<br /><br />

<td class="t50">陆琛传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　琛字洁玉，宣毅临川王长史丘公之子。少警俊，事后母以孝闻。世祖为会稽太守，琛年十八，上《善政颂》，甚有词采，由此知名，举秀才。<br /><br />
　　起家为衡阳王主簿，兼东宫管记。历豫章王文学，领记室，司徒主簿，直宣明殿学士。寻迁尚书三公侍郎，兼通直散骑常侍，聘齐，还为司徒左西掾。又掌东宫管记，太子爱琛才辩，深礼遇之。<br /><br />
　　后主嗣位，迁给事黄门侍郎、中书舍人，参掌机密。琛性颇疏，坐漏泄禁中语，诏赐死，时年四十二。<br /><br />
</td></tr>

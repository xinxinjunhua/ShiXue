<td class="t50">刘仲威传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　刘仲威，南阳涅阳人也。祖虬，齐世以国子博士征，不就。父之迟，荆州治中从事史。仲威少有志气，颇涉文史。梁丞圣中为中书侍郎。萧庄伪署御史中丞，随庄入齐，终于邺中。<br /><br />
　　仲威从弟广德，亦好学，负才任气。父之亨，梁安西湘东王长史、南郡太守。广德承圣中以军功官至给事黄门侍郎、湘东太守。荆州陷后，依于王琳。琳平，文帝以广德为宁远始兴王府限外记室参军，仍领其旧兵。寻为太尉侯瑱湘州府司马，历乐山、豫章二郡太守，新安内史。<br /><br />
　　光大中，假节、员外散骑常侍、云旗将军、河东太守。<br /><br />
　　太建元年卒于郡，时年四十三，赠左卫将军。<br /><br />

<td class="t50">孝行传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　孔子曰：“夫圣人之德，何以加于孝乎！”孝者百行之本，人伦之至极也。凡在性灵，孰不由此。若乃奉生尽养，送终尽哀，或泣血三年，绝浆七日，思《蓼莪》之慕切，追顾复之恩深，或德感乾坤，诚贯幽显，在于历代，盖有人矣。<br /><br />
　　陈承梁室丧乱，风漓化薄，及迹隐阎闾，无闻视听，今之采缀，以备阙云。<br /><br />

<td class="t50">沈德威传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　沈德威字怀远，少有操行。梁太清末，遁于天目山，筑室以居，虽处乱离，而笃学无倦，遂治经业。<br /><br />
　　天嘉元年，征出都，侍太子讲《礼传》。寻授太学博士，转国子助教。每自学还私室以讲授，道俗受业者数十百人，率常如此。迁太常丞，兼五礼学士，寻为尚书仪曹郎，后为祠部郎。俄丁母忧去职。<br /><br />
　　祯明三年入隋，官至秦王府主簿。年五十五卒。<br /><br />

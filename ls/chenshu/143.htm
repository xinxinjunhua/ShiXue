<td class="t50">文学传序</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　《易》曰“观乎人文以化成天下”，孔子曰“焕乎其有文章”也。自楚、汉以降，辞人世出，洛汭、江左，其流弥畅。莫不思侔造化，明并日月，大则宪章典谟，裨赞王道，小则文理清正，申纾性灵。至于经礼乐，综人伦，通古今，述美恶，莫尚乎此。<br /><br />
　　后主嗣业，雅尚文词，傍求学艺，焕乎俱集。每臣下表疏及献上赋颂者，躬自省览，其有辞工，则神笔赏激，加其爵位，是以搢绅之徒，咸知自励矣。若名位文学晃著者，别以功迹论。<br /><br />
　　今缀杜之伟等学既兼文，备于此篇云尔。<br /><br />

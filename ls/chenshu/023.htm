<td class="t50">废帝王皇后</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　废帝王皇后，金紫光禄大夫固之女也。天嘉元年，为皇太子妃，废帝即位，立为皇后。废帝为临海王，后为临海王妃。至德中薨。<br /><br />
　　后生临海嗣王至泽。至泽以光大元年为皇太子。<br /><br />
　　太建元年，袭封临海嗣王。寻为宣惠将军，置佐史。陈亡入长安。<br /><br />

<td class="t50">徐份传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　份少有父风，年九岁，为《梦赋》，陵见之，谓所亲曰：“吾幼属文，亦不加此。”解褐为秘书郎。转太子舍人。累迁豫章王主簿、太子洗马。出为海盐令，甚有治绩。秩满，入为太子洗马。份性孝悌，陵尝遇疾，甚笃，份烧香泣涕，跪诵《孝经》，昼夜不息，如此者三日，陵疾豁然而愈，亲戚皆谓份孝感所致。<br /><br />
　　太建二年卒，时年二十二。<br /><br />

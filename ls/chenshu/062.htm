<td class="t50">谢岐传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　谢岐，会稽山阴人也。父达，梁太学博士。岐少机警，好学，见称于梁世。为尚书金部郎，山阴令。侯景乱，岐流寓东阳。景平，依于张彪。彪在吴郡及会稽，庶事一以委之。彪每征讨，恒留岐监郡，知后事。彪败，高祖引岐参预机密，以为兼尚书右丞。时军旅屡兴，粮储多阙，岐所在干理，深被知遇。<br /><br />
　　永定元年，为给事黄门侍郎、中书舍人，兼右丞如故。<br /><br />
　　天嘉二年卒，赠通直散骑常侍。<br /><br />
　　岐弟峤，笃学，为世通儒。<br /><br />

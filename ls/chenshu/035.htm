<td class="t50">侯欧吴传论</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　史臣曰：<br /><br />
　　高祖拨乱创基，光启天历，侯瑱、欧阳頠并归身有道，位贵鼎司，美矣。吴明彻居将帅之任，初有军功，及吕梁败绩，为失算也。斯以勇非韩、白，识异孙、吴，遂使蹙境丧师，金陵虚弱，祯明沦覆，盖由其渐焉。<br /><br />
</td></tr>

<td class="t50">陆玠传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　玠字润玉，梁大匠卿晏子之子。弘雅有识度，好学，能属文。举秀才，对策高第。吏部尚书袁枢荐之于世祖，超授衡阳王文学，直天保殿学士。<br /><br />
　　太建初，迁长沙王友，领记室。后主在东宫，闻其名，徵为管记。仍除中舍人，管记如故，甚见亲待。寻以疾失明，将还乡里，太子解衣赠玠，为之流涕。<br /><br />
　　八年卒，时年三十七。有令举哀，并加赗赠。<br /><br />
　　至德二年，追赠少府卿。有集十卷。<br /><br />

<td class="t50">贺德基传</td></tr>
<tr><td class="jz">
<hr />
</td></tr>
<tr><td>
<br />
　　贺德基字承业，世传《礼》学。祖文发，父淹，仕梁俱为祠部郎，并有名当世。德基少游学于京邑，积年不归，衣资罄乏，又耻服故弊，盛冬止衣裌襦袴。<br /><br />
　　尝于白马寺前逢一妇人，容服甚盛，呼德基入寺门，脱白纶巾以赠之。仍谓德基曰：“君方为重器，不久贫寒，故以此相遗耳。”德基问妪姓名，不答而去。<br /><br />
　　德基于《礼记》称为精明，居以传授，累迁尚书祠部郎。德基虽不至大官，而三世儒学，俱为祠部，时论美其不坠焉。<br /><br />
